      - "Açık kalan bölüm yarım büyüklüğünde olmalı"
      - "Şıklarda A-B-C etiketli üç parça görseli yer almalı"
      - "Yalnız bir parça, verilen alanlardan en az birini doğru tamamlamalı"
      - "Aynı anda iki doğru cevap oluşmamalı"

  varyant_2_gorseli:
    aciklama: "Üstte tek bir nesne ve altında 1, 2, 3 numaralı parçalar verilir."
    kurallar:
      - "Üst görselde yalnızca tek bir nesne ya da alan bulunmalı"
      - "Altında yalnız 1, 2 ve 3 numaralı parçalar yer almalı"
      - "4 numaralı parça bulunmamalı"
      - "Şıklar A-B-C biçiminde verilmeli"
      - "Şıklarda yalnız numara çiftleri yer almalı"
      - "Seçenek biçimi örnek olarak '1 ve 2', '2 ve 3', '1 ve 3' yapısında olmalı"
      - "Yalnız bir numara çifti nesne ile birleşince bütünü tamamlamalı"

  sik_gorseli:
    gerekli: "soru tipine göre değişir"

