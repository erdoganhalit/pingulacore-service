varyantlar:
  - kod: "1"
    ad: "Dogrudan Ipuclu Tam Eslestirme"
    amac: >
      Ogrencinin, konusma balonlarinda acik bicimde verilen ipuclarini kullanarak
      kutulari dogrudan butun, yarim ve ceyrek olarak eslestirmesi beklenir.
    ipucu_mantigi: "dogrudan_tanima_ve_eslestirme"
    ipucu_yapilari:
      tercih_edilenler:
        - "Bu parca tek basina butundur."
        - "Bu parcadan 2 tane olursa butun olur."
        - "Bu parcadan 4 tane olursa butun olur."
        - "Bu parca yarimin yarisidir."
        - "Bu parcanin baska esine ihtiyaci yoktur."
      dikkatli_kullan:
        - "Bu parca tamdir."
        - "Bu parcanin bir tanesi yeterlidir."
    soru_odagi:
      - "Dogrudan verilen ipucudan dogru kavrami tanima"
      - "Kutulari soldan saga dogru eslestirme"
      - "Butun-yarim-ceyrek arasindaki temel iliskiyi kullanma"
    kurallar:
      - "Uc ipucunun en az ikisi dogrudan tanimlayici olmali"
      - "Bir ipucu tek basina tek bir kavrama goturmeli"
      - "Ipuclarda gereksiz dolayli anlatim kullanilmamali"
      - "Ogrenci dogrudan tanima yoluyla sonuca ulasabilmeli"
    dogru_cevap_mantigi:
      - "Tek basina tamdir ifadesi butune goturur"
      - "2 tane olursa butun olur ifadesi yarima goturur"
      - "4 tane olursa butun olur ifadesi ceyrege goturur"
      - "Yarimin yarisi ifadesi kullanilirsa cevap ceyrek olur"

  - kod: "2"
    ad: "Dolayli Ipuclu Tam Eslestirme"
    amac: >
      Ogrencinin, konusma balonlarinda dolayli ya da iliski kurduran ipuclarini
      yorumlayarak kutulari butun, yarim ve ceyrek olarak eslestirmesi beklenir.
    ipucu_mantigi: "yorumlama_ve_cikarsal_eslestirme"
    ipucu_yapilari:
      tercih_edilenler:
        - "Bu parca yarimin yarisidir."
        - "Bu parca ne butundur ne de ceyrektir."
        - "Bu parca tam olan degildir."
        - "Bu parca ceyrekten buyuk, butunden kucuktur."
        - "Bu parcayi tamamlamak icin bir tane daha aynisi gerekir."
        - "Bu parca tek basina yetmez, ama cok kucuk de degildir."
      dikkatli_kullan:
        - "Bu parca butunden kucuktur."
        - "Bu parca tek basina tamam sayilmaz."
    soru_odagi:
      - "Dolayli ipucuyu yorumlayarak kavrama ulasma"
      - "Eleme ve karsilastirma ile kutulari eslestirme"
      - "Parca-butun iliskisini dogrudan olmayan yoldan kurma"
    kurallar:
      - "En az bir ipucu dolayli anlatim icermeli"
      - "Dolayli ipucu yine tek bir dogru kavrama goturmeli"
      - "Belirsiz ya da iki anlama gelebilecek ipucu kullanilmamali"
      - "Dil yukunun 2. sinif seviyesini asmamasi gerekir"
    dogru_cevap_mantigi:
      - "Yarimin yarisidir ifadesi ceyrege goturur"
      - "Ne butundur ne de ceyrektir ifadesi yarima goturur"
      - "Bir tane daha aynisi gerekir ifadesi yarima goturur"
      - "Ceyrekten buyuk, butunden kucuktur ifadesi yarima goturur"
      - "Tam olan degildir ifadesi tek basina yetmez; baska ipucularla birlikte cozulmelidir"

