dogru_cevap:
  tanim: Onluk bozma gerektiren cikarma mantigini dogru kurup sonuca ulasan secenek
  kurallar:
  - Onluk bozarak doğru çıkarma işlemini yap
  - Kalan miktarı doğru belirle
  - Dogru cevap tek ve net olmali

distractors:
  kurallar:
  - Yaygın hataları temsil etmeli
  - Mantıklı görünmeli
  - Onluk bozmayi goz ardi eden secenekler kullanilmali
  - Birlik azaltimini yanlis yapan secenekler yer almali
  - Yanlis secenekler ogrencinin dusebilecegi gercek hatalara dayanmali
  - Yanlis secenekler dogru cevaba yakin ama ayirt edilebilir olmali
  yasaklar:
  - Alakasız sayılar
  - Mantıksız seçenekler
  - Bariz sacma, baglamsiz ya da islem mantigiyla ilgisiz secenek uretilmemeli
  - Birden fazla yanlis secenek ayni hatayi tekrar etmemeli

gorsel:
  ana_gorsel:
    kurallar:
    - Gorsel ilkokul duzeyine uygun, sade ve anlasilir olmali
    - Onluk ve birlikler ayni sahnede duzenli bicimde gosterilmeli
    - Bozulan onluk yapisi ogrencinin islem mantigini kurabilecegi aciklikta olmali
    - Sayilmasi ya da karsilastirilmasi gereken ana ogeler net secilebilmeli
    - Gorsel, soruda hedeflenen islem ya da iliskiyi bire bir karsilamali
    - Gorselde baslangic miktari, eksilen miktar acikca yer almali
    - 64 sayisi sadece yaziyla degil, 6 tane 10'lu simit grubu ve 4 tek simit ile modellenmelidir
    - 10'lu simit gruplari tepsi, raf ya da ip dizisi gibi gercek baglama uygun tasiyicilarla gosterilmeli; her grupta tam 10 simit sayilabilmelidir
    - Tek simitler ayri bolgede, 10'lu gruplarla karismadan sunulmalidir
    - Cikarilacak simit miktari ayni nesne turuyle acikca gosterilmeli; sayi, nesne ve islem ayni sahnede birbiriyle uyumlu olmalidir
    yasaklar:
    - Gorselin icinde veya ustunde cevabi ele veren islem, sonuc ya da ipucu yazilmamali
    - Sayilmasi gereken ana ogeler dekoratif kalabalik icinde kaybolmamali
    - Fotogercekci, karmasik veya yetiskinlere hitap eden bir gorsel dil kullanilmamali
    - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
    - Yalnizca kutu ustune yazilmis sayi etiketiyle cozum veren sahne kurulmamalidir
    - Simit senaryosunu soyut onluk-birlik bloklariyla, kuplerle veya alakasiz geometri cisimleriyle temsil etme
    stil: ilkokul_dostu_sade_illustrasyon
    boyut: orta
  sik_gorseli:
    gerekli: false
    kurallar:
    - Secenekler yalnizca metin, sayi ya da islem ifadesi olarak verilmelidir

