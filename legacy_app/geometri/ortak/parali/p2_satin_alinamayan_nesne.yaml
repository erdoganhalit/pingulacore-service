  ad: "Fiyati ve Verilen Paraya Gore Satinalinamayan Nesneyi Bulma"
  sinif_seviyesi: 1
  aciklama: >
    Ustte kisa bir senaryo ve baglama uygun bir baglam bulunan; tek bir ortak gorselde
    3 farkli nesnenin fiyat etiketi ile birlikte verildigi ve her nesnenin yaninda
    o nesneyi almak icin ayrilmis gercek Turk lirasina benzeyen kagit para ve 1 TL
    madeni para grubunun bulundugu soru kalibi. Ogrenci her nesnenin fiyatini ve
    yanindaki para miktarini karsilastirir. Iki nesne icin verilen para fiyata esit
    ya da fiyattan fazla olurken, yalnizca bir nesne icin verilen para fiyattan azdir.
    Ogrenci buna gore verilen kisinin hangi nesneyi satin alamayacagini seceneklerden
    belirler.
  kaynak: "o_fiyati_ve_verilen_paraya_gore_satinalinamayan_nesneyi_bulma.yaml"
  frequency: "Medium"
  difficulty: "orta"

