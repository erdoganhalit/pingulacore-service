dogru_cevap:
  tanim: "Gorseldeki her nesnenin fiyatini ve yanindaki para miktarini dogru karsilastiran ve verilen paranin fiyatina yetmedigi tek nesneyi secenek olarak veren cevap"
  kurallar:
    - "KRITIK: Dogru cevap, hem fiyat etiketini okumayi hem de her nesnenin yanindaki para miktarini hesaplayip karsilastirmayi gerektirmeli"
    - "Dogru cevap, yalnizca en pahali nesneye bakilarak ya da yalnizca para grubunun buyuklugune bakilarak bulunamamali"
    - "Dogru cevap, once her nesnenin fiyatini belirletmeli"
    - "Dogru cevap, sonra her nesnenin yanindaki kagit ve madeni para miktarini toplatmali"
    - "Dogru cevap, en son para miktari fiyatindan az olan tek nesneyi buldurmali"
    - "Dogru cevap, seceneklerde yalnizca bir nesne adi ile temsil edilmeli"
    - "Dogru cevap, tahminle degil sayma ve karsilastirma ile bulunabilmeli"
    - "Dogru cevap tek ve net olmali"

