  ad: "Turk Lirasi Banknot ve Madeni Paralari Toplayarak Toplam Parayi Bulma"
  sinif_seviyesi: 1
  aciklama: >
    Ustte kisa bir senaryo ve baglama uygun bir baglam bulunan; tek bir ortak gorselde
    gercek Turk lirasina benzeyen 5 TL ve 10 TL kagit paralar ile 1 TL madeni
    paralarin birlikte verildigi soru kalibi. Ogrenci gorseldeki kagit para ve
    madeni para adetlerini belirler, para turlerine gore toplar ve toplam para
    miktarini TL cinsinden sayisal secenekler arasindan bulur.
