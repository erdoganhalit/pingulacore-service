header_template: >
  Bu şablondan her soru üretildiğinde benzersiz bir soru oluşturulmalıdır.
  Değiştirilmesi gereken öğeler: lokanta veya restoran adı, menü öğeleri ve fiyatları,
  masa numaraları, sipariş edilen ürünler ve adetleri, iptal edilen ürünler,
  sonradan eklenen ürünler, senaryonun geçtiği bağlam (aile yemeği, okul çıkışı, mahalle lokantası vb.).
  soru_kokleri listesinden her seferinde farklı bir kök seçilmeli; aynı kök arka arkaya kullanılmamalıdır.
  Sayısal değerler, menü fiyatları ve sipariş kombinasyonları her üretimde tamamen yeni olmalıdır.
  Görseldeki menü ve fiş düzeni her üretimde yeniden oluşturulmalıdır.

format:
  type: "llm_generated_html"
  soru_koku: "Tek cumlelik, dogrudan neyin istendigini soran acik soru kokusu. Dogru olani sec gibi ifade kullanilmaz."
  paragraph:
    required: true
    word_count_min: 55
    word_count_max: 95
    sentence_count_min: 4
    sentence_count_max: 6
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    style: "numeric_only"
    word_count_min: 1
    word_count_max: 3
    correct_count: 1
  interaction:
    clickable_options: true
    show_result_color: true
    correct_color: "yesil"
    wrong_color: "kirmizi"
    explanation_under_options: false
    generate_button: true
    generate_button_label: "Soru Uret"
  layout:
    visual_position: "question_top"
    scenario_heading: false
    feedback_note_area: false
    option_images_show_labels: false

dogru_cevap:
  tanim: "Menu fiyatlari ve fis degisiklikleriyle tam uyumlu olan tek dogru sayisal secenek"
  kurallar:
    - "Dogru cevap tek ve net olmali"
    - "Dogru cevap, menu fiyatlarini okuyup ilk fis ile ikinci fis arasindaki degisiklikleri dogru uygulayarak bulunmali"
    - "Son hesap soruluyorsa iptal edilen urunler cikarilmali, eklenen urunler eklenmeli"
    - "Hesap farki soruluyorsa iki masanin son hesaplari once ayri ayri bulunmali"
    - "Iade toplami soruluyorsa yalnizca iptal edilen urunlerin toplam fiyati alinmali"
    - "Soruda istenen buyukluk disinda ara toplam ya da menu toplami cevap olarak verilmemeli"

distractors:
  kurallar:
    - "Yanlis secenekler ogrencinin yapabilecegi gercek hatalara dayanmali"
    - "Iptal edilen urunu cikarmayip toplamda birakma hatasi kullanilabilir"
    - "Sonradan eklenen urunu eklememe hatasi kullanilabilir"
    - "Bir urunun adetini atlama ya da eksik sayma hatasi kullanilabilir"
    - "Iki masa karsilastirmasinda bir masanin ara toplamini son hesap sanma hatasi kullanilabilir"
    - "Hesap farki yerine iki masanin toplamini alma hatasi kullanilabilir"
  yasaklar:
    - "Bariz sacma veya baglamsiz secenek uretilmemeli"
    - "Iki yanlis secenek ayni hata turunden olmamali"
    - "Yanlis secenekler, istenen sonucu neredeyse tahminle bulduracak kadar asiri uzak olmamali"
  stratejiler:
    - ad: "İptal Edilen Ürünü Çıkarmama"
      aciklama: "Öğrenci iptal edilen ürünün fiyatını toplamdan düşmez ve hesabı yüksek bulur"
      ornek: "Toplam sipariş 48 TL, iptal 12 TL iken son hesabı 48 TL olarak verir"
    - ad: "Eklenen Ürünü Hesaba Katmama"
      aciklama: "Öğrenci sonradan eklenen ürünü toplamaya dahil etmez"
      ornek: "İlk sipariş 35 TL, eklenen ürün 8 TL iken sonucu 35 TL'de bırakır"
    - ad: "Adet Hatası"
      aciklama: "Öğrenci bir ürünün adetini gözden kaçırır ve tek adet fiyatıyla hesaplar"
      ornek: "2 adet çorba (her biri 10 TL) yerine 1 adet olarak 10 TL hesaplar"
    - ad: "Hesap Farkı Yerine Toplam Alma"
      aciklama: "İki masanın hesap farkı sorulurken iki hesabı birbirine toplar"
      ornek: "Masa 1: 40 TL, Masa 2: 30 TL iken fark 10 yerine 70 TL olarak seçer"

