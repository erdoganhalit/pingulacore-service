varyantlar:
  varyant_1:
    ad: "Tek masa, iki fis, son hesap"
    aciklama: >
      Gorselde ortak bir menu ile ayni masaya ait iki ayri fis bulunur.
      Ilk fiste verilen siparisler, ikinci fiste ise iptal edilen ve sonradan
      eklenen urunler yer alir. Ogrenci fislerdeki degisimi takip ederek
      masanin son hesabini ya da iade edilen urunlerin toplam degerini bulur.
    odak:
      - "tek akisli veri takibi"
      - "menu fiyatlarini okuma"
      - "ekleme ve cikarma islemlerini sirayla uygulama"
  varyant_2:
    ad: "Iki masa, fis degisiklikleri, hesap farki"
    aciklama: >
      Gorselde ortak bir menu ve iki farkli masaya ait fisler bulunur.
      Her masa icin ilk siparis ve sonradan yapilan iptal ya da eklemeler
      ayri bicimde gosterilir. Ogrenci once her masanin son hesabini bulur,
      sonra iki masa arasindaki hesap farkini ya da hangi masanin daha fazla
      odeme yapacagini belirler.
    odak:
      - "iki ayri veri akisini takip etme"
      - "ayri ayri hesaplama yapma"
      - "sonuclari karsilastirma"

