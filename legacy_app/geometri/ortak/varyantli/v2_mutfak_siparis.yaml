  aciklama: >
    Lokantadaki menu fiyati ve ayni masaya ya da iki farkli masaya ait
    siparis fisleri uzerinden, iptal edilen ve sonradan eklenen urunleri
    takip ettirerek son hesap ya da hesap farkini bulduran soru yapisi.
  kaynak: "21_mutfak_siparis_fisleri.yaml"
