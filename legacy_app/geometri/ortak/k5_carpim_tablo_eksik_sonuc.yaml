context:
  type: carpim_tablosunda_eksik_sonucu_tamamlama
  question_count: 1
  generation:
    word_count_min: 25
    word_count_max: 55
    image_type: tek_gorsel
    structure:
    - 3-5 cumlelik, gunluk yasamdan gelen dogal bir senaryo yaz
    - Senaryoda carpim tablosunun kullanildigi dogal bir baglam kurulmali
    - Carpma islemi metinde belirtilmemeli, gorselden cikarilmasi beklenmeli
    - Gorsel, cozumun ana veri kaynagi olmali
    - Soru koku, "Görsele göre eksik çarpma sonucu kaçtır?" benzeri tek cumlelik bir yapi tasimali
    ana_gorsel:
      kurallar:
      - Gorsel ilkokul duzeyine uygun, sade ve anlasilir olmali
      - Tablodaki sayilar net ve okunabilir olmali
      - Eksik carpma islemi soru isareti ile gosterilmeli, cevap gorsel icinde yer almamali
      - Sayilmasi ya da karsilastirilmasi gereken ana ogeler net secilebilmeli
      - Gorsel, soruda hedeflenen islem ya da iliskiyi bire bir karsilamali
      - Gorselde carpim tablosu ve eksik carpma sonucu acikca yer almali
      - Tablo en fazla 3x3 boyutunda olmali (baslik satirlari haric), satır ve sütun sayiları (tablonun içindeki sonuç sayıları değil) 1-5 arasinda secilmeli
      - Eksik hucre soru isareti (?) ile gosterilmeli
      yasaklar:
      - Gorselin icinde veya ustunde cevabi ele veren islem, sonuc ya da ipucu yazilmamali
      - Sayilmasi gereken ana ogeler dekoratif kalabalik icinde kaybolmamali
      - Fotogercekci, karmasik veya yetiskinlere hitap eden bir gorsel dil kullanilmamali
      - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
      stil: ilkokul_dostu_sade_illustrasyon
      boyut: orta
    sik_gorseli:
      gerekli: false
      kurallar:
      - Secenekler yalnizca metin, sayi ya da islem ifadesi olarak verilmelidir
    kurallar:
    - 2. sinif seviyesinde olmali
    - Turkce karakterler ve noktalama dogru kullanilmali
    - Gorsel ve ust metin birbiriyle tam uyumlu olmali
    - Dogru cevap tek ve net olmali
    - Gorsel olmadan dogrudan sonuca ulastiracak acik islem ya da sonuc verilmemeli
    - Secenekler 3 sikli olmali ve yalnizca bir dogru cevap icermeli
