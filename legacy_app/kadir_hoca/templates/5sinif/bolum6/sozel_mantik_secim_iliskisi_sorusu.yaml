# bolum6/sozel_mantik_secim_iliskisi_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 seçenek
# Bu sürüm yalnızca "seçim ilişkisi sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_secim_iliskisi_sorusu"
  ad: "Sözel Mantık ve Muhakeme - Seçim İlişkisi Sorusu"
  sinif_seviyesi: 5
  aciklama: "Kişi veya varlıkların belirli seçeneklerden yalnızca birini seçtiği durumlarda, seçimler arasındaki aynı/farklı olma ve kişi-seçenek ilişkilerini çözerek gizli tercih yapısını bulma"
  frequency: "High (~24 questions)"

secim_iliskisi_senaryolari:
  - ad: "balon_rengi_secimi"
    aciklama: "Çocukların etkinlikte farklı balon renklerinden birini seçmesi"
    ornek_setup: "Bir çocuk etkinliğinde her öğrenci kırmızı, mavi, sarı veya mor balonlardan birini seçmiştir."

  - ad: "sapka_deseni_secimi"
    aciklama: "Katılımcıların farklı şapka desenlerinden birini tercih etmesi"
    ornek_setup: "Bir atölyede çocukların her biri yıldızlı, çizgili, puantiyeli veya düz desenli şapkalardan birini seçmiştir."

  - ad: "rozet_sekli_secimi"
    aciklama: "Öğrencilerin farklı rozet şekillerinden birini seçmesi"
    ornek_setup: "Bir okul etkinliğinde öğrencilerin her biri yıldız, kalp, daire veya üçgen biçimindeki rozetlerden birini seçmiştir."

  - ad: "uzay_etiketi_secimi"
    aciklama: "Katılımcıların uzay temalı etiketlerden birini seçmesi"
    ornek_setup: "Bir uzay kampında öğrencilerin her biri roket, gezegen, uydu veya astronot etiketlerinden birini seçmiştir."

  - ad: "defter_kapagi_secimi"
    aciklama: "Çocukların farklı defter kapağı tasarımlarından birini seçmesi"
    ornek_setup: "Bir kırtasiye gününde çocukların her biri hayvanlı, doğalı, uzaylı veya geometrik desenli defter kapaklarından birini seçmiştir."

  - ad: "sulak_bardak_rengi_secimi"
    aciklama: "Katılımcıların farklı bardak renklerinden birini seçmesi"
    ornek_setup: "Bir piknikte çocukların her biri yeşil, turuncu, mavi veya pembe bardaklardan birini seçmiştir."

  - ad: "yildiz_haritasi_secimi"
    aciklama: "Öğrencilerin farklı gökyüzü kartlarından birini seçmesi"
    ornek_setup: "Bir planetaryum etkinliğinde öğrencilerin her biri Ay, Mars, Satürn veya Samanyolu kartlarından birini seçmiştir."

  - ad: "isaret_kalemi_secimi"
    aciklama: "Öğrencilerin farklı fosforlu kalem renklerinden birini seçmesi"
    ornek_setup: "Bir sınıf çalışmasında öğrencilerin her biri sarı, yeşil, turuncu veya mavi işaret kalemlerinden birini seçmiştir."

  - ad: "deney_gozlugu_secimi"
    aciklama: "Katılımcıların laboratuvar için farklı gözlük renklerinden birini seçmesi"
    ornek_setup: "Bir bilim merkezinde çocukların her biri kırmızı, şeffaf, mor veya lacivert deney gözlüklerinden birini seçmiştir."

  - ad: "kamp_feneri_secimi"
    aciklama: "Kampçıların farklı renk fenerlerden birini seçmesi"
    ornek_setup: "Bir gece kampında öğrencilerin her biri sarı, yeşil, mavi veya turuncu fenerlerden birini seçmiştir."

  - ad: "karakter_maskesi_secimi"
    aciklama: "Çocukların gösteri için farklı maske karakterlerinden birini seçmesi"
    ornek_setup: "Bir tiyatro hazırlığında çocukların her biri aslan, tilki, tavşan veya baykuş maskelerinden birini seçmiştir."

  - ad: "yaris_seridi_secimi"
    aciklama: "Sporcuların farklı kulvar şerit renklerinden birini seçmesi"
    ornek_setup: "Bir okul yarışında sporcuların her biri kırmızı, mavi, sarı veya beyaz kulvar şeritlerinden birini seçmiştir."

  - ad: "hediye_kurdelesi_secimi"
    aciklama: "Çocukların farklı kurdele renklerinden birini seçmesi"
    ornek_setup: "Bir hediye hazırlığında çocukların her biri altın, gümüş, mor veya yeşil kurdelelerden birini seçmiştir."

  - ad: "akilli_bileklik_secimi"
    aciklama: "Öğrencilerin farklı bileklik tasarımlarından birini seçmesi"
    ornek_setup: "Bir teknoloji etkinliğinde öğrencilerin her biri yıldızlı, ok işaretli, noktalı veya dalgalı desenli bilekliklerden birini seçmiştir."

  - ad: "robot_cikis_sesi_secimi"
    aciklama: "Katılımcıların robotları için farklı ses profillerinden birini seçmesi"
    ornek_setup: "Bir robot tasarım gününde öğrencilerin her biri yankı, bip, zil veya tık sesi seçeneklerinden birini seçmiştir."

  - ad: "masa_ortusu_deseni_secimi"
    aciklama: "Grupların farklı masa örtüsü desenlerinden birini seçmesi"
    ornek_setup: "Bir sınıf sergisinde her grup çizgili, kareli, yıldızlı veya dalgalı masa örtülerinden birini seçmiştir."

  - ad: "uzay_araci_amblemi_secimi"
    aciklama: "Katılımcıların görev amblemlerinden birini seçmesi"
    ornek_setup: "Bir uzay görevi oyununda öğrencilerin her biri kuyruklu yıldız, halka, yıldız kümesi veya roket amblemlerinden birini seçmiştir."

  - ad: "sifreli_kapi_sembolu_secimi"
    aciklama: "Oyuncuların farklı kapı sembollerinden birini seçmesi"
    ornek_setup: "Bir macera oyununda çocukların her biri anahtar, güneş, dalga veya yaprak sembollerinden birini seçmiştir."

  - ad: "kurabiye_kalibi_secimi"
    aciklama: "Çocukların farklı kurabiye kalıplarından birini seçmesi"
    ornek_setup: "Bir mutfak atölyesinde çocukların her biri yıldız, kalp, ay veya bulut biçimli kurabiye kalıplarından birini seçmiştir."

  - ad: "drone_kanat_etiketi_secimi"
    aciklama: "Katılımcıların drone modelleri için farklı etiketlerden birini seçmesi"
    ornek_setup: "Bir drone tasarım etkinliğinde öğrencilerin her biri şimşek, pusula, ok veya gezegen etiketlerinden birini seçmiştir."
# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan seçim ilişkisi sorusu"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişi veya varlıkların belirli seçeneklerden yalnızca birini seçtiği
      bir yapıda, seçimler arasındaki aynı/farklı olma ilişkilerini, belirli seçenekleri
      seçen kişi sayılarını ve doğrudan verilen bazı kişi-seçenek bilgilerini birlikte
      değerlendirerek gizli seçim düzenini kurması gerekir. Koşullar seçimleri doğrudan
      tablo gibi vermemeli; öğrenci bazı seçimleri ve seçimler arası ilişkileri mantıksal
      çıkarımla tamamlamalı, sonunda sorulan kişi–seçenek ya da kişi–kişi aynı/farklı
      seçenek ilişkisini yorumlayabilmelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kaç kişi/varlık olduğu, hangi seçeneklerin bulunduğu ve her kişinin yalnızca bir seçim yaptığı açıkça tanıtılmalıdır"
      - "Kurgu kişi-merkezli veya varlık-merkezli olabilir; ancak yapı açıkça tek seçimli bir tercih düzeni içermelidir"
      - "Her kişi yalnızca bir seçenek seçmelidir; aynı kişi birden fazla seçeneğe bağlanmamalıdır"
      - "MADDELİ KOŞULLAR 3-5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu seçimlerle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru seçim yapısı kurulmalı; ardından yalnızca bu yapıya götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar kişi–seçenek ilişkilerini satır satır açıkça doldurmamalıdır"
      - "Maddeler, gizli seçim yapısının yalnızca bazı parçalarını, aynı/farklı seçim ilişkilerini, sayı bilgilerini veya doğrudan verilen sınırlı seçimleri vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı kişi–seçenek eşleşmelerini ve kişiler arası aynı/farklı seçim ilişkilerini kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan kişi–seçenek ilişkisi ya da iki kişinin aynı/farklı seçeneği seçtiği bilgisi açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli seçim yapısı büyük ölçüde kurulabilir olmalı; şıklar yapıyı kurdurmamalı, kurulmuş yapı üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak seçim ilişkisi içermelidir"
      - "Öncelikli ilişki türleri: iki kişinin aynı seçeneği seçmesi, iki kişinin farklı seçenekler seçmesi, belirli bir seçeneği seçen kişi sayısı, belirli bir kişinin hangi seçeneği seçtiği, belirli bir kişinin hangi seçeneği seçmediği, belirli bir grubun aynı seçenekten ya da farklı seçeneklerden olması"
      - "Tek bir maddeyle doğrudan tam seçim tablosu veren açık eşleştirme cümleleri kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca adları ve seçenekleri alt alta yazıp mekanik eşleme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir aynı/farklı seçim bloğu kurup sonra bunu sayı bilgisi veya doğrudan seçim bilgisiyle birleştirmesini gerektirmelidir"
      - "Yapının bazı parçaları doğrudan verilebilir; ancak sorulan ilişkinin doğruluk değeri mutlaka düşünerek bulunmalıdır"

      - "5. sınıf seviyesinde 4-6 kişi/varlık ve 3-4 seçenek tercih edilmelidir"
      - "Seçenekler somut ve anlaşılır olmalıdır: renk, desen, sembol, etiket, rozet, kart, kapak, araç, maske, ses profili vb."
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'aynı seçeneği seçti', 'farklı seçenek seçti', 'seçti', 'seçmedi', 'tam', 'en az', 'en çok' gibi kavramlar net ayrılmalıdır"
      - "Kişi–seçenek ve kişi–kişi seçim ilişkileri belirsizlik taşımamalıdır"
      - "Koşullar yalnızca gizli seçim yapısını kurmaya ve sorulan ilişkiyi test etmeye hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: iki kişinin aynı/farklı seçeneği seçmesi"
        - "1 madde: belirli bir kişinin belirli seçeneği seçtiği ya da seçmediği bilgisi"
        - "1 madde: belirli bir seçeneği seçen kişi sayısı veya sayı sınırı"
        - "Gerekirse 1 madde: küçük bir grup için ortak seçim ya da ayrışma koşulu"
      yasaklar:
        - "Her kişi için seçeneği tek tek söyleyen koşullar yazma"
        - "Her seçeneğin tüm üyelerini açıkça dağıtan koşullar yazma"
        - "Bir kişiyi hem kendi seçimi hem de tüm ilişkileriyle tamamen çözen açık koşullar yazma"
        - "Koşulları tabloyu soldan sağa dolduracak çözüm şeması gibi dizme"
        - "Tek bir maddeyle doğru seçeneğin kesinleşmesine yol açma"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli seçim yapısını kurmaya ve ardından belirli bir
      kişi–seçenek ya da kişi–kişi aynı/farklı seçenek ilişkisinin kesin doğru,
      kesin yanlış, söylenebilir ya da söylenemez olduğunu seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli seçim yapısı yeterince kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak kişi–seçenek veya kişi–kişi seçim ilişkisi üzerinden çıkarım sordurmalıdır"
      - "Tercihen 'kesinlikle doğrudur', 'kesinlikle yanlıştır', 'kesin olarak söylenebilir', 'kesin olarak söylenemez' türünde kökler kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir bilgi okumaya değil, kurulmuş gizli seçim yapısını yorumlamaya yöneltmelidir"
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 18
    style: "selection_proposition"
    correct_count: 1
    kurallar:
      - "Her seçenek bir seçim önermesi biçiminde yazılmalıdır"
      - "Seçenekler tam seçim tablosunu vermemelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır"
      - "Seçenekler kişi–seçenek eşleştirmesi veya kişi–kişi aynı/farklı seçenek ilişkisi biçiminde yazılmalıdır"
      - "Bir seçenek kişi–seçenek, bir diğeri tüm dağılım özeti, bir diğeri yalnızca sayı bilgisi gibi dağınık yapılmamalıdır"
      - "Kişi–kişi ilişkisi kullanılacaksa ilişki açıkça 'aynı seçeneği seçmiştir' veya 'farklı seçenekler seçmiştir' düzeyinde kurulmalıdır"
      - "Seçenekler, gizli seçim yapısı üzerinden test edilen tekil önermeler olmalıdır"
      - "Doğru seçenek, gizli yapıdan kesin doğru ya da kesin yanlış çıkan tek önerme olmalıdır"
      - "Hiçbir seçenek doğrudan bir koşul cümlesinin tekrar yazılmış hâli olmamalıdır"
      - "Hiçbir seçenek tek bir maddeye bakılarak doğrudan doğrulanabilir veya elenebilir olmamalıdır"
      - "Seçenekler biçimsel olarak dengeli olmalıdır"
      - "Doğru cevap uzunluk, vurgu veya özel ifade nedeniyle ayırt edilmemelidir"
      - "Seçeneklerde temsil düzeyi baştan sona korunmalıdır"
      - "Kişi–seçenek tipi baskınsa tüm seçenekler buna yakın paralellikte kurulmalıdır"
      - "Kişi–kişi aynı/farklı seçim ilişkisi kullanılacaksa bu yapı seçenekler arasında biçimsel dengesizlik yaratmamalıdır"

# ═══════════════════════════════════════════════════════════════
      # SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki seçim bilgilerinden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki seçim bilgilerinden hangisi <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>yanlıştır</u>?</b>"

# ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    seçim yapısı kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen
    seçim önermesidir. Öğrenciden tek bir ipucuna dayanarak değil, tüm maddeleri
    analiz ederek doğru kişi–seçenek eşleşmesini ya da kişi–kişi aynı/farklı
    seçenek ilişkisini seçmesi beklenir.

  temel_ilke: >
    Gizli seçim yapısı kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan kesin kişi–seçenek ya da kişi–kişi seçim
    ilişkisi olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara seçim grupları, aynı/farklı seçim blokları ve kişi–seçenek eşleşmeleri üzerinden gizli yapı kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce kişi–seçenek yapısını ve kişiler arası aynı/farklı seçim ilişkilerini kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; kurulmuş gizli seçim yapısının zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: gizli yapıdan KESİNLİKLE çıkan önerme olmalıdır"
    - "Negatif köklerde doğru cevap: gizli yapıyla çelişen ya da gizli yapıdan kesin olarak çıkarılamayan önerme olmalıdır"
    - "Çıkarım köklerinde yalnızca bir seçenek kesin doğru ya da kesin yanlış olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir çıkarım olmalıdır"
    - "Doğru cevap 3-18 kelime arasında olmalıdır"
    - "Duruma göre kısa ifade ya da tam cümle olabilir"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"
    - "Doğru cevap, seçenek setindeki temsil düzeyini bozmamalıdır"
    - "Doğru cevap, kişi–seçenek ilişkisi ya da kişi–kişi aynı/farklı seçim ilişkisi düzeyinde kalmalıdır"
    - "Doğru cevap, doğrudan verilen seçim bilgisinin kaba tekrarına dönüşmemelidir"
    - "Doğru cevap, sayı koşulunu tek başına yeniden söylemek yerine onun seçim yapısında doğurduğu sonucu yansıtmalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli seçim yapısı kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen kişi/seçenek ilişkisinin doğrudan tekrarına dönüşmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen aynı/farklı seçim bilgisinin kaba tekrarına dönüşmesi"
    - "Doğru cevabın, yalnızca sayı koşulunu tekrar ederek öne çıkması"
    - "Birden fazla seçeneğin gizli yapıdan eşit derecede doğru ya da yanlış çıkması"
    - "Doğru cevabın tüm seçim yapısını açık eden kapsamlı bir açıklama biçiminde yazılması"
    - "Temsil düzeyini bozup doğru cevabı biçimsel olarak öne çıkarma"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli seçim yapısı kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Diğer seçeneklerin de aynı ölçüde doğru ya da yanlış olma ihtimali kalıyor mu?"
    - "Doğru seçenek, seçim yapısını kurmadan yalnızca yüzeysel eleme ile bulunabiliyor mu?"
# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel kişi–seçenek ya da kişi–kişi seçim ilişkileri olmamalıdır.
    Her yanlış seçenek, öğrencinin gizli seçim yapısını kurarken yapabileceği
    bütünsel bir muhakeme hatasının sonucu olmalıdır. Öğrenci yanlış bir ara seçim
    yapısı kurarsa ya da kişi–seçenek ve aynı/farklı seçim ilişkilerini gereğinden
    erken kesinleştirirse, bu şıklardan birini işaretlemeye yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif seçim yapısının sonucu olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı seçim önermesi olmalıdır"
    - "Çeldirici, tüm yapı kurulmadan değil; yanlış yapı kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış seçim kurma yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru gizli yapı ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş seçim yapısında doğruymuş gibi görünen makul kişi–seçenek ya da kişi–kişi aynı/farklı seçim önermesi yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli seçim yapısını kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış seçim yapısı veya yanlış kesinleştirme kurgusu tasarla."
    - "3. Her yanlış kurgu, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış kurguların sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldirici, sorudaki temsil düzeyini korumalıdır."
    - "8. Seçenekler kişi–seçenek ağırlıklı kurulmuşsa çeldiriciler de aynı düzeyde kurulmalıdır."
    - "9. Seçenekler kişi–kişi aynı/farklı seçim ilişkisi ağırlıklı kurulmuşsa çeldiriciler de aynı ilişki düzeyinde kalmalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış seçim yapısı mantığına dayanmalıdır"
    - "Bazı çeldirici türleri tek başına yeterince güçlü olmayabilir; bu türler başka bir yanlış seçim stratejisiyle birlikte kullanılmalıdır"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalı; daha güçlü bir yanlış seçim stratejisini destekleyici olarak kullanılmalıdır"
    - "Çeldiriciler, öğrencinin gizli yapıyı yanlış ya da eksik tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış seçim yapısı sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca rastgele başka bir kişiyle, başka bir seçenekle veya kaba bir aynı/farklı dönüşümüyle bozulmuş hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek aynı temsil düzeyinde olmalıdır"
    - "Kişi–seçenek tipiyle kurulmuş bir soruda kişi–kişi ilişkili çeldirici baskın hâle getirilmemelidir"
    - "Kişi–kişi aynı/farklı seçim tipiyle kurulmuş bir soruda kişi–seçenek çeldiricisi temsil düzeyini bozacak şekilde kullanılmamalıdır"

  stratejiler:
    - ad: "KISIYI_YANLIS_SECENEGE_TASIMA"
      bilisssel_hata_kategorisi: "eslestirme_hatasi"
      aciklama: "Öğrenci bir kişinin elediği ya da ait olduğu seçeneği yanlış taşıyarak hatalı eşleşme kurar"
      nasil_olusturulur: |
        Bir kişi için bazı seçenekleri doğru biçimde dışla; ancak son adımda kişiyi
        yanlış seçeneğe yerleştiren alternatif bir seçim yapısı kur. Çeldirici,
        bu yanlış yapıdan doğan kişi–seçenek önermesi olmalıdır.

    - ad: "AYNI_SECIM_GRUBUNU_YANLIS_KURMA"
      bilisssel_hata_kategorisi: "grup_hatasi"
      aciklama: "Öğrenci aynı seçeneği seçen kişileri doğru görür gibi olur; fakat grubu yanlış kişiyle tamamlar"
      nasil_olusturulur: |
        Aynı seçeneği seçen iki ya da daha fazla kişiyi kısmen koru; ancak gruba
        yanlış bir kişiyi ekleyen veya doğru kişiyi dışarıda bırakan alternatif bir
        yapı kur. Çeldirici, bu yanlış grup kurgusundan doğan kişi–seçenek ya da
        kişi–kişi aynı seçim ilişkisi önermesi olmalıdır.

    - ad: "AYNI_FARKLI_SECIM_ILISKISINI_YANLIS_YORUMLAMA"
      bilisssel_hata_kategorisi: "iliski_hatasi"
      aciklama: "Öğrenci iki kişinin aynı seçimi mi farklı seçimleri mi yaptığını yanlış kurar"
      nasil_olusturulur: |
        Özellikle 'aynı seçeneği seçmiştir' ve 'farklı seçenek seçmiştir' türündeki
        koşullarda, ilişki yönünü yanlış taşıyan alternatif bir yapı kur.
        Çeldirici, ilk bakışta mantıklı görünen ama tüm koşullar kontrol edilince
        bozulan kişi–kişi seçim ilişkisine dayanmalıdır.

    - ad: "SECENEK_SAYISI_BILGISINI_YANLIS_YORUMLAMA"
      bilisssel_hata_kategorisi: "nicel_hata"
      aciklama: "Öğrenci belirli bir seçeneği seçen kişi sayısı bilgisini yanlış taşıyarak hatalı çıkarım yapar"
      nasil_olusturulur: |
        Belirli bir seçeneği seçen kişi sayısı, en az/en çok kişi bilgisi ya da
        tam kişi sayısı bilgisini yanlış uygulayan alternatif bir dağılım kur.
        Çeldirici, sayı koşulu ilk bakışta sağlanıyormuş gibi görünse de tüm
        koşullar birlikte kontrol edildiğinde bozulan kişi–seçenek ya da
        kişi–kişi aynı/farklı seçim önermesi olmalıdır.

    - ad: "GRUBUN_ORTAK_SECIM_ALANINI_DARALTMA"
      bilisssel_hata_kategorisi: "erken_sabitleme"
      aciklama: "Öğrenci belirli kişilerden oluşan grubun paylaşabileceği seçenek kümesini gereğinden fazla daraltır"
      nasil_olusturulur: |
        Belirli bir kişi grubunun belli seçeneklerden birini paylaşması veya
        aynı seçenek ailesinden seçim yapması koşulunu al; ancak öğrencinin bu
        kümeyi tek seçeneğe indirgediği alternatif bir seçim yapısı kur.
        Çeldirici, bu erken sabitlemeden çıkan önermeye dayanmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince
        bozulması gereken yanlış bir seçim yapısı kur. Çeldirici, öğrencinin ara
        çıkarımı yapıp sonraki mantıksal taşıma adımını atlaması sonucu yanlış
        kişi–seçenek ya da kişi–kişi aynı/farklı seçim önermesini doğru ya da mümkün
        sanmasına dayanmalıdır.
      kullanim_notu: >
        Bu strateji tek başına kullanıldığında çeldirici zayıf kalabilir. Bu nedenle
        tek başına ana çeldirici olarak kullanılmamalı; "KISIYI_YANLIS_SECENEGE_TASIMA",
        "AYNI_SECIM_GRUBUNU_YANLIS_KURMA",
        "AYNI_FARKLI_SECIM_ILISKISINI_YANLIS_YORUMLAMA",
        "SECENEK_SAYISI_BILGISINI_YANLIS_YORUMLAMA",
        "GRUBUN_ORTAK_SECIM_ALANINI_DARALTMA" veya
        "KALAN_SECIMLERI_YANLIS_TAMAMLAMA" gibi daha güçlü bir yanlış seçim
        stratejisini destekleyici biçimde kullanılmalıdır.
      tek_basina_kullanilabilir: false
      birlikte_kullan:
        - "KISIYI_YANLIS_SECENEGE_TASIMA"
        - "AYNI_SECIM_GRUBUNU_YANLIS_KURMA"
        - "AYNI_FARKLI_SECIM_ILISKISINI_YANLIS_YORUMLAMA"
        - "SECENEK_SAYISI_BILGISINI_YANLIS_YORUMLAMA"
        - "GRUBUN_ORTAK_SECIM_ALANINI_DARALTMA"
        - "KALAN_SECIMLERI_YANLIS_TAMAMLAMA"

    - ad: "KALAN_SECIMLERI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci yapının büyük kısmını doğru kurar; fakat kalan kişi ve seçenekleri elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Gizli seçim yapısının çoğunu doğru tut; ancak son 1-2 kişi ya da seçim
        yerleşimini, tüm koşulları tekrar kontrol etmeden yanlış tamamlanmış gibi
        kurgula. Çeldirici, bu yanlış tamamlama sonucunda doğruymuş gibi görünen
        kişi–seçenek ya da kişi–kişi aynı/farklı seçim önermesine dayanmalıdır.

    - ad: "NEGATIF_KOKTE_MUMKUN_ONERMEYI_YANLIS_SECME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci kökün yönünü karıştırdığı için doğru olan yerine yanlış olanı ya da tersini seçer"
      nasil_olusturulur: |
        Eğer soru kökü 'yanlıştır' veya 'söylenemez' türündeyse, gizli seçim yapısıyla
        büyük ölçüde uyumlu ve güçlü görünen ama aslında işaretlenmemesi gereken bir
        kişi–seçenek ya da kişi–kişi aynı/farklı seçim önermesi üret.
        Bu çeldirici, kök yönü ve kesinlik derecesi karışıklığına dayanmalıdır.

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak seçim önermesi üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele yanlış eşleştirme ya da ilişki önermesi yazmak"
    - "Çeldiriciyi yanlış seçim yapısı düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış çözüm mantığını temsil eden birden fazla çeldirici kullanmak"
    - "Bir yanlış seçenekte temsil düzeyini bozmak; örneğin biri kişi–seçenek, biri sayı özeti, biri tüm grup özeti gibi dengesiz yapı kurmak"

  kalite_kontrol:
    - "Bu çeldirici, öğrencinin kurabileceği yanlış bir seçim yapısının sonucu mu?"
    - "Bu seçenek bir tek maddeyle hemen eleniyor mu?"
    - "Bu seçenek ancak tüm koşullar kontrol edilince mi yanlışlaşıyor?"
    - "Bu çeldirici, doğru yapıya yakın ama hatalı bir alternatif kurguya dayanıyor mu?"
    - "Her çeldirici farklı bir yanlış çözüm yolunu temsil ediyor mu?"
    - "Tüm çeldiriciler aynı temsil düzeyinde mi?"
    - "Seçenekler arasında paralellik korunuyor mu?"

  önerilen_dagilim:
    - "1 ana çeldirici: KISIYI_YANLIS_SECENEGE_TASIMA veya AYNI_SECIM_GRUBUNU_YANLIS_KURMA"
    - "1 ana çeldirici: AYNI_FARKLI_SECIM_ILISKISINI_YANLIS_YORUMLAMA veya SECENEK_SAYISI_BILGISINI_YANLIS_YORUMLAMA"
    - "1 ana çeldirici: KALAN_SECIMLERI_YANLIS_TAMAMLAMA veya NEGATIF_KOKTE_MUMKUN_ONERMEYI_YANLIS_SECME"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına kullanılmamalı; yalnızca yukarıdaki ana çeldiricilerden biriyle birlikte destekleyici mantık olarak kullanılmalıdır"

use_shared_strategies: false
# ═══════════════════════════════════════════════════════════════
# BECERI ETIKETI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB3"
  bilesenler: ["mantiksal_cikarim", "siniflandirma", "secim_iliskisi_cozme", "degerlendirme", "sorgulama"]
  surec_bileseni: "karar_verme"

# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi gizli seçim yapısını tamamen ya da büyük ölçüde
    kurmaya zorlamalıdır. Doğru cevap; tek bir koşuldan, iki koşulun hızlı
    birleşiminden veya yüzeysel elemeden bulunamamalı; ancak kişiler/varlıklar ile
    seçtikleri seçenekler ve aynı/farklı seçim ilişkileri birlikte değerlendirildikten
    sonra sorulan önermenin kesin doğru, kesin yanlış, söylenebilir ya da
    söylenemez olduğu anlaşılmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca seçim ilişkisi sorusuna uygun bir bağlam seç.
        Örnek alanlar:
        - renk seçimi
        - ürün tercihi
        - özellik tercihi
        - takım seçimi
        - araç seçimi
        - tema seçimi

    - step: 2
      action: "Kişileri, seçenekleri ve gizli doğru seçim yapısını kur"
      details: |
        - Önce 4-6 kişi/varlık belirle
        - Sonra 3-4 seçenek/kategori belirle
        - Her kişiyi yalnızca bir seçeneğe yerleştir
        - Aynı seçeneği seçen kişi gruplarını ve farklı seçim ilişkilerini netleştir
        - Seçenek başına düşen kişi sayılarını belirle
        - Bu yapı, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm seçim yapısı kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü ve seçenek temsil düzeyini belirle"
      details: |
        Soru kökü, gizli seçim yapısı kurulduktan sonra cevaplanabilir olmalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle doğrudur
        - kesinlikle yanlıştır
        - kesinlikle söylenebilir
        - kesinlikle söylenemez

        Ayrıca seçenek temsil düzeyi baştan belirlenmelidir:
        - kişi–seçenek önermesi
        veya
        - kişi–kişi aynı/farklı seçenek ilişkisi

        Aynı soruda bu iki temsil düzeyi karıştırılmamalıdır.

    - step: 4
      action: "Koşulları gizli yapıdan türet"
      details: |
        - 3-5 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru seçenek doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde seçim yapısını yeterince kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar, hedeflenen soru köküne göre yalnızca bir doğru cevap üretmelidir
        - Koşullar ağırlıklı olarak kişi–seçenek, aynı/farklı seçim ve seçenek sayısı ilişkisi içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede seçim yapısının çerçevesini tanıt
        - Kaç kişi/varlık olduğu anlaşılır olsun
        - Hangi seçeneklerin bulunduğu net olsun
        - Her kişinin yalnızca bir seçenek seçtiği açıkça belirtilsin
        - Bağlam sade, öğrenciye yakın ve seçim-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, sorulan ilişki için kesin doğru ya da kesin yanlış olan tek önerme olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli seçim yapısını kurmadan bu önermeye ulaşamamalıdır
        - Doğru seçenek, başta seçilmiş temsil düzeyine uygun biçimde yazılmalıdır
        - Kişi–seçenek tipi seçildiyse doğru seçenek kişi–seçenek önermesi olmalıdır
        - Kişi–kişi tipi seçildiyse doğru seçenek iki kişi arasındaki aynı/farklı seçim ilişkisi biçiminde olmalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli yapıyı eksik veya yanlış kuran öğrencinin düşebileceği yanlış önermeler olmalıdır
        - Çeldiriciler, kişiyi yanlış seçeneğe taşıma, aynı seçim grubunu yanlış kurma,
        aynı/farklı ilişkiyi yanlış yorumlama, sayı bilgisini yanlış taşıma,
        kalan seçimleri yanlış tamamlama gibi hatalara dayanmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır
        - Tüm çeldiriciler seçilen temsil düzeyiyle aynı yapıda kalmalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler aynı temsil düzeyinde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun
        - Seçenek temsil düzeyi baştan sona korunmalıdır

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci gizli seçim yapısını kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Yanlış şıklardan biri tek bir maddeyle eleniyor mu?
        - Sorulan ilişki için yalnızca bir seçenek mi kesin doğru/yanlış?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        - Tüm seçenekler aynı temsil düzeyinde mi kurulmuş?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

