# bolum6/sozel_mantik_cok_ozellikli_eslestirme_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 seçenek
# Bu sürüm yalnızca "çok özellikli eşleştirme sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_cok_ozellikli_eslestirme_sorusu"
  ad: "Sözel Mantık ve Muhakeme - Çok Özellikli Eşleştirme Sorusu"
  sinif_seviyesi: 5
  aciklama: "Kişi veya varlıkları birden fazla özellik kümesi üzerinde eşleştirerek gizli özellik profilini bulma ve buna göre kesin çıkarım yapma"
  frequency: "High (~24 questions)"

cok_ozellikli_eslestirme_senaryolari:
  - ad: "bilim_fuari_takim_puan_eslestirmesi"
    aciklama: "Öğrencilerin proje takımları ve aldıkları puanlarla birlikte eşleştirilmesi"
    ornek_setup: "Bir bilim fuarında öğrencilerin her biri farklı proje takımlarında yer almakta ve farklı puanlar almaktadır."

  - ad: "spor_gunu_grup_madalya_eslestirmesi"
    aciklama: "Katılımcıların spor grupları ve madalya dereceleriyle eşleştirilmesi"
    ornek_setup: "Bir spor gününde öğrencilerin her biri farklı gruplarda yarışmış ve farklı dereceler elde etmiştir."

  - ad: "planetaryum_ekip_koltuk_numarasi_eslestirmesi"
    aciklama: "Öğrencilerin ait oldukları ekip ve oturdukları numaralı koltukların birlikte eşleştirilmesi"
    ornek_setup: "Bir planetaryum etkinliğinde öğrencilerin her biri farklı ekiplerde yer almakta ve farklı numaralı koltuklarda oturmaktadır."

  - ad: "kutuphane_okuma_grubu_kitap_sayisi_eslestirmesi"
    aciklama: "Öğrencilerin okuma grupları ve okudukları kitap sayılarıyla eşleştirilmesi"
    ornek_setup: "Bir okuma etkinliğinde öğrencilerin her biri farklı gruplarda bulunmakta ve farklı sayıda kitap okumaktadır."

  - ad: "robotik_atolye_masa_puan_eslestirmesi"
    aciklama: "Katılımcıların çalıştıkları masa ve elde ettikleri puanlarla eşleştirilmesi"
    ornek_setup: "Bir robotik atölyede öğrencilerin her biri farklı masalarda çalışmakta ve farklı puanlar almaktadır."

  - ad: "muzik_okulu_sinif_rozet_numarasi_eslestirmesi"
    aciklama: "Öğrencilerin gittikleri sınıf ve taşıdıkları rozet numaralarıyla eşleştirilmesi"
    ornek_setup: "Bir müzik okulunda öğrencilerin her biri farklı sınıflara gitmekte ve farklı numaralı rozetler taşımaktadır."

  - ad: "kamp_ekibi_cadir_numarasi_eslestirmesi"
    aciklama: "Kampçıların ait oldukları ekip ve kaldıkları çadır numaralarıyla eşleştirilmesi"
    ornek_setup: "Bir yaz kampında öğrencilerin her biri farklı ekiplerde yer almakta ve farklı numaralı çadırlarda kalmaktadır."

  - ad: "uzay_kampi_gorev_grubu_seviye_puani_eslestirmesi"
    aciklama: "Katılımcıların görev grupları ve başarı seviyeleriyle eşleştirilmesi"
    ornek_setup: "Bir uzay kampında öğrencilerin her biri farklı görev gruplarında bulunmakta ve farklı başarı puanları almaktadır."

  - ad: "sanat_atolyesi_tema_malzeme_sayisi_eslestirmesi"
    aciklama: "Katılımcıların seçtikleri tema ve kullandıkları malzeme sayısıyla eşleştirilmesi"
    ornek_setup: "Bir sanat atölyesinde öğrencilerin her biri farklı temalarda çalışmakta ve farklı sayıda malzeme kullanmaktadır."

  - ad: "yetenek_gosterisi_sira_grup_numarasi_eslestirmesi"
    aciklama: "Öğrencilerin gösteri grupları ve sahne sıra numaralarıyla eşleştirilmesi"
    ornek_setup: "Bir yetenek gösterisinde öğrencilerin her biri farklı gruplarda yer almakta ve farklı sıra numaraları almaktadır."

  - ad: "sera_gozlem_alan_bitki_sayisi_eslestirmesi"
    aciklama: "Öğrencilerin gözlem yaptıkları alan ve inceledikleri bitki sayısıyla eşleştirilmesi"
    ornek_setup: "Bir sera çalışmasında öğrencilerin her biri farklı gözlem alanlarında çalışmakta ve farklı sayıda bitki incelemektedir."

  - ad: "hayvanat_bahcesi_gorev_bolgesi_bakim_sayisi_eslestirmesi"
    aciklama: "Görevlilerin çalıştıkları bölge ve baktıkları hayvan sayısıyla eşleştirilmesi"
    ornek_setup: "Bir hayvanat bahçesi etkinliğinde öğrencilerin her biri farklı bölgelerde görev almakta ve farklı sayıda hayvanla ilgilenmektedir."

  - ad: "drama_kulubu_rol_grubu_prova_saati_eslestirmesi"
    aciklama: "Katılımcıların rol grupları ve prova saatleriyle eşleştirilmesi"
    ornek_setup: "Bir drama kulübünde öğrencilerin her biri farklı rol gruplarında yer almakta ve farklı prova saatlerinde çalışmaktadır."

  - ad: "kodlama_atolyesi_proje_takimi_hata_sayisi_eslestirmesi"
    aciklama: "Öğrencilerin proje takımları ve programlarındaki hata sayılarıyla eşleştirilmesi"
    ornek_setup: "Bir kodlama atölyesinde öğrencilerin her biri farklı proje takımlarında yer almakta ve farklı sayıda hata düzeltmektedir."

  - ad: "okul_gazetesi_bolum_yazi_sayisi_eslestirmesi"
    aciklama: "Öğrencilerin görev aldıkları bölüm ve hazırladıkları yazı sayısıyla eşleştirilmesi"
    ornek_setup: "Bir okul gazetesinde öğrencilerin her biri farklı bölümlerde çalışmakta ve farklı sayıda yazı hazırlamaktadır."

  - ad: "matematik_oyunlari_masa_jeton_sayisi_eslestirmesi"
    aciklama: "Oyuncuların oturdukları masa ve topladıkları jeton sayısıyla eşleştirilmesi"
    ornek_setup: "Bir matematik oyunları etkinliğinde öğrencilerin her biri farklı masalarda yer almakta ve farklı sayıda jeton toplamaktadır."

  - ad: "muze_gezi_grubu_rehber_numarasi_eslestirmesi"
    aciklama: "Öğrencilerin gezi grupları ve rehber numaralarıyla eşleştirilmesi"
    ornek_setup: "Bir müze gezisinde öğrencilerin her biri farklı gezi gruplarında yer almakta ve farklı rehberlerle ilerlemektedir."

  - ad: "yaratici_yazma_ekibi_hikaye_sayfasi_eslestirmesi"
    aciklama: "Katılımcıların yazma ekipleri ve yazdıkları sayfa sayılarıyla eşleştirilmesi"
    ornek_setup: "Bir yaratıcı yazma etkinliğinde öğrencilerin her biri farklı ekiplerde yer almakta ve farklı sayıda sayfa yazmaktadır."

  - ad: "akil_oyunlari_grubu_puan_karti_eslestirmesi"
    aciklama: "Öğrencilerin ait oldukları grup ve puan kartlarıyla eşleştirilmesi"
    ornek_setup: "Bir akıl oyunları turnuvasında öğrencilerin her biri farklı gruplarda yarışmakta ve farklı puan kartlarına sahiptir."

  - ad: "festival_standi_gorev_kupon_numarasi_eslestirmesi"
    aciklama: "Katılımcıların görev aldıkları stant ve kupon numaralarıyla eşleştirilmesi"
    ornek_setup: "Bir çocuk festivalinde öğrencilerin her biri farklı stantlarda görev almakta ve farklı kupon numaraları taşımaktadır."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan çok özellikli eşleştirme sorusu"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 95
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişi veya varlıkları birden fazla özellik kümesi üzerinde
      birlikte değerlendirerek gizli özellik profilini kurması gerekir.
      Koşullar kişi–özellik ilişkilerini doğrudan tablo gibi vermemeli;
      öğrenci bazı özellik eşleşmelerini, grup bağlantılarını ve sayısal
      özellikleri mantıksal çıkarımla tamamlamalıdır.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kaç kişi/varlık olduğu, hangi özellik kümelerinin bulunduğu ve her kişinin her özellik kümesinden yalnızca bir değer aldığı açıkça tanıtılmalıdır"
      - "Kurgu kişi-merkezli olabilir; ancak yapı en az 2, tercihen 3 özellik ekseni içermelidir"
      - "Her kişi, her özellik kümesinden yalnızca bir değer almalıdır"
      - "Özellik kümeleri birbiriyle karışmayacak kadar açık olmalıdır; örneğin grup, sayı, sıra, puan, takım, masa, rozet numarası gibi alanlar net ayrılmalıdır"
      - "MADDELİ KOŞULLAR 3-5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu kişiler ve özelliklerle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru özellik yapısı kurulmalı; ardından yalnızca bu yapıya götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar kişi–özellik yapısını satır satır açıkça doldurmamalıdır"
      - "Maddeler, gizli özellik profilinin yalnızca bazı parçalarını, dışlamalarını, karşılaştırmalarını veya çapraz bağlarını vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı kişi–özellik eşleşmelerini kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan kişi–özellik ilişkisi ya da kişi–özellik–sayı bağlantısı açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli özellik yapısı büyük ölçüde kurulabilir olmalı; şıklar yapıyı kurdurmamalı, kurulmuş yapı üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak çok özellikli çapraz ilişki içermelidir"
      - "Öncelikli ilişki türleri: belirli bir özellik değerine sahip kişinin başka bir özellik bakımından tanımlanması, bir kişinin belirli bir gruptan gelmesi ya da gelmemesi, iki kişinin bir özellik bakımından karşılaştırılması, kişi–grup–sayı özellikleri arasında çapraz ilişki kurulması, aynı özelliği paylaşan ya da paylaşmayan kişilerin belirtilmesi"
      - "Tek bir maddeyle doğrudan tam eşleştirme veren açık tablo cümleleri kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca isimleri ve özellikleri alt alta yazıp mekanik eşleme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir ara eşleştirme ya da karşılaştırma bloğu kurup sonra bunu başka bir özellik kümesiyle birleştirmesini gerektirmelidir"
      - "Yapının bazı parçaları doğrudan verilebilir; ancak sorulan ilişkinin doğruluk değeri mutlaka düşünerek bulunmalıdır"

      - "5. sınıf seviyesinde 4-5 kişi/varlık ve 2-3 özellik kümesi tercih edilmelidir"
      - "Özellik kümeleri somut ve anlaşılır olmalıdır: grup, takım, masa, kat, puan, sıra numarası, rozet numarası, kitap sayısı, bakım sayısı, koltuk numarası vb."
      - "Sayısal özellik kullanılacaksa küçük ve zihinden takip edilebilir değerler tercih edilmelidir"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'aittir' ve 'ait değildir', 'daha fazla' ve 'daha az', 'aynı' ve 'farklı', 'yüksek' ve 'düşük' gibi kavramlar net ayrılmalıdır"
      - "Kişi–özellik ve özellik kümeleri arası ilişkiler belirsizlik taşımamalıdır"
      - "Koşullar yalnızca gizli özellik yapısını kurmaya ve sorulan ilişkiyi test etmeye hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: belirli bir özellik değerine sahip kişiyi başka bir özellik üzerinden tanımlama"
        - "1 madde: bir kişinin belirli bir grupta olduğu ya da olmadığı bilgisi"
        - "1 madde: iki kişiyi bir özellik bakımından karşılaştırma"
        - "Gerekirse 1 madde: kişi–grup–sayı arasında çapraz bağ kuran koşul"

      yasaklar:
        - "Her kişi için tüm özellikleri tek tek söyleyen koşullar yazma"
        - "Her özellik kümesini ayrı ayrı tamamen çözen koşullar yazma"
        - "Bir kişiyi aynı madde içinde iki veya üç özellik bakımından tamamen çözen açık koşullar yazma"
        - "Koşulları tabloyu soldan sağa dolduracak çözüm şeması gibi dizme"
        - "Tek bir maddeyle doğru seçeneğin kesinleşmesine yol açma"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli çok özellikli yapıyı kurmaya ve ardından belirli
      bir kişi–özellik ya da kişi–özellik–sayı ilişkisinin kesin doğru, kesin yanlış,
      söylenebilir ya da söylenemez olduğunu seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli özellik yapısı yeterince kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak kişi–özellik veya kişi–özellik–sayı çıkarımı sordurmalıdır"
      - "Tercihen 'kesinlikle doğrudur', 'kesinlikle yanlıştır', 'kesin olarak söylenebilir', 'kesin olarak söylenemez' türünde kökler kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir bilgi okumaya değil, kurulmuş gizli özellik profilini yorumlamaya yöneltmelidir"
      - "Soru kökü, öğrenciyi en az iki özellik kümesini birlikte düşünmeye zorlamalıdır"
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 18
    style: "multi_feature_proposition"
    correct_count: 1
    kurallar:
      - "Her seçenek bir özellik önermesi biçiminde yazılmalıdır"
      - "Seçenekler tam özellik tablosunu vermemelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır"
      - "Seçenekler kişi–grup, kişi–sayı, kişi–özellik veya kişi–özellik–sayı ilişkisi biçiminde yazılmalıdır"
      - "Bir seçenek kişi–grup, bir diğeri tüm tablo özeti, bir diğeri yalnızca tek sayı bilgisi gibi dağınık yapılmamalıdır"
      - "Seçenekler, gizli çok özellikli yapı üzerinden test edilen tekil önermeler olmalıdır"
      - "Doğru seçenek, gizli yapıdan kesin doğru ya da kesin yanlış çıkan tek önerme olmalıdır"
      - "Hiçbir seçenek doğrudan bir koşul cümlesinin tekrar yazılmış hâli olmamalıdır"
      - "Hiçbir seçenek tek bir maddeye bakılarak doğrudan doğrulanabilir veya elenebilir olmamalıdır"
      - "Seçenekler biçimsel olarak dengeli olmalıdır"
      - "Doğru cevap uzunluk, vurgu veya özel ifade nedeniyle ayırt edilmemelidir"
      - "Temsil düzeyi seçenekler arasında bozulmamalıdır"
      - "Seçenekler mümkün olduğunca paralel dil ve yapı ile kurulmalıdır"
      - "Kişi–özellik–sayı yapısı kullanılıyorsa, bu yapı seçenekler arasında biçimsel üstünlük oluşturmayacak şekilde dengelenmelidir"
      - "Seçenekler, öğrenciyi tek bir açık bilgiye değil, çok özellikli yapının tamamına dönmeye zorlamalıdır"

