  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki özellik bilgilerinden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki özellik bilgilerinden hangisi <u>yanlıştır</u>?</b>"

# ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    çok özellikli eşleştirme yapısı kurulduktan sonra mantıksal olarak kesin
    biçimde belirlenebilen özellik önermesidir. Öğrenciden tek bir ipucuna
    dayanarak değil, tüm maddeleri analiz ederek doğru kişi–özellik,
    kişi–grup ya da kişi–özellik–sayı ilişkisini seçmesi beklenir.

  temel_ilke: >
    Gizli özellik yapısı kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan kesin kişi–özellik, kişi–grup veya
    kişi–özellik–sayı önermesi olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara eşleştirmeler, grup ilişkileri, karşılaştırmalar ve sayısal özellikler üzerinden gizli yapı kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce kişi–özellik yapısını ve özellik kümeleri arasındaki çapraz ilişkileri kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; kurulmuş gizli yapının zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: gizli yapıdan KESİNLİKLE çıkan önerme olmalıdır"
    - "Negatif köklerde doğru cevap: gizli yapıyla çelişen ya da gizli yapıdan kesin olarak çıkarılamayan önerme olmalıdır"
    - "Çıkarım köklerinde yalnızca bir seçenek kesin doğru ya da kesin yanlış olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir çıkarım olmalıdır"
    - "Doğru cevap 3-18 kelime arasında olmalıdır"
    - "Duruma göre kısa ifade ya da tam cümle olabilir"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"
    - "Doğru cevap, seçenek setindeki temsil düzeyini bozmamalıdır"
    - "Doğru cevap, en az iki özellik kümesinin birlikte değerlendirilmesini gerektirmelidir"
    - "Doğru cevap, tek bir grup bilgisinin veya tek bir sayısal bilginin kaba tekrarına dönüşmemelidir"
    - "Doğru cevap, kişi–özellik–sayı yapısı kullanıyorsa bunu yüzeysel değil çapraz çıkarım sonucu yansıtmalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli çok özellikli yapı kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen kişi/özellik ilişkisinin doğrudan tekrarına dönüşmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen grup bilgisinin kaba tekrarına dönüşmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen sayısal bilginin kaba tekrarına dönüşmesi"
    - "Birden fazla seçeneğin gizli yapıdan eşit derecede doğru ya da yanlış çıkması"
    - "Doğru cevabın tüm yapıyı açık eden kapsamlı bir açıklama biçiminde yazılması"
    - "Temsil düzeyini bozup doğru cevabı biçimsel olarak öne çıkarma"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli çok özellikli yapı kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Diğer seçeneklerin de aynı ölçüde doğru ya da yanlış olma ihtimali kalıyor mu?"
    - "Doğru seçenek, çok özellikli yapıyı kurmadan yalnızca yüzeysel eleme ile bulunabiliyor mu?"
    - "Doğru seçenek en az iki özellik kümesini birlikte düşündürmek zorunda bırakıyor mu?"
# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel kişi–özellik önermeleri olmamalıdır. Her yanlış seçenek, öğrencinin
    gizli çok özellikli eşleştirme yapısını kurarken yapabileceği bütünsel bir
    muhakeme hatasının sonucu olmalıdır. Öğrenci yanlış bir ara yapı kurarsa ya da
    kişi–grup, kişi–sayı ve diğer özellik kümeleri arasındaki çapraz bağları
    gereğinden erken kesinleştirirse, bu şıklardan birini işaretlemeye yatkın
    olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif çok özellikli yapının sonucu olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı özellik önermesi olmalıdır"
    - "Çeldirici, tüm yapı kurulmadan değil; yanlış yapı kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış çapraz eşleştirme yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru gizli yapı ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş çok özellikli yapıda doğruymuş gibi görünen makul kişi–özellik, kişi–grup ya da kişi–özellik–sayı önermesi yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli çok özellikli eşleştirme yapısını kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış yapı veya yanlış kesinleştirme kurgusu tasarla."
    - "3. Her yanlış kurgu, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış kurguların sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldirici, sorudaki temsil düzeyini korumalıdır."
    - "8. Seçenekler kişi–grup ağırlıklı kurulmuşsa çeldiriciler de bu çizgide kalmalıdır."
    - "9. Seçenekler kişi–özellik–sayı yapısı içeriyorsa çeldiriciler de aynı karmaşıklık düzeyinde olmalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış çok özellikli eşleştirme mantığına dayanmalıdır"
    - "Bazı çeldirici türleri tek başına yeterince güçlü olmayabilir; bu türler başka bir yanlış eşleştirme stratejisiyle birlikte kullanılmalıdır"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalı; daha güçlü bir yanlış çapraz eşleştirme stratejisini destekleyici olarak kullanılmalıdır"
    - "Çeldiriciler, öğrencinin gizli yapıyı yanlış ya da eksik tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış çok özellikli yapı sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca rastgele başka bir kişiyle, başka bir grupla veya başka bir sayıyla değiştirilmiş yüzeysel hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek aynı temsil düzeyinde olmalıdır"
    - "Seçenekler arasında kişi–grup, kişi–sayı ve kişi–özellik–sayı yapıları kullanılıyorsa bunlar dengesiz dağılmamalı; çeldiriciler de aynı düzeyi korumalıdır"
    - "Öğrenci bir çeldiriciyi tek bir açık bilgiye bakarak eleyememelidir; bunun için birden fazla özelliği birlikte kontrol etmek zorunda kalmalıdır"

  stratejiler:
    - ad: "OZELLIKLER_ARASI_CAPRAZ_BAGI_YANLIS_KURMA"
      bilisssel_hata_kategorisi: "capraz_hata"
      aciklama: "Öğrenci bir kişiye ait iki farklı özellik hattını kısmen doğru kurar; fakat bunları yanlış biçimde birleştirir"
      nasil_olusturulur: |
        Bir kişinin bir özellik kümesindeki değerini ve başka bir özellik kümesiyle
        ilgili ipucunu ayrı ayrı makul bırak; ancak bu iki hattı yanlış bağlayan
        alternatif bir yapı kur. Çeldirici, çapraz bağın yanlış kurulması sonucu
        doğruymuş gibi görünen kişi–özellik veya kişi–özellik–sayı önermesi olmalıdır.

    - ad: "GRUP_BILGISINI_YANLIS_KISIYE_TASIMA"
      bilisssel_hata_kategorisi: "grup_hatasi"
      aciklama: "Öğrenci belirli bir gruba ait olma ya da olmama bilgisini yanlış kişiye taşır"
      nasil_olusturulur: |
        Bir kişinin ait olduğu ya da olmadığı grup bilgisini koruyor gibi görünen,
        fakat bu bilgiyi başka bir kişiye kaydıran alternatif bir yapı kur.
        Çeldirici, grup bilgisi doğruymuş gibi görünse de kişi bağlantısı yanlış olan
        önermeye dayanmalıdır.

    - ad: "KARSILASTIRMA_ILISKISINI_YANLIS_YORUMLAMA"
      bilisssel_hata_kategorisi: "iliski_hatasi"
      aciklama: "Öğrenci iki kişinin bir özellik bakımından karşılaştırılmasını yanlış taşır"
      nasil_olusturulur: |
        İki kişinin bir özellik bakımından daha büyük-küçük, daha fazla-az, önce-sonra
        ya da farklı-aynı oluşunu içeren bir ilişkiyi yanlış yorumlayan alternatif
        yapı kur. Çeldirici, bu yanlış karşılaştırma sonucunda doğruymuş gibi görünen
        kişi–grup ya da kişi–sayı önermesi olmalıdır.

    - ad: "SAYISAL_OZELLIGI_YANLIS_ESLESTIRME"
      bilisssel_hata_kategorisi: "nicel_hata"
      aciklama: "Öğrenci kişiye ait sayısal değeri ya da sayısal sıralamayı yanlış kişiye bağlar"
      nasil_olusturulur: |
        Sayısal özellikler içeren yapılarda, doğru sayı kümesini koru; ancak bu
        değerleri kişilere veya gruplara yanlış dağıtan alternatif bir yapı kur.
        Çeldirici, sayı doğru aralıkta görünse de kişi–sayı ya da kişi–grup–sayı
        bağı yanlış olan önermeye dayanmalıdır.

    - ad: "OZELLIK_DEGERINDEN_GRUP_SONUCUNU_ERKEN_CIKARMA"
      bilisssel_hata_kategorisi: "erken_sabitleme"
      aciklama: "Öğrenci bir özellik değerinden hareketle kişinin grup ya da ikinci özellik bilgisini gereğinden erken kesinleştirir"
      nasil_olusturulur: |
        Belirli bir özellik değeri doğru olsa bile bunun diğer özellik kümesine
        zorunlu olarak taşınmadığı bir alternatif yapı kur. Çeldirici, öğrencinin
        'bu özelliğe sahipse şu gruptadır' türü erken sabitleme hatasından doğan
        kişi–grup veya kişi–özellik–sayı önermesi olmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince
        bozulması gereken yanlış bir çok özellikli yapı kur. Çeldirici, öğrencinin
        ara çıkarımı yapıp sonraki mantıksal taşıma adımını atlaması sonucu yanlış
        kişi–özellik, kişi–grup veya kişi–özellik–sayı önermesini doğru ya da mümkün
        sanmasına dayanmalıdır.
      kullanim_notu: >
        Bu strateji tek başına kullanıldığında çeldirici zayıf kalabilir. Bu nedenle
        tek başına ana çeldirici olarak kullanılmamalı;
        "OZELLIKLER_ARASI_CAPRAZ_BAGI_YANLIS_KURMA",
        "GRUP_BILGISINI_YANLIS_KISIYE_TASIMA",
        "KARSILASTIRMA_ILISKISINI_YANLIS_YORUMLAMA",
        "SAYISAL_OZELLIGI_YANLIS_ESLESTIRME",
        "OZELLIK_DEGERINDEN_GRUP_SONUCUNU_ERKEN_CIKARMA" veya
        "KALAN_ESLESMELERI_YANLIS_TAMAMLAMA" gibi daha güçlü bir yanlış eşleştirme
        stratejisini destekleyici biçimde kullanılmalıdır.
      tek_basina_kullanilabilir: false
      birlikte_kullan:
        - "OZELLIKLER_ARASI_CAPRAZ_BAGI_YANLIS_KURMA"
        - "GRUP_BILGISINI_YANLIS_KISIYE_TASIMA"
        - "KARSILASTIRMA_ILISKISINI_YANLIS_YORUMLAMA"
        - "SAYISAL_OZELLIGI_YANLIS_ESLESTIRME"
        - "OZELLIK_DEGERINDEN_GRUP_SONUCUNU_ERKEN_CIKARMA"
        - "KALAN_ESLESMELERI_YANLIS_TAMAMLAMA"

    - ad: "KALAN_ESLESMELERI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci yapının büyük kısmını doğru kurar; fakat kalan özellik eşleşmelerini elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Gizli yapının çoğunu doğru tut; ancak son 1-2 kişi ya da özellik değerini,
        tüm koşulları tekrar kontrol etmeden yanlış tamamlanmış gibi kurgula.
        Çeldirici, bu yanlış tamamlama sonucunda doğruymuş gibi görünen kişi–özellik
        ya da kişi–özellik–sayı önermesine dayanmalıdır.

    - ad: "NEGATIF_KOKTE_MUMKUN_ONERMEYI_YANLIS_SECME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci kökün yönünü karıştırdığı için doğru olan yerine yanlış olanı ya da tersini seçer"
      nasil_olusturulur: |
        Eğer soru kökü 'yanlıştır' veya 'söylenemez' türündeyse, gizli yapıyla büyük
        ölçüde uyumlu ve güçlü görünen ama aslında işaretlenmemesi gereken bir
        kişi–özellik ya da kişi–özellik–sayı önermesi üret. Bu çeldirici, kök yönü
        ve kesinlik derecesi karışıklığına dayanmalıdır.

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak özellik önermesi üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele yanlış eşleştirme ya da özellik önermesi yazmak"
    - "Çeldiriciyi yanlış çok özellikli yapı düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış çözüm mantığını temsil eden birden fazla çeldirici kullanmak"
    - "Bir yanlış seçenekte temsil düzeyini bozmak; örneğin biri kişi–grup, biri tüm tablo özeti, biri yalnızca çıplak sayı bilgisi gibi dengesiz yapı kurmak"

  kalite_kontrol:
    - "Bu çeldirici, öğrencinin kurabileceği yanlış bir çok özellikli yapının sonucu mu?"
    - "Bu seçenek bir tek maddeyle hemen eleniyor mu?"
    - "Bu seçenek ancak tüm koşullar kontrol edilince mi yanlışlaşıyor?"
    - "Bu çeldirici, doğru yapıya yakın ama hatalı bir alternatif kurguya dayanıyor mu?"
    - "Her çeldirici farklı bir yanlış çözüm yolunu temsil ediyor mu?"
    - "Tüm çeldiriciler aynı temsil düzeyinde mi?"
    - "Seçenekler arasında paralellik korunuyor mu?"
    - "Öğrenci çeldiriciyi elemek için en az iki özelliği birlikte kontrol etmek zorunda kalıyor mu?"

  onerilen_dagilim:
    - "1 ana çeldirici: OZELLIKLER_ARASI_CAPRAZ_BAGI_YANLIS_KURMA veya GRUP_BILGISINI_YANLIS_KISIYE_TASIMA"
    - "1 ana çeldirici: KARSILASTIRMA_ILISKISINI_YANLIS_YORUMLAMA veya SAYISAL_OZELLIGI_YANLIS_ESLESTIRME"
    - "1 ana çeldirici: KALAN_ESLESMELERI_YANLIS_TAMAMLAMA veya NEGATIF_KOKTE_MUMKUN_ONERMEYI_YANLIS_SECME"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına kullanılmamalı; yalnızca yukarıdaki ana çeldiricilerden biriyle birlikte destekleyici mantık olarak kullanılmalıdır"

use_shared_strategies: false
