# BECERI ETIKETI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB3"
  bilesenler: ["mantiksal_cikarim", "cok_ozellikli_eslestirme", "capraz_iliski_kurma", "degerlendirme", "sorgulama"]
  surec_bileseni: "karar_verme"

# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi gizli çok özellikli eşleştirme yapısını tamamen
    ya da büyük ölçüde kurmaya zorlamalıdır. Doğru cevap; tek bir koşuldan, iki
    koşulun hızlı birleşiminden veya yüzeysel elemeden bulunamamalı; ancak
    kişiler/varlıklar ile onların ait oldukları grup, sayısal değer ve diğer
    özellik kümeleri birlikte değerlendirildikten sonra sorulan önermenin
    kesin doğru, kesin yanlış, söylenebilir ya da söylenemez olduğu anlaşılmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca çok özellikli eşleştirme sorusuna uygun bir bağlam seç.
        Örnek alanlar:
        - proje takımı + puan + şehir
        - kamp grubu + görev + numara
        - araştırma ekibi + renk + puan
        - festival grubu + tema + sıra
        - robot takımı + bölüm + skor
        - bilim yarışması + salon + derece

    - step: 2
      action: "Kişileri, özellik kümelerini ve gizli doğru yapıyı kur"
      details: |
        - Önce 4-6 kişi/varlık belirle
        - Sonra 2-3 özellik kümesi belirle
        - Her kişi için her özellik kümesinden yalnızca bir değer olacak şekilde yerleştir
        - Grup bilgisi, sayı bilgisi ve diğer özellik kümeleri arasındaki bağları netleştir
        - Bu yapı, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm eşleştirmeler kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü ve seçenek temsil düzeyini belirle"
      details: |
        Soru kökü, gizli yapı kurulduktan sonra cevaplanabilir olmalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle doğrudur
        - kesinlikle yanlıştır
        - kesinlikle söylenebilir
        - kesinlikle söylenemez

        Ayrıca seçenek temsil düzeyi baştan belirlenmelidir:
        - kişi–grup eşleştirmesi
        veya
        - kişi–grup/sayı eşleştirmesi

        Aynı soruda temsil düzeyi dağılmamalı; seçenekler paralel yapı korumalıdır.

    - step: 4
      action: "Koşulları gizli yapıdan türet"
      details: |
        - 3-5 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru seçenek doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde çok özellikli yapıyı yeterince kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar, hedeflenen soru köküne göre yalnızca bir doğru cevap üretmelidir
        - Koşullar ağırlıklı olarak kişi–grup, kişi–sayı, kişi–özellik ve bunlar arasındaki çapraz ilişkileri içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede yapının çerçevesini tanıt
        - Kaç kişi/varlık olduğu anlaşılır olsun
        - Hangi özellik kümelerinin bulunduğu net olsun
        - Her kişinin her özellik kümesinden yalnızca bir değer aldığı açıkça belirtilsin
        - Bağlam sade, öğrenciye yakın ve çok özellikli yapı-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, sorulan ilişki için kesin doğru ya da kesin yanlış olan tek önerme olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli yapıyı kurmadan bu önermeye ulaşamamalıdır
        - Doğru seçenek, başta seçilmiş temsil düzeyine uygun biçimde yazılmalıdır
        - Kişi–grup tipi seçildiyse doğru seçenek kişi–grup önermesi olmalıdır
        - Kişi–grup/sayı tipi seçildiyse doğru seçenek kişi–grup/sayı önermesi olmalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli yapıyı eksik veya yanlış kuran öğrencinin düşebileceği yanlış önermeler olmalıdır
        - Çeldiriciler, çapraz bağı yanlış kurma, grup bilgisini yanlış kişiye taşıma,
        karşılaştırma ilişkisini yanlış yorumlama, sayısal özelliği yanlış eşleştirme,
        kalan eşleşmeleri yanlış tamamlama gibi hatalara dayanmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır
        - Tüm çeldiriciler seçilen temsil düzeyiyle aynı yapıda kalmalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler aynı temsil düzeyinde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun
        - Seçenek temsil düzeyi baştan sona korunmalıdır
        - Seçeneklerde karmaşıklık farkı doğru cevabı ele vermemelidir

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci gizli çok özellikli yapıyı kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Yanlış şıklardan biri tek bir maddeyle eleniyor mu?
        - Sorulan ilişki için yalnızca bir seçenek mi kesin doğru/yanlış?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        - Tüm seçenekler aynı temsil düzeyinde mi kurulmuş?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

