meta:
  id: coklu_gorus_4q
  ad: Çoklu Görüş Senaryosu (4 Soru)
  sinif_seviyesi: 5
  aciklama: Diyalog formatında çoklu görüş üzerinden 4 soru — değinilmemiş, destekleyen, sonuç, koşullu
  kaynak: kadirhocasorukokleri.md
  frequency: Medium
context:
  type: coklu_gorus_4q
  question_count: 4
  question_count_min: 4
  question_count_max: 4
  generation:
    word_count_min: 120
    word_count_max: 200
    structure:
    - DİYALOG formatında bir metin oluştur
    - En az 4-5 kişi (isimli) aynı tema hakkında konuşmalı
    - Her kişi aynı temadan FARKLI bir örnek vermeli
    - Son kişi diğerlerinin söylediklerinden bir sentez/çıkarım yapmalı
    - 'Format: ''İsim: [görüş/örnek]'' şeklinde satır satır yazılmalı'
    kurallar:
    - Konu 5. sınıf seviyesinde, anlaşılır ve günlük hayattan olmalı
    - Her kişinin görüşü 1-2 cümle olmalı
    - Görüşler aynı temanın farklı yönlerini ele almalı
    - Metinde açıkça değinilen ve DEĞİNİLMEYEN konular olmalı
    - Son kişinin sentezi diğerlerini kapsayan bir sonuç olmalı
    - Koşullu soru için bir durumun değişmesi halinde sonucun nasıl etkileneceği çıkarılabilir olmalı
    - 4 farklı soru sorulacağı için diyalog zengin ve çok yönlü olmalı
    - Türkçe karakterler doğru kullanılmalı (ş, ı, ğ, ü, ö, ç)
  questions:
  - slot: 1
    type: metinde_yok
    soru_kokleri:
    - <b>Metinde aşağıdaki bilgilerden hangisine <u>değinilmemiştir</u>?</b>
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 18
    beceri:
      katman: KB2
      bilesenler:
      - mantiksal_denetleme
      surec_bileseni: bilgiyi_cikartma
  - slot: 2
    type: destekleyen_ifade
    soru_kokleri:
    - <b>Metindeki düşünceyi destekleyen ifade hangisidir?</b>
    - <b>Metindeki dusunceyi destekleyen ifade asagidakilerden hangisidir?</b>
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 20
    beceri:
      katman: KB2
      bilesenler:
      - cikarim_yapma
      surec_bileseni: bilgiyi_cikartma
  - slot: 3
    type: sonuc
    soru_kokleri:
    - <b>Metinden ulaşılan sonuç aşağıdakilerden hangisidir?</b>
    - <b>Bu olayda anlatılması gereken asıl mesele nedir?</b>
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 20
    beceri:
      katman: KB2
      bilesenler:
      - cikarim_yapma
      - genelleme
      surec_bileseni: bilgiyi_cikartma
  - slot: 4
    type: kosullu_cikarim
    soru_kokleri:
    - "<b>Eğer mevcut koşullar değiştirilseydi, bu durum genel sonucu nasıl etkilerdi?</b>"
    - "<b>Metindeki durumda bir değişiklik olsaydı aşağıdakilerden hangisinin yaşanması beklenebilirdi?</b>"
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 20
    beceri:
      katman: KB3
      bilesenler:
      - degerlendirme
      - cikarim_yapma
      surec_bileseni: problemi_yapilandirma
header_template: "1-4. soruları aşağıdaki metne göre birbirinden bağımsız olarak cevaplayınız."
format:
  type: llm_generated_html
  description: Diyalog formatında çoklu görüş üzerinden 4 soru
  paragraph:
    required: true
    word_count_min: 120
    word_count_max: 200
    sentence_count_min: 5
    sentence_count_max: 12
  stem:
    required: true
  options:
    count: 4
    labels:
    - A
    - B
    - C
    - D
    word_count_min: 5
    word_count_max: 20
    style: complete_sentence
    correct_count: 1
    correct_type: matches
dogru_cevap:
  tanim: Diyalog metninin içeriğine dayalı cevap
  kurallar:
  - 'KRİTİK: Doğru cevap tablodaki tek bir hücreden veya metindeki tek bir cümleden direkt okunaMAMALI'
  - Öğrenci doğru cevaba ulaşmak için senaryodaki durumu ANLAMALI ve tablodaki veriyi YORUMLAMALI
  - Doğru şık bir YORUM veya ÇIKARIM içermeli — ham veri tekrarı değil
  - 'YASAK: Tablodaki değeri aynen şıkka yazmak (örn: ''yalıtımı azdır'' tabloda yazıyorsa şıkta aynen yazmamalı)'
  - Şıklar senaryodaki probleme çözüm, tablodaki verilerden yargı veya karşılaştırma içermeli
  - Seçenekler arasında en az 2 tanesi makul görünmeli ama sadece biri metin+tablo birlikte değerlendirildiğinde doğru olmalı
  - Doğru şık en uzun şık OLMAMALI — seçenekler arası uzunluk dengeli olmalı
  - Metinde yok sorusunda doğru cevap diyalogda HİÇ bahsedilmeyen bilgi olmalı
  - Destekleyen ifade sorusunda doğru cevap metindeki ana düşünceyi güçlendiren ifade olmalı
  - Sonuç sorusunda doğru cevap diyalogdan çıkarılabilecek genel sonuç olmalı
  - Koşullu soruda doğru cevap durumun değişmesiyle oluşacak mantıklı sonuç olmalı
  - Her soru farklı bir bilgi/beceriye odaklanmalı
  - 'HATALI YAKLASIM: Metinde/tabloda/grafikte geçen bir cümlenin, kelime grubunun ya da kelimenin AYNEN seçeneklerde kullanılması — öğrenci metni anlamasa bile görsel eşleştirme yaparak doğru cevabı bulabilir!'
  - 'DOĞRU YAKLASIM: Seçenek, metindeki ifadenin AYNISI değil, ANLAMCA ÖZDESİ (farklı kelimelerle ifade edilmiş hâli) olmalı — öğrencinin ezberini değil, okuduğunu anlama ve yorumlama becerisini ölçer'
  - Doğru seçenek paragraftaki/tablodaki/grafikteki hiçbir cümleyi kelimesi kelimesine TEKRARLAMAMALI
  - En az %40 kelime farklılığı olmalı — aynı cümleyi kopyalayıp yapıştırma YASAK
  - 'BİLİMSEL TERİM KORUMASI: Bilimsel terimler, teknik kavramlar ve özel isimler DEĞİŞTİRİLMEMELİ (ör: ''teleskop'' → ''mercekli araç'' GEÇERSİZ). Sadece GÜNLÜK DİL kelimeleri için eş anlamlı kullanılmalı'
distractors:
  stratejiler:
  - ad: METINDE_VAR
    aciklama: Metinde yok sorusunda aslında metinde değinilen bilgiyi sunma
    ornek: Diyalogda geçen bir örneği 'değinilmemiş' olarak gösterme
  - ad: KISMI_DESTEK
    aciklama: Ana düşünceyi kısmen destekleyen ama tam karşılamayan ifade
    ornek: İlişkili ama farklı bir düşünceyi destekleyen ifade sunma
  - ad: YANLIS_SONUC
    aciklama: Metinden çıkarılamayacak bir sonucu sunma
    ornek: Diyalogtaki örneklerden desteklenmeyen bir genelleme yapma
  - ad: MANTIK_DISI_KOSUL
    aciklama: Koşul değişse bile sonucun etkilenmeyeceği bir durumu sunma
    ornek: Değişikliğin etkisini yanlış yönde gösterme
use_shared_strategies: false
