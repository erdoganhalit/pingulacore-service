# B1.1 — 3Q Senaryo + Image Tablo (Değinilmemiş + Destekleyen + Sonuç)
# Görsel: tablo_gorseli (AI tablo görseline dönüştürülecek)
# Soru Tipleri: Değinilmemiş + Destekleyen + Sonuç — B1.1 soru kökleri

meta:
  id: "b1_senaryo_tablo_image_3q"
  ad: "3Q Senaryo + Image Tablo — Değinilmemiş/Destekleyen/Sonuç"
  sinif_seviyesi: 5
  aciklama: "Senaryo + AI tablo görseli üzerinden 3 farklı çıkarım sorusu"
  kaynak: "baglamb1sorukoku.md"
  frequency: "Medium"

context:
  type: "b1_senaryo_tablo_image_3q"
  question_count: 3
  question_count_min: 3
  question_count_max: 3
  generation:
    word_count_min: 100
    word_count_max: 160
    image_type: "tablo_gorseli"
    structure:
      - "Bir karakter (isimli) bir araştırma/gözlem yapmış, sonuçlarını bir tabloya kaydetmiştir (4-5 cümle)"
      - "Senaryo hem metin bilgisi hem de tablo verisi içeren zengin bir bağlam oluşturmalı"
      - "KRİTİK: Senaryoda tablo verilerini YAZMA — veriler sadece HTML tablosunda olmalı"
      - "Ardından verileri HTML tablosu olarak ekle: <table> ile, en az 3 sütun, en az 4 satır"
      - "Tablo karşılaştırma veya sınıflandırma içermeli (ör: Seçenek | Özellik 1 | Özellik 2 | Sayısal Veri)"
      - "Metin ve tablo birlikte bazı bilgileri verse de bazı bilgilere değinmemeli"
      - "Tablodaki verilerde belirgin farklar ve desteklenebilir yargılar olmalı"
      - "NOT: Bu tablo AI tarafından stilize edilmiş tablo görseline dönüştürülecektir"
    kurallar:
      - "5. sınıf seviyesinde, karşılaştırmalı veri tablosu"
      - "KRİTİK — SENARYO KAPSAMI: Senaryo durumu anlatsın ama tüm cevapları vermesin"
      - "Metin ve tablo birbirini tamamlamalı — bazı bilgiler sadece metinde, bazıları sadece tabloda"
      - "Tablodaki veriler gerçekçi ve karşılaştırılabilir olmalı"
      - "Değerler arasında karşılaştırma yapılabilir belirgin farklar olmalı"
      - "Türkçe karakterler doğru kullanılmalı (ş, ı, ğ, ü, ö, ç)"

  questions:
    - slot: 1
      type: "deginilmemis"
      soru_kokleri:
        - "<b>Metin ve tabloda aşağıdaki bilgilerden hangisine değinilmemiştir?</b>"
        - "<b>Sunulan verilerden hangisi iddiayı desteklemek için bir kanıt niteliği taşımaz?</b>"
      options_style: "complete_sentence"
      word_count_min: 5
      word_count_max: 18
      beceri:
        katman: "KB3"
        bilesenler: ["cikarim_yapma", "degerlendirme"]
        surec_bileseni: "bilgiyi_cikartma"

    - slot: 2
      type: "destekleyen"
      soru_kokleri:
        - "<b>Tablodaki verileri destekleyen ifade aşağıdakilerden hangisidir?</b>"
        - "<b>Eldeki bu kanıtlar bizi hangi sonuca ulaştırır?</b>"
      options_style: "complete_sentence"
      word_count_min: 5
      word_count_max: 20
      beceri:
        katman: "KB2"
        bilesenler: ["grafik_okuma", "karsilastirma"]
        surec_bileseni: "bilgiyi_cikartma"

    - slot: 3
      type: "sonuc"
      soru_kokleri:
        - "<b>Metin ve tablodan ulaşılan sonuç aşağıdakilerden hangisidir?</b>"
        - "<b>Veriler arasındaki ilişki dikkate alındığında yapılabilecek en tutarlı çıkarım hangisidir?</b>"
      options_style: "complete_sentence"
      word_count_min: 5
      word_count_max: 20
      beceri:
        katman: "KB3"
        bilesenler: ["cikarim_yapma", "degerlendirme", "butunlestirme"]
        surec_bileseni: "problemi_yapilandirma"

header_template: "1-3. soruları aşağıdaki bilgilere göre cevaplayınız."

format:
  type: "llm_generated_html"
  description: "3Q image tablo üzerinden değinilmemiş, destekleyen ve sonuç soruları"
  paragraph:
    required: true
    word_count_min: 100
    word_count_max: 160
    sentence_count_min: 4
    sentence_count_max: 7
  stem:
    required: true
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 5
    word_count_max: 20
    style: "complete_sentence"
    correct_count: 1
    correct_type: "matches"

dogru_cevap:
  tanim: "Metin ve tablo verilerinden doğru çıkarılan bilgi veya yargı"
  kurallar:
    - "KRİTİK: Doğru cevap tabloyu OKUYARAK ve YORUMLAYARAK bulunmalı — ham veri tekrarı değil"
    - "Doğru cevap hem senaryoyu hem tablo verilerini birlikte değerlendirmeyi gerektirmeli"
    - "Doğru şık en uzun şık OLMAMALI — seçenekler arası uzunluk dengeli olmalı"
    - "HATALI YAKLASIM: Metinde/tabloda geçen bir cümlenin AYNEN seçeneklerde kullanılması YASAK"
    - "DOĞRU YAKLASIM: Seçenek, metindeki ifadenin ANLAMCA ÖZDESİ olmalı"
    - "En az %40 kelime farklılığı olmalı"
    - "BİLİMSEL TERİM KORUMASI: Teknik terimler değiştirilmemeli"

distractors:
  stratejiler:
    - ad: "VERI_CARPITMA"
      aciklama: "Tablodaki değeri yanlış okuma veya aktarma"
      ornek: "Bir hücredeki veriyi farklı bir kategoriye atma"
    - ad: "YANLIS_KARSILASTIRMA"
      aciklama: "Kategorileri veya sütunları yanlış karşılaştırma"
      ornek: "İki farklı özelliği aynı kriterde karşılaştırma"
    - ad: "GENELLEME_HATASI"
      aciklama: "Metin veya tabloda olmayan bir sonuca genelleme yapma"
      ornek: "Verinin kapsamı dışında bir çıkarım sunma"

use_shared_strategies: false
