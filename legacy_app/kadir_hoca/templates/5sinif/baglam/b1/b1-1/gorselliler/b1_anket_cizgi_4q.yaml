# B1.1 — 4Q Çizgi Grafik Anket (Merak + Araştırma Sorusu + Grafik Bilgi + Grafik Yorum)
# Görsel: cizgi_grafigi (AI çizgi grafiğine dönüştürülecek)
# Soru Tipleri: Merak Konusu + Araştırma Sorusu + Grafik Bilgi + Grafik Yorum — B1.1 soru kökleri

meta:
  id: "b1_anket_cizgi_4q"
  ad: "4Q Çizgi Grafik Anket — Merak/Araştırma/Bilgi/Yorum"
  sinif_seviyesi: 5
  aciklama: "Araştırma senaryosu + çizgi grafiği üzerinden 4 farklı soru"
  kaynak: "baglamb1sorukoku.md"
  frequency: "Medium"

context:
  type: "b1_anket_cizgi_4q"
  question_count: 4
  question_count_min: 4
  question_count_max: 4
  generation:
    word_count_min: 120
    word_count_max: 200
    image_type: "cizgi_grafigi"
    structure:
      - "Bir karakter (isimli, 5. sınıf öğrencisi) bir konuyu merak edip araştırma yapmıştır (3-5 cümle)"
      - "Karakter zaman içindeki değişimi incelemiş ve verilerini kaydetmiştir"
      - "KRİTİK: Senaryoda sayısal değerleri YAZMA — veriler sadece tabloda olmalı"
      - "Senaryoda karakterin merak konusu ve araştırma motivasyonu açıkça belirtilmeli"
      - "Ardından verileri HTML tablosu olarak ekle: <table> ile, 2 sütun (Zaman | Değer), en az 5 satır"
      - "Veriler gerçekçi ve zaman içinde belirgin bir eğilim göstermeli"
      - "NOT: Bu tablo AI tarafından çizgi grafiğine dönüştürülecektir"
    kurallar:
      - "Senaryo 5. sınıf seviyesinde, okul/çevre ortamında olmalı"
      - "KRİTİK — SENARYO KAPSAMI: Senaryo sadece DURUMU ve MERAKı anlatsın, CEVAPLARI vermesin!"
      - "Detaylı bilgiler ve veriler SADECE tabloda/grafikte olmalı — senaryo bunları içermemeli"
      - "Soruların cevabı senaryodan değil grafik verilerinden çıkarılmalı"
      - "Karakter meraklı ve araştırmacı bir öğrenci olmalı"
      - "Veriler gerçekçi dağılım göstermeli"
      - "Türkçe karakterler doğru kullanılmalı (ş, ı, ğ, ü, ö, ç)"

  questions:
    - slot: 1
      type: "merak_konusu"
      soru_kokleri:
        - "<b>…Özne…'nin merak ettiği konu aşağıdakilerden hangisidir?</b>"
      options_style: "complete_sentence"
      word_count_min: 3
      word_count_max: 15
      beceri:
        katman: "KB2"
        bilesenler: ["cikarim_yapma"]
        surec_bileseni: "bilgiyi_cikartma"

    - slot: 2
      type: "arastirma_sorusu"
      soru_kokleri:
        - "<b>Aşağıdakilerden hangisi …Özne…'nin araştırmasında sorduğu sorulardan biridir?</b>"
      options_style: "question_sentence"
      word_count_min: 4
      word_count_max: 15
      beceri:
        katman: "KB2"
        bilesenler: ["cikarim_yapma", "sorgulama"]
        surec_bileseni: "bilgiyi_cikartma"

    - slot: 3
      type: "grafik_bilgi"
      soru_kokleri:
        - "<b>…Özne…, araştırması sonucu oluşturduğu grafik sayesinde hangi bilgiyi edinmiştir?</b>"
      options_style: "complete_sentence"
      word_count_min: 5
      word_count_max: 20
      beceri:
        katman: "KB2"
        bilesenler: ["grafik_okuma", "yorumlama"]
        surec_bileseni: "bilgiyi_cikartma"

    - slot: 4
      type: "grafik_yorum"
      soru_kokleri:
        - "<b>Metin ve grafikteki bilgilere göre aşağıdakilerden hangisi söylenebilir?</b>"
      options_style: "complete_sentence"
      word_count_min: 5
      word_count_max: 20
      beceri:
        katman: "KB3"
        bilesenler: ["cikarim_yapma", "degerlendirme", "butunlestirme"]
        surec_bileseni: "problemi_yapilandirma"

header_template: "1-4. soruları aşağıdaki senaryo ve grafiğe göre cevaplayınız."

format:
  type: "llm_generated_html"
  description: "4Q çizgi grafik anket üzerinden merak, araştırma, bilgi ve yorum soruları"
  paragraph:
    required: true
    word_count_min: 120
    word_count_max: 200
    sentence_count_min: 3
    sentence_count_max: 8
  stem:
    required: true
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 20
    style: "complete_sentence"
    correct_count: 1
    correct_type: "matches"

dogru_cevap:
  tanim: "Senaryo ve grafik verilerinden doğru çıkarılan bilgi veya yargı"
  kurallar:
    - "KRİTİK: Doğru cevap grafiği OKUYARAK ve YORUMLAYARAK bulunmalı — ham veri tekrarı değil"
    - "Doğru cevap hem senaryoyu hem grafik verilerini birlikte değerlendirmeyi gerektirmeli"
    - "Doğru şık en uzun şık OLMAMALI — seçenekler arası uzunluk dengeli olmalı"
    - "HATALI YAKLASIM: Metinde/tabloda/grafikte geçen bir cümlenin AYNEN seçeneklerde kullanılması YASAK"
    - "DOĞRU YAKLASIM: Seçenek, metindeki ifadenin ANLAMCA ÖZDESİ olmalı"
    - "En az %40 kelime farklılığı olmalı"
    - "BİLİMSEL TERİM KORUMASI: Teknik terimler değiştirilmemeli"

distractors:
  stratejiler:
    - ad: "KONU_KAYDIRMA"
      aciklama: "Merak konusunu veya araştırma sorusunu farklı bir konuya kaydırma"
      ornek: "Araştırmanın asıl konusundan uzak bir merak konusu sunma"
    - ad: "VERI_CARPITMA"
      aciklama: "Grafikteki değeri yanlış okuma veya aktarma"
      ornek: "Artış eğilimindeki bir veriyi azalış gibi sunma"
    - ad: "GENELLEME_HATASI"
      aciklama: "Grafikte olmayan bir sonuca genelleme yapma"
      ornek: "Verinin kapsamı dışında bir çıkarım sunma"

use_shared_strategies: false
