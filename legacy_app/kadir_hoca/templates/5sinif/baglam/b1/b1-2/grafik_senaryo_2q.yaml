meta:
  id: grafik_senaryo_2q
  ad: Senaryo + Grafik Görseli (2 Soru)
  sinif_seviyesi: 5
  aciklama: Senaryo metni + AI üretimi sütun grafiği üzerinden 2 soru
  frequency: Medium
context:
  type: grafik_senaryo_2q
  question_count: 2
  question_count_min: 2
  question_count_max: 2
  generation:
    word_count_min: 60
    word_count_max: 120
    image_type: infografik
    structure:
    - Bir karakter (isimli) bir araştırma, gözlem veya anket yapmıştır (2-3 cümle senaryo)
    - Karakter topladığı verileri bir SÜTUN GRAFİĞİ ile göstermiştir
    - 'Senaryoda grafikteki verilerin ne olduğunu KISA ÖZETle (ör: ''Sonuçları aşağıdaki grafikle göstermiştir.'')'
    - 'KRİTİK: Senaryoda sayısal değerleri YAZMA — veriler sadece grafikte olmalı'
    - Senaryo grafik hakkında merak uyandırmalı ama cevapları vermemeli
    - 'Ardından bir HTML tablosu ekle — bu tablo grafiğin VERİ KAYNAĞI olacak:'
    - <table><tr><th>Kategori</th><th>Değer</th></tr><tr><td>...</td><td>sayısal değer</td></tr>...</table>
    - En az 3, en fazla 6 kategori
    - Değerler sayısal olmalı (tam sayı veya yüzde)
    - 'NOT: Bu tablo AI tarafından sütun grafiğine dönüştürülecektir. Tablo son çıktıda GÖRÜNMEYECEKTİR.'
    kurallar:
    - Senaryo 5. sınıf seviyesinde olmalı
    - Konuyla ilgili gerçekçi veriler üret
    - Değerler arasında karşılaştırma yapılabilir belirgin farklar olmalı
    - Kategoriler kısa ve okunabilir olmalı
    - Türkçe karakterler doğru kullanılmalı (ş, ı, ğ, ü, ö, ç)
  questions:
  - slot: 1
    type: grafik_okuma
    soru_kokleri:
    - <b>Grafiğe göre en yüksek değere sahip kategori aşağıdakilerden hangisidir?</b>
    - <b>Grafikteki verilere göre aşağıdaki yargılardan hangisine ulaşılabilir?</b>
    - <b>Grafik incelendiğinde aşağıdakilerden hangisi doğrudur?</b>
    - <b>Grafiğe göre en düşük ve en yüksek değer arasındaki fark ile ilgili aşağıdakilerden hangisi söylenebilir?</b>
    options_style: complete_sentence
    word_count_min: 4
    word_count_max: 18
    beceri:
      katman: KB2
      bilesenler:
      - grafik_okuma
      - yorumlama
      surec_bileseni: bilgiyi_cikartma
  - slot: 2
    type: grafik_cikarim
    soru_kokleri:
    - <b>Grafikteki veriler karşılaştırıldığında aşağıdakilerden hangisi <u>söylenemez</u>?</b>
    - <b>Grafik yorumlandığında aşağıdaki çıkarımlardan hangisi doğrudur?</b>
    - <b>Grafikten elde edilen bilgilere göre aşağıdakilerden hangisine ulaşılamaz?</b>
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 20
    beceri:
      katman: KB3
      bilesenler:
      - cikarim_yapma
      - karsilastirma
      - degerlendirme
      surec_bileseni: problemi_yapilandirma
header_template: 1-2. soruları aşağıdaki bilgilere göre birbirinden bağımsız olarak cevaplayınız.
format:
  type: llm_generated_html
  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 120
    sentence_count_min: 2
    sentence_count_max: 6
  stem:
    required: true
  options:
    count: 4
    labels:
    - A
    - B
    - C
    - D
    word_count_min: 4
    word_count_max: 20
    style: complete_sentence
    correct_count: 1
    correct_type: matches
dogru_cevap:
  tanim: Grafikteki verilerden doğru okunan veya çıkarılan bilgi
  kurallar:
  - 'KRİTİK: Doğru cevap grafiği OKUYARAK ve YORUMLAYARAK bulunmalı — ham veri tekrarı değil'
  - Doğru cevap hem senaryoyu hem grafik verilerini birlikte değerlendirmeyi gerektirmeli
  - Doğru şık en uzun şık OLMAMALI — seçenekler arası uzunluk dengeli olmalı
  - 'HATALI YAKLASIM: Metinde/tabloda/grafikte geçen bir cümlenin, kelime grubunun ya da kelimenin AYNEN seçeneklerde kullanılması — öğrenci metni anlamasa bile görsel eşleştirme yaparak doğru cevabı bulabilir!'
  - 'DOĞRU YAKLASIM: Seçenek, metindeki ifadenin AYNISI değil, ANLAMCA ÖZDESİ (farklı kelimelerle ifade edilmiş hâli) olmalı — öğrencinin ezberini değil, okuduğunu anlama ve yorumlama becerisini ölçer'
  - Doğru seçenek paragraftaki/tablodaki/grafikteki hiçbir cümleyi kelimesi kelimesine TEKRARLAMAMALI
  - En az %40 kelime farklılığı olmalı — aynı cümleyi kopyalayıp yapıştırma YASAK
  - 'BİLİMSEL TERİM KORUMASI: Bilimsel terimler, teknik kavramlar ve özel isimler DEĞİŞTİRİLMEMELİ (ör: teleskop → mercekli araç GEÇERSİZ). Sadece GÜNLÜK DİL kelimeleri için eş anlamlı kullanılmalı'
distractors:
  stratejiler:
  - ad: VERI_CARPITMA
    aciklama: Grafikteki değeri yanlış okuma veya aktarma
  - ad: YANLIS_KARSILASTIRMA
    aciklama: Kategorileri/sütunları yanlış karşılaştırma
  - ad: GENELLEME_HATASI
    aciklama: Grafikte olmayan bir sonuca genelleme yapma
use_shared_strategies: false
