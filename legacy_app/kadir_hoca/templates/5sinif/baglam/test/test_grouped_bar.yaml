meta:
  id: test_grouped_bar
  ad: TEST — Gruplu Sütun Grafiği
  sinif_seviyesi: 5
  aciklama: Senaryo + 3 sütunlu tablo → gruplu sütun grafiğine dönüştürülür
  frequency: Medium
context:
  type: test_grouped_bar
  question_count: 2
  question_count_min: 2
  question_count_max: 2
  generation:
    word_count_min: 60
    word_count_max: 120
    visual_format: grouped_bar_chart
    structure:
    - Bir araştırma/karşılaştırma yapılmıştır (2-3 cümle senaryo)
    - 'Sonuçları BİR TABLO olarak sun: <table> etiketleriyle'
    - 'KRİTİK — Tablo 3 SÜTUNLU olmalı: Kategori | Grup A Değeri | Grup B Değeri'
    - 'Örnek: Eğitim Düzeyi | Erkek (%) | Kadın (%) veya Yıl | 2024 | 2025'
    - En az 3, en fazla 5 veri satırı
    - Değerler SAYISAL olmalı (tam sayı veya yüzde)
    - İki grubun değerleri arasında karşılaştırılabilir farklar olmalı
    - 'NOT: Bu tablo otomatik olarak gruplu sütun grafiğine dönüştürülecektir'
    kurallar:
    - Senaryo 5. sınıf seviyesinde olmalı
    - İki grup anlamlı bir karşılaştırma sunmalı
    - Kategorilerin sıralaması belirgin olmalı
    - Türkçe karakterler doğru kullanılmalı
  questions:
  - slot: 1
    type: grafik_okuma
    soru_kokleri:
    - <b>Grafiğe göre iki grup arasındaki fark en fazla hangi kategoride görülmektedir?</b>
    - <b>Grafikteki verilere göre aşağıdakilerden hangisi doğrudur?</b>
    options_style: complete_sentence
    word_count_min: 4
    word_count_max: 18
    beceri:
      katman: KB2
      bilesenler:
      - grafik_okuma
      - karsilastirma
      surec_bileseni: bilgiyi_cikartma
  - slot: 2
    type: grafik_cikarim
    soru_kokleri:
    - <b>Grafik yorumlandığında aşağıdaki çıkarımlardan hangisi <u>söylenemez</u>?</b>
    - <b>Her iki grubun verileri birlikte değerlendirildiğinde ulaşılabilecek sonuç aşağıdakilerden hangisidir?</b>
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 18
    beceri:
      katman: KB3
      bilesenler:
      - cikarim_yapma
      - karsilastirma
      surec_bileseni: problemi_yapilandirma
header_template: 1-2. soruları aşağıdaki bilgilere göre birbirinden bağımsız olarak cevaplayınız.
format:
  type: llm_generated_html
  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 120
    sentence_count_min: 2
    sentence_count_max: 5
  stem:
    required: true
  options:
    count: 4
    labels:
    - A
    - B
    - C
    - D
    word_count_min: 4
    word_count_max: 18
    style: complete_sentence
    correct_count: 1
    correct_type: matches
dogru_cevap:
  tanim: Grafikteki iki grubun verilerinden doğru okunan veya çıkarılan bilgi
  kurallar:
  - Doğru cevap her iki grubun verilerini doğru karşılaştırmalı
  - 'HATALI YAKLASIM: Metinde/tabloda/grafikte geçen bir cümlenin, kelime grubunun ya da kelimenin AYNEN seçeneklerde kullanılması — öğrenci metni anlamasa bile görsel eşleştirme yaparak doğru cevabı bulabilir!'
  - 'DOĞRU YAKLASIM: Seçenek, metindeki ifadenin AYNISI değil, ANLAMCA ÖZDESİ (farklı kelimelerle ifade edilmiş hâli) olmalı — öğrencinin ezberini değil, okuduğunu anlama ve yorumlama becerisini ölçer'
  - Doğru seçenek paragraftaki/tablodaki/grafikteki hiçbir cümleyi kelimesi kelimesine TEKRARLAMAMALI
  - En az %40 kelime farklılığı olmalı — aynı cümleyi kopyalayıp yapıştırma YASAK
  - 'BİLİMSEL TERİM KORUMASI: Bilimsel terimler, teknik kavramlar ve özel isimler DEĞİŞTİRİLMEMELİ. Sadece GÜNLÜK DİL kelimeleri için eş anlamlı kullanılmalı'
distractors:
  stratejiler:
  - ad: GRUP_KARISTIRMA
    aciklama: İki grubun değerlerini birbiriyle karıştırma
  - ad: YANLIS_KARSILASTIRMA
    aciklama: Kategorileri yanlış sıralama
  - ad: GENELLEME_HATASI
    aciklama: Grafikte olmayan genelleme yapma
use_shared_strategies: false
