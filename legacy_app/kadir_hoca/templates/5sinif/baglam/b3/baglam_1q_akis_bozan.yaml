meta:
  id: baglam_1q_akis_bozan
  ad: 1Q Baglam Akisi Bozan Cumle
  sinif_seviyesi: 5
  aciklama: Numarali cumlelerden olusan metinde akisi bozan cumleyi bulma sorusu
  kaynak: baglamb3sorukoku.md
  frequency: Medium
context:
  type: baglam_senaryo_1q
  question_count: 1
  question_count_min: 1
  question_count_max: 1
  generation:
    word_count_min: 60
    word_count_max: 120
    structure:
    - Bir karakter (Turkce isimli) numaralanmis cumlelerden olusan bir metin bulur (3-5 cumle senaryo)
    - "Metin (I) (II) (III) (IV) şeklinde parantezli Roma rakamıyla numaralanmış 4 cümleden oluşur — parantez ZORUNLU"
    - "Numaralı cümleler senaryodan AYRI bir paragrafta olmalı — önce senaryo, sonra <br><br> ile ayrılmış numaralı cümleler paragrafı"
    - 3 cumle ayni konu etrafinda tutarli bir metin olustururken 1 cumle akisi bozar
    - Akisi bozan cumle konuyla iliskili ama farkli bir yonden bahseden cumle olmali
    - 'Senaryo: Karakter dergide/kitapta bir yazi bulur, akisi bozan cumleyi cikaracak'
    kurallar:
    - Senaryo 5. sinif seviyesinde, gunluk hayattan olmali
    - Karakter ismi Turkce olmali (Elif, Mert, Zeynep, Can vb.)
    - Akisi bozan cumle konuyla tamamen ilgisiz OLMAMALI, farkli bir yon olmali
    - Diger 3 cumle anlam ve konu butunlugu icinde olmali
    - Turkce karakterler dogru kullanilmali (s, i, g, u, o, c)
  questions:
  - slot: 1
    type: akis_bozan
    soru_kokleri:
    - <b>...Karakter...'in metinden cikardigi, metnin akisini bozan cumle hangisidir?</b>
    - <b>...Karakter...'in buldugu yazida konunun farkli bir yonunden bahseden cumle hangisidir?</b>
    - <b>...Karakter...in buldugu yazida konunun farkli bir yonunden bahseden numaralandirilmis cumle hangisidir?</b>
    - <b>Bu metnin anlam butunlugunu saglamak icin numaralanmis cumlelerden hangilerinin yeri degistirilmelidir?</b>
    options_style: roman_numeral_combination
    word_count_min: 1
    word_count_max: 6
    beceri:
      katman: KB2
      bilesenler:
      - analiz
      - degerlendirme
      surec_bileseni: bilgiyi_yapilandirma
