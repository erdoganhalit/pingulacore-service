  - "Öyküleyici metinde olay akışı yoksa"
  - "Bilgilendirici metinde bilgi verme amacı görünür değilse"
  - "Görsel metinle uyumsuzsa"

ornek_bicim_notlari:
  - "Kuşlar ve balıklar hakkında bilgi veren kısa metinler için doğru seçenek 'Bilgilendirici metin' olabilir."
  - "Hayvanlardan söz edilmesi metni otomatik olarak masal yapmaz; bilgi veriliyorsa bilgilendirici metindir."
  - "Kısa dizeler hâlinde yazılan metinler şiir olarak tasarlanabilir."
  - "Bir olayın kişi, yer ve zamanla anlatıldığı metinler öyküleyici metin olarak kurulabilir."
