    zorluk_notu: >
      Kolay düzeyde öğrenci grafiği okuyarak açık bilgileri seçer.
      Zorluk düşük tutulur.

  orta:
    ana_grafik:
      bilgi_yogunlugu: "orta"
      kurallar:
        - "Grafikte 4-6 kategori bilgisi olabilir."
        - "Doğru cevap için basit karşılaştırma veya küçük toplam gerekebilir."
        - "Sütun grafik, resimli grafik veya sade karşılaştırma grafiği kullanılabilir."
    tercih_edilen_varyantlar:
      - "grafikten_hangisi_cikarilabilir"
      - "grafikten_hangisi_cikarilamaz"
      - "grafikten_hangisi_soylenemez"
      - "metindeki_bilgileri_veren_grafik"
    celdiriciler:
      kurallar:
        - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
        - "Yanlış seçenekler yakın ama hatalı karşılaştırma içerebilir."
    zorluk_notu: >
      Orta düzeyde öğrenci grafiği okuyup karşılaştırma yapar ve hangi bilginin
      çıkarılabildiğini ayırt eder.

  zor:
    ana_grafik:
      bilgi_yogunlugu: "orta_yuksek"
      kurallar:
        - "Grafikte birden fazla kategori ilişkisi bulunabilir."
        - "Doğru cevap için iki bilgiyi birleştirmek gerekebilir."
        - "En çok, en az, eşitlik, fark veya küçük toplam karşılaştırması olabilir."
        - "Zor düzeyde bile en fazla 2 adımlı işlem yapılmalıdır."
        - "Zor düzeyde de 2. sınıf sadeliği korunmalıdır."
    tercih_edilen_varyantlar:
      - "grafikten_hangisi_cikarilamaz"
      - "grafikten_hangisi_cikarilabilir"
      - "metindeki_bilgileri_veren_grafik"
    celdiriciler:
      kurallar:
        - "2 yanlış seçenek de makul görünmelidir."
        - "1 yanlış seçenek yakın karşılaştırma hatası içermelidir."
        - "1 yanlış seçenek kategori veya veri eşleştirme hatası içermelidir."
    zorluk_notu: >
      Zor düzey 2. sınıfta derin grafik analizi değildir.
      Zorluk, grafikteki birden fazla bilgiyi dikkatle kullanarak doğru sonuca ulaşma düzeyindedir.

