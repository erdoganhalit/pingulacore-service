yanlis_secenek_stratejileri:
  count_per_question: 2
  strateji_havuzu:
    - id: "yakın_sayi_hatasi"
      tanim: "Grafikteki değere çok yakın ama yanlış sayı kullanma"
      ornek_mantik:
        - "40 yerine 30 söylemek"
        - "38 yerine 32 söylemek"

    - id: "kategori_karistirma"
      tanim: "Bilgiyi yanlış kişi, gün, ay, meslek veya başlıkla eşleştirme"
      ornek_mantik:
        - "Ali'nin bilgisini Cemil'e bağlama"
        - "Esnaf yerine işçiyi söyleme"

    - id: "kismi_dogru_kismi_yanlis"
      tanim: "İfadenin bir kısmı grafiğe uyar ama tamamı yanlış olur"
      ornek_mantik:
        - "her gün matematik vardır ama Türkçe yoktur"
        - "en az meslek grubunu doğru söyleyip en çok grubu yanlış söylemek"

    - id: "ulasilamaz_bilgi"
      tanim: "Grafikte bulunmayan ayrıntıyı sorma ya da söyleme"
      ornek_mantik:
        - "hangi dersten soru çözdüğü"
        - "soruları hangi saatte çözdüğü"
        - "en sevdiği dersin hangisi olduğu"

    - id: "yanlis_karsilastirma"
      tanim: "En çok, en az, daha fazla, eşit gibi ilişkileri yanlış kurma"
      ornek_mantik:
        - "işçi veli sayısı esnaftan fazladır"
        - "haziran satışı ocaktan azdır"

    - id: "yanlis_grafik_eslesmesi"
      tanim: "Metindeki bilgilerin bir kısmını doğru, bir kısmını yanlış gösteren grafik"
      ornek_mantik:
        - "iki sütun doğru, bir sütun yanlış"
        - "bir kategori yeri değişmiş grafik"

  secim_kurali:
    - "Her soruda 2 yanlış seçenek farklı stratejilerden seçilmelidir."
    - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
    - "Çıkarılamaz / söylenemez sorularında diğer iki seçenek grafikle desteklenmelidir."
    - "Metinden grafik seçme varyantında iki yanlış grafik de metne kısmen benzeyebilir."

