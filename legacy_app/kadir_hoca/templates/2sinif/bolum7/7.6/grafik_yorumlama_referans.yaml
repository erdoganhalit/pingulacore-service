meta:
  id: "grafik_yorumlama_sinif2_grafik_merkezli_uc_secenekli"
  ad: "Grafik Yorumlama"
  sinif_seviyesi: 2
  ders: "Türkçe"
  bolum: "2. Sınıf Paragraf Soru Bankası"
  alt_bolum: "7.6 Grafik Yorumlama"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    2. sınıf öğrencisi için grafikte verilen verileri okuyup yorumlayarak
    söylenebilen, söylenemeyen, çıkarılabilen veya çıkarılamayan bilgileri
    ayırt ettirmeye; ayrıca metindeki ya da veri listesindeki bilgileri içeren
    doğru grafiği seçtirmeye yönelik, grafik zorunlu ve 3 seçenekli standart
    soru üretim şablonu.
  kullanim_notu: >
    Bu şablonda grafik soru çözümünün ana kaynağıdır. Varsa kısa bağlam metni
    yalnız yönlendirme yapar; tek başına çözüm sağlamaz. Metinden grafik seçme
    varyantında ise hem metin/veri listesi hem grafik seçenekleri birlikte
    kullanılmalıdır. Harici 2. Sınıf TYMM Ortak Kuralları ile birlikte doğrulanmalıdır.

format:
  tip: "llm_generated_html"
  aciklama: "İsteğe bağlı kısa bağlam metni + ana grafik veya grafik seçenekleri + soru kökü + 3 seçenek"

  soru_varyanti:
    izinli:
      - "grafikten_hangisi_soylenebilir"
      - "grafikten_hangisi_soylenemez"
      - "grafikten_hangisi_cikarilabilir"
      - "grafikten_hangisi_cikarilamaz"
      - "metindeki_bilgileri_veren_grafik"
    varsayilan: "grafikten_hangisi_soylenebilir"

  cozum_kaynagi_politikasi:
    grafik_tabanli_varyantlar:
      kapsar:
        - "grafikten_hangisi_soylenebilir"
        - "grafikten_hangisi_soylenemez"
        - "grafikten_hangisi_cikarilabilir"
        - "grafikten_hangisi_cikarilamaz"
      ana_kaynak: "ana_grafik"
      kurallar:
        - "Ana grafik zorunludur."
        - "Varsa bağlam metni tek başına çözüm vermemelidir."
        - "Doğru cevap grafik incelenmeden bulunamamalıdır."
        - "Grafikteki başlık, eksen, sembol, renk, sayı veya sütun yüksekliği çözümde gerçek işlev taşımalıdır."
    metinden_grafik_secme_varyanti:
      kapsar:
        - "metindeki_bilgileri_veren_grafik"
      ana_kaynaklar:
        - "metin_veya_veri_listesi"
        - "grafik_secenekleri"
      kurallar:
        - "Metin veya veri listesi zorunludur."
        - "3 grafik seçeneği zorunludur."
        - "Doğru cevap için hem metin/liste hem grafik seçenekleri birlikte kullanılmalıdır."
        - "Yalnız metne bakarak doğru grafik seçilememelidir."
        - "Yalnız grafik seçeneklerine bakarak da doğru cevap kesin seçilememelidir."

  baglam_metni:
    gerekli: false
    aciklama: "Grafiğin neyi gösterdiğini açıklayan kısa bilgi alanı"
    cumle_sayisi_min: 1
    cumle_sayisi_max: 3
    kelime_sayisi_min: 8
    kelime_sayisi_max: 30
    kurallar:
      - "Bağlam metni varsa kısa, sade ve açıklayıcı olmalıdır."
      - "Bağlam metni grafikteki sayıların veya sembollerin neyi gösterdiğini söyleyebilir."
      - "Bağlam metni doğru seçeneği tek başına vermemelidir."
      - "Bağlam metni 2. sınıf düzeyinde olmalıdır."
    yasaklar:
      - "grafiği okumadan cevabı açıkça veren açıklama"
      - "uzun ve karmaşık paragraf"
      - "teknik grafik dili"

  ana_grafik:
    gerekli_varyantlarda:
      - "grafikten_hangisi_soylenebilir"
      - "grafikten_hangisi_soylenemez"
      - "grafikten_hangisi_cikarilabilir"
      - "grafikten_hangisi_cikarilamaz"
    tipler:
      - "basit sütun grafik"
      - "şekil grafiği"
      - "resimli grafik"
      - "renkli çubuk grafik"
      - "tek değişkenli karşılaştırma grafiği"
    kurallar:
      - "Grafik sade, okunabilir ve 2. sınıf düzeyine uygun olmalıdır."
      - "Grafik başlığı açıkça verilmelidir."
      - "Grafikte eksen veya kategori adları açıkça yazılmalıdır."
      - "Sayısal değerler veya görsel semboller net biçimde takip edilebilir olmalıdır."
      - "Şekil grafiği kullanılıyorsa her şeklin neyi temsil ettiği açıkça gösterilmelidir."
      - "Grafikte en az 3 veri noktası bulunmalıdır."
      - "Grafikte tek bir bağlam içinde karşılaştırma yapılmalıdır."
      - "Doğru cevap grafik okunmadan bulunamamalıdır."
      - "Grafik çok yoğun ve karmaşık olmamalıdır."
      - "Renkler okunabilirliği desteklemeli, tek bilgi kaynağı olmamalıdır."
    yasaklar:
      - "çok küçük yazılı karmaşık grafik"
      - "2. sınıf düzeyini aşan çok eksenli grafik"
      - "oran, yüzde veya ileri istatistik gerektiren grafik"
      - "başlıksız ve belirsiz grafik"
      - "görsel süsün veriyi gölgelediği grafik"

  metin_veya_veri_listesi:
    gerekli_varyantlarda:
      - "metindeki_bilgileri_veren_grafik"
    tipler:
      - "kısa açıklama metni"
      - "madde madde veri listesi"
      - "kişi-sayı, gün-sayı, nesne-sayı ilişkisi veren kısa bilgiler"
    cumle_sayisi_min: 2
    cumle_sayisi_max: 5
    kelime_sayisi_min: 18
    kelime_sayisi_max: 56
    kurallar:
      - "Metin veya liste grafikte hangi verilerin olması gerektiğini anlatmalıdır."
      - "Bilgiler açık ve sade olmalıdır."
      - "Doğru grafiği seçmek için metin dikkatle okunmalıdır."
      - "Metin tek başına doğru cevabı söylememeli; grafik seçenekleriyle karşılaştırma gerektirmelidir."
      - "Liste veya metin 2. sınıf düzeyine uygun olmalıdır."

  grafik_secenekleri:
    gerekli_varyantlarda:
      - "metindeki_bilgileri_veren_grafik"
    secenek_sayisi: 3
    etiketler: ["A", "B", "C"]
    stil: "kucuk_grafik_gorseli"
    kurallar:
      - "Her seçenek grafik biçiminde verilmelidir."
      - "3 grafik de biçimce paralel olmalıdır."
      - "Doğru grafik metindeki bilgileri tam karşılamalıdır."
      - "Yanlış grafikler yakın ama hatalı veri taşımalıdır."
      - "Grafik seçenekleri 2. sınıf düzeyinde okunabilir olmalıdır."
      - "Grafik seçenekleri yalnız renk veya şekil farkıyla değil, veri farkıyla ayırt edilmelidir."

  soru_koku:
    gerekli: true
    secim: "listeden_rastgele"

  secenekler:
    grafik_tabanli_varyantlarda:
      sayi: 3
      etiketler: ["A", "B", "C"]
      dogru_sayisi: 1
      stil: "kisa_yargi"
      kelime_sayisi_min: 3
      kelime_sayisi_max: 14
      kurallar:
        - "Seçenekler kısa, sade ve 2. sınıf düzeyinde olmalıdır."
        - "Doğru seçenek grafiğe dayanmalıdır."
        - "Yanlış seçenekler grafiğe yakın ama hatalı olmalıdır."
        - "Seçenekler kendi aralarında biçimce paralel olmalıdır."

