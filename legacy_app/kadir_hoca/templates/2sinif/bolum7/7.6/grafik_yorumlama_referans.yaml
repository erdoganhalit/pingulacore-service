zorluk_duzeyleri:
  kolay:
    ana_grafik:
      bilgi_yogunlugu: "dusuk"
      kurallar:
        - "Grafikte 3-4 kategori bulunmalıdır."
        - "Doğru cevap doğrudan okuma, en çok / en az bulma gibi açık görevlerden gelmelidir."
