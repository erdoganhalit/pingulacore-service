# templates/2sinif/bolum7/7.6/grafik_yorumlama_sinif2_zor_cikarilabilir_1q.yaml
# 2. Sinif — Grafik Yorumlama — ZOR — grafikten_hangisi_cikarilabilir
# Grafik zorunlu, 3 secenekli, birden fazla bilgiyi birlestirme

meta:
  id: "grafik_yorumlama_sinif2_zor_cikarilabilir"
  ad: "2. Sinif - Grafik Yorumlama (Zor) - Cikarilabilir"
  sinif_seviyesi: 2
  aciklama: "Zor duzey — grafikten hangisi cikarilabilir, 3 secenekli, birden fazla bilgiyi birlestirme"
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Istege bagli kisa baglam metni + ana grafik + soru koku + 3 secenek (zor, cikarilabilir)"

  paragraph:
    required: true
    word_count_min: 8
    word_count_max: 30
    sentence_count_min: 1
    sentence_count_max: 3
    stil: "grafik_baglam"
    background_color: "#fce8e8"
    kurallar:
      - "Baglam metni varsa kisa, sade ve aciklayici olmalidir."
      - "Baglam metni grafikteki sayilarin veya sembollerin neyi gosterdigini soyleyebilir."
      - "Baglam metni dogru secenegi tek basina vermemelidir."
      - "Baglam metni 2. sinif duzeyinde olmalidir."
      - "Grafigi okumadan cevabi acikca veren aciklama YASAK."
      - "Uzun ve karmasik paragraf YASAK."
      - "Teknik grafik dili YASAK."
      - "Ana grafik zorunludur. Grafik sade, okunabilir ve 2. sinif duzeyine uygun olmalidir."
      - "Grafik basligi acikca verilmelidir."
      - "Grafikte eksen veya kategori adlari acikca yazilmalidir."
      - "Sayisal degerler veya gorsel semboller net bicimde takip edilebilir olmalidir."
      - "Grafikte en az 3 veri noktasi bulunmalidir."
      - "Grafik cok yogun ve karmasik olmamalidir."
      - "Zor duzey: Grafikte birden fazla kategori iliskisi bulunabilir."
      - "Dogru cevap icin iki bilgiyi birlestirmek gerekebilir."
      - "En cok, en az, esitlik, fark veya kucuk toplam karsilastirmasi olabilir."
      - "Zor duzey bile en fazla 2 adimli islem yapilmalidir."
      - "Zor duzey de 2. sinif sadeligi korunmalidir."
      - "Grafik tipi: basit sutun grafik, sekil grafigi, resimli grafik, renkli cubuk grafik veya tek degiskenli karsilastirma grafigi."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 3
    word_count_max: 14
    style: "short_phrase"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Secenekler kisa, sade ve 2. sinif duzeyinde olmalidir."
      - "Dogru secenek grafige dayanmalidir."
      - "Yanlis secenekler grafige yakin ama hatali olmalidir."
      - "Secenekler kendi aralarinda bicimce paralel olmalidir."
      - "Dogru secenek grafikteki bilgilerden cikarilabilen basit bir sonuc olmalidir."
      - "Cikarim en fazla 1-2 adimli olmalidir."
      - "Soyut yorum gerektirmemelidir."
      - "2 yanlis secenek de makul gorunmelidir."
      - "1 yanlis secenek yakin karsilastirma hatasi icermelidir."
      - "1 yanlis secenek kategori veya veri eslestirme hatasi icermelidir."

soru_kokleri:
  - "<b>Grafikten aşağıdakilerden hangisi çıkarılabilir?</b>"
  - "<b>Bu grafikten hareketle aşağıdakilerden hangisi çıkarılabilir?</b>"
  - "<b>Grafikteki verilere göre aşağıdakilerden hangisine ulaşılabilir?</b>"
  - "<b>Grafik incelendiğinde aşağıdakilerden hangisi bulunabilir?</b>"
  - "<b>Aşağıdakilerden hangisi grafiğe göre belirlenebilir?</b>"

dogru_cevap:
  tanim: "Grafikteki bilgilerden cikarilabilen basit bir sonuca dayanan dogru secenek"
  kurallar:
    - "Dogru cevap grafige dayanmalidir."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru cevap 2. sinif ogrencisinin grafigi inceleyerek bulabilecegi aciklikta olmalidir."
    - "Cikarim en fazla 1-2 adimli olmalidir."
    - "Soyut yorum gerektirmemelidir."
    - "Dogru cevap icin iki bilgiyi birlestirmek gerekebilir."

celdirici_stratejileri:
  - ad: "YANLIS_KARSILASTIRMA"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "En cok, en az, daha fazla, esit gibi iliskileri yanlis kurma"
    nasil_olusturulur: |
      Grafikteki karsilastirma iliskisini yanlis yonde kur.
      Ornek: isci veli sayisi esnaftan fazladir, haziran satisi ocaktan azdir.
    kategori: "cognitive"

  - ad: "KISMI_DOGRU_KISMI_YANLIS"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Ifadenin bir kismi grafige uyar ama tamami yanlis olur"
    nasil_olusturulur: |
      Secenegin bir kismini grafige uygun, diger kismini hatali olustur.
      Ornek: en az meslek grubunu dogru soyleyip en cok grubu yanlis soylemek.
    kategori: "cognitive"

use_shared_strategies: false

visual_requirement: "answer_critical"
visual_type: "pictograph"
visual_spec:
  grafik_tipi: "bar"
  kategori_min: 3
  kategori_max: 6
hide_paragraph_after_visual: true

beceri:
  katman: "KB2"
  bilesenler: ["grafik_okuma", "basit_cikarim", "coklu_bilgi_birlestirme"]
  surec_bileseni: "bilgiyi_yorumlama"

sinif2_ek_kurallar:
  yasak_alanlar:
    - "Ana dusunce / ana duygu odakli sorular YASAK"
    - "Soyut yorum veya edebi analiz YASAK"
    - "Dis bilgi gerektiren sorular YASAK"
    - "Oran, yuzde veya ileri istatistik YASAK"
    - "2 adimdan fazla islem gerektiren yapi YASAK"
