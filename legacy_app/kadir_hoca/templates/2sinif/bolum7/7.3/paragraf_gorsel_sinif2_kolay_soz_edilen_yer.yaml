# Pattern: parcada_soz_edilen_yer (referans zorluk_duzeyleri.kolay.tercih_edilen_varyantlar[2])
# Kolay duzey, 1 soru: parcada soz edilen yeri gosteren gorseli secme

meta:
  id: paragraf_gorsel_sinif2_kolay_soz_edilen_yer
  ad: "2. Sinif - Paragraf-Gorsel Iliskisi (Kolay) - Parcada Soz Edilen Yer"
  sinif_seviyesi: 2
  aciklama: "Kolay duzey — metin + 3 gorsel secenek, parcada soz edilen yeri gosteren gorseli secme"
  frequency: "Medium"

format:
  type: llm_generated_html
  description: "Kisa metin + soru koku + 3 gorsel secenek (kolay, parcada soz edilen yer)"

  paragraph:
    required: true
    word_count_min: 38
    word_count_max: 52
    sentence_count_min: 4
    sentence_count_max: 4
    stil: "bilgilendirici_veya_oykusel"
    background_color: "#e8f8e8"
    kurallar:
      - "Metnin konusu cok acik olmalidir."
      - "Metin ile dogru gorsel arasindaki bag gorunur olmalidir."
      - "Metin tek baskin konu, olay, durum veya yer etrafinda kurulmalidir."
      - "Metin 2. sinif ogrencisinin anlayabilecegi kadar sade, acik ve somut olmalidir."
      - "Metin gorsellere cevrilebilecek net icerik tasimalidir."
      - "Metin dis bilgi gerektirmemelidir."
      - "Metinde acikca sozu edilen bir yer bulunmalidir."
      - "Metin yalniz basina dogru gorseli kesin olarak sectirmemelidir."
      - "Metin ana dusunce, gizli mesaj veya soyut yorum gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: [A, B, C]
    word_count_min: 15
    word_count_max: 50
    style: "image_description"
    image_style: "photo"
    correct_count: 1
    correct_type: "matches"

soru_kokleri:
  - "<b>Aşağıdaki görsellerden hangisi parçada sözü edilen yerlerden biridir?</b>"
  - "<b>Metinde geçen yer aşağıdaki görsellerden hangisinde verilmiştir?</b>"
  - "<b>Parçada anlatılan yer aşağıdaki görsellerden hangisi olabilir?</b>"
  - "<b>Aşağıdaki görsellerden hangisi metindeki yer ile ilgilidir?</b>"

dogru_cevap:
  tanim: "Metinde acikca sozu edilen yeri en dogru gosteren gorsel"
  kurallar:
    - "Dogru cevap metnin baskin icerigiyle uyumlu olmalidir."
    - "Dogru gorsel metinde sozu edilen yeri ya da yer turunu uygun bicimde gostermelidir."
    - "Dogru cevap yalniz metinden secilememelidir, gorsel inceleme gerektirmelidir."
    - "Dogru cevap yalniz gorsele bakilarak da secilememelidir; metin destegi gerektirmelidir."
    - "Dogru gorsel 2. sinif ogrencisinin iliski kurabilecegi aciklikta olmalidir."
    - "1 gorsel bu yeri ya da yer turunu uygun bicimde gostermelidir."
    - "Diger 2 gorsel yer bakimindan uyumsuz olmalidir."

celdirici_stratejileri:
  - ad: "YAKIN_AMA_TAM_UYUSMAYAN"
    bilisssel_hata_kategorisi: "yuzeysel_okuma"
    aciklama: "Metinle ayni genel alanda durur ama asil yere tam uymaz"
    nasil_olusturulur: |
      Metindeki yer yerine sadece nesneyi veya farkli bir yeri gosteren gorsel tasviri olustur.
      Kolay duzey: bu gorsel acikca dogru yeri gostermedigi belli olmali.
    kategori: "semantic"

  - ad: "ILGISIZ_GORSEL"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metinle acik iliski kurmayan daha uzak gorsel"
    nasil_olusturulur: |
      Metindeki yerle acik bag kurmayan, farkli turde bir yer gosteren gorsel tasviri olustur.
      Kolay duzey: bu gorsel belirgin bicimde ilgisiz olmali.
    kategori: "content"

use_shared_strategies: false

beceri:
  katman: "KB1"
  bilesenler: [gorsel_metin_eslestirme, yer_eslestirme]
  surec_bileseni: "metni_anlama"
