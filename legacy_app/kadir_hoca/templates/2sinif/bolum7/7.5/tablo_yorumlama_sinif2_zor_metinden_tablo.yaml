        - "1 tablo metindeki bilgileri tam karsilamali."
        - "2 tablo yakin ama hatali veri tasimali."
        - "Dogru cevap icin hem metin/liste hem tablo secenekleri birlikte incelenmeli."
        - "2 yanlis tablo da makul gorunmeli."
        - "1 yanlis tablo yakin toplam/karsilastirma hatasi icermeli."
        - "1 yanlis tablo satir-sutun ya da veri eslestirme hatasi icermeli."
      beceri:
