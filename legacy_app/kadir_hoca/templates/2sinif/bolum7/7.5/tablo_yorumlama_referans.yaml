      kapsar:
        - "tablodan_hangisi_soylenebilir"
        - "tablodan_hangisi_soylenemez"
        - "tablodan_hangisi_cikarilabilir"
        - "tablodan_hangisi_cikarilamaz"
      ana_kaynak: "ana_tablo"
      kurallar:
        - "Ana tablo zorunludur."
        - "Varsa bağlam metni tek başına çözüm vermemelidir."
        - "Doğru cevap tablo incelenmeden bulunamamalıdır."
        - "Tablodaki satır, sütun, sayı veya düzen çözümde gerçek işlev taşımalıdır."
    metinden_tablo_secme_varyanti:
      kapsar:
        - "metindeki_bilgileri_veren_tablo"
      ana_kaynaklar:
        - "metin_veya_veri_listesi"
        - "tablo_secenekleri"
      kurallar:
        - "Metin veya veri listesi zorunludur."
        - "3 tablo seçeneği zorunludur."
        - "Doğru cevap için hem metin/liste hem tablo seçenekleri birlikte kullanılmalıdır."
        - "Yalnız metne bakarak doğru tablo seçilememelidir."
        - "Yalnız tablo seçeneklerine bakarak da doğru cevap kesin seçilememelidir."

  baglam_metni:
    gerekli: false
    aciklama: "Tablonun neyi gösterdiğini açıklayan kısa bilgi alanı"
    cumle_sayisi_min: 1
    cumle_sayisi_max: 3
    kelime_sayisi_min: 8
    kelime_sayisi_max: 28
    kurallar:
      - "Bağlam metni varsa kısa, sade ve açıklayıcı olmalıdır."
      - "Bağlam metni tablodaki sayıların neyi ifade ettiğini söyleyebilir."
      - "Bağlam metni doğru seçeneği tek başına vermemelidir."
      - "Bağlam metni 2. sınıf düzeyinde olmalıdır."
    yasaklar:
      - "tabloyu okumadan cevabı açıkça veren açıklama"
      - "uzun ve karmaşık paragraf"
      - "teknik istatistik dili"

  ana_tablo:
    gerekli_varyantlarda:
      - "tablodan_hangisi_soylenebilir"
      - "tablodan_hangisi_soylenemez"
      - "tablodan_hangisi_cikarilabilir"
      - "tablodan_hangisi_cikarilamaz"
    tipler:
      - "iki sütunlu basit sayı tablosu"
      - "haftalık ders programı"
      - "görev / sorumluluk çizelgesi"
      - "satır-sütunlu temel veri tablosu"
      - "basit karşılaştırma tablosu"
    kurallar:
      - "Tablo sade, okunabilir ve 2. sınıf düzeyine uygun olmalıdır."
      - "Başlık, satır ve sütunlar açıkça ayırt edilebilir olmalıdır."
      - "Sayılar veya bilgiler tablodan kolayca takip edilebilir olmalıdır."
      - "Tabloda en az 3 veri noktası bulunmalıdır."
      - "Tablodaki veriler tek bir bağlam içinde olmalıdır."
      - "Doğru cevap tablo okunmadan bulunamamalıdır."
      - "Tablo çok yoğun olmamalıdır."
      - "Tablo görsel olarak düzenli olmalıdır."
    yasaklar:
      - "çok küçük yazılı kalabalık tablo"
      - "2. sınıf düzeyini aşan çok sütunlu karmaşık veri seti"
      - "renk veya süslemenin okunabilirliği bozduğu düzen"
      - "başlıksız ve belirsiz tablo"

  metin_veya_veri_listesi:
    gerekli_varyantlarda:
      - "metindeki_bilgileri_veren_tablo"
    tipler:
      - "kısa açıklama metni"
      - "madde madde veri listesi"
      - "kişi-nesne-sayı ilişkisi veren kısa bilgiler"
    cumle_sayisi_min: 2
    cumle_sayisi_max: 5
    kelime_sayisi_min: 18
    kelime_sayisi_max: 52
    kurallar:
      - "Metin veya liste tablodaki verilerin ne olması gerektiğini anlatmalıdır."
      - "Bilgiler açık ve sade olmalıdır."
      - "Doğru tabloyu seçmek için metin dikkatle okunmalıdır."
      - "Metin tek başına doğru cevabı söylememeli; tablo seçenekleriyle karşılaştırma gerektirmelidir."
      - "Liste veya metin 2. sınıf düzeyine uygun olmalıdır."

  tablo_secenekleri:
    gerekli_varyantlarda:
      - "metindeki_bilgileri_veren_tablo"
    secenek_sayisi: 3
    etiketler: ["A", "B", "C"]
    stil: "kucuk_tablo_gorseli"
    kurallar:
      - "Her seçenek tablo biçiminde verilmelidir."
      - "3 tablo da biçimce paralel olmalıdır."
      - "Doğru tablo metindeki bilgileri tam karşılamalıdır."
      - "Yanlış tablolar yakın ama hatalı veri taşımalıdır."
      - "Tablo seçenekleri 2. sınıf düzeyinde okunabilir olmalıdır."
      - "Tablo seçenekleri yalnız şekil olarak değil, veri olarak ayırt edilmelidir."

  soru_koku:
    gerekli: true
    secim: "listeden_rastgele"

  secenekler:
    tablo_tabanli_varyantlarda:
      sayi: 3
      etiketler: ["A", "B", "C"]
      dogru_sayisi: 1
      stil: "kisa_yargi"
      kelime_sayisi_min: 3
      kelime_sayisi_max: 14
      kurallar:
        - "Seçenekler kısa, sade ve 2. sınıf düzeyinde olmalıdır."
        - "Doğru seçenek tabloya dayanmalıdır."
        - "Yanlış seçenekler tabloya yakın ama hatalı olmalıdır."
        - "Seçenekler kendi aralarında biçimce paralel olmalıdır."

