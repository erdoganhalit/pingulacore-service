meta:
  id: "tablo_yorumlama_sinif2_tablo_merkezli_uc_secenekli"
  ad: "Tablo Yorumlama"
  sinif_seviyesi: 2
  ders: "Türkçe"
  bolum: "2. Sınıf Paragraf Soru Bankası"
  alt_bolum: "7.5 Tablo Yorumlama"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    2. sınıf öğrencisi için tabloda verilen verileri okuyup yorumlayarak
    söylenebilen, söylenemeyen, çıkarılabilen veya çıkarılamayan bilgileri
    ayırt ettirmeye; ayrıca metindeki bilgileri içeren tabloyu seçtirmeye
    yönelik, tablo zorunlu ve 3 seçenekli standart soru üretim şablonu.
  kullanim_notu: >
    Bu şablonda tablo soru çözümünün ana kaynağıdır. Varsa kısa bağlam metni
    yalnız yönlendirme yapar; tek başına çözüm sağlamaz. Metinden tablo seçme
    varyantında ise hem metin hem tablo seçenekleri birlikte kullanılmalıdır.
    Harici 2. Sınıf TYMM Ortak Kuralları ile birlikte doğrulanmalıdır.

format:
  tip: "llm_generated_html"
  aciklama: "İsteğe bağlı kısa bağlam metni + ana tablo veya tablo seçenekleri + soru kökü + 3 seçenek"

  soru_varyanti:
    izinli:
      - "tablodan_hangisi_soylenebilir"
      - "tablodan_hangisi_soylenemez"
      - "tablodan_hangisi_cikarilabilir"
      - "tablodan_hangisi_cikarilamaz"
      - "metindeki_bilgileri_veren_tablo"
    varsayilan: "tablodan_hangisi_soylenebilir"

  cozum_kaynagi_politikasi:
