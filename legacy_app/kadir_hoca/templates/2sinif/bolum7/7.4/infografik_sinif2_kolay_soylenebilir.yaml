  kurallar:
    - "Dogru cevap infografikteki bilgiye dayanmalidir."
    - "Dogru cevap yalniz ust metinden cikarilamamalidir."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru cevap yorumdan cok gozlem ve basit cikarima dayanmalidir."
    - "1 secenek infografikten desteklenmelidir."
    - "Diger 2 secenek ya infografikte yok ya da kismen bozuktur."

