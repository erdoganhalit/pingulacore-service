# templates/2sinif/bolum7/7.2/gorsel_inceleme_sinif2_orta_soylenemez_1q.yaml
# 2. Sinif — Gorsel Inceleme — ORTA — hangisi_soylenemez varyanti
# Gorsel zorunlu, paragraf yok, 3 secenekli

meta:
  id: "gorsel_inceleme_sinif2_orta_soylenemez"
  ad: "2. Sinif - Gorsel Inceleme (Orta) - Hangisi Soylenemez"
  sinif_seviyesi: 2
  aciklama: "Orta duzey — gorsel inceleme, hangisi soylenemez varyanti, 3 secenekli"
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Tek gorsel + kisa soru koku + 3 secenek (orta, hangisi_soylenemez)"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 60
    sentence_count_min: 3
    sentence_count_max: 5
    stil: "gorsel_sahne_tasviri"
    kurallar:
      - "Bu paragraf gorselde gosterilecek sahneyi TASVIR eder."
      - "Sahne bir gunluk yasam sahnesi olmalidir (park, okul, ev, doga)."
      - "En az 3 somut bilgi icermelidir: kisi sayisi, nesne, eylem, yer, mevsim."
      - "En az 1 bilgi gorselden CIKARILAMAMALI (soru icin gerekli)."
      - "2. sinif ogrencisinin anlayabilecegi sade dil kullanilmalidir."
      - "Soyut kavramlar ve dis bilgi gerektiren ifadeler YASAK."

  visual:
    required: true
    placement: "top"
    detail_density: "medium"
    kurallar:
      - "Gorselde birkac farkli ayrinti bulunabilir."
      - "Dogru cevap icin ogrenci sayma, karsilastirma veya kisa yorum yapabilir."
      - "Gorsel hala sade ve 2. sinif duzeyinde olmalidir."
      - "Gorsel soru cozumunun ana ve zorunlu kaynagi olmalidir."
      - "Gorsel tek bakista anlasilir ama dikkatli inceleme gerektirir olmalidir."
      - "Gorselde en az 3 acik bilgi cikarilabilir olmalidir."
      - "Gorselde en az 1 ulasilamayan bilgi alani da bulunabilmelidir."
      - "Kisi, nesne, hareket, sayi, yer veya mevsim gibi acik ipuclari bulunabilir."
      - "Gorsel sade olmali, gereksiz susleme icermemelidir."
      - "Gorseldeki karakterler ve nesneler ayirt edilebilir olmalidir."
    yasaklar:
      - "dekoratif ama bilgi tasimayan gorsel"
      - "asiri kalabalik ve karisik sahne"
      - "tek bakista tum secenekleri acikca eleyen asiri basit kurgu"
      - "2. sinif duzeyini asan karmasik infografik veya coklu panel"
      - "gorsel disinda dis bilgi gerektiren sahne"
    visual_type_allowed:
      - "tek sahneli gunluk yasam gorseli"
      - "oyun oynayan cocuklar sahnesi"
      - "park / okul / ev / doga sahnesi"
      - "hayvan veya nesne duzeni"
      - "basit etkinlik sahnesi"
      - "insan ve nesne iliskisi iceren sahne"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 3
    word_count_max: 10
    style: "short_statement"
    correct_count: 1
    correct_type: "does_not_belong"
    kurallar:
      - "Her soruda 3 secenek olmalidir."
      - "Secenekler kisa, sade ve 2. sinif duzeyinde olmalidir."
      - "Dogru secenek gorselden ulasilamayan bilgi olmalidir."
      - "Diger 2 secenek gorselden dogrulanabilir olmalidir."
      - "Secenekler kendi aralarinda bicimce paralel olmalidir."
      - "En az 1 yanlis secenek ilk bakista makul gorunmelidir."

soru_kokleri:
  - "<b>Bu görselden hareketle aşağıdakilerden hangisi <u>söylenemez</u>?</b>"
  - "<b>Görsele göre aşağıdakilerden hangisine <u>ulaşılamaz</u>?</b>"
  # KULLANILDI: - "<b>Bu görsele bakılarak aşağıdakilerden hangisi <u>söylenemez</u>?</b>"
  - "<b>Aşağıdakilerden hangisi bu görselden <u>çıkarılmaz</u>?</b>"
  - "<b>Görsel incelendiğinde aşağıdakilerden hangisine <u>ulaşılamaz</u>?</b>"

soru_varyanti: "hangisi_soylenemez"

soru_varyanti_kurallari:
  - "Dogru secenek gorselden ulasilamayan bilgi olmalidir."
  - "Diger 2 secenek gorselden dogrulanabilir olmalidir."

dogru_cevap:
  tanim: "Gorselde gercekten bulunmayan veya gorselden cikarilmayan bilgi"
  kurallar:
    - "Dogru cevap gorselde gercekten bulunmayan veya gorselden cikarilmayan bilgi olmalidir."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru cevap 2. sinif ogrencisinin gorsele bakarak belirleyebilecegi aciklikta olmalidir."

celdirici_stratejileri:
  - ad: "GORSELLE_CELISIR"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Gorselde acikca yanlis olan bilgi"
    nasil_olusturulur: |
      Gorselde acikca gorulen ve dogrulanabilen bir bilgiyi secenek olarak sun (bu dogru degil, celdirici).
      Orta duzey: en az 1 celdirici ilk bakista soylenemez gibi gorunebilir.
    kategori: "visual_conflict"

  - ad: "YAKIN_AMA_YANLIS_SAYMA"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Gorselde sayilabilir bir ogeyi bir eksik ya da bir fazla verme"
    nasil_olusturulur: |
      Gorselden dogrulanabilen ama sayisi yakin olan bilgiyi celdirici olarak sun.
      Orta duzey: dikkatli sayma ile ayirt edilebilir olmalidir.
    kategori: "counting_error"

use_shared_strategies: false

visual_requirement: "answer_critical"
visual_type: "scene"
visual_spec:
  scene_type: "gunluk_yasam"
  kisi_sayisi_min: 2
  kisi_sayisi_max: 5
  bilgi_sayisi_min: 3
hide_paragraph_after_visual: true

beceri:
  katman: "KB1"
  bilesenler: ["gorselden_bilgi_cikarma", "gorselden_ulasilabilen_ulasilamayan_bilgiyi_ayirt_etme"]
  surec_bileseni: "gorseli_anlama"

sinif2_ek_kurallar:
  sadece_gorselle_cozum_gerekli: true
  sadece_metinle_cozum_yasak: true
  yasak_alanlar:
    - "Ana dusunce, mesaj veya soyut yorum sorusu YASAK"
    - "Dis bilgi gerektiren soru YASAK"
    - "Gorsel olmadan cozulebilir soru YASAK"
