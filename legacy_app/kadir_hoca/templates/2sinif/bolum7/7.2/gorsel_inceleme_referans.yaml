meta:
  id: "gorsel_inceleme_sinif2_gorsel_zorunlu_uc_secenekli"
  ad: "Görsel İnceleme"
  sinif_seviyesi: 2
  ders: "Türkçe"
  bolum: "2. Sınıf Paragraf Soru Bankası"
  alt_bolum: "7.2 Görsel İnceleme"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    2. sınıf öğrencisi için tek bir görseli dikkatle inceleyerek görselden
    ulaşılabilen ve ulaşılamayan bilgileri ayırt ettirmeye yönelik,
    görsel zorunlu ve 3 seçenekli standart soru üretim şablonu.
  kullanim_notu: >
    Bu şablonda soru görsel incelenmeden çözülememelidir. Doğru cevap,
    görselde açıkça görülen bilgiye ya da görselden doğrudan çıkarılabilen
    basit sonuca dayanmalıdır. Harici 2. Sınıf TYMM Ortak Kuralları ile birlikte
    doğrulanmalıdır.

format:
  type: "llm_generated_html"
  description: "Tek görsel + kısa soru kökü + 3 seçenek"

  sadece_gorselle_cozum_gerekli: true
  sadece_metinle_cozum_yasak: true

  soru_varyanti:
    allowed:
      - "hangisi_dogrudur"
      - "hangisi_yanlistir"
      - "hangisi_soylenebilir"
      - "hangisi_soylenemez"
      - "hangi_bilgiye_ulasilabilir"
      - "hangi_bilgiye_ulasilamaz"
    default: "hangisi_soylenebilir"

  visual:
    required: true
    description: "İncelenerek bilgi çıkarılabilecek tek ana görsel"
    placement: "top"
    visual_type_allowed:
      - "tek sahneli günlük yaşam görseli"
      - "oyun oynayan çocuklar sahnesi"
      - "park / okul / ev / doğa sahnesi"
      - "hayvan veya nesne düzeni"
      - "basit etkinlik sahnesi"
      - "insan ve nesne ilişkisi içeren sahne"
    kurallar:
      - "Görsel soru çözümünün ana ve zorunlu kaynağı olmalıdır."
      - "Görsel tek bakışta anlaşılır ama dikkatli inceleme gerektirir olmalıdır."
      - "Görselde en az 3 açık bilgi çıkarılabilir olmalıdır."
      - "Görselde en az 1 ulaşılamayan bilgi alanı da bulunabilmelidir."
      - "Kişi, nesne, hareket, sayı, yer veya mevsim gibi açık ipuçları bulunabilir."
      - "Görsel sade olmalı, gereksiz süsleme içermemelidir."
      - "Görseldeki karakterler ve nesneler ayırt edilebilir olmalıdır."
      - "Görsel, seçenekleri ayırt etmede gerçekten etkili olmalıdır."
      - "Doğru cevap görsel dikkatle incelenmeden bulunamamalıdır."
    yasaklar:
      - "dekoratif ama bilgi taşımayan görsel"
      - "aşırı kalabalık ve karışık sahne"
      - "tek bakışta tüm seçenekleri açıkça eleyen aşırı basit kurgu"
      - "2. sınıf düzeyini aşan karmaşık infografik veya çoklu panel"
      - "görsel dışında dış bilgi gerektiren sahne"

  soru_metni:
    required: true
    length: "short"
    kurallar:
      - "Soru metni kısa olmalıdır."
      - "Soru metni yalnız yönlendirme yapmalı, cevabı açıklamamalıdır."
      - "Soru metni öğrenciyi görseli incelemeye yönlendirmelidir."
      - "Soru metni görselde olmayan bilgileri açıklayarak ipucu vermemelidir."

  options:
    count: 3
    labels: ["A", "B", "C"]
    correct_count: 1
    style: "short_statement"
    word_count_min: 3
    word_count_max: 10
    kurallar:
      - "Her soruda 3 seçenek olmalıdır."
      - "Seçenekler kısa, sade ve 2. sınıf düzeyinde olmalıdır."
      - "Doğru seçenek görselden doğrudan doğrulanabilmelidir."
      - "Yanlış seçenekler görselle çelişmeli ya da görselden çıkarılamayan bilgi içermelidir."
      - "Seçenekler kendi aralarında biçimce paralel olmalıdır."
      - "Sayı, kişi, nesne, yer, eylem veya mevsim odaklı ifadeler kullanılabilir."
      - "Sadece kelime oyunu veya dil tuzağı içeren seçenekler kullanılmamalıdır."

