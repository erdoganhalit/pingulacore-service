      kurallar:
        - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
        - "Yanlış seçenekler yakın sayma hatası veya ulaşılamayan bilgi içerebilir."
    difficulty_note: >
      Orta düzeyde öğrenci görseli daha dikkatli inceleyerek hangi bilginin çıkarılabildiğini
      ya da çıkarılamadığını ayırt eder.

  zor:
    visual:
      detail_density: "medium_high"
      kurallar:
        - "Görselde birden fazla kişi, nesne veya etkinlik olabilir."
        - "Doğru cevap için öğrenci birden fazla ayrıntıyı birlikte düşünmelidir."
        - "Zor düzeyde bile görsel karmaşık değil, yalnızca dikkat gerektirici olmalıdır."
