        - "Cevabı açıklama"
    - step: 5
      action: "1 doğru ve 2 yanlış seçenek oluştur"
      details:
        - "Yanlışlardan biri görselle çelişebilir"
        - "Yanlışlardan biri görselden ulaşılamayan bilgi içerebilir"
        - "Gerekirse yakın sayma hatası kullan"
    - step: 6
      action: "Şıkları A-B-C olarak karıştır"
    - step: 7
      action: "Sorunun yalnız görsel üzerinden çözüldüğünü doğrula"
      details:
