      detail_density: "medium"
      kurallar:
        - "Görselde birkaç farklı ayrıntı bulunabilir."
        - "Doğru cevap için öğrenci sayma, karşılaştırma veya kısa yorum yapabilir."
        - "Görsel hâlâ sade ve 2. sınıf düzeyinde olmalıdır."
