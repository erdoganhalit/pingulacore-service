  description: "Gorselli soru (orta): aile semasi + bilgi bloku + 3 secenek"
  paragraph:
    required: true
    word_count_min: 20
    word_count_max: 45
    sentence_count_min: 1
    sentence_count_max: 3
    stil: "bilgi_bloku"
    background_color: "#f8f0e0"
    kurallar:
      - "Bilgi bloku yalniz temel aile iliskilerini aciklayan kisa cumleler icermelidir."
      - "Izinli iliski alani: anne, baba, cocuk, kardes, dede, nine."
      - "Ipuclari kisa ve dogrudan olmalidir."
      - "Bilgi bloku tek basina cevabi vermemelidir."
      - "En fazla 5 kisi kullanilabilir."
      - "Dede veya nine eklenebilir."
      - "En fazla 2 kisa ipucu kullanilmalidir."
      - "2. sinif ogrencisinin anlayabilecegi sadelikte olmalidir."
  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"
  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 2
    word_count_max: 8
    style: "kisa_yargi"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Secenekler temel aile iliskisi veya cocuk sayisi gibi acik bilgiler icermelidir."
      - "Yalniz bir secenek tum gorsel ve bilgilerle uyumlu olmalidir."
      - "Yanlis secenekler temel bir iliski hatasi tasimalidir."
      - "Secenekler kendi aralarinda bicimce paralel olmalidir."
      - "En az 1 yanlis secenek ilk bakista makul gorunmelidir."

soru_kokleri:
  - "<b>Buna göre aile şeması ile ilgili aşağıdakilerden hangisi doğrudur?</b>"
  - "<b>Buna göre aşağıdaki bilgilerden hangisi yanlıştır?</b>"
  - "<b>Aile şemasına göre aşağıdakilerden hangisi söylenebilir?</b>"

dogru_cevap:
  tanim: "Gorsel ve bilgi blokundan acikca cikarilabilen dogru aile iliskisi bilgisi"
  kurallar:
    - "Dogru cevap gorsel ve bilgi blokundaki acik bilgiye dayanmalidir."
    - "Dogru cevap icin gorsel ve bilgi blokunun birlikte degerlendirilmesi gerekmelidir."
    - "Yanlis seceneklerden en az biri ilk bakista makul gorunmelidir."

celdirici_stratejileri:
  - ad: "ILISKI_HATASI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Aile iliskisini yanlis yorumlayan secenek"
    nasil_olusturulur: |
      Gorseldeki bir kisiyi yanlis aile rolunde gosteren secenek olustur.
      Orta duzey: iliski hatasi dikkatli okuyan ogrenci tarafindan elenebilir ama yuzeysel bakista makul gorunebilir.
    kategori: "semantic"

  - ad: "SAYI_HATASI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Cocuk, kardes veya torun sayisini yanlis veren secenek"
    nasil_olusturulur: |
      Gorseldeki kisi sayisini veya iliskiyi yanlis belirten secenek olustur.
      Orta duzey: sayi hatasi gorsel ve bilgi bloku birlikte degerlendirildiginde anlasilir.
    kategori: "cognitive"

use_shared_strategies: false

