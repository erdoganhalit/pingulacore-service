    - "Kayin akrabaligi (kayinbaba, kayinvalide, eniste, gelin) YASAK"
    - "Kuzen, dayi, hala, teyze, amca zinciri YASAK"
    - "Cok kusakli karmasik genis aile YASAK"
    - "Cok adimli iliski cozumu YASAK"
