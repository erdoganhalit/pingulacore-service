# Kolay duzey — metin_ipucuyla_hangi_anlam varyanti
# Referans: sekil_sembol_ve_isaretler_referans.yaml → zorluk_duzeyleri.kolay

meta:
  id: "sekil_sembol_sinif2_kolay_hangi_anlam"
  ad: "2. Sinif - Sekil Sembol Isaretler (Kolay) - Hangi Anlam"
  sinif_seviyesi: 2
  aciklama: "Kolay duzey — metin_ipucuyla_hangi_anlam: Gorseldeki sembol ve metindeki bilgilere gore anlam secme. 2 sembol, cift kaynakli."
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Gorsel (2 sembol) + kisa metin blogu + soru koku + 3 secenek (kolay, hangi anlam)"

  paragraph:
    required: true
    word_count_min: 15
    word_count_max: 35
    sentence_count_min: 2
    sentence_count_max: 4
    stil: "kisa_aciklama"
    background_color: "#e8f8e8"
    kurallar:
      - "Paragraf IKI BOLUMLUK olmali:"
      - "BOLUM 1 — SEMBOL TANIMLARI: 2-3 sembol/isaret ve anlamlari aciklanir."
      - "BOLUM 2 — SENARYO: Bir karakter veya durum verilir, sembol durumlarini dolayli belirtir."
      - "Senaryo tek basina TUM sembollerin durumunu kesin verMEMELI."
      - "2. sinif duzeyinde sade, gunluk hayata yakin semboller kullan."
      - "Semboller: trafik isaretleri, hava durumu, telefon ikonlari, geri donusum, guvenlik isareti gibi."
      - "Soyut veya teknik semboller YASAK."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 1
    word_count_max: 8
    style: "short_phrase"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Her soruda 3 secenek olmalidir."
      - "Dogru secenek yalniz gorsel ve metin birlikte kullanildiginda bulunabilmelidir."
      - "Yanlis secenekler gorsel veya metinden birine kismen uyabilir; fakat ikisine birden uymamaiidir."
      - "Secenekler 2. sinif duzeyinde kisa ve sade olmalidir."
      - "Secenekler kendi aralarinda acikca karsilastirilabilir olmalidir."
      - "1 secenek gorsele yakin ama metne aykiri olmalidir."
      - "1 secenek metne yakin ama gorsele aykiri olmalidir."

soru_kokleri:
  - "<b>Görseldeki sembol ve metindeki bilgilere göre bu işaret hangi anlama gelir?</b>"
  - "<b>Şekle ve açıklamaya göre doğru anlam hangisidir?</b>"
  # KULLANILDI: - "<b>Gorsel ile metin birlikte incelendiginde bu sembol neyi gosterir?</b>"
  # KULLANILDI: - "<b>Asagidakilerden hangisi gorseldeki isaretin metne uygun anlamidir?</b>"

dogru_cevap:
  tanim: "Yalniz gorsel ve metin birlikte incelendiginde bulunabilen dogru anlam"
  kurallar:
    - "Dogru cevap gorseldeki bicimsel bilgi ile metindeki aciklamanin birlesimne dayanmalidir."
    - "Dogru cevap yalniz metinden cikarilamamalidir."
    - "Dogru cevap yalniz gorselden cikarilamamalidir."
    - "Dogru cevap 2. sinif ogrencisinin iki kaynagi birlikte kullanarak bulabilecegi aciklikta olmalidir."
    - "Sembol gorselde verilmeli, metin ise anlam alanini daraltmalidir."
    - "Secenekler arasinda yalniz biri hem sembole hem metne uymalidir."

celdirici_stratejileri:
  - ad: "METNE_YAKIN_GORSELE_AYKIRI"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metindeki aciklamaya yakin gorunur ama gorseldeki sembole uymaz"
    nasil_olusturulur: |
      Metindeki aciklamaya yakin gorunen ama gorseldeki sembole uymayan secenegi olustur.
      Kolay duzey: bu secenek acikca yanlis oldugu belli olmali.
    kategori: "semantic"

  - ad: "GORSELE_YAKIN_METNE_AYKIRI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Gorseldeki sembole yakin gorunur ama metindeki aciklamaya uymaz"
    nasil_olusturulur: |
      Gorseldeki sembole yakin gorunen ama metindeki aciklamaya uymayan secenegi olustur.
      Kolay duzey: bu secenek acikca yanlis oldugu belli olmali.
    kategori: "cognitive"

use_shared_strategies: false

visual_requirement: "answer_critical"
visual_type: "symbol_pair"
visual_spec:
  sembol_sayisi: 2
  aciklama: "Iki farkli sembol, kolayca ayirt edilebilir, kitap kenari isareti gibi"

beceri:
  katman: "KB1"
  bilesenler: ["sembol_anlamlandirma", "cift_kaynak_okuma"]
  surec_bileseni: "metni_anlama"

sinif2_ek_kurallar:
  cift_kaynak:
    - "Soru yalniz metin okunarak cozulemez."
    - "Soru yalniz gorsel incelenerek cozulemez."
    - "Dogru cevap icin hem gorsel hem metin birlikte kullanilmalidir."
  gorsel:
    sembol_sayisi_min: 2
    sembol_sayisi_max: 2
    kurallar:
      - "Semboller birbirinden acikca farkli olmalidir."
      - "Gorsel sade olmali, gereksiz susleme icermemelidir."
      - "Semboller net, buyuk ve tek bakista ayirt edilebilir olmalidir."
  yasak_alanlar:
    - "Yalniz gorsele bakilarak cevap secme YASAK"
    - "Yalniz metin okunarak cevap secme YASAK"
    - "2. sinif duzeyini asan teknik ikon kumeleri YASAK"
