meta:
  id: "sekil_sembol_isaretler_sinif2_cift_kaynakli_gorsel_metin_uc_secenekli"
  ad: "Şekil, Sembol ve İşaretler"
  sinif_seviyesi: 2
  ders: "Türkçe"
  bolum: "2. Sınıf Paragraf Soru Bankası"
  alt_bolum: "7.1 Şekil, Sembol ve İşaretler"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    2. sınıf öğrencisi için günlük hayatta kullanılan şekil, sembol ve işaretlerin
    anlamlarını hem görsel hem de kısa metinsel bilgiler birlikte incelenerek
    çözdüren, 3 seçenekli standart soru üretim şablonu.
  kullanim_notu: >
    Bu şablonda soru yalnız metin okunarak çözülemez. Yalnız görsele bakılarak da
    çözülemez. Doğru cevap için hem görsel hem metin birlikte incelenmelidir.
    Harici 2. Sınıf TYMM Ortak Kuralları ile birlikte doğrulanmalıdır.

format:
  tip: "llm_generated_html"
  aciklama: "Ana görsel + kısa metinsel bilgi alanı + soru kökü + 3 seçenek"

  cift_kaynak_zorunlu: true
  sadece_gorselle_cozum_yasak: true
  sadece_metinle_cozum_yasak: true

  soru_varyanti:
    izinli:
      - "dogru_eslestirme"
      - "eslestirme_sekli"
      - "metin_ipucuyla_hangi_sembol"
      - "metin_ipucuyla_hangi_anlam"
      - "gorsel_metin_birlikte_sonuc"
    varsayilan: "dogru_eslestirme"

  gorsel:
    gerekli: true
    aciklama: "Sembollerin, işaretlerin veya şekillerin açık biçimde verildiği ana görsel alan"
    konum: "ust"
    izinli_gorsel_turleri:
      - "2-3 sembollü eşleştirme alanı"
      - "uyarı/işaret kartı"
      - "erişilebilirlik sembolleri"
      - "hava durumu sembolleri"
      - "trafik işaretleri"
      - "ambalaj işaretleri"
      - "akıllı işaretler"
    kurallar:
      - "Görsel soru çözümünün zorunlu kaynaklarından biri olmalıdır."
      - "Görsel tek başına doğru cevabı vermemelidir."
      - "Semboller net, büyük ve tek bakışta ayırt edilebilir olmalıdır."
      - "Görsel sade olmalı, gereksiz süsleme içermemelidir."
      - "Eşleştirme sorularında her sembol açıkça ayrı konumda verilmelidir."
      - "Şekiller, bağlantılar veya sembol ayrımları öğrencinin takip edebileceği kadar açık olmalıdır."
      - "Görsel yanlış seçeneği destekleyecek kadar karışık olmamalıdır."
      - "Renk kullanılıyorsa tek ayırt edici unsur yalnız renk olmamalıdır; biçim de farklı olmalıdır."
    yasaklar:
      - "yalnız görsele bakınca cevabın doğrudan seçilebildiği kurgu"
      - "çok fazla sembol içeren yoğun pano"
      - "birbirinden ayırt edilmesi çok zor ikonlar"
      - "2. sınıf düzeyini aşan teknik ikon kümeleri"

  metin_blogu:
    gerekli: true
    aciklama: "Görseldeki sembollerle ilişkili kısa açıklamalar, ipuçları veya anlam alanı"
    uzunluk: "kısa"
    kurallar:
      - "Metin soru çözümünün zorunlu kaynaklarından biri olmalıdır."
      - "Metin tek başına doğru cevabı vermemelidir."
      - "Metin yalnız yönlendirme ve anlam alanı sağlamalıdır."
      - "Metin kısa, sade ve 2. sınıf düzeyinde olmalıdır."
      - "Metin görseldeki sembolleri anlamlandırmada gerekli olmalıdır."
      - "Metin, öğrenciyi görseli incelemeye mecbur bırakmalıdır."
      - "Metin ile görsel arasında açık ilişki bulunmalıdır."
    yasaklar:
      - "sembolü açıkça tarif ederek cevabı doğrudan verme"
      - "görsel olmadan çözümü mümkün kılan tam açıklama"
      - "uzun tanım paragrafları"
      - "çok teknik terimler"

  kaynaklar_arasi_bag_kurallari:
    zorunlu:
      - "Doğru cevap için görseldeki biçimsel bilgi ile metindeki açıklama birlikte kullanılmalıdır."
      - "Görsel kaldırıldığında soru çözülememelidir."
      - "Metin kaldırıldığında soru çözülememelidir."
      - "Görsel ve metin birbirini tamamlamalıdır."
      - "Her iki kaynak da çözümde gerçek işlev taşımalıdır."
    yasak:
      - "metnin sadece yönerge olduğu ve çözümün tamamen görselden çıktığı kurgu"
      - "görselin sadece süs olduğu ve çözümün tamamen metinden çıktığı kurgu"
      - "iki kaynaktan birinin işe yaramadığı yapılar"

  soru_koku:
    gerekli: true
    secim: "listeden_rastgele"

  secenekler:
    sayi: 3
    etiketler: ["A", "B", "C"]
    dogru_sayisi: 1
    stil_varyanta_gore:
      dogru_eslestirme: "eslestirme_ifadesi"
      eslestirme_sekli: "kucuk_baglanti_sekli"
      metin_ipucuyla_hangi_sembol: "kisa_sembol_etiketi_veya_kucuk_sembol"
      metin_ipucuyla_hangi_anlam: "kisa_anlam_ifadesi"
      gorsel_metin_birlikte_sonuc: "kisa_birlesik_sonuc"
    kelime_sayisi_min: 1
    kelime_sayisi_max: 8
    kurallar:
      - "Her soruda 3 seçenek olmalıdır."
      - "Doğru seçenek yalnız görsel ve metin birlikte kullanıldığında bulunabilmelidir."
      - "Yanlış seçenekler görsel veya metinden birine kısmen uyabilir; fakat ikisine birden uymamalıdır."
      - "Seçenekler 2. sınıf düzeyinde kısa ve sade olmalıdır."
      - "Eşlestirme_sekli varyantında üç seçenek de biçimce paralel küçük eşleştirme şekilleri olmalıdır."
      - "Seçenekler kendi aralarında açıkça karşılaştırılabilir olmalıdır."

