# Orta duzey — dogru_eslestirme varyanti
# Referans: sekil_sembol_ve_isaretler_referans.yaml → zorluk_duzeyleri.orta

meta:
  id: "sekil_sembol_sinif2_orta_dogru_eslestirme"
  ad: "2. Sinif - Sekil Sembol Isaretler (Orta) - Dogru Eslestirme"
  sinif_seviyesi: 2
  aciklama: "Orta duzey — dogru_eslestirme: Semboller ile anlamlar dogru eslestirildiginde dogru secenegi bulma. 2-3 sembol, cift kaynakli."
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Gorsel (2-3 sembol) + kisa metin blogu + soru koku + 3 secenek (orta, dogru eslestirme)"

  paragraph:
    required: true
    word_count_min: 20
    word_count_max: 45
    sentence_count_min: 2
    sentence_count_max: 5
    stil: "kisa_aciklama"
    background_color: "#f8f0e0"
    kurallar:
      - "Paragraf IKI BOLUMLUK olmali:"
      - "BOLUM 1 — SEMBOL TANIMLARI: 2-3 sembol/isaret ve anlamlari aciklanir."
      - "BOLUM 2 — SENARYO: Bir karakter veya durum verilir, sembol durumlarini dolayli belirtir."
      - "Senaryo tek basina TUM sembollerin durumunu kesin verMEMELI."
      - "2. sinif duzeyinde sade, gunluk hayata yakin semboller kullan."
      - "Semboller: trafik isaretleri, hava durumu, telefon ikonlari, geri donusum, guvenlik isareti gibi."
      - "Soyut veya teknik semboller YASAK."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 10
    word_count_max: 40
    style: "image_description"
    image_style: "photo"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Her soruda 3 secenek olmalidir."
      - "Dogru secenek yalniz gorsel ve metin birlikte kullanildiginda bulunabilmelidir."
      - "Yanlis secenekler gorsel veya metinden birine kismen uyabilir; fakat ikisine birden uymamaiidir."
      - "Secenekler 2. sinif duzeyinde kisa ve sade olmalidir."
      - "Secenekler kendi aralarinda acikca karsilastirilabilir olmalidir."
      - "En az 1 yanlis secenek ilk bakista makul gorunmelidir."
      - "Yanlis secenekler cift kaynakli dikkat gerektirmelidir."

soru_kokleri:
  # KULLANILDI: - "<b>Görseldeki semboller ve metindeki anlamlar doğru eşleştirildiğinde aşağıdakilerden hangisi doğru olur?</b>"
  # KULLANILDI: - "<b>Sekiller ile verilen anlamlar dogru eslestirildiginde hangi secenek olusur?</b>"
  # KULLANILDI: - "<b>Görsel ve metindeki bilgiler birlikte düşünüldüğünde doğru eşleştirme hangisidir?</b>"
  # KULLANILDI: - "<b>Semboller ile açıklamalar doğru eşleştirildiğinde aşağıdakilerden hangisi seçilir?</b>"
  - "<b>Görselde verilen şekiller ile metindeki ifadeler doğru eşleştirilirse hangi seçenek doğru olur?</b>"

dogru_cevap:
  tanim: "Yalniz gorsel ve metin birlikte incelendiginde bulunabilen dogru eslestirme"
  kurallar:
    - "Dogru cevap gorseldeki bicimsel bilgi ile metindeki aciklamanin birlesimne dayanmalidir."
    - "Dogru cevap yalniz metinden cikarilamamalidir."
    - "Dogru cevap yalniz gorselden cikarilamamalidir."
    - "Dogru cevap 2. sinif ogrencisinin iki kaynagi birlikte kullanarak bulabilecegi aciklikta olmalidir."
    - "2 veya 3 sembol ve 2 veya 3 anlam ayni duzende verilmelidir."
    - "Ogrenci metindeki aciklamalari okuyup gorseldeki sembollerle dogru iliski kurmalidir."
    - "Eslestirme sorularinda dogru cevap baglanti duzenini tam yansitmalidir."

celdirici_stratejileri:
  - ad: "YANLIS_ESLESTIRME"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Eslestirmelerin bir veya iki baglantisi yanlis olan secenek"
    nasil_olusturulur: |
      Dogru eslestirmedeki bir veya iki baglanti yonunu degistirerek yanlis eslestirme olustur.
      Orta duzey: dikkatli okuyan ogrenci eleyebilir ama yuzeysel okuyan yanilabilir.
    kategori: "semantic"

  - ad: "METNE_YAKIN_GORSELE_AYKIRI"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metindeki aciklamaya yakin gorunur ama gorseldeki sembole uymaz"
    nasil_olusturulur: |
      Metindeki aciklamaya yakin gorunen ama gorseldeki sembole uymayan eslestirme olustur.
      Orta duzey: en az 1 yanlis secenek ilk bakista makul gorunmelidir.
    kategori: "cognitive"

use_shared_strategies: false

visual_requirement: "answer_critical"
visual_type: "symbol_pair"
visual_spec:
  sembol_sayisi: 3
  aciklama: "2-3 sembol ve anlamlari, eslestirme gerektiren"

beceri:
  katman: "KB1"
  bilesenler: ["sembol_anlamlandirma", "cift_kaynak_okuma", "eslestirme"]
  surec_bileseni: "metni_anlama"

sinif2_ek_kurallar:
  cift_kaynak:
    - "Soru yalniz metin okunarak cozulemez."
    - "Soru yalniz gorsel incelenerek cozulemez."
    - "Dogru cevap icin hem gorsel hem metin birlikte kullanilmalidir."
  gorsel:
    sembol_sayisi_min: 2
    sembol_sayisi_max: 3
    kurallar:
      - "Gorselde 2 veya 3 sembol bulunabilir."
      - "Gorsel sade olmali, gereksiz susleme icermemelidir."
      - "Semboller net, buyuk ve tek bakista ayirt edilebilir olmalidir."
  yasak_alanlar:
    - "Yalniz gorsele bakilarak cevap secme YASAK"
    - "Yalniz metin okunarak cevap secme YASAK"
    - "2. sinif duzeyini asan teknik ikon kumeleri YASAK"
