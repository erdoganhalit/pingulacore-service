  - "2. sınıf seviyesine uygun kısa ve açık cümleler kullanılmalıdır."
  - "İpuçları kısa ve tek anlamlı olmalıdır."
  - "Kişi sayısı 4 ile sınırlı tutulmalıdır."
  - "Numaralı yerler açıkça seçilebilir olmalıdır."
  - "Görsel ve ipuçları birlikte kullanılmadan çözüm kesinleşmemelidir."
  - "3 seçenekli yapıda iki çeldirici de güçlü olmalıdır."
  - "Seçenekler aynı temsil düzeyinde, yani hepsi yerleşim cümlesi biçiminde olmalıdır."
  - "Birden fazla doğru seçeneğe izin verilmemelidir."

