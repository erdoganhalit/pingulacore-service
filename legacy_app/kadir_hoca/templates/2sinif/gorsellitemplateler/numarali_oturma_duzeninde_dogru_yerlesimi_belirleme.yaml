  - "masa etrafında oturma"
  - "numaralı yerler"
  - "karşılıklı oturma"
  - "yan yana / karşı karşıya ilişkileri"
  - "kısa kişi adları"
  - "basit mantık ipuçları"

yasakli_icerikler:
  - "çok karmaşık oturma planları"
  - "5'ten fazla kişi"
  - "çok adımlı ağır mantık zinciri"
  - "birden fazla doğru seçenek"
  - "yalnızca görselle çözülebilen yapı"
  - "2. sınıf düzeyini aşan soyut mantık"

ornek_sablon:
  ust_metin: "Kısa bağlam ve birkaç ipucu"
  gorsel: "1, 2, 3, 4 numaralı yerlerden oluşan oturma düzeni"
  soru_koku: "Buna göre [kisi_1] ile [kisi_2]nin oturduğu yerler ile ilgili hangi ifade doğrudur?"
