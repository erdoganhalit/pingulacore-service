      aciklama: "İlk semboller doğru, son semboller yanlış sırada verme"
      ornek: "Şimşekli havadan sonra güneş yerine yağmur verme"
    - ad: "BASLANGIC_YANILGISI"
      aciklama: "Metnin başlangıcını yanlış yorumlatacak dizilim kurma"
      ornek: "Güneşli yerine parçalı bulutlu ile başlatma"
    - ad: "AYNI_OGELER_FARKLI_SIRA"
      aciklama: "Tüm semboller aynı kalır, sadece sıra değişir"
      ornek: "Seçeneklerin hepsinde aynı hava sembolleri bulunur"

use_shared_strategies: false

