  - "6’dan fazla kişi/nesne"
  - "birden fazla doğru sıralama"
  - "yalnızca görselle çözülebilen yapı"
  - "2. sınıf düzeyini aşan soyut mantık"
  - "uzun ve dolaylı ipuçları"

ornek_sablon:
