  - "günlük yaşam davranışları"
  - "oyun oynama biçimleri"
  - "ses, kalabalık, iletişim gibi çocuk dünyasına yakın durumlar"
  - "görselde listelenmiş davranış örnekleri"
  - "çocuğun karşılaştırabileceği kısa davranış cümleleri"

yasakli_icerikler:
  - "ağır tıbbi açıklamalar"
  - "korkutucu ya da travmatik sahneler"
  - "alaycı, dışlayıcı ya da etiketleyici ifadeler"
  - "uzun soyut tanımlar"
  - "tek başına metinden çözülebilecek yapı"
  - "birden fazla doğru seçenek"

