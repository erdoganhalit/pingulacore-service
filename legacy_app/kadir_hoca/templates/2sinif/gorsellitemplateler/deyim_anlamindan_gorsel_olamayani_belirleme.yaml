  - "çocukların anlayabileceği yaygın deyimler"
  - "kısa deyim açıklamaları"
  - "basit duygu ve davranış durumları"
  - "tek kişilik ya da iki kişilik açık ve anlaşılır sahneler"
  - "beden diliyle desteklenen anlatımlar"

yasakli_icerikler:
  - "çok soyut deyimler"
  - "argo veya yaş düzeyine uygun olmayan ifadeler"
  - "aşırı kalabalık görseller"
  - "birden fazla doğru seçenek"
  - "şiddet, korku ya da uygunsuz içerik"

ornek_sablon:
  ust_metin: "Deyimlerle ilgili kısa açıklama ve 2-3 deyimin anlamı"
  gorsel: "Her seçenekte tek sahneli bir görsel"
  soru_koku: "Buna göre aşağıdakilerden hangisi sözü edilen deyimlerden herhangi birinin görseli olamaz?"
  secenekler:
    A: "Görsel"
