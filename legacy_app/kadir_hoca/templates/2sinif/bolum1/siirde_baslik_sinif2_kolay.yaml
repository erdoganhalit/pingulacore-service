# templates/2sinif/bolum1/siirde_baslik_sinif2_kolay.yaml
# 2. Sinif — Siirde Baslik — KOLAY zorluk
# Siirin konusu ilk dizelerde cok acik, celdiriciler kolay elenebilir

meta:
  id: "siirde_baslik_sinif2_kolay"
  ad: "2. Sinif - Siirde Baslik (Kolay)"
  sinif_seviyesi: 2
  aciklama: "Kolay duzey — siirin konusu ilk dizelerde acik, celdiriciler kolay elenebilir, 3 secenekli"
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Kisa siir + soru koku + 3 baslik secenegi (kolay)"

  paragraph:
    required: true
    word_count_min: 14
    word_count_max: 22
    sentence_count_min: 4
    sentence_count_max: 4
    stil: "siir"
    background_color: "#e8f8e8"
    kurallar:
      - "ONEMLI: Bu bir SIIR olmalidir — duz paragraf degil! Her dize ayri satirda, <br> ile ayrilmali."
      - "Siir TAM 4 DIZEDEN olusmalidir (1 kita)."
      - "Siirin ana konusu ilk iki dizede acikca verilmelidir."
      - "Siir tek varlik veya tek nesne etrafinda kurulmalidir."
      - "Siirde yan bilgi neredeyse hic olmamalidir."
      - "Siir 2. sinif ogrencisinin anlayabilecegi kadar sade, acik ve somut olmalidir."
      - "Siirde kullanilan sozcukler yuksek frekansli, tanidik ve kisa olmalidir."
      - "Siir bir butun olarak tek bir uygun baslikla kapsanabilmelidir."
      - "Siirde asiri soyutluk, yogun mecaz, kapali anlam ve yetiskin dili kullanilmamalidir."
      - "Siir dis bilgi gerektirmemelidir."
      - "Siir ana duygu cozumlemesi yaptiracak kadar ortuk olmamalidir."
      - "Kafiye ve ses tekrarlari olabilir ancak anlami golgelememelidir."
      - "Siir cocukta once 'siir ne hakkinda?' sorusunu uyandirabilecek aciklikta olmalidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 1
    word_count_max: 4
    style: "headline_title"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Tum secenekler baslik biciminde olmalidir (1-4 sozcuk)."
      - "Secenekler kisa, sade ve 2. sinif duzeyinde olmalidir."
      - "Dogru secenek siirin tamamini kapsamalidir."
      - "Dogru baslik siirde gecen temel sozcuklerden biriyle dogrudan kurulabilir."
      - "Dogru baslik dogrudan adlandirma biciminde olmalidir."
      - "1 yanlis secenek cok genel olmalidir."
      - "1 yanlis secenek yanlis varlik ya da acikca alakasiz yakin alan olmalidir."
      - "Yanlis secenekler kolay elenebilir olmalidir."
      - "Tum secenekler bicimce paralel olmalidir."

soru_kokleri:
  - "<b>Bu siirin basligi asagidakilerden hangisi olabilir?</b>"
  - "<b>Bu siire getirilebilecek <u>en uygun</u> baslik asagidakilerden hangisidir?</b>"
  - "<b>Bu siire <u>en uygun</u> baslik hangisidir?</b>"
  - "<b>Siir icin <u>en uygun</u> baslik asagidakilerden hangisidir?</b>"
  # KULLANILDI: - "<b>Yukaridaki siirin basligi hangisi olabilir?</b>"
  - "<b>Bu siirin basligi ne olabilir?</b>"
  - "<b>Bu siire verilebilecek <u>en uygun</u> baslik hangisidir?</b>"
  - "<b>Asagidakilerden hangisi bu siirin basligi olmaya <u>en uygundur</u>?</b>"
  - "<b>Bu siire konulabilecek <u>en uygun</u> baslik hangisidir?</b>"
  - "<b>Siirde anlatilanlara gore <u>en uygun</u> baslik hangisidir?</b>"
  - "<b>Bu siirde anlatilanlara uygun baslik hangisidir?</b>"
  - "<b>Asagidakilerden hangisi bu siire baslik olarak <u>en uygundur</u>?</b>"
  - "<b>Bu siirin konusuna <u>en uygun</u> baslik hangisidir?</b>"
  - "<b>Siirin basligi asagidakilerden hangisi olabilir?</b>"
  - "<b>Bu siire <u>en uygun</u> baslik asagidakilerden hangisidir?</b>"

dogru_cevap:
  tanim: "Siirin tamamini kapsayan en uygun kisa baslik"
  kurallar:
    - "Dogru cevap siirin tek baskin konusunu veya ana varligini yansitmalidir."
    - "Dogru cevap siirdeki ana varligi dogrudan soyleyebilir."
    - "Dogru cevap cok genel olmamalidir."
    - "Dogru cevap cok dar olmamalidir."
    - "Dogru cevap sade ve dogrudan olmalidir."
    - "Dogru cevap cocuk duzeyini asan mecazli veya soyut kullanim icermemelidir."
    - "Dogru cevap genellikle 1-3 sozcuk arasinda olmalidir."
    - "Dogru secenek siirdeki hicbir dizeyi kelimesi kelimesine TEKRARLAMAMALI"
    - "En az %40 kelime farkliligi olmali"

celdirici_stratejileri:
  - ad: "COK_GENIS"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Siirle iliskili ama odagi gereginden fazla genis baslik"
    nasil_olusturulur: |
      Siirin konusuyla ayni alan icinde ama cok genel bir baslik olustur.
      Ornegin siir gunes hakkindaysa 'Gokyuzu' gibi cok genis bir baslik sec.
      Kolay duzey: bu secenek acikca cok genis oldugu belli olmali.
    kategori: "semantic"

  - ad: "YANLIS_VARLIK"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Siire yakin alandan ama yanlis nesne veya varlik secen baslik"
    nasil_olusturulur: |
      Siirin konusuna yakin alandan ama farkli bir varlik sec.
      Ornegin siir gunes hakkindaysa 'Ay' veya 'Yildiz' gibi yakin ama yanlis varlik sec.
      Kolay duzey: bu secenek acikca farkli bir varlik oldugu belli olmali.
    kategori: "cognitive"

use_shared_strategies: false

beceri:
  katman: "KB1"
  bilesenler: ["konu_belirleme", "baslik_eslestirme"]
  surec_bileseni: "metni_anlama"

sinif2_ek_kurallar:
  metin_tasarim:
    - "Siir TAM 4 KISA DIZEDEN (1 kita) olusmalidir."
    - "Siirde tek baskin konu veya tek baskin varlik bulunmalidir."
    - "Siir cocuk dunyasina ve gunluk yasama yakin olmalidir."
  yasak_alanlar:
    - "Ana duygu / ana mesaj odakli sorular YASAK"
    - "Siirin vermek istedigi mesaji bulma YASAK"
    - "Cok katmanli ortuk anlam cozumleme YASAK"
