dogru_cevap:
  tanim: "Bos birakilan yere getirildiginde paragrafin anlamini ve akisini en uygun bicimde tamamlayan ifade"
  kurallar:
    - "Dogru cevap paragrafin konusu ile tam uyumlu olmalidir."
    - "Dogru cevap boşluk oncesi ve sonrasi ile anlamca bag kurmalidir."
    - "Dogru cevap yeni bir ana konu baslatmamalidir."
    - "Dogru cevap paragrafin akisini dogal hale getirmelidir."
    - "Dogru cevap sade ve dogrudan olmalidir."
    - "Dogru cevap 2. sinif ogrencisinin anlayabilecegi aciklikta olmalidir."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru secenek paragraftaki hicbir cumleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "En az %40 kelime farkliligi olmali"

celdirici_stratejileri:
  - ad: "YANLIS_ODAK"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metne yakin gorunur ama ana konu yerine yan bilgiye yonelir"
    nasil_olusturulur: |
      Metindeki yan bir bilgiye veya farkli bir odaga yonelen ifade olustur.
      Orta duzey: dikkatli okuyan ogrenci eleyebilir ama yuzeysel okuyan yanilabilir.
    kategori: "cognitive"

  - ad: "ANLAM_KOPUKLUGU"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Bosluk oncesi ve sonrasi ile anlam bagi kuramayan ifade"
    nasil_olusturulur: |
      Bosluga yerlestirildiginde paragrafin anlam akisini bozan bir ifade olustur.
      Orta duzey: bu secenek ilk bakista makul gorunebilir ama dikkatli okuyunca elenebilir.
    kategori: "cognitive"

  - ad: "YANLIS_NEDEN_SONUC"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metindeki neden-sonuc iliskisini ters ya da yanlis kurar"
    nasil_olusturulur: |
      Metindeki neden-sonuc iliskisini ters veya yanlis kuran ifade olustur.
      Orta duzey: bu secenek metinle iliskili gorunmeli ama mantik hatasi icermeli.
    kategori: "cognitive"

  - ad: "ILISKILI_AMA_FARKLI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Ayni alan icindedir ama boslugu tam karsilamaz"
    nasil_olusturulur: |
      Metnin alaniyla iliskili ama boslugu tam karsilamayan ifade olustur.
      Orta duzey: bu secenek ayni konunun farkli bir yonune odaklanir.
    kategori: "semantic"

use_shared_strategies: false

beceri:
  katman: "KB1"
  bilesenler: ["paragraf_tamamlama", "anlam_butunlugu"]
  surec_bileseni: "metni_anlama"

