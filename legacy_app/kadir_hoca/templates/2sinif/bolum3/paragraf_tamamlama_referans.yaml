    - "Metinde dış bilgi gerektiren unsur var mı? Varsa reddet."
    - "Metin boşluk tamamlama işini mi ölçüyor? Ana düşünce düzeyine kayıyorsa reddet."

  visual:
    - "Görsel zorunlu olarak var mı?"
    - "Görsel paragrafın ana içeriğiyle uyumlu mu?"
    - "Görsel tek bakışta anlaşılır mı?"
    - "Görsel destekleyici ama yanıltıcı değil mi?"
    - "Görsel dekoratif kalmıyor mu?"

  stem:
    - "Soru kökü boşluk tamamlama işini açıkça istiyor mu?"
    - "Pozitif/negatif kök seçimi zorluk düzeyine uygun mu?"
    - "Soru kökü ek beceri yüklemiyor mu?"

  options:
    - "Toplam 3 seçenek var mı?"
    - "Seçenekler boşluğa yerleşebilir yapıda mı?"
    - "Seçenekler kısa ve sade mi?"
    - "Doğru seçenek akışı ve anlamı tamamlıyor mu?"
    - "Yanlış seçeneklerden biri akışta anlam kopukluğu yaratıyor mu?"
    - "Yanlış seçeneklerden biri yakın ama yanlış odak ya da yanlış sonuç taşıyor mu?"

  difficulty:
    - "Zorluk seçilen düzeye göre paragraf ve çeldirici kuralları uygulanmış mı?"
    - "Zor düzey bile 2. sınıf sınırında mı?"
    - "Kolay düzey gereksiz yere karmaşık değil mi?"

hard_fail_rules:
  - "Seçenek sayısı 3 değilse"
  - "Görsel yoksa"
  - "Paragraf 4 cümleden kısa ya da 6 cümleden uzunsa"
  - "Boşluk sayısı 1 değilse"
  - "Doğru cevap metnin ana düşüncesine dayanıyorsa"
  - "İki veya daha fazla seçenek makul doğruysa"
  - "Metin 2. sınıf için fazla soyut veya karmaşıksa"
  - "Soru ana düşünce, ana duygu, mesaj veya yorum sorusuna kayıyorsa"
  - "Seçenekler boşluğa dilbilgisel ve anlamsal olarak yerleşemiyorsa"
  - "Görsel metinle uyumsuzsa"

ornek_bicim_notlari:
  - "Sis böceği örneğinde doğru seçenek, böceğin çölde yaşamını nasıl sürdürdüğünü anlatan akışı tamamlamalıdır."
  - "Eski ütü örneğinde doğru seçenek, elektrik yaygınlaşınca sorunun ortadan kalktığını söyleyen tamamlayıcı ifadedir."
  - "Pisa Kulesi örneğinde doğru seçenek, turistlerin kuleyi ziyaret etmesi gibi metnin akışına uyan bir ifadedir."
  - "Yanlış seçenekler konuya yakın görünse de paragrafın öncesi ve sonrası ile doğal bağ kurmamalıdır."
  - "2. sınıf düzeyinde boşluk, düşüncenin akışı ve anlam bütünlüğü ile tamamlanmalıdır."

output_contract:
  required_fields:
    - "paragraph"
    - "visual_description"
    - "stem"
    - "options"
    - "answer"
    - "difficulty"
    - "topic"
  answer_format:
    - "answer yalnızca A/B/C olarak verilebilir"
    - "difficulty yalnızca Kolay / Orta / Zor olabilir"