  ad: "2. Sinif - Metin Inceleme (Kolay) - Dogrudan Detay + Baslik"
  sinif_seviyesi: 2
  aciklama: "Kolay baglam — 2 soru: dogrudan_detay (slot 1) + baslik (slot 2)"
  frequency: "Medium"

context:
