  question_count_max: 2
  generation:
    word_count_min: 42
    word_count_max: 58
    image_type: "illustration"
    structure:
      - "4-5 kisa cumle, tek baskin konu/olay etrafinda."
      - "Metinde acik detay bilgi bulunmali (slot 1 icin)."
      - "Metnin tamami uygun baslikla kapsanabilir olmali (slot 2 icin)."
      - "Karakter ozelligi/zit anlam/benzetme YASAK (kolay duzey)."
      - "YALNIZCA duz paragraf metni — tablo, grafik, liste YASAK. Gorsel ayrica illustrasyon olarak uretilecek."
    kurallar:
      - "2. sinif duzeyinde, sade ve gunluk hayata yakin metin."
      - "Karakter ismi Turkce olmali."
      - "Tek baskin konu, dis bilgi gerektirmeyen icerik."
      - "Turkce karakterler dogru kullanilmali."
      - "Tablo/grafik/sayi listesi KULLANMA — sadece akici Turkce anlatim."

  questions:
    - slot: 1
      type: dogrudan_detay
      soru_kokleri:
        - "<b>Bu metne gore asagidakilerden hangisi dogrudur?</b>"
        - "<b>Bu metne gore asagidakilerden hangisi soylenebilir?</b>"
        - "<b>Asagidakilerden hangisi metinde verilen bilgilerden biridir?</b>"
      options_style: complete_sentence
      word_count_min: 4
      word_count_max: 10
      options_override:
        count: 3
        labels: [A, B, C]
      beceri:
        katman: KB1
        bilesenler: [acik_bilgi_okuma]
        surec_bileseni: bilgiyi_okuma

    - slot: 2
      type: baslik
      soru_kokleri:
        - "<b>Bu metne getirilebilecek <u>en uygun</u> baslik asagidakilerden hangisidir?</b>"
        - "<b>Bu metnin basligi asagidakilerden hangisi olabilir?</b>"
        - "<b>Asagidakilerden hangisi bu metne baslik olmaya <u>en uygundur</u>?</b>"
        - "<b>Bu metne verilebilecek <u>en uygun</u> baslik hangisidir?</b>"
      options_style: short_phrase
      word_count_min: 1
      word_count_max: 4
      options_override:
        count: 3
        labels: [A, B, C]
      beceri:
        katman: KB1
        bilesenler: [baslik_eslestirme]
        surec_bileseni: metni_anlama

