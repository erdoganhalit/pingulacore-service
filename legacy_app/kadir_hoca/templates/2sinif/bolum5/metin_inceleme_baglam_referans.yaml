        - ["dogrudan_detay", "baslik", "zitanlam_numarali_cumle"]
        - ["dogrudan_detay", "deginilmemistir", "acik_benzetme"]
        - ["dogrudan_detay", "uygun_bilgi_sectirme", "basit_neden_sonuc"]
    passage:
      sentence_count_min: 6
      sentence_count_max: 7
      word_count_min: 66
      word_count_max: 92
      kurallar:
        - "Metin 3 soru çıkaracak kadar zengin olmalıdır."
        - "Metinde açık detay, genel bağlam ve alt beceri için ayrı dayanaklar bulunmalıdır."
        - "Zor düzeyde bile her soru açık metin desteğine dayanmalıdır."
        - "Zor düzey, 3. sınıf düzeyine kayan soyut yorum ve analiz istememelidir."
    visual:
      kurallar:
        - "Görsel ana bağlamı desteklemeli ve tüm soru grubuna hizmet etmelidir."
        - "Görsel yakın çeldiricilere doğal zemin hazırlayabilir ama karışık olmamalıdır."
    distractors:
      kurallar:
