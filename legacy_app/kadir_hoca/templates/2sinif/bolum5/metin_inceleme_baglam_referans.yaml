      Zor düzey 2. sınıfta derin yorum, mesaj, ana düşünce veya üst düzey analiz değildir.
      Zorluk, tek metin üzerinden üç farklı ama açık bağlam sorusunu dikkatle çözme düzeyinde kalır.

