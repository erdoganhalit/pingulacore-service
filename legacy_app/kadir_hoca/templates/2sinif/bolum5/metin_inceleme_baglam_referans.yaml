generation_logic:
  steps:
    - step: 1
      action: "2. sınıfa uygun, görselle desteklenebilir tek ve açık bir bağlam seç"
    - step: 2
      action: "Seçilen bağlam için 4-7 cümlelik kısa ve sade metin oluştur"
      details:
        - "Tek baskın konu kur"
        - "En az bir açık detay sorusu çıkar"
        - "En az bir genel anlama sorusu çıkar"
        - "3'lü yapı için gerekiyorsa karakter özelliği, zıt anlam, benzetme veya açık neden-sonuç malzemesi ekle"
    - step: 3
      action: "Metne uygun sade görsel tasarla"
      details:
        - "Ana kişi, varlık veya olayı göster"
        - "Görsel tüm soru grubuna ortak destek sunsun"
    - step: 4
      action: "Soru grubu sayısını belirle"
      details:
        - "Kolay: 2 soru"
        - "Orta: 2 veya 3 soru"
        - "Zor: 3 soru"
    - step: 5
      action: "Slot kombinasyonunu zorluk düzeyine göre seç"
      details:
        - "Slot 1: detay"
        - "Slot 2: genel/seçici"
        - "Slot 3: alt beceri"
    - step: 6
      action: "Her slot için uygun soru ailesini ve soru kökünü seç"
    - step: 7
      action: "Her soru için 1 doğru ve 2 yanlış seçenek üret"
      details:
        - "Yanlış seçenekler metne yakın ama yanlış olsun"
        - "Aynı soru grubunda birbirini tekrar eden çeldiricilerden kaçın"
    - step: 8
      action: "Soru numaralarını ve grup başlığını oluştur"
    - step: 9
      action: "Şıkları A-B-C olarak yerleştir"
    - step: 10
      action: "Harici TYMM ortak kuralları ile doğrulama yap"

