    passage:
      sentence_count_min: 5
      sentence_count_max: 6
      word_count_min: 52
      word_count_max: 74
      kurallar:
        - "Metinde 1 yan ayrıntı bulunabilir."
        - "Slot 2 için genel bakış ya da seçici tarama gerektiren bilgi bulunmalıdır."
        - "3'lü soru grubunda slot 3 metnin açık alt beceri malzemesine dayanmalıdır."
        - "Soru grubu yine de 2. sınıf dil düzeyinde kalmalıdır."
    visual:
      kurallar:
        - "Görsel metni desteklemeli ama tek başına tüm cevapları vermemelidir."
    distractors:
      kurallar:
        - "En az bir yanlış seçenek ilk bakışta makul görünmelidir."
        - "Değinilmemiştir / söylenemez sorularında diğer iki seçenek metinle açıkça desteklenmelidir."
    difficulty_note: >
      Orta düzeyde öğrenci aynı metin üzerinden hem detay hem genel bağlam hem de
      basit alt becerileri kullanır. Ancak soru grubu yine de yorum ağırlıklı değildir.

  zor:
    question_group:
      question_count_allowed: [3]
      preferred_patterns:
