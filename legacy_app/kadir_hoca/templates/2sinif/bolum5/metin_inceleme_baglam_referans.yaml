    difficulty_note: >
      Kolay düzeyde soru grubu, metni anlama ve açık bilgiyi fark etme düzeyinde kalır.
      Öğrenciden bir bağlamı takip etmesi beklenir, ama eleme baskısı düşüktür.

  orta:
