# templates/2sinif/bolum2/paragrafin_konusu_sinif2_orta.yaml
# 2. Sinif — Paragrafin Konusu — ORTA zorluk
# Konu acik ama metnin geneline bakmak gerekiyor, 1 yanlis secenek ilk bakista makul

meta:
  id: "paragrafin_konusu_sinif2_orta"
  ad: "2. Sinif - Paragrafin Konusu (Orta)"
  sinif_seviyesi: 2
  aciklama: "Orta duzey — konu acik ama metnin geneline bakmak gerekiyor, 1 yanlis secenek ilk bakista makul, 3 secenekli"
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Tek paragraf + soru koku + 3 konu secenegi (orta)"

  paragraph:
    required: true
    word_count_min: 42
    word_count_max: 56
    sentence_count_min: 4
    sentence_count_max: 5
    stil: "bilgilendirici_veya_oykusel"
    background_color: "#f8f0e0"
    kurallar:
      - "Konu acik olmalidir ancak metnin geneline bakmayi gerektirmelidir."
      - "Metinde 1 veya 2 destekleyici ayrinti bulunabilir."
      - "Dogru konu ifadesi, metnin tumune bakilarak secilmelidir."
      - "Kucuk bir yan bilgi yer alabilir ama ana odagi golgelememelidir."
      - "Metin tek baskin konu etrafinda kurulmalidir."
      - "Metin kisa, sade, somut ve gunluk yasama yakin olmalidir."
      - "Cumleler kisa ve dogrudan olmalidir."
      - "Metin dis bilgi gerektirmemelidir."
      - "Metin ana dusunce, ana duygu, ders veya mesaj buldurmaya kaymamalidir."
      - "Paragrafin konusu 'Metinde ne anlatiliyor?' sorusuna verilecek cevapla belirlenebilmelidir."
      - "2. sinif ogrencisinin anlayabilecegi sadelikte kelime hazinesi kullanilmalidir."
      - "Metinde ve gorselde SADECE Turkce kullanilmalidir. Ingilizce kelime YASAK."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 2
    word_count_max: 5
    style: "topic_phrase"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Tum secenekler konu ifadesi biciminde olmalidir (2-5 sozcuk)."
      - "Secenekler baslik gibi degil, konu ifadesi gibi aciklayici olmalidir."
      - "Secenekler kisa, sade ve 2. sinif duzeyinde olmalidir."
      - "Dogru secenek metnin tamaminda anlatilan ana konuyu karsilamalidir."
      - "Dogru secenek metnin genel odagini kapsamalidir."
      - "Dogru secenek tek ayrintidan degil metnin tamamindan cikmalidir."
      - "1 yanlis secenek cok genel olmalidir."
      - "1 yanlis secenek cok dar ya da yan odakli olmalidir."
      - "En az 1 yanlis secenek ilk bakista makul gorunmelidir."
      - "Tum secenekler bicimce paralel olmalidir."

soru_kokleri:
  - "<b>Bu metnin konusu asagidakilerden hangisidir?</b>"
  # KULLANILDI: - "<b>Bu metinde ele alinan konu asagidakilerden hangisidir?</b>"
  - "<b>Bu metinde asagidakilerden hangisine deginilmistir?</b>"
  # KULLANILDI: - "<b>Bu paragrafin konusu asagidakilerden hangisidir?</b>"
  - "<b>Paragrafta anlatilan konu asagidakilerden hangisidir?</b>"
  - "<b>Metinde hangi konudan soz edilmektedir?</b>"
  - "<b>Bu metinde en cok ne anlatilmaktadir?</b>"
  - "<b>Bu metnin anlattigi konu asagidakilerden hangisidir?</b>"
  - "<b>Asagidakilerden hangisi bu metnin konusudur?</b>"
  - "\"{topic}\" <b>ile ilgili bu metnin konusu asagidakilerden hangisidir?</b>"

dogru_cevap:
  tanim: "Metnin tamaminda anlatilan ana konuyu karsilayan en uygun ifade"
  kurallar:
    - "Dogru cevap metnin tek baskin konusunu yansitmalidir."
    - "Dogru cevap baslik gibi yaratici degil, konu ifadesi gibi aciklayici olmalidir."
    - "Dogru cevap metnin genel odagini kapsamalidir."
    - "Dogru cevap tek ayrintiyi degil ana anlatilani tasimalidir."
    - "Dogru cevap cok genel olmamalidir."
    - "Dogru cevap cok dar olmamalidir."
    - "Dogru cevap sade ve dogrudan olmalidir."
    - "Dogru cevap genellikle 2-5 sozcuk arasinda olmalidir."
    - "Dogru secenek paragraftaki hicbir cumleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "En az %40 kelime farkliligi olmali"

celdirici_stratejileri:
  - ad: "COK_GENIS"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metinle iliskili ama odagi gereginden fazla genis konu"
    nasil_olusturulur: |
      Metnin konusuyla ayni alan icinde ama cok genel bir konu ifadesi olustur.
      Orta duzey: bu secenek ilk bakista makul gorunebilir ama metnin genelini kapsamaz.
    kategori: "semantic"

  - ad: "COK_DAR"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metindeki tek ayrintiya odaklanan konu"
    nasil_olusturulur: |
      Metindeki yan bir detaya odaklanan konu ifadesi olustur.
      Orta duzey: bu secenek metinde gercekten gecen bir bilgiye dayanmali ama ana odak olmamali.
    kategori: "cognitive"

  - ad: "YANLIS_ODAK"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metindeki yan bilgiye yonelen ama ana konu olmayan ifade"
    nasil_olusturulur: |
      Metinde gecen ama ana konu olmayan bir bilgiyi konu ifadesi haline getir.
      Orta duzey: dikkatli okuyan ogrenci eleyebilir ama yuzeysel okuyan yanilabilir.
    kategori: "cognitive"

  - ad: "ILISKILI_AMA_FARKLI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Ayni tema alaninda duran ama metnin gercek konusunu karsilamayan ifade"
    nasil_olusturulur: |
      Metnin alaniyla iliskili ama metnin asil konusundan farkli bir konu ifadesi olustur.
      Orta duzey: bu secenek ayni temanin farkli bir yonune odaklanir.
    kategori: "semantic"

use_shared_strategies: false

beceri:
  katman: "KB1"
  bilesenler: ["konu_belirleme"]
  surec_bileseni: "metni_anlama"

sinif2_ek_kurallar:
  yasak_alanlar:
    - "Ana dusunce / ana duygu odakli sorular YASAK"
    - "Paragrafin ana dusuncesini bulma YASAK"
    - "Metnin vermek istedigi mesaji bulma YASAK"
    - "Cok katmanli ortuk anlam cozumleme YASAK"
