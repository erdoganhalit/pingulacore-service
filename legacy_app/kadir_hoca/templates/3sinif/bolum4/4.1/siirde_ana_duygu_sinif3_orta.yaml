# Referans: paragrafta_duygu_siirde_ana_duygu_sinif3_referans.yaml → zorluk_duzeyleri.orta
# Orta duzey — siirde_ana_duygu varyanti (SIIR tabanli)

meta:
  id: "siirde_ana_duygu_sinif3_orta"
  ad: "3. Sinif - Siirde Ana Duygu (Orta)"
  sinif_seviyesi: 3
  aciklama: "Orta duzey — siirde_ana_duygu: Siirde ana duygu. 4 secenekli, gorselli, siir tabanli."
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Gorsel + siir + soru koku + 4 duygu secenegi (orta)"

  paragraph:
    required: true
    word_count_min: 18
    word_count_max: 50
    sentence_count_min: 1
    sentence_count_max: 10
    stil: "siir"
    background_color: "#f8f0e0"
    kurallar:
      - "Siir acik dize duzeninde verilmelidir."
      - "Siir 4-8 dize arasinda olmalidir."
      - "Siirde dizeler <br> ile ayrilmalidir."
      - "Siirde baskin bir ana duygu bulunmalidir."
      - "Siirin dili 3. sinif duzeyine uygun olmalidir."
      - "Siirde agir sembolizm ve cok kapali imgeler kullanilmamalidir."
      - "Ana duygu, siirin genel havasindan ve dizelerden cikarilabilmelidir."
      - "Siirde tema ile ana duygu karistirilmamalidir."
      - "Duygu acik olmali; fakat metnin tamamina bakmayi gerektirmelidir."
      - "Metinde kisa sureli yan duygular bulunabilir."
      - "Siirde ana duygu, birkac dize birlikte okununca belirginlesmelidir."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."

  visual:
    required: true
    description: "Siirin ana icerigini ve baskin duygusunu destekleyen islevsel gorsel"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "tek sahneli illustrasyon"
      - "tek sahneli fotograf benzeri cizim"
      - "siirin duygu alanini destekleyen sade gorsel"
      - "tek atmosfer odakli sahne"
    kurallar:
      - "Her soru icin gorsel zorunludur."
      - "Gorsel metnin veya siirin icerigiyle acik uyumlu olmalidir."
      - "Gorsel sus olmamali, cozumde etkili destek sunmalidir."
      - "Gorsel tek basina dogru cevabi acikca vermemelidir."
      - "Gorsel ile metin/siir birlikte degerlendirildiginde baskin duygu daha netlesmelidir."
      - "Gorsel dikkat dagitici gereksiz ayrintilar icermemelidir."
      - "Gorsel yanlis secenegi acikca isaret edecek kadar yaniltici olmamalidir."
    yasaklar:
      - "dekoratif ve metinden bagimsiz gorsel"
      - "cok sahneli karmasik kolaj"
      - "grafik, tablo veya infografik yogunlugu tasiyan tasarim"
      - "duyguyu asiri dogrudan yaziyla etiketleyen gorsel"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir (siirde_ana_duygu varyanti)"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 3
    style: "emotion_label"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "3. sinifta her soru 4 secenekli olmalidir."
      - "Secenekler duygu adi biciminde olmalidir."
      - "Secenekler kisa, sade ve 3. sinif duzeyinde olmalidir."
      - "Dogru secenek metindeki veya siirdeki baskin duyguyu karsilamalidir."
      - "Yanlis secenekler metne/siire yakin gorunebilir; ancak dikkatli okuyunca elenebilmelidir."
      - "Birden fazla makul dogru secenek olusmamalidir."
      - "En az 1 yanlis secenek ilk bakista makul gorunmelidir."
      - "1 yanlis secenek yakin duygu"
      - "1 yanlis secenek yardimci duyguyu baskin gibi sunma"
      - "1 yanlis secenek olaydan bagimsiz duygu"

soru_kokleri:
  - "<b>Bu siirin ana duygusu asagidakilerden hangisidir?</b>"
  - "<b>Siirde islenen ana duygu hangisidir?</b>"
  # KULLANILDI: - "<b>Bu siirde hissedilen ana duygu asagidakilerden hangisidir?</b>"
  - "<b>Asagidakilerden hangisi bu siirin ana duygusudur?</b>"
  - "<b>Siire hakim olan duygu hangisidir?</b>"

