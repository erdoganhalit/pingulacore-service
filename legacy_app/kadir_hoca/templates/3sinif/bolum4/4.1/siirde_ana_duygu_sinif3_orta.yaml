  izinli_duygular:
    - "Sevinc"
    - "Ofke"
    - "Acima"
    - "Huzur"
    - "Ozlem"
    - "Saskinlik"
    - "Hayranlik"
    - "Yasama sevinci"
    - "Korku"
    - "Karamsarlik"
    - "Heyecan"
    - "Uzuntu"
    - "Mutluluk"
  kullanim_kurallari:
    - "Her soruda dogru duygu metin veya siirle acikca desteklenmelidir."
    - "Secenekler arasinda anlamca asiri yakin ve ayirt edilmesi guc dort duygu birlikte kullanilmamalidir."
    - "Ilk asamada daha somut ve ogrencinin asina oldugu duygular tercih edilmelidir."
    - "Mutluluk ve sevinc birlikte kullanilacaksa metin bunlari ayirmayi gercekten desteklemelidir; aksi halde yalniz biri tercih edilmelidir."
    - "Ozlem, huzur, heyecan, korku, uzuntu gibi daha belirgin duygu ciftleri tercih edilebilir."

dogru_cevap:
  tanim: "Metne veya siire hakim olan, en baskin bicimde hissedilen duygu"
  kurallar:
    - "KRITIK PARAPHRASE: Dogru cevap paragraftaki cumleleri/ifadeleri AYNEN KULLANMA — paragraf kelimelerini es anlamli sozcuklerle degistir ve farkli cumle yapisiyla yeniden ifade et. En az %50 kelime farkliligi zorunlu. Paragrafa cok benzer secenekler FAIL olur."
    - "Dogru cevap metnin veya siirin tamaminda baskin bicimde hissedilen duygu olmalidir."
    - "Dogru cevap tek bir sozcuk ya da ayrintiya degil, butun anlatima dayanmalidir."
    - "Dogru cevap duygu ile konu arasindaki farki korumalidir."
    - "Siirde ana duygu, siirin temasiyla karistirilmamalidir."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru cevap 3. sinif ogrencisinin dikkatli okuyarak bulabilecegi aciklikta olmalidir."

celdirici_stratejileri:
  - ad: "YAKIN_DUYGU"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metne yakin gorunen ama baskin olmayan duygu"
    nasil_olusturulur: |
      Metne yakin gorunen ama baskin olmayan bir duygu sec.
      Ornek: Mutluluk yerine heyecan, ozlem yerine uzuntu, huzur yerine sevinc.
    kategori: "semantic"

  - ad: "OLAYDAN_BAGIMSIZ_DUYGU"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metnin olay orgusuyle uyumlu gorunmeyen duygu"
    nasil_olusturulur: |
      Metnin olay orgusuyle uyumlu gorunmeyen bir duygu sec.
      Ornek: Korku, Ofke, Karamsarlik.
    kategori: "cognitive"

  - ad: "YARDIMCI_DUYGU_BASKIN_GIBI_SUNMA"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metinde kisa sureli hissedilen ama asil duygu olmayan secenegi one cikarma"
    nasil_olusturulur: |
      Metinde kisa sureli hissedilen yan duyguyu baskin duygu gibi sun.
    kategori: "cognitive"

  - ad: "KONU_DUYGU_KARISTIRMA"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Duygu yerine nesneye, kisiye ya da duruma baglanan yanlis cagrisim sonucu secilen duygu"
    nasil_olusturulur: |
      Metindeki bir nesne, kisi veya durum cagrisimindan gelen ama metne hakim olmayan bir duygu sec.
      Ornek: Oyuncak sevgisi cagrisimindan sevinc; bayram cagrisimindan yalniz heyecan.
    kategori: "semantic"

use_shared_strategies: false

beceri:
  katman: "KB2"
