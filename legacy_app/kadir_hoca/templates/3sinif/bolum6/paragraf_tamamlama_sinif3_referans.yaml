meta:
  id: "paragraf_tamamlama_sinif3_standart_gorselli_dort_secenekli"
  ad: "Paragraf Tamamlama"
  sinif_seviyesi: 3
  ders: "Türkçe"
  bolum: "3. Sınıf Türkçe Paragraf Kitabı"
  alt_bolum: "6. Paragraf Tamamlama"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    3. sınıf öğrencisi için bir paragrafta boş bırakılan yere, metnin konusu,
    anlam bütünlüğü, düşüncenin akışı ve anlatım tonuna uygun cümleyi seçtirmeye;
    ayrıca uygun olmayan devamı elettirmeye ve bazı sorularda seçilen tamamlama
    üzerinden kısa çıkarım yaptırmaya yönelik, görsel destekli ve 4 seçenekli
    standart soru üretim şablonu.
  kullanim_notu: >
    Bu şablon, harici olarak kullanılan 3. Sınıf TYMM Ortak Kuralları YAML'ı,
    3. sınıf öğretim programı ve 3. sınıf MEB Türkçe kitapları ile birlikte
    doğrulanmalıdır.

format:
  type: "llm_generated_html"
  description: "Görsel + eksik bırakılmış metin/parça + soru kökü + 4 seçenek"

  question_variant:
    allowed:
      - "bosluga_getirilebilir"
      - "bosluga_getirilemez"
      - "metin_surdurulebilir"
      - "metin_surdurulemez"
      - "bitmesi_uygun_olmaz"
      - "tamamlamaya_gore_anlam"
    default: "bosluga_getirilebilir"

  paragraph:
    required: true
    text_modes:
      - "simple_info"
      - "short_narrative"
      - "dialogue_like_short_narrative"
    sentence_count_min: 4
    sentence_count_max: 7
    word_count_min: 45
    word_count_max: 105
    blank_count: 1
    blank_position_allowed:
      - "middle"
      - "end"
    kurallar:
      - "Metin 3. sınıf öğrencisinin anlayabileceği kadar açık, sade ve akıcı olmalıdır."
      - "Metinde yalnız bir boşluk bulunmalıdır."
      - "Boşluk, metnin ortasında veya sonunda olabilir."
      - "Boş bırakılan yere getirilecek cümle metnin konusu ile uyumlu olmalıdır."
      - "Boş bırakılan yere getirilecek cümle düşüncenin akışını bozmamalıdır."
      - "Boş bırakılan yere getirilecek cümle anlatım tonuna uygun olmalıdır."
      - "Metin dış bilgi gerektirmemelidir."
      - "Doğru seçenek, yalnız sözcük benzerliğine değil anlam bütünlüğüne dayanmalıdır."
      - "Yanlış seçenekler metne yakın görünebilir; ancak konu, ton, akış veya mantık açısından bozulma yaratmalıdır."
      - "Paragraf tamamlama sorusu, metnin bölümleri sorusuna dönüşmemelidir."
      - "Bu bölümde asıl amaç, uygun devam cümlesini seçmektir; giriş-gelişme-sonuç işlevi doğrudan ölçülmez."
      - "Metin, tahmin ederek sürdürme ve nasıl sonuçlanacağını öngörme becerisine uygun olmalıdır."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."

  blank_design_rules:
    kurallar:
      - "Boşluk, anlamca kritik bir yerde bulunmalıdır."
      - "Boşluk doldurulduğunda metin doğal ve akıcı okunmalıdır."
      - "Boşluğun yeri yalnız dil bilgisiyle değil, anlam ilişkisiyle çözülebilmelidir."
      - "Boşluktan önceki ve sonraki cümleler doğru cevabı desteklemelidir."
      - "Boşluk sonunda ise doğru seçenek metni doğal biçimde bitirmelidir."
      - "Boşluk ortadaysa doğru seçenek öncesi ve sonrası ile bağlantı kurmalıdır."
    yasaklar:
      - "yalnız tek bir bağlaç ipucuyla çözülebilen boşluk"
      - "yalnız sözcük tekrarına dayanarak çözülen boşluk"
      - "birden fazla seçeneğin aynı ölçüde uygun olduğu yapı"
      - "çok belirsiz veya çok kopuk bağlam"

  visual:
    required: true
    description: "Paragrafın ana içeriğini ve bağlamını destekleyen işlevsel görsel"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "tek sahneli illüstrasyon"
      - "tek sahneli fotoğraf benzeri çizim"
      - "tek olay veya tek varlık odaklı sahne"
      - "metindeki ana durumu destekleyen sade konu görseli"
    kurallar:
      - "Her soru için görsel zorunludur."
      - "Görsel metnin ana içeriğiyle açık uyumlu olmalıdır."
      - "Görsel çözümde destekleyici rol oynamalıdır."
      - "Görsel süs olmamalıdır."
      - "Görsel tek başına doğru cevabı açıkça vermemelidir."
      - "Görsel ile metin birlikte değerlendirildiğinde doğru tamamlama daha netleşebilir."
      - "Görsel dikkat dağıtıcı gereksiz ayrıntılar içermemelidir."
    yasaklar:
      - "dekoratif ve metinden bağımsız görsel"
      - "çok sahneli karmaşık kolaj"
      - "grafik, tablo veya infografik yoğunluğu taşıyan tasarım"

  stem:
    required: true
    selection: "random_from_list_by_variant"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    correct_count: 1
    style_by_variant:
      bosluga_getirilebilir: "sentence_option"
      bosluga_getirilemez: "sentence_option"
      metin_surdurulebilir: "sentence_option"
      metin_surdurulemez: "sentence_option"
      bitmesi_uygun_olmaz: "sentence_option"
      tamamlamaya_gore_anlam: "sentence_option"
    word_count_min: 3
    word_count_max: 18
    kurallar:
      - "3. sınıfta her soru 4 seçenekli olmalıdır."
      - "Seçenekler anlamlı ve kurallı cümlelerden oluşmalıdır."
      - "Doğru seçenek metnin konusu, akışı ve tonuyla tam uyumlu olmalıdır."
      - "Yanlış seçenekler ilk bakışta makul görünebilir; ancak düşüncenin akışını bozmalıdır."
      - "Yanlış seçenekler tamamen ilgisiz olmamalı; metne belli ölçüde yakın görünmelidir."
      - "Birden fazla makul doğru seçenek oluşmamalıdır."

