zorluk_duzeyleri:
  kolay:
    paragraph:
      sentence_count_min: 4
      sentence_count_max: 5
      word_count_min: 45
      word_count_max: 62
      kurallar:
        - "Boşluk metnin anlam akışında açık bir yere konulmalıdır."
        - "Konu ve ton açık biçimde verilmelidir."
        - "Doğru seçenek belirgin biçimde en uyumlu olmalıdır."
    preferred_variants:
      - "bosluga_getirilebilir"
      - "metin_surdurulebilir"
      - "bitmesi_uygun_olmaz"
    distractors:
      kurallar:
        - "1 seçenek açıkça akışı bozmalıdır."
        - "1 seçenek konuya yakın ama eksik uyumlu olabilir."
        - "1 seçenek metne göre fazla genel olabilir."
    difficulty_note: >
      Kolay düzeyde öğrenci metnin açık akışını izleyerek uygun devam cümlesini bulur.

  orta:
    paragraph:
      sentence_count_min: 5
      sentence_count_max: 6
      word_count_min: 58
      word_count_max: 82
      kurallar:
        - "Boşluk anlamca önemli bir yerde bulunmalıdır."
        - "Metinde 1-2 destekleyici ayrıntı yer alabilir."
        - "Doğru seçenek için metnin tamamı düşünülmelidir."
    preferred_variants:
      - "bosluga_getirilemez"
      - "metin_surdurulebilir"
      - "metin_surdurulemez"
      - "tamamlamaya_gore_anlam"
    distractors:
      kurallar:
        - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
        - "Yanlış seçenekler metne yakın ama ton veya akış bakımından sorunlu olabilir."
    difficulty_note: >
      Orta düzeyde öğrenci yalnız konuya değil, düşüncenin yönüne ve tonuna da dikkat etmelidir.

  zor:
    paragraph:
      sentence_count_min: 6
      sentence_count_max: 7
      word_count_min: 76
      word_count_max: 105
      kurallar:
        - "Boşluk anlam bütünlüğü açısından kritik yerde olmalıdır."
        - "Metinde birkaç ayrıntı bulunabilir; ancak doğru seçenek bütün parçayı birleştirmelidir."
        - "Zor düzeyde bile soru 4. sınıfa kayan çok katmanlı soyut yorum gerektirmemelidir."
    preferred_variants:
      - "bosluga_getirilemez"
      - "metin_surdurulemez"
      - "bitmesi_uygun_olmaz"
      - "tamamlamaya_gore_anlam"
    distractors:
      kurallar:
        - "3 yanlış seçeneğin en az 2'si metne yakın görünmelidir."
        - "Yanlış seçenekler ton, anlam yönü veya sonuç etkisi bakımından ayrılmalıdır."
        - "Doğru seçenek ancak metnin tamamı okununca netleşmelidir."
    difficulty_note: >
      Zor düzeyde öğrencinin konu, ton ve anlam yönünü birlikte değerlendirerek en uygun tamamlamayı seçmesi beklenir.

difficulty_selection_policy:
  default: "Orta"
  allowed_values: ["Kolay", "Orta", "Zor"]
  hard_limits:
    - "Her soru 4 seçenekli olmalıdır."
    - "Her soru için görsel zorunludur."
    - "Metin 3. sınıf düzeyini aşan ağır soyutluk içermemelidir."
