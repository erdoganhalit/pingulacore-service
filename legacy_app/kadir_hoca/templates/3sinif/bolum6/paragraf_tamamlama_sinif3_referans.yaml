generation_logic:
  steps:
    - step: 1
      action: "3. sınıfa uygun, sürdürmeye elverişli somut bir konu seç"
    - step: 2
      action: "Seçilen konu için 4-7 cümlelik sade bir paragraf oluştur"
      details:
        - "Tek baskın konu kur"
        - "Boşluk için anlamca kritik bir yer belirle"
        - "Akış ve ton ipuçlarını metne yerleştir"
    - step: 3
      action: "Metni destekleyen işlevsel görsel tasarla"
      details:
        - "Görsel bağlamı desteklesin"
        - "Görsel zorunlu olsun"
        - "Görsel tek başına cevabı vermesin"
    - step: 4
      action: "Soru varyantını seç"
      details:
        - "bosluga_getirilebilir"
        - "bosluga_getirilemez"
        - "metin_surdurulebilir"
        - "metin_surdurulemez"
        - "bitmesi_uygun_olmaz"
        - "tamamlamaya_gore_anlam"
    - step: 5
      action: "Varyanta uygun 1 doğru ve 3 yanlış seçenek oluştur"
      details:
        - "Yanlışlardan biri akışı bozsun"
        - "Yanlışlardan biri tona uymasın"
        - "Yanlışlardan biri konuya yakın ama tam uyumlu olmasın"
    - step: 6
      action: "Soru kökünü listeden rastgele seç"
    - step: 7
      action: "Şıkları A-B-C-D olarak karıştır"
    - step: 8
      action: "Harici 3. Sınıf TYMM Ortak Kuralları ile doğrulama yap"

