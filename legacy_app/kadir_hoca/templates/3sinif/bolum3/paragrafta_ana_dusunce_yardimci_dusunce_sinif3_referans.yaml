    - "Bu metinde verilen yardımcı düşüncelerden biri aşağıdakilerden hangisidir?"
    - "Metne göre aşağıdakilerden hangisi doğrudur?"
    - "Bu parçada aşağıdakilerden hangisine değinilmiştir?"
    - "Metinde geçen bilgilerden biri aşağıdakilerden hangisidir?"

  metinden_cikarilamaz:
    - "Bu metinden aşağıdakilerden hangisi çıkarılamaz?"
    - "Bu metne göre aşağıdakilerden hangisi söylenemez?"
    - "Parçaya göre aşağıdakilerden hangisine ulaşılamaz?"
    - "Bu metindeki bilgilere göre aşağıdakilerden hangisi doğru değildir?"
    - "Aşağıdakilerden hangisi bu metinden çıkarılamaz?"

  hangi_sorunun_cevabi_yoktur:
    - "Bu metinde aşağıdaki sorulardan hangisinin cevabı yoktur?"
    - "Bu parçaya göre aşağıdaki sorulardan hangisi cevaplanamaz?"
    - "Metinde aşağıdaki sorulardan hangisinin cevabı bulunmamaktadır?"
    - "Aşağıdaki sorulardan hangisinin cevabı bu metinde yoktur?"
    - "Bu metne göre aşağıdaki sorulardan hangisine cevap verilemez?"

