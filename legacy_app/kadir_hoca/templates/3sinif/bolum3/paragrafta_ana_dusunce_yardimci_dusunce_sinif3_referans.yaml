  - "Stonehenge metninde 'hangisi çıkarılamaz' türü soru, metindeki açık bilgiler ile cevaplanamayan bilgileri ayırır."
  - "Afrikalı çocuklar metninde ana düşünce, birlikte başarmanın ve paylaşmanın değerli olmasıdır."
  - "Bu metinde aşağıdaki sorulardan hangisinin cevabı yoktur? soru kökü bu bölümde kullanılabilir; ancak cevap metin içinden gerçekten denetlenebilir olmalıdır."