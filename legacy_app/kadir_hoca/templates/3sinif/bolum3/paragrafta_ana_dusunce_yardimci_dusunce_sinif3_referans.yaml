    - "Ana düşünce yerine soyut hayat dersi ya da slogan seçtirme"
    - "Metin dışı dünya bilgisi gerektiren seçenekler"
  dorduncu_sinifa_kayar:
    - "Bilginin kaynağını sorgulama"
    - "Yazarın amacı, bakış açısı veya mesajını gerekçeli tartıştırma"
    - "Birden fazla yorumun savunulmasını isteme"

konu_alani:
  izinli_ornekler:
    - "bilim insanları ve buluşlar"
    - "tarihi yapılar"
    - "doğa ve hayvanlar"
    - "yardımlaşma"
    - "başarı ve emek"
