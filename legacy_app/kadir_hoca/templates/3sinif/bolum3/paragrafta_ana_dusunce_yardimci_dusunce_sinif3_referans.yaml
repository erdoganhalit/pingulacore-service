    - "Bilgilendirici metin seçilirse ana düşünce metnin sonunda ya da bütününde açıkça belirginleşmelidir."
    - "Öyküleyici metin seçilirse olaydan çıkarılacak ana düşünce aşırı soyut olmamalıdır."
    - "Görselle desteklenebilen konular tercih edilmelidir."

generation_logic:
  steps:
    - step: 1
      action: "3. sınıfa uygun, görselle desteklenebilir tek ve açık bir konu seç"
    - step: 2
      action: "Seçilen konu için 5-7 cümlelik kısa ve sade metin oluştur"
      details:
        - "Tek baskın konu kur"
        - "Metne bir ana düşünce ve onu destekleyen yardımcı bilgiler yerleştir"
        - "Gerekirse cevaplanabilir ve cevaplanamaz soru alanları oluştur"
    - step: 3
      action: "Metnin ana içeriğiyle uyumlu işlevsel görsel tasarla"
      details:
        - "Görsel ana içeriği desteklesin"
        - "Görsel zorunlu olsun"
        - "Görsel tek başına cevabı vermesin"
    - step: 4
      action: "Soru varyantını seç"
      details:
        - "ana_dusunce"
        - "yardimci_dusunce"
        - "metinden_cikarilamaz"
        - "hangi_sorunun_cevabi_yoktur"
    - step: 5
      action: "Varyanta uygun 1 doğru ve 3 yanlış seçenek oluştur"
      details:
        - "Ana düşüncede yardımcı düşünceyi çeldirici olarak kullan"
        - "Yardımcı düşüncede metinde olmayan yakın bilgiyi kullan"
        - "Cevabı yoktur sorularında 3 sorunun metinden cevaplanabilir olduğundan emin ol"
    - step: 6
      action: "Soru kökünü listeden rastgele seç"
    - step: 7
      action: "Şıkları A-B-C-D olarak karıştır"
    - step: 8
      action: "Harici 3. Sınıf TYMM Ortak Kuralları ile doğrulama yap"

