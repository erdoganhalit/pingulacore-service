zorluk_duzeyleri:
  kolay:
    paragraph:
      sentence_count_min: 5
      sentence_count_max: 5
      word_count_min: 55
      word_count_max: 68
      kurallar:
        - "Ana düşünce metinde açık biçimde hissedilmelidir."
        - "Yardımcı bilgiler net ve sınırlı olmalıdır."
        - "Hangi sorunun cevabı yoktur varyantında doğrudan cevaplanabilir sorular tercih edilmelidir."
    preferred_variants:
      - "ana_dusunce"
      - "yardimci_dusunce"
    distractors:
      kurallar:
        - "1 seçenek yardımcı düşünce"
        - "1 seçenek çok genel mesaj"
        - "1 seçenek tema içinde yanlış vurgu"
        - "Yanlış seçenekler kolay elenebilir olmalıdır."
    difficulty_note: >
      Kolay düzeyde öğrenci metnin asıl vurgusunu ve açık yardımcı bilgileri rahatça fark eder.

  orta:
    paragraph:
      sentence_count_min: 5
      sentence_count_max: 6
      word_count_min: 65
      word_count_max: 86
      kurallar:
        - "Ana düşünce açık olmalı; fakat metnin bütününe bakmayı gerektirmelidir."
        - "Metinde 2-3 yardımcı bilgi bulunabilir."
        - "Bir yan ayrıntı çeldirici üretimine malzeme verebilir."
    preferred_variants:
      - "ana_dusunce"
      - "yardimci_dusunce"
      - "metinden_cikarilamaz"
      - "hangi_sorunun_cevabi_yoktur"
    distractors:
      kurallar:
        - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
        - "Hangi sorunun cevabı yoktur sorularında 3 soru gerçekten metinden cevaplanabilir olmalıdır."
        - "Metinden çıkarılamaz sorularında 3 seçenek metinle açıkça desteklenebilir olmalıdır."
    difficulty_note: >
      Orta düzeyde öğrenci ana düşünce ile yardımcı bilgiyi ayırt etmeli ve metinden hangi bilginin çıkarılamadığını fark etmelidir.

  zor:
    paragraph:
      sentence_count_min: 6
      sentence_count_max: 7
      word_count_min: 82
      word_count_max: 105
      kurallar:
        - "Metinde ana düşünce ile onu destekleyen birkaç farklı yardımcı bilgi birlikte bulunmalıdır."
        - "Yan ayrıntılar çeldirici üretimine malzeme verebilir."
        - "Hangi sorunun cevabı yoktur varyantında cevaplanabilen sorular doğrudan ve dolaylı bilgi karışımı içerebilir."
        - "Zor düzeyde bile soru 4. sınıfa kayan kaynak sorgulama, tartışma veya ayrıntılı gerekçelendirme istememelidir."
    preferred_variants:
      - "ana_dusunce"
      - "metinden_cikarilamaz"
      - "hangi_sorunun_cevabi_yoktur"
    distractors:
      kurallar:
        - "3 yanlış seçeneğin en az 2'si metne yakın görünmelidir."
        - "Ana düşünce sorularında bir seçenek yardımcı düşünce, bir seçenek tema içinde yanlış vurgu, bir seçenek çok genel mesaj olabilir."
        - "Cevabı yoktur sorularında yalnız 1 soru gerçekten metinden cevaplanamamalıdır."
    difficulty_note: >
      Zor düzeyde öğrencinin metnin asıl vurgusunu yardımcı ayrıntılardan ayırması ve cevaplanabilir/cevaplanamaz ayrımını dikkatle yapması beklenir.

difficulty_selection_policy:
  default: "Orta"
  allowed_values: ["Kolay", "Orta", "Zor"]
  hard_limits:
    - "Her soru 4 seçenekli olmalıdır."
    - "Her soru için görsel zorunludur."
    - "Metin 3. sınıf düzeyini aşan ağır soyutluk içermemelidir."
    - "Zor düzey seçilse bile soru 4. sınıf düzeyinde bilginin kaynağını sorgulama, ileri yorum veya ayrıntılı nedenlendirme sorusuna dönüşemez."
    - "Kolay düzeyde aşırı yakın çeldirici yükü kurulmamalıdır."

