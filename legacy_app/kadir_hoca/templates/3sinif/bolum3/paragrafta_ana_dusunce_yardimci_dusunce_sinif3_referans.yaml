meta:
  id: "paragrafta_ana_dusunce_yardimci_dusunce_sinif3_standart_gorselli_dort_secenekli"
  ad: "Paragrafta Ana Düşünce – Yardımcı Düşünce"
  sinif_seviyesi: 3
  ders: "Türkçe"
  bolum: "3. Sınıf Türkçe Paragraf Kitabı"
  alt_bolum: "3. Paragrafta Ana Düşünce – Yardımcı Düşünce"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    3. sınıf öğrencisi için kısa bir metinde asıl vurgulanmak isteneni,
    metni destekleyen yardımcı bilgileri ve metinde cevabı bulunan/bulunmayan
    soruları ayırt ettirmeye yönelik, görsel destekli ve 4 seçenekli standart
    soru üretim şablonu.
  kullanim_notu: >
    Bu şablon, harici olarak kullanılan 3. Sınıf TYMM Ortak Kuralları YAML'ı,
    3. sınıf öğretim programı ve 3. sınıf MEB Türkçe kitapları ile birlikte
    doğrulanmalıdır.

format:
  type: "llm_generated_html"
  description: "Görsel + tek paragraf + soru kökü + 4 seçenek"

  question_variant:
    allowed:
      - "ana_dusunce"
      - "yardimci_dusunce"
      - "metinden_cikarilamaz"
      - "hangi_sorunun_cevabi_yoktur"
    default: "ana_dusunce"

  paragraph:
    required: true
    text_modes:
      - "simple_info"
      - "short_narrative"
    sentence_count_min: 5
    sentence_count_max: 7
    word_count_min: 55
    word_count_max: 105
    style: "simple_clear_primary_text"
    kurallar:
      - "Metin tek baskın konu veya tek baskın olay etrafında kurulmalıdır."
      - "Metin 3. sınıf öğrencisinin anlayabileceği kadar açık, sade ve akıcı olmalıdır."
      - "Metin 2. sınıfa göre biraz daha ayrıntılı olabilir; ancak dağınık olmamalıdır."
      - "Metinde ana düşünceyi destekleyen en az 2 yardımcı bilgi bulunmalıdır."
      - "Ana düşünce, metnin tamamı düşünüldüğünde belirlenebilir olmalıdır."
      - "Yardımcı bilgiler ana düşünceyi desteklemeli, ama onun yerine geçmemelidir."
      - "Metin dış bilgi gerektirmemelidir."
      - "Metin 4. sınıf düzeyinde kaynak sorgulama, yazar niyeti çözümleme veya ileri eleştirel yorum gerektirmemelidir."
      - "Bilgilendirici metinlerde ana bilgi ile sonuç bölümü uyumlu olmalıdır."
      - "Öyküleyici metinlerde olay, kişi ve durum açıkça izlenebilir olmalıdır."
      - "Metinde en az bir doğrudan cevaplanabilir soru alanı ve gerekiyorsa en az bir cevaplanamayan alan doğal biçimde bulunabilir olmalıdır."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."

  visual:
    required: true
    description: "Metnin ana içeriğini destekleyen işlevsel görsel"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "tek sahneli illüstrasyon"
      - "tek sahneli fotoğraf benzeri çizim"
      - "tek olay veya tek varlık odaklı sahne"
      - "bilgilendirici metni destekleyen konu görseli"
    kurallar:
      - "Her soru için görsel zorunludur."
      - "Görsel metnin ana içeriğiyle açık uyumlu olmalıdır."
      - "Görsel süs olmamalı, çözümde etkili destek sunmalıdır."
      - "Görsel tek başına doğru cevabı açıkça vermemelidir."
      - "Görsel ile metin birlikte değerlendirildiğinde ana düşünce veya yardımcı bilgi daha netleşebilir."
      - "Görsel dikkat dağıtıcı gereksiz ayrıntılar içermemelidir."
      - "Görsel yanlış seçeneği açıkça işaret edecek kadar yanıltıcı olmamalıdır."
    yasaklar:
      - "dekoratif ve metinden bağımsız görsel"
      - "çok sahneli karmaşık kolaj"
      - "grafik, tablo veya infografik yoğunluğu taşıyan tasarım"
      - "metnin asıl odağını gizleyen karışık arka plan"

  stem:
    required: true
    selection: "random_from_list_by_variant"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    correct_count: 1
    style_by_variant:
      ana_dusunce: "short_judgment"
      yardimci_dusunce: "short_judgment"
      metinden_cikarilamaz: "short_judgment"
      hangi_sorunun_cevabi_yoktur: "question_form"
    word_count_min: 3
    word_count_max: 12
    kurallar:
      - "3. sınıfta her soru 4 seçenekli olmalıdır."
      - "Seçenekler kısa, sade ve 3. sınıf düzeyinde olmalıdır."
      - "Ana düşünce sorularında seçenekler yargı cümlesi veya kısa yargı ifadesi biçiminde olmalıdır."
      - "Yardımcı düşünce sorularında seçenekler metinde geçen destekleyici bilgilerle ilişkili olmalıdır."
      - "Hangi sorunun cevabı yoktur varyantında tüm seçenekler soru biçiminde olmalıdır."
      - "Yalnız bir seçenek tam doğru olmalıdır."
      - "Yanlış seçenekler metne yakın görünmeli ama dikkatli okuyunca elenebilmelidir."
      - "Aynı soruda birden fazla makul doğru seçenek oluşmamalıdır."

