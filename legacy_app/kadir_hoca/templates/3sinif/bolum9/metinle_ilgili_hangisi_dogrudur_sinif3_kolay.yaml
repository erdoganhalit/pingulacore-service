    - "Catisma turleri analizi YASAK"
    - "Yardimci karakter islevi analizi YASAK"
    - "Agir sembolik ya da cok katmanli olay cozumleme YASAK"
    - "Karakter islevi ve anlatim teknigi yorumlatma (4. sinif) YASAK"
    - "Catisma ve bakis acisi cozumletme (4. sinif) YASAK"
    - "Ortuk, tartismali veya cok katmanli unsur yorumlatma (4. sinif) YASAK"
