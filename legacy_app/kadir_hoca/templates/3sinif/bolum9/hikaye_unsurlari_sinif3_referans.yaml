  tanim: "Metinde açıkça verilen ya da basit biçimde çıkarılabilen hikâye unsuruna dayanan doğru seçenek"
  kurallar:
    - "Doğru cevap metinde açıkça bulunan hikâye unsuruna dayanmalıdır."
    - "Doğru cevap dış bilgi gerektirmemelidir."
    - "Doğru cevap 3. sınıf öğrencisinin dikkatli okuyarak bulabileceği açıklıkta olmalıdır."
    - "Mekan veya zaman açık değilse bunlar doğru seçenek içinde kesin bilgi gibi sunulmamalıdır."
    - "Hikâye unsurları küme sorularında yalnız metinde gerçekten bulunan unsurlar seçilmelidir."

yanlis_secenek_stratejileri:
  count_per_question: 3
  strategy_pool:
    - id: "metinde_gecmeyen_ayrinti"
      tanim: "Metinde hiç verilmeyen mekan, zaman veya kişi ayrıntısını doğruymuş gibi sunma"

    - id: "yakın_ama_yanlis_hikaye_unsuru"
      tanim: "Metne yakın görünen ama yanlış unsur veya yanlış unsur kümesi sunma"

    - id: "olay_yer_zaman_karistirma"
      tanim: "Metindeki olay, mekan ve zaman bilgisini birbiriyle karıştıran seçenek"

    - id: "kismi_dogru_kismi_yanlis"
      tanim: "Bir kısmı metne uyar gibi görünür ama tamamı doğru değildir"

  secim_kurali:
    - "Her soruda 3 yanlış seçenek farklı stratejilerden seçilmelidir."
    - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
    - "En az 1 yanlış seçenek metinde geçmeyen ayrıntı içermelidir."
    - "Hikâye unsurları küme sorularında yanlış kümeler metne yakın ama eksik veya fazla unsur içermelidir."

zorluk_duzeyleri:
  kolay:
    text:
      kurallar:
        - "Metinde kişi ve olay açıkça verilmelidir."
        - "Mekan veya zaman unsurlarından en az biri açıkça verilmelidir."
        - "Doğru cevap doğrudan metinden bulunabilmelidir."
    preferred_variants:
      - "metinle_ilgili_hangisi_dogrudur"
      - "hangi_hikaye_unsurlari_belirtilmistir"
    distractors:
      kurallar:
        - "1 seçenek metinde geçmeyen ayrıntı içermelidir."
        - "1 seçenek hikâye unsurunu eksik vermelidir."
        - "1 seçenek mekan veya zamanı yanlış vermelidir."
    difficulty_note: >
      Kolay düzeyde öğrenci kişi, olay, mekan ve zaman gibi açık bilgileri doğrudan fark eder.

  orta:
    text:
      kurallar:
        - "Metinde kişi ve olay açık, mekan veya zaman daha dolaylı olabilir."
        - "Doğru cevap için metnin tamamı düşünülmelidir."
        - "Yanlış seçenekler metne yakın görünebilir."
    preferred_variants:
      - "metinle_ilgili_hangisi_dogrudur"
      - "hangi_hikaye_unsuru_belirtilmemistir"
      - "hangi_hikaye_unsuru_dogrudur"
      - "hangi_hikaye_unsurlari_belirtilmistir"
    distractors:
      kurallar:
        - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
        - "Yanlış seçeneklerden biri kısmi doğru-kısmi yanlış olmalıdır."
        - "Yanlış seçeneklerden biri mekan-zaman karışıklığı taşımalıdır."
    difficulty_note: >
      Orta düzeyde öğrenci metindeki açık ve dolaylı hikâye unsurlarını ayırt etmelidir.

  zor:
    text:
      kurallar:
        - "Metinde dört unsurun hepsi bulunmak zorunda değildir."
        - "Öğrenci, açıkça verilen ile verilmeyen bilgiyi dikkatle ayırmalıdır."
        - "Zor düzeyde bile bakış açısı, çatışma türü veya karakter işlevi gibi ileri analizler kullanılmaz."
    preferred_variants:
      - "hangi_hikaye_unsuru_belirtilmemistir"
      - "hangi_hikaye_unsurlari_belirtilmistir"
      - "metinle_ilgili_hangisi_dogrudur"
    distractors:
      kurallar:
        - "3 yanlış seçeneğin en az 2'si metne yakın görünmelidir."
        - "Yanlış seçeneklerden biri metinde olmayan ama mantıklı görünen ayrıntı içermelidir."
        - "Yanlış seçeneklerden biri unsur kümesini fazla ya da eksik vermelidir."
    difficulty_note: >
      Zor düzeyde öğrencinin açık bilgi ile metinde verilmeyen bilgiyi karıştırmadan doğru unsurları seçmesi beklenir.

difficulty_selection_policy:
  default: "Orta"
  allowed_values: ["Kolay", "Orta", "Zor"]
  hard_limits:
    - "Her soru 4 seçenekli olmalıdır."
    - "Her soru için görsel zorunludur."
    - "Metin 3. sınıf düzeyini aşan ağır soyutluk içermemelidir."
    - "Zor düzey seçilse bile soru anlatıcı bakış açısı, çatışma türü, yardımcı karakter işlevi gibi 4. sınıf üstü analizlere dönüşemez."
    - "Kolay düzeyde aşırı yakın çeldirici yükü kurulmamalıdır."

