generation_logic:
  steps:
    - step: 1
      action: "3. sınıfa uygun, kısa hikâye unsurları içeren somut bir konu seç"
    - step: 2
      action: "Seçilen konu için 4-6 cümlelik kısa bir öyküleyici metin oluştur"
      details:
        - "Kişi ve olayı açıkça kur"
        - "Mekan veya zaman unsurlarından en az birini yerleştir"
        - "Metni sade ve doğal tut"
    - step: 3
      action: "Metni destekleyen işlevsel görsel tasarla"
      details:
        - "Görsel ana kişi veya olayı desteklesin"
        - "Görsel zorunlu olsun"
        - "Görsel tek başına cevabı vermesin"
    - step: 4
      action: "Soru varyantını seç"
      details:
        - "metinle_ilgili_hangisi_dogrudur"
        - "hangi_hikaye_unsurlari_belirtilmistir"
        - "hangi_hikaye_unsuru_belirtilmemistir"
        - "hangi_hikaye_unsuru_dogrudur"
    - step: 5
      action: "Varyanta uygun 1 doğru ve 3 yanlış seçenek oluştur"
      details:
        - "Bir yanlış seçenek metinde olmayan ayrıntı eklesin"
        - "Bir yanlış seçenek unsur kümesini eksik ya da fazla versin"
        - "Bir yanlış seçenek olay-mekan-zaman bilgisini karıştırsın"
    - step: 6
      action: "Soru kökünü listeden rastgele seç"
    - step: 7
      action: "Şıkları A-B-C-D olarak karıştır"
    - step: 8
      action: "Harici 3. Sınıf TYMM Ortak Kuralları ile doğrulama yap"

