  metinle_ilgili_hangisi_dogrudur:
    - "Bu metinle ilgili aşağıdakilerden hangisi doğrudur?"
    - "Bu hikâye ile ilgili aşağıdakilerden hangisi doğrudur?"
    - "Metne göre aşağıdakilerden hangisi söylenebilir?"
    - "Aşağıdakilerden hangisi bu metin için doğrudur?"
    - "Parçaya göre aşağıdakilerden hangisi doğrudur?"

  hangi_hikaye_unsurlari_belirtilmistir:
    - "Bu metinde aşağıdaki hikâye unsurlarından hangileri belirtilmiştir?"
    - "Bu hikâyede aşağıdaki unsurlardan hangileri vardır?"
    - "Metinde verilen hikâye unsurları hangileridir?"
    - "Bu parçada hangi hikâye unsurlarına mekan verilmiştir?"
    - "Aşağıdaki hikâye unsurlarından hangileri bu metinde vardır?"

  hangi_hikaye_unsuru_belirtilmemistir:
    - "Bu metinde aşağıdaki hikâye unsurlarından hangisi belirtilmemiştir?"
    - "Bu hikâyede aşağıdaki unsurlardan hangisine mekan verilmemiştir?"
    - "Parçada aşağıdaki hikâye unsurlarından hangisi yoktur?"
    - "Aşağıdakilerden hangisi bu metinde belirtilmemiştir?"
    - "Bu metinde hangi hikâye unsuru açıkça verilmemiştir?"

  hangi_hikaye_unsuru_dogrudur:
    - "Bu metne göre aşağıdakilerden hangisi hikâye unsurlarından biri olarak doğrudur?"
    - "Parçadaki hikâye unsurlarına göre aşağıdakilerden hangisi doğrudur?"
    - "Bu hikâyede verilen unsurlardan biri aşağıdakilerden hangisidir?"
    - "Aşağıdakilerden hangisi bu metindeki hikâye unsuruna uygundur?"
    - "Metindeki hikâye unsurlarından biri aşağıdakilerden hangisidir?"

