ornek_bicim_notlari:
  - "Elif nine metninde temel kahraman Elif ninedir; mekan ve zaman açık verilmemiş olabilir."
  - "Okulun ilk günü metninde kişi, zaman, mekan ve olay unsurlarının hepsi açıkça verilebilir."
  - "Bu bölümde amaç, hikâyenin temel parçalarını fark ettirmektir; bakış açısı veya çatışma çözümletmek değildir."