meta:
  id: "hikaye_unsurlari_sinif3_standart_gorselli_dort_secenekli"
  ad: "Hikâye Unsurları"
  sinif_seviyesi: 3
  ders: "Türkçe"
  bolum: "3. Sınıf Türkçe Paragraf Kitabı"
  alt_bolum: "9. Hikâye Unsurları"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    3. sınıf öğrencisi için kısa bir hikâye ya da öyküleyici metinde
    Kişi, Olay, Mekan ve Zaman unsurlarını fark ettirmeye yönelik,
    görsel destekli ve 4 seçenekli standart soru üretim şablonu.
  kullanim_notu: >
    Bu şablon, harici olarak kullanılan 3. Sınıf TYMM Ortak Kuralları YAML'ı,
    3. sınıf öğretim programı ve 3. sınıf MEB Türkçe kitapları ile birlikte
    doğrulanmalıdır.

format:
  type: "llm_generated_html"
  description: "Görsel + kısa hikâye/öyküleyici metin + soru kökü + 4 seçenek"

  question_variant:
    allowed:
      - "metinle_ilgili_hangisi_dogrudur"
      - "hangi_hikaye_unsurlari_belirtilmistir"
      - "hangi_hikaye_unsuru_belirtilmemistir"
      - "hangi_hikaye_unsuru_dogrudur"
    default: "metinle_ilgili_hangisi_dogrudur"

  text:
    required: true
    text_variant_allowed:
      - "short_narrative"
    sentence_count_min: 4
    sentence_count_max: 6
    word_count_min: 38
    word_count_max: 85
    style: "simple_clear_primary_text"
    kurallar:
      - "Metin kısa bir hikâye ya da öyküleyici anlatım biçiminde kurulmalıdır."
      - "Metinde en az 2 hikâye unsuru açıkça bulunmalıdır."
      - "İdeal olarak kişi ve olay açıkça verilmelidir."
      - "Mekan ve zaman unsurları açıkça verilebilir ya da yalnız biri açık olabilir."
      - "Metin 3. sınıf öğrencisinin anlayabileceği kadar açık, sade ve akıcı olmalıdır."
      - "Metin dış bilgi gerektirmemelidir."
      - "Metinde anlatıcı bakış açısı, çatışma türü, yardımcı karakter işlevi gibi ileri çözümleme gerektiren yapı kurulmaz."
      - "Soru, kim, ne oldu, nerede oldu, ne zaman oldu düzeyinde kalmalıdır."
      - "Duygu mekan alabilir; ancak asıl odak hikâye unsurları olmalıdır."
      - "KRITIK: Hikaye unsurlari YALNIZ 4 tanedir: Kişi, Zaman, Mekan, Olay. Bu 4 unsur disinda hicbir sey hikaye unsuru olarak sunulmaz (anlatici, olay orgusu, tema vb. YASAK)."

  hikaye_unsurlari_kurallari:
    kisi:
      tanim: "Olayı yaşayan, konuşan, etkilenen insan, hayvan veya hayali varlıklar"
      kurallar:
        - "Kişi adı veya kişi türü metinde açıkça anlaşılmalıdır."
        - "Kişi sorularında temel kahraman ya da geçen kişi ölçülmelidir."
    olay:
      tanim: "Hikâyede olan şey, yaşanan durum veya yapılan iş"
      kurallar:
        - "Olay kısa ve açık olmalıdır."
        - "Olay metnin ana ekseni olmalıdır."
    mekan:
      tanim: "Hikâyenin geçtiği mekân"
      kurallar:
        - "Mekan açıkça verilebileceği gibi basit bağlamla anlaşılabilir olabilir."
        - "Mekan belirsizse soru buna göre kurulmalı; olmayan bilgi varmış gibi sorulmamalıdır."
    zaman:
      tanim: "Hikâyenin ne zaman geçtiğini gösteren ifade"
      kurallar:
        - "Zaman sabah, akşam, kış, bayram sabahı, ilk okul günü gibi açık düzeyde olmalıdır."
        - "Belirsiz zaman varsa zaman unsuru sorusuna temel yapılmamalıdır."

  visual:
    required: true
    description: "Metnin ana olayını veya temel kahramanını destekleyen işlevsel görsel"
    placement: "text_right_or_top"
    visual_type_allowed:
      - "tek sahneli illüstrasyon"
      - "tek sahneli fotoğraf benzeri çizim"
      - "tek olay veya tek kahraman odaklı sahne"
      - "hikâyenin geçtiği ortamı destekleyen sade görsel"
    kurallar:
      - "Her soru için görsel zorunludur."
      - "Görsel metnin ana içeriğiyle açık uyumlu olmalıdır."
      - "Görsel süs olmamalı, bağlamı desteklemelidir."
      - "Görsel tek başına doğru cevabı açıkça vermemelidir."
      - "Görsel ile metin birlikte değerlendirildiğinde hikâye unsurları daha netleşebilir."
      - "Görsel dikkat dağıtıcı gereksiz ayrıntılar içermemelidir."
    yasaklar:
      - "dekoratif ve metinden bağımsız görsel"
      - "çok sahneli karmaşık kolaj"
      - "birden fazla olayın iç içe verildiği karışık kompozisyon"

  stem:
    required: true
    selection: "random_from_list_by_variant"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    correct_count: 1
    style_by_variant:
      metinle_ilgili_hangisi_dogrudur: "short_judgment"
      hangi_hikaye_unsurlari_belirtilmistir: "element_set"
      hangi_hikaye_unsuru_belirtilmemistir: "element_label"
      hangi_hikaye_unsuru_dogrudur: "short_judgment"
    word_count_min: 1
    word_count_max: 12
    kurallar:
      - "3. sınıfta her soru 4 seçenekli olmalıdır."
      - "Seçenekler kısa, sade ve 3. sınıf düzeyinde olmalıdır."
      - "Doğru seçenek yalnız metinde açıkça bulunan ya da basit biçimde çıkarılabilen hikâye unsuruna dayanmalıdır."
      - "Yanlış seçenekler metne yakın görünebilir; ancak açık bilgiyle çelişmelidir."
      - "Birden fazla makul doğru seçenek oluşmamalıdır."

