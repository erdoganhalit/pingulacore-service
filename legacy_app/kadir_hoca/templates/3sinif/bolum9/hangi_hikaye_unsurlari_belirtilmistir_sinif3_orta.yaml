# Referans: hikaye_unsurlari_sinif3_referans.yaml → zorluk_duzeyleri.orta
# Orta duzey — hangi_hikaye_unsurlari_belirtilmistir varyanti

meta:
  id: "hangi_hikaye_unsurlari_belirtilmistir_sinif3_orta"
  ad: "3. Sinif - Hikaye Unsurlari / Hangi Hikaye Unsurlari Belirtilmistir (Orta)"
  sinif_seviyesi: 3
  aciklama: "Orta duzey — hangi_hikaye_unsurlari_belirtilmistir: Hangi Hikaye Unsurlari Belirtilmistir. 3 secenekli, gorselli, kisa oykuleyici metin."
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Gorsel + kisa oykuleyici metin + soru koku + 3 secenek (orta, hangi_hikaye_unsurlari_belirtilmistir)"

  paragraph:
    required: true
    word_count_min: 38
    word_count_max: 85
    sentence_count_min: 4
    sentence_count_max: 6
    stil: "kisa_oykuleyici_metin"
    background_color: "#f8f0e0"
    kurallar:
      - "Metin kisa bir hikaye ya da oykuleyici anlatim biciminde kurulmalidir."
      - "Metinde en az 2 hikaye unsuru acikca bulunmalidir."
      - "Ideal olarak kisi ve olay acikca verilmelidir."
      - "Mekan ve zaman unsurlari acikca verilebilir ya da yalniz biri acik olabilir."
      - "Metin 3. sinif ogrencisinin anlayabilecegi kadar acik, sade ve akici olmalidir."
      - "Metin dis bilgi gerektirmemelidir."
      - "Metinde anlatici bakis acisi, catisma turu, yardimci karakter islevi gibi ileri cozumleme gerektiren yapi kurulmaz."
      - "Soru, kim, ne oldu, nerede oldu, ne zaman oldu duzeyinde kalmalidir."
      - "Duygu mekan alabilir; ancak asil odak hikaye unsurlari olmalidir."
      - "Metinde kisi ve olay acik, mekan veya zaman daha dolayli olabilir."
      - "Dogru cevap icin metnin tamami dusunulmelidir."
      - "Yanlis secenekler metne yakin gorunebilir."
      - "KISILER: Olayi yasayan, konusan, etkilenen insan, hayvan veya hayali varliklar. Kisi adi veya kisi turu metinde acikca anlasilmalidir."
      - "OLAY: Hikayede olan sey, yasanan durum veya yapilan is. Olay kisa, acik ve metnin ana ekseni olmalidir."
      - "MEKAN: Hikayenin gectigi mekan. Mekan acikca verilebilecegi gibi basit baglamla anlasilabilir olabilir. Mekan belirsizse soru buna gore kurulmali; olmayan bilgi varmis gibi sorulmamalidir."
      - "ZAMAN: Hikayenin ne zaman gectigini gosteren ifade (sabah, aksam, kis, bayram sabahi, ilk okul gunu gibi acik duzeyde). Belirsiz zaman varsa zaman unsuru sorusuna temel yapilmamalidir."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "KRITIK: Hikaye unsurlari YALNIZ 4 tanedir: Kişi, Zaman, Mekan, Olay. Bu 4 unsur disinda hicbir sey hikaye unsuru olarak sunulmaz (anlatici, olay orgusu, tema vb. YASAK)."

  visual:
    required: true
    description: "Metnin ana olayini veya temel kahramanini destekleyen islevsel gorsel"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "tek sahneli illustrasyon"
      - "tek sahneli fotograf benzeri cizim"
      - "tek olay veya tek kahraman odakli sahne"
      - "hikayenin gectigi ortami destekleyen sade gorsel"
    kurallar:
      - "Her soru icin gorsel zorunludur."
      - "Gorsel metnin ana icerigiyle acik uyumlu olmalidir."
      - "Gorsel sus olmamali, baglami desteklemelidir."
      - "Gorsel tek basina dogru cevabi acikca vermemelidir."
      - "Gorsel ile metin birlikte degerlendirildiginde hikaye unsurlari daha netlesebilir."
      - "Gorsel dikkat dagitici gereksiz ayrintilar icermemelidir."
    yasaklar:
      - "dekoratif ve metinden bagimsiz gorsel"
      - "cok sahneli karmasik kolaj"
      - "birden fazla olayin ic ice verildiği karisik kompozisyon"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir (hangi_hikaye_unsurlari_belirtilmistir varyanti)"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 6
    word_count_max: 30
    style: "element_set_labeled_multiline"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "3. sinifta her soru 3 secenekli olmalidir."
      - "★★★ KRITIK FORMAT KURALI — DIKEY (ALT ALTA) YAPI ★★★"
      - "Her secenek, 2-3 unsuru SOMUT DEGERLERIYLE alt alta gosterir. YAN YANA YASAK."
      - "HTML format: her unsur satiri <br> ile ayrilmali, 'Unsur: deger' seklinde yazilmali."
      - "Ornek dogru format (HTML): 'Zaman: Cumartesi sabahı<br>Mekan: Bahçe<br>Kişi: Ali'"
      - "Ornek YASAK format: 'Kisi – olay – mekan' (unsur isimleri tire ile birlestirilmis)."
      - "Ornek YASAK format: 'Kişi: Ali, Mekan: Bahçe, Zaman: Sabah' (virgul ile tek satirda)."
      - "★★★"
      - "Her secenekte 2-3 unsur yer almali (tipik: Zaman + Mekan + Kişi, veya Mekan + Kişi + Olay)."
      - "Unsur adlari: Zaman, Mekan (veya Yer), Kişi (veya Kişiler), Olay."
      - "Her unsur SOMUT deger almali (metinden alinmis veya metinle uyumlu gerçek bilgi)."
      - "Dogru secenek: metinde acikca gecen tum unsur degerleriyle tam uyumlu."
      - "Yanlis secenekler: en az bir unsur degeri metinle celisir veya eksiktir."
      - "Yanlis seceneklerden biri kismi dogru-kismi yanlis olmalidir (unsurlardan biri dogru, digerleri yanlis)."
      - "Yanlis seceneklerden biri mekan-zaman karisikligi tasimalidir (zaman yerine mekan degeri gibi)."
      - "Her secenekte ayni unsur ad seti kullanilmali (her secenek ayni 2-3 unsur adini icermeli, yalniz degerler farklidir)."

soru_kokleri:
  - "<b>Bu metinde asagidaki hikaye unsurlarindan hangileri belirtilmistir?</b>"
  # KULLANILDI: - "<b>Metinde verilen hikaye unsurlari hangileridir?</b>"

dogru_cevap:
  tanim: "Metinde acikca verilen ya da basit bicimde cikarilabilen hikaye unsuruna dayanan dogru secenek"
  kurallar:
    - "Dogru cevap metinde acikca bulunan hikaye unsuruna dayanmalidir."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru cevap 3. sinif ogrencisinin dikkatli okuyarak bulabilecegi aciklikta olmalidir."
    - "Mekan veya zaman acik degilse bunlar dogru secenek icinde kesin bilgi gibi sunulmamalidir."
    - "Hikaye unsurlari kume sorularinda yalniz metinde gercekten bulunan unsurlar secilmelidir."

celdirici_stratejileri:
  - ad: "METINDE_GECMEYEN_AYRINTI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metinde hic verilmeyen mekan, zaman veya kisi ayrintisini dogruymus gibi sunma"
    nasil_olusturulur: |
      Metinde hic gecmeyen bir mekan, zaman veya kisi bilgisi ekleyen secenek olustur.
      Ornek: Metin mahallede geciyorsa 'Olay okulda gecmistir' gibi.
    kategori: "semantic"

  - ad: "YAKIN_AMA_YANLIS_HIKAYE_UNSURU"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metne yakin gorunen ama yanlis unsur veya yanlis unsur kumesi sunma"
    nasil_olusturulur: |
      Metne yakin gorunen ama hikaye unsuru icinde yanlis olan bir secenek olustur.
      Ornek: Metin kisi ve olay veriyorsa 'Kisi – olay – mekan' gibi eksik/fazla kume.
    kategori: "cognitive"

  - ad: "OLAY_YER_ZAMAN_KARISTIRMA"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metindeki olay, mekan ve zaman bilgisini birbiriyle karistiran secenek"
    nasil_olusturulur: |
      Olay, mekan veya zaman bilgilerini birbirine karistiran bir secenek olustur.
      Ornek: Metinde olay 'top oynama' mekan 'bahce' ise 'Olay: bahce, mekan: oyuncak'.
    kategori: "cognitive"

  - ad: "KISMI_DOGRU_KISMI_YANLIS"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Bir kismi metne uyar gibi gorunur ama tamami dogru degildir"
    nasil_olusturulur: |
      Bir bolumu metne uyan ama tamami dogru olmayan bir secenek olustur.
      Ornek: Kisi dogru ama mekan yanlis.
    kategori: "cognitive"

use_shared_strategies: false

