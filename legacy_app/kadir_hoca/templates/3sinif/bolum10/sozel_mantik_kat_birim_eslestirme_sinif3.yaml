validation_checklist:
  paragraph:
    - "Setup cümlesi + maddeli koşul formatında mı?"
    - "Koşullar 3 madde arasında mı?"
    - "Her madde farklı bilgi taşıyor mu?"
    - "Maddeler birbirini tekrar etmiyor mu?"
