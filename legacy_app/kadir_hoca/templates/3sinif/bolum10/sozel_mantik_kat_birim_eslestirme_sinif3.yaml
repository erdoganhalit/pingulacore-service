# ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    kişi-birim-kat yapısı kurulduktan sonra mantıksal olarak kesin biçimde
    belirlenebilen ilişki önermesidir. Öğrenciden tek bir ipucuna dayanarak
    değil, tüm maddeleri analiz ederek doğru eşleştirmeyi ya da kesin doğru/yanlış
    önermeyi seçmesi beklenir.

  temel_ilke: >
    Gizli kat-birim yapısı kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan kesin kişi–birim ya da kişi–kişi aynı birim
    ilişkisi olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara grup yapıları, kişi-birim eşleşmeleri ve birim-kat bağlantıları üzerinden gizli yapı kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce kişi-birim ve birim-kat yapısını kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; kurulmuş gizli yapının zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: gizli yapıdan KESİNLİKLE çıkan ilişki olmalıdır"
    - "Negatif köklerde doğru cevap: gizli yapıyla çelişen ya da gizli yapıdan kesin olarak çıkarılamayan ilişki olmalıdır"
    - "Çıkarım köklerinde yalnızca bir seçenek kesin doğru ya da kesin yanlış olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir çıkarım olmalıdır"
    - "Doğru cevap 3-18 kelime arasında olmalıdır"
    - "Duruma göre kısa ifade ya da tam cümle olabilir"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli kat-birim yapısı kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen kişi/birim/kat ilişkisinin doğrudan tekrarına dönüşmesi"
    - "Birden fazla seçeneğin gizli yapıdan eşit derecede doğru ya da yanlış çıkması"
    - "Doğru cevabın tüm yapıyı açık eden kapsamlı bir açıklama biçiminde yazılması"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli kat-birim yapısı kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Diğer seçeneklerin de aynı ölçüde doğru ya da yanlış olma ihtimali kalıyor mu?"
# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel kişi–birim önermeleri olmamalıdır. Her yanlış seçenek, öğrencinin
    gizli kişi-birim-kat yapısını kurarken yapabileceği bütünsel bir muhakeme
    hatasının sonucu olmalıdır. Öğrenci yanlış bir ara eşleştirme yapısı kurarsa
    ya da kişi–birim ve birim–kat ilişkilerini gereğinden erken kesinleştirirse,
    bu şıklardan birini işaretlemeye yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif kişi-birim-kat yapısının sonucu olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı ilişki önermesi olmalıdır"
    - "Çeldirici, tüm yapı kurulmadan değil; yanlış yapı kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış eşleştirme yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru gizli yapı ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş yapıda doğruymuş gibi görünen makul kişi–birim veya kişi–kişi aynı birim önermesi yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli kişi-birim-kat yapısını kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış eşleştirme yapısı veya yanlış kesinleştirme kurgusu tasarla."
    - "3. Her yanlış kurgu, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış kurguların sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldirici, sorudaki temsil düzeyini korumalı; kişi–birim ya da kişi–kişi aynı birim önermesi biçiminde kalmalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış kişi-birim-kat mantığına dayanmalıdır"
    - "Bazı çeldirici türleri tek başına yeterince güçlü olmayabilir; bu türler başka bir yanlış eşleştirme stratejisiyle birlikte kullanılmalıdır"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalı; daha güçlü bir yanlış eşleştirme stratejisini destekleyici olarak kullanılmalıdır"
    - "Çeldiriciler, öğrencinin gizli yapıyı yanlış ya da eksik tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış kat-birim eşleştirmesi sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca rastgele başka bir kişiyle ya da başka bir birimle değiştirilmiş hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek aynı temsil düzeyinde ilişki önermesi biçiminde olmalıdır"

  stratejiler:
    - ad: "AYNI_BIRIM_GRUBUNU_YANLIS_KURMA"
      bilisssel_hata_kategorisi: "grup_hatasi"
      aciklama: "Öğrenci birlikte aynı birime giden kişileri doğru görür gibi olur; fakat grubu yanlış kişiyle tamamlar"
      nasil_olusturulur: |
        Aynı birime giden iki kişilik ya da çok kişilik bir grubu kısmen koru;
        ancak gruba yanlış bir kişiyi ekleyen veya doğru kişiyi dışarıda bırakan
        alternatif bir yapı kur. Çeldirici, bu yanlış grup kurgusundan doğan
        kişi–birim ya da kişi–kişi aynı birim önermesi olmalıdır.

    - ad: "KAT_BILGISINI_YANLIS_BIRIME_TASIMA"
      bilisssel_hata_kategorisi: "kat_yorum_hatasi"
      aciklama: "Öğrenci bir kat bilgisi ile ilgili doğru çıkarımı yapar; fakat bunu yanlış birime bağlar"
      nasil_olusturulur: |
        Belirli katta bulunan birimle ilgili doğru bir özelliği koru; ancak bu
        katı veya katta yer alan birimi başka bir birime kaydıran alternatif bir
        yapı kur. Çeldirici, kat doğruymuş gibi görünse de birim bağlantısı yanlış
        olan önermeye dayanmalıdır.

    - ad: "KISI_BIRIM_VE_KAT_ARASINDA_DOLAYLI_BAGI_YANLIS_KURMA"
      bilisssel_hata_kategorisi: "capraz_hata"
      aciklama: "Öğrenci kişi–birim ve birim–kat ilişkisini ayrı ayrı kısmen doğru kurar; fakat bunları yanlış birleştirir"
      nasil_olusturulur: |
        Bir kişinin gidebileceği birim ile o birimin bulunabileceği katı ayrı ayrı
        makul bırak; ancak bu iki hattı yanlış biçimde birleştiren alternatif bir
        yapı kur. Çeldirici, çapraz bağın yanlış kurulması sonucu doğruymuş gibi
        görünen kişi–birim önermesine dayanmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince
        bozulması gereken yanlış bir kişi-birim-kat yapısı kur. Çeldirici,
        öğrencinin ara çıkarımı yapıp sonraki mantıksal taşıma adımını atlaması
        sonucu yanlış ilişkiyi doğru ya da mümkün sanmasına dayanmalıdır.
      kullanim_notu: >
        Bu strateji tek başına kullanıldığında çeldirici zayıf kalabilir. Bu nedenle
        tek başına ana çeldirici olarak kullanılmamalı; "AYNI_BIRIM_GRUBUNU_YANLIS_KURMA",
        "KAT_BILGISINI_YANLIS_BIRIME_TASIMA",
        "KISI_BIRIM_VE_KAT_ARASINDA_DOLAYLI_BAGI_YANLIS_KURMA" veya
        "KALAN_ESLESMELERI_YANLIS_TAMAMLAMA" gibi daha güçlü bir yanlış eşleştirme
        stratejisini destekleyici biçimde kullanılmalıdır.
      tek_basina_kullanilabilir: false
      birlikte_kullan:
        - "AYNI_BIRIM_GRUBUNU_YANLIS_KURMA"
        - "KAT_BILGISINI_YANLIS_BIRIME_TASIMA"
        - "KISI_BIRIM_VE_KAT_ARASINDA_DOLAYLI_BAGI_YANLIS_KURMA"
        - "KALAN_ESLESMELERI_YANLIS_TAMAMLAMA"

    - ad: "KALAN_ESLESMELERI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci yapının büyük kısmını doğru kurar; fakat kalan kişi–birim eşleşmelerini elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Gizli yapının çoğunu doğru tut; ancak son 1-2 kişi ya da birimi, tüm
        koşulları tekrar kontrol etmeden yanlış tamamlanmış gibi kurgula. Çeldirici,
        bu yanlış tamamlama sonucunda doğruymuş gibi görünen ilişki önermesine dayanmalıdır.

    - ad: "KISI_SAYISI_KOSULUNU_YANLIS_YORUMLAMA"
      bilisssel_hata_kategorisi: "nicel_hata"
      aciklama: "Öğrenci bir birime giden kişi sayısı bilgisini yanlış taşıyarak hatalı grup çıkarımı yapar"
      nasil_olusturulur: |
        Belirli bir birime devam eden kişi sayısı koşulunu yanlış uygulayan
        alternatif bir yapı kur. Çeldirici, sayı koşulu ilk bakışta sağlanıyormuş
        gibi görünse de tüm koşullar birlikte kontrol edildiğinde bozulan kişi–birim
        ya da kişi–kişi aynı birim önermesi olmalıdır.

    - ad: "NEGATIF_KOKTE_MUMKUN_ILISKIYI_YANLIS_SECME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci kökün yönünü karıştırdığı için doğru olan yerine yanlış olanı ya da tersini seçer"
      nasil_olusturulur: |
        Eğer soru kökü 'yanlıştır' veya 'söylenemez' türündeyse, gizli yapıyla büyük
        ölçüde uyumlu ve güçlü görünen ama aslında işaretlenmemesi gereken bir
        kişi–birim ya da kişi–kişi aynı birim önermesi üret. Bu çeldirici, kök yönü
        ve kesinlik derecesi karışıklığına dayanmalıdır.

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak ilişki önermesi üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele yanlış eşleştirme yazmak"
    - "Çeldiriciyi yanlış kişi-birim-kat yapısı düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış çözüm mantığını temsil eden birden fazla çeldirici kullanmak"
    - "Bir yanlış seçenekte temsil düzeyini bozmak; örneğin biri kişi-birim, biri tüm kat özeti gibi dengesiz yapı kurmak"

  kalite_kontrol:
    - "Bu çeldirici, öğrencinin kurabileceği yanlış bir kişi-birim-kat yapısının sonucu mu?"
    - "Bu seçenek bir tek maddeyle hemen eleniyor mu?"
    - "Bu seçenek ancak tüm koşullar kontrol edilince mi yanlışlaşıyor?"
    - "Bu çeldirici, doğru yapıya yakın ama hatalı bir alternatif kurguya dayanıyor mu?"
    - "Her çeldirici farklı bir yanlış çözüm yolunu temsil ediyor mu?"
    - "Tüm çeldiriciler aynı temsil düzeyinde ilişki önermesi biçiminde mi?"

  önerilen_dagilim:
    - "1 ana çeldirici: AYNI_BIRIM_GRUBUNU_YANLIS_KURMA veya KISI_BIRIM_VE_KAT_ARASINDA_DOLAYLI_BAGI_YANLIS_KURMA"
    - "1 ana çeldirici: KAT_BILGISINI_YANLIS_BIRIME_TASIMA veya KISI_SAYISI_KOSULUNU_YANLIS_YORUMLAMA"
    - "1 ana çeldirici: KALAN_ESLESMELERI_YANLIS_TAMAMLAMA veya NEGATIF_KOKTE_MUMKUN_ILISKIYI_YANLIS_SECME"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına kullanılmamalı; yalnızca yukarıdaki ana çeldiricilerden biriyle birlikte destekleyici mantık olarak kullanılmalıdır"

use_shared_strategies: false
