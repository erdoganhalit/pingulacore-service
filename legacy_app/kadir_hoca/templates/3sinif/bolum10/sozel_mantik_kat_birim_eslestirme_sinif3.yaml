# bolum6/sozel_mantik_kat_birim_eslestirme_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 seçenek
# Bu sürüm yalnızca "kat-birim eşleştirme sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_kat_birim_eslestirme_sinif3"
  ad: "3. Sınıf Sözel Mantık - Kat/Birim Eşleştirme"
  sinif_seviyesi: 3
  aciklama: "Kişi, öğrenci veya çalışanları bağlı oldukları birimlerle ve bu birimlerin bulunduğu kat/bölüm bilgisiyle birlikte eşleştirerek gizli yapıyı bulma ve buna göre çıkarım yapma"
  frequency: "High (~12 questions)"

kat_birim_senaryolari:
  - ad: "egitim_merkezi_kurs_katlari"
    aciklama: "Öğrencilerin gittikleri kursların farklı katlarda bulunması"
    ornek_setup: "Bir eğitim merkezinde farklı kurslar farklı katlarda yer almaktadır ve öğrenciler bu kurslardan birine devam etmektedir."

  - ad: "sanat_merkezi_atolye_katlari"
    aciklama: "Katlara dağıtılmış atölyelere katılan öğrencilerin eşleştirilmesi"
    ornek_setup: "Bir sanat merkezinde her katta farklı bir atölye bulunmaktadır ve öğrenciler bu atölyelerden birine katılmaktadır."

  - ad: "spor_kompleksi_salonu_katlari"
    aciklama: "Spor salonlarının katlara göre düzenlendiği bir yapıda üyelerin hangi salona gittiğinin belirlenmesi"
    ornek_setup: "Bir spor kompleksinde farklı salonlar farklı katlarda yer almakta ve üyeler bu salonlardan birini kullanmaktadır."

  - ad: "bilim_merkezi_laboratuvar_katlari"
    aciklama: "Bilim merkezindeki laboratuvarların katlara göre yerleştirildiği yapıda öğrencilerin hangi laboratuvara gittiğinin bulunması"
    ornek_setup: "Bir bilim merkezinde laboratuvarlar farklı katlarda bulunmaktadır ve öğrenciler bu laboratuvarlardan birinde çalışmaktadır."

  - ad: "cocuk_kutuphanesi_bolum_katlari"
    aciklama: "Kütüphane bölümlerinin katlara dağıtıldığı yapıda çocukların hangi bölüme gittiğinin bulunması"
    ornek_setup: "Bir çocuk kütüphanesinde farklı bölümler farklı katlarda yer almakta ve çocuklar bu bölümlerden birine gitmektedir."

  - ad: "teknoloji_merkezi_studyo_katlari"
    aciklama: "Teknoloji merkezindeki stüdyo ve üretim alanlarının katlara göre düzenlenmesi"
    ornek_setup: "Bir teknoloji merkezinde farklı stüdyolar farklı katlarda yer almakta ve katılımcılar bu stüdyolardan birine devam etmektedir."

  - ad: "muzik_okulu_sinif_katlari"
    aciklama: "Müzik okulundaki sınıfların katlara göre dağıtılması ve öğrencilerin sınıflarla eşleştirilmesi"
    ornek_setup: "Bir müzik okulunda farklı ders sınıfları farklı katlarda bulunmaktadır ve öğrenciler bu sınıflardan birine gitmektedir."

  - ad: "dil_merkezi_program_katlari"
    aciklama: "Dil programlarının farklı katlarda bulunduğu merkezde öğrencilerin programlarla eşleştirilmesi"
    ornek_setup: "Bir dil merkezinde her program farklı bir katta yer almakta ve öğrenciler bu programlardan birine katılmaktadır."

  - ad: "yaratici_fikir_atolyesi_birimleri"
    aciklama: "Yaratıcı atölye birimlerinin katlara göre yerleştirildiği yapıda katılımcıların eşleştirilmesi"
    ornek_setup: "Bir yaratıcı fikir atölyesinde farklı çalışma birimleri farklı katlarda bulunmaktadır ve katılımcılar bu birimlerden birine bağlıdır."

  - ad: "saglik_merkezi_hizmet_katlari"
    aciklama: "Sağlık merkezindeki hizmet birimlerinin katlara dağıtıldığı yapıda kişilerin bağlı oldukları hizmetin belirlenmesi"
    ornek_setup: "Bir sağlık merkezinde hizmet birimleri farklı katlarda yer almakta ve kişiler bu birimlerden birine başvurmaktadır."

  - ad: "kariyer_merkezi_danismanlik_birimleri"
    aciklama: "Danışmanlık birimlerinin katlara göre düzenlendiği merkezde öğrencilerin hangi birime gittiğinin belirlenmesi"
    ornek_setup: "Bir kariyer merkezinde danışmanlık birimleri farklı katlarda yer almakta ve öğrenciler bu birimlerden birine gitmektedir."

  - ad: "uzay_kampi_modul_katlari"
    aciklama: "Bilim etkinliğindaki modüllerin katlara yerleştirildiği yapıda katılımcıların bağlı oldukları modülün bulunması"
    ornek_setup: "Bir bilim etkinliğinda eğitim modülleri farklı katlarda bulunmaktadır ve katılımcılar bu modüllerden birine katılmaktadır."

  - ad: "robotik_okulu_grup_katlari"
    aciklama: "Robotik okulunda grupların farklı katlarda yürütüldüğü yapıda öğrencilerin grup eşleştirmesi"
    ornek_setup: "Bir robotik okulunda çalışma grupları farklı katlarda yer almakta ve öğrenciler bu gruplardan birine katılmaktadır."

  - ad: "ekoloji_merkezi_inceleme_birimleri"
    aciklama: "Ekoloji merkezindeki inceleme birimlerinin katlara göre konumlandığı yapıda öğrencilerin hangi birime gittiğinin bulunması"
    ornek_setup: "Bir ekoloji merkezinde inceleme birimleri farklı katlarda bulunmaktadır ve öğrenciler bu birimlerden birinde çalışmaktadır."

  - ad: "girisimcilik_merkezi_destek_birimleri"
    aciklama: "Destek birimlerinin katlara göre ayrıldığı merkezde kişilerin hangi birime bağlı olduğunun bulunması"
    ornek_setup: "Bir okul etkinliğinde destek birimleri farklı katlarda yer almakta ve katılımcılar bu birimlerden birine bağlıdır."

  - ad: "cocuk_festivali_etkinlik_katlari"
    aciklama: "Festival binasında etkinlik alanlarının katlara göre yerleştirildiği yapıda çocukların hangi alana gittiğinin bulunması"
    ornek_setup: "Bir çocuk festivalinde etkinlik alanları farklı katlarda yer almakta ve çocuklar bu alanlardan birine katılmaktadır."

  - ad: "yetenek_merkezi_program_odalari"
    aciklama: "Program odalarının katlara göre dağıtıldığı yapıda öğrencilerin hangi programa katıldığının belirlenmesi"
    ornek_setup: "Bir yetenek merkezinde program odaları farklı katlarda bulunmaktadır ve öğrenciler bu programlardan birine katılmaktadır."

  - ad: "arastirma_enstitusu_calisma_birimleri"
    aciklama: "Çalışma birimlerinin katlara göre ayrıldığı yapıda öğrenciların bağlı oldukları birimin bulunması"
    ornek_setup: "Bir bilim etkinliğinde çalışma birimleri farklı katlarda yer almakta ve öğrencilar bu birimlerden birine bağlıdır."
# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan kat/birim eşleştirme sorusu"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişileri bağlı oldukları birimlerle ve bu birimlerin bulunduğu
      kat/bölüm bilgisiyle birlikte eşleştirmesi gerekir. Koşullar kişi-birim ve
      birim-kat ilişkilerini doğrudan tablo halinde vermemeli; öğrenci bazı
      eşleştirmeleri ve kat bağlantılarını mantıksal çıkarımla tamamlamalı, sonunda
      sorulan kişi-birim ya da kişi-kişi-aynı-birim ilişkisinin kesin doğru,
      kesin yanlış, söylenebilir ya da söylenemez olup olmadığını belirlemelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Yapının türünü, kaç kat/bölüm bulunduğunu, hangi birimlerin bu yapı içinde yer aldığını ve hangi kişilerin bu birimlerden birine bağlı olduğunu tanıtır"
      - "Kurgu kişi-merkezli olabilir; ancak aynı anda hem kişi-birim hem de birim-kat ilişkisi içermelidir"
      - "Her kişi yalnızca bir birime bağlı olmalı ve her birim tanımlı yapı içinde belirli bir katta/bölümde yer almalıdır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu yapı ve birimlerle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru eşleştirme yapısı kurulmalı; ardından yalnızca bu yapıya götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar kişi-birim ve birim-kat ilişkilerini satır satır açıkça doldurmamalıdır"
      - "Maddeler, gizli yapının yalnızca bazı parçalarını, grup sayılarını, aynı birime gitme ilişkilerini, dışlamaları veya dolaylı kat bağlantılarını vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı kişi-birim ve birim-kat eşleşmelerini kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan kişi-birim ilişkisi ya da aynı birime gitme bilgisi açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli eşleştirme yapısı büyük ölçüde kurulabilir olmalı; şıklar yapıyı kurdurmamalı, kurulmuş yapı üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak kişi-birim-kat ilişkisi içermelidir"
      - "Öncelikli ilişki türleri: bir birime giden kişi sayısı, iki kişinin aynı birime gitmesi, bir kişinin belirli kattaki belirli birime gitmemesi, bir kişinin belirli katta bulunan belirli birime gitmesi, birimin bulunduğu kat ile kişilerin bağlı olduğu birim arasında dolaylı ilişki, aynı katta bulunan farklı birimler üzerinden kurulan dışlama"
      - "Tek bir maddeyle doğrudan tam eşleştirme veren açık tablo cümleleri kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca adları ve birimleri alt alta yazıp mekanik eşleme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir ara grup ya da aynı-birim bloğu kurup sonra bunu kat bilgisiyle birleştirmesini gerektirmelidir"
      - "Yapının bazı parçaları doğrudan verilebilir; ancak sorulan ilişkinin doğruluk değeri mutlaka düşünerek bulunmalıdır"

      - "3. sınıf seviyesinde 3 kişi ve 3-5 birim tercih edilmelidir"
      - "Kat sayısı ve yapı düzeni öğrencinin zihninde takip edilebilir düzeyde olmalıdır"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Birimler somut ve anlaşılır olmalıdır: kurs, atölye, salon, laboratuvar, sınıf etkinliği, modül, grup, hizmet vb."
      - "Kat/bölüm bilgisi açık ve anlaşılır olmalıdır: 1. kat, 2. kat, alt kat, üst kat, giriş katı gibi"
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'aynı birim', 'farklı birim', 'aynı kat', 'farklı kat', 'gitmez', 'gider' gibi kavramlar net ayrılmalıdır"
      - "Kişi-birim ve birim-kat ilişkileri belirsizlik taşımamalıdır"
      - "Koşullar yalnızca gizli kat/birim yapısını kurmaya ve sorulan ilişkiyi test etmeye hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: birime giden kişi sayısı veya grup büyüklüğü"
        - "1 madde: iki kişinin aynı birime gitmesi ya da gitmemesi"
        - "1 madde: kişi-birim-kat arasında dolaylı bağ kuran koşul"
        - "Gerekirse 1 madde: belirli katta bulunan belirli birime gitme/gitmeme bilgisi"
      yasaklar:
        - "Her kişi için birimi tek tek söyleyen koşullar yazma"
        - "Her birimin hangi katta olduğunu tek tek dağıtan koşullar yazma"
        - "Bir kişiyi hem birim hem kat düzeyinde tamamen çözen açık koşullar yazma"
        - "Koşulları tabloyu soldan sağa dolduracak çözüm şeması gibi dizme"
        - "Tek bir maddeyle doğru seçeneğin kesinleşmesine yol açma"

  visual:
    required: true
    description: "Kat ve birim eşleştirme sorusunu simgeleyen bina kat bölmesi kesiti şeması"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "katlara bölünmüş bina kesiti ikonu (daireler boş etiketli)"
      - "kat-birim eşleştirme tablosu şeması"
      - "numaralı kat bölmeli soyut bina sembolü"
    kurallar:
      - "Görsel senaryo içeriğini (kişileri, nesneleri veya konumlarını) tasvir etmemelidir"
      - "Görsel yalnızca soru tipini simgeleyen soyut/sembolik bir ikon veya şema olmalıdır"
      - "Görsel bulmacayı çözmede ipucu vermemeli; doğru cevabı ima etmemelidir"
      - "Görsel sade, temiz ve dikkat dağıtmayan bir ikon olmalıdır"
      - "Görsel içinde kişi adı, konum bilgisi veya bulmacaya ait sayısal veri bulunmamalıdır"
      - "Tablo veya ızgara görseli kullanılacaksa hücreler boş ya da soru işaretli olmalıdır"
    yasaklar:
      - "Senaryo sahnesi — kişileri, nesneleri veya konumlarını gösteren illüstrasyon"
      - "Bulmacadaki sıra, yerleşim veya eşleşmeleri ele veren gerçekçi tasvir"
      - "Fotoğraf benzeri sahne görüntüsü"
      - "Puzzle içeriğine dair somut nesne görseli (sandalye, masa, kişi silueti vb.)"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli kişi-birim-kat yapısını kurmaya ve ardından
      belirli bir kişi-birim ya da kişi-kişi-aynı-birim ilişkisinin kesin doğru,
      kesin yanlış, söylenebilir ya da söylenemez olduğunu seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli yapı yeterince kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak kişi-birim veya aynı-birim ilişkisi üzerinden çıkarım sordurmalıdır"
      - "Tercihen 'kesinlikle doğrudur', 'kesinlikle yanlıştır', 'kesin olarak söylenebilir', 'kesin olarak söylenemez' türünde kökler kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir bilgi okumaya değil, kurulmuş gizli kat/birim yapısını yorumlamaya yöneltmelidir"
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 18
    style: "relationship_proposition"
    correct_count: 1
    kurallar:
      - "Her seçenek bir ilişki önermesi biçiminde yazılmalıdır"
      - "Seçenekler tam kat-birim tablosunu vermemelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır"
      - "Seçenekler kişi–birim eşleştirmesi veya kişi–kişi aynı birim ilişkisi biçiminde yazılmalıdır"
      - "Bir seçenek kişi-birim, bir diğeri tüm kat özeti, bir diğeri yalnızca kat adı gibi dağınık yapılmamalıdır"
      - "Kişi–kişi ilişkisi kullanılacaksa ilişki açıkça 'aynı birime gider / aynı birimde değildir' düzeyinde kurulmalıdır"
      - "Seçenekler, gizli kişi-birim-kat yapısı üzerinden test edilen tekil önermeler olmalıdır"
      - "Doğru seçenek, gizli yapıdan kesin doğru ya da kesin yanlış çıkan tek önerme olmalıdır"
      - "Hiçbir seçenek doğrudan bir koşul cümlesinin tekrar yazılmış hâli olmamalıdır"
      - "Hiçbir seçenek tek bir maddeye bakılarak doğrudan doğrulanabilir veya elenebilir olmamalıdır"
      - "Seçenekler biçimsel olarak dengeli olmalıdır"
      - "Doğru cevap uzunluk, vurgu veya özel ifade nedeniyle ayırt edilmemelidir"

