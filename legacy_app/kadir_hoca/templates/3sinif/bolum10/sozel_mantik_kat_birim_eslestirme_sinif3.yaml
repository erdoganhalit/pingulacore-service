# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi gizli kişi-birim-kat yapısını tamamen ya da büyük
    ölçüde kurmaya zorlamalıdır. Doğru cevap; tek bir koşuldan, iki koşulun hızlı
    birleşiminden veya yüzeysel elemeden bulunamamalı; ancak kişiler, bağlı
    oldukları birimler ve bu birimlerin bulunduğu katlar birlikte değerlendirildikten
    sonra sorulan kişi–birim ya da kişi–kişi aynı birim ilişkisinin kesin doğru,
    kesin yanlış, söylenebilir ya da söylenemez olduğu anlaşılmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca kat/birim eşleştirme sorusuna uygun bir bağlam seç.
        Örnek alanlar:
        - eğitim merkezi kurs katları
        - sanat merkezi atölye katları
        - bilim merkezi laboratuvar katları
        - kariyer merkezi danışmanlık birimleri
        - bilim etkinliği modül katları
        - robotik okulu grup katları

    - step: 2
      action: "Kişileri, birimleri ve gizli doğru yapıyı kur"
      details: |
        - Önce 3 kişi belirle
        - Sonra 3-5 birim belirle
        - Bu birimlerin hangi katta/bölümde bulunduğunu belirle
        - Her kişiyi yalnızca bir birime bağlı olacak şekilde yerleştir
        - Bu kişi-birim-kat yapısı, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm yapı kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü, tam yapıyı değil; belirli bir kişi–birim ya da
        kişi–kişi aynı birim ilişkisinin kesin doğru, kesin yanlış,
        söylenebilir ya da söylenemez olup olmadığını sormalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle doğrudur
        - kesinlikle yanlıştır
        - kesinlikle söylenebilir
        - kesinlikle söylenemez
        - eşleştirmelerden hangisi doğrudur
        - eşleştirmelerden hangisi yanlıştır

    - step: 4
      action: "Koşulları gizli yapıdan türet"
      details: |
        - 3 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru seçenek doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde kişi-birim-kat yapısını yeterince kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar, hedeflenen soru köküne göre yalnızca bir doğru cevap üretmelidir
        - Koşullar ağırlıklı olarak kişi-birim-kat, aynı birim, kişi sayısı ve dolaylı kat ilişkisi içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede yapının çerçevesini tanıt
        - Kaç kat/bölüm olduğu anlaşılır olsun
        - Hangi birimlerin bulunduğu net olsun
        - Kişilerin bu birimlerden birine bağlı olduğu açıkça belirtilsin
        - Bağlam sade, öğrenciye yakın ve yapı-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, sorulan ilişki için kesin doğru ya da kesin yanlış olan tek önerme olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli yapıyı kurmadan bu önermeye ulaşamamalıdır
        - Doğru seçenek kişi–birim ya da kişi–kişi aynı birim ilişkisi biçiminde olmalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli yapıyı eksik veya yanlış kuran öğrencinin düşebileceği yanlış ilişki önermeleri olmalıdır
        - Çeldiriciler, aynı birim grubunu yanlış kurma, kat bilgisini yanlış birime taşıma, kişi sayısını yanlış yorumlama, kalan eşleşmeleri yanlış tamamlama gibi hatalara dayanmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler aynı temsil düzeyinde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun
        - Seçenekler kişi–birim veya kişi–kişi aynı birim önermesi biçiminde kalsın

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci gizli kişi-birim-kat yapısını kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Yanlış şıklardan biri tek bir maddeyle eleniyor mu?
        - Sorulan ilişki için yalnızca bir seçenek mi kesin doğru/yanlış?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

