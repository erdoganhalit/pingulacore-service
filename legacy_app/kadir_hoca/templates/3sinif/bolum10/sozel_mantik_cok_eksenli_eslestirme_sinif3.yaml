# ═══════════════════════════════════════════════════════════════
# URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi tüm gizli eşleştirme tablosunu kurmaya zorlamalıdır.
    Doğru cevap; tek bir koşuldan, iki koşulun hızlı birleşiminden veya yüzeysel
    elemeden bulunamamalı; ancak kişi/nesne/birimlerin tüm kategori eksenlerindeki
    ilişkileri oluşturulduktan sonra kesinleşmelidir.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca çok eksenli eşleştirme sorusuna uygun bir bağlam seç.
        Örnek alanlar:
        - kurs + kat
        - şehir + spor
        - kulüp + gün
        - branş + forma rengi
        - proje konusu + salon
        - enstrüman + öğretmen

    - step: 2
      action: "Öğeleri, eksenleri ve gizli tabloyu kur"
      details: |
        - Önce 3 kişi/nesne/birim belirle
        - Sonra 2-3 kategori ekseni belirle
        - Her öğe için her eksenden yalnızca bir değer olacak şekilde tek doğru gizli tabloyu oluştur
        - Bu tablo, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm eşleştirmeler kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü, gizli tablo kurulduktan sonra cevaplanabilir olmalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle doğrudur
        - kesinlikle yanlıştır
        - kesinlikle söylenebilir
        - kesinlikle söylenemez
        - eşleştirmelerden hangisi doğrudur
        - eşleştirmelerden hangisi yanlıştır

    - step: 4
      action: "Koşulları gizli tablodan türet"
      details: |
        - 3 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru cevap doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde tüm tabloyu kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar birden fazla tabloya izin vermemelidir
        - Koşullar ağırlıklı olarak göreli ve çapraz ilişki içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede eşleştirmenin çerçevesini tanıt
        - Kimlerin/nelerin hangi eksenlerde eşleştirileceği anlaşılır olsun
        - Bağlam sade, öğrenciye yakın ve tablo-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, gizli eşleştirme tablosunun zorunlu sonucu olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli tabloyu kurmadan bu seçeneğe ulaşamamalıdır
        - Doğru seçenek tam tabloyu vermemeli; tablodan çıkan kesin bir çıkarım önermesi olmalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli tabloyu eksik veya yanlış kuran öğrencinin düşebileceği sonuçlar olmalıdır
        - Çeldiriciler, kısmi doğru görünen ama tüm koşulları sağlamayan çıkarım önermeleri olmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler aynı temsil düzeyinde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun
        - Seçenekler tam tablo değil, tablo üzerinden test edilen çıkarım önermeleri olsun

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci tüm gizli tabloyu kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        - Koşullar gerçekten yalnızca bir doğru tablo üretiyor mu?
        - Yanlış seçeneklerden biri tek bir maddeyle eleniyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

