# bolum6/sozel_mantik_cok_eksenli_eslestirme_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 seçenek
# Bu sürüm yalnızca "çok eksenli eşleştirme sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_cok_eksenli_eslestirme_sinif3"
  ad: "3. Sınıf Sözel Mantık - Çok Eksenli Eşleştirme"
  sinif_seviyesi: 3
  aciklama: "Kişi, nesne veya birimleri birden fazla kategori ekseni üzerinde eşleştirerek gizli tabloyu bulma ve bu tabloya göre kesin çıkarım yapma"
  frequency: "High (~12 questions)"

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan çok eksenli eşleştirme sorusu"

eslestirme_senaryolari:
  - ad: "ogrenci_kurs_kat_eslestirmesi"
    aciklama: "Öğrencilerin gittikleri kurs ve kursların bulunduğu katın eşleştirilmesi"
    ornek_setup: "Üç öğrenci farklı kurslara gitmektedir ve her kurs farklı bir katta bulunmaktadır."

  - ad: "cocuk_sehir_spor_eslestirmesi"
    aciklama: "Çocukların yaşadıkları şehir ve yaptıkları sporun eşleştirilmesi"
    ornek_setup: "Üç çocuktan her biri farklı bir şehirde yaşamakta ve farklı bir spor yapmaktadır."

  - ad: "ogrenci_kulup_gun_eslestirmesi"
    aciklama: "Öğrencilerin kulüp türü ve kulüp günüyle eşleştirilmesi"
    ornek_setup: "Üç öğrenci farklı kulüplere katılmaktadır ve her kulüp haftanın farklı bir gününde yapılmaktadır."

  - ad: "sporcu_branş_forma_rengi_eslestirmesi"
    aciklama: "Sporcuların branşları ve forma renklerinin eşleştirilmesi"
    ornek_setup: "Üç sporcu farklı branşlarda yarışmakta ve her biri farklı renkte forma giymektedir."

  - ad: "ogrenci_proje_konu_salon_eslestirmesi"
    aciklama: "Öğrencilerin proje konuları ve sunum salonlarının eşleştirilmesi"
    ornek_setup: "Üç öğrenci farklı proje konularını farklı salonlarda sunacaktır."

  - ad: "cocuk_enstruman_ogretmen_eslestirmesi"
    aciklama: "Çocukların çaldıkları enstrümanlar ve ders aldıkları öğretmenlerin eşleştirilmesi"
    ornek_setup: "Üç çocuk farklı enstrümanlar çalmakta ve her biri farklı bir öğretmenden ders almaktadır."

  - ad: "ogrenci_kitap_turu_rozet_rengi_eslestirmesi"
    aciklama: "Öğrencilerin seçtikleri kitap türleri ve rozet renklerinin eşleştirilmesi"
    ornek_setup: "Üç öğrenci farklı kitap türlerini seçmiş ve her birine farklı renkte rozet verilmiştir."

  - ad: "kampci_cadir_numarasi_etkinlik_eslestirmesi"
    aciklama: "Kampçıların çadır numaraları ve katıldıkları etkinliklerin eşleştirilmesi"
    ornek_setup: "Üç kampçı farklı numaralı çadırlarda kalmakta ve farklı etkinliklere katılmaktadır."

  - ad: "ogrenci_bilim_alani_madalya_rengi_eslestirmesi"
    aciklama: "Öğrencilerin yarıştıkları bilim alanı ve aldıkları madalya renginin eşleştirilmesi"
    ornek_setup: "Üç öğrenci farklı bilim alanlarında yarışmış ve farklı renklerde madalya almıştır."

  - ad: "cocuk_hayvan_turu_bakim_gunu_eslestirmesi"
    aciklama: "Çocukların sorumlu oldukları hayvan türü ve bakım günlerinin eşleştirilmesi"
    ornek_setup: "Üç çocuk farklı hayvan türlerinden sorumludur ve her biri bakımını farklı bir günde yapmaktadır."

  - ad: "ogrenci_masa_numarasi_gorev_turu_eslestirmesi"
    aciklama: "Öğrencilerin oturdukları masa numarası ve üstlendikleri görev türünün eşleştirilmesi"
    ornek_setup: "Üç öğrenci farklı masalarda oturmakta ve her biri farklı bir görev üstlenmektedir."

  - ad: "gezgin_ulke_ulasim_turu_eslestirmesi"
    aciklama: "Gezginlerin gittikleri ülke ve kullandıkları ulaşım türünün eşleştirilmesi"
    ornek_setup: "Üç gezgin farklı ülkelere gitmiş ve her biri farklı bir ulaşım türü kullanmıştır."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan çok eksenli eşleştirme sorusu"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişi/nesne/birimleri birden fazla kategori ekseni üzerinde
      verilen ilişkisel koşulları birlikte değerlendirerek gizli eşleştirme
      tablosunu kurması gerekir. Koşullar tabloyu doğrudan tarif etmemeli;
      öğrenci bazı eşleşmeleri mantıksal çıkarımla tamamlamalıdır.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kimlerin/nelerin eşleştirileceğini, hangi kategori eksenlerinin bulunduğunu ve genel çerçeveyi tanıtır"
      - "Kurgu kişi-merkezli, nesne-merkezli veya birim-merkezli olabilir; ancak yapı birden fazla kategori ekseni içermelidir"
      - "Her öğe için her eksenden yalnızca bir değer geçerli olmalıdır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu eşleştirmeyle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru eşleştirme tablosu kurulmalı; ardından yalnızca bu tabloya götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar gizli tabloyu satır satır açıkça doldurmamalıdır"
      - "Maddeler, gizli eşleştirme tablosunun yalnızca bazı parçalarını, ilişkilerini veya dışlamalarını vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı eksik eşleşmeleri kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; bulunması gereken nihai eşleştirme ya da sorulan çıkarım açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli eşleştirme tablosu kurulabilir olmalı; şıklar tabloyu kurdurmamalı, kurulmuş tablo üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar birden fazla tabloya izin vermemelidir; hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak göreli ve çapraz ilişki içermelidir"
      - "Öncelikli ilişki türleri: aynı grupta olma/olmama, belirli kategoride bulunma/bulunmama, aynı zamanda iki ekseni bağlama, kişi-kategori-zaman çapraz ilişkisi, aynı yerde/farklı yerde olma, belirli özelliğe sahip kişinin başka bir özellikle ilişkilendirilmesi"
      - "Tek bir maddeyle doğrudan tam eşleştirme veren açık tablo cümleleri kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca alt alta isim yazıp mekanik eşleme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir ara eşleştirme kurup sonra bunu diğer eksenlerle birleştirmesini gerektirmelidir"
      - "Eşleştirmenin bazı parçaları doğrudan verilebilir; ancak tablo mutlaka düşünerek tamamlanmalıdır"

      - "3. sınıf seviyesinde 3 kişi/nesne/birim ve 2-3 kategori ekseni tercih edilmelidir"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Kategori eksenleri somut ve anlaşılır olmalıdır: kurs, gün, renk, kat, şehir, spor, öğretmen, masa numarası, rozet rengi vb."
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'aynı' ve 'farklı', 'aittir' ve 'ait değildir', 'aynı gün' ve 'farklı gün' gibi kavramlar net ayrılmalıdır"
      - "Eksenler ve ilişkiler belirsizlik taşımamalıdır"
      - "Koşullar yalnızca eşleştirme tablosunu kurmaya hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: aynı/farklı kategori veya grup ilişkisi"
        - "1 madde: belirli bir kişi/öğe için kategori üyeliği ya da dışlama"
        - "1 madde: iki ekseni birleştiren çapraz ilişki"
        - "Gerekirse 1 madde: zaman/alt kategori veya ikinci çapraz bağ"
      yasaklar:
        - "Her kişi için tüm eksenleri tek tek söyleyen koşullar yazma"
        - "Koşulları tabloyu satır satır dolduracak biçimde dizme"
        - "Tek bir kişiyi birden çok eksende tamamen çözen açık koşullar yazma"
        - "Koşulları soldan sağa çözüm şeması gibi dizme"
        - "Bir eksendeki tüm değerleri doğrudan dağıtarak gizli tabloyu kapatma"

  visual:
    required: true
    description: "Çok eksenli eşleştirme sorusunu simgeleyen çapraz ok veya matris tablo şeması"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "iki sütun arasında çapraz oklar içeren boş eşleştirme şeması"
      - "kişi × özellik matris tablosu (içi boş)"
      - "çoklu ok bağlantısı diyagramı"
    kurallar:
      - "Görsel senaryo içeriğini (kişileri, nesneleri veya konumlarını) tasvir etmemelidir"
      - "Görsel yalnızca soru tipini simgeleyen soyut/sembolik bir ikon veya şema olmalıdır"
      - "Görsel bulmacayı çözmede ipucu vermemeli; doğru cevabı ima etmemelidir"
      - "Görsel sade, temiz ve dikkat dağıtmayan bir ikon olmalıdır"
      - "Görsel içinde kişi adı, konum bilgisi veya bulmacaya ait sayısal veri bulunmamalıdır"
      - "Tablo veya ızgara görseli kullanılacaksa hücreler boş ya da soru işaretli olmalıdır"
    yasaklar:
      - "Senaryo sahnesi — kişileri, nesneleri veya konumlarını gösteren illüstrasyon"
      - "Bulmacadaki sıra, yerleşim veya eşleşmeleri ele veren gerçekçi tasvir"
      - "Fotoğraf benzeri sahne görüntüsü"
      - "Puzzle içeriğine dair somut nesne görseli (sandalye, masa, kişi silueti vb.)"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli eşleştirme tablosunu kurmaya ve ardından bu
      tablodan çıkan kesin çıkarımı seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli eşleştirme tablosu kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak kesin doğru/yanlış çıkarımı sordurmalıdır"
      - "Tercihen 'kesinlikle doğrudur', 'kesinlikle yanlıştır', 'kesin olarak söylenebilir', 'kesin olarak söylenemez' türünde çıkarım kökleri kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir bilgi okumaya değil, kurulmuş eşleştirme tablosunu yorumlamaya yöneltmelidir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 18
    style: "complete_sentence"
    correct_count: 1
    kurallar:
      - "Her seçenek bir çıkarım önermesi biçiminde yazılmalıdır"
      - "Seçenekler tam tablo ya da tüm eşleştirmeyi vermemelidir"
      - "Her seçenek, kişi-kategori, kişi-zaman, kişi-yer, kişi-özellik ya da çapraz eşleştirme ilişkisi içermelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır"
      - "Bir seçenek tek kişi-kategori eşleşmesi, bir diğeri kişi-kişi aynı grup ilişkisi, bir diğeri kişi-zaman ilişkisi gibi dağınık yapılmamalıdır; seçenek yapıları mümkün olduğunca paralel olmalıdır"
      - "Seçenekler doğrudan koşul cümlesinin tekrar yazılmış hâli olmamalıdır"
      - "Seçenekler, kurulmuş gizli eşleştirme tablosu üzerinden test edilebilecek biçimde yazılmalıdır"
      - "Hiçbir seçenek tek bir maddeye bakılarak doğrudan doğrulanabilir veya elenebilir olmamalıdır"
      - "Doğru seçenek biçimsel olarak diğerlerinden ayrışmamalıdır"
      - "En uzun seçenek doğru cevap olacak şekilde belirginleşmemelidir"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi verilen koşullara <u>uygundur</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    eşleştirme tablosu kurulduktan sonra mantıksal olarak kesin biçimde
    belirlenebilen çıkarım önermesidir. Öğrenciden tek bir ipucuna dayanarak
    değil, tüm maddeleri analiz ederek doğru eşleşmeyi ya da kesin doğru/yanlış
    önermeyi seçmesi beklenir.

  temel_ilke: >
    Gizli eşleştirme tablosu kurulmadan doğru cevap belirlenememelidir.
    Doğru seçenek, bir veya iki koşuldan doğrudan fark edilebilen değil;
    ancak tüm koşulların ortak sonucu olarak ortaya çıkan kesin çıkarım olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara eşleştirmeler üzerinden gizli tablo kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce kişi-kategori-özellik tablosunu kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; kurulmuş gizli tablonun zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: gizli tablodan KESİNLİKLE çıkan ifade olmalıdır"
    - "Negatif köklerde doğru cevap: gizli tabloyla çelişen ya da gizli tablodan kesin olarak çıkarılamayan ifade olmalıdır"
    - "Çıkarım köklerinde yalnızca bir seçenek kesin doğru ya da kesin yanlış olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir çıkarım olmalıdır"
    - "Doğru cevap 3-18 kelime arasında olmalıdır"
    - "Duruma göre tam cümle ya da kısa ifade olabilir"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli eşleştirme tablosu kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen ilişkiyi doğrudan tekrar etmesi"
    - "Birden fazla seçeneğin gizli tabloyla uyumlu olması"
    - "Doğru cevabın tüm tabloyu açık eden kapsamlı bir açıklama biçiminde yazılması"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli eşleştirme tablosu kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Doğru seçenek, kurulmuş tablodan çıkan kesin bir eşleştirme ya da kesin bir çıkarım mı?"
# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel ifadeler olmamalıdır. Her yanlış seçenek, öğrencinin gizli eşleştirme
    tablosunu kurarken yapabileceği bütünsel bir muhakeme hatasının sonucu olmalıdır.
    Öğrenci yanlış bir ara tablo veya yanlış bir tam eşleştirme kurarsa, bu şıklardan
    birini işaretlemeye yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif gizli eşleştirme tablosunun çıktısı olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı sonuç olmalıdır"
