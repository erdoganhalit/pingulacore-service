DUYULARIMIZ:
Görme
İşitme
Koklama
Tatma
Dokunma
Örnek:
Köyde güneş doğmuş, her yer aydınlanmıştı. (Görme duyusu)
Uzaklarda meleşen kuzuların sesi duyuluyordu. (İşitme duyusu)
Hanımeli çiçeğinin kokusu odaya kadar geliyordu. (Koku duyusu)
Taze köy domatesleri çok lezzetliydi. (Tatma duyusu)
Serin bir rüzgâr sanki yüzümü okşuyordu. (Dokunma duyusu)
