# Kaynak: sozel_mantik_kesin_sira_numarasi_sorgulama_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.orta
# 4. sinif sözel mantık kesin sıra numarası sorgulama sorusu — orta duzey

meta:
  id: "sozel_mantik_kesin_sira_numarasi_sorgulama_sinif4_orta"
  ad: "Sözel Mantık ve Muhakeme - Kesin Sıra Numarası Sorgulama Sorusu (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — 5-6 öğe, 4-5 koşul, en az 2 dolaylı çıkarım, 2-3 anlamlı ihtimal, belirsiz konum yoğunluğu: orta."
  frequency: "High"

kesin_sira_sorgulama_senaryolari:
  - ad: "gecit_toreni_sirasi"
    aciklama: "Kortej yürüyüşündeki farklı grupların geçiş sırasının numaralandırılması"
    ornek_setup: "Bahar şenliği geçit töreninde bando, akrobatlar, maskotlar, dansçılar ve sporcular 1'den 5'e kadar numaralandırılmış bir sırayla yürüyecektir."

  - ad: "uzay_mekigi_firlatma_sirasi"
    aciklama: "Farklı gezegenlere gidecek araştırma mekiklerinin fırlatma rampasından kalkış sırası"
    ornek_setup: "Uzay üssündeki altı farklı keşif mekiği, art arda 1'den 6'ya kadar belirlenmiş bir sırayla fırlatılacaktır."

  - ad: "teleferik_kabin_sirasi"
    aciklama: "Zirveye doğru arka arkaya hareket eden teleferik kabinlerinin konum numaraları"
    ornek_setup: "Zirveye tırmanan bir teleferik hattında kırmızı, mavi, yeşil, sarı ve beyaz kabinler art arda sıralanmıştır."

  - ad: "bayrak_yarisi_kosuculari"
    aciklama: "Bayrak yarışında koşucuların bayrağı devralma sırası (1. koşucu, 2. koşucu vb.)"
    ornek_setup: "Bir bayrak yarışında okul takımındaki beş sporcu, 1'den 5'e kadar belirlenmiş sıralarda koşacaktır."

  - ad: "define_haritasi_duraklari"
    aciklama: "Bir maceradaki numaralandırılmış keşif duraklarına varış sırası"
    ornek_setup: "Bir define avında kaşifler; Mağara, Şelale, Ulu Ağaç, Tapınak ve Köprü duraklarından 1'den 5'e kadar numaralanmış bir sırayla geçecektir."

  - ad: "ejderha_binicileri_ucus_sirasi"
    aciklama: "Fantastik bir evrende ejderha binicilerinin kanyondan geçiş sırası"
    ornek_setup: "Ejderha binicisi altı çırak, dar bir kanyondan 1'den 6'ya kadar uzanan doğrusal bir kuyruk halinde geçmektedir."

  - ad: "drone_gosterisi_kalkis_sirasi"
    aciklama: "Işık gösterisi yapacak farklı drone takımlarının sahaya çıkış sırası"
    ornek_setup: "Bir teknoloji festivalinde beş farklı drone takımı, gösteri alanına 1. sıradan 5. sıraya kadar art arda havalanarak girecektir."

  - ad: "denizalti_dalis_sirasi"
    aciklama: "Okyanus çukuruna inen araştırma denizaltılarının dalış sırası"
    ornek_setup: "Mariana Çukuru'na inen altı farklı araştırma denizaltısı, art arda numaralandırılmış bir dalış sırası izlemektedir."

  - ad: "antik_tuzak_gecis_sirasi"
    aciklama: "Maceracıların dar bir koridordaki tek sıra halindeki dizilimi"
    ornek_setup: "Antik bir tapınakta ilerleyen beş maceracı, tuzaklı koridoru 1'den 5'e kadar numaralanmış tek bir sıra halinde geçmektedir."

  - ad: "dagci_tirmanis_hatti"
    aciklama: "Aynı güvenlik ipine bağlı olarak tırmanan dağcıların sırası"
    ornek_setup: "Buzul tırmanışı yapan altı dağcı, aynı emniyet ipine 1'den 6'ya kadar belirli bir sırayla bağlanmıştır."

  - ad: "mars_kolonisi_inis_sirasi"
    aciklama: "Mars'a iniş yapan destek kapsüllerinin iniş sırası numaraları"
    ornek_setup: "Mars yörüngesindeki altı farklı kargo kapsülü, gezegen yüzeyine 1. sıradan 6. sıraya kadar art arda iniş yapmıştır."

  - ad: "lunapark_hiz_treni_koltuklari"
    aciklama: "Hız trenindeki vagonların veya numaralı koltukların baştan sona sıralanışı"
    ornek_setup: "Bir lunaparktaki hız trenine binen altı arkadaş, önden arkaya doğru 1'den 6'ya kadar numaralanmış koltuklara oturmuştur."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten (yalnızca sıra numarası içeren) oluşan kesin sıra sorgulama sorusu (orta)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, doğrusal bir dizilime yerleştirilen kişilerle/varlıklarla ilgili verilen
      ilişkisel koşulları değerlendirerek, sıranın hangi konumlarının (numaralarının) kesin olarak dolduğunu
      veya hangilerinin kendi içinde yer değiştirme ihtimali taşıdığını mantıksal çıkarımla bulması gerekir.
      Orta düzey: 5-6 öğe, 4-5 koşul, en az 2 dolaylı çıkarım, 2-3 anlamlı ihtimal.
      Öğrenci, blok kayması veya mesafe yorumunu kontrol ederek kesinleşen konumları ayırt etmelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Sıralamanın neye ait olduğunu açıklar; dizilimin boyutu (örn: 1'den 5'e kadar) ve yönü/yapısı tanıtılır"
      - "MADDELİ KOŞULLAR 4-5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu sıralamayla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3<br>• Koşul 4"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Orta düzey: sıradaki öğe sayısı 5 veya 6 olmalıdır"
      - "Orta düzey: en az 2 koşul dolaylı çıkarım gerektirmelidir"
      - "Orta düzey: kesin ve belirsiz konumları ayırmak için birden fazla blok veya mesafe ilişkisi birlikte değerlendirilmelidir"
      - "Bir koşulun doğru yorumlanması başka bir koşulun etkisini değiştirmelidir"
      - "Önce gizli sıralama senaryosu kurulmalı; ardından yalnızca bu olasılık tablosuna götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 5
    style: "sira_numarasi_ikilisi"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre hangi sıra numaralarındaki kişilerin yerleri kesin olarak bilinebilir?</b>"
  - "<b>Bu bilgilere göre aşağıda verilen konumlardan hangilerinde kimin olduğu kesin olarak bellidir?</b>"
  - "<b>Bu bilgilere göre hangi sıra numaralarındaki kişilerin yerleri kesin olarak <u>bilinemez</u>?</b>"
  - "<b>Bu bilgilere göre aşağıda verilen konumlardan hangilerinde kimin olduğu kesin olarak söylenemez (kendi aralarında yer değiştirebilirler)?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli dizilimdeki
    kilitlenmiş (kesin) ve yer değiştirebilir (ihtimalli) konumlar tespit edildikten sonra,
    soru kökünün istediği durumu sağlayan sıra numaralarıdır (Örn: 2. ve 4. sıra).
  kurallar:
    - "Doğru cevap SADECE tüm koşullar ve olasılıklar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap 2-5 kelime arasında, SADECE konum/sıra numaralarından oluşmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "BLOK_KAYMA_TUZAĞI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Blok kayması veya mesafe yorumunu yanlış uygulayarak sıra numarasını 1 kaydıran seçenek"
    nasil_olusturulur: |
      İki öğe arasındaki mesafe koşulunu 'aralarında 1 kişi var' ile 'hemen yanında' şeklinde karıştıran, sonuçta sıra numarasını 1 artıran veya azaltan bir seçenek sun.
    kategori: "cognitive"

  - ad: "ÇAPRAZ_ÇIKARIM_EKSIKLIĞI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Bir koşulun doğru yorumu başka koşulun etkisini değiştirirken bu bağı kurmayan seçenek"
    nasil_olusturulur: |
      Birinci koşuldan çıkan bilginin ikinci koşulu nasıl etkilediğini hesaba katmayan ve tek koşula bakarak sıra numarası belirleyen bir seçenek oluştur.
    kategori: "cognitive"

  - ad: "KESİN_BELİRSİZ_AYIRT_ETME_HATASI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Hangi konumun kesin hangi konumun belirsiz olduğunu karıştıran seçenek"
    nasil_olusturulur: |
      Öğrencinin kesinleştirebileceği konumu belirsiz, belirsiz kalan konumu kesin sayan ve soru cevabını tersine çeviren bir seçenek sun.
    kategori: "cognitive"

use_shared_strategies: false

# ═══════════════════════════════════════════════════════════════
# BECERI
