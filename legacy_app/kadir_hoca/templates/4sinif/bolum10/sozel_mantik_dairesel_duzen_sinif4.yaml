# Kaynak: 5sinif/bolum6/sozel_mantik_dairesel_duzen_sorusu.yaml — 4. sinif icin adapte edildi (sinif_seviyesi 5->4)
# bolum6/sozel_mantik_dairesel_duzen_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 ikili seçenek
# Bu sürüm yalnızca "dairesel düzen sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_dairesel_duzen_sinif4"
  ad: "Sözel Mantık ve Muhakeme - Dairesel Düzen Sorusu"
  sinif_seviyesi: 4
  aciklama: "Kişi veya varlıkları dairesel bir düzende konumlandırarak sağ-sol, karşısı, yan yana ve arasında olma ilişkilerine göre gizli oturma düzenini bulma"
  frequency: "High (~24 questions)"

dairesel_duzen_senaryolari:
  - ad: "yuvarlak_masa_kahvalti_duzeni"
    aciklama: "Kişilerin yuvarlak bir kahvaltı masasında oturma düzeninin belirlenmesi"
    ornek_setup: "Altı kişi yuvarlak bir kahvaltı masasının etrafında oturmaktadır."

  - ad: "kamp_atesi_cevresi"
    aciklama: "Kamp ateşinin etrafında oturan kişilerin yerlerinin belirlenmesi"
    ornek_setup: "Altı öğrenci kamp ateşinin etrafında dairesel biçimde oturmaktadır."

  - ad: "dogum_gunu_pastasi_cevresi"
    aciklama: "Doğum günü masasının etrafında oturan çocukların düzeninin kurulması"
    ornek_setup: "Bir doğum günü kutlamasında çocuklar yuvarlak masanın etrafında oturmaktadır."

  - ad: "planetaryum_koltuk_duzeni"
    aciklama: "Planetaryumdaki halka biçimli oturma düzeninde kişilerin yerlerinin belirlenmesi"
    ornek_setup: "Bir planetaryum gösterisinde öğrenciler dairesel oturma alanında yerlerini almıştır."

  - ad: "tiyatro_prova_cemberi"
    aciklama: "Prova sırasında çember oluşturan öğrencilerin konumlarının bulunması"
    ornek_setup: "Bir tiyatro provasına katılan öğrenciler çember şeklinde dizilmiştir."

  - ad: "drama_atolyesi_cemberi"
    aciklama: "Drama etkinliğinde halka oluşturan katılımcıların yerleşiminin belirlenmesi"
    ornek_setup: "Bir drama atölyesinde katılımcılar yuvarlak bir düzen oluşturmuştur."

  - ad: "muzik_dinleti_halkasi"
    aciklama: "Müzik etkinliğinde halka biçiminde oturan çocukların düzeni"
    ornek_setup: "Bir müzik etkinliğinde çocuklar dairesel biçimde oturmaktadır."

  - ad: "sinif_sohbet_cemberi"
    aciklama: "Sınıf içinde sohbet için oluşturulan çemberde öğrencilerin yerleri"
    ornek_setup: "Bir sınıf etkinliğinde öğrenciler sandalyelerini çember şeklinde yerleştirmiştir."

  - ad: "uzay_kampi_kontrol_masasi"
    aciklama: "Uzay kampındaki dairesel kontrol masasının etrafındaki katılımcıların yerleşimi"
    ornek_setup: "Bir uzay kampında katılımcılar yuvarlak kontrol masasının etrafında oturmaktadır."

  - ad: "robotik_takim_degerlendirme_cemberi"
    aciklama: "Robotik takım üyelerinin çember düzenindeki değerlendirme toplantısı"
    ornek_setup: "Bir robotik takım toplantısında öğrenciler dairesel düzende oturmaktadır."

  - ad: "bilim_kulubu_tartisma_halkasi"
    aciklama: "Bilim kulübü üyelerinin halka biçimindeki tartışma düzeni"
    ornek_setup: "Bir bilim kulübü toplantısında öğrenciler halka şeklinde yer almıştır."

  - ad: "adaf_sorun_cozme_masasi"
    aciklama: "Yuvarlak masa etrafında toplanan grubun oturma düzeni"
    ornek_setup: "Bir sorun çözme etkinliğinde katılımcılar yuvarlak masa etrafında oturmaktadır."

  - ad: "cocuk_festivali_etkinlik_cemberi"
    aciklama: "Festivalde yere çizilmiş daire etrafında oturan çocukların düzeni"
    ornek_setup: "Bir çocuk festivalinde katılımcılar dairesel oturma alanında yer almıştır."

  - ad: "masal_saati_halkasi"
    aciklama: "Masal anlatımı sırasında halka oluşturan çocukların oturma düzeni"
    ornek_setup: "Masal saatinde çocuklar anlatıcının etrafında halka biçiminde oturmaktadır."

  - ad: "rehberli_oyun_cemberi"
    aciklama: "Bir oyun lideri etrafında oluşturulan dairesel dizilim"
    ornek_setup: "Bir grup oyununda öğrenciler çember düzeninde yer almıştır."

  - ad: "seramik_atolyesi_yuvarlak_masa"
    aciklama: "Seramik atölyesindeki yuvarlak masanın çevresinde oturan katılımcıların düzeni"
    ornek_setup: "Bir seramik atölyesinde öğrenciler yuvarlak çalışma masasının etrafında oturmaktadır."

  - ad: "gokyuzu_gozlem_halkasi"
    aciklama: "Gökyüzü gözlemi etkinliğinde halka oluşturan öğrencilerin yerleri"
    ornek_setup: "Bir gökyüzü gözlem etkinliğinde öğrenciler teleskop alanının çevresinde dairesel biçimde yer almıştır."

  - ad: "akil_oyunlari_masa_duzeni"
    aciklama: "Akıl oyunları etkinliğinde yuvarlak masa etrafındaki kişilerin düzeni"
    ornek_setup: "Bir akıl oyunları etkinliğinde oyuncular yuvarlak masa etrafında oturmaktadır."

  - ad: "muzede_rehber_etrafinda_dizilim"
    aciklama: "Müze rehberinin etrafında yarım halka veya tam halka oluşturan grubun düzeni"
    ornek_setup: "Bir müze etkinliğinde öğrenciler rehberin çevresinde dairesel düzende yer almıştır."

  - ad: "kampus_fikir_paylasim_cemberi"
    aciklama: "Fikir paylaşımı için halka oluşturan öğrencilerin konumlarının bulunması"
    ornek_setup: "Bir fikir paylaşım etkinliğinde öğrenciler çember biçiminde oturmaktadır."
# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 ikili seçenekten oluşan dairesel düzen sorusu"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 95
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişi veya varlıkların dairesel bir düzende yer aldığı yapıda
      sağ-sol, karşısı, yan yana ve arasında olma ilişkilerini birlikte
      değerlendirerek gizli oturma düzenini kurması gerekir. Koşullar düzeni
      doğrudan vermemeli; öğrenci bazı komşulukları ve karşılıklı yerleşimleri
      mantıksal çıkarımla tamamlamalı, sonunda sorulan kişinin hangi iki kişinin
      arasında bulunduğunu belirlemelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kaç kişi/varlık olduğu, dairesel düzenin türü ve herkesin bu düzen içinde yer aldığı açıkça tanıtılmalıdır"
      - "Kurgu kişi-merkezli veya varlık-merkezli olabilir; ancak yapı açıkça dairesel / yuvarlak / çember biçimli bir düzen içermelidir"
      - "Dairesel düzende tüm bireylerin merkeze dönük oturduğu varsayımı açık ya da örtük olarak korunmalıdır"
      - "Sağında/solunda ilişkileri, kişi merkeze dönük kabul edilerek yorumlanmalıdır"
      - "MADDELİ KOŞULLAR 3-5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu dairesel düzenle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru dairesel düzen kurulmalı; ardından yalnızca bu düzene götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar dairesel düzeni kişi kişi saat yönünde açıkça dizmemelidir"
      - "Maddeler, gizli dairesel düzenin yalnızca bazı parçalarını, komşuluklarını, karşılıklı konumlarını veya yön ilişkilerini vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı oturma bağlantılarını kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan kişinin hangi iki kişinin arasında olduğu açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli dairesel düzen büyük ölçüde kurulabilir olmalı; şıklar düzeni kurdurmamalı, kurulmuş düzen üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak dairesel konum ilişkisi içermelidir"
      - "Öncelikli ilişki türleri: karşısında olma, sağında/solunda olma, yanında oturma, iki kişi arasında bulunma, belirli kişilerin yan yana gelmemesi, belirli kişilerin karşı karşıya olması"
      - "Dairesel düzende doğrusal sıradaki gibi 'ilk', 'son', 'baştaki', 'sondaki' ifadeleri kullanılmamalıdır"
      - "Saat yönü / saat yönünün tersi gibi ifadeler kullanılacaksa dikkatli ve açık biçimde tanımlanmalıdır; mümkünse kişi merkezli sağ-sol ilişkisi tercih edilmelidir"
      - "Karşısında ilişkisi yalnızca kişi sayısı buna uygunsa kullanılmalıdır; karşılıklı oturma yapısı kurulamayacak tek sayılı dizilimlerde bu ilişki kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca isimleri sıraya dizip mekanik yerleştirme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir komşuluk bloğu kurup sonra bunu karşılık veya yön ilişkileriyle birleştirmesini gerektirmelidir"
      - "Düzenin bazı parçaları doğrudan verilebilir; ancak sorulan kişinin komşuları mutlaka düşünerek bulunmalıdır"

      - "5. sınıf seviyesinde 5-8 kişi/varlık tercih edilmelidir"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'sağında' ve 'solunda', 'karşısında' ve 'yanında', 'arasında' ve 'yan yana' gibi kavramlar net ayrılmalıdır"
      - "'X, Y ile Z'nin arasındadır' ifadesi, X'in iki yanındaki komşuların Y ve Z olduğunu anlatacak biçimde kullanılmalıdır"
      - "Soruda dönüklük yönü belirsizlik yaratmamalıdır; herkes merkeze dönük kabulü bozulmamalıdır"
      - "Koşullar yalnızca gizli dairesel düzeni kurmaya ve sorulan komşuluk ilişkisini test etmeye hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: yan yana olma / yan yana gelmeme ilişkisi"
        - "1 madde: bir kişinin başka bir kişinin sağında/solunda olması"
        - "1 madde: karşısında olma veya iki kişi arasında bulunma ilişkisi"
        - "Gerekirse 1 madde: küçük bir blok veya dışlama koşulu"
      yasaklar:
        - "Tüm kişileri saat yönünde tek tek tarif eden koşullar yazma"
        - "Bir kişinin her iki komşusunu doğrudan vererek soruyu kapatma"
        - "Koşulları dairesel düzeni adım adım açık çözüme dönüştürecek biçimde dizme"
        - "Tek bir maddeyle doğru seçeneğin kesinleşmesine yol açma"
        - "Dairesel yapıyı bozup doğrusal sıra mantığına kayan koşullar yazma"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli dairesel düzeni kurmaya ve ardından belirli bir
      kişinin hangi iki kişinin arasında bulunduğunu seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli dairesel düzen yeterince kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak hedef kişinin iki komşusunu sorgulamalıdır"
      - "Tercihen 'X kişisi hangi kişilerin arasındadır?' veya buna eşdeğer komşuluk kökleri kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir komşuluk bilgisini okumaya değil, kurulmuş gizli dairesel düzeni yorumlamaya yöneltmelidir"
      - "Sorulan kişi, tek bir koşulda her iki komşusuyla birlikte doğrudan verilmemelidir"
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 8
    style: "neighbor_pair"
    correct_count: 1
    kurallar:
      - "Her seçenek iki kişi/varlık adından oluşan bir komşu çifti biçiminde yazılmalıdır"
      - "Seçenekler tam dairesel düzeni vermemelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır; hepsi [kişi] ve [kişi] biçiminde kurulmalıdır"
      - "Her seçenek, soruda hedef alınan kişinin iki yanında bulunabilecek aday çiftini temsil etmelidir"
      - "Doğru seçenek, hedef kişinin iki komşusunu doğru veren tek çift olmalıdır"
      - "Seçeneklerde kişi sırası doğru cevabı etkilememelidir; A ve B ile B ve A aynı komşu çiftini temsil eder"
      - "Ancak tüm seçenekler biçimsel tutarlılık için aynı kalıpla yazılmalıdır"
      - "Hiçbir seçenek doğrudan bir koşul cümlesinin içinden kopyalanmış ipucu gibi öne çıkmamalıdır"
      - "Hiçbir seçenek tek bir maddeye bakılarak doğrudan doğrulanabilir veya elenebilir olmamalıdır"
      - "Seçenekler biçimsel olarak dengeli olmalıdır"
      - "Doğru cevap uzunluk, vurgu veya özel ifade nedeniyle ayırt edilmemelidir"
      - "Aynı kişi bir seçenek içinde iki kez yazılmamalıdır"
      - "Bir seçenek, hedef kişinin kendisini içermemelidir"
      - "Seçeneklerde kullanılan kişiler, mümkün olduğunca gizli düzen içinde gerçekten komşuluk adaylığı oluşturabilecek kadar makul görünmelidir"

# ═══════════════════════════════════════════════════════════════
      # SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre [hedef_kisi] hangi kişilerin arasında oturmaktadır?</b>"
  - "<b>Bu bilgilere göre [hedef_kisi] aşağıdakilerden hangisinin arasındadır?</b>"
  - "<b>Bu bilgilere göre [hedef_kisi] adlı kişi hangi iki kişinin arasında yer almaktadır?</b>"
  - "<b>Bu bilgilere göre [hedef_kisi]’nin iki yanındaki kişiler aşağıdakilerden hangisidir?</b>"
  - "<b>Bu bilgilere göre [hedef_kisi]’nin komşuları aşağıdakilerden hangisidir?</b>"
  - "<b>Bu bilgilere göre [hedef_kisi], aşağıdaki ikililerden hangisinin arasında bulunur?</b>"

# ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    dairesel düzen kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen
    komşu çiftidir. Öğrenciden tek bir ipucuna dayanarak değil, tüm maddeleri
    analiz ederek hedef kişinin iki yanında oturan kişileri bulması beklenir.

  temel_ilke: >
    Gizli dairesel düzen kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan kesin komşu çifti olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara komşuluk blokları, karşılıklı oturmalar ve sağ-sol ilişkileri üzerinden gizli düzen kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce hedef kişinin iki komşusunu belirleyebilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; kurulmuş gizli dairesel düzenin zorunlu sonucu olmalıdır"
    - "Doğru cevap, hedef kişinin iki yanında oturan kişileri eksiksiz ve doğru biçimde vermelidir"
    - "Doğru cevapta hedef kişinin yalnızca bir komşusu değil, iki komşusu birlikte yer almalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir komşuluk sonucu olmalıdır"
    - "Doğru cevap 2-8 kelime arasında olmalıdır"
    - "Doğru cevap, iki kişilik ikili yapıdan çıkmamalıdır"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"
    - "Doğru seçenek, hedef kişinin sağ ve sol komşularını vermeli; fakat sağ-sol sırası özellikle sorulmadıkça seçenek içindeki yazım sırası belirleyici olmamalıdır"
    - "Doğru cevap, yalnızca 'yanında oturabilir' düzeyinde olası bir çift değil; KESİN olarak komşu olan çift olmalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli dairesel düzen kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen tek komşuluk bilgisinin kaba tekrarına dönüşmesi"
    - "Doğru cevabın yalnızca tek komşuyu verip diğerini düşündürmeye bırakması"
    - "Birden fazla seçeneğin hedef kişinin komşu çifti olmaya eşit derecede uygun görünmesi"
    - "Doğru cevabın tüm dairesel düzeni açık eden kapsamlı bir açıklama biçiminde yazılması"
    - "Hedef kişinin kendisini içeren bir doğru seçenek üretmek"
    - "Aynı kişinin iki kez geçtiği bir doğru seçenek üretmek"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli dairesel düzen kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Diğer seçeneklerin de hedef kişinin komşu çifti olma ihtimali kalıyor mu?"
    - "Doğru seçenek, hedef kişinin iki komşusunu eksiksiz veriyor mu?"
    - "Seçenek içindeki ikili sıralama değişse bile doğru cevap aynı komşu çiftini mi temsil ediyor?"
# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel komşu çiftleri olmamalıdır. Her yanlış seçenek, öğrencinin gizli
    dairesel oturma düzenini kurarken yapabileceği bütünsel bir muhakeme hatasının
    sonucu olmalıdır. Öğrenci yanlış bir ara düzen kurarsa ya da hedef kişinin iki
    komşusunu gereğinden erken kesinleştirirse, bu şıklardan birini işaretlemeye
    yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif dairesel düzenin sonucu olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı komşu çifti olmalıdır"
    - "Çeldirici, tüm düzen kurulmadan değil; yanlış düzen kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış dairesel kurgu yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru gizli düzen ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş dairesel düzende hedef kişinin komşuları gibi görünen makul ikili yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli dairesel düzeni kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış dairesel düzen veya yanlış kesinleştirme kurgusu tasarla."
    - "3. Her yanlış kurgu, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış kurguların hedef kişi için ürettiği komşu çiftlerinden oluştur."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldirici iki kişilik komşu çifti biçiminde kalmalıdır."
    - "8. Aynı iki kişinin yalnızca yer değiştirilmiş yazımı ikinci bir çeldirici olarak kullanılamaz; çünkü aynı komşu çiftini temsil eder."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış dairesel kurgu mantığına dayanmalıdır"
    - "Bazı çeldirici türleri tek başına yeterince güçlü olmayabilir; bu türler başka bir yanlış dairesel yerleştirme stratejisiyle birlikte kullanılmalıdır"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalı; daha güçlü bir yanlış dairesel kurgu stratejisini destekleyici olarak kullanılmalıdır"
    - "Çeldiriciler, öğrencinin gizli düzeni yanlış ya da eksik tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış dairesel düzen sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca bir kişisini değiştirip yüzeysel biçimde bozulan rastgele çiftler olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek aynı temsil düzeyinde, iki kişilik komşu çifti biçiminde olmalıdır"
    - "Her yanlış seçenek hedef kişinin kendisini içermemelidir"
    - "Her yanlış seçenek içinde aynı kişi iki kez kullanılmamalıdır"
    - "Çeldiriciler, hedef kişinin gerçekten komşusu olabilecekmiş gibi duran ama bütün düzen kurulunca bozulacak ikililerden seçilmelidir"
    - "Dairesel düzen sorularında döndürme eşdeğerliği doğal olduğundan, çeldirici üretimi mutlak koltuk numarasına değil komşuluk ve yön ilişkilerine dayanmalıdır"

  stratejiler:
    - ad: "KARSI_KARSIYA_ILISKISINI_YANLIS_KURMA"
      bilisssel_hata_kategorisi: "yerlesim_hatasi"
      aciklama: "Öğrenci karşı karşıya oturan kişileri doğru görür gibi olur; fakat bu karşılıklılığı komşulukla karıştırarak hedef kişinin yanlarını yanlış belirler"
      nasil_olusturulur: |
        Gizli düzende karşı karşıya bulunan bir ilişkiyi koru; ancak öğrencinin bu
        karşılık ilişkisini hedef kişinin komşuluğuna yanlış taşıdığı alternatif bir
        düzen kur. Çeldirici, hedef kişinin gerçekten karşısında veya karşı tarafında
        bulunan birini komşu sanma hatasından doğan komşu çifti olmalıdır.

    - ad: "SAG_SOL_YONUNU_TERS_OKUMA"
      bilisssel_hata_kategorisi: "yon_hatasi"
      aciklama: "Öğrenci bir kişinin sağında/solunda olma bilgisini ters yorumladığı için komşu çiftini yanlış kurar"
      nasil_olusturulur: |
        Özellikle sağında ve solunda oturma ilişkilerinde yönü ters taşıyan alternatif
        bir dairesel düzen kur. Çeldirici, yön karışıklığı sonucu hedef kişiye komşu
        gibi görünen ama tüm koşullar altında geçersiz kalan ikiliye dayanmalıdır.

    - ad: "YAN_YANA_BLOGUNU_YANLIS_KONUMA_TASIMA"
      bilisssel_hata_kategorisi: "blok_hatasi"
      aciklama: "Öğrenci yan yana oturması gereken kişileri doğru grup olarak bulur; fakat bu bloğu dairesel düzende yanlış yere taşır"
      nasil_olusturulur: |
        Yan yana olması gereken iki ya da daha fazla kişiden oluşan doğru bir komşuluk
        bloğunu koru; ancak bu bloğu hedef kişinin yakınına yanlış konumda yerleştiren
        alternatif bir dairesel düzen kur. Çeldirici, blok doğru olsa da hedef kişinin
        iki komşusunun yanlış belirlenmesi sonucu oluşan çift olmalıdır.

    - ad: "DAIRESEL_YAPIYI_DOGRUSAL_OKUMA"
      bilisssel_hata_kategorisi: "sekil_okuma_hatasi"
      aciklama: "Öğrenci dairesel düzeni doğrusal bir sıra gibi okuyarak uç varmış gibi düşünür ve komşulukları yanlış kurar"
      nasil_olusturulur: |
        Dairenin kapanan yapısını göz ardı eden, yani ilk ve son kişinin de komşu
        olduğunu hesaba katmayan alternatif bir düzen okuması kur. Çeldirici, bu
        doğrusal okuma hatası yüzünden hedef kişinin gerçek komşularına yakın görünen
        ama daire tamamlanınca bozulacak ikiliye dayanmalıdır.

    - ad: "HEDEF_KISININ_TEK_KOMSUSUNU_DOGRU_BULUP_DIGERINI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "kismi_dogru_kurgu"
      aciklama: "Öğrenci hedef kişinin komşularından birini doğru bulur; fakat ikinci komşuyu elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Hedef kişinin bir gerçek komşusunu koru; ancak diğer komşu yerini, tüm
        koşulları tekrar kontrol etmeden yanlış dolduran alternatif bir düzen kur.
        Çeldirici, 'bir yanı doğru buldum, öbürü de bu olmalı' hatasından doğan
        komşu çifti olmalıdır.

    - ad: "KIMIN_ARASINDA_OLDUGUNU_ERKEN_KESINLESTIRME"
      bilisssel_hata_kategorisi: "erken_sabitleme"
      aciklama: "Öğrenci bazı koşullardan sonra hedef kişinin iki yanını henüz tüm düzen kurulmadan kesin sanır"
      nasil_olusturulur: |
        Birkaç koşula göre hedef kişiye yakın görünen iki aday seç; ancak başka
        koşullar eklendiğinde bunlardan en az birinin değişmesi gereken alternatif
        bir dairesel kurgu kur. Çeldirici, hedef kişinin hangi iki kişi arasında
        olduğu bilgisini erken sabitleme hatasına dayanmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince
        bozulması gereken yanlış bir dairesel düzen kur. Çeldirici, öğrencinin ara
        çıkarımı yapıp sonraki mantıksal taşıma adımını atlaması sonucu yanlış komşu
        çiftini doğru ya da mümkün sanmasına dayanmalıdır.
      kullanim_notu: >
        Bu strateji tek başına kullanıldığında çeldirici zayıf kalabilir. Bu nedenle
        tek başına ana çeldirici olarak kullanılmamalı; "KARSI_KARSIYA_ILISKISINI_YANLIS_KURMA",
        "SAG_SOL_YONUNU_TERS_OKUMA", "YAN_YANA_BLOGUNU_YANLIS_KONUMA_TASIMA",
        "DAIRESEL_YAPIYI_DOGRUSAL_OKUMA",
        "HEDEF_KISININ_TEK_KOMSUSUNU_DOGRU_BULUP_DIGERINI_YANLIS_TAMAMLAMA" veya
        "KIMIN_ARASINDA_OLDUGUNU_ERKEN_KESINLESTIRME" gibi daha güçlü bir yanlış
        dairesel kurgu stratejisini destekleyici biçimde kullanılmalıdır.
      tek_basina_kullanilabilir: false
      birlikte_kullan:
        - "KARSI_KARSIYA_ILISKISINI_YANLIS_KURMA"
        - "SAG_SOL_YONUNU_TERS_OKUMA"
        - "YAN_YANA_BLOGUNU_YANLIS_KONUMA_TASIMA"
        - "DAIRESEL_YAPIYI_DOGRUSAL_OKUMA"
        - "HEDEF_KISININ_TEK_KOMSUSUNU_DOGRU_BULUP_DIGERINI_YANLIS_TAMAMLAMA"
        - "KIMIN_ARASINDA_OLDUGUNU_ERKEN_KESINLESTIRME"

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak komşu çifti üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele ikili yazmak"
    - "Çeldiriciyi yanlış dairesel düzen düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış çözüm mantığını temsil eden birden fazla çeldirici kullanmak"
    - "Aynı iki kişinin yalnızca yerini değiştirerek ikinci bir seçenek üretmek"
    - "Hedef kişinin kendisini içeren çeldirici üretmek"
    - "Bir seçenek içinde aynı kişiyi iki kez kullanmak"

  kalite_kontrol:
    - "Bu çeldirici, öğrencinin kurabileceği yanlış bir dairesel düzenin sonucu mu?"
    - "Bu seçenek bir tek maddeyle hemen eleniyor mu?"
    - "Bu seçenek ancak tüm koşullar kontrol edilince mi yanlışlaşıyor?"
    - "Bu çeldirici, doğru yapıya yakın ama hatalı bir alternatif kurguya dayanıyor mu?"
    - "Her çeldirici farklı bir yanlış çözüm yolunu temsil ediyor mu?"
    - "Tüm çeldiriciler iki kişilik komşu çifti biçiminde mi?"
    - "Çeldiriciler arasında aynı ikilinin ters sıralı tekrarı var mı?"
    - "Her çeldirici hedef kişinin iki komşusu olabilirmiş gibi yeterince makul görünüyor mu?"

  onerilen_dagilim:
    - "1 ana çeldirici: KARSI_KARSIYA_ILISKISINI_YANLIS_KURMA veya SAG_SOL_YONUNU_TERS_OKUMA"
    - "1 ana çeldirici: YAN_YANA_BLOGUNU_YANLIS_KONUMA_TASIMA veya DAIRESEL_YAPIYI_DOGRUSAL_OKUMA"
    - "1 ana çeldirici: HEDEF_KISININ_TEK_KOMSUSUNU_DOGRU_BULUP_DIGERINI_YANLIS_TAMAMLAMA veya KIMIN_ARASINDA_OLDUGUNU_ERKEN_KESINLESTIRME"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına kullanılmamalı; yalnızca yukarıdaki ana çeldiricilerden biriyle birlikte destekleyici mantık olarak kullanılmalıdır"

use_shared_strategies: false
