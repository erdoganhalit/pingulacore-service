# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi gizli dairesel oturma düzenini tamamen ya da büyük
    ölçüde kurmaya zorlamalıdır. Doğru cevap; tek bir koşuldan, iki koşulun hızlı
    birleşiminden veya yüzeysel elemeden bulunamamalı; ancak kişilerin dairesel
    düzende karşısında, sağında, solunda, yanında ve hangi iki kişi arasında
    bulunduğu ilişkileri birlikte değerlendirildikten sonra belirli kişinin hangi
    iki kişi arasında olduğu anlaşılmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca dairesel oturma/dizilim sorusuna uygun bir bağlam seç.
        Örnek alanlar:
        - yuvarlak masa etrafında oturma
        - kamp ateşi çevresinde dizilim
        - çember oyunu düzeni
        - planetaryum halka oturumu
        - sergi açılışında yuvarlak masa
        - uzay görevi toplantı halkası

    - step: 2
      action: "Kişileri, hedef kişiyi ve gizli doğru dairesel düzeni kur"
      details: |
        - Önce 5-8 kişi/varlık belirle
        - Sonra bunları dairesel düzende tek doğru yerleşim oluşturacak biçimde yerleştir
        - Hedef kişiyi baştan belirle; soru bu kişinin hangi iki kişi arasında olduğunu soracaktır
        - Dairesel yapılarda döndürme eşdeğerliği doğal olduğu için iç çözümde gerekirse
        bir referans kişi sabitlenerek düzen takip edilmelidir
        - Ancak soru metni, bu sabitlemeyi doğrudan ele vermemelidir
        - Bu dairesel düzen, sorunun görünmeyen çözüm yapısı olmalıdır
        - Soru yazımına geçmeden önce komşuluk, karşısındalık ve yön ilişkileri kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü, tam düzeni değil; belirli kişinin hangi iki kişi arasında
        bulunduğunu sormalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - [kişi] hangi kişilerin arasındadır
        - [kişi]nin iki yanında kimler vardır
        - [kişi] hangi iki kişiyle komşudur
        - [kişi]nin sağında ve solunda kimler bulunur

        Soru kökü, tek bir komşuyu değil, iki komşunun birlikte belirlenmesini
        gerektirmelidir.

    - step: 4
      action: "Koşulları gizli düzenden türet"
      details: |
        - 3-5 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince hedef kişinin iki komşusu doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde dairesel düzen yeterince kurulmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar, hedeflenen soru köküne göre yalnızca bir doğru cevap üretmelidir
        - Koşullar ağırlıklı olarak karşısında olma, sağ-sol yönü, yan yana gelme,
        yan yana gelmeme ve kimin hangi iki kişi arasında bulunduğu ilişkilerini içermelidir
        - Gerekirse hedef kişiye dair bazı dolaylı ilişkiler verilebilir; ancak iki komşusu
        açıkça söylenmemelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede dairesel düzenin çerçevesini tanıt
        - Kaç kişi/varlık olduğu anlaşılır olsun
        - Düzenin yuvarlak/çembersel olduğu açıkça belirtilsin
        - Bağlam sade, öğrenciye yakın ve dairesel düzen-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, hedef kişinin arasında bulunduğu iki gerçek komşuyu vermelidir
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli dairesel düzeni kurmadan bu ikiliye ulaşamamalıdır
        - Doğru seçenek iki kişilik komşu çifti biçiminde olmalıdır
        - Aynı ikili, ters sırayla ikinci bir seçenek olarak üretilmemelidir
        - Seçeneklerde kişi çiftleri aynı yazım düzeniyle verilmelidir

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli dairesel düzeni eksik veya yanlış kuran öğrencinin düşebileceği yanlış komşu çiftleri olmalıdır
        - Çeldiriciler, karşısındaki kişiyi komşu sanma, sağ-sol yönünü ters okuma,
        dairesel yapıyı doğrusal okuma, bir komşuyu doğru bulup diğerini yanlış tamamlama gibi hatalara dayanmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır
        - Her çeldirici iki kişilik komşu çifti biçiminde kalmalıdır
        - Hedef kişinin adı hiçbir seçenekte yer almamalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler iki kişilik komşu çifti biçiminde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun
        - Aynı kişilerin yalnızca ters yazılmış tekrarlı versiyonları seçeneklerde yer almamalıdır
        - Çiftlerin yazım sırası tüm seçeneklerde aynı mantıkla kurulmalıdır

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci gizli dairesel düzeni kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Yanlış şıklardan biri tek bir maddeyle eleniyor mu?
        - Hedef kişi için yalnızca bir komşu çifti mi kesinleşiyor?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        - Aynı ikilinin ters sıralı tekrarından oluşan seçenek var mı?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

# ═══════════════════════════════════════════════════════════════
    # DOGRULAMA KONTROL LISTESI
# ═══════════════════════════════════════════════════════════════

validation_checklist:
  paragraph:
    - "Setup cümlesi + maddeli koşul formatında mı?"
