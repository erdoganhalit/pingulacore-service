  - ad: "etkinlik_slot_duzeni"
    aciklama: "Etkinliklerin belirli zaman dilimlerine yerleştirilmesi"
    ornek_setup: "Bir okul şenliğinde yapılacak etkinlikler belirli zaman dilimlerine yerleştirilecektir."

  - ad: "raf_urun_duzeni"
    aciklama: "Ürünlerin raftaki bölümlere yerleştirilmesi"
