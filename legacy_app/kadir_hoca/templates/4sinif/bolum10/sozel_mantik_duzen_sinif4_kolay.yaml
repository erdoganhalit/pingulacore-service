# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan düzen sorusu (kolay)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, slot/bölüm/konumlara yerleştirilen öğelerle ilgili verilen
      ilişkisel koşulları birlikte değerlendirerek gizli düzeni kurması gerekir.
      Kolay düzey: öğe sayısı düşük, slot/bölüm sayısı sınırlı, koşul sayısı alt sınırda, en fazla 1 dolaylı çıkarım.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Düzenin neye ait olduğunu açıklar; kaç bölüm/slot olduğu ve hangi öğelerin yerleştirileceği tanıtılır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu düzenle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Kolay düzey: öğe sayısı düşük tutulmalıdır"
      - "Kolay düzey: dolaylı çıkarım gerektiren koşul sayısı en fazla 1 olmalıdır"
      - "Kolay düzey: aynı anda izlenmesi gereken ilişki türü sayısı düşük olmalıdır"
      - "Koşulların çoğu doğrudan yerleştirme veya yakın ilişki vermelidir"
      - "Önce gizli doğru düzen kurulmalı; ardından yalnızca bu düzene götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 22
    style: "complete_sentence"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli düzen
    kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen seçenektir.
  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap 3-22 kelime arasında olmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "DOGRUDAN_YERLESIM_HATASI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Az koşullu düzende koşulların bir kısmını görmezden gelerek yapılan yanlış yerleştirme"
    nasil_olusturulur: |
      Koşulların yalnızca bir ya da ikisini dikkate alan, geri kalanını atlayan bir öğe sıralaması sun. Yüzeysel doğru görünmeli ama göz ardı edilen koşulla çelişmeli.
    kategori: "cognitive"

  - ad: "YAKIN_KONUM_YANILGISI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Komşuluk veya yakınlık koşulunu doğru ama konumu yanlış yorumlayan yerleşim"
    nasil_olusturulur: |
      Bir koşulun 'yanında' ya da 'hemen önünde' gibi ifadesini tersine çevirerek yanlış bir sıralamayı doğruymuş gibi sun. Bir adım ileri ya da geri kaydır.
    kategori: "cognitive"

  - ad: "KISITLANAN_SLOT_KARISMASI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Kısıtlanan konumu başka bir öğeye atfeden yerleşim"
    nasil_olusturulur: |
      Bir öğenin giremeyeceği ya da girmesi gereken slotu başka bir öğeyle değiştiren seçenek oluştur. Kısıt doğru hatırlanmış ama uygulanacak öğe karıştırılmış gibi göster.
    kategori: "semantic"

use_shared_strategies: false

