meta:
  id: "sozel_mantik_duzen_sinif4_kolay"
  ad: "Sözel Mantık ve Muhakeme - Düzen Sorusu (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — az değişkenli, daha doğrudan düzen kurma. Öğe sayısı düşük, slot/bölüm sayısı sınırlı, koşul sayısı alt sınırda, en fazla 1 dolaylı çıkarım."
  frequency: "High"

