# Kaynak: sozel_mantik_kesin_yerlesim_eslestirme_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.zor
# 4. sinif sözel mantık kesin yerleşim ve eşleştirme sorgulama sorusu — zor duzey

meta:
  id: "sozel_mantik_kesin_yerlesim_eslestirme_sinif4_zor"
  ad: "Sözel Mantık ve Muhakeme - Kesin Yerleşim ve Eşleştirme Sorgulama (Zor)"
  sinif_seviyesi: 4
  aciklama: "Zor duzey — 6-7 kişi, 3 yer/kategori, 5 koşul, en az 3 dolaylı çıkarım, en az 2 kritik kapasite kısıtı, en az 2 çapraz dışlama."
  frequency: "High"

kesin_yerlesim_senaryolari:
  - ad: "ofis_kat_paylasimi"
    aciklama: "Bir şirketin farklı birimlerinde çalışanların 1., 2. ve 3. katlara dağılımı"
    ornek_setup: "Bir tekstil firmasında çalışan altı arkadaş; Giriş, 1. Kat veya 2. Kat ofislerinden birinde çalışmaktadır."

  - ad: "spor_salonu_alanlari"
    aciklama: "Sporcuların antrenman için salonun farklı bölümlerine (Kardiyo, Ağırlık, Esneme) dağılması"
    ornek_setup: "Spor salonuna giden yedi arkadaş; Kardiyo, Ağırlık veya Esneme alanlarından yalnızca birinde çalışmaktadır."

  - ad: "mutfak_atolyesi_istasyonlari"
    aciklama: "Yemek kursuna katılanların hazırlık yaptıkları farklı tezgahlar (Hamur, Pişirme, Sunum)"
    ornek_setup: "Yemek kursundaki beş öğrenci; Hamur İşleri, Sos Hazırlama veya Pişirme istasyonlarından birinde görev almıştır."

  - ad: "otopark_blok_duzeni"
    aciklama: "Komşuların araçlarını sitenin farklı otopark bloklarına park etmesi"
    ornek_setup: "Aynı sitede oturan altı komşu; araçlarını A, B veya C otopark bloklarından yalnızca birine park etmiştir."

  - ad: "kutuphane_okuma_bolumleri"
    aciklama: "Öğrencilerin kütüphanenin farklı çalışma alanlarına (Sessiz Salon, Grup Odası, Teras) dağılması"
    ornek_setup: "Sınava hazırlanan yedi öğrenci; kütüphanedeki Sessiz Salon, Grup Odası veya Teras bölümlerinden birinde ders çalışmaktadır."

  - ad: "avm_magaza_katlari"
    aciklama: "Alışverişe çıkan arkadaşların farklı katlardaki mağazalara dağılması"
    ornek_setup: "Hafta sonu alışverişe çıkan altı arkadaş; Teknoloji, Giyim veya Kitap katlarından birinde vakit geçirmektedir."

  - ad: "yaz_tati_kamp_alanlari"
    aciklama: "Tatilcilerin kamp alanındaki farklı bölgelere (Orman içi, Göl kenarı, Açık alan) çadır kurması"
    ornek_setup: "Kampa giden yedi arkadaş; çadırlarını Orman içi, Göl kenarı veya Açık alan bölgelerinden yalnızca birine kurmuştur."

  - ad: "apartman_daire_katlari"
    aciklama: "Yeni taşınan arkadaş grubunun apartmandaki farklı katlara yerleşmesi"
    ornek_setup: "Aynı apartmandan daire kiralayan altı arkadaş; 1., 2. veya 3. katlardaki dairelerden yalnızca birine yerleşmiştir."

  - ad: "fuar_stant_kategorileri"
    aciklama: "Yayıncıların kitap fuarındaki farklı tematik alanlara dağılması"
    ornek_setup: "Kitap fuarına katılan yedi yayınevi; Çocuk Kitapları, Roman veya Tarih stantlarından birinde eserlerini sergilemektedir."

  - ad: "cafe_calisma_masalari"
    ornek_setup: "Kitap okumaya giden yedi kişi; kafenin Cam Kenarı, Arka Bahçe veya Üst Kat masalarından birine oturmuştur."

  - ad: "seminer_salonu_oturma_duzeni"
    ornek_setup: "Eğitime katılan yedi öğretmen; eğitim için Kırmızı, Mavi veya Sarı salonlardan birine geçmiştir."

  - ad: "market_reyon_gorevlileri"
    ornek_setup: "Süpermarkette çalışan altı görevli; Manav, Kasap veya Temizlik reyonlarından birinde düzenleme yapmaktadır."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 yargı cümlesi seçeneğinden oluşan kesinlik sorgulama sorusu (zor)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 95
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişilerin sınırlı sayıdaki yerlere/kategorilere dağıtıldığı kurgularda;
      kapasite kısıtları, aynı/farklı yerde olma ve tek başına bulunma durumlarını analiz ederek
      gizli dağılım tablosunu kurması gerekir. Seçenekler yargı cümlelerinden oluşur.
      Zor düzey: 6-7 kişi, 3 yer/kategori, 5 koşul, en az 3 dolaylı çıkarım, en az 2 kritik kapasite kısıtı, en az 2 çapraz dışlama.
      Doğru tablo ancak tüm koşullar birlikte işlendiğinde kilitlenmelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Dağılımın bağlamını açıklar; kaç kişi olduğu, hangi yerlerin/kategorilerin bulunduğu ve genel kapasite yapısı tanıtılır"
      - "Kurgu kişi-yer ve kapasite merkezli olmalıdır"
      - "MADDELİ KOŞULLAR 5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu dağılımla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3<br>• Koşul 4<br>• Koşul 5"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Zor düzey: kişi sayısı 6-7, yer sayısı 3 olmalıdır"
      - "Zor düzey: en az 3 koşul dolaylı çıkarım gerektirmelidir"
      - "Zor düzey: en az 2 kritik kapasite/tek başına olma kısıtı kullanılmalıdır"
      - "Zor düzey: en az 2 çapraz dışlama ilişkisi bulunmalıdır"
      - "Zor düzey: en az iki şık, tablo kurulmadan güçlü biçimde mümkün görünebilmelidir"
      - "Önce gizli doğru dağılım tablosu kurulmalı; ardından bu tabloya götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 8
    style: "yargi_cumlesi"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle doğrudur?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi doğrudur?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle yanlıştır?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi yanlıştır?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar, kapasite sınırları ve kısıtlar
    değerlendirilip gizli yerleşim tablosu kurulduktan sonra, doğruluğu veya
    yanlışlığı mantıksal olarak KESİN olan yargı cümlesidir.
  kurallar:
    - "Doğru cevap SADECE tüm koşullar ve yer kapasiteleri birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Zor düzeyde öğrenci çoklu dışlama, kapasite baskısı ve dolaylı çıkarımları birlikte izlemelidir"
    - "Doğru cevap 3-8 kelime arasında, tam bir yargı cümlesi olmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "ÇOK_ADIMLI_ZİNCİR_KIRIĞI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Birden fazla dolaylı çıkarım ve çapraz dışlamayı birlikte izleyemeyerek yapılan yerleşim hatası"
    nasil_olusturulur: |
      En az 3 dolaylı çıkarım ve 2 çapraz dışlamanın birlikte işlenmesi gereken zor düzeyde, tüm koşullar ayrı ayrı geçerli görünüp birlikte değerlendirilince çöken bir tablo sun.
    kategori: "cognitive"

  - ad: "GÜÇLÜ_TABLO_YANILGISI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Yüksek değişken yoğunluğunda 4 koşulu karşılayıp yalnızca 1 kritik koşulu ihlal eden ama güçlü görünen tablo"
    nasil_olusturulur: |
      5 koşuldan 4'ünü karşılayan, 1 kritik koşulun (kapasite baskısı veya kritik dışlama) ihlal edildiği ama ilk bakışta fark edilmesi zor olan bir yerleşim oluştur.
    kategori: "cognitive"

  - ad: "KAPASİTE_BASKISI_ZINCIRLEME_HATASI"
    bilisssel_hata_kategorisi: "dis_bilgi_karisimi"
    aciklama: "En az 2 kritik kapasite kısıtını izleyemeyerek yapılan zincirleme yerleşim hatası"
    nasil_olusturulur: |
      İki ayrı kapasite baskısının birbirini etkilediği durumda, baskıların birini uygulayıp diğerini atlayan ve bu yüzden domino etkisiyle birden fazla kişiyi yanlış yerleştiren bir tablo sun.
    kategori: "cognitive"

use_shared_strategies: false

