# Kaynak: sozel_mantik_cok_eksenli_eslestirme_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.zor
# 4. sinif sözel mantık çok eksenli eşleştirme — zor duzey

meta:
  id: "sozel_mantik_cok_eksenli_eslestirme_sinif4_zor"
  ad: "Sözel Mantık ve Muhakeme - Çok Eksenli Eşleştirme Sorusu (Zor)"
  sinif_seviyesi: 4
  aciklama: "Zor duzey — yüksek değişken sayılı çok eksenli eşleştirme sorusu. 5 kişi/nesne/birim, 3 kategori ekseni, 5 koşul, en az 2 dolaylı çıkarım, en az 2 güçlü çapraz ilişki. En az 1 koşul kritik rol taşımalıdır."
  frequency: "High"

eslestirme_senaryolari:
  - ad: "ogrenci_kurs_kat_eslestirmesi"
    aciklama: "Öğrencilerin gittikleri kurs ve kursların bulunduğu katın eşleştirilmesi"
    ornek_setup: "Dört öğrenci farklı kurslara gitmektedir ve her kurs farklı bir katta bulunmaktadır."

  - ad: "cocuk_sehir_spor_eslestirmesi"
    aciklama: "Çocukların yaşadıkları şehir ve yaptıkları sporun eşleştirilmesi"
    ornek_setup: "Dört çocuktan her biri farklı bir şehirde yaşamakta ve farklı bir spor yapmaktadır."

  - ad: "ogrenci_kulup_gun_eslestirmesi"
    aciklama: "Öğrencilerin kulüp türü ve kulüp günüyle eşleştirilmesi"
    ornek_setup: "Dört öğrenci farklı kulüplere katılmaktadır ve her kulüp haftanın farklı bir gününde yapılmaktadır."

  - ad: "sporcu_branş_forma_rengi_eslestirmesi"
    aciklama: "Sporcuların branşları ve forma renklerinin eşleştirilmesi"
    ornek_setup: "Dört sporcu farklı branşlarda yarışmakta ve her biri farklı renkte forma giymektedir."

  - ad: "ogrenci_proje_konu_salon_eslestirmesi"
    aciklama: "Öğrencilerin proje konuları ve sunum salonlarının eşleştirilmesi"
    ornek_setup: "Dört öğrenci farklı proje konularını farklı salonlarda sunacaktır."

  - ad: "cocuk_enstruman_ogretmen_eslestirmesi"
    aciklama: "Çocukların çaldıkları enstrümanlar ve ders aldıkları öğretmenlerin eşleştirilmesi"
    ornek_setup: "Dört çocuk farklı enstrümanlar çalmakta ve her biri farklı bir öğretmenden ders almaktadır."

  - ad: "ogrenci_kitap_turu_rozet_rengi_eslestirmesi"
    aciklama: "Öğrencilerin seçtikleri kitap türleri ve rozet renklerinin eşleştirilmesi"
    ornek_setup: "Dört öğrenci farklı kitap türlerini seçmiş ve her birine farklı renkte rozet verilmiştir."

  - ad: "kampci_cadir_numarasi_etkinlik_eslestirmesi"
    aciklama: "Kampçıların çadır numaraları ve katıldıkları etkinliklerin eşleştirilmesi"
    ornek_setup: "Dört kampçı farklı numaralı çadırlarda kalmakta ve farklı etkinliklere katılmaktadır."

  - ad: "ogrenci_bilim_alani_madalya_rengi_eslestirmesi"
    aciklama: "Öğrencilerin yarıştıkları bilim alanı ve aldıkları madalya renginin eşleştirilmesi"
    ornek_setup: "Dört öğrenci farklı bilim alanlarında yarışmış ve farklı renklerde madalya almıştır."

  - ad: "cocuk_hayvan_turu_bakim_gunu_eslestirmesi"
    aciklama: "Çocukların sorumlu oldukları hayvan türü ve bakım günlerinin eşleştirilmesi"
    ornek_setup: "Dört çocuk farklı hayvan türlerinden sorumludur ve her biri bakımını farklı bir günde yapmaktadır."

  - ad: "ogrenci_masa_numarasi_gorev_turu_eslestirmesi"
    aciklama: "Öğrencilerin oturdukları masa numarası ve üstlendikleri görev türünün eşleştirilmesi"
    ornek_setup: "Dört öğrenci farklı masalarda oturmakta ve her biri farklı bir görev üstlenmektedir."

  - ad: "gezgin_ulke_ulasim_turu_eslestirmesi"
    aciklama: "Gezginlerin gittikleri ülke ve kullandıkları ulaşım türünün eşleştirilmesi"
    ornek_setup: "Dört gezgin farklı ülkelere gitmiş ve her biri farklı bir ulaşım türü kullanmıştır."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan çok eksenli eşleştirme sorusu (zor)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 95
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişi/nesne/birimleri birden fazla kategori ekseni üzerinde
      verilen ilişkisel koşulları birlikte değerlendirerek gizli eşleştirme
      tablosunu kurması gerekir. Zor düzeyde değişken sayısı en yüksektedir:
      5 öğe, 3 eksen, 5 koşul, en az 2 dolaylı çıkarım, en az 2 güçlü çapraz ilişki.
      En az 1 koşul yanlış yorumlandığında tüm tablonun kaymasına yol açacak kritik rol taşımalıdır.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kimlerin/nelerin eşleştirileceğini, hangi kategori eksenlerinin bulunduğunu ve genel çerçeveyi tanıtır"
      - "Kurgu kişi-merkezli, nesne-merkezli veya birim-merkezli olabilir; ancak yapı birden fazla kategori ekseni içermelidir"
      - "Her öğe için her eksenden yalnızca bir değer geçerli olmalıdır"
      - "MADDELİ KOŞULLAR 5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu eşleştirmeyle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3<br>• Koşul 4<br>• Koşul 5"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Zor düzey: 5 kişi/nesne/birim ve 3 kategori ekseni kullanılmalıdır"
      - "Zor düzey: en az 2 koşul dolaylı çıkarım gerektirmelidir"
      - "Zor düzey: en az 2 güçlü çapraz ilişki bulunmalıdır"
      - "Zor düzey: en az 1 koşul yanlış yorumlandığında tüm tablonun kaymasına yol açacak kritik rol taşımalıdır"
      - "Zor düzey: öğrenci birden fazla ara tablo veya ara eşleştirme kurmadan sonuca ulaşamamalıdır"
      - "Zorluk yalnız değişken ve ilişki yoğunluğundan gelmeli; metin uzunluğundan gelmemelidir"
      - "Önce gizli doğru eşleştirme tablosu kurulmalı; ardından yalnızca bu tabloya götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar birden fazla tabloya izin vermemelidir"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 22
    style: "complete_sentence"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi verilen koşullara <u>uygundur</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    eşleştirme tablosu kurulduktan sonra mantıksal olarak kesin biçimde
    belirlenebilen çıkarım önermesidir.
  mantik: "Gizli eşleştirme tablosu kurulmadan doğru cevap belirlenememelidir."
  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Zor düzeyde öğrenci birden fazla ara tablo veya ara eşleştirme kurmadan sonuca ulaşamamalıdır"
    - "Doğru cevap 3-22 kelime arasında olmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "ÇOK_EKSEN_KİLİTLENEMEME"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "3 eksen ve yüksek koşul sayısında tabloyu tam kilitleyemeden erken sonuca varan seçenek"
    nasil_olusturulur: |
      5 koşuldan 3-4'ünü doğru uygulayan ama kalan koşulları sezgiyle tamamlayan ve bu yüzden bazı öğeleri yanlış kategoriye atan bir tablo oluştur.
    kategori: "cognitive"

  - ad: "KRİTİK_KOŞUL_KATASTROFİK_YORUM"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Yanlış yorumlandığında tüm tablonun kaymasına yol açan kritik koşulu yanlış uygulayan seçenek"
    nasil_olusturulur: |
      Sorudaki kritik domino koşulunu ters uygulayan ve bu yüzden tüm tabloyu farklı ama kendi içinde tutarlı görünen bir yönde dolduran seçenek sun.
    kategori: "cognitive"

  - ad: "ARA_TABLO_ZİNCİR_KIRIĞI"
    bilisssel_hata_kategorisi: "dis_bilgi_karisimi"
    aciklama: "Birden fazla ara tablo gerektiren zor düzeyde ikinci ara tabloyu hatalı kuran seçenek"
    nasil_olusturulur: |
      İlk ara tabloyu doğru kuran ama ikinci ara eşleştirmeyi yanlış türeten ve sonuçta 2-3 öğenin konumunu kaydıran, yüzeysel bakışta güçlü görünen bir tablo oluştur.
    kategori: "cognitive"

use_shared_strategies: false

