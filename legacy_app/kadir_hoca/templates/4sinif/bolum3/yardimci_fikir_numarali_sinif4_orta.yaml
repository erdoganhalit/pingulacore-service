# Kaynak: yardimci_fikir_numarali_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.orta
# 4. sinif yardimci fikir numarali — orta duzey

meta:
  id: "yardimci_fikir_numarali_sinif4_orta"
  ad: "4. Sinif - Yardimci Fikir Numarali (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — 4. sinif numarali yardimci fikir sorusu. numarali (1-2-3-4) ifadeler arasinda hangileri yardimci fikir olarak verilebilir?"
  frequency: "High"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Tek paragraf + numarali ifadeler + soru koku + 4 numarali kombinasyon secenegi (orta)"

  paragraph:
    required: true
    word_count_min: 68
    word_count_max: 85
    background_color: "#f8f0e0"
    sentence_count_min: 5
    sentence_count_max: 6
    stil: "bilgilendirici"
    kurallar:
      - "Paragraftaki desteklenen bilgilerden en az 1'i dogrudan, en az 1'i basit dolayli cikarimla bulunabilir olmalidir."
      - "Desteklenmeyen ifadeler konuya yakin gorunmeli, ancak metinle dogrulanamamalidir."
      - "Paragrafta birden fazla bilgi alani bulunmali ve ogrenci ilgili bilgiyi secerek kullanmalidir."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "Dis bilgi gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    style: "roman_numeral_combination"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Secenekler Arap rakami ile numarali kombinasyon biciminde olmali (1 ve 2, 1 ve 3, 2 ve 3, vb.)."
      - "Dogru kombinasyon yalnizca gercek yardimci fikirleri icermeli."
      - "Yanlis kombinasyonlar ana fikri veya alakasiz ifadeleri icermeli."
      - "Her numarali ifade (statement_I/II/III/IV) 5-10 kelime uzunlugunda olmalidir."

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinden,</b><br>{statements}<br><b>numaralanmış ifadelerden hangileri <u>çıkarılamaz</u>?</b>"
  # KULLANILDI: - "<b>Bu metinde,</b><br>{statements}<br><b>numaralanmış bilgilerden hangilerine <u>yer verilmemiştir</u>?</b>"
  # KULLANILDI: - "<b>Bu metinden</b> \"{topic}\" <b>ile ilgili,</b><br>{statements}<br><b>bilgilerinden hangilerine <u>ulaşılamaz</u>?</b>"
  # KULLANILDI: - "<b>Bu metinde,</b><br>{statements}<br><b>maddelerinden hangileri ile ilgili bilgi <u>verilmemiştir</u>?</b>"
  # KULLANILDI: - "<b>Bu metinden,</b><br>{statements}<br><b>bilgilerinden hangilerine ulaşılabilir?</b>"
  - "<b>Bu metinden</b> \"{topic}\" <b>ile ilgili,</b><br>{statements}<br><b>numaralanmış bilgilerden hangilerine ulaşılabilir?</b>"
  # KULLANILDI: - "<b>Bu metinde,</b><br>{statements}<br><b>yargılarından hangileri kesin olarak <u>çıkarılamaz</u>?</b>"
  # KULLANILDI: - "<b>Bu metinde,</b><br>{statements}<br><b>konularından hangileri ele alınmıştır?</b>"
  # KULLANILDI: - "<b>Bu metinden</b> \"{topic}\" <b>ile ilgili,</b><br>{statements}<br><b>yargılarından hangileri <u>çıkarılamaz</u>?</b>"
  - "<b>Bu metinden hareketle</b> \"{topic}\" <b>ile ilgili,</b><br>{statements}<br><b>yargılarından hangilerine ulaşılabilir?</b>"
  # KULLANILDI: - "<b>Bu metinden hareketle,</b><br>{statements}<br><b>yargılarından hangileri kesin olarak söylenebilir?</b>"
  - "<b>Bu metinden,</b><br>{statements}<br><b>yargılarından hangileri çıkarılabilir?</b>"
  # KULLANILDI: - "<b>Bu metne göre</b> \"{topic}\" <b>ile ilgili,</b><br>{statements}<br><b>yargılarından hangileri söylenebilir?</b>"
  - "<b>Bu metne göre,</b><br>{statements}<br><b>yargılarından hangileri <u>yanlıştır</u>?</b>"


# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metnin ana fikrini destekleyen yardimci fikirleri dogru sekilde gosteren kombinasyon"
  kurallar:
    - "Dogru secenek yalnizca gercek yardimci fikirleri icermeli."
    - "Yardimci fikir olmayan ifadeler dogru secenek icerisinde olmamali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════


celdirici_stratejileri:
  - ad: "KARMIK_CIKARIM"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Hem doğrudan hem dolaylı çıkarım gerektiren dengeli yapı"
    nasil_olusturulur: |
      En az 1 yanlış seçenek doğrudan çıkarım, en az 1 yanlış seçenek dolaylı çıkarım, en az 1 yanlış seçenek metindeki 2 farklı bilgiyi birleştirerek oluşturulmalı.
      Orta seviyede öğrenci her ifadeyi ayrı ayrı metinle karşılaştırmalıdır.
    kategori: "cognitive"

  - ad: "BILGI_BIRLESTIRME_TUZAGI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metindeki 2 farklı bilgiyi birleştiren, makul görünen seçenekler"
    nasil_olusturulur: |
      En az 1 yanlış seçenek metindeki 2 farklı bilgiyi birleştirerek oluşturulmalı.
      Orta seviyede bu bileşik ifade doğruya yakın görünmeli ama metinde tam bu bileşim olmamalı.
    kategori: "semantic"

use_shared_strategies: false

