# Kaynak: metinde_karakter_ozellik_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 4. sinif metinde karakter ozellik — kolay duzey

meta:
  id: "b12_metinde_karakter_ozellik_sinif4_kolay"
  ad: "Metinde Karakter - Kişilik Özelliği (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — metindeki kişinin karakter özelliğini analiz etme."
  frequency: "High"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Karakter odaklı paragraf + soru kökü + sıfat/kavram seçenekler (kolay)"

  paragraph:
    required: true
    word_count_min: 50
    word_count_max: 65
    background_color: "#e8f8e8"
    sentence_count_min: 3
    sentence_count_max: 7
    stil: "oykuleyici"
    kurallar:
      - "Kişinin belirgin bir davranışı anlatılmalı."
      - "Kişilik özelliği doğrudan söylenmemeli, olaylar üzerinden sezdirilmeli."
      - "Karakterin davranışları daha açık ve tek yönlü olmalı."
      - "Metinde tek bir baskın kişilik özelliği ön plana çıkmalı."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 3
    style: "concept"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde sözü edilen kişinin aşağıdaki özelliklerden hangisine sahip olduğu söylenebilir?</b>"
  # KULLANILDI: - "<b>Bu metinde bahsedilen kişi için aşağıdakilerden hangisi söylenebilir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Davranışla örtüşen kişilik sıfatı"
  kurallar:
    - "Kisilik ozelligi metindeki davranislarla birebir ortusmeli."
    - "1-3 kelimelik kisa kavram olmali."
    - "Ozellik dogrudan soylenmemeli, davranislardan cikarilmali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "UZAK_OZELLIK"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Doğru özelliğe uzak, kolay elenebilir karakter özelliği seçeneği"
    nasil_olusturulur: |
      Karakterin baskın özelliği davranışlardan daha doğrudan sezdirilmeli.
      Paragrafta tek bir olay veya alışkanlık üzerinden özellik belirginleştirilebilir.
      Celdiriciler doğru özelliğe göre daha uzak seçilmeli — kolay elenebilir olmalı.
    kategori: "semantic"

  - ad: "YANLIS_CIKARIMDAVRANIS"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Karakterin davranışından yanlış çıkarılan özellik"
    nasil_olusturulur: |
      Karakterin bir davranışından yanlış çıkarılabilecek ama kolayca elenebilecek bir özellik seçeneği oluştur.
      Kolay seviyede paragrafın bütünü okunduğunda bu seçeneğin yanlış olduğu belirgin olmalı.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
