# Kaynak: metinde_duyular_ikili_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.zor
# 4. sinif metinde duyular ikili — zor duzey

meta:
  id: "b12_metinde_duyular_ikili_sinif4_zor"
  ad: "Metinde Duyular - İkili Duyular (Zor)"
  sinif_seviyesi: 4
  aciklama: "Zor duzey — metinde kullanılan duyular arasından doğru ikiliyi seçme."
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Duyusal ifadeler içeren paragraf + soru kökü + ikili duyular seçenekleri (zor)"

  paragraph:
    required: true
    word_count_min: 86
    word_count_max: 100
    background_color: "#fce8e8"
    sentence_count_min: 6
    sentence_count_max: 7
    stil: "oykuleyici"
    kurallar:
      - "Duyu ifadeleri metnin farkli yerlerine dagitilabilir."
      - "Dogru duyu grubunu bulmak icin tum paragraf dikkatle okunmalidir."
      - "En az 2 celdirici dogru cevaba oldukca yakin ve makul gorunmelidir."
      - "Metin uzunlugu ve ifade dagilimi zorlugu artirmalidir."
      - "Paragraf en az iki farklı duyu organını harekete geçiren ifadeler içermeli."
      - "Duyusal ifadeler doğal bağlamda geçmeli, listelemek gibi sıralanmamalı."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "Dis bilgi gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 6
    style: "keyword_set"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde aşağıdaki duyu organlarından hangilerine ait ifadelere yer verilmiştir?</b>"
  # KULLANILDI: - "<b>Bu metinde hangi duyu organlarını harekete geçiren ifadeler kullanılmıştır?</b>"
  - "<b>Yukarıdaki metinde aşağıdaki duyulardan hangileri kullanılmıştır?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metinde gerçekten kullanılan iki duyuyu doğru gösteren seçenek"
  kurallar:
    - "Her iki duyunun da metinde açıkça ifade edilmis olmali."
    - "Seçenekler 'duygu1 - duygu2' formatında olmali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

distractors:
  notlar:
    - "Celdiriciler metinde kullanilmayan duyulardan en az birini icermeli"
    - "Tum secenekler ayni formatta olmali (iki duygu 'duygu1 - duygu2' biciminde)"

# ═══════════════════════════════════════════════════════════════
# BECERI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB2"
  bilesenler: ["yorumlama"]
  surec_bileseni: "bilgiyi_cikartma"


celdirici_stratejileri:
  - ad: "COK_YAKIN_DUYU_GRUPLARI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Doğru duyu grubuna çok yakın, en az 2 celdirici makul görünen seçenekler"
    nasil_olusturulur: |
      En az 2 celdirici doğru cevaba oldukça yakın ve makul görünmeli.
      Zor seviyede duyu ifadeleri metnin farklı yerlerine dağıtılabilir.
      Doğru duyu grubunu bulmak için tüm paragraf dikkatle okunmalıdır.
    kategori: "semantic"

  - ad: "DAGINIK_DUYU_TUZAGI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metne dağıtılmış duyu ifadelerini takip etme gerektiren güçlü tuzak"
    nasil_olusturulur: |
      Duyu ifadeleri metnin farklı cümlelerine dağıtılmış olmalı.
      Zor seviyede öğrenci tüm paragrafı sistematik tarayarak doğru çifti belirlemelidir.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
