# Kaynak: sozel_mantik_kesin_sira_numarasi_sorgulama_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.zor
# 4. sinif sözel mantık kesin sıra numarası sorgulama sorusu — zor duzey

meta:
  id: "b12_sozel_mantik_kesin_sira_numarasi_sorgulama_sinif4_zor"
  ad: "Sözel Mantık ve Muhakeme - Kesin Sıra Numarası Sorgulama Sorusu (Zor)"
  sinif_seviyesi: 4
  aciklama: "Zor duzey — 6 öğe, 5 koşul, en az 3 dolaylı çıkarım, 3+ anlamlı ihtimal, belirsiz konum yoğunluğu: orta-yüksek."
  frequency: "High"

kesin_sira_sorgulama_senaryolari:
  - ad: "gecit_toreni_sirasi"
    aciklama: "Kortej yürüyüşündeki farklı grupların geçiş sırasının numaralandırılması"
    ornek_setup: "Bahar şenliği geçit töreninde bando, akrobatlar, maskotlar, dansçılar ve sporcular 1'den 5'e kadar numaralandırılmış bir sırayla yürüyecektir."

  - ad: "uzay_mekigi_firlatma_sirasi"
    aciklama: "Farklı gezegenlere gidecek araştırma mekiklerinin fırlatma rampasından kalkış sırası"
    ornek_setup: "Uzay üssündeki altı farklı keşif mekiği, art arda 1'den 6'ya kadar belirlenmiş bir sırayla fırlatılacaktır."

  - ad: "teleferik_kabin_sirasi"
    aciklama: "Zirveye doğru arka arkaya hareket eden teleferik kabinlerinin konum numaraları"
    ornek_setup: "Zirveye tırmanan bir teleferik hattında kırmızı, mavi, yeşil, sarı ve beyaz kabinler art arda sıralanmıştır."

  - ad: "ejderha_binicileri_ucus_sirasi"
    aciklama: "Fantastik bir evrende ejderha binicilerinin kanyondan geçiş sırası"
    ornek_setup: "Ejderha binicisi altı çırak, dar bir kanyondan 1'den 6'ya kadar uzanan doğrusal bir kuyruk halinde geçmektedir."

  - ad: "denizalti_dalis_sirasi"
    aciklama: "Okyanus çukuruna inen araştırma denizaltılarının dalış sırası"
    ornek_setup: "Mariana Çukuru'na inen altı farklı araştırma denizaltısı, art arda numaralandırılmış bir dalış sırası izlemektedir."

  - ad: "dagci_tirmanis_hatti"
    aciklama: "Aynı güvenlik ipine bağlı olarak tırmanan dağcıların sırası"
    ornek_setup: "Buzul tırmanışı yapan altı dağcı, aynı emniyet ipine 1'den 6'ya kadar belirli bir sırayla bağlanmıştır."

  - ad: "robot_kopek_devriye_sirasi"
    aciklama: "Fabrika devriyesine çıkan robot köpeklerin tek sıra halindeki dizilimi"
    ornek_setup: "Güvenlik amaçlı kullanılan altı robot köpek, fabrika çevresinde 1. sıradan 6. sıraya kadar tek sıra halinde devriyeye çıkmıştır."

  - ad: "mars_kolonisi_inis_sirasi"
    aciklama: "Mars'a iniş yapan destek kapsüllerinin iniş sırası numaraları"
    ornek_setup: "Mars yörüngesindeki altı farklı kargo kapsülü, gezegen yüzeyine 1. sıradan 6. sıraya kadar art arda iniş yapmıştır."

  - ad: "buyulu_iksir_malzeme_sirasi"
    aciklama: "Bir kazana sırayla atılan malzemelerin eklenme adımları (1. adım, 2. adım vb.)"
    ornek_setup: "Bir büyücü çırağı, iksir kazanına altı farklı malzemeyi 1. sıradan 6. sıraya kadar belirli bir düzenle eklemektedir."

  - ad: "lunapark_hiz_treni_koltuklari"
    aciklama: "Hız trenindeki vagonların veya numaralı koltukların baştan sona sıralanışı"
    ornek_setup: "Bir lunaparktaki hız trenine binen altı arkadaş, önden arkaya doğru 1'den 6'ya kadar numaralanmış koltuklara oturmuştur."

  - ad: "kardan_adam_dizilimi"
    aciklama: "Bahçeye yan yana dizilen kardan adamların soldan sağa konum numaraları"
    ornek_setup: "Çocukların bahçeye yaptığı altı farklı kardan adam, soldan sağa doğru 1'den 6'ya kadar numaralandırılmış bir düzende dizilmiştir."

  - ad: "okculuk_turnuvasi_atis_sirasi"
    aciklama: "Okçuların hedefe atış yapmak için dizildikleri numaralı sıra"
    ornek_setup: "Okçuluk turnuvası finalindeki beş sporcu, hedefe atış yapmak üzere 1'den 5'e kadar numaralanmış atış sırasına girmiştir."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten (yalnızca sıra numarası içeren) oluşan kesin sıra sorgulama sorusu (zor)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, doğrusal bir dizilime yerleştirilen kişilerle/varlıklarla ilgili verilen
      ilişkisel koşulları değerlendirerek, sıranın hangi konumlarının (numaralarının) kesin olarak dolduğunu
      veya hangilerinin kendi içinde yer değiştirme ihtimali taşıdığını mantıksal çıkarımla bulması gerekir.
      Zor düzey: 6 öğe, 5 koşul, en az 3 dolaylı çıkarım, 3+ anlamlı ihtimal.
      Kesin ve belirsiz sıra numaraları ancak tüm alternatif yerleşimler tek tek sınandığında ortaya çıkmalıdır.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Sıralamanın neye ait olduğunu açıklar; dizilimin boyutu (örn: 1'den 6'ya kadar) ve yönü/yapısı tanıtılır"
      - "MADDELİ KOŞULLAR 5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu sıralamayla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3<br>• Koşul 4<br>• Koşul 5"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Zor düzey: sıradaki öğe sayısı 6 olmalıdır"
      - "Zor düzey: en az 3 koşul dolaylı çıkarım veya olasılık denetimi gerektirmelidir"
      - "Zor düzey: belirsiz kalan konumlar birden fazla alternatif tablo üzerinden test edilmeden anlaşılamamalıdır"
      - "Zor düzey: çözüm sabit ve hareketli blokların birlikte değerlendirilmesini gerektirmelidir"
      - "Önce gizli sıralama senaryosu kurulmalı; ardından yalnızca bu olasılık tablosuna götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 5
    style: "sira_numarasi_ikilisi"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre hangi sıra numaralarındaki kişilerin yerleri kesin olarak bilinebilir?</b>"
  - "<b>Bu bilgilere göre aşağıda verilen konumlardan hangilerinde kimin olduğu kesin olarak bellidir?</b>"
  - "<b>Bu bilgilere göre hangi sıra numaralarındaki kişilerin yerleri kesin olarak <u>bilinemez</u>?</b>"
  - "<b>Bu bilgilere göre aşağıda verilen konumlardan hangilerinde kimin olduğu kesin olarak söylenemez (kendi aralarında yer değiştirebilirler)?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli dizilimdeki
    kilitlenmiş (kesin) ve yer değiştirebilir (ihtimalli) konumlar tespit edildikten sonra,
    soru kökünün istediği durumu sağlayan sıra numaralarıdır (Örn: 2. ve 5. sıra).
  kurallar:
    - "Doğru cevap SADECE tüm koşullar ve olasılıklar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Zor düzeyde öğrenci birden fazla alternatif tabloyu dışlamadan kesin/belirsiz konumlara ulaşamamalıdır"
    - "Doğru cevap 2-5 kelime arasında, SADECE konum/sıra numaralarından oluşmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "SİSTEMATİK_TEST_EKSİKLİĞİ"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Tüm alternatif tabloları test etmeden ilk geçerli görünen yerleşime bakarak sıra numarası veren seçenek"
    nasil_olusturulur: |
      3 veya daha fazla ihtimalden yalnızca 1'ini test edip kesinleştirmeyen ama kesinmiş gibi davranan bir seçenek oluştur.
    kategori: "cognitive"

  - ad: "GÜÇLÜ_ALTERNATİF_TUZAĞI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Yanlış ama güçlü görünen alternatif tablo sonucunu doğru sayan seçenek"
    nasil_olusturulur: |
      Yüksek koşul sayısında 4 koşulu karşılayıp yalnızca 1 kritik koşulu ihlal eden alternatif bir tablodan elde edilen sıra numarasını doğruymuş gibi sunan seçenek oluştur.
    kategori: "cognitive"

  - ad: "KESINLEŞEN_KONUM_KAÇIRMA"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Tüm alternatifler test edildiğinde sabit kalan konumu fark edemeyip farklı bir konum belirten seçenek"
    nasil_olusturulur: |
      Her ihtimalde değişen bir konumu sabit sanan ve gerçekte tüm ihtimallerde sabit olan konumu gözden kaçıran bir seçenek sun.
    kategori: "yanlis_cikarim"

use_shared_strategies: false

