# Kaynak: metinde_duygu_sirali_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 4. sinif metinde duygu sirali — kolay duzey

meta:
  id: "b12_metinde_duygu_sirali_sinif4_kolay"
  ad: "Metinde Duygu - Duygu Değişimi (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — kahramanın yaşadığı duyguları sırasıyla belirleme."
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Duygu değişimi içeren paragraf + soru kökü + ikili duygu seçenekleri (kolay)"

  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 75
    background_color: "#e8f8e8"
    sentence_count_min: 4
    sentence_count_max: 5
    stil: "oykuleyici"
    kurallar:
      - "Iki duygu asamasi acik ve kolay ayirt edilir olmali."
      - "Ilk duygu ve ikinci duygu arasindaki gecis belirgin olmali."
      - "Duygular gunluk hayatta kolay ayirt edilen ikililerden secilmeli."
      - "Davranis ve beden dili ipuclari dogrudan olmali."
      - "Metin iki aşamadan oluşmalı; ilk bölümde bir duygu, ikinci bölümde farklı bir duygu hakim olmalı."
      - "Duygu isimleri metinde doğrudan geçmemeli, olaylar ve davranışlar üzerinden sezdirilmeli."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "Dis bilgi gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 8
    style: "variable"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu metnin kahramanı sırasıyla aşağıdaki duygulardan hangilerini yaşamıştır?</b>"
  # KULLANILDI: - "<b>Bu metinde bahsedilen kişinin yaşadığı duygular aşağıdakilerin hangisinde sırasıyla verilmiştir?</b>"
  # KULLANILDI: - "<b>Yukarıdaki metne göre kahramanın yaşadığı duygu değişimi aşağıdakilerin hangisinde doğru sıralanmıştır?</b>"
  # KULLANILDI: - "<b>Bu metindeki kişinin duyguları hangi sırayla değişim göstermiştir?</b>"
  - "<b>Metnin kahramanının baştan sona yaşadığı duygular aşağıdakilerin hangisinde sırasıyla verilmiştir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metnin akışına uygun sıradaki duygu çifti"
  kurallar:
    - "Dogru duygu cifti kolay ayirt edilen bir ikili olmali."
    - "Iki duygu 'tire' ile ayrilmali (Ornek: 'Endişe - Sevinç')."
    - "Siralama metnin kronolojik akisina uygun olmali."
    - "Her iki duygu da metinde acikca sezdirilmis olmali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "KOLAY_AYIRT_EDILEBILIR_CIFT"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Yanlış duygu çiftleri metindeki kronolojik akışla açıkça uyumsuz"
    nasil_olusturulur: |
      Doğru duygu çifti kolayca ayırt edilen bir ikili olmalı.
      Kolay seviyede yanlış seçeneklerdeki duygu sıralaması metindeki kronolojik akışa açıkça aykırı olmalı.
      Öğrenci olay sırasını izleyerek doğru çifti hızlıca bulabilmeli.
    kategori: "semantic"

  - ad: "TERS_SIRA_BELIRGIN"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Duygu sıralaması tersine çevrilmiş belirgin hatalı seçenek"
    nasil_olusturulur: |
      Doğru duygu çiftinin sıralamasını tersine çeviren bir seçenek oluştur.
      Kolay seviyede bu terslik açıkça fark edilebilir olmalı.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
