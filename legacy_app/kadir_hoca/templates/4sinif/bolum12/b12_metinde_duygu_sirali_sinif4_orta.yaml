# Kaynak: metinde_duygu_sirali_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.orta
# 4. sinif metinde duygu sirali — orta duzey

meta:
  id: "b12_metinde_duygu_sirali_sinif4_orta"
  ad: "Metinde Duygu - Duygu Değişimi (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — kahramanın yaşadığı duyguları sırasıyla belirleme."
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Duygu değişimi içeren paragraf + soru kökü + ikili duygu seçenekleri (orta)"

  paragraph:
    required: true
    word_count_min: 76
    word_count_max: 92
    background_color: "#f8f0e0"
    sentence_count_min: 5
    sentence_count_max: 6
    stil: "oykuleyici"
    kurallar:
      - "Iki duygu asamasi net olmali; ancak gecis ilk bakista cok asiri acik olmamali."
      - "Duygular beden dili, dusunce ve olay akisi birlikte kullanilarak sezdirilmeli."
      - "Dogru cevaba ulasmak icin paragrafın tamami dikkate alinmali."
      - "Metin iki aşamadan oluşmalı; ilk bölümde bir duygu, ikinci bölümde farklı bir duygu hakim olmalı."
      - "Duygu isimleri metinde doğrudan geçmemeli, olaylar ve davranışlar üzerinden sezdirilmeli."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "Dis bilgi gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 8
    style: "variable"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu metnin kahramanı sırasıyla aşağıdaki duygulardan hangilerini yaşamıştır?</b>"
  # KULLANILDI: - "<b>Bu metinde bahsedilen kişinin yaşadığı duygular aşağıdakilerin hangisinde sırasıyla verilmiştir?</b>"
  # KULLANILDI: - "<b>Yukarıdaki metne göre kahramanın yaşadığı duygu değişimi aşağıdakilerin hangisinde doğru sıralanmıştır?</b>"
  # KULLANILDI: - "<b>Bu metindeki kişinin duyguları hangi sırayla değişim göstermiştir?</b>"
  - "<b>Metnin kahramanının baştan sona yaşadığı duygular aşağıdakilerin hangisinde sırasıyla verilmiştir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metnin akışına uygun sıradaki duygu çifti"
  kurallar:
    - "Dogru duygu cifti metnin kronolojik akisiyla uyumlu olmali."
    - "Iki duygu 'tire' ile ayrilmali (Ornek: 'Endişe - Sevinç')."
    - "Siralama metnin kronolojik akisina uygun olmali."
    - "Her iki duygu da metinde acikca sezdirilmis olmali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "YAKIN_DUYGUSAL_CIFT"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Doğru duygu çiftine yakın ama kronolojik akışla uyumsuz cift"
    nasil_olusturulur: |
      Doğru duygu çiftine anlamsal olarak yakın ama metnin kronolojik akışıyla uyumsuz bir ikili oluştur.
      Orta seviyede doğru duygu çifti metnin kronolojik akışıyla uyumlu olmalı — öğrenci akışı izlemeli.
    kategori: "semantic"

  - ad: "KISMI_DOGRU_CIFT"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Bir duygusu doğru diğeri yanlış olan kısmi doğru seçenek"
    nasil_olusturulur: |
      Duygu çiftinin yalnızca bir elemanı doğru, diğeri benzer ama farklı duygu içeren bir seçenek oluştur.
      Orta seviyede öğrenci her iki duyguyu da ayrı ayrı doğrulamalıdır.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
