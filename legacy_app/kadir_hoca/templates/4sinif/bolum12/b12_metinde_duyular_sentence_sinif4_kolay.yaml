# Kaynak: metinde_duyular_sentence_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 4. sinif metinde duyular cumle analizi — kolay duzey

meta:
  id: "b12_metinde_duyular_sentence_sinif4_kolay"
  ad: "Metinde Duyular - Cümle Analizi (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — seçeneklerdeki cümlelerde duyu analizi yapma."
  frequency: "Low"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Soru kökü + 4 cümle seçenek (kolay)"

  paragraph:
    required: false
    kurallar:
      - "Hedef duyuyu iceren cumle yapilari sade ve dogrudan olmali."
      - "Celdiriciler kolay elenebilir olmali."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 8
    word_count_max: 14
    background_color: "#e8f8e8"
    style: "complete_sentence"
    correct_count: 1
    correct_type: "does_not_belong"
    kurallar:
      - "Duyular için SADECE basit, bilinen kelimeleri kullan: görme, işitme, dokunma, tatma, koklama"
      - "Hedef duyuyu iceren 3 celdirici cumlede duyu ifadesi cok net ve belirgin olmali."
      - "Hedef duyu ifadeleri çok açık olmalı."
      - "Doğru cevap hedef duyuyu içermemeyi daha belirgin göstermeli."
      - "Çeldiriciler kolay ayırt edilir olmalı."

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Aşağıdaki cümlelerin hangisinde işitme duyusuna dair bir ayrıntıya <u>yer verilmemiştir</u>?</b>"
  # KULLANILDI: - "<b>Aşağıdaki cümlelerin hangisinde görme duyusuna ait bir ifadeye <u>yer verilmemiştir</u>?</b>"
  - "<b>Aşağıdaki cümlelerin hangisinde dokunma duyusuna ilişkin bir ayrıntıya <u>rastlanmaz</u>?</b>"
  - "<b>Aşağıdaki cümlelerin hangisinde koklama duyusunu yansıtan bir ifadeye <u>yer verilmemiştir</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "İstenen duyuyu içermeyen cümle"
  kurallar:
    - "Soru 'yer verilmemistir' diyorsa: dogru cevap istenen duyuyu ICERMEYEN cumle."
    - "Diger 3 cumle istenen duyuyu ICERMELI."
    - "Duyu ifadeleri net ve belirgin olmali."
    - "Cumle tam ve anlamli olmali."

# ═══════════════════════════════════════════════════════════════
# BECERI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB2"
  bilesenler: ["cozumleme"]
  surec_bileseni: "bilgiyi_cikartma"


celdirici_stratejileri:
  - ad: "BELIRGIN_HEDEF_DUYU"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Hedef duyuyu içeren cümleler belirgin — doğru cevap kolay fark edilir"
    nasil_olusturulur: |
      Hedef duyuyu içeren 3 celdirici cümlede duyu ifadesi çok net ve belirgin olmalı.
      Doğru cevap hedef duyuyu içermemeli ve bu yokluk daha kolay fark edilir olmalı.
      Cümle yapıları sade ve doğrudan olmalı.
    kategori: "content"

  - ad: "BASIT_DUYU_EKSIKLIGI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Hedef duyuyu açıkça içermeyen seçeneği kolayca ayırt etme"
    nasil_olusturulur: |
      Doğru cevap (hedef duyuyu içermeyen cümle) diğer seçeneklerden yapısal olarak belirgin şekilde farklı olmalı.
      Kolay seviyede öğrenci hedef duyuyu her cümlede arayıp kolayca bulabilmeli.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
