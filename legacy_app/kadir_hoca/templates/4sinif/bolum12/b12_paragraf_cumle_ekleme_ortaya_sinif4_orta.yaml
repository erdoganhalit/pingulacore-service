# Kaynak: paragraf_cumle_ekleme_ortaya_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.orta
# 4. sinif metne cumle ekleme (ortaya) — orta duzey

meta:
  id: "b12_paragraf_cumle_ekleme_ortaya_sinif4_orta"
  ad: "Metne Cümle Ekleme (Ortaya) (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — paragrafın ORTASINDA boş bırakılan yere hangi tam cümlenin getirileceğini seçme"
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Paragraf (ortasında boşluk) + soru kökü + 4 tam cümle seçenek (orta)"

  paragraph:
    required: true
    background_color: "#fdf6e3"
    word_count_min: 51
    word_count_max: 62
    sentence_count_min: 3
    sentence_count_max: 4
    stil: "bilgilendirici"
    kurallar:
      - |
        ★★★ TEMEL KURAL (KRİTİK!) ★★★
        Bu soru tipinde öğrenciden paragrafın ORTASINDA boş bırakılan yere hangi TAM CÜMLENİN getirileceği sorulur.
        YASAK: Cümleyi yarıda kesip tamamlatmak! Bu bir cümle tamamlama sorusu DEĞİLDİR!
        DOĞRU: Paragrafta bir cümle eksiktir ve o cümlenin tamamı seçeneklerde verilir.
        ★ Paragraf 4 cümlelik bir bütün olarak PLANLANMALI (giriş-gelişme-sonuç akışıyla)
        ★ 2. veya 3. cümleyi çıkar, yerine "----" koy — kalan 3 cümle paragrafta kalır
        ★ Çıkarılan cümle = doğru cevap (seçeneklerde tam cümle olarak verilir)
        ★ Kalan 3 cümle paragrafta kalır ve kendi başına anlaşılır olmalı
        ★ "----" işareti çıkarılan cümlenin yerini gösterir

        ★★★ "----" PARAGRAFIN ORTASINDA OLMALI ★★★
        ★ "----" paragrafın ORTASINDA olmalı — ne başta ne sonda
        ★ "----" kesinlikle paragrafın başında veya sonunda OLMAMALI!

        ★★★ SEÇENEKLERDEKİ CÜMLELER ★★★
        ★ Her seçenek kendi başına TAM ve BAĞIMSIZ bir cümle olmalı
        ★ YASAK: Yarım cümle, cümle parçası veya paragraftaki cümlenin devamı
        ★ Her seçenek büyük harfle başlamalı ve nokta ile bitmeli
      - "Paragraf düz metin olarak yazılmalı — Roma rakamı (I., II., III.) KULLANMA"
      - "Paragrafta bilgi akışı biraz daha yoğun olabilir"
      - "Çıkarılan cümle, konu sürekliliği ve mantıksal geçiş açısından gerekli olmalı"
      - "En az 1 çeldirici konuya ve boşluk çevresine yakın görünmeli"
      - "Doğru cevap için önceki ve sonraki cümle birlikte değerlendirilmeli"
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "Dis bilgi gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 6
    word_count_max: 12
    style: "complete_sentence"
    correct_count: 1
    kurallar:
      - "Her seçenek TAM BİR CÜMLE olmalı — büyük harfle başlar, nokta ile biter"
      - "YASAK: Yarım cümle, kelime grubu veya cümle parçası"
      - "YASAK: Paragraftaki bir cümlenin devamı niteliğinde seçenek"
      - "Her seçenek bağımsız okunduğunda kendi başına anlamlı olmalı"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Metindeki boş bırakılan yere aşağıdaki cümlelerden hangisi getirilmelidir?</b>"
  - "<b>Bu metinde boş bırakılan yere anlam akışına göre aşağıdakilerden hangisi getirilmelidir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Paragraftan çıkarılan ve paragrafın ORTASINA konulması gereken TAM CÜMLE"
  kurallar:
    - "Dogru secenek paragraftaki/metindeki hicbir cumleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "Paragraftaki ifadeler es anlamli sozcuklerle yeniden ifade edilmeli — en az %40 kelime farkliligi olmali"
    - "Paragrafın ana konusuyla tutarlı olmalı"
    - "Paragrafın akışını mantıksal olarak tamamlamalı — önceki ve sonraki cümleyle uyumlu"
    - "Kendi başına TAM ve BAĞIMSIZ bir cümle olmalı — büyük harfle başlar, nokta ile biter"
    - "8-22 kelime olmalı"
    - "Paragraftaki bir cümlenin devamı veya parçası OLMAMALI"

# ═══════════════════════════════════════════════════════════════
# BECERI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB2"
  bilesenler: ["cikarim_yapma", "yapilandirma"]
  surec_bileseni: "metin_yapisini_analiz_etme"


celdirici_stratejileri:
  - ad: "AKIS_SURDURUCU_CÜMLE"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Konuya yakın ama akışı tam sürdürmeyen celdiricilere karşı doğru seçim"
    nasil_olusturulur: |
      Doğru cümle ortaya eklendiğinde hem önceki hem sonraki cümlelerle anlam akışını doğal sürdürmeli.
      En az 1 celdirici konuya yakın görünmeli ama akışı tam sürdürmemeli.
      Orta seviyede öğrenci hem anlam hem akış bağlantısını değerlendirmelidir.
    kategori: "cognitive"

  - ad: "YAKIN_ORTA_UYUMU"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Konuya yakın ama ortaya ekleme işlevini tam karşılamayan celdirici"
    nasil_olusturulur: |
      En az 1 celdirici konuya yakın görünmeli ama ortaya eklendiğinde anlam kopukluğu oluşturmalı.
      Orta seviyede öğrenci konu uyumunun yanı sıra ortaya ekleme akışını da değerlendirmelidir.
    kategori: "semantic"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
