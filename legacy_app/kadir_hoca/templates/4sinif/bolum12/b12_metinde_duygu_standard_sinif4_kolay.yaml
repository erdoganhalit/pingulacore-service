# Kaynak: metinde_duygu_standard_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 4. sinif metinde duygu standart — kolay duzey

meta:
  id: "b12_metinde_duygu_standard_sinif4_kolay"
  ad: "Metinde Duygu - Baskın Duygu (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — metindeki kahramanın içinde bulunduğu duygusal durumu belirleme."
  frequency: "High"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Duygusal içerikli öyküleyici paragraf + soru kökü + duygu seçenekleri (kolay)"

  paragraph:
    required: true
    word_count_min: 40
    word_count_max: 55
    background_color: "#e8f8e8"
    sentence_count_min: 3
    sentence_count_max: 4
    stil: "oykuleyici"
    kurallar:
      - "Duygu ismi metinde doğrudan geçmemeli (Örn: 'Çok üzüldü' yerine 'Gözleri doldu, başını önüne eğdi' denmeli)."
      - "Olay veya durum, belirli bir duyguyu güçlü şekilde hissettirmeli."
      - "Duygu daha belirgin davranış ve olaylarla sezdirilmeli."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 3
    style: "concept"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde bahsedilen kişinin hissettiği duygu aşağıdakilerden hangisidir?</b>"
  - "<b>Bu şiire hâkim olan duygu aşağıdakilerden hangisidir?</b>"
  # KULLANILDI: - "<b>Bu metinde aşağıdaki duygulardan hangisine yer verilmiştir?</b>"
  # KULLANILDI: - "<b>Bu metne göre kahramanın aşağıdaki duygulardan hangisine sahip olması beklenir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metindeki durumu en iyi özetleyen duygu kavramı"
  kurallar:
    - "Dogru secenek paragraftaki/metindeki hicbir cumleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "Duygu ismi metinde dogrudan gecmemeli, davranislardan cikarilmali"
    - "1-3 kelimelik kisa kavram olmali"
    - "Paragraftaki olaylarla birebir ortusmeli"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "ZAYIF_DUYGU_CELDIRICISI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metindeki duygudan belirgin şekilde farklı, kolay elenebilir duygu seçenekleri"
    nasil_olusturulur: |
      Duygu tek baskın eksende ve belirgin ipuçlarıyla sezdirilmeli.
      Kolay seviyede celdiriciler doğru duygoya anlamsal olarak uzak seçilmeli — öğrenci kolayca eleyebilmeli.
      Olay veya davranışlar duyguyu daha doğrudan hissettirmeli.
    kategori: "semantic"

  - ad: "ZITLIK_TUZAGI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Duygunun karşıtı veya anlamsız karşılaştırması olan seçenek"
    nasil_olusturulur: |
      Paragraftaki asıl duygunun zıttı veya bağlamsız bir duygu seçeneği oluştur.
      Kolay seviyede bu seçeneğin metinle uyumsuzluğu açıkça hissedilmeli.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
