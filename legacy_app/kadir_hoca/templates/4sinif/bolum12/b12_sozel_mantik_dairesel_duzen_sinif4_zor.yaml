meta:
  id: "b12_sozel_mantik_dairesel_duzen_sinif4_zor"
  ad: "Sözel Mantık ve Muhakeme - Dairesel Düzen Sorusu (Zor)"
  sinif_seviyesi: 4
  aciklama: "Zor duzey — 7 veya 8 kişi/varlık, 4-5 koşul, en az 3 dolaylı çıkarım, en az 3 (tercihen 4) ilişki türü. Yanlış alternatif düzenler güçlü görünmeli; doğru cevap ancak bütün koşullar birlikte değerlendirilince kesinleşmelidir."
  frequency: "High"

