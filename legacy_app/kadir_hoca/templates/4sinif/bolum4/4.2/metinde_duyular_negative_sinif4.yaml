    konu: "Bahce tasviri"
    paragraf: "Bahçedeki kıpkırmızı güller mis gibi kokuyordu. Kuşların cıvıltısı havayı doldurmuştu. Çimenlerin üzerinde yürürken ayaklarım ıslanmıştı."
    dogru_cevap: "Tatma"
    celdirici_1: "Görme"
    celdirici_2: "İşitme"
    celdirici_3: "Koklama"
    neden: "Gorme (kipkirmizi), isitme (civiltisi), koklama (mis gibi), dokunma (islanmisti) var - tatma yok"

  - sayfa: 104
    konu: "Mutfak tasviri"
    paragraf: "Sıcak çorbanın dumanı yükseliyordu. Kaşığı ağzına götürdüğünde tuzlu lezzeti hissetti. Mutfaktaki çatal bıçak sesleri devam ediyordu."
    dogru_cevap: "Koklama"
    celdirici_1: "Görme"
    celdirici_2: "Tatma"
    celdirici_3: "İşitme"
    neden: "Gorme (duman), tatma (tuzlu), isitme (sesler), dokunma (sicak) var - koklama yok"

  - sayfa: 105
