# ═══════════════════════════════════════════════════════════════
# DOGRULAMA KONTROL LISTESI
# ═══════════════════════════════════════════════════════════════

validation_checklist:
  paragraph:
    - "Kelime sayisi 50-100 arasinda mi?"
    - "En az 3 farkli duyuya ait net ifadeler var mi?"
    - "Her duyu icin en az 1 acik ornek var mi?"
    - "Betimleyici/tasvirci anlatim kullanilmis mi?"
    - "Haric tutulan duyu hicbir sekilde ima edilmemis mi?"

  correct_answer:
    - "1-2 kelimelik duyu adi mi?"
    - "Paragrafta gercekten hic gecmiyor mu?"
    - "Hicbir cumlede ima bile edilmemis mi?"

  distractors:
    - "Her celdirici paragrafta acikca gecen bir duyu mu?"
    - "Her biri 1-2 kelimelik duyu adi mi?"
    - "Paragraftaki duyu ifadeleri net ve belirgin mi?"
    - "Tum secenekler ayni gramer yapida mi? (duyu adi)"
