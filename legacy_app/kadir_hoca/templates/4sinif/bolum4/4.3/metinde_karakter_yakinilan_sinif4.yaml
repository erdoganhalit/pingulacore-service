# Kaynak: 5sinif/capture2/metinde_karakter_yakinilan.yaml — 4. sinif icin adapte edildi (sinif_seviyesi 5->4)
# templates/capture2/metinde_karakter_yakinilan.yaml
# Kaynak: 5. Sinif ARI Paragraf Soru Bankasi - Metinde Karakter
#
# YAKINILAN OZELLIK FORMATI (tum karakter sorularinin ~%25'i)
# Sikayet iceren paragraf verilir, ogrenci kisinin yakinilan olumsuz ozelligini secer
#
# MANTIK: Bir kisi baska birinin huyundan/aliskanligindan sikayet eder
# Secenekler KISA KAVRAM formatindadir (1-3 kelime)

meta:
  id: "metinde_karakter_yakinilan_sinif4"
  ad: "Metinde Karakter (Yakınılan Özellik)"
  sinif_seviyesi: 4
  aciklama: "Kişinin şikayet edilen olumsuz özelliğini bulma"
  kaynak: "data/metinde_karakter.pdf"
  frequency: "Medium (~25% of topic questions)"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Şikayet içeren paragraf + soru kökü + kavram seçenekler"

  paragraph:
    required: true
    word_count_min: 50
    word_count_max: 100
    sentence_count_min: 3
    sentence_count_max: 7
    stil: "oykuleyici"
    kurallar:
      - "Bir kişinin huyundan veya alışkanlığından şikayet edilmeli."
      - "Örn: 'Anahtarını nereye koyduğunu asla hatırlamaz.'"
      - "Şikayet eden kişi ve şikayet edilen kişi açıkça belirgin olmalı."
      - "Olumsuz özellik doğrudan söylenmemeli, davranışlar üzerinden gösterilmeli."
      - "Özellikler: Unutkanlık, Dağınıklık, Tembellik, Sabırsızlık, Bencillik, Cimrilik, İnatçılık vb."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın"
      - "YASAK: 'Duyular insanın çevresini algılamasını sağlar', 'Karakter özellikleri kişinin davranışlarını belirler' gibi ders kitabı açıklamaları"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 3
    style: "concept"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI (PDF'den cikarilan 3 varyasyon)
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu metinde bahsedilen kişinin yakınılan özelliği aşağıdakilerden hangisidir?</b>"
  - "<b>Bu metindeki kişi, İsmail amcanın hangi özelliğinden şikâyet etmektedir?</b>"
  - "<b>Bu metinde bahsedilen kişi hangi kişilik özelliğinden yakınmaktadır?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metinde şikayet edilen olumsuz alışkanlık/özellik"
  kurallar:
    - "Dogru secenek paragraftaki/metindeki hicbir cumleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "Paragraftaki ifadeler es anlamli sozcuklerle yeniden ifade edilmeli — en az %40 kelime farkliligi olmali"
    - "Sikayet edilen ozellik metindeki davranislarla ortusmelidir"
    - "1-3 kelimelik kisa kavram olmali"
    - "Ozellik olumsuz bir aliskanlik veya huy olmali"
    - "Sikayet baglaminda acikca belirlenebilir olmali"
  ornekler:
    - paragraf: "Anahtarını nereye koyduğunu asla hatırlamaz. Telefonunu her gün bir yerde unuturdu."
      dogru: "Unutkanlık"
      neden: "Anahtari ve telefonu surekli kaybetme/unutma davranisi unutkanligi gosterir"
    - paragraf: "Odasına giren herkes şaşkına dönerdi. Her yer kitap, kağıt ve kıyafet yığınıyla doluydu."
      dogru: "Dağınıklık"
      neden: "Odanin dagilmis hali ve esyalarin her yerde olmasi daginikligi gosterir"
    - paragraf: "Sabahları bir türlü kalkamaz, işlerini hep son güne bırakırdı."
      dogru: "Tembellik"
      neden: "Erken kalkamama ve isleri erteleme tembellik gosterir"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════
# Celdiriciler benzer olumsuz ozelliklerdir
# Sikayet edilen ozellikle karistirilabilecek yakin kavramlar secilir

distractors:
  notlar:
    - "Benzer ama yanlış olumsuz özellikler (Örn: Unutkanlık yerine Dağınıklık, Tembellik yerine Kayıtsızlık)"
    - "Metinde izi bulunmayan olumsuz özellikler"
    - "Tüm seçenekler aynı formatta olmalı (1-3 kelimelik olumsuz kavram)"
    - "Celdiriciler makul gorunmeli ama metinle ortusmemeli"

beceri:
  katman: "KB2"
  bilesenler: ["cikarim_yapma"]
  surec_bileseni: "bilgiyi_cikartma"

use_shared_strategies: true

# ═══════════════════════════════════════════════════════════════
# URETIM MANTIGI (Generator icin rehber)
# ═══════════════════════════════════════════════════════════════

generation_logic:
  steps:
    - step: 1
      action: "Select a negative trait to complain about"
      details: |
        Yakinilacak bir olumsuz ozellik sec:
        Unutkanlik, Daginiklik, Tembellik, Sabirsizlik, Bencillik,
        Cimrilik, Inatcilik, Dikkatsizlik, Sorumsuzluk, Kayitsizlik,
        Acelecililik, Patavatsizlik, Gevezelik

    - step: 2
      action: "Generate complaint paragraph (50-100 words)"
      details: |
        Paragrafta:
        - Bir kisi baska birinin huyundan/aliskanligindan sikayet etmeli
        - Sikayet eden ve edilen kisi acikca belirgin olmali
        - Olumsuz ozellik DOGRUDAN SOYLENMEMELI
        - Davranislar, aliskanliklar, olaylar uzerinden gosterilmeli
        - Ornek: Unutkanlik icin "Anahtarini nereye koydugunu asla hatirlamaz"

    - step: 3
      action: "Set correct answer = complained trait"
      details: "Metinde sikayet edilen olumsuz ozellik dogru cevap yapilir"

    - step: 4
      action: "Generate 3 distractors"
      details: |
        3 yanlis olumsuz ozellik olustur:
        - Benzer ama farkli ozellikler (unutkanlik/daginiklik)
        - Metinde izi bulunmayan ozellikler
        - Her biri 1-3 kelimelik kavram

    - step: 5
      action: "Randomize option order"
      details: "A-B-C-D seceneklerini rastgele sirala"

# ═══════════════════════════════════════════════════════════════
# PDF'DEN ORNEK SORULAR (Sayfa 115, 119)
# ═══════════════════════════════════════════════════════════════

ornekler:
  - sayfa: 115
    konu: "Unutkanlik sikayeti"
    paragraf: "İsmail amcanın anahtarını nereye koyduğunu asla hatırlamaz. Dün de cüzdanını markette unutmuş, geri dönmek zorunda kalmış."
    dogru_cevap: "Unutkanlık"
    celdirici_1: "Dağınıklık"
    celdirici_2: "Dikkatsizlik"
    celdirici_3: "Sorumsuzluk"

  - sayfa: 119
    konu: "Daginiklik sikayeti"
    paragraf: "Odasına her girdiğimde aynı manzarayla karşılaşıyorum. Kitaplar yerde, kıyafetler sandalyenin üzerinde, masası görünmez hâlde."
    dogru_cevap: "Dağınıklık"
    celdirici_1: "Tembellik"
    celdirici_2: "Unutkanlık"
    celdirici_3: "Sorumsuzluk"

  - sayfa: 119
    konu: "Tembellik sikayeti"
    paragraf: "Sabahları onu yataktan kaldırmak için savaş vermek gerekiyor. İşlerini hep yarına bırakır, 'Sonra yaparım' sözü ağzından düşmez."
    dogru_cevap: "Tembellik"
    celdirici_1: "Kayıtsızlık"
    celdirici_2: "Sabırsızlık"
    celdirici_3: "Sorumsuzluk"

# ═══════════════════════════════════════════════════════════════
# DOGRULAMA KONTROL LISTESI
# ═══════════════════════════════════════════════════════════════

validation_checklist:
  paragraph:
    - "Kelime sayisi 50-100 arasinda mi?"
    - "Cumle sayisi 3-7 arasinda mi?"
    - "Oykuleyici bir uslupla mi yazilmis?"
    - "Bir kisinin huyundan/aliskanligindan sikayet ediliyor mu?"
    - "Sikayet eden ve edilen kisi belirgin mi?"
    - "Olumsuz ozellik dogrudan soylenmemis mi?"
    - "Davranislar uzerinden gosterilmis mi?"

  correct_answer:
    - "1-3 kelime kavram adi mi?"
    - "Metinde sikayet edilen ozellikle ortusuyur mu?"
    - "Olumsuz bir aliskanlik/huy mu?"

  distractors:
    - "Her celdirici farkli bir olumsuz ozellik mi?"
    - "Celdiriciler 1-3 kelime kavram adi mi?"
    - "Hicbiri metindeki sikayet edilen ozellikle ortusmuyur mu?"
    - "Benzer ozellik stratejisi kullanilmis mi?"
    - "Tum secenekler ayni gramer yapida mi? (olumsuz kavram)"
