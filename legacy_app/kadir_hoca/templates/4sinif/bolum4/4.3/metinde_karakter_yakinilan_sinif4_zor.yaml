# Kaynak: metinde_karakter_yakinilan_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.zor
# 4. sinif metinde karakter yakinilan — zor duzey

meta:
  id: "metinde_karakter_yakinilan_sinif4_zor"
  ad: "Metinde Karakter - Yakınılan Özellik (Zor)"
  sinif_seviyesi: 4
  aciklama: "Zor duzey — kişinin şikayet edilen olumsuz özelliğini bulma."
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Şikayet içeren paragraf + soru kökü + kavram seçenekler (zor)"

  paragraph:
    required: true
    word_count_min: 75
    word_count_max: 100
    background_color: "#fce8e8"
    sentence_count_min: 5
    sentence_count_max: 7
    stil: "oykuleyici"
    kurallar:
      - "Bir kişinin huyundan veya alışkanlığından şikayet edilmeli."
      - "Şikayet eden kişi ve şikayet edilen kişi açıkça belirgin olmalı."
      - "Olumsuz özellik doğrudan söylenmemeli, daha ince davranış ipuçlarıyla sezdirilmeli."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 3
    style: "concept"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde bahsedilen kişinin yakınılan özelliği aşağıdakilerden hangisidir?</b>"
  - "<b>Bu metinde bahsedilen kişi hangi kişilik özelliğinden yakınmaktadır?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metinde şikayet edilen olumsuz alışkanlık/özellik"
  kurallar:
    - "Sikayet edilen ozellik metindeki davranislarla ortusmelidir."
    - "1-3 kelimelik kisa kavram olmali."
    - "Ozellik olumsuz bir aliskanlik veya huy olmali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "COK_YAKIN_DURUM_GRUPLARI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Doğru cevaba çok yakın, en az 2 celdirici makul görünen seçenekler"
    nasil_olusturulur: |
      En az 2 celdirici gerçek yakınılan duruma anlamsal olarak yakın görünmeli.
      Zor seviyede doğru cevap yüzeysel kelime taramasıyla değil, paragrafın tamamının duygusal tonu değerlendirilerek bulunmalıdır.
    kategori: "semantic"

  - ad: "DOLAYLI_YAKINLANMA"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Paragraftaki ipuçlardan dolaylı ama yanlış çıkarılan yakınılan durum"
    nasil_olusturulur: |
      Paragraftaki ipuçlardan dolaylı yolla ulaşılabilecek ama gerçekte yanlış olan bir yakınılan durum oluştur.
      Zor seviyede bu seçenek paragrafla güçlü semantik bağ kurmalı.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
