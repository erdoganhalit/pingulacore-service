name: Backend/Frontend CI + GHCR Publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run backend tests
        working-directory: backend
        env:
          AI_USE_STUB: "1"
          DATABASE_URL: sqlite:///./test_runs/ci_test.db
        run: uv run pytest -q tests/test_agents.py tests/test_usage.py tests/test_legacy_session_output_store.py tests/test_auth_smoke.py

      - name: Migration discipline check (model change without revision => fail)
        working-directory: backend
        env:
          AI_USE_STUB: "1"
          DATABASE_URL: sqlite:///./test_runs/ci_migration_check.db
        run: |
          uv run alembic upgrade head
          uv run alembic check

  docker:
    needs: backend-guardrails
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare tags
        id: prep
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="${GITHUB_SHA::12}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/pingulacore-backend:${{ steps.prep.outputs.sha_tag }}
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/pingulacore-backend:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/pingulacore-frontend:${{ steps.prep.outputs.sha_tag }}
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/pingulacore-frontend:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Backend image smoke test (entrypoint migration + app health)
        env:
          BACKEND_IMAGE: ghcr.io/${{ steps.prep.outputs.owner_lc }}/pingulacore-backend:${{ steps.prep.outputs.sha_tag }}
        run: |
          docker pull "$BACKEND_IMAGE"
          docker run -d --rm \
            --name pingulacore-backend-smoke \
            -e AI_USE_STUB=1 \
            -e DATABASE_URL=sqlite:////tmp/pingula_smoke.db \
            -p 18000:8000 \
            "$BACKEND_IMAGE"

          cleanup() {
            docker logs pingulacore-backend-smoke --tail 200 || true
            docker stop pingulacore-backend-smoke || true
          }
          trap cleanup EXIT

          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18000/docs" > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Backend smoke check failed: /docs not ready in time." >&2
          exit 1

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Prepare tags
        id: prep
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="${GITHUB_SHA::12}"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PULL_USERNAME: ${{ vars.GHCR_PULL_USERNAME || secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}

          BACKEND_IMAGE: ghcr.io/${{ steps.prep.outputs.owner_lc }}/pingulacore-backend:${{ steps.prep.outputs.sha_tag }}
          FRONTEND_IMAGE: ghcr.io/${{ steps.prep.outputs.owner_lc }}/pingulacore-frontend:${{ steps.prep.outputs.sha_tag }}

          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          S3_BUCKET_CATALOG: ${{ vars.S3_BUCKET_CATALOG }}
          S3_BUCKET_GENERATED: ${{ vars.S3_BUCKET_GENERATED }}
          S3_BUCKET_RENDERED: ${{ vars.S3_BUCKET_RENDERED }}
          S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL }}

          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT }}
          envs: GHCR_PULL_USERNAME,GHCR_PULL_TOKEN,BACKEND_IMAGE,FRONTEND_IMAGE,BACKEND_PORT,FRONTEND_PORT,S3_BUCKET_CATALOG,S3_BUCKET_GENERATED,S3_BUCKET_RENDERED,S3_ENDPOINT_URL,DATABASE_URL,S3_ACCESS_KEY,S3_SECRET_KEY,GOOGLE_API_KEY,ANTHROPIC_API_KEY
          script: |
            set -euo pipefail
            cd /opt/pingulacore-deploy

            mkdir -p secrets
            chmod 700 secrets

            printf '%s' "$DATABASE_URL" > secrets/database_url
            printf '%s' "$S3_ENDPOINT_URL" > secrets/s3_endpoint_url
            printf '%s' "$S3_ACCESS_KEY" > secrets/s3_access_key
            printf '%s' "$S3_SECRET_KEY" > secrets/s3_secret_key
            printf '%s' "$GOOGLE_API_KEY" > secrets/google_api_key
            printf '%s' "$ANTHROPIC_API_KEY" > secrets/anthropic_api_key
            chmod 600 secrets/*

            cat > app.env <<EOF
            BACKEND_IMAGE=$BACKEND_IMAGE
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            BACKEND_PORT=$BACKEND_PORT
            FRONTEND_PORT=$FRONTEND_PORT
            S3_BUCKET_CATALOG=$S3_BUCKET_CATALOG
            S3_BUCKET_GENERATED=$S3_BUCKET_GENERATED
            S3_BUCKET_RENDERED=$S3_BUCKET_RENDERED
            AI_USE_STUB=0
            EOF
            chmod 600 app.env

            echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
            docker compose --env-file app.env -f app-compose.yml pull
            docker compose --env-file app.env -f app-compose.yml up -d
