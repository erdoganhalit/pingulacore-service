version: 1
aciklama: |
  Türk Lirası banknot ve madeni para referans görselleri kataloğu.
  real_currency: true olan YAML'larda LLM-1 chosen_denominations alanını
  bu dosyadaki id listesinden seçer; pipeline eşleşen PNG dosyalarını
  Gemini image modeline multimodal input olarak gönderir.

