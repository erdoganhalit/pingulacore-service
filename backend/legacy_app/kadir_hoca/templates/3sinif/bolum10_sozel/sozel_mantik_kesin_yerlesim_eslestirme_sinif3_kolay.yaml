# Kaynak: sozel_mantik_kesin_yerlesim_eslestirme_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 3. sinif sözel mantık kesin yerleşim ve eşleştirme sorgulama sorusu — kolay duzey

meta:
  id: "sozel_mantik_kesin_yerlesim_eslestirme_sinif3_kolay"
  ad: "Sözel Mantık ve Muhakeme - Kesin Yerleşim ve Eşleştirme Sorgulama (Kolay)"
  sinif_seviyesi: 3
  aciklama: "Kolay duzey — 4-5 kişi, 3 yer/kategori, 3 koşul, en fazla 1 dolaylı çıkarım, en fazla 1 güçlü kısıt, en fazla 1 çapraz dışlama."
  frequency: "High"

kesin_yerlesim_senaryolari:
  - ad: "ofis_kat_paylasimi"
    aciklama: "Bir şirketin farklı birimlerinde çalışanların 1., 2. ve 3. katlara dağılımı"
    ornek_setup: "Bir tekstil firmasında çalışan altı arkadaş; Giriş, 1. Kat veya 2. Kat ofislerinden birinde çalışmaktadır."

  - ad: "spor_salonu_alanlari"
    aciklama: "Sporcuların antrenman için salonun farklı bölümlerine (Kardiyo, Ağırlık, Esneme) dağılması"
    ornek_setup: "Spor salonuna giden yedi arkadaş; Kardiyo, Ağırlık veya Esneme alanlarından yalnızca birinde çalışmaktadır."

  - ad: "mutfak_atolyesi_istasyonlari"
    aciklama: "Yemek kursuna katılanların hazırlık yaptıkları farklı tezgahlar (Hamur, Pişirme, Sunum)"
    ornek_setup: "Yemek kursundaki beş öğrenci; Hamur İşleri, Sos Hazırlama veya Pişirme istasyonlarından birinde görev almıştır."

  - ad: "otopark_blok_duzeni"
    aciklama: "Komşuların araçlarını sitenin farklı otopark bloklarına park etmesi"
    ornek_setup: "Aynı sitede oturan altı komşu; araçlarını A, B veya C otopark bloklarından yalnızca birine park etmiştir."

  - ad: "kutuphane_okuma_bolumleri"
    aciklama: "Öğrencilerin kütüphanenin farklı çalışma alanlarına (Sessiz Salon, Grup Odası, Teras) dağılması"
    ornek_setup: "Sınava hazırlanan yedi öğrenci; kütüphanedeki Sessiz Salon, Grup Odası veya Teras bölümlerinden birinde ders çalışmaktadır."

  - ad: "hastane_poliklinik_katlari"
    aciklama: "Doktorların gün içindeki farklı poliklinik binalarına veya katlarına atanması"
    ornek_setup: "Bir hastanede görevli beş doktor; Dahiliye, Göz veya Kulak-Burun-Boğaz polikliniklerinden birinde muayene yapmaktadır."

  - ad: "avm_magaza_katlari"
    aciklama: "Alışverişe çıkan arkadaşların farklı katlardaki mağazalara dağılması"
    ornek_setup: "Hafta sonu alışverişe çıkan altı arkadaş; Teknoloji, Giyim veya Kitap katlarından birinde vakit geçirmektedir."

  - ad: "yaz_tati_kamp_alanlari"
    aciklama: "Tatilcilerin kamp alanındaki farklı bölgelere (Orman içi, Göl kenarı, Açık alan) çadır kurması"
    ornek_setup: "Kampa giden yedi arkadaş; çadırlarını Orman içi, Göl kenarı veya Açık alan bölgelerinden yalnızca birine kurmuştur."

  - ad: "tiyatro_loca_numaralari"
    aciklama: "Seyircilerin tiyatro salonundaki farklı locadan/sıradan oyun izlemesi"
    ornek_setup: "Tiyatroya giden beş arkadaş; 1, 2 veya 3 numaralı localardan birine oturarak oyunu izlemiştir."

  - ad: "apartman_daire_katlari"
    aciklama: "Yeni taşınan arkadaş grubunun apartmandaki farklı katlara yerleşmesi"
    ornek_setup: "Aynı apartmandan daire kiralayan altı arkadaş; 1., 2. veya 3. katlardaki dairelerden yalnızca birine yerleşmiştir."

  - ad: "hobi_bahcesi_parselleri"
    aciklama: "Emeklilerin hobi bahçesindeki farklı numaralı parsellerde çalışması"
    ornek_setup: "Hobi bahçesinde vakit geçiren beş arkadaş; A, B veya C parsellerinden yalnızca birinde sebze yetiştirmektedir."

  - ad: "okul_kulup_odalari"
    ornek_setup: "Okulun sosyal kulüplerindeki altı öğrenci; Drama, Müzik veya Satranç odalarından birinde toplantı yapmaktadır."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 yargı cümlesi seçeneğinden oluşan kesinlik sorgulama sorusu (kolay)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 95
    background_color: "#e8f8e8"
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişilerin sınırlı sayıdaki yerlere/kategorilere dağıtıldığı kurgularda;
      kapasite kısıtları, aynı/farklı yerde olma ve tek başına bulunma durumlarını analiz ederek
      gizli dağılım tablosunu kurması gerekir. Seçenekler yargı cümlelerinden oluşur.
      Kolay düzey: 4-5 kişi, 3 yer/kategori, 3 koşul, en fazla 1 dolaylı çıkarım, en fazla 1 güçlü kısıt, en fazla 1 çapraz dışlama.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Dağılımın bağlamını açıklar; kaç kişi olduğu, hangi yerlerin/kategorilerin bulunduğu ve genel kapasite yapısı tanıtılır"
      - "Kurgu kişi-yer ve kapasite merkezli olmalıdır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu dağılımla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Kolay düzey: kişi sayısı 4-5, yer sayısı 3 ile sınırlandırılmalıdır"
      - "Kolay düzey: dolaylı çıkarım gerektiren koşul sayısı en fazla 1 olmalıdır"
      - "Kolay düzey: en fazla 1 güçlü kısıt (tek başına olma veya kapasite sınırı) kullanılmalıdır"
      - "Kolay düzey: çapraz dışlama sayısı en fazla 1 olmalıdır"
      - "Önce gizli doğru dağılım tablosu kurulmalı; ardından bu tabloya götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 3
    word_count_max: 8
    style: "yargi_cumlesi"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle doğrudur?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi doğrudur?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle yanlıştır?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi yanlıştır?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar, kapasite sınırları ve kısıtlar
    değerlendirilip gizli yerleşim tablosu kurulduktan sonra, doğruluğu veya
    yanlışlığı mantıksal olarak KESİN olan yargı cümlesidir.
  kurallar:
    - "Doğru cevap SADECE tüm koşullar ve yer kapasiteleri birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap 3-8 kelime arasında, tam bir yargı cümlesi olmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "TEK_ADIM_YERLEŞTIRME_HATASI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Az koşullu yerleşimde 1 koşulu atlayarak yanlış tablo kuran seçenek"
    nasil_olusturulur: |
      3 koşuldan birini görmezden gelen, diğer ikisini doğru uygulayan ama 1 kişiyi yanlış yere yerleştiren bir tablo dağılımı sun.
    kategori: "cognitive"

  - ad: "ÇAPRAZ_DIŞLAMA_ATLATMA"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "En fazla 1 çapraz dışlama koşulunu uygulamamış gibi davranan seçenek"
    nasil_olusturulur: |
      Bir kişi belirli bir yerde bulunamaz koşulunu görmezden gelen ve o kişiyi yasak yerine yerleştiren ama diğer koşulları sağlayan bir tablo oluştur.
    kategori: "semantic"

  - ad: "KAPASİTE_KISIT_UNUTMA"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "En fazla 1 güçlü kapasite/kontenjan kısıtını yok sayan yerleşim"
    nasil_olusturulur: |
      Bir yere yalnızca 1 kişi gelebilir koşuluna 2 kişi yerleştiren ama diğer koşulları karşılayan bir tablo dağılımı sun.
    kategori: "semantic"

use_shared_strategies: false

