# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan çok eksenli eşleştirme sorusu (kolay)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 95
    background_color: "#e8f8e8"
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişi/nesne/birimleri birden fazla kategori ekseni üzerinde
      verilen ilişkisel koşulları birlikte değerlendirerek gizli eşleştirme
      tablosunu kurması gerekir. Kolay düzeyde değişken sayısı düşük tutulmuştur:
      4 öğe, 2 eksen, 3 koşul, en fazla 1 dolaylı çıkarım, en fazla 1 güçlü çapraz ilişki.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kimlerin/nelerin eşleştirileceğini, hangi kategori eksenlerinin bulunduğunu ve genel çerçeveyi tanıtır"
      - "Kurgu kişi-merkezli, nesne-merkezli veya birim-merkezli olabilir; ancak yapı birden fazla kategori ekseni içermelidir"
      - "Her öğe için her eksenden yalnızca bir değer geçerli olmalıdır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu eşleştirmeyle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Kolay düzey: 4 kişi/nesne/birim ve 2 kategori ekseni kullanılmalıdır"
      - "Kolay düzey: en fazla 1 koşul dolaylı çıkarım gerektirmelidir"
      - "Kolay düzey: en fazla 1 güçlü çapraz ilişki bulunmalıdır"
      - "Önce gizli doğru eşleştirme tablosu kurulmalı; ardından yalnızca bu tabloya götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar birden fazla tabloya izin vermemelidir"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 3
    word_count_max: 22
    style: "complete_sentence"
    correct_count: 1

