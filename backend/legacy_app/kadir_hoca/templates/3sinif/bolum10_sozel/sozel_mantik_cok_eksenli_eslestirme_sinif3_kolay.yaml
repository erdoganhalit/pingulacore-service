# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    eşleştirme tablosu kurulduktan sonra mantıksal olarak kesin biçimde
    belirlenebilen çıkarım önermesidir.
  mantik: "Gizli eşleştirme tablosu kurulmadan doğru cevap belirlenememelidir."
  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Kolay düzeyde çözüm yolu kısa olmalıdır; öğrenci tek bir ana ara tablo kurarak sonuca ulaşabilmelidir"
    - "Doğru cevap 3-22 kelime arasında olmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "TEK_EKSEN_YORUMU"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "2 kategori ekseninden yalnızca birini dikkate alarak oluşturulan yanlış tablo"
    nasil_olusturulur: |
      2 eksenli tabloda yalnızca 1 ekseni doğru dolduran, diğer ekseni keyfi tamamlayan ama birinci eksen doğru göründüğünden cazip görünen bir seçenek sun.
    kategori: "cognitive"

  - ad: "DOLAYLIÇIKARIM_ATLAMA"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "En fazla 1 dolaylı çıkarım gerektiren kolay düzeyde bu adımı atlayan tablo"
    nasil_olusturulur: |
      3 koşulun hepsini doğrudan uygulayan ama 1 dolaylı çıkarımı atlayan; bu yüzden 1 öğenin kategorisini yanlış veren bir tablo oluştur.
    kategori: "cognitive"

  - ad: "ÇAPRAZ_ILISKI_KARMAŞASI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Tek bir güçlü çapraz ilişkiyi yanlış yönde uygulayan seçenek"
    nasil_olusturulur: |
      Bir öğenin iki eksendeki birlikte sınırını ters uygulayan (örn. her ikisini de 1. kategoriye atayan) ama geri kalan tablonun tutarlı göründüğü bir seçenek sun.
    kategori: "semantic"

use_shared_strategies: false

