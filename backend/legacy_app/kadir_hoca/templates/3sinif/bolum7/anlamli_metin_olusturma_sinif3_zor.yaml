      - "cok sahneli karmasik kolaj"
      - "cevabi dogrudan acik eden sirali cizgi roman yapisi"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir (anlamli_metin_olusturma varyanti)"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 10
    style: "number_sequence"
    correct_count: 1
    correct_type: "matches"
    kurallar:
