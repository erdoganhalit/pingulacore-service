      - "Cumleler karisik sirada verilmelidir."
      - "Tum cumleler bir araya geldiginde tek bir anlamli metin olusturmalidir."
      - "Olay sirasi sorularinda cumleler acik bir zaman veya olus sirasi icermelidir."
      - "Anlamli metin olusturma sorularinda cumleler konu butunlugu, kisi-zamir iliskisi, neden-sonuc ve anlatim akisi bakimindan birbirine baglanmalidir."
      - "Cumleler dis bilgi gerektirmemelidir."
      - "Dogru siralama yalniz tum cumleler birlikte dusunulerek bulunabilmelidir."
      - "Tamamen serbest, soyut ve tartismaci paragraf yapisi kullanilmamalidir."
      - "Metin, kisa ve tamamlanmis bir butun olusturmalidir."
      - "Cumleler (1), (2), (3), (4) (ve gerekirse (5)) seklinde parantezli rakamlarla numaralandirilmalidir."
      - "Cumleler ayni paragraf icinde YANYANA akici bicimde yazilmalidir; her cumle parantezli numarasiyla baslar (ornek: (1) Ali okula gitti. (2) Okulda arkadasini gordu. (3) ...). Cumleler arasinda <br> KULLANILMAZ, sadece normal bosluk birakilir. Cumleler alt alta degil, tek paragrafta arka arkaya yazilir."
      - "Cumleler arasinda birden fazla anlam bagi bulunabilir."
      - "Dogru siralama icin zamir, zaman ve olay akisi birlikte dusunulmelidir."
      - "Zor duzeyde bile metin kisa ve somut kalmalidir."
      - "Tamamen serbest yorum gerektiren yapi kurulamaz."
      - "Ilk cumle dogal bir baslangic niteliği tasimalidir."
      - "Son cumle metni dogal bicimde bitirmelidir."
      - "Ortadaki cumleler birbirini aciklayan, surduren veya olay sirasini ilerleten yapida olmalidir."
      - "Dogru siralamada zamir, baglac, zaman ve neden-sonuc iliskileri dogal akmalidir."
      - "Yanlis siralamalarda en az bir anlam bozuklugu, akis kirilması veya olay sirasi sorunu olusmalidir."
