      - "Gorsel cumlelerin ortak konusunu desteklemelidir."
      - "Gorsel sus olmamali, baglami anlamayi kolaylastirmalidir."
      - "Gorsel tek basina dogru siralamayi vermemelidir."
      - "Gorsel ve cumleler birlikte degerlendirildiginde dogru siralama daha anlasilir hale gelebilir."
      - "Gorsel dikkat dagitici gereksiz ayrintilar icermemelidir."
    yasaklar:
