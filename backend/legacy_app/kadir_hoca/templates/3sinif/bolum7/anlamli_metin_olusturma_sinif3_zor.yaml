      - "Hicbir secenekte numara eksikligi veya tekrar olmamalidir."
      - "Dogru secenek cumleleri anlamli ve dogal siraya koymalidir."
      - "Yanlis secenekler ilk bakista makul gorunebilir; ancak akis veya olay sirasi bakimindan sorunlu olmalidir."
      - "Birden fazla makul dogru secenek olusmamalidir."
      - "3 yanlis secenegin en az 2'si metne yakin gorunmelidir."
      - "Yanlis seceneklerden biri yalniz iki orta cumleyi yanlis yerlestirebilir."
      - "Yanlis seceneklerden biri baslangic veya sonuc islevini bozar."
      - "Yanlis seceneklerden biri olay sirasini ters kurar."

soru_kokleri:
  # KULLANILDI: - "<b>Numaralanmis cumlelerle anlamli bir metin olusturuldugunda siralama asagidakilerden hangisi olur?</b>"
  - "<b>Numaralanmis cumlelerle anlamli bir paragraf olusturulursa dogru siralama hangisi olur?</b>"
  # KULLANILDI: - "<b>Bu cumleler anlamli bir metin olusturacak sekilde nasil siralanmalidir?</b>"
  # KULLANILDI: - "<b>Numaralanmis cumleler anlam butunlugune gore dizildiginde dogru siralama hangisidir?</b>"
  - "<b>Asagidaki cumlelerle anlamli bir metin olusturmak icin dogru siralama hangisidir?</b>"

dogru_cevap:
  tanim: "Numaralanmis cumeleri dogal, anlamli ve akici bicimde bir araya getiren tek dogru siralama"
  kurallar:
    - "Dogru cevap tum cumeleri anlamli bir butun haline getirmelidir."
    - "Dogru cevapta olay sirasi bozulmamalidir."
    - "Dogru cevapta zamir, baglac, neden-sonuc ve zaman iliskileri dogal akmalidir."
    - "Ilk cumle baslangic, son cumle bitis islevi tasimalidir."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru cevap 3. sinif ogrencisinin dikkatli okuyarak bulabilecegi aciklikta olmalidir."

celdirici_stratejileri:
  - ad: "ILK_CUMLEYI_YANLIS_SECMEK"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metnin dogal baslangici olmayan bir cumleyi basa getiren siralama"
    nasil_olusturulur: |
      Ortadaki ya da sondaki cumleyi basa koyan bir siralama olustur.
    kategori: "cognitive"

  - ad: "SON_CUMLEYI_YANLIS_SECMEK"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metni dogal bicimde bitirmeyen bir cumleyi sona koyan siralama"
    nasil_olusturulur: |
      Bastaki veya ortadaki cumleyi sona koyan bir siralama olustur.
    kategori: "cognitive"

  - ad: "ORTA_BLOK_KARISIKLIGI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Baslangic ve bitis dogru gorunse de ortadaki cumleleri yanlis dizen secenek"
    nasil_olusturulur: |
      Ilk ve son cumleleri dogru birak, ortadaki cumleleri karistir.
    kategori: "cognitive"

  - ad: "OLAY_SIRASI_BOZMA"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Once olani sona, sonra olani basa tasiyan siralama"
    nasil_olusturulur: |
      Olay sirasini tersine ceviren bir siralama olustur.
    kategori: "semantic"

  - ad: "NEDEN_SONUC_TERSLIGI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Sonuc cumlesini neden cumlesinden once getiren siralama"
    nasil_olusturulur: |
      Sonuc cumlesini neden cumlesinden once yerlestiren bir siralama olustur.
    kategori: "semantic"

  - ad: "ZAMIR_VE_BAGLAM_KOPUKLUGU"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Kimin veya neyin anlatildigi anlasilmadan ilgili cumleyi one ceken siralama"
    nasil_olusturulur: |
      Zamirin kime/neye baglandigi belirsizlesen bir siralama olustur.
    kategori: "cognitive"

use_shared_strategies: false

