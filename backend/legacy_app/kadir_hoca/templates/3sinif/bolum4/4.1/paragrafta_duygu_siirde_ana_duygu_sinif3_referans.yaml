meta:
  id: "paragrafta_duygu_siirde_ana_duygu_sinif3_standart_gorselli_dort_secenekli"
  ad: "Paragrafta Duygu – Şiirde Ana Duygu"
  sinif_seviyesi: 3
  ders: "Türkçe"
  bolum: "3. Sınıf Türkçe Paragraf Kitabı"
  alt_bolum: "4.1 Paragrafta Duygu – Şiirde Ana Duygu"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    3. sınıf öğrencisi için bir metinde işlenen duyguyu veya bir şiirde ana duyguyu
    buldurmaya yönelik, görsel destekli ve 4 seçenekli standart soru üretim şablonu.
  kullanim_notu: >
    Bu şablon, harici olarak kullanılan 3. Sınıf TYMM Ortak Kuralları YAML'ı,
    3. sınıf öğretim programı ve 3. sınıf MEB Türkçe kitapları ile birlikte
    doğrulanmalıdır.

format:
  type: "llm_generated_html"
  description: "Görsel + metin veya şiir + soru kökü + 4 duygu seçeneği"

  question_variant:
    allowed:
      - "metinde_islenen_duygu"
      - "metne_hakim_duygu"
      - "siirde_ana_duygu"
    default: "metinde_islenen_duygu"

  text:
    required: true
    text_variant_allowed:
      - "metin"
      - "siir"

    metin:
      sentence_count_min: 4
      sentence_count_max: 6
      word_count_min: 40
      word_count_max: 82
      kurallar:
        - "Metin 3. sınıf öğrencisinin anlayabileceği kadar açık, sade ve akıcı olmalıdır."
        - "Metinde baskın bir duygu açık biçimde hissedilmelidir."
        - "Duygu, olaylar, durumlar, ifadeler veya anlatım tonu ile desteklenmelidir."
        - "Birden fazla duygu bulunabilir; ancak biri açık biçimde baskın olmalıdır."
        - "Metin 4. sınıfa kayan derin psikolojik çözümleme gerektirmemelidir."
        - "Duygu metnin tamamı düşünülerek bulunabilmelidir."
        - "Duygu, yalnız tek kelimelik ipucuyla değil, bütün anlatımla desteklenmelidir."

    siir:
      line_count_min: 4
      line_count_max: 8
      word_count_min: 18
      word_count_max: 50
      kurallar:
        - "Şiir açık dize düzeninde verilmelidir."
        - "Şiirde baskın bir ana duygu bulunmalıdır."
        - "Şiirin dili 3. sınıf düzeyine uygun olmalıdır."
        - "Şiirde ağır sembolizm ve çok kapalı imgeler kullanılmamalıdır."
        - "Ana duygu, şiirin genel havasından ve dizelerden çıkarılabilmelidir."
        - "Şiirde tema ile ana duygu karıştırılmamalıdır."

  visual:
    required: true
    description: "Metin ya da şiirin ana içeriğini ve baskın duygusunu destekleyen işlevsel görsel"
    placement: "text_right_or_top"
    visual_type_allowed:
      - "tek sahneli illüstrasyon"
      - "tek sahneli fotoğraf benzeri çizim"
      - "tek olay veya tek varlık odaklı sahne"
      - "şiirin duygu alanını destekleyen sade görsel"
    kurallar:
      - "Her soru için görsel zorunludur."
      - "Görsel metnin veya şiirin içeriğiyle açık uyumlu olmalıdır."
      - "Görsel süs olmamalı, çözümde etkili destek sunmalıdır."
      - "Görsel tek başına doğru cevabı açıkça vermemelidir."
      - "Görsel ile metin/şiir birlikte değerlendirildiğinde baskın duygu daha netleşmelidir."
      - "Görsel dikkat dağıtıcı gereksiz ayrıntılar içermemelidir."
      - "Görsel yanlış seçeneği açıkça işaret edecek kadar yanıltıcı olmamalıdır."
    yasaklar:
      - "dekoratif ve metinden bağımsız görsel"
      - "çok sahneli karmaşık kolaj"
      - "grafik, tablo veya infografik yoğunluğu taşıyan tasarım"
      - "duyguyu aşırı doğrudan yazıyla etiketleyen görsel"

  stem:
    required: true
    selection: "random_from_list_by_variant"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    correct_count: 1
    style: "emotion_label"
    word_count_min: 1
    word_count_max: 3
    kurallar:
      - "3. sınıfta her soru 4 seçenekli olmalıdır."
      - "Seçenekler duygu adı biçiminde olmalıdır."
      - "Seçenekler kısa, sade ve 3. sınıf düzeyinde olmalıdır."
      - "Doğru seçenek metindeki veya şiirdeki baskın duyguyu karşılamalıdır."
      - "Yanlış seçenekler metne/şiire yakın görünebilir; ancak dikkatli okuyunca elenebilmelidir."
      - "Birden fazla makul doğru seçenek oluşmamalıdır."

