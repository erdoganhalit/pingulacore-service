  kurallar:
    - "Doğru cevap metnin veya şiirin tamamında baskın biçimde hissedilen duygu olmalıdır."
    - "Doğru cevap tek bir sözcük ya da ayrıntıya değil, bütün anlatıma dayanmalıdır."
    - "Doğru cevap duygu ile konu arasındaki farkı korumalıdır."
    - "Şiirde ana duygu, şiirin temasıyla karıştırılmamalıdır."
    - "Doğru cevap dış bilgi gerektirmemelidir."
    - "Doğru cevap 3. sınıf öğrencisinin dikkatli okuyarak bulabileceği açıklıkta olmalıdır."

yanlis_secenek_stratejileri:
  count_per_question: 3
  strategy_pool:
    - id: "yakın_duygu"
      tanim: "Metne yakın görünen ama baskın olmayan duygu"
      ornek_mantik:
        - "Mutluluk yerine heyecan"
        - "Özlem yerine üzüntü"
        - "Huzur yerine sevinç"

    - id: "olaydan_bagimsiz_duygu"
      tanim: "Metnin olay örgüsüyle uyumlu görünmeyen duygu"
      ornek_mantik:
        - "Korku"
        - "Öfke"
        - "Karamsarlık"

    - id: "yardimci_duyguyu_baskin_gibi_sunma"
      tanim: "Metinde kısa süreli hissedilen ama asıl duygu olmayan seçeneği öne çıkarma"

    - id: "konu_duygu_karistirma"
      tanim: "Duygu yerine nesneye, kişiye ya da duruma bağlanan yanlış çağrışım sonucu seçilen duygu"
      ornek_mantik:
        - "Oyuncak sevgisi çağrışımından sevinç"
        - "Bayram çağrışımından yalnız heyecan"

  secim_kurali:
    - "Her soruda 3 yanlış seçenek farklı stratejilerden seçilmelidir."
    - "En az 1 yanlış seçenek doğru duyguya yakın görünmelidir."
    - "En az 1 yanlış seçenek metinle belirgin biçimde uyuşmamalıdır."
    - "Şiir sorularında en az 1 yanlış seçenek tema çağrışımından gelebilecek yakın duygu olmalıdır."
    - "Birden fazla seçenek aynı ölçüde doğru görünmemelidir."

zorluk_duzeyleri:
  kolay:
    text:
      kurallar:
        - "Baskın duygu açık ifadelerle verilmelidir."
        - "Duygu olay veya durum üzerinden kolayca hissedilmelidir."
        - "Yan duygular çok sınırlı olmalıdır."
    preferred_variants:
      - "metinde_islenen_duygu"
      - "metne_hakim_duygu"
      - "siirde_ana_duygu"
    distractors:
      kurallar:
        - "1 seçenek yakın duygu"
        - "1 seçenek metinle açıkça uyumsuz duygu"
        - "1 seçenek yardımcı duyguyu baskın gibi sunma"
        - "Yanlış seçenekler kolay elenebilir olmalıdır."
    difficulty_note: >
      Kolay düzeyde öğrenci metindeki veya şiirdeki baskın duyguyu rahatça fark eder.

  orta:
    text:
      kurallar:
        - "Duygu açık olmalı; fakat metnin tamamına bakmayı gerektirmelidir."
        - "Metinde kısa süreli yan duygular bulunabilir."
        - "Şiirde ana duygu, birkaç dize birlikte okununca belirginleşmelidir."
    preferred_variants:
      - "metinde_islenen_duygu"
      - "metne_hakim_duygu"
      - "siirde_ana_duygu"
    distractors:
      kurallar:
        - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
        - "1 yanlış seçenek yakın duygu"
        - "1 yanlış seçenek yardımcı duyguyu baskın gibi sunma"
        - "1 yanlış seçenek olaydan bağımsız duygu"
    difficulty_note: >
      Orta düzeyde öğrenci baskın duygu ile kısa süreli yardımcı duygu arasında ayrım yapmalıdır.

  zor:
    text:
      kurallar:
        - "Metinde veya şiirde baskın duygu açık kalmalı; ancak birkaç ayrıntıdan birlikte çıkarılmalıdır."
        - "Yan duygular çeldirici üretimine malzeme verebilir."
        - "Zor düzeyde bile ağır sembolik yorum gerekmemelidir."
        - "Şiirde tema ile ana duygu ayrımı daha dikkatli yapılmalıdır."
    preferred_variants:
      - "metne_hakim_duygu"
      - "siirde_ana_duygu"
    distractors:
      kurallar:
        - "3 yanlış seçeneğin en az 2'si metne yakın görünmelidir."
        - "1 seçenek yakın duygu"
        - "1 seçenek yardımcı duyguyu baskın gibi sunma"
        - "1 seçenek tema çağrışımına dayalı yanlış duygu olabilir"
    difficulty_note: >
      Zor düzeyde öğrencinin baskın duygu ile yakın görünen başka duygular arasındaki farkı ayırt etmesi beklenir; ancak görev hâlâ duygu bulma düzeyindedir.

difficulty_selection_policy:
  default: "Orta"
  allowed_values: ["Kolay", "Orta", "Zor"]
  hard_limits:
    - "Her soru 4 seçenekli olmalıdır."
    - "Her soru için görsel zorunludur."
    - "Metin veya şiir 3. sınıf düzeyini aşan ağır soyutluk içermemelidir."
