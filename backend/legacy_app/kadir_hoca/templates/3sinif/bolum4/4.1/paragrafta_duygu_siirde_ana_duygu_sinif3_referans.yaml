    - "Duygu anlatımı çocuk düzeyine uygun sade bir dil ile kurulmalıdır."

generation_logic:
  steps:
    - step: 1
      action: "3. sınıfa uygun, baskın duygusu açık bir metin ya da şiir konusu seç"
    - step: 2
      action: "Seçilen varyanta göre metin veya şiir oluştur"
      details:
        - "Metinde veya şiirde baskın duyguyu açıkça kur"
        - "Gerekirse kısa süreli yan duygular ekle"
        - "3. sınıf sözcük düzeyinde kal"
    - step: 3
      action: "İçeriği destekleyen işlevsel görsel tasarla"
      details:
        - "Görsel duyguyu desteklesin"
        - "Görsel zorunlu olsun"
        - "Görsel tek başına cevabı vermesin"
    - step: 4
      action: "Soru varyantını seç"
      details:
        - "metinde_islenen_duygu"
        - "metne_hakim_duygu"
        - "siirde_ana_duygu"
    - step: 5
      action: "1 doğru ve 3 yanlış duygu seçeneği oluştur"
      details:
        - "Bir yakın duygu kullan"
        - "Bir yardımcı duyguyu baskın gibi sun"
        - "Bir belirgin uyumsuz duygu ekle"
    - step: 6
      action: "Soru kökünü listeden rastgele seç"
    - step: 7
      action: "Şıkları A-B-C-D olarak karıştır"
    - step: 8
      action: "Harici 3. Sınıf TYMM Ortak Kuralları ile doğrulama yap"

