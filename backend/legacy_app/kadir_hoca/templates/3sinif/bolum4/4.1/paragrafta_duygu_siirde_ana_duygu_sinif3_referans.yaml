  metinde_islenen_duygu:
    - "Bu metinde işlenen duygu aşağıdakilerden hangisidir?"
    - "Bu metinde hangi duygu işlenmiştir?"
    - "Metinde anlatılan baskın duygu aşağıdakilerden hangisidir?"
    - "Bu metinde öne çıkan duygu hangisidir?"
    - "Aşağıdakilerden hangisi bu metinde işlenen duygudur?"

  metne_hakim_duygu:
    - "Bu metne hâkim olan duygu aşağıdakilerden hangisidir?"
    - "Metne egemen olan duygu hangisidir?"
    - "Parçada hâkim olan duygu aşağıdakilerden hangisidir?"
    - "Bu parçada baskın olan duygu hangisidir?"
    - "Aşağıdakilerden hangisi bu metne hâkim olan duygudur?"

  siirde_ana_duygu:
    - "Bu şiirin ana duygusu aşağıdakilerden hangisidir?"
    - "Şiirde işlenen ana duygu hangisidir?"
    - "Bu şiirde hissedilen ana duygu aşağıdakilerden hangisidir?"
    - "Aşağıdakilerden hangisi bu şiirin ana duygusudur?"
    - "Şiire hâkim olan duygu hangisidir?"

