    - "Seçenekler duygu adı biçiminde mi?"
    - "Doğru seçenek baskın duyguyu karşılıyor mu?"
    - "En az 1 yanlış seçenek yakın duygu mu?"
    - "Birden fazla makul doğru seçenek oluşuyor mu? Oluşuyorsa reddet."

  difficulty:
