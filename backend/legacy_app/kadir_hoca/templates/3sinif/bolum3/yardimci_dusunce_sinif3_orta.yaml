# Referans: paragrafta_ana_dusunce_yardimci_dusunce_sinif3_referans.yaml → zorluk_duzeyleri.orta
# Orta duzey — yardimci_dusunce varyanti

meta:
  id: "yardimci_dusunce_sinif3_orta"
  ad: "3. Sinif - Paragrafta Yardimci Dusunce (Orta)"
  sinif_seviyesi: 3
  aciklama: "Orta duzey — yardimci_dusunce: Yardimci Dusunce. 4 secenekli, gorselli."
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Gorsel + tek paragraf + soru koku + 4 secenek (orta, yardimci_dusunce)"

  paragraph:
    required: true
    word_count_min: 65
    word_count_max: 86
    sentence_count_min: 5
    sentence_count_max: 7
    stil: "simple_clear_primary_text"
    background_color: "#f8f0e0"
    kurallar:
      - "Metin tek baskin konu veya tek baskin olay etrafinda kurulmalidir."
      - "Metin 3. sinif ogrencisinin anlayabilecegi kadar acik, sade ve akici olmalidir."
      - "Metin 2. sinifa gore biraz daha ayrintili olabilir; ancak dagnik olmamalidir."
      - "Metinde ana dusunceyi destekleyen en az 2 yardimci bilgi bulunmalidir."
      - "Ana dusunce, metnin tamami dusunuldugunde belirlenebilir olmalidir."
      - "Yardimci bilgiler ana dusunceyi desteklemeli, ama onun yerine gecmemelidir."
      - "Metin dis bilgi gerektirmemelidir."
      - "Metin 4. sinif duzeyinde kaynak sorgulama, yazar niyeti cozumleme veya ileri elestirel yorum gerektirmemelidir."
      - "Bilgilendirici metinlerde ana bilgi ile sonuc bolumu uyumlu olmalidir."
      - "Oykuleyici metinlerde olay, kisi ve durum acikca izlenebilir olmalidir."
      - "Metinde en az bir dogrudan cevaplanabilir soru alani ve gerekiyorsa en az bir cevaplanamayan alan dogal bicimde bulunabilir olmalidir."
      - "Ana dusunce acik olmali; fakat metnin butunune bakmayi gerektirmelidir."
      - "Metinde 2-3 yardimci bilgi bulunabilir."
      - "Bir yan ayrinti celdirici uretimine malzeme verebilir."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."

  visual:
    required: true
    description: "Metnin ana icerigini destekleyen islevsel gorsel"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "tek sahneli illustrasyon"
      - "tek sahneli fotograf benzeri cizim"
      - "tek olay veya tek varlik odakli sahne"
      - "bilgilendirici metni destekleyen konu gorseli"
    kurallar:
      - "Her soru icin gorsel zorunludur."
      - "Gorsel metnin ana icerigiyle acik uyumlu olmalidir."
      - "Gorsel sus olmamali, cozumde etkili destek sunmalidir."
      - "Gorsel tek basina dogru cevabi acikca vermemelidir."
      - "Gorsel ile metin birlikte degerlendirildiginde ana dusunce veya yardimci bilgi daha netlesebilir."
      - "Gorsel dikkat dagitici gereksiz ayrintilar icermemelidir."
      - "Gorsel yanlis secenegi acikca isaret edecek kadar yaniltici olmamalidir."
    yasaklar:
      - "dekoratif ve metinden bagimsiz gorsel"
      - "cok sahneli karmasik kolaj"
      - "grafik, tablo veya infografik yogunlugu tasiyan tasarim"
      - "metnin asil odagini gizleyen karisik arka plan"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir (yardimci_dusunce varyanti)"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 12
    style: "short_judgment"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "3. sinifta her soru 4 secenekli olmalidir."
      - "Secenekler kisa, sade ve 3. sinif duzeyinde olmalidir."
      - "Yalniz bir secenek tam dogru olmalidir."
      - "Yanlis secenekler metne yakin gorunmeli ama dikkatli okuyunca elenebilmelidir."
      - "Ayni soruda birden fazla makul dogru secenek olusmamalidir."
      - "Yardimci dusunce sorularinda secenekler metinde gecen destekleyici bilgilerle iliskili olmalidir."
      - "En az 1 yanlis secenek ilk bakista makul gorunmelidir."
      - "Hangi sorunun cevabi yoktur sorularinda 3 soru gercekten metinden cevaplanabilir olmalidir."
      - "Metinden cikarilamaz sorularinda 3 secenek metinle acikca desteklenebilir olmalidir."

soru_kokleri:
  - "<b>Bu metne göre aşağıdakilerden hangisi söylenebilir?</b>"
  - "<b>Bu metinde verilen yardımcı düşüncelerden biri aşağıdakilerden hangisidir?</b>"
  - "<b>Metne göre aşağıdakilerden hangisi doğrudur?</b>"
  # KULLANILDI: - "<b>Bu parçada aşağıdakilerden hangisine değinilmiştir?</b>"
  - "<b>Metinde geçen bilgilerden biri aşağıdakilerden hangisidir?</b>"

dogru_cevap:
  tanim: "Metindeki ana dusunceyi destekleyen acik bilgi veya yargi"
  kurallar:
    - "KRITIK PARAPHRASE: Dogru cevap paragraftaki cumleleri/ifadeleri AYNEN KULLANMA — paragraf kelimelerini es anlamli sozcuklerle degistir ve farkli cumle yapisiyla yeniden ifade et. En az %50 kelime farkliligi zorunlu. Ornek: paragrafta 'kitap okumak zihni aydinlatir' → secenek 'okuma aliskanligi dusunceyi gelistirir' (dogru paraphrase), DEGIL 'kitap okumak zihni aydinlatir' (kopyalama)."
    - "Dogru cevap dis bilgi gerektirmemelidir."
    - "Dogru cevap 3. sinif ogrencisinin dikkatli okuyarak bulabilecegi aciklikta olmalidir."
    - "Yardimci dusunce, metinde acikca yer alan ve ana dusunceyi destekleyen bilgi olmalidir."

celdirici_stratejileri:
  - ad: "ANA_DUSUNCEYI_YARDIMCI_DUSUNCE_GIBI_SUNMA"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Asil vurguyu yardimci bilgi gibi sunan secenek"
    nasil_olusturulur: |
      Metnin ana dusuncesini yardimci bilgi gibi sunan bir secenek olustur.
    kategori: "semantic"

  - ad: "METINDE_OLMAYAN_YAKIN_BILGI"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metne yakin gorunur ama metinde gecmeyen bilgi"
    nasil_olusturulur: |
      Metnin konusuna yakin ama metinde gecmeyen bir bilgi/yargi olustur.
    kategori: "semantic"

  - ad: "KISMI_DOGRU_KISMI_YANLIS"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Bir bolumu metne uyar gibi gorunur ama tamami dogru degildir"
    nasil_olusturulur: |
      Bir kismi metne uyan ama digeri metne uymayan bir secenek olustur.
    kategori: "cognitive"

use_shared_strategies: false

beceri:
  katman: "KB2"
  bilesenler: ["ana_dusunce_bulma", "yardimci_dusunce_ayirt_etme"]
  surec_bileseni: "metni_anlama"

