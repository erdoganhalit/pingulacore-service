meta:
  id: "metnin_bolumleri_giris_gelisme_sonuc_sinif3_standart_gorselli_dort_secenekli"
  ad: "Metnin Bölümleri (Giriş-Gelişme-Sonuç)"
  sinif_seviyesi: 3
  ders: "Türkçe"
  bolum: "3. Sınıf Türkçe Paragraf Kitabı"
  alt_bolum: "5. Metnin Bölümleri"
  soru_turu: "çoktan seçmeli"
  aciklama: >
    3. sınıf öğrencisi için bir metnin giriş, gelişme ve sonuç bölümlerini
    ayırt ettirmeye; metnin başına, gelişme kısmına veya sonuna uygun cümleyi
    seçtirmeye; ayrıca numaralanmış cümlelerde hangi bölümün nerede başladığını
    buldurmaya yönelik, görsel destekli ve 4 seçenekli standart soru üretim şablonu.
  kullanim_notu: >
    Bu şablon, harici olarak kullanılan 3. Sınıf TYMM Ortak Kuralları YAML'ı,
    3. sınıf öğretim programı ve 3. sınıf MEB Türkçe kitapları ile birlikte
    doğrulanmalıdır.

format:
  type: "llm_generated_html"
  description: "Görsel + metin/parça + soru kökü + 4 seçenek"

  question_variant:
    allowed:
      - "giris_cumlesi_olabilir"
      - "giris_cumlesi_olamaz"
      - "metnin_basina_getirilebilir"
      - "metnin_basina_getirilemez"
      - "gelisme_cumlesi_olabilir"
      - "gelisme_cumlesi_olamaz"
      - "gelisme_bolumu_hangi_cumleyle_baslar"
      - "sonuc_bolumu_hangi_cumleyle_baslar"
      - "metnin_sonuna_getirilebilir"
      - "metnin_sonuna_getirilemez"
      - "sonuc_cumlesi_olabilir"
      - "sonuc_cumlesi_olamaz"
      - "bu_metnin_giris_cumlesi_hangisi_olabilir"
    default: "metnin_sonuna_getirilebilir"

  text_structure:
    allowed:
      - "eksik_baslangicli_metin"
      - "eksik_sonlu_metin"
      - "numaralanmis_metin"
      - "tek_parca_metin"
    default: "eksik_sonlu_metin"

  paragraph:
    required: true
    sentence_count_min: 4
    sentence_count_max: 7
    word_count_min: 40
    word_count_max: 95
    style: "simple_clear_primary_text"
    kurallar:
      - "Metin 3. sınıf öğrencisinin anlayabileceği kadar açık, sade ve akıcı olmalıdır."
      - "Metin giriş, gelişme ve sonuç mantığına uygun kurulmalıdır."
      - "Giriş bölümü konuyu açmalı, gelişme bölümü ayrıntıları vermeli, sonuç bölümü anlamı toparlamalıdır."
      - "Metin tek baskın konu veya tek kısa olay etrafında kurulmalıdır."
      - "Metin dış bilgi gerektirmemelidir."
      - "Bölümler arası geçiş anlamlı ve doğal olmalıdır."
      - "Soru, paragrafın yapısını fark ettirmeli; ama 4. sınıfa kayan ayrıntılı metin çözümlemesine dönüşmemelidir."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."

  giris_bolumu_kurallari:
    kurallar:
      - "Giriş bölümü genellikle metnin ilk bölümüdür."
      - "Giriş cümlesi konuyu başlatmalı veya tanıtmalıdır."
      - "Giriş cümlesi ani sonuç, çıkarım veya toparlama havası taşımamalıdır."
      - "Giriş cümlesi çoğu durumda açıklayıcı, tanıtıcı veya hazırlayıcı olmalıdır."
      - "Giriş bölümünde olayın ya da konunun ayrıntısına çok hızlı girilmemelidir."
    yasak_baglayici_egilimleri:
      - "bu yüzden"
      - "bundan dolayı"
      - "sonuç olarak"
      - "özetle"
      - "kısacası"
      - "sonunda"
    not:
      - "Bu ifadeler kesin yasak olarak değil, giriş cümlesi olma ihtimalini düşüren güçlü işaretler olarak düşünülmelidir."

  gelisme_bolumu_kurallari:
    kurallar:
      - "Gelişme bölümü girişte açılan konuyu ayrıntılandırmalıdır."
      - "Gelişme bölümünde örnek, açıklama, karşılaştırma, neden-sonuç veya tanıtıcı ayrıntılar yer alabilir."
      - "Gelişme cümlesi, girişten sonra doğal biçimde gelebilmelidir."
      - "Gelişme bölümü sonuç gibi toparlayıcı olmamalıdır."
      - "Numaralanmış metin varyantında gelişme bölümü açık biçimde belirlenebilir olmalıdır."

  sonuc_bolumu_kurallari:
    kurallar:
      - "Sonuç bölümü anlatılanları toparlamalı veya bir sonuca bağlamalıdır."
      - "Sonuç cümlesi metnin sonunda doğal kapanış sağlamalıdır."
      - "Sonuç cümlesi yeni bir ana konu başlatmamalıdır."
      - "Sonuç bölümünde çıkarım, kapanış veya toparlama havası bulunabilir."
      - "Sonuç bölümü önceki cümlelerin doğal devamı olmalıdır."
      - "Numaralanmış metin varyantında sonuç bölümünün başladığı cümle açık biçimde ayırt edilebilir olmalıdır."
    destekleyici_ifadeler:
      - "bu yüzden"
      - "bundan dolayı"
      - "sonuç olarak"
      - "özetle"
      - "kısacası"
      - "böylece"
      - "artık"
      - "günümüzde"
    not:
      - "Bu ifadeler zorunlu değildir; uygun durumlarda sonuç havasını güçlendirmek için kullanılabilir."

  visual:
    required: true
    description: "Metnin ana içeriğini destekleyen işlevsel görsel"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "tek sahneli illüstrasyon"
      - "tek sahneli fotoğraf benzeri çizim"
      - "tek olay veya tek varlık odaklı sahne"
      - "metnin ana konusunu destekleyen sade konu görseli"
    kurallar:
      - "Her soru için görsel zorunludur."
      - "Görsel metnin ana içeriğiyle açık uyumlu olmalıdır."
      - "Görsel süs olmamalı, çözümde anlam desteği sunmalıdır."
      - "Görsel tek başına doğru cevabı açıkça vermemelidir."
      - "Görsel ile metin birlikte değerlendirildiğinde doğru bölüm veya doğru cümle daha netleşebilir."
      - "Görsel dikkat dağıtıcı gereksiz ayrıntılar içermemelidir."
    yasaklar:
      - "dekoratif ve metinden bağımsız görsel"
      - "çok sahneli karmaşık kolaj"
      - "grafik, tablo veya infografik yoğunluğu taşıyan tasarım"

  stem:
    required: true
    selection: "random_from_list_by_variant"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    correct_count: 1
    style_by_variant:
      giris_cumlesi_olabilir: "sentence_option"
      giris_cumlesi_olamaz: "sentence_option"
      metnin_basina_getirilebilir: "sentence_option"
      metnin_basina_getirilemez: "sentence_option"
      gelisme_cumlesi_olabilir: "sentence_option"
      gelisme_cumlesi_olamaz: "sentence_option"
      gelisme_bolumu_hangi_cumleyle_baslar: "number_option"
      sonuc_bolumu_hangi_cumleyle_baslar: "number_option"
      metnin_sonuna_getirilebilir: "sentence_option"
      metnin_sonuna_getirilemez: "sentence_option"
      sonuc_cumlesi_olabilir: "sentence_option"
      sonuc_cumlesi_olamaz: "sentence_option"
      bu_metnin_giris_cumlesi_hangisi_olabilir: "sentence_option"
    word_count_min: 1
    word_count_max: 16
    kurallar:
      - "3. sınıfta her soru 4 seçenekli olmalıdır."
      - "Cümle seçenekleri anlamlı ve kurallı olmalıdır."
      - "Numara seçenekli sorularda seçenekler yalnız sayı biçiminde olabilir."
      - "Doğru seçenek metnin bölüm yapısına ve düşüncenin akışına tam uymalıdır."
      - "Yanlış seçenekler metne yakın görünmeli ama düşüncenin akışını bozmalıdır."
      - "Birden fazla makul doğru seçenek oluşmamalıdır."

