zorluk_duzeyleri:
  kolay:
    paragraph:
      sentence_count_min: 4
      sentence_count_max: 5
      word_count_min: 42
      word_count_max: 60
      kurallar:
        - "Metin yapısı açık ve belirgin olmalıdır."
        - "Giriş, gelişme ve sonuç bölümleri kolay ayırt edilebilir olmalıdır."
        - "Eksik başlangıçlı veya eksik sonlu metinler öncelikli kullanılabilir."
    preferred_variants:
      - "giris_cumlesi_olabilir"
      - "metnin_basina_getirilebilir"
      - "metnin_sonuna_getirilebilir"
      - "sonuc_cumlesi_olabilir"
      - "bu_metnin_giris_cumlesi_hangisi_olabilir"
    distractors:
      kurallar:
        - "1 seçenek giriş yerine sonuç havası taşımalıdır."
        - "1 seçenek ayrıntıya erken girmelidir."
        - "1 seçenek konu dışına veya akış dışına kaymalıdır."
    difficulty_note: >
      Kolay düzeyde öğrenci metnin başlangıç ve bitiş mantığını rahatça fark eder.

  orta:
    paragraph:
      sentence_count_min: 5
      sentence_count_max: 6
      word_count_min: 55
      word_count_max: 78
      kurallar:
        - "Metinde gelişme bölümü daha belirgin ayrıntılar içerebilir."
        - "Doğru seçeneği bulmak için metnin birkaç cümlesi birlikte düşünülmelidir."
        - "Giriş ve sonuç arasındaki işlev farkı dikkat gerektirebilir."
    preferred_variants:
      - "giris_cumlesi_olamaz"
      - "gelisme_cumlesi_olabilir"
      - "gelisme_cumlesi_olamaz"
      - "metnin_sonuna_getirilemez"
      - "sonuc_cumlesi_olamaz"
      - "sonuc_bolumu_hangi_cumleyle_baslar"
    distractors:
      kurallar:
        - "En az 1 yanlış seçenek ilk bakışta makul görünmelidir."
        - "Yanlış seçenekler bölüm işlevini karıştıracak kadar yakın olabilir."
    difficulty_note: >
      Orta düzeyde öğrenci cümlenin metnin hangi bölümüne uygun düştüğünü ayırt etmelidir.

  zor:
    paragraph:
      sentence_count_min: 6
      sentence_count_max: 7
      word_count_min: 72
      word_count_max: 95
      kurallar:
        - "Metinde giriş-gelişme-sonuç geçişleri açık kalmalı; fakat yakın çeldiricilere izin vermelidir."
        - "Numaralanmış cümle yapısı kullanılabilir."
        - "Doğru seçenek için paragrafın tamamı düşünülmelidir."
        - "Zor düzeyde bile soru 4. sınıfa kayan ileri yapı çözümlemesine dönüşmemelidir."
    preferred_variants:
      - "gelisme_bolumu_hangi_cumleyle_baslar"
      - "sonuc_bolumu_hangi_cumleyle_baslar"
      - "metnin_basina_getirilemez"
      - "metnin_sonuna_getirilemez"
      - "sonuc_cumlesi_olamaz"
    distractors:
      kurallar:
        - "3 yanlış seçeneğin en az 2'si metne yakın görünmelidir."
        - "Yanlış seçeneklerden biri girişe, biri gelişmeye, biri sonuca yakın işlev taşıyabilir."
    difficulty_note: >
      Zor düzeyde öğrencinin cümle işlevlerini ve paragrafın düşünce akışını birlikte değerlendirmesi beklenir.

difficulty_selection_policy:
  default: "Orta"
  allowed_values: ["Kolay", "Orta", "Zor"]
  hard_limits:
    - "Her soru 4 seçenekli olmalıdır."
    - "Her soru için görsel zorunludur."
    - "Metin 3. sınıf düzeyini aşan ağır soyutluk içermemelidir."
    - "Zor düzey seçilse bile soru 4. sınıf düzeyinde yazarın planını yorumlama veya ileri metin yapısı tartışmasına dönüşemez."
    - "Kolay düzeyde aşırı yakın çeldirici yükü kurulmamalıdır."

sinif_uygunluk_kurallari:
  uygundur:
    - "Metnin giriş, gelişme ve sonuç işlevleri açık biçimde kuruluyorsa"
    - "Cümlelerin paragraf içindeki görevi somut olarak ayırt edilebiliyorsa"
    - "Numaralanmış cümlelerde bölüm başlangıcı açıkça bulunabiliyorsa"
    - "Görsel metnin konusunu destekliyor ve paragraf bütünlüğünü anlamayı kolaylaştırıyorsa"
  yasaktir:
    - "Yazarın üslup tercihini veya niyetini yorumlatma"
    - "Aşırı soyut paragraf yapısı tartışmaları"
    - "Metin dışı dünya bilgisi gerektiren seçenekler"
  ucuncu_sinifa_kayar:
    - "Giriş-gelişme-sonuç işlevini ayırt etme"
    - "Düşüncenin akışına uygun başlangıç ve sonuç cümlesi seçme"
    - "Numaralanmış cümlelerle gelişme veya sonuç başlangıcını belirleme"
  dorduncu_sinifa_kayar:
    - "Metnin örgütlenme biçimini ayrıntılı gerekçeyle tartıştırma"
    - "Birden fazla paragraf arasında yapı karşılaştırması yaptırma"
    - "Yazar tercihini ve bölüm etkisini analiz ettirme"

konu_alani:
  izinli_ornekler:
    - "renklerin tarihi"
    - "bilim insanları ve eserleri"
    - "dinozorlar"
    - "günlük yaşam olayları"
    - "doğa ve çevre"
    - "teknoloji"
    - "okul yaşamı"
    - "sağlıklı yaşam"
    - "hayvanlar"
    - "kısa tarihsel bilgiler"
  kurallar:
    - "Konu 3. sınıf öğrencisinin anlayabileceği kadar somut ve açık olmalıdır."
    - "Metin giriş-gelişme-sonuç düzenine uygun kurulabilmelidir."
    - "Numaralanmış cümlelerle bölüm tespiti yapılabilecek metinler üretilebilir."
    - "Görselle desteklenebilen konular tercih edilmelidir."
    - "Konu dış bilgi gerektirmeden çözülebilmelidir."

generation_logic:
  steps:
    - step: 1
      action: "3. sınıfa uygun, giriş-gelişme-sonuç yapısına elverişli somut bir konu seç"
    - step: 2
      action: "Seçilen konu için 4-7 cümlelik sade bir metin oluştur"
      details:
        - "Girişi kur"
        - "Gelişmede ayrıntıları ver"
        - "Sonuçta toparla"
        - "Gerekirse cümleleri numaralandır"
    - step: 3
      action: "Metni destekleyen işlevsel görsel tasarla"
      details:
        - "Görsel bağlamı desteklesin"
        - "Görsel zorunlu olsun"
        - "Görsel tek başına cevabı vermesin"
    - step: 4
      action: "Soru varyantını seç"
      details:
        - "giris_cumlesi_olabilir"
        - "giris_cumlesi_olamaz"
        - "metnin_basina_getirilebilir"
        - "metnin_basina_getirilemez"
        - "gelisme_cumlesi_olabilir"
        - "gelisme_cumlesi_olamaz"
        - "gelisme_bolumu_hangi_cumleyle_baslar"
        - "sonuc_bolumu_hangi_cumleyle_baslar"
        - "metnin_sonuna_getirilebilir"
        - "metnin_sonuna_getirilemez"
        - "sonuc_cumlesi_olabilir"
        - "sonuc_cumlesi_olamaz"
        - "bu_metnin_giris_cumlesi_hangisi_olabilir"
    - step: 5
      action: "Varyanta uygun 1 doğru ve 3 yanlış seçenek oluştur"
      details:
        - "Yanlışlardan biri bölüm işlevi karışıklığı taşısın"
        - "Yanlışlardan biri akış dışına kaysın"
        - "Yanlışlardan biri ilk bakışta makul görünsün"
    - step: 6
      action: "Soru kökünü listeden rastgele seç"
    - step: 7
      action: "Şıkları A-B-C-D olarak karıştır"
    - step: 8
      action: "Harici 3. Sınıf TYMM Ortak Kuralları ile doğrulama yap"

validation_checklist:
  paragraph:
    - "Metin 4-7 cümle arasında mı?"
    - "Metin 3. sınıf düzeyinde açık ve sade mi?"
    - "Giriş, gelişme ve sonuç işlevleri ayırt edilebilir mi?"
    - "Numaralı varyantta bölüm başlangıcı gerçekten belirlenebilir mi?"
    - "Metin dış bilgi gerektiriyor mu? Gerektiriyorsa reddet."
    - "Soru gerçekten bölüm işlevini mi ölçüyor?"

  visual:
    - "Görsel zorunlu olarak var mı?"
    - "Görsel metnin ana içeriğiyle uyumlu mu?"
    - "Görsel destekleyici ama tek başına cevap verici değil mi?"
    - "Görsel dekoratif kalmıyor mu?"

  stem:
    - "Soru kökü seçilen varyanta uygun mu?"
    - "Soru kökü açık ve 3. sınıf düzeyinde mi?"
    - "Ekstra beceri yüklemiyor mu?"

  options:
    - "Toplam 4 seçenek var mı?"
    - "Doğru seçenek metnin bölüm yapısına tam uyuyor mu?"
    - "Yanlış seçenekler bölüm işlevi açısından gerçekten sorunlu mu?"
    - "Numaralı sorularda yalnız 1 doğru numara var mı?"
    - "Birden fazla makul doğru seçenek oluşuyor mu? Oluşuyorsa reddet."

  difficulty:
    - "Zorluk seçilen düzeye göre metin, görsel ve çeldirici kuralları uygulanmış mı?"
    - "Zor düzey bile 3. sınıf sınırında mı?"
    - "4. sınıfa kayan ileri yapı yorumu var mı?"

hard_fail_rules:
  - "Seçenek sayısı 4 değilse"
  - "Görsel yoksa"
  - "Doğru cevap dış bilgi gerektiriyorsa"
  - "İki veya daha fazla seçenek makul doğruysa"
  - "Metin 3. sınıf için fazla soyut veya ağırsa"
  - "Numaralı soruda bölüm geçişi belirsizse"
  - "Soru metnin bölümleri yerine ana düşünce, konu veya dil bilgisi sorusuna kayıyorsa"
  - "Soru 4. sınıfa kayan ileri metin yapısı yorumuna dönüşüyorsa"
  - "Görsel metinle uyumsuzsa"

ornek_bicim_notlari:
  - "Kaşgarlı Mahmud örneğinde sonuç bölümü, anlatılan bilgileri toparlayan cümleyle başlamalıdır."
  - "‘Aşağıdakilerden hangisi bir paragrafın giriş cümlesi olmaya en uygundur?’ tipinde seçenekler bölüm işlevine göre ayırt edilmelidir."
  - "Triceratops örneğinde ‘Bu metnin giriş cümlesi aşağıdakilerden hangisi olabilir?’ sorusu, konuya doğal başlangıç yapan cümleyi ölçer."
  - "Bu bölümde temel amaç, metnin düşünce akışını ve bölüm işlevlerini ayırt etmektir."