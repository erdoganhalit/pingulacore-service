# bolum6/sozel_mantik_grup_uyelik_kesinligi_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 kişi/varlık seçeneği
# Bu sürüm yalnızca "grup üyelik kesinliği sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_grup_uyelik_kesinligi_sinif3"
  ad: "3. Sınıf Sözel Mantık - Grup Üyelik Kesinliği"
  sinif_seviyesi: 3
  aciklama: "Belirli sayıda kişi veya varlığın kapasiteleri veya kısıtları olan gruplara, yerlere ya da takımlara dağıtıldığı durumlarda; aynı/farklı grupta olma koşullarını değerlendirerek belirli bir kişinin ait olduğu grubu kesin olarak bulma"
  frequency: "High (~12 questions)"

grup_uyelik_senaryolari:
  - ad: "uzay_istasyonu_modul_dagilimi"
    aciklama: "Astronotların uzay istasyonundaki farklı görev modüllerine dağıtılması"
    ornek_setup: "Bir uzay istasyonunda görevli üç astronot; Keşif, Bakım ve Haberleşme modüllerinden birinde görevlendirilmiştir."

  - ad: "arkeolojik_kazi_alanlari"
    aciklama: "Arkeologların antik kentteki farklı kazı bölgelerine dağıtılması"
    ornek_setup: "Antik kent kazısında çalışan üç arkeolog; Tapınak, Saray ve Mezarlık bölgelerinden birine gönderilmiştir."

  - ad: "denizalti_arastirma_zonlari"
    aciklama: "Dalgıçların batık gemideki farklı araştırma alanlarına ayrılması"
    ornek_setup: "Bir batık gemiyi inceleyen üç dalgıç; Güverte, Makine Dairesi ve Kaptan Köşkü alanlarından yalnızca birinde görev almıştır."

  - ad: "film_seti_cekim_mekanlari"
    aciklama: "Oyuncuların gün içindeki farklı çekim mekanlarına dağıtılması"
    ornek_setup: "Bir filmin oyuncu kadrosundaki üç kişi; Stüdyo, Orman ve Şehir Merkezi setlerinden birine gitmiştir."

  - ad: "robotik_fabrika_hatlari"
    aciklama: "Mühendislerin veya robotların fabrikadaki farklı üretim hatlarına atanması"
    ornek_setup: "Fabrikada çalışan üç mühendis; Kaynak, Boya ve Paketleme hatlarından yalnızca birinde görevlendirilmiştir."

  - ad: "biyolojik_gozlem_kabinleri"
    aciklama: "Biyologların farklı iklim simülasyon kabinlerine yerleşmesi"
    ornek_setup: "Araştırma merkezindeki üç biyolog; Yağmur Ormanı, Çöl ve Tundra kabinlerinden birinde gözlem yapmaktadır."

  - ad: "orkestra_calgi_gruplari"
    aciklama: "Müzisyenlerin orkestradaki farklı enstrüman gruplarına dağılması"
    ornek_setup: "Bir gençlik orkestrasındaki üç müzisyen; Vurmalı, Yaylı ve Üflemeli çalgılar gruplarından birine katılmıştır."

  - ad: "dedektif_sorusturma_bolgeleri"
    aciklama: "Dedektiflerin şehirdeki farklı soruşturma bölgelerine atanması"
    ornek_setup: "Bir olayı araştıran üç dedektif; Liman, Sanayi ve Merkez bölgelerinden yalnızca birine gönderilmiştir."

  - ad: "sihir_akademisi_kuleleri"
    aciklama: "Büyücü çıraklarının akademideki farklı element kulelerine seçilmesi"
    ornek_setup: "Akademiye yeni başlayan üç çırak; Ateş, Su ve Toprak kulelerinden birine yerleştirilmiştir."

  - ad: "iklim_istasyonu_zirveleri"
    aciklama: "Meteorologların dağdaki farklı rakım istasyonlarına dağıtılması"
    ornek_setup: "Dağda görev yapan üç meteorolog; Zirve, Yamaç ve Vadi istasyonlarından birine atanmıştır."

  - ad: "zaman_makinesi_dönemleri"
    aciklama: "Zaman yolcularının farklı tarihi dönemlere gönderilmesi"
    ornek_setup: "Zaman yolculuğu yapan üç öğrenci; Antik Roma, Orta Çağ ve Vahşi Batı dönemlerinden birine gitmiştir."

  - ad: "hayvanat_bahcesi_bakim_alanlari"
    aciklama: "Veterinerlerin hayvanat bahçesindeki farklı habitatlara dağılması"
    ornek_setup: "Hayvanat bahçesinde çalışan üç veteriner; Savan, Sürüngen Evi ve Akvaryum bölümlerinden birinde görevlidir."

  - ad: "siber_guvenlik_takimlari"
    aciklama: "Yazılımcıların farklı siber güvenlik savunma/saldırı takımlarına ayrılması"
    ornek_setup: "Tatbikata katılan üç yazılımcı; Kırmızı, Mavi ve Mor takımlardan yalnızca birine dahil olmuştur."

  - ad: "mutfak_sefleri_istasyonlari"
    aciklama: "Aşçıların büyük bir mutfaktaki farklı hazırlık istasyonlarına geçmesi"
    ornek_setup: "Büyük bir restorandaki üç aşçı; Izgara, Sos ve Tatlı istasyonlarından birinde çalışmaktadır."

  - ad: "kurtarma_operasyonu_timleri"
    aciklama: "Arama kurtarma personelinin farklı afet bölgelerine veya timlerine dağılması"
    ornek_setup: "Tatbikattaki üç kurtarma personeli; Çığ, Sel ve Deprem timlerinden birine katılmıştır."

  - ad: "gizli_gorev_rolleri"
    aciklama: "Ajanların bir operasyondaki farklı görev rollerine atanması"
    ornek_setup: "Bir operasyondaki üç ajan; Sızma, Gözetleme ve Yem rollerinden yalnızca birini üstlenmiştir."

  - ad: "kale_savunma_noktalari"
    aciklama: "Şövalyelerin tarihi bir kaledeki savunma noktalarına dağıtılması"
    ornek_setup: "Kaleyi savunan üç şövalye; Ana Kapı, Gözetleme Kulesi ve İç Avlu noktalarından birine gönderilmiştir."

  - ad: "baraj_onarim_ekipleri"
    aciklama: "Mühendislerin barajdaki farklı teknik onarım bölgelerine ayrılması"
    ornek_setup: "Barajda çalışan üç mühendis; Türbin, Kontrol Odası ve Tahliye Kanalı ekiplerinden birine katılmıştır."

  - ad: "simya_malzeme_toplama_rotalari"
    aciklama: "Simyacıların malzeme toplamak için farklı tehlikeli bölgelere gitmesi"
    ornek_setup: "Malzeme toplayan üç simyacı; Karanlık Orman, Kristal Mağara ve Zehirli Bataklık rotalarından birine gitmiştir."

  - ad: "ekolojik_ciftlik_atolyleri"
    aciklama: "Gönüllülerin çiftlikteki farklı üretim atölyelerine dağılması"
    ornek_setup: "Çiftliğe gelen üç gönüllü; Permakültür, Arıcılık ve Peynir Yapımı atölyelerinden yalnızca birine katılmıştır."
# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 tekil kişi adı seçeneğinden oluşan grup üyelik kesinliği sorusu"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, belirli gruplara/yerlere dağıtılan kişilerle ilgili verilen
      ilişkisel koşulları (aynı/farklı grupta olma, grup kapasiteleri) birlikte değerlendirerek
      gizli dağılımı kurması gerekir. Koşullar tüm dağılımı doğrudan tarif etmemeli;
      öğrenci kontenjan sınırlarıyla belirli bir kişinin grubunu kendi mantıksal çıkarımıyla kesinleştirmelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Dağılımın neye ait olduğunu açıklar; kaç kişi olduğu, hangi grupların bulunduğu ve grupların temel kapasiteleri (varsa) tanıtılır"
      - "Kurgu kişi ve grup merkezli olmalıdır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu dağılımla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru grup dağılımı (kontenjan tablosu) kurulmalı; ardından yalnızca bu dağılıma götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar dağılımın tamamını adım adım tarif etmemelidir"
      - "Maddeler, gizli dağılımın yalnızca bazı parçalarını, kişi ilişkilerini veya grup kısıtlarını vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle boş kalan kontenjanları kendi çıkarımıyla doldurmak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan kişinin gideceği grup açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce sorulan kişinin grubu kesin olarak bulunabilir olmalı; şıklar dağılımı kurdurmamalı, kurulmuş dağılım üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar birden fazla çözüme izin vermemelidir; hedeflenen kişinin yerini kesin olarak tek bir gruba kilitlemelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak grup üyeliği, birliktelik ve kapasite ilişkisi içermelidir"
      - "Öncelikli ilişki türleri: Aynı grupta olma, farklı grupta olma, bir gruba giden kişi sayısı limiti, bir kişinin belirli bir gruba gitmemesi (dışlama)"
      - "Doğrudan atama bilgisi (Örn: Ali X grubundadır) zorunlu olmadıkça kullanılmamalıdır"
      - "Doğrudan atama bilgisi kullanılacaksa en fazla 1 madde içinde yer almalıdır"
      - "Koşulların çoğu doğrudan isim-grup eşleştirmek yerine kişiler arası ilişki veya kontenjan durumu kurmalıdır"
      - "Koşullar, öğrencinin yalnızca alt alta yazarak mekanik eşleştirme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul, dolaylı çıkarım gerektirmelidir; yani bir kişiyle ilgili madde, grup kapasitesiyle birleşmeden tam anlam kazanamamalıdır"
      - "En az 1 koşul, öğrencinin kapasite sınırlarını fark ederek diğer kişilerin veya grupların seçeneklerini elemesini gerektirmelidir"
      - "Dağılımın bazı bölümleri doğrudan verilebilir; ancak hedef kişinin grubu mutlaka kontenjanlar düşünülerek tamamlanmalıdır"

      - "3. sınıf seviyesinde 3-4 kişi, 2 grup ve 3 koşul tercih edilmelidir"
      - "Kişiler ve gruplar; takım, atölye, modül, alan, rota gibi somut kavramlardan seçilmelidir"
      - "Bağlam, öğrencinin aşina olduğu veya ilgisini çeken (uzay, keşif vb.) durumlardan seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'aynı grupta', 'farklı grupta', 'en az', 'en çok' gibi kavramlar net ayrılmalıdır"
      - "Kapasite ve grup bildiren ifadeler belirsizlik taşımamalıdır"
      - "Bu soru tipinde yalnızca kişi-grup dağılımını kurmaya hizmet eden bilgiler kullanılmalıdır; konu dışı süsleme eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: iki veya daha fazla kişinin aynı grupta veya farklı grupta olma ilişkisi"
        - "1 madde: grupların toplam kapasitesi veya gruplardaki kişi sayısı oranları"
        - "1 madde: dolaylı atama veya kontenjan kısıtı sayesinde bir kişinin yerini daraltan koşul"
        - "Gerekirse 1 madde: bir kişinin belirli bir gruba kesinlikle gitmediği (olumsuz) bilgisi"
      yasaklar:
        - "3 veya daha fazla maddede doğrudan kimin hangi gruba gittiğini açıkça verme"
        - "Her kişinin grubunu tek tek tarif eden basit eşleşmeler yazma"
        - "Koşulları sırayla okunduğunda tabloyu anında dolduracak kadar basit dizme"
        - "Bir grubun kontenjanını verdikten sonra o gruptakilerin isimlerini de açıkça verip tabloyu kapatma"

  visual:
    required: true
    description: "Grup dağılımı sorusunu simgeleyen gruplara ayrılmış boş kutu veya çember şeması"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "iki veya üç grubu temsil eden boş etiketli kutu şeması"
      - "soru işaretli kişilerin iki/üç grupta gösterildiği sembolik diyagram"
      - "gruplara dağılan nokta/sembol ikonu"
    kurallar:
      - "Görsel senaryo içeriğini (kişileri, nesneleri veya konumlarını) tasvir etmemelidir"
      - "Görsel yalnızca soru tipini simgeleyen soyut/sembolik bir ikon veya şema olmalıdır"
      - "Görsel bulmacayı çözmede ipucu vermemeli; doğru cevabı ima etmemelidir"
      - "Görsel sade, temiz ve dikkat dağıtmayan bir ikon olmalıdır"
      - "Görsel içinde kişi adı, konum bilgisi veya bulmacaya ait sayısal veri bulunmamalıdır"
      - "Tablo veya ızgara görseli kullanılacaksa hücreler boş ya da soru işaretli olmalıdır"
    yasaklar:
      - "Senaryo sahnesi — kişileri, nesneleri veya konumlarını gösteren illüstrasyon"
      - "Bulmacadaki sıra, yerleşim veya eşleşmeleri ele veren gerçekçi tasvir"
      - "Fotoğraf benzeri sahne görüntüsü"
      - "Puzzle içeriğine dair somut nesne görseli (sandalye, masa, kişi silueti vb.)"

  stem:
    required: true
    description: >
      Soru kökü, kurulmuş kişi-grup dağılımı üzerinden çıkarım yaptırmalıdır.
      Kök; öğrenciyi kapasiteleri analiz edip kişilerin ait olduğu grubu bulmaya zorlayan
      bir yapıdan seçilmelidir.
    kurallar:
      - "Soru kökü dağılım tablosu kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Tercihen 'kesinlikle [Grup Adı] grubundadır/gitmiştir' türünde kesinlik kökleri kullanılmalıdır"
      - "Hedef kişinin yeri kesinleştirilirken, diğer bazı kişilerin yerleri kasıtlı olarak iki ihtimalli (belirsiz) bırakılarak kesinlik farkı yaratılmalıdır"
      - "Soru kökü, doğrudan bir eşleşmeyi okumaya değil, kurulmuş kontenjan tablosunu yorumlamaya yöneltmelidir"

      # ═══════════════════════════════════════════════════════════════
      # OPTIONS (SEÇENEKLER)
      # ═══════════════════════════════════════════════════════════════

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 3
    style: "tekil_kisi_adi"
    correct_count: 1

      # ═══════════════════════════════════════════════════════════════
      # SORU KOKLERI (Grup Üyelik Kesinliğine Özelleştirilmiş)
      # ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # Hedef grup odaklı kesinlik
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle [Grup Adı] grubuna aittir/gitmiştir?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisinin [Grup Adı] grubunda yer aldığı kesin olarak söylenebilir?</b>"
  # Kişi durumu odaklı kesinlik
  - "<b>Bu bilgilere göre aşağıdakilerden hangisinin hangi gruba gittiği/katıldığı kesin olarak bilinmektedir?</b>"
  # Olumsuz kesinlik
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle [Grup Adı] grubunda yer <u>alamaz</u>?</b>"

  # ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
  # ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli grup dağılımı
    ve grupların kontenjan/kapasite kısıtları kurulduktan sonra, belirtilen duruma uyması
    mantıksal olarak KESİN (zorunlu) olan kişidir. Öğrenciden tek bir ipucuna dayanarak değil,
    aynı/farklı grup ilişkilerini ve kişi sayılarını analiz ederek hedef kişiyi kesinleştirmesi beklenir.

  temel_ilke: >
    Gizli dağılım tablosu ve kontenjan sınırları kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak gruptaki boşlukların ve zorunlu
    ikili ilişkilerin sonucu olarak o gruba itilen/kilitlenen kişi olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar ve grup kapasiteleri birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara çıkarımlar üzerinden boş kontenjanlar hesaplanarak bulunmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce kişi-grup dağılımını (en azından sorulan hedef kişi için) kurabilecek durumda olmalıdır"
    - "Şıkkın doğruluğu doğrudan verilmiş bilgiye değil, kurulmuş kontenjan tablosundan çıkan zorunluluğa dayanmalıdır"
    - "Doğru cevap, hedeflenen gruba gitmesi KESİNLİKLE zorunlu olan tek kişi olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal kapasite elemesine dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; hedef gruba gitme ihtimali olan 2. bir kişi varsa (ihtimaller eşitse) belirsizlik vardır, YASAKTIR"
    - "Doğru cevap, koşullardan biri (Örn: 'Ali X grubundadır') açıkça verilip tekrar sorulmamalıdır"
    - "Doğru cevap 1-3 kelime arasında, SADECE kişi veya varlık adı olmalıdır"
    - "Biçimsel olarak diğer şıklardan (diğer kişi adlarından) ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış ya da kaba bir çıkarımı olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli dağılım tablosu kurulmadan ve kontenjan hesabı yapılmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça grubu verilen kişiyi doğrudan tekrar etmesi"
    - "Birden fazla seçeneğin (kişinin) o gruba ait olma ihtimalinin bulunması ve kesinliğin sağlanamaması"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek (kişi) bulunabiliyor mu?"
    - "Gizli kontenjan dağılımı kurulmadan doğru kişi tahmin edilebiliyor mu?"
    - "Doğru seçenekteki kişi, maddelerde doğrudan grubu verilen kişilerden biri mi?"
    - "Doğru seçenek gerçekten tüm koşulların ve kapasite sınırlarının zorlamasıyla o gruba itilen tek kişi mi?"

# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak o gruba gidemeyeceği anlaşılan
    yüzeysel isimler olmamalıdır. Her yanlış seçenek (kişi adı), öğrencinin gizli tam
    grup dağılımını (ve kontenjanları) kurarken yapabileceği bütünsel bir muhakeme hatasının sonucu olmalıdır.
    Öğrenci kapasiteyi yanlış hesaplar veya ilişkiyi yanlış kurarsa, bu şıklardaki
    kişilerden birinin sorulan gruba kesin olarak gittiğini sanmaya yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici kişi, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici kişi, tek bir maddeyle (Örn: 'X o gruba gitmemiştir') hemen elenmemelidir"
    - "Her çeldirici, yanlış veya eksik kurulmuş bir grup dağılım tablosunun çıktısı olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını (örn: birlikteliği) doğru kullanıp bir kısmını (örn: kapasiteyi) yanlış yorumlayan öğrencinin ulaşacağı kişi olmalıdır"
    - "Çeldirici, tüm kontenjanlar dolmadan değil; yanlış eşleştirme yapıldığında güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış eşleştirme (kapasite taşırma, eksik dışlama vb.) yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak (sadece kişi adı olarak) benzemeli; ama yalnızca tüm kısıtlar test edildiğinde o grupta KESİN olmadığı (veya olamayacağı) anlaşılmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş dağılımın doğal sonucu olan makul bir kişi adı yazmaktır"
    - "KOMBİNE KULLANIM: Çeldirici stratejileri tek başına kullanılabileceği gibi, şıkkın elenmesini daha da zorlaştırmak için iki veya daha fazla strateji aynı anda (iç içe) kullanılmalıdır."

  uretim_proseduru:
    - "1. Önce doğru gizli tam grup dağılımını ve kapasiteleri kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış (veya belirsiz) dağılım tablosu tasarla."
    - "3. Her yanlış dağılım, koşulların en az bir kısmını sağlamalı; fakat kapasite veya ayrılık koşullarının tümünü sağlamamalıdır."
    - "4. Çeldirici kişileri bu yanlış dağılımların sonuçlarından üret (O gruba itilen yanlış kişiler)."
    - "5. Her çeldiricinin yanlışlığı (o gruba gidemeyeceği veya kesin olmadığı) ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici kişi tek bir madde ile hemen eleniyorsa yeniden seç."
    - "7. Her çeldirici, metinde tanıtılan geçerli bir kişi/varlık adı olmalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış dağılım/kontenjan mantığına dayanmalıdır"
    - "Çeldiriciler, öğrencinin gizli dağılımı yanlış veya eksik tamamlaması hâlinde 'kesin' görünmelidir"
    - "Çeldiriciler, maddelerde açıkça 'X grubundadır' yazan kişileri kopyalayıp sorarak üretilmemelidir"
    - "Yanlış seçenekler, basit isim rastgeleliği değil, yanlış bir kurgunun sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın rastgele alternatifleri olmamalıdır"
    - "Bir çeldirici, yalnızca son kapasite kontrolü aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek SADECE tekil kişi/varlık adı biçiminde olmalıdır"
    - "Aynı kişiyi birden fazla şıkta kullanmak veya şıklara ikili isim koymak yasaktır"

  stratejiler:
    - ad: "YANLIS_BLOK_YERLESTIRME (Kapasite Taşırma Hatası)"
      bilisssel_hata_kategorisi: "kurgu_hatasi"
      aciklama: "Öğrenci aynı gruba gitmesi gereken kişileri doğru bulur; fakat bu bloğu kapasitesi yetmeyen hedef gruba sığdırmaya çalışır"
      nasil_olusturulur: |
        Gizli dağılımda birlikte düşünülmesi gereken (aynı grupta olan) kişileri doğru grup olarak koru;
        ancak bu grubu kontenjanı yetersiz olan hedef gruba taşı. Çeldirici kişi, öğrencinin ilişkiyi doğru görüp
        kapasite kısıtını unuttuğu durumda hedef gruba koyacağı adaylardan biri olmalıdır.

    - ad: "ARADA_X_KISI_HATASI (Farklı Grup Kısıtı İhlali)"
      bilisssel_hata_kategorisi: "mesafe_hatasi"
      aciklama: "Öğrenci 'farklı grupta olma' kısıtını unutarak iki zıt kişiyi aynı gruba atar"
      nasil_olusturulur: |
        Özellikle 'A ve B farklı gruplardadır' koşulunu ihlal edecek şekilde, hedef gruba
        yanlışlıkla ikisini birden koyduracak bir kurgu yap. Çeldirici kişi, ilk bakışta hedef gruba
        gidebilir görünen fakat 'düşmanıyla/zıddıyla' aynı yere düştüğü için elenmesi gereken kişi olmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA (Dolaylı Zincir Kırılması)"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir kişinin grubunu bulur; fakat bunun diğer kişilerin kontenjanını nasıl etkilediğini taşımaz"
      nasil_olusturulur: |
        Bir kişinin grubunu bulan öğrencinin, o grubun dolduğunu fark etmeyip, boşta kalan çeldirici kişiyi
        de aynı hedef gruba 'kesin'miş gibi atadığı bir durum kur. Çeldirici, öğrencinin ara çıkarımı yapıp
        kapasite düşme adımını atlaması sonucu ulaştığı kişi olmalıdır.

    - ad: "BAS_SON_BILGISINI_KORUYUP_ORTAYI_YANLIS_KURMA (Eksik Dışlama Yaygınlaştırması)"
      bilisssel_hata_kategorisi: "kismi_dogru_kurgu"
      aciklama: "Öğrenci bir kişinin nereye gitmeyeceğini bilir; ama kalan 2 ihtimalden birine onu 'kesin' olarak atar"
      nasil_olusturulur: |
        Kişinin X grubunda olmadığı bilgisini koru. Öğrenci bu kişiyi doğrudan hedef grup olan Y'ye gitmiş
        gibi düşünsün (Oysa Z grubuna da gidebilir). Bu çeldirici, öğrencinin dışlamayı doğru yapıp
        geri kalan ihtimalleri değerlendirmeden 'kesin' yargısına vardığı kişi olmalıdır.

    - ad: "KALAN_YERLERI_YANLIS_TAMAMLAMA (Olasılığı Kesinlik Sanma)"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci dağılımın büyük kısmını doğru kurar; kalan 2 kişinin yerini kendi arasında kesinleştirilemezken kesin sanır"
      nasil_olusturulur: |
        Gizli dağılımın çoğunu doğru tut; yalnızca son 2 kişinin hedef grup ile başka bir grup arasında
        yer değiştirebilir (olasılıklı) durumda kalmasını sağla. Çeldirici, bu iki kişiden biri olmalıdır.
        'Olabilir' olanı 'Kesin' sanma hatasına dayanmalıdır.

    - ad: "BIR_ILISKIYI_YANLIS_YORUMLAYIP_TUM_SIRAYI_KAYDIRMA (Grup Kapasitelerini Ters Çevirme)"
      bilisssel_hata_kategorisi: "iliski_yorum_hatasi"
      aciklama: "Öğrenci grupların kişi sınırlarını (Örn: A grubuna 3, B grubuna 2 kişi) tam tersi anlar"
      nasil_olusturulur: |
        Özellikle kontenjan belirten önermeleri yanlış yorumlayan bir öğrencinin kuracağı alternatif
        tabloyu tasarla. Çeldirici kişi, grupların büyüklükleri yanlış okunduğunda hedef gruba sığdığı
        sanılan kişi olmalıdır.

    - ad: "NEGATIF_KOKTE_DOGRU_SIRAYI_YANLIS_ISARETLEME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci tabloyu doğru kursa da kökün yönünü karıştırdığı için o grupta KESİN olan kişiyi işaretler"
      nasil_olusturulur: |
        Eğer soru kökü 'hangisinin grubu KESİN DEĞİLDİR / BİLİNEMEZ' türündeyse, tabloda
        yeri apaçık belli olan (kesinleşmiş) kişiyi çeldirici yap. Bu seçenek, yanlış tablo değil;
        okuma hatası kaynaklı çeldirici olarak kullanılabilir.

  kombine_kullanim_rehberi:
    tanim: "Öğrencinin şıkları elemesini imkânsız hale getirmek için temel stratejileri birbirine bağlama sanatıdır. Çeldiricileri üretirken bu kombinasyonları kullan."
    ornek_kombinasyonlar:
      - ad: "Eksik Dışlama + Olasılığı Kesinlik Sanma Kombosu"
        nasil_uygulanir: "Bir kişinin X grubuna gitmediği bilgisi verilir. Öğrenci onu hemen Y grubuna atar (Eksik Dışlama). Oysa kişi Z grubuna da gidebilmektedir. Şıklara bu kişi konur ve öğrencinin bu 'olabilir' durumunu 'kesin' sanması (Olasılığı Kesinlik Sanma) hedeflenir."
      - ad: "Kapasite Taşırma + Dolaylı Zincir Kırılması Kombosu"
        nasil_uygulanir: "A ve B'nin aynı grupta olduğu verilir. Hedef grubun ise sadece 1 boş kontenjanı kalmıştır. Öğrenci A'yı tek başına düşünürse hedef gruba sığdırır, ama B ile ayrılmaz olduklarını (Dolaylı Zincir) unuttuğu için kapasiteyi taşırır. Şıklardaki A çeldiricisi bu iki hatanın birleşimidir."
      - ad: "Farklı Grup İhlali + Kapasiteyi Ters Çevirme Kombosu"
        nasil_uygulanir: "Öğrenci kapasiteleri yanlış okuduğu için (Örn: 1 kişilik yeri 3 kişilik sanma) grupta boşluk var zanneder. Bu hatasından dolayı normalde 'farklı grupta' olması gereken iki zıt kişiyi aynı gruba yerleştirme yanılgısına düşer."

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi (Örn: Ali X'tedir) bozup kolay eleme yapılacak kişi üretmek"
    - "Tek başına tek koşulla (kapasiteye bakmadan) elenen kişi çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele bir ismi şıkka koymak"
    - "Çeldiriciyi yanlış bir dağılım tablosu düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış eşleştirme mantığını temsil eden birden fazla şık (kişi) kullanmak"
    - "Bir şıkta birden fazla isim ('Ali ve Ayşe' gibi) bulundurmak"

  kalite_kontrol:
    - "Bu çeldirici kişi, öğrencinin kurabileceği yanlış/eksik bir tablonun sonucu mu?"
    - "Bu seçenek (kişi) bir tek maddeyle hemen eleniyor mu?"
    - "Bu kişinin o gruba gidemeyeceği ancak kontenjanlar / zıtlıklar kontrol edilince mi anlaşılıyor?"
    - "Bu çeldirici, doğru tabloya yakın ama hatalı bir yerleşime dayanıyor mu?"
    - "Her çeldirici kişi farklı bir yanlış çözüm yolunu mu temsil ediyor?"
    - "Seçeneklerdeki kişilerin hepsi metinde adı geçen gerçek adaylar mı?"

  önerilen_dagilim:
    - "1 çeldirici: yanlış blok yerleştirme (kapasite taşırma) veya ilişkiyi eksik taşıma (Kombine edilebilir)"
    - "1 çeldirici: eksik dışlama (baş/sonu koruyup ortayı yanlış kurma) veya arada X kişi hatası (Kombine edilebilir)"
    - "1 çeldirici: kalan yerleri yanlış tamamlama (olasılığı kesin sanma) veya negatif kök yön hatası"

