generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi tüm gizli grup dağılımını ve kapasite/kontenjan sınırlarını kurmaya zorlamalıdır.
    Doğru cevap; tek bir koşuldan, iki koşulun hızlı birleşiminden veya yüzeysel
    elemeden bulunamamalı; ancak tüm kişilerin kontenjan sınırlarıyla gruplara yerleşmesi oluşturulduktan sonra
    kesinleşmelidir.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca grup üyelik kesinliği sorusuna uygun bir kişi-grup/kontenjan bağlamı seç.
        Örnek alanlar:
        - uzay modüllerine dağılım
        - ekolojik atölye grupları
        - siber güvenlik takımları
        - arkeolojik kazı bölgeleri
        - araştırma istasyonları
        - simya malzeme rotaları

    - step: 2
      action: "Kişileri, kontenjanları ve gizli tam dağılımı kur"
      details: |
        - Önce dağıtılacak 5-7 kişiyi/varlığı ve grupların kişi kapasitelerini belirle
        - Sonra bunları gruplara yerleştirerek kapasiteye uygun tek doğru gizli dağılımı oluştur
        - Bu dağılım tablosu, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm grup yerleşimleri kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü bir kişinin belirli bir gruba kesin üyeliğini sormalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle [Grup Adı] grubuna aittir/gitmiştir
        - hangi gruba gittiği kesin olarak bilinmektedir
        - [Grup Adı] grubunda yer aldığı kesin olarak söylenebilir
        - kesinlikle [Grup Adı] grubunda yer alamaz

    - step: 4
      action: "Koşulları gizli tam dağılımdan türet"
      details: |
        - 3 madde oluştur
        - Her madde farklı bilgi taşımalı (Birliktelik, dışlama, kontenjan vs.)
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevaptaki kişinin grubunu vermemeli
        - İki madde birleşince hedef kişinin grubu doğrudan görünür olmamalı
        - Koşullar ancak kontenjan sınırlarıyla birlikte değerlendirildiğinde tüm dağılımı kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar sorulan kişinin yeri için birden fazla ihtimale izin vermemelidir
        - Koşullar ağırlıklı olarak aynı/farklı grupta olma ve kapasite ilişkisi içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede dağılımın çerçevesini tanıt
        - Kimlerin/nelerin hangi gruplara dağıtılacağı ve (varsa) kapasite kuralı anlaşılır olsun
        - Bağlam sade, öğrenciye yakın ve kişi-grup merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, gizli tam dağılım ve kontenjan itiminin zorunlu kıldığı KİŞİ ADI olmalıdır
        - Doğru cevap maddelerden biri (Örn: X grubundadır) tekrar edilerek yazılmamalıdır
        - Öğrenci gizli kontenjan tablosunu kurmadan bu kişiye ulaşamamalıdır
        - Doğru cevap tekil bir kişi ismi olarak eksiksiz yer almalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir kapasite/eşleşme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli tam dağılımı eksik veya kapasiteyi taşırtarak kuran öğrencinin o grupta sanacağı adaylar olmalıdır
        - Her çeldiricide yalnızca tekil kişi adı yer almalı; o kişinin yeri 'kesin'miş gibi bir tuzak kurulmalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler tekil kişi/varlık adı formatında olsun
        - Her seçenekte yalnızca bir bireyin adı yer alsın
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci tüm gizli tam dağılımı (ve kontenjanları) kurmadan doğru kişiyi bulabilir mi?
        - Tek bir madde doğru cevabı (kişinin grubunu) ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Şıklardan biri maddelerde grubu açıkça verilen kişiyi tekrar ediyor mu?
        - Her şıkta yalnızca tek bir bireyin adı yer alıyor mu?
        - Koşullar gerçekten yalnızca o kişinin yerini kesin olarak kilitliyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

