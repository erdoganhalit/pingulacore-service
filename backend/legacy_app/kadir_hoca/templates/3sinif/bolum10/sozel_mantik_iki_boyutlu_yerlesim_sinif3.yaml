# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi gizli iki boyutlu yerleşim planını tamamen ya da
    büyük ölçüde kurmaya zorlamalıdır. Doğru cevap; tek bir koşuldan, iki koşulun
    hızlı birleşiminden veya yüzeysel elemeden bulunamamalı; ancak satır-sütun,
    kat-daire, üst-alt, sağ-sol, karşısı ve numaralı birim ilişkileri birlikte
    değerlendirildikten sonra sorulan konum için hangi adayın mümkün ya da imkânsız
    olduğu anlaşılmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca iki boyutlu yerleşim sorusuna uygun bir plan bağlamı seç.
        Örnek alanlar:
        - apartman kat-daire planı
        - sınıf sıra oturma planı
        - otel kat-oda planı
        - sergi stant yerleşimi
        - kamp alanı çadır-parsel planı
        - ofis odacık planı

    - step: 2
      action: "Öğeleri ve gizli doğru planı kur"
      details: |
        - Önce 3 kişi/nesne/varlık belirle
        - Sonra 4-8 birimlik iki boyutlu planı belirle
        - Tüm öğeleri bu plana tek doğru yerleşim oluşturacak şekilde yerleştir
        - Bu plan, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm yerleşim kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü, tam planı değil; belirli bir konumda hangi adayın
        bulunabileceğini ya da bulunamayacağını sormalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - belirtilen yerde bulunabilir
        - belirtilen yerde bulunamaz
        - belirtilen odada olabilir
        - belirtilen dairede oturabilir
        - verilen birimde bulunamaz

    - step: 4
      action: "Koşulları gizli plandan türet"
      details: |
        - 3 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru aday doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde plan yeterince kurulmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar, hedeflenen soru köküne göre yalnızca bir doğru cevap üretmelidir
        - Koşullar ağırlıklı olarak iki boyutlu yön ve konum ilişkisi içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede planın çerçevesini tanıt
        - Kaç kat/oda/satır/sütun/birim olduğu anlaşılır olsun
        - Kimlerin/nelerin yerleştirileceği net olsun
        - Bağlam sade, öğrenciye yakın ve plan-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, sorulan konum için mümkün ya da imkânsız olan tek aday olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli planı kurmadan bu adaya ulaşamamalıdır
        - Doğru seçenek kişi/nesne adı biçiminde olmalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli planı eksik veya yanlış kuran öğrencinin düşebileceği yanlış adaylar olmalıdır
        - Çeldiriciler, yön ilişkilerini karıştırma, numaralı birimi yanlış okuma, kalan yerleri yanlış tamamlama gibi hatalara dayanmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler tekil kişi/nesne adı biçiminde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci gizli planı kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Yanlış şıklardan biri tek bir maddeyle eleniyor mu?
        - Sorulan konum için yalnızca bir aday mı mümkün ya da imkânsız?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

