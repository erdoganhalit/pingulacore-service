# bolum6/sozel_mantik_iki_boyutlu_yerlesim_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 kişi/nesne seçeneği
# Bu sürüm yalnızca "iki boyutlu yerleşim sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_iki_boyutlu_yerlesim_sinif3"
  ad: "3. Sınıf Sözel Mantık - İki Boyutlu Yerleşim"
  sinif_seviyesi: 3
  aciklama: "Kişi, nesne veya varlıkları satır-sütun, kat-daire, üst-alt, sağ-sol ve karşılık ilişkileri içeren iki boyutlu bir plana yerleştirerek gizli yerleşimi bulma ve buna göre çıkarım yapma"
  frequency: "High (~12 questions)"

iki_boyutlu_yerlesim_senaryolari:
  - ad: "apartman_kat_daire_plani"
    aciklama: "Kişilerin çok katlı bir apartmandaki dairelere yerleştirilmesi"
    ornek_setup: "Üç katlı bir apartmanda her katta iki daire bulunmaktadır ve üç kişi bu dairelerde oturmaktadır."

  - ad: "otel_kat_oda_plani"
    aciklama: "Misafirlerin kat ve oda düzenine göre yerleştirilmesi"
    ornek_setup: "İki katlı küçük bir otelde her katta üç oda vardır ve üç misafir bu odalara yerleştirilecektir."

  - ad: "yurt_kat_oda_plani"
    aciklama: "Öğrencilerin kat ve oda planına göre yerleştirilmesi"
    ornek_setup: "Bir öğrenci yurdunda iki katta yer alan odalara öğrenciler belirli kurallara göre yerleştirilecektir."

  - ad: "sinif_sira_oturma_plani"
    aciklama: "Öğrencilerin satır ve sütun düzenindeki sıralara yerleştirilmesi"
    ornek_setup: "Bir sınıfta iki sıra ve üç sütundan oluşan oturma planına öğrenciler yerleştirilecektir."

  - ad: "kutuphane_calisma_masalari_plani"
    aciklama: "Öğrencilerin kütüphanedeki masa düzenine göre yerleştirilmesi"
    ornek_setup: "Bir kütüphanede karşılıklı yerleştirilmiş çalışma masalarına öğrenciler belirli kurallara göre oturacaktır."

  - ad: "sergi_stant_yerlesimi"
    aciklama: "Sergi ürünlerinin satır-sütun düzenindeki stantlara yerleştirilmesi"
    ornek_setup: "Bir sergi alanındaki numaralanmış stantlara farklı ürünler belirli kurallara göre yerleştirilecektir."

  - ad: "muzede_salon_vitrin_plani"
    aciklama: "Eserlerin salon ve vitrin düzeni içinde yerleştirilmesi"
    ornek_setup: "Bir müzedeki iki salonun karşılıklı vitrinlerine eserler belirli kurallara göre yerleştirilecektir."

  - ad: "gemi_kabin_yerlesimi"
    aciklama: "Yolcuların güverte ve kabin düzenine göre yerleştirilmesi"
    ornek_setup: "Bir gemide iki güvertede yer alan kabinlere yolcular belirli kurallara göre yerleştirilecektir."

  - ad: "hastane_kat_oda_yerlesimi"
    aciklama: "Hastaların oda planına göre yerleştirilmesi"
    ornek_setup: "Bir hastanenin iki katındaki odalara hastalar belirli kurallara göre yerleştirilecektir."

  - ad: "kamp_alani_cadir_parsel_plani"
    aciklama: "Çadırların satır-sütun biçimindeki kamp alanına yerleştirilmesi"
    ornek_setup: "Bir kamp alanındaki numaralanmış çadır yerlerine kampçılar belirli kurallara göre yerleştirilecektir."

  - ad: "otopark_kat_bolme_plani"
    aciklama: "Araçların kat ve park bölmesi düzenine göre yerleştirilmesi"
    ornek_setup: "İki katlı bir otoparkta araçlar numaralanmış bölmelere belirli kurallara göre park edilecektir."

  - ad: "posta_kutusu_blok_plani"
    aciklama: "Posta kutularının kat ve sütun düzenine göre yerleştirilmesi"
    ornek_setup: "Bir apartman girişindeki posta kutuları iki sütunlu ve çok sıralı bir düzende yer almaktadır."

  - ad: "bilim_merkezi_deney_masasi_plani"
    aciklama: "Deney malzemelerinin laboratuvar masalarına yerleştirilmesi"
    ornek_setup: "Bir bilim merkezindeki deney masaları iki satır ve üç sütunluk bir düzende yer almaktadır."

  - ad: "hayvan_bakim_merkezi_kafes_plani"
    aciklama: "Hayvanların kafes planına göre yerleştirilmesi"
    ornek_setup: "Bir bakım merkezindeki kafesler iki kat ve üç sütunluk bir düzende sıralanmıştır."

  - ad: "uzay_istasyonu_modul_plani"
    aciklama: "Astronotların ya da modüllerin çok katlı yerleşim planına göre yerleştirilmesi"
    ornek_setup: "Bir uzay istasyonunda iki seviyede bulunan modüllere astronotlar belirli kurallara göre yerleştirilecektir."

  - ad: "tiyatro_localari_plani"
    aciklama: "İzleyicilerin alt-üst ve sağ-sol ilişkili loca düzenine yerleştirilmesi"
    ornek_setup: "Bir tiyatrodaki localar alt ve üst bölümde karşılıklı yer almakta ve izleyiciler bu localara yerleştirilmektedir."

  - ad: "ofis_odacik_plani"
    aciklama: "Çalışanların ofis bölmelerine yerleştirilmesi"
    ornek_setup: "Bir ofisteki çalışma bölmeleri satır ve sütun düzenine göre numaralanmıştır ve çalışanlar bu bölmelere yerleştirilecektir."

  - ad: "fidanlik_saksi_raf_plani"
    aciklama: "Saksıların çok katlı raf düzeninde yerleştirilmesi"
    ornek_setup: "Bir fidanlıktaki saksılar iki katlı raf sisteminde belirli kurallara göre yerleştirilecektir."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 kişi/nesne seçeneğinden oluşan iki boyutlu yerleşim sorusu"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, satır-sütun, kat-daire, üst-alt, sağ-sol, karşısı ve numaralı
      birim ilişkileri içeren iki boyutlu bir yerleşim planını verilen koşullardan
      hareketle kurması gerekir. Koşullar planı doğrudan doldurmamalı; öğrenci bazı
      yerleşimleri mantıksal çıkarımla tamamlamalı ve sonunda sorulan konumda kimin
      bulunabileceğini ya da bulunamayacağını belirlemelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Yerleşim planının türünü, kaç satır-sütun / kat-daire / oda-birim içerdiğini ve hangi kişi/nesne/varlıkların yerleştirileceğini tanıtır"
      - "Kurgu kişi-merkezli, nesne-merkezli veya varlık-merkezli olabilir; ancak açıkça iki boyutlu bir plan içermelidir"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu yerleşim planıyla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru yerleşim planı kurulmalı; ardından yalnızca bu plana götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar planı satır satır veya kat kat doğrudan doldurmamalıdır"
      - "Maddeler, gizli yerleşimin yalnızca bazı parçalarını, yön ilişkilerini veya dışlamalarını vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle eksik yerleşimleri kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan konumda kimin bulunabileceği ya da bulunamayacağı açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli yerleşim planı büyük ölçüde kurulabilir olmalı; şıklar planı kurdurmamalı, kurulmuş plan üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak iki boyutlu konum ilişkisi içermelidir"
      - "Öncelikli ilişki türleri: üstünde/altında, sağında/solunda, karşısında, aynı katta, farklı katta, aynı sütunda, aynı satırda, belirli numaralı yerde bulunma, tek/çift numaralı birimde bulunma, iki birim arasında belirli sayıda oda/daire/birim bulunması"
      - "Tek bir maddeyle doğrudan tam yerleşim veren açık plan cümleleri kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca alt alta adları yazıp mekanik eşleme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir ara yerleşim kurup sonra bunu diğer yön ilişkileriyle birleştirmesini gerektirmelidir"
      - "Planın bazı parçaları doğrudan verilebilir; ancak sorulan konumdaki aday mutlaka düşünerek bulunmalıdır"

      - "3. sınıf seviyesinde 3 kişi/nesne/varlık ve 4-6 birimlik yerleşim planları tercih edilmelidir (örn: 2 kat × 2-3 oda)"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Plan birimleri somut ve anlaşılır olmalıdır: kat, daire, oda, sıra, sütun, masa, kabin, vitrin, bölme, modül vb."
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'üstünde' ve 'altında', 'sağında' ve 'solunda', 'karşısında' ve 'yanında' gibi kavramlar net ayrılmalıdır"
      - "Numaralı birimler kullanılıyorsa numaralandırma sistemi belirsizlik taşımamalıdır"
      - "Koşullar yalnızca iki boyutlu planı kurmaya ve sorulan konumu test etmeye hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: üst-alt veya sağ-sol ilişkisi"
        - "1 madde: karşısı / aynı satır / aynı sütun ilişkisi"
        - "1 madde: numaralı yer, tek-çift numara veya belirli birim bilgisi"
        - "Gerekirse 1 madde: iki birim arasında mesafe ya da çapraz konum bağı"
      yasaklar:
        - "Her kişi/nesnenin yerini tek tek tarif eden koşullar yazma"
        - "Koşulları planı satır satır dolduracak biçimde dizme"
        - "Tek bir kişiyi birden fazla yön ilişkisiyle tamamen çözen açık koşullar yazma"
        - "Koşulları soldan sağa veya yukarıdan aşağıya çözüm şeması gibi dizme"
        - "Tek bir maddeyle doğru seçeneğin kesinleşmesine yol açma"

  visual:
    required: true
    description: "İki boyutlu yerleşim planını simgeleyen boş kat/oda ızgarası veya plan şeması"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "2 kat × 2-3 oda boş ızgara planı sembolü"
      - "kat-daire bölmeli bina kesiti şeması (içi boş)"
      - "satır-sütun numaralı boş hücre planı"
    kurallar:
      - "Görsel senaryo içeriğini (kişileri, nesneleri veya konumlarını) tasvir etmemelidir"
      - "Görsel yalnızca soru tipini simgeleyen soyut/sembolik bir ikon veya şema olmalıdır"
      - "Görsel bulmacayı çözmede ipucu vermemeli; doğru cevabı ima etmemelidir"
      - "Görsel sade, temiz ve dikkat dağıtmayan bir ikon olmalıdır"
      - "Görsel içinde kişi adı, konum bilgisi veya bulmacaya ait sayısal veri bulunmamalıdır"
      - "Tablo veya ızgara görseli kullanılacaksa hücreler boş ya da soru işaretli olmalıdır"
    yasaklar:
      - "Senaryo sahnesi — kişileri, nesneleri veya konumlarını gösteren illüstrasyon"
      - "Bulmacadaki sıra, yerleşim veya eşleşmeleri ele veren gerçekçi tasvir"
      - "Fotoğraf benzeri sahne görüntüsü"
      - "Puzzle içeriğine dair somut nesne görseli (sandalye, masa, kişi silueti vb.)"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli iki boyutlu yerleşim planını kurmaya ve ardından
      belirli bir konumda hangi kişi ya da nesnenin bulunabileceğini veya
      bulunamayacağını seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli plan yeterince kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak belirli bir konumdaki adayın olabilirliğini sorgulamalıdır"
      - "Tercihen 'hangi kişi belirli odada bulunabilir', 'hangi kişi belirli yerde bulunamaz', 'hangi kişi belirtilen dairede oturabilir' türünde kökler kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir yön bilgisini okumaya değil, kurulmuş gizli planı yorumlamaya yöneltmelidir"


  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 6
    style: "single_entity"
    correct_count: 1
    kurallar:
      - "Her seçenek tek bir kişi, nesne veya varlık adı olmalıdır"
      - "Seçeneklerde tam yerleşim planı verilmemelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır; hepsi kişi/nesne adı biçiminde yazılmalıdır"
      - "Seçenekler, soruda belirtilen konumda bulunma ihtimali test edilen adayları temsil etmelidir"
      - "Doğru seçenek, belirtilen konumda bulunabilen ya da bulunamayan tek aday olmalıdır"
      - "Hiçbir seçenek doğrudan bir koşul cümlesinin içinden kopyalanmış ipucu gibi öne çıkmamalıdır"
      - "Seçenekler biçimsel olarak dengeli olmalıdır"
      - "Doğru cevap uzunluk, vurgu veya özel ifade nedeniyle ayırt edilmemelidir"
      - "Doğru seçenek, tek bir koşulla doğrudan doğrulanabilir olmamalıdır"
      - "Yanlış seçenekler, gizli plan yanlış kurulduğunda makul görünebilmelidir"

# ═══════════════════════════════════════════════════════════════
      # SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi belirtilen yerde <u>bulunabilir</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi belirtilen yerde <u>bulunamaz</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi belirtilen odada <u>olabilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi belirtilen dairede <u>oturabilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi belirtilen konumda <u>yer alabilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi verilen birimde <u>bulunamaz</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi belirtilen numaralı yerde <u>yer alabilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi belirtilen bölümde <u>bulunabilir</u>?</b>"

# ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli iki
    boyutlu yerleşim planı kurulduktan sonra, soruda belirtilen konumda
    bulunabilen ya da bulunamayan tek kişi/nesnedir. Öğrenciden tek bir ipucuna
    dayanarak değil, tüm maddeleri analiz ederek hangi adayın belirtilen yerde
    yer alabileceğini veya alamayacağını bulması beklenir.

  temel_ilke: >
    Gizli yerleşim planı kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak belirtilen konum için mümkün ya da imkânsız hâle gelen
    aday olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara yerleşimler ve olası planlar üzerinden değerlendirme yapılmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce gizli iki boyutlu planı tamamen ya da büyük ölçüde kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; gizli planın zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: belirtilen konumda KESİNLİKLE bulunabilen tek kişi/nesne olmalıdır"
    - "Negatif köklerde doğru cevap: belirtilen konumda KESİNLİKLE bulunamayan tek kişi/nesne olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, bir maddede açıkça verilen kişi-konum ilişkisinin doğrudan tekrarına dönüşmemelidir"
    - "Doğru cevap 1-6 kelime arasında olmalıdır"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli plan kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen kişi/konum ilişkisinin doğrudan tekrarına dönüşmesi"
    - "Birden fazla seçeneğin soruda belirtilen konum için eşit derecede mümkün ya da imkânsız olması"
    - "Doğru cevabın tüm planı açık eden kapsamlı bir açıklama biçiminde yazılması"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli iki boyutlu plan kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Diğer seçeneklerin de aynı konum için mümkün ya da imkânsız olma ihtimali kalıyor mu?"

# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel adaylar olmamalıdır. Her yanlış seçenek, öğrencinin gizli iki boyutlu
    yerleşim planını kurarken yapabileceği bütünsel bir muhakeme hatasının sonucu
    olmalıdır. Öğrenci yanlış bir ara plan kurarsa ya da bir adayın belirtilen
    konumda bulunabileceğini/bulunamayacağını gereğinden erken kesinleştirirse,
    bu şıklardan birini işaretlemeye yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif gizli yerleşim planının sonucu olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı aday olmalıdır"
    - "Çeldirici, tüm plan kurulmadan değil; yanlış plan kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış yerleşim yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru plan ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış aday yazmak değil; yanlış kurulmuş planda belirtilen yerde olabilir ya da olamaz gibi görünen makul aday yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli iki boyutlu yerleşim planını kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış yerleşim planı veya yanlış kesinleştirme kurgusu tasarla."
    - "3. Her yanlış kurgu, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış kurguların sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldirici, soruda belirtilen konum için 'bulunabilir / bulunamaz' sorusuna makul ama hatalı aday vermelidir."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış iki boyutlu yerleşim mantığına dayanmalıdır"
    - "Bazı çeldirici türleri tek başına yeterince güçlü olmayabilir; bu türler başka bir yanlış yerleşim stratejisiyle birlikte kullanılmalıdır"
