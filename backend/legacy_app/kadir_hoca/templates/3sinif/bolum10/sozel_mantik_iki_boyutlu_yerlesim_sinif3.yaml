    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış yerleşim sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca rastgele seçilmiş başka bir kişi/nesne ile değiştirilmiş hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek tek bir kişi/nesne/varlık adı biçiminde olmalıdır"

  stratejiler:
    - ad: "UST_ALT_YON_HATASI"
      bilisssel_hata_kategorisi: "yon_hatasi"
      aciklama: "Öğrenci üstte-altta ilişkisini ters ya da eksik yorumladığı için yanlış adayın belirtilen konumda olabileceğini düşünür"
      nasil_olusturulur: |
        Bir kişinin başka bir kişinin üstünde/altında olma bilgisini yanlış taşıyan
        alternatif bir plan kur. Bu yanlış planda, sorulan konum için makul görünen
        ama tüm koşullar kontrol edildiğinde mümkün olmayan bir adayı çeldirici yap.

    - ad: "SAG_SOL_VE_KARSI_ILISKISINI_KARISTIRMA"
      bilisssel_hata_kategorisi: "iliski_hatasi"
      aciklama: "Öğrenci sağ-sol ve karşısı ilişkilerini birbirine karıştırır"
      nasil_olusturulur: |
        Özellikle karşısında, sağında, solunda, aynı sütunda veya aynı satırda olma
        bilgilerini yanlış birleştiren alternatif bir plan kur. Çeldirici, bu yanlış
        yön okuması sonucu belirtilen yerde bulunabilir gibi görünen adaya dayanmalıdır.

    - ad: "NUMARALI_BIRIMI_YANLIS_OKUMA"
      bilisssel_hata_kategorisi: "birim_okuma_hatasi"
      aciklama: "Öğrenci numaralı yer, tek/çift numara ya da oda-birim dizisini yanlış yorumlar"
      nasil_olusturulur: |
        Belirli numaralı yer, tek/çift numaralı birim veya daire/oda numarası bilgisi
        içeren koşullarda, numaralandırmayı yanlış okuyan bir öğrencinin kuracağı planı
        tasarla. Çeldirici, ilk bakışta mantıklı görünen ama plan şeması doğru okununca
        bozulması gereken adaya dayanmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince
        bozulması gereken yanlış bir yerleşim planı kur. Çeldirici, öğrencinin ara
        çıkarımı yapıp sonraki mantıksal taşıma adımını atlaması sonucu yanlış adayın
        belirtilen yerde olabilir ya da olamaz görünmesine dayanmalıdır.
      kullanim_notu: >
        Bu strateji tek başına kullanıldığında çeldirici zayıf kalabilir. Bu nedenle
        tek başına ana çeldirici olarak kullanılmamalı; "UST_ALT_YON_HATASI",
        "SAG_SOL_VE_KARSI_ILISKISINI_KARISTIRMA", "NUMARALI_BIRIMI_YANLIS_OKUMA" veya
        "KALAN_YERLERI_YANLIS_TAMAMLAMA" gibi daha güçlü bir yanlış yerleşim
        stratejisini destekleyici biçimde kullanılmalıdır.
      tek_basina_kullanilabilir: false
      birlikte_kullan:
        - "UST_ALT_YON_HATASI"
        - "SAG_SOL_VE_KARSI_ILISKISINI_KARISTIRMA"
        - "NUMARALI_BIRIMI_YANLIS_OKUMA"
        - "KALAN_YERLERI_YANLIS_TAMAMLAMA"

    - ad: "KALAN_YERLERI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci planın büyük kısmını doğru kurar; fakat kalan boş birimleri yanlış kapatıp yanlış adayı mümkün sanır"
      nasil_olusturulur: |
        Gizli planın çoğunu doğru tut; ancak son 1-2 birim için tüm olasılıkları
        kontrol etmeden yanlış bir tamamlama yap. Çeldirici, bu yanlış tamamlama
        sonucunda sorulan yerde bulunabilir ya da bulunamaz gibi görünen adaya dayanmalıdır.

    - ad: "MESAFE_VE_ARADAKI_BIRIM_HATASI"
      bilisssel_hata_kategorisi: "mesafe_hatasi"
      aciklama: "Öğrenci iki kişi/nesne arasında bulunan oda, daire veya birim sayısını yanlış kurar"
      nasil_olusturulur: |
        'Aralarında bir oda vardır', 'iki daire arasında bulunur' gibi koşullarda
        mesafeyi yanlış taşıyan alternatif bir plan kur. Bu yanlış kurgu sonucunda
        sorulan yerde uygunmuş gibi görünen adayı çeldirici yap.

    - ad: "NEGATIF_KOKTE_MUMKUN_ADAYI_YANLIS_SECME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci kökün yönünü karıştırdığı için bulunamayan aday yerine bulunabileni ya da tersini seçer"
      nasil_olusturulur: |
        Eğer soru kökü 'bulunamaz' türündeyse, sorulan yerde gerçekten bulunabilen
        ama ilk bakışta yasaklı gibi görünen bir adayı çeldirici yap. Eğer kök
        'bulunabilir' ise, birkaç koşulla çelişen ama yüzeyde uygun görünen bir adayı kullan.
        Bu çeldirici, okuma yönü ve olabilirlik karışıklığına dayanmalıdır.

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak aday üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
