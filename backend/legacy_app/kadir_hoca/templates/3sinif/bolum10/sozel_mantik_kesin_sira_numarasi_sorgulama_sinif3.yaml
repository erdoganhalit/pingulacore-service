    - "Maddeler birbirini tekrar etmiyor mu?"
    - "Koşullar arasında çelişki yok mu?"
    - "Koşullar tabloyu tamamen kilitlemeden, istenen ihtimalleri (belirsizlikleri) yaratıyor mu?"
