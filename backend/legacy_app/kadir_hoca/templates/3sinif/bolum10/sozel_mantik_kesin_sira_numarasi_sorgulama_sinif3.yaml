    # ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
    # ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi tüm gizli dizilimi ve bu dizilimdeki olasılıkları
    (yer değiştirebilen belirsizleri ve kilitlenmiş sabit konumları) kurmaya zorlamalıdır.
    Doğru cevap; tek bir koşuldan, iki koşulun hızlı birleşiminden veya yüzeysel
    elemeden bulunamamalı; ancak tüm blokların ve kişilerin sıradaki ihtimalleri
    hesaplandıktan sonra KESİNLEŞEN (veya belirsizleşen) sıra numaraları olarak ortaya çıkmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca doğrusal sıra numarası sorgulamaya uygun bir dizilim bağlamı seç.
        Örnek alanlar:
        - geçit töreni sırası
        - uzay mekiği fırlatma sırası
        - define haritası durakları
        - otonom araç konvoyu
        - drone kalkış sırası

    - step: 2
      action: "Kişileri ve gizli ihtimal/dizilim tablosunu kur"
      details: |
        - Önce sıraya girecek 5-6 bireyi/varlığı belirle (1'den 5'e/6'ya kadar).
        - Sonra bunları sıraya dizerken BİLEREK bazılarını sabit (kilitli) bırak, bazılarını kendi arasında yer değiştirebilir (ihtimalli) yap.
        - Bu olasılık tablosu, sorunun görünmeyen çözüm haritası olmalıdır.
        - Soru yazımına geçmeden önce hangi sıra numaralarının kesin, hangilerinin belirsiz olduğu netleşmiş olmalıdır.

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü, kimin nerede olduğunu değil, hangi sıranın/konumun statüsünü sormalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - hangi sıra numaralarındaki kişilerin yerleri kesin olarak bilinebilir
        - hangi konumlarda kimin olduğu kesin olarak söylenemez (bilinemez)

    - step: 4
      action: "Koşulları gizli ihtimal tablosundan türet"
      details: |
        - 3 madde oluştur.
        - Her madde farklı bilgi taşımalı (Blok, mesafe, yön vb.).
        - Koşullar birbirini tekrar etmemeli.
        - Hiçbir madde tek başına doğru cevaptaki sıra numarasını vermemeli.
        - İki madde birleşince tablonun tüm olasılıkları doğrudan görünür olmamalı.
        - Koşullar ancak birlikte değerlendirildiğinde kilitli ve belirsiz sıraları ortaya çıkarmalıdır.
        - Koşullar arasında çelişki olmamalıdır.
        - Koşullar, tabloyu tek bir mutlak sıraya KİLİTLEMEMELİDİR (Yer değiştirenler mutlaka kalmalıdır).

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede dizilimin çerçevesini tanıt.
        - Kimlerin sıralandığı ve sıranın yönü/numaraları (Örn: 1'den 4'e kadar) net anlaşılsın.
        - Bağlam sade, öğrenciye yakın ve konum-merkezli olsun.

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek KESİNLİKLE SIRA NUMARASI (Örn: 2. ve 4. sıra) formatında olmalıdır. Şıkka kişi adı yazılamaz.
        - Doğru cevap, kurulan ihtimal tablosunun kilitlediği (veya belirsiz bıraktığı) numaraların zorunlu sonucu olmalıdır.
        - Öğrenci yer değiştirebilen blokları fark etmeden bu numaralara ulaşamamalıdır.

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir olasılık hesaplama hatasına (Örn: Olasılığı kesinlik sanma, kaymayı unutma) dayanmalıdır.
        - Tek bir maddeden hemen elenmemelidir.
        - Çeldiriciler, gizli tablodaki ihtimalleri yanlış yorumlayan öğrencinin işaretleyeceği mantıklı "sıra numaralarından" oluşmalıdır.
        - Her çeldirici, doğru cevapla aynı yapıda (Örn: X. ve Y. sıra) olmalıdır.

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala.
        - Tüm seçenekler yalnızca sıra/konum numarası formatında olsun.
        - Doğru cevap biçimsel olarak öne çıkmasın.
        - Uzunluk, ton ve yapı bakımından şıklar tamamen dengeli olsun.

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci tüm ihtimalleri ve yer değiştirmeleri hesaplamadan doğru sıra numaralarını bulabilir mi?
        - Tek bir madde doğru cevaptaki sıra numarasını ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Şıklardan birine yanlışlıkla kişi/varlık adı yazılmış mı? (Yazılmamalı).
        - Koşullar gerçekten tabloyu istenen noktalarda kilitliyor ve istenen noktalarda ihtimalli bırakıyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

