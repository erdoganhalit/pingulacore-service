# bolum6/sozel_mantik_kesin_sira_numarasi_sorgulama_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 sıra/konum numarası seçeneği
# Bu sürüm yalnızca "kesin bilinen/bilinmeyen sıra numaraları sorgulama" kalıbı içindir.

meta:
  id: "sozel_mantik_kesin_sira_numarasi_sorgulama_sinif3"
  ad: "3. Sınıf Sözel Mantık - Kesin Sıra Numarası Sorgulama"
  sinif_seviyesi: 3
  aciklama: "Kişi veya varlıkların doğrusal bir sıraya (1., 2., 3. vb.) dizildiği durumlarda; kimin nerede olduğundan ziyade, verilen koşullara göre hangi sıra numaralarındaki (konumlardaki) öğelerin kesin olarak bilindiğini veya bilinemediğini bulma"
  frequency: "High (~12 questions)"

kesin_sira_sorgulama_senaryolari:
  - ad: "gecit_toreni_sirasi"
    aciklama: "Kortej yürüyüşündeki farklı grupların geçiş sırasının numaralandırılması"
    ornek_setup: "Bahar şenliği geçit töreninde bando, akrobatlar ve maskotlar 1'den 3'e kadar numaralandırılmış bir sırayla yürüyecektir."

  - ad: "uzay_mekigi_firlatma_sirasi"
    aciklama: "Farklı gezegenlere gidecek araştırma mekiklerinin fırlatma rampasından kalkış sırası"
    ornek_setup: "Uzay üssündeki üç farklı keşif mekiği, art arda 1'den 4'e kadar belirlenmiş bir sırayla fırlatılacaktır."

  - ad: "teleferik_kabin_sirasi"
    aciklama: "Zirveye doğru arka arkaya hareket eden teleferik kabinlerinin konum numaraları"
    ornek_setup: "Zirveye tırmanan bir teleferik hattında kırmızı, mavi ve yeşil kabinler art arda sıralanmıştır."

  - ad: "bayrak_yarisi_kosuculari"
    aciklama: "Bayrak yarışında koşucuların bayrağı devralma sırası (1. koşucu, 2. koşucu vb.)"
    ornek_setup: "Bir bayrak yarışında okul takımındaki üç sporcu, 1'den 4'e kadar belirlenmiş sıralarda koşacaktır."

  - ad: "define_haritasi_duraklari"
    aciklama: "Bir maceradaki numaralandırılmış keşif duraklarına varış sırası"
    ornek_setup: "Bir define avında kaşifler; Mağara, Şelale ve Ulu Ağaç duraklarından 1'den 3'e kadar numaralanmış bir sırayla geçecektir."

  - ad: "ejderha_binicileri_ucus_sirasi"
    aciklama: "Fantastik bir evrende ejderha binicilerinin kanyondan geçiş sırası"
    ornek_setup: "Ejderha binicisi üç çırak, dar bir kanyondan 1'den 4'e kadar uzanan doğrusal bir kuyruk halinde geçmektedir."

  - ad: "drone_gosterisi_kalkis_sirasi"
    aciklama: "Işık gösterisi yapacak farklı drone takımlarının sahaya çıkış sırası"
    ornek_setup: "Bir teknoloji festivalinde üç farklı drone takımı, gösteri alanına 1. sıradan 4. sıraya kadar art arda havalanarak girecektir."

  - ad: "denizalti_dalis_sirasi"
    aciklama: "Okyanus çukuruna inen araştırma denizaltılarının dalış sırası"
    ornek_setup: "Mariana Çukuru'na inen üç farklı araştırma denizaltısı, art arda numaralandırılmış bir dalış sırası izlemektedir."

  - ad: "antik_tuzak_gecis_sirasi"
    aciklama: "Maceracıların dar bir koridordaki tek sıra halindeki dizilimi"
    ornek_setup: "Antik bir tapınakta ilerleyen üç maceracı, tuzaklı koridoru 1'den 4'e kadar numaralanmış tek bir sıra halinde geçmektedir."

  - ad: "dagci_tırmanis_hatti"
    aciklama: "Aynı güvenlik ipine bağlı olarak tırmanan dağcıların sırası"
    ornek_setup: "Buzul tırmanışı yapan üç dağcı, aynı emniyet ipine 1'den 4'e kadar belirli bir sırayla bağlanmıştır."

  - ad: "siber_veri_aktarim_sirasi"
    aciklama: "Farklı veri paketlerinin ana sunucuya ulaşma sırası"
    ornek_setup: "Bir siber güvenlik ağında şifrelenmiş üç farklı veri paketi, ana sunucuya 1'den 4'e kadar numaralanmış bir sırayla ulaşmıştır."

  - ad: "buyulu_iksir_malzeme_sirasi"
    aciklama: "Bir kazana sırayla atılan malzemelerin eklenme adımları (1. adım, 2. adım vb.)"
    ornek_setup: "Bir büyücü çırağı, iksir kazanına üç farklı malzemeyi 1. sıradan 4. sıraya kadar belirli bir düzenle eklemektedir."

  - ad: "otonom_arac_konvoyu"
    aciklama: "Sürücüsüz araçların akıllı bir köprüden geçiş sırası"
    ornek_setup: "Test aşamasındaki üç otonom araç, dar bir köprüden 1'den 4'e kadar doğrusal bir konvoy halinde geçmektedir."

  - ad: "mars_kolonisi_inis_sirasi"
    aciklama: "Mars'a iniş yapan destek kapsüllerinin iniş sırası numaraları"
    ornek_setup: "Mars yörüngesindeki üç farklı kargo kapsülü, gezegen yüzeyine 1. sıradan 4. sıraya kadar art arda iniş yapmıştır."

  - ad: "zaman_kapsulu_acilis_sirasi"
    aciklama: "Farklı yıllara ait zaman kapsüllerinin törenle açılış sırası"
    ornek_setup: "Tarih müzesinde bulunan üç farklı zaman kapsülü, 1'den 4'e kadar belirlenmiş bir sırayla açılacaktır."

  - ad: "lunapark_hiz_treni_koltuklari"
    aciklama: "Hız trenindeki vagonların veya numaralı koltukların baştan sona sıralanışı"
    ornek_setup: "Bir lunaparktaki hız trenine binen üç arkadaş, önden arkaya doğru 1'den 4'e kadar numaralanmış koltuklara oturmuştur."

  - ad: "penguen_atlama_sirasi"
    aciklama: "Buzuldan suya art arda atlayan penguenlerin sırası"
    ornek_setup: "Bir belgesel çekiminde, işaretlenmiş üç penguen buzuldan suya 1'den 4'e kadar ardışık bir sırayla atlamıştır."

  - ad: "robot_kopek_devriye_sirasi"
    aciklama: "Fabrika devriyesine çıkan robot köpeklerin tek sıra halindeki dizilimi"
    ornek_setup: "Güvenlik amaçlı kullanılan üç robot köpek, fabrika çevresinde 1. sıradan 4. sıraya kadar tek sıra halinde devriyeye çıkmıştır."

  - ad: "okculuk_turnuvasi_atis_sirasi"
    aciklama: "Okçuların hedefe atış yapmak için dizildikleri numaralı sıra"
    ornek_setup: "Okçuluk turnuvası finalindeki üç sporcu, hedefe atış yapmak üzere 1'den 4'e kadar numaralanmış atış sırasına girmiştir."

  - ad: "kardan_adam_dizilimi"
    aciklama: "Bahçeye yan yana dizilen kardan adamların soldan sağa konum numaraları"
    ornek_setup: "Çocukların bahçeye yaptığı üç farklı kardan adam, soldan sağa doğru 1'den 4'e kadar numaralandırılmış bir düzende dizilmiştir."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten (yalnızca sıra numarası içeren) oluşan kesin sıra sorgulama sorusu"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, doğrusal bir dizilime yerleştirilen kişilerle/varlıklarla ilgili verilen
      ilişkisel koşulları değerlendirerek, sıranın hangi konumlarının (numaralarının) kesin olarak dolduğunu
      veya hangilerinin kendi içinde yer değiştirme ihtimali taşıdığını (belirsiz kaldığını) mantıksal
      çıkarımla bulması gerekir. Odak "kimin nerede olduğu" değil, "hangi konumların statüsüdür".

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Sıralamanın neye ait olduğunu açıklar; dizilimin boyutu (örn: 1'den 4'e kadar) ve yönü/yapısı tanıtılır"
      - "Kurgu sıra numarası ve konum merkezli olmalıdır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu sıralamayla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli sıralama senaryosu (yer değiştirebilen belirsizlerle birlikte) kurulmalı; ardından yalnızca bu olasılık tablosuna götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar sıralamanın tamamını eksiksiz ve tek ihtimalli olarak kapatmamalıdır; tabloda mutlaka kendi içinde yer değiştirebilen (belirsiz) kişiler veya boşluklar bırakılmalıdır"
      - "Maddeler, konumların yalnızca bazılarını kilitlerken diğerlerini ihtimalli (olasılıklı) bırakmalıdır"
      - "Öğrenci, verilen ilişkilerden hareketle hangi numaralı sıraların kesinleştiğini ve hangilerinin bilinemediğini tespit etmek zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan sıra numaralarının kesinliği veya belirsizliği açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce hangi sıraların kilitlendiği bulunabilir olmalı; şıklar tabloyu kurdurmamalı, kurulmuş ihtimal tablosu üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre (kesin bilinen veya bilinemeyen sıralar) yalnızca tek bir doğru seçenek üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak göreli ilişki içermelidir (önce/sonra, aralarında X kişi var, hemen arkasında vb.)"
      - "Doğrudan mutlak konum bilgisi (Örn: 'Ali 3. sıradadır' veya 'Son sırada Ayşe vardır') KESİNLİKLE kullanılmamalı veya en fazla 1 madde içinde, dolaylı olarak verilmelidir"
      - "Koşulların çoğu doğrudan numara vermek yerine kişiler arası mesafe veya blok ilişki (zincir) kurmalıdır"
      - "Koşullar, öğrencinin yalnızca alt alta yazarak mekanik yerleştirme yapacağı kadar kapalı (tek ihtimalli) olmamalıdır"
      - "En az 2 koşul, dolaylı çıkarım gerektirmelidir; yani bir mesafe koşulu, sıranın başı/sonu boşluklarıyla birleşmeden tam yerine oturamamalıdır"
      - "En az 1 koşul, öğrencinin bir ikiliyi/üçlüyü sıraya yerleştirirken ihtimalleri daraltmasını ama tamamen kapatmamasını gerektirmelidir"

      - "3. sınıf seviyesinde 3 öğelik (1'den 3'e/4'e kadar) bir sıra ve 3 koşul tercih edilmelidir; 5+ sıra numarası kullanma"
      - "Kişiler ve varlıklar; takım, araç, koşucu, kapsül gibi somut kavramlardan seçilmelidir"
      - "Bağlam, öğrencinin aşina olduğu doğrusal sıralama (geçit töreni, fırlatma vb.) durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'hemen önce/sonra', 'önce/sonra' ve 'arasında X kişi var' gibi kavramlar net ayrılmalıdır"
      - "Sıra, numara ve yön bildiren (baştan sona vb.) ifadeler belirsizlik taşımamalıdır"
      - "Bu soru tipinde yalnızca kesinliği/belirsizliği kurmaya hizmet eden bilgiler kullanılmalıdır; konu dışı süsleme eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: iki kişinin art arda gelmesi veya hemen önünde/arkasında olması (blok ilişkisi)"
        - "1 madde: iki kişi arasında belirli sayıda kişi bulunması (mesafe ilişkisi)"
        - "1 madde: zincirleme bir ilişki veya bir kişinin diğerlerinden önce/sonra gelmesi (yön kısıtı)"
        - "Gerekirse 1 madde: Bir kişinin sıranın başı veya sonuyla olan dolaylı ilişkisi"
      yasaklar:
        - "3 veya daha fazla maddede doğrudan kişilerin sıra numarasını açıkça verme"
        - "Her kişinin sırasını tek tek tarif eden tam eşleşmeler yazma"
        - "Koşulları okuyan öğrencinin hiçbir ihtimal kalmadan (belirsizlik olmadan) tüm sırayı tek hamlede dolduracağı kadar kapalı (eksiksiz) bir kurgu yapma (Özellikle 'bilinemez' soruluyorsa tablo KESİNLİKLE tam kapanmamalıdır)"
        - "Bir sıra numarasını verdikten sonra hemen komşularını da açıkça verip dizilimi tamamen kilitleme"

  visual:
    required: true
    description: "Sıra numarası sorgulama sorusunu simgeleyen numaralı kutu dizisi ve soru işareti ikonu"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "1-2-3-4 numaralı boş kutu dizisi (içinde soru işareti olan bir kutu)"
      - "doğrusal sıra şeması (bazı kutular soru işaretli)"
      - "numaralı pozisyon ikonu"
    kurallar:
      - "Görsel senaryo içeriğini (kişileri, nesneleri veya konumlarını) tasvir etmemelidir"
      - "Görsel yalnızca soru tipini simgeleyen soyut/sembolik bir ikon veya şema olmalıdır"
      - "Görsel bulmacayı çözmede ipucu vermemeli; doğru cevabı ima etmemelidir"
      - "Görsel sade, temiz ve dikkat dağıtmayan bir ikon olmalıdır"
      - "Görsel içinde kişi adı, konum bilgisi veya bulmacaya ait sayısal veri bulunmamalıdır"
      - "Tablo veya ızgara görseli kullanılacaksa hücreler boş ya da soru işaretli olmalıdır"
    yasaklar:
      - "Senaryo sahnesi — kişileri, nesneleri veya konumlarını gösteren illüstrasyon"
      - "Bulmacadaki sıra, yerleşim veya eşleşmeleri ele veren gerçekçi tasvir"
      - "Fotoğraf benzeri sahne görüntüsü"
      - "Puzzle içeriğine dair somut nesne görseli (sandalye, masa, kişi silueti vb.)"

  stem:
    required: true
    description: >
      Soru kökü, kurulmuş ihtimal ve kesinlik tablosu üzerinden çıkarım yaptırmalıdır.
      Kök; öğrenciyi sıranın hangi konumlarının (numaralarının) kilitlendiğini, hangilerinin
      ihtimalli kaldığını bulmaya zorlayan bir yapıdan seçilmelidir.
    kurallar:
      - "Soru kökü sıralama tablosundaki kesinlikler ve belirsizlikler kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Tercihen 'hangi konumdaki kişilerin yerleri kesin olarak bilinmektedir / bilinemez' türünde SIRA NUMARASI hedefleyen kökler kullanılmalıdır"
      - "Soru kökü, kimin nerede olduğunu (Örn: Ali nerededir?) değil, hangi sıranın statüsünü sorgulamalıdır"
      # ═══════════════════════════════════════════════════════════════
      # OPTIONS (SEÇENEKLER)
      # ═══════════════════════════════════════════════════════════════

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 5
    style: "sira_numarasi_ikilisi" # Örn: "2. ve 4. sıra" veya "1. ve 5. konum"
    correct_count: 1

      # ═══════════════════════════════════════════════════════════════
      # SORU KOKLERI (Konum Kesinliği / Belirsizliğine Özelleştirilmiş)
      # ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # Kesin bilinen konum odaklı
  # KULLANILDI: - "<b>Bu bilgilere göre hangi sıra numaralarındaki kişilerin/varlıkların yerleri kesin olarak bilinebilir?</b>"
  - "<b>Bu bilgilere göre aşağıda verilen konumlardan hangilerinde kimin olduğu kesin olarak bellidir?</b>"
  # Belirsiz (bilinemeyen) konum odaklı
  # KULLANILDI: - "<b>Bu bilgilere göre hangi sıra numaralarındaki kişilerin/varlıkların yerleri kesin olarak <u>bilinemez</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıda verilen konumlardan hangilerinde kimin olduğu kesin olarak söylenemez (kendi aralarında yer değiştirebilirler)?</b>"

  # ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
  # ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli dizilimdeki
    kilitlenmiş (kesin) ve yer değiştirebilir (ihtimalli) konumlar tespit edildikten sonra,
    soru kökünün istediği durumu kusursuz sağlayan sıra numaralarıdır (Örn: 2. ve 4. sıra).
    Öğrenciden, sadece açıkça verilenleri değil, diğer ihtimallerin elenmesiyle veya
    ikili olasılıkların fark edilmesiyle bu numaralara ulaşması beklenir.

  temel_ilke: >
    Gizli olasılık tablosu kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm kişilerin yerleşme
    ihtimalleri daraltıldığında hangi koltukların sabit kaldığının veya hangilerinin
    belirsizleştiğinin zorunlu sonucudur.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar ve olasılıklar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; öğrenci boşlukları ve yer değiştirme ihtimallerini hesaplamak zorundadır"
    - "Öğrenci, seçeneklere geçmeden önce hangi sıra numaralarının kilitlendiğini, hangilerinin ihtimalli (belirsiz) kaldığını kurabilecek durumda olmalıdır"
    - "Şıkkın doğruluğu doğrudan verilmiş bir konuma değil, kurulmuş ihtimal tablosundan çıkan zorunluluğa dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; seçenekler arasında çelişki veya ikinci bir doğru ihtimali YASAKTIR"
    - "Doğru cevap 2-5 kelime arasında, SADECE konum/sıra numaralarından (Örn: '1. ve 5. sıra') oluşmalıdır"
    - "Biçimsel olarak diğer şıklardan (diğer sıra numaralarından) ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun açık tekrarı olması (Örn: 'Ali 3. sıradadır' deyip şıklarda 3. sıranın doğru cevap yapılması YASAKTIR, çok basit olur)"
    - "Doğru cevabın, dizilimdeki diğer belirsizlikleri (ihtimalleri) hesaba katmadan yüzeysel bir yerleştirmeyle bulunabilmesi"
    - "Gizli tablo kurulmadan ve yer değiştirebilen kişiler fark edilmeden seçenek elemesi yapılabilmesi"
    - "Eğer soru 'bilinemez'i soruyorsa, doğru cevabın aslında kilitlenmiş (kesinleşmiş) sıralardan birini içermesi"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevaptaki sıra numaralarının kesinliği (veya belirsizliği) hâlâ aynı kalıyor mu?"
    - "Sadece ilk iki koşula bakılarak hangi konumların kesinleştiği/bilinemediği bulunabiliyor mu?"
    - "Gizli ihtimal tablosu kurulmadan ve ikili yer değiştirmeler fark edilmeden doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek gerçekten tablodaki kilitlenmiş ya da yer değiştiren (belirsiz) koltukların/sıraların zorunlu sonucu mu?"

# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılan
    yüzeysel sıra numaraları olmamalıdır. Her yanlış seçenek (konum/sıra numarası ikilisi), öğrencinin gizli
    dizilim tablosundaki ihtimalleri (kilitlenmiş ve yer değiştirebilir konumları) hesaplarken
    yapabileceği bütünsel bir muhakeme hatasının sonucu olmalıdır. Öğrenci bir bloğu kaydırmayı unutur
    veya ihtimalleri eksik hesaplarsa, şıklardaki sıra numaralarının "kesin" veya "belirsiz" olduğuna inanmaya yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici konum, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici sıra numaraları, tek bir maddeyle (Örn: 'Son sırada X vardır') hemen elenmemelidir"
    - "Her çeldirici, ihtimalleri eksik hesaplanmış veya yanlış kilitlenmiş bir dizilim tablosunun çıktısı olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını (örn: mesafeyi) doğru kullanıp bir kısmını (örn: kayma ihtimalini) yanlış yorumlayan öğrencinin ulaşacağı sıra numarasıdır"
    - "Çeldirici, tablo tam olarak test edilmeden önce (ilk bakışta) çok güçlü ve mantıklı görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı ihtimal/kesinlik hatalarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak (sadece sıra numarası olarak) benzemeli; ama yalnızca tüm ihtimaller test edildiğinde KESİNLİĞİNİ (veya belirsizliğini) yitirmelidir"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş olasılık tablosunun doğal sonucu olan makul bir sıra numarası yazmaktır"
    - "KOMBİNE KULLANIM: Çeldirici stratejileri tek başına kullanılabileceği gibi, şıkkın elenmesini daha da zorlaştırmak için iki veya daha fazla strateji aynı anda (iç içe) kullanılmalıdır."

  uretim_proseduru:
    - "1. Önce doğru gizli dizilim tablosunu ve bu tablodaki tüm ihtimalleri (yer değiştirenleri ve sabit kalanları) kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış (ihtimalleri eksik veya fazla olan) tablo tasarla."
    - "3. Her yanlış tablo, koşulların bir kısmını sağlamalı; fakat alternatif yerleşimleri gözden kaçırmalıdır."
    - "4. Çeldirici sıra numaralarını bu yanlış tabloların sonuçlarından üret (Yanlışlıkla kilitlenen veya yanlışlıkla belirsiz sanılan sıralar)."
    - "5. Her çeldiricinin yanlışlığı ancak tüm bloklar kaydırılıp alternatifler kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden seç."
    - "7. Her çeldirici, sorunun boyutuna (Örn: 1'den 4'e kadar) uygun geçerli sıra numaraları olmalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış ihtimal/konum mantığına dayanmalıdır"
    - "Çeldiriciler, öğrencinin alternatif dizilimleri gözden kaçırması hâlinde 'kesin doğru' görünmelidir"
    - "Çeldiriciler, maddelerde açıkça verilen mutlak bir konumu kopyalayıp sorarak üretilmemelidir"
    - "Yanlış seçenekler, basit numara rastgeleliği değil, hatalı bir kurgunun sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın rastgele alternatifleri olmamalıdır"
    - "Bir çeldirici, yalnızca son olasılık kontrolü (kaydırma testi) aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek SADECE 'X. ve Y. sıra' biçiminde olmalıdır"
    - "Aynı sıra numarasını tüm şıklara koyarak eleme mantığını bozmak yasaktır"

  stratejiler:
    - ad: "OLASILIGI_KESINLIK_SANMA (Tek İhtimal Yanılgısı)"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci dizilimi kurarken bulduğu İLK geçerli tabloyu tek tablo sanır ve o tabloda dolu olan bir sıranın 'kesin' kilitlendiğini düşünür."
      nasil_olusturulur: |
        Aslında sağa/sola kayma ihtimali olan bir bloğu veya yer değiştirebilen iki kişiyi bir noktaya sabitle.
        Bu yanlış sabitlemede dolu olan sıra numarasını çeldirici yap. Soru "kesin bilineni" soruyorsa,
        bu çeldirici aslında bilinemeyen (değişebilen) bir sıradır ama öğrenci onu kesin sanır.

    - ad: "KILITLI_KONUMU_HAREKETLI_SANMA (Dolaylı Kesinliği Görememe)"
      bilisssel_hata_kategorisi: "kurgu_hatasi"
      aciklama: "Soru 'hangisi kesin BİLİNEMEZ'i soruyordur. Öğrenci boşluklara bakıp 'burası değişebilir' der, ancak diğer blokların kısıtlaması orayı çoktan kilitlemiştir."
      nasil_olusturulur: |
        Bir konumu, etrafındaki blokların büyüklüğü ve mesafesi nedeniyle KESİN (tek ihtimalli) hale getir.
        Ancak görünüşte o sıra numarasında kimin olduğu açıkça yazmasın. Öğrenci orayı "bilinemez"
        sanarak bu çeldiriciyi işaretlesin.

    - ad: "BLOK_KAYMASINDA_KESİSİMİ_KACIRMA (Zincirleme Örtüşme Hatası)"
      bilisssel_hata_kategorisi: "iliski_yorum_hatasi"
      aciklama: "Bir grup insan (blok) sağa veya sola kayabiliyordur. Öğrenci 'bunlar kayıyor, demek ki yerleri belirsiz' der. Oysa kaydıkları her iki ihtimalde de ortadaki bir koltuk hep DOLUDUR (kesindir)."
      nasil_olusturulur: |
        3 kişilik bir bloğun (A-B-C) 1-2-3'e veya 2-3-4'e yerleşme ihtimali olsun. Her iki durumda da
        2. ve 3. sıra kesinlikle bu gruptan birileri tarafından doldurulacaktır. Öğrenci bloğun
        hareket ettiğini görüp 3. sırayı "bilinemez" sanır. Mükemmel bir çeldiricidir.

    - ad: "ILISKIYI_EKSIK_TASIMA (Mesafe ve Yön Yanılgısı)"
      bilisssel_hata_kategorisi: "mesafe_hatasi"
      aciklama: "Öğrenci 'aralarında 2 kişi var' koşulunu okur ama sıranın başına/sonuna çarpma ihtimalini unutarak yanlış sıraları kilitler."
      nasil_olusturulur: |
        Mesafe koşulunu (Örn: A ile B arasında 1 kişi var) sadece tek bir yönde (A önce, B sonra)
        düşünerek kilitlenmiş gibi gösterilen bir sıra numarası üret. Oysa B önce, A sonra da olabilir,
        bu da kilitli sanılan o sırayı belirsiz yapar.

  kombine_kullanim_rehberi:
    tanim: "Öğrencinin sıra numaralarını sadece bir tahminden ibaret görmesini engellemek için stratejileri iç içe geçir. Çeldiricileri üretirken bu kombinasyonları kullan."
    ornek_kombinasyonlar:
      - ad: "Mesafe Yanılgısı + Olasılığı Kesinlik Sanma Kombosu"
        nasil_uygulanir: "Öğrenci 'X, Y'den öncedir' kuralını 'Hemen öncedir' gibi okur (Mesafe Yanılgısı) ve onları 1. ve 2. sıraya kilitler. Bu yüzden 2. sırayı KESİN sanır (Olasılığı Kesinlik Sanma). Şıklara 2. sıra konarak bu çifte hataya düşmesi hedeflenir."
      - ad: "Kesişimi Kaçırma + Dolaylı Kesinliği Görememe Kombosu"
        nasil_uygulanir: "Soru 'Bilinemez'i sorarken; öğrenci hareket eden bir bloğun ortasındaki kesişim noktasını (hep dolu olan yeri) kaçırır ve orayı 'bilinemez' sanır. Aynı anda sıranın en sonundaki konumun da dolaylı olarak kilitlendiğini göremez. Şıklara bu iki 'aslında kesin olan' sıra numarası konularak, öğrencinin bunları 'belirsiz' sanması tuzağı kurulur."

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede açıkça verilen bir konumu (Örn: 5. sıra boştur) doğrudan şıkka koyup çeldirici yapmak"
    - "Tek başına tek koşulla (diğer ihtimallere bakmadan) elenen bir sıra numarası üretmek"
    - "Koşullardan bağımsız, rastgele '3. ve 4. sıra' gibi numaralar yazmak"
    - "Çeldiriciyi yanlış bir olasılık tablosu kurmadan üretmek"
    - "Tüm şıklarda aynı sıra numarasını tekrarlayarak sorunun yapısını basitleştirmek"
    - "Şıklara kişi isimleri eklemek (Örn: '1. sıradaki Ali' YASAKTIR, sadece '1. sıra' yazılmalıdır)"

  kalite_kontrol:
    - "Bu çeldirici sıra numarası, öğrencinin ihtimalleri eksik hesapladığında KESİN (veya belirsiz) sanacağı bir konum mu?"
    - "Bu seçenek tek bir maddeyle hemen eleniyor mu?"
    - "Bu sıra numarasının statüsü, ancak bloklar kaydırılıp tüm ihtimaller test edilince mi asıl halini alıyor?"
    - "Bu çeldirici, doğru tabloya yakın ama hatalı bir yerleşime dayanıyor mu?"
    - "Her çeldirici konum farklı bir yanlış çözüm (ihtimal hesaplama) yolunu mu temsil ediyor?"
    - "Seçeneklerdeki numaraların hepsi sıranın boyutuna (Örn: 1-5 arası) uygun mu?"

  önerilen_dagilim:
    - "1 çeldirici: Olasılığı Kesinlik Sanma (Tek tablo yanılgısı)"
    - "1 çeldirici: Blok Kaymasında Kesişimi Kaçırma (Kombine edilebilir)"
    - "1 çeldirici: İlişkiyi Eksik Taşıma (Mesafe ve Yön Yanılgısı)"

