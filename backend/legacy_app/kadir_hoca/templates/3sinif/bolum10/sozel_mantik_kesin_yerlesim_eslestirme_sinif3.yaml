# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi sınırlı yerlerin kapasitelerini ve kişilerin
    birliktelik/yalnızlık durumlarını kullanarak tüm yerleşim tablosunu kurmaya zorlamalıdır.
    Doğru cevap; tek bir maddeden veya yüzeysel bir isim eşleştirmesinden bulunamamalı;
    ancak tüm kişilerin yerleri kapasite kısıtlarıyla (Örn: X yerinde sadece bir kişi vardır)
    test edildikten sonra kesinleşen bir YARGI CÜMLESİ olarak ortaya çıkmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Kişi-Yer dağılımına uygun günlük hayattan bir bağlam seç.
        Örnek alanlar: ofis katları, kamp bölgeleri, kurs sınıfları, otopark blokları vb.

    - step: 2
      action: "Kişileri, yerleri ve kapasite kilitlerini kur"
      details: |
        - Önce 5-7 kişiyi ve 3 farklı yer/kategori belirle.
        - Her yerin kişi kapasitesini (Örn: A katında 2 kişi, B katında 1 kişi vb.) netleştir.
        - Tabloyu kurarken BİLEREK bir kişinin bir yerde "tek başına" olması kısıtını ekle.
        - Soru yazımına geçmeden önce kimin nerede olduğu ve hangi yargıların kesinleştiği netleşmiş olmalıdır.

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü kesinlik denetlemelidir.
        - "Hangisi kesinlikle doğrudur?" veya "Hangisi kesinlikle yanlıştır?" şeklinde yönü belirle.

    - step: 4
      action: "Koşulları gizli yerleşim tablosundan türet"
      details: |
        - 3 madde oluştur.
        - Maddeler yerlerin kapasitelerini, gitmeme (dışlama) durumlarını ve birliktelikleri içermelidir.
        - Hiçbir madde şıklarda sorulacak yargı cümlesini doğrudan söylememelidir.
        - Koşullar tabloyu ancak kapasite sınırlarıyla (örn: o katın dolmasıyla) birlikte değerlendirildiğinde kilitlenmelidir.

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede dağılımın çerçevesini tanıt.
        - Kaç kişi olduğu ve hangi yerlerin bulunduğu net anlaşılsın.
        - Bağlamın günlük hayata uygun (ofis, pazar vb.) olduğundan emin ol.

    - step: 6
      action: "Doğru seçeneği (Yargı Cümlesi) üret"
      details: |
        - Doğru seçenek, kurulan tabloda KESİN olan bir yargı olmalıdır (Örn: 'Ali ile Ayşe aynı yerdedir.').
        - Bu yargı, maddelerde açıkça yazan bir bilginin kopyası olmamalıdır.
        - Öğrenci kapasite hesabını (örn: 'Burası doldu, o halde Ali buraya gelemez') yapmadan bu yargıya ulaşamamalıdır.

    - step: 7
      action: "3 çeldirici yargı üret"
      details: |
        - Her çeldirici farklı bir hata stratejisine (Örn: İhtimali kesin sanma, kapasite çakışması) dayanmalıdır.
        - Şıklar doğru cevapla aynı yapıda (yargı cümlesi) olmalıdır.
        - Çeldiriciler, tabloyu yanlış kuran veya bir kısıtı (örn: tek başına olmayı) unutan öğrenciye "mantıklı" gelmelidir.

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala.
        - Tüm seçenekler tam yargı cümlesi formatında olsun.
        - Doğru cevap biçimsel olarak (uzunluk vb.) öne çıkmasın.

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci yerlerin kapasite sınırlarını ve yalnızlık kısıtlarını hesaplamadan doğru yargıyı bulabiliyor mu?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Şıklardaki yargılar metindeki isimlerle ve yerlerle tam uyumlu mu?
        - "Kesinlikle yanlıştır" soruluyorsa, çeldiriciler "doğru olma ihtimali olan" yargılardan mı seçilmiş?
        Bu sorulardan hatalı sonuç veren varsa soru yeniden kurulmalıdır.

