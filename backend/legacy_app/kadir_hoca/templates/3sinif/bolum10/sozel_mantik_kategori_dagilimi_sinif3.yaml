# bolum6/sozel_mantik_kategori_dagilimi_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 seçenek
# Bu sürüm yalnızca "kategori dağılımı sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_kategori_dagilimi_sinif3"
  ad: "3. Sınıf Sözel Mantık - Kategori Dağılımı"
  sinif_seviyesi: 3
  aciklama: "Kişi veya varlıkları belirli kategorilere dağıtarak gizli grup yapısını bulma ve buna göre kesin çıkarım yapma"
  frequency: "High (~12 questions)"

kategori_dagilimi_senaryolari:
  - ad: "renk_kart_secimi"
    aciklama: "Öğrencilerin farklı renk kartlardan birini seçmesi ve renk gruplarına dağılması"
    ornek_setup: "Bir etkinlikte öğrencilerin her biri kırmızı, mavi, yeşil ve sarı kartlardan birini seçmiştir."

  - ad: "kulup_tercihi_dagilimi"
    aciklama: "Öğrencilerin okul kulüplerinden birine katılması"
    ornek_setup: "Bir okulda öğrencilerin her biri satranç, tiyatro, müzik veya bilim kulüplerinden birine katılmıştır."

  - ad: "meyve_suyu_tercihi"
    aciklama: "Çocukların farklı içecek seçeneklerinden birini seçmesi"
    ornek_setup: "Bir piknikte çocukların her biri elma, portakal, vişne veya şeftali suyundan birini seçmiştir."

  - ad: "kitap_turu_secimi"
    aciklama: "Öğrencilerin farklı kitap türlerinden birini tercih etmesi"
    ornek_setup: "Bir okuma etkinliğinde öğrencilerin her biri macera, bilim, masal veya tarih türlerinden bir kitabı seçmiştir."

  - ad: "oyun_alani_tercihi"
    aciklama: "Çocukların etkinlik alanlarından birine katılması"
    ornek_setup: "Bir çocuk festivalinde her çocuk boyama, yapboz, dans veya hikâye alanlarından birine gitmiştir."

  - ad: "hayvan_grubu_secimi"
    aciklama: "Çocukların farklı hayvan gruplarından birini seçmesi"
    ornek_setup: "Bir doğa atölyesinde çocukların her biri kuşlar, memeliler, sürüngenler veya deniz canlıları grubundan birini seçmiştir."

  - ad: "spor_bransi_tercihi"
    aciklama: "Öğrencilerin farklı spor dallarından birine yönelmesi"
    ornek_setup: "Bir spor tanıtım gününde öğrencilerin her biri basketbol, yüzme, tenis veya jimnastik branşlarından birini seçmiştir."

  - ad: "muzik_aleti_secimi"
    aciklama: "Çocukların bir müzik aleti grubuna yerleşmesi"
    ornek_setup: "Bir müzik merkezinde çocukların her biri piyano, gitar, keman veya davul grubundan birine katılmıştır."

  - ad: "atolye_tema_secimi"
    aciklama: "Katılımcıların farklı atölye temalarından birine gitmesi"
    ornek_setup: "Bir yaratıcı atölyede katılımcıların her biri uzay, doğa, robotik veya sanat temasından birini seçmiştir."

  - ad: "gorev_turu_dagilimi"
    aciklama: "Öğrencilerin farklı görev türlerine ayrılması"
    ornek_setup: "Bir sınıf etkinliğinde öğrencilerin her biri düzenleme, yazma, boyama veya sunum görevlerinden birini üstlenmiştir."

  - ad: "bitki_grubu_secimi"
    aciklama: "Öğrencilerin farklı bitki gruplarından biriyle ilgilenmesi"
    ornek_setup: "Bir sera çalışmasında öğrencilerin her biri çiçekler, sebzeler, ağaçlar veya kaktüsler grubundan biriyle ilgilenmektedir."

  - ad: "robot_takimi_secimi"
    aciklama: "Katılımcıların farklı robot takımlarından birine ayrılması"
    ornek_setup: "Bir robotik etkinlikte öğrencilerin her biri Alpha, Beta, Gamma veya Delta takımlarından birine katılmıştır."

  - ad: "uzay_gorevi_tercihi"
    aciklama: "Katılımcıların farklı uzay görevi temalarından birini seçmesi"
    ornek_setup: "Bir bilim etkinliğinda öğrencilerin her biri roket, uydu, gezegen veya astronot görev temasından birini seçmiştir."

  - ad: "tatli_tercihi_dagilimi"
    aciklama: "Çocukların farklı tatlı seçeneklerinden birini seçmesi"
    ornek_setup: "Bir kutlamada çocukların her biri kek, kurabiye, dondurma veya puding seçeneklerinden birini seçmiştir."

  - ad: "poster_tema_secimi"
    aciklama: "Öğrencilerin proje posterleri için farklı temalardan birini seçmesi"
    ornek_setup: "Bir proje gününde öğrencilerin her biri çevre, sağlık, teknoloji veya ulaşım temasından birini seçmiştir."

  - ad: "kamp_renk_grubu"
    aciklama: "Katılımcıların renk gruplarına ayrılması"
    ornek_setup: "Bir yaz kampında öğrencilerin her biri kırmızı, mavi, yeşil veya turuncu gruplardan birine ayrılmıştır."

  - ad: "planetaryum_program_secimi"
    aciklama: "Çocukların planetaryumdaki farklı programlardan birini seçmesi"
    ornek_setup: "Bir planetaryum ziyaretinde çocukların her biri Güneş Sistemi, Yıldızlar, Ay veya Roketler programlarından birine katılmıştır."

  - ad: "bilim_deneyi_tercihi"
    aciklama: "Öğrencilerin farklı deney gruplarından birine katılması"
    ornek_setup: "Bir bilim şenliğinde öğrencilerin her biri elektrik, mıknatıs, ışık veya su deneylerinden birini seçmiştir."

  - ad: "film_turu_tercihi"
    aciklama: "Katılımcıların farklı film türlerinden birini seçmesi"
    ornek_setup: "Bir çocuk sinema etkinliğinde her katılımcı komedi, macera, animasyon veya belgesel türlerinden birini seçmiştir."

  - ad: "koleksiyon_kategorisi_secimi"
    aciklama: "Çocukların farklı koleksiyon türlerinden birine yönelmesi"
    ornek_setup: "Bir hobi kulübünde çocukların her biri pul, taş, kart veya minyatür koleksiyon türlerinden birini seçmiştir."
# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan kategori dağılımı sorusu"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, kişi veya varlıkları belirli kategorilere dağıtarak gizli grup
      yapısını kurması gerekir. Koşullar kişi–kategori ilişkilerini ve kategori
      başına düşen kişi sayılarını doğrudan tablo gibi vermemeli; öğrenci bazı
      dağılımları ve kategori büyüklüklerini mantıksal çıkarımla tamamlamalı,
      sonunda sorulan kişi–kategori ya da kategoriye düşen kişi sayısı önermesinin
      kesin doğru, kesin yanlış, söylenebilir ya da söylenemez olup olmadığını
      belirlemelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kaç kişi/varlık olduğu, hangi kategori/ürün/seçenek kümelerinin bulunduğu ve her kişinin yalnızca bir kategoriye ait olduğu açıkça tanıtılmalıdır"
      - "Kurgu kişi-merkezli veya varlık-merkezli olabilir; ancak yapı açıkça kategori dağılımı içermelidir"
      - "Her kişi yalnızca bir kategoriye ait olmalı; bir kişi aynı anda birden fazla kategoriye yerleştirilmemelidir"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu dağılımla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru kategori dağılımı kurulmalı; ardından yalnızca bu yapıya götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar kişi–kategori dağılımını satır satır açıkça doldurmamalıdır"
      - "Maddeler, gizli dağılımın yalnızca bazı parçalarını, dışlamalarını, aynı kategori ilişkilerini veya kategori başına düşen kişi sayılarını vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı kişi–kategori eşleşmelerini ve kategori büyüklüklerini kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan kişi–kategori ilişkisi ya da kategoriye düşen kişi sayısı açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli dağılım yapısı büyük ölçüde kurulabilir olmalı; şıklar yapıyı kurdurmamalı, kurulmuş yapı üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak kişi–kategori ve kategori büyüklüğü ilişkisi içermelidir"
      - "Öncelikli ilişki türleri: bir kategoride en az/en çok/tam belirli sayıda kişi bulunması, belirli bir kişinin hangi kategoride olduğu, belirli bir kişinin hangi kategoride olmadığı, iki ya da daha fazla kişinin aynı kategoride bulunması, belirli kişilerden oluşan grubun belirli kategori kümesinden birini paylaşması, belirli kategorilerin boş kalmaması veya belirli büyüklükte olması"
      - "Tek bir maddeyle doğrudan tam dağılım veren açık tablo cümleleri kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca isimleri ve kategorileri alt alta yazıp mekanik eşleme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir grup ya da kategori bloğu kurup sonra bunu sayı kısıtlarıyla birleştirmesini gerektirmelidir"
      - "Dağılımın bazı parçaları doğrudan verilebilir; ancak sorulan ilişkinin doğruluk değeri mutlaka düşünerek bulunmalıdır"

      - "3. sınıf seviyesinde 3 kişi/varlık ve 3-4 kategori tercih edilmelidir"
      - "Kategoriler somut ve anlaşılır olmalıdır: renk, kulüp, ürün, içecek, kitap türü, takım, etkinlik alanı, tema vb."
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'aynı kategoride', 'farklı kategoride', 'en az', 'en çok', 'tam', 'gitmez', 'seçmez', 'seçmiştir' gibi kavramlar net ayrılmalıdır"
      - "Kişi–kategori ve sayı ilişkileri belirsizlik taşımamalıdır"
      - "Koşullar yalnızca gizli kategori dağılımını kurmaya ve sorulan ilişkiyi test etmeye hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: kategori başına düşen kişi sayısı veya sayı sınırı"
        - "1 madde: belirli bir kişinin belli kategoride olduğu ya da olmadığı bilgisi"
        - "1 madde: iki ya da daha fazla kişinin aynı kategoride bulunması veya bulunmaması"
        - "Gerekirse 1 madde: belirli bir grubun belirli kategori kümesinden birini paylaşması"
      yasaklar:
        - "Her kişi için kategoriyi tek tek söyleyen koşullar yazma"
        - "Her kategorinin tüm üyelerini açıkça dağıtan koşullar yazma"
        - "Bir kişiyi hem kategori hem grup hem sayı düzeyinde tamamen çözen açık koşullar yazma"
        - "Koşulları tabloyu soldan sağa dolduracak çözüm şeması gibi dizme"
        - "Tek bir maddeyle doğru seçeneğin kesinleşmesine yol açma"

  visual:
    required: true
    description: "Kategori dağılımı sorusunu simgeleyen gruplar halinde kutular ve dağılma okları şeması"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "iki/üç kategori kutusuna dağılan soyut sembol/nokta şeması"
      - "grup kutuları ve dağılım oku ikonu (içi boş)"
      - "Venn benzeri örtüşmeyen kutu diyagramı"
    kurallar:
      - "Görsel senaryo içeriğini (kişileri, nesneleri veya konumlarını) tasvir etmemelidir"
      - "Görsel yalnızca soru tipini simgeleyen soyut/sembolik bir ikon veya şema olmalıdır"
      - "Görsel bulmacayı çözmede ipucu vermemeli; doğru cevabı ima etmemelidir"
      - "Görsel sade, temiz ve dikkat dağıtmayan bir ikon olmalıdır"
      - "Görsel içinde kişi adı, konum bilgisi veya bulmacaya ait sayısal veri bulunmamalıdır"
      - "Tablo veya ızgara görseli kullanılacaksa hücreler boş ya da soru işaretli olmalıdır"
    yasaklar:
      - "Senaryo sahnesi — kişileri, nesneleri veya konumlarını gösteren illüstrasyon"
      - "Bulmacadaki sıra, yerleşim veya eşleşmeleri ele veren gerçekçi tasvir"
      - "Fotoğraf benzeri sahne görüntüsü"
      - "Puzzle içeriğine dair somut nesne görseli (sandalye, masa, kişi silueti vb.)"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli kategori dağılımını kurmaya ve ardından belirli
      bir kişi–kategori ya da kategori büyüklüğü önermesinin kesin doğru, kesin
      yanlış, söylenebilir ya da söylenemez olduğunu seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli dağılım yapısı yeterince kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak kişi–kategori veya kategori büyüklüğü üzerinden çıkarım sordurmalıdır"
      - "Tercihen 'kesinlikle doğrudur', 'kesinlikle yanlıştır', 'kesin olarak söylenebilir', 'kesin olarak söylenemez' türünde kökler kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir bilgi okumaya değil, kurulmuş gizli kategori dağılımını yorumlamaya yöneltmelidir"
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 18
    style: "distribution_proposition"
    correct_count: 1
    kurallar:
      - "Her seçenek bir dağılım önermesi biçiminde yazılmalıdır"
      - "Seçenekler tam kategori dağılım tablosunu vermemelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır"
      - "Bir soruda seçenek tipi TEK ALT TÜR üzerinden kurulmalıdır"
      - "Alt tür 1: kişi–kategori eşleştirmesi"
      - "Alt tür 2: kategoriye düşen kişi sayısı önermesi"
      - "Aynı soruda kişi–kategori önermesi ile kategori sayısı önermesi karıştırılmamalıdır"
      - "Seçenekler, gizli kategori dağılımı üzerinden test edilen tekil önermeler olmalıdır"
      - "Doğru seçenek, gizli yapıdan kesin doğru ya da kesin yanlış çıkan tek önerme olmalıdır"
      - "Hiçbir seçenek doğrudan bir koşul cümlesinin tekrar yazılmış hâli olmamalıdır"
      - "Hiçbir seçenek tek bir maddeye bakılarak doğrudan doğrulanabilir veya elenebilir olmamalıdır"
      - "Seçenekler biçimsel olarak dengeli olmalıdır"
      - "Doğru cevap uzunluk, vurgu veya özel ifade nedeniyle ayırt edilmemelidir"
      - "Kişi–kategori tipi kullanılacaksa tüm seçenekler kişi–kategori biçiminde paralel kurulmalıdır"
      - "Kategori sayısı tipi kullanılacaksa tüm seçenekler kategori + kişi sayısı biçiminde paralel kurulmalıdır"

# ═══════════════════════════════════════════════════════════════
      # SORU KOKLERI
