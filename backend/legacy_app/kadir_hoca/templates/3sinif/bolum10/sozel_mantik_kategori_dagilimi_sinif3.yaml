soru_kokleri:
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  # KULLANILDI: - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki eşleştirmelerden hangisi <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki dağılım bilgilerinden hangisi <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdaki dağılım bilgilerinden hangisi <u>yanlıştır</u>?</b>"

# ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli
    kategori dağılımı kurulduktan sonra mantıksal olarak kesin biçimde
    belirlenebilen dağılım önermesidir. Öğrenciden tek bir ipucuna dayanarak
    değil, tüm maddeleri analiz ederek doğru kişi–kategori eşleşmesini ya da
    kategori büyüklüğüyle ilgili kesin doğru/yanlış önermeyi seçmesi beklenir.

  temel_ilke: >
    Gizli kategori dağılımı kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan kesin kişi–kategori ya da kategori büyüklüğü
    önermesi olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara grup yapıları, kategori büyüklükleri ve kişi–kategori eşleşmeleri üzerinden gizli dağılım kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce kişi–kategori dağılımını ve kategori başına düşen kişi sayılarını kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; kurulmuş gizli dağılımın zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: gizli dağılımdan KESİNLİKLE çıkan önerme olmalıdır"
    - "Negatif köklerde doğru cevap: gizli dağılımla çelişen ya da gizli dağılımdan kesin olarak çıkarılamayan önerme olmalıdır"
    - "Çıkarım köklerinde yalnızca bir seçenek kesin doğru ya da kesin yanlış olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir çıkarım olmalıdır"
    - "Doğru cevap 3-18 kelime arasında olmalıdır"
    - "Duruma göre kısa ifade ya da tam cümle olabilir"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"
    - "Soru kişi–kategori tipiyle kurulmuşsa doğru cevap kişi–kategori eşleştirmesi biçiminde olmalıdır"
    - "Soru kategori büyüklüğü tipiyle kurulmuşsa doğru cevap kategoriye düşen kişi sayısı önermesi biçiminde olmalıdır"
    - "Doğru cevap, seçenek setindeki temsil düzeyini bozmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli kategori dağılımı kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen kişi/kategori ilişkisinin doğrudan tekrarına dönüşmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen sayı bilgisinin kaba tekrarına dönüşmesi"
    - "Birden fazla seçeneğin gizli dağılımdan eşit derecede doğru ya da yanlış çıkması"
    - "Doğru cevabın tüm dağılımı açık eden kapsamlı bir açıklama biçiminde yazılması"
    - "Aynı soruda hem kişi–kategori hem kategori büyüklüğü bilgisini birlikte taşıyan karma seçeneklerle doğru cevabı öne çıkarma"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli kategori dağılımı kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Diğer seçeneklerin de aynı ölçüde doğru ya da yanlış olma ihtimali kalıyor mu?"
    - "Seçeneklerin tamamı aynı alt türde mi kurulmuş?"
# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel kişi–kategori ya da kategori büyüklüğü önermeleri olmamalıdır.
    Her yanlış seçenek, öğrencinin gizli kategori dağılımını kurarken yapabileceği
    bütünsel bir muhakeme hatasının sonucu olmalıdır. Öğrenci yanlış bir ara dağılım
    kurarsa ya da kişi–kategori ve kategori başına düşen kişi sayısı ilişkilerini
    gereğinden erken kesinleştirirse, bu şıklardan birini işaretlemeye yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif kategori dağılımının sonucu olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı dağılım önermesi olmalıdır"
    - "Çeldirici, tüm yapı kurulmadan değil; yanlış dağılım kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış dağıtım yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru gizli dağılım ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş dağılımda doğruymuş gibi görünen makul kişi–kategori ya da kategori büyüklüğü önermesi yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli kategori dağılımını kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış dağılım veya yanlış kesinleştirme kurgusu tasarla."
    - "3. Her yanlış kurgu, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış kurguların sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldirici, sorudaki temsil düzeyini korumalıdır."
    - "8. Eğer soru kişi–kategori alt türünde kurulmuşsa tüm çeldiriciler kişi–kategori biçiminde kalmalıdır."
    - "9. Eğer soru kategori büyüklüğü alt türünde kurulmuşsa tüm çeldiriciler kategori + kişi sayısı önermesi biçiminde kalmalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış kategori dağılımı mantığına dayanmalıdır"
    - "Bazı çeldirici türleri tek başına yeterince güçlü olmayabilir; bu türler başka bir yanlış dağılım stratejisiyle birlikte kullanılmalıdır"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalı; daha güçlü bir yanlış dağılım stratejisini destekleyici olarak kullanılmalıdır"
    - "Çeldiriciler, öğrencinin gizli dağılımı yanlış ya da eksik tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış kategori dağılımı sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca rastgele başka bir kişiyle, başka bir kategoriyle veya başka bir sayı ile değiştirilmiş hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek aynı temsil düzeyinde olmalıdır"
    - "Kişi–kategori tipiyle kurulmuş bir soruda kategori sayısı çeldiricisi kullanılmamalıdır"
    - "Kategori büyüklüğü tipiyle kurulmuş bir soruda kişi–kategori çeldiricisi kullanılmamalıdır"

  stratejiler:
    - ad: "KISIYI_YANLIS_KATEGORIYE_TASIMA"
      bilisssel_hata_kategorisi: "eslestirme_hatasi"
      aciklama: "Öğrenci bir kişinin dışladığı ya da ait olduğu kategoriyi yanlış taşıyarak hatalı eşleşme kurar"
      nasil_olusturulur: |
        Bir kişi için bazı kategorileri doğru biçimde dışla; ancak son adımda kişiyi
        yanlış kategoriye yerleştiren alternatif bir dağılım kur. Çeldirici, bu yanlış
        dağılımdan doğan kişi–kategori önermesi olmalıdır.

    - ad: "AYNI_KATEGORI_GRUBUNU_YANLIS_KURMA"
      bilisssel_hata_kategorisi: "grup_hatasi"
      aciklama: "Öğrenci birlikte aynı kategoride olması gereken kişileri doğru görür gibi olur; fakat grubu yanlış kişiyle tamamlar"
      nasil_olusturulur: |
        Aynı kategoride bulunan iki ya da daha fazla kişiyi kısmen koru; ancak gruba
        yanlış bir kişiyi ekleyen veya doğru kişiyi dışarıda bırakan alternatif bir
        dağılım kur. Çeldirici, bu yanlış grup kurgusundan doğan kişi–kategori ya da
        kategori büyüklüğü önermesi olmalıdır.

    - ad: "KATEGORI_SAYISI_SINIRINI_YANLIS_YORUMLAMA"
      bilisssel_hata_kategorisi: "nicel_hata"
      aciklama: "Öğrenci bir kategoride bulunabilecek kişi sayısını yanlış yorumlar"
      nasil_olusturulur: |
        'En az', 'en çok' ya da 'tam' kişi sayısı bilgilerini yanlış uygulayan
        alternatif bir dağılım kur. Çeldirici, sayı kısıtı ilk bakışta sağlanıyormuş
        gibi görünse de tüm koşullar birlikte kontrol edildiğinde bozulan kişi–kategori
        ya da kategori büyüklüğü önermesi olmalıdır.

    - ad: "GRUBUN_PAYLASTIGI_KATEGORI_KUMESINI_DARALTMA"
      bilisssel_hata_kategorisi: "erken_sabitleme"
      aciklama: "Öğrenci belirli kişilerden oluşan bir grubun paylaşabileceği kategori kümesini gereğinden fazla daraltır"
      nasil_olusturulur: |
        Belirli bir kişi grubunun belirli kategori kümesinden birini paylaşması
        koşulunu al; ancak öğrencinin bu kümeyi tek kategoriye indirgediği alternatif
        bir dağılım kur. Çeldirici, bu erken sabitlemeden çıkan kişi–kategori ya da
        kategori sayısı önermesine dayanmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince
        bozulması gereken yanlış bir kategori dağılımı kur. Çeldirici, öğrencinin ara
        çıkarımı yapıp sonraki mantıksal taşıma adımını atlaması sonucu yanlış
        kişi–kategori veya kategori büyüklüğü önermesini doğru ya da mümkün sanmasına
        dayanmalıdır.
      kullanim_notu: >
        Bu strateji tek başına kullanıldığında çeldirici zayıf kalabilir. Bu nedenle
        tek başına ana çeldirici olarak kullanılmamalı; "KISIYI_YANLIS_KATEGORIYE_TASIMA",
        "AYNI_KATEGORI_GRUBUNU_YANLIS_KURMA",
        "KATEGORI_SAYISI_SINIRINI_YANLIS_YORUMLAMA",
        "GRUBUN_PAYLASTIGI_KATEGORI_KUMESINI_DARALTMA" veya
        "KALAN_DAGILIMI_YANLIS_TAMAMLAMA" gibi daha güçlü bir yanlış dağılım
        stratejisini destekleyici biçimde kullanılmalıdır.
      tek_basina_kullanilabilir: false
      birlikte_kullan:
        - "KISIYI_YANLIS_KATEGORIYE_TASIMA"
        - "AYNI_KATEGORI_GRUBUNU_YANLIS_KURMA"
        - "KATEGORI_SAYISI_SINIRINI_YANLIS_YORUMLAMA"
        - "GRUBUN_PAYLASTIGI_KATEGORI_KUMESINI_DARALTMA"
        - "KALAN_DAGILIMI_YANLIS_TAMAMLAMA"

    - ad: "KALAN_DAGILIMI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci dağılımın büyük kısmını doğru kurar; fakat kalan kişi ve kategorileri elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Gizli dağılımın çoğunu doğru tut; ancak son 1-2 kişi ya da kategori
        yerleşimini, tüm koşulları tekrar kontrol etmeden yanlış tamamlanmış gibi
        kurgula. Çeldirici, bu yanlış tamamlama sonucunda doğruymuş gibi görünen
        kişi–kategori ya da kategori büyüklüğü önermesine dayanmalıdır.

    - ad: "NEGATIF_KOKTE_MUMKUN_ONERMEYI_YANLIS_SECME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci kökün yönünü karıştırdığı için doğru olan yerine yanlış olanı ya da tersini seçer"
      nasil_olusturulur: |
        Eğer soru kökü 'yanlıştır' veya 'söylenemez' türündeyse, gizli dağılımla büyük
        ölçüde uyumlu ve güçlü görünen ama aslında işaretlenmemesi gereken bir
        kişi–kategori ya da kategori büyüklüğü önermesi üret. Bu çeldirici, kök yönü
        ve kesinlik derecesi karışıklığına dayanmalıdır.

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak dağılım önermesi üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele yanlış eşleştirme veya sayı önermesi yazmak"
    - "Çeldiriciyi yanlış kategori dağılımı düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış çözüm mantığını temsil eden birden fazla çeldirici kullanmak"
    - "Bir yanlış seçenekte temsil düzeyini bozmak; örneğin biri kişi–kategori, biri sayı özeti gibi dengesiz yapı kurmak"

  kalite_kontrol:
    - "Bu çeldirici, öğrencinin kurabileceği yanlış bir kategori dağılımının sonucu mu?"
    - "Bu seçenek bir tek maddeyle hemen eleniyor mu?"
    - "Bu seçenek ancak tüm koşullar kontrol edilince mi yanlışlaşıyor?"
    - "Bu çeldirici, doğru yapıya yakın ama hatalı bir alternatif kurguya dayanıyor mu?"
    - "Her çeldirici farklı bir yanlış çözüm yolunu temsil ediyor mu?"
    - "Tüm çeldiriciler aynı temsil düzeyinde mi?"
    - "Seçeneklerin alt tür birliği korunuyor mu?"

  önerilen_dagilim:
    - "1 ana çeldirici: KISIYI_YANLIS_KATEGORIYE_TASIMA veya AYNI_KATEGORI_GRUBUNU_YANLIS_KURMA"
    - "1 ana çeldirici: KATEGORI_SAYISI_SINIRINI_YANLIS_YORUMLAMA veya GRUBUN_PAYLASTIGI_KATEGORI_KUMESINI_DARALTMA"
    - "1 ana çeldirici: KALAN_DAGILIMI_YANLIS_TAMAMLAMA veya NEGATIF_KOKTE_MUMKUN_ONERMEYI_YANLIS_SECME"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına kullanılmamalı; yalnızca yukarıdaki ana çeldiricilerden biriyle birlikte destekleyici mantık olarak kullanılmalıdır"

use_shared_strategies: false
# ═══════════════════════════════════════════════════════════════
# BECERI ETIKETI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB3"
  bilesenler: ["mantiksal_cikarim", "siniflandirma", "dagilim_kurma", "degerlendirme", "sorgulama"]
  surec_bileseni: "karar_verme"

# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi gizli kategori dağılımını tamamen ya da büyük
    ölçüde kurmaya zorlamalıdır. Doğru cevap; tek bir koşuldan, iki koşulun hızlı
    birleşiminden veya yüzeysel elemeden bulunamamalı; ancak kişiler/varlıklar ile
    kategoriler arasındaki dağılım ve kategori başına düşen kişi sayıları birlikte
    değerlendirildikten sonra sorulan kişi–kategori ya da kategori büyüklüğü
    önermesinin kesin doğru, kesin yanlış, söylenebilir ya da söylenemez olduğu
    anlaşılmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca kategori dağılımı sorusuna uygun bir bağlam seç.
        Örnek alanlar:
        - renk kart seçimi
        - kulüp tercihi
        - içecek seçimi
        - kitap türü seçimi
        - etkinlik alanı tercihi
        - takım/grup seçimi

    - step: 2
      action: "Kişileri, kategorileri ve gizli doğru dağılımı kur"
      details: |
        - Önce 3 kişi/varlık belirle
        - Sonra 3-4 kategori belirle
        - Her kişiyi yalnızca bir kategoriye yerleştir
        - Kategori başına düşen kişi sayılarını netleştir
        - Bu dağılım, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm dağılım kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü ve seçenek alt türünü belirle"
      details: |
        Soru kökü, gizli dağılım kurulduktan sonra cevaplanabilir olmalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle doğrudur
        - kesinlikle yanlıştır
        - kesinlikle söylenebilir
        - kesinlikle söylenemez
        - eşleştirmelerden hangisi doğrudur/yanlıştır
        - dağılım bilgilerinden hangisi doğrudur/yanlıştır

        Ayrıca seçenek alt türü baştan belirlenmelidir:
        - kişi–kategori eşleştirmesi
        veya
        - kategoriye düşen kişi sayısı önermesi

        Aynı soruda bu iki alt tür karıştırılmamalıdır.

    - step: 4
      action: "Koşulları gizli dağılımdan türet"
      details: |
        - 3 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru seçenek doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde kategori dağılımını yeterince kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar, hedeflenen soru köküne göre yalnızca bir doğru cevap üretmelidir
        - Koşullar ağırlıklı olarak kişi–kategori, aynı kategori, kategori sayısı ve grup paylaşımı ilişkisi içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede dağılımın çerçevesini tanıt
        - Kaç kişi/varlık olduğu anlaşılır olsun
        - Hangi kategorilerin bulunduğu net olsun
        - Her kişinin yalnızca bir kategoriye ait olduğu açıkça belirtilsin
        - Bağlam sade, öğrenciye yakın ve dağılım-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, sorulan ilişki için kesin doğru ya da kesin yanlış olan tek önerme olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli dağılımı kurmadan bu önermeye ulaşamamalıdır
        - Doğru seçenek, seçilmiş alt türe uygun biçimde yazılmalıdır
        - Kişi–kategori tipi seçildiyse doğru seçenek kişi–kategori önermesi olmalıdır
        - Kategori büyüklüğü tipi seçildiyse doğru seçenek kategori + kişi sayısı önermesi olmalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli dağılımı eksik veya yanlış kuran öğrencinin düşebileceği yanlış önermeler olmalıdır
        - Çeldiriciler, kişiyi yanlış kategoriye taşıma, aynı kategori grubunu yanlış kurma, sayı sınırını yanlış yorumlama, kalan dağılımı yanlış tamamlama gibi hatalara dayanmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır
        - Tüm çeldiriciler seçilen alt türle aynı temsil düzeyinde kalmalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler aynı temsil düzeyinde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun
        - Seçenek alt türü baştan sona korunmalıdır

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci gizli kategori dağılımını kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Yanlış şıklardan biri tek bir maddeyle eleniyor mu?
        - Sorulan ilişki için yalnızca bir seçenek mi kesin doğru/yanlış?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        - Tüm seçenekler aynı alt türde mi kurulmuş?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

