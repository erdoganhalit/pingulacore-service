  - ad: "oyuncak_magazasi_tanitim_haftasi"
    aciklama: "Mağazada her gün farklı bir oyuncağın tanıtılması"
    ornek_setup: "Bir oyuncak mağazasında hafta boyunca her gün farklı bir oyuncak tanıtılacaktır."

  - ad: "okul_menusu_tema_gunleri"
