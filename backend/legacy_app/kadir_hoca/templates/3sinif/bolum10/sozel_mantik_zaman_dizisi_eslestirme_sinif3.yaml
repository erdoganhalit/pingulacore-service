  - ad: "muzede_rehberli_tur_takvimi"
    aciklama: "Müzede farklı günlerde düzenlenen rehberli turların günlerle eşleştirilmesi"
    ornek_setup: "Bir müzede hafta boyunca her gün farklı bir rehberli tur yapılacaktır."

  - ad: "kampus_kulup_tanitim_gunleri"
    aciklama: "Kulüp tanıtımlarının farklı günlere dağıtılması"
