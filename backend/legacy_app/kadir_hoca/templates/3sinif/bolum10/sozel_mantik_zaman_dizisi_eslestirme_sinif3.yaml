    ornek_setup: "Bir çocuk dergisi sitesinde üç gün boyunca her gün farklı bir bulmaca türü paylaşılacaktır."

  - ad: "spor_salonu_etkinlik_takvimi"
    aciklama: "Spor salonunda farklı günlerde yapılan etkinliklerin günlerle eşleştirilmesi"
    ornek_setup: "Bir spor salonunda hafta boyunca her gün farklı bir etkinlik yapılacaktır."

  - ad: "festival_sahne_programi"
    aciklama: "Festivalde farklı günlerde sahne alan grupların günlerle eşleştirilmesi"
    ornek_setup: "Bir çocuk festivalinde üç gün boyunca her gün farklı bir grup sahne alacaktır."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 gün/öğe eşleştirme seçeneğinden oluşan zaman dizisi eşleştirme sorusu"

  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, günler ya da zaman sıraları boyunca her biri yalnızca bir kez
      yer alan öğeleri verilen ilişkisel koşullara göre doğru zaman dizisine
      yerleştirmesi gerekir. Koşullar dizilişi doğrudan doldurmamalı; öğrenci bazı
      gün-öğe eşleşmelerini mantıksal çıkarımla tamamlamalı ve sonunda belirli bir
      gün+öğe önermesinin kesin doğru, kesin yanlış, söylenebilir ya da
      söylenemez olup olmadığını belirlemelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Zaman dizisinin türünü açıklar; kaç gün/zaman adımı olduğu, hangi öğelerin yerleştirileceği ve genel çerçeve tanıtılır"
      - "Kurgu öğe-merkezli olmalıdır; kişi merkezli anlatım zorunlu değildir"
      - "Her öğe yalnızca bir kez kullanılmalı ve her gün/zaman adımında yalnızca bir öğe yer almalıdır"
      - "MADDELİ KOŞULLAR 3 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu zaman dizisiyle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru zaman dizisi kurulmalı; ardından yalnızca bu dizilişe götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar takvimi gün gün doğrudan doldurmamalıdır"
      - "Maddeler, gizli zaman dizisinin yalnızca bazı parçalarını, sıralı ilişkilerini veya dışlamalarını vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı gün-öğe eşleşmelerini kendi mantıksal çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; sorulan gün+öğe eşleşmesi açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli zaman dizisi büyük ölçüde kurulabilir olmalı; şıklar diziyi kurdurmamalı, kurulmuş dizi üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar, hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak zaman ilişkisi içermelidir"
      - "Öncelikli ilişki türleri: bir önceki gün/bir sonraki gün, önce/sonra, ardışık günlerde yer alma, belirli günlerde yer alma, iki gün arasında belirli sayıda gün bulunması, hafta başı/hafta sonu konumu, gün sırası farkı"
      - "Tek bir maddeyle doğrudan tam zaman dizisi veren açık takvim cümleleri kullanılmamalıdır"
      - "Koşullar, öğrencinin yalnızca alt alta günleri yazıp mekanik eşleme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir ara zaman bloğu kurup sonra bunu diğer gün ilişkileriyle birleştirmesini gerektirmelidir"
      - "Dizinin bazı parçaları doğrudan verilebilir; ancak sorulan gün+öğe eşleşmesi mutlaka düşünerek bulunmalıdır"

      - "3. sınıf seviyesinde 3 öğe ve 3-4 zaman adımı/gün tercih edilmelidir; 5+ günlük takvim kurma"
      - "Günler ya da zaman adımları açık ve anlaşılır olmalıdır: pazartesi-cuma, 1. gün-5. gün, sabah-öğle-akşam gibi"
      - "Öğeler somut ve anlaşılır olmalıdır: ürün, gösteri, etkinlik, atölye, yiyecek, bölüm, robot, çizgi film vb."
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'bir önceki gün' ve 'önce', 'bir sonraki gün' ve 'sonra', 'ardışık' ve 'aynı gün' gibi kavramlar net ayrılmalıdır"
      - "Gün sırası ve zaman ilişkileri belirsizlik taşımamalıdır"
      - "Koşullar yalnızca zaman dizisini kurmaya ve sorulan gün+öğe ilişkisini test etmeye hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: ardışık gün veya bir önceki/bir sonraki gün ilişkisi"
        - "1 madde: belirli gün veya sınırlı gün bilgisi"
        - "1 madde: önce/sonra ya da arada gün farkı ilişkisi"
        - "Gerekirse 1 madde: dolaylı bağ kuran çapraz zaman koşulu"
      yasaklar:
        - "Her günün öğesini tek tek tarif eden koşullar yazma"
        - "Koşulları takvimi gün gün dolduracak biçimde dizme"
        - "Tek bir öğeyi birden fazla zaman ilişkisiyle tamamen çözen açık koşullar yazma"
        - "Koşulları soldan sağa çözüm şeması gibi dizme"
        - "Tek bir maddeyle doğru seçeneğin kesinleşmesine yol açma"

  visual:
    required: true
    description: "Zaman dizisi eşleştirme sorusunu simgeleyen takvim ızgarası veya zaman çizelgesi ikonu"
    placement: "paragraph_right_or_top"
    visual_type_allowed:
      - "gün-etkinlik boş takvim ızgarası (3-4 günlük, içi boş)"
      - "soldan sağa ardışık günleri gösteren zaman çizelgesi sembolü"
      - "hücreleri boş mini takvim ikonu"
    kurallar:
      - "Görsel senaryo içeriğini (kişileri, nesneleri veya konumlarını) tasvir etmemelidir"
      - "Görsel yalnızca soru tipini simgeleyen soyut/sembolik bir ikon veya şema olmalıdır"
      - "Görsel bulmacayı çözmede ipucu vermemeli; doğru cevabı ima etmemelidir"
      - "Görsel sade, temiz ve dikkat dağıtmayan bir ikon olmalıdır"
      - "Görsel içinde kişi adı, konum bilgisi veya bulmacaya ait sayısal veri bulunmamalıdır"
      - "Tablo veya ızgara görseli kullanılacaksa hücreler boş ya da soru işaretli olmalıdır"
    yasaklar:
      - "Senaryo sahnesi — kişileri, nesneleri veya konumlarını gösteren illüstrasyon"
      - "Bulmacadaki sıra, yerleşim veya eşleşmeleri ele veren gerçekçi tasvir"
      - "Fotoğraf benzeri sahne görüntüsü"
      - "Puzzle içeriğine dair somut nesne görseli (sandalye, masa, kişi silueti vb.)"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli zaman dizisini kurmaya ve ardından belirli bir
      gün+öğe eşleşmesinin kesin doğru, kesin yanlış, söylenebilir ya da
      söylenemez olduğunu seçmeye zorlamalıdır.
    kurallar:
      - "Soru kökü gizli dizi yeterince kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak belirli bir gün+öğe önermesinin doğruluk durumunu sorgulamalıdır"
      - "Tercihen 'kesinlikle doğrudur', 'kesinlikle yanlıştır', 'kesin olarak söylenebilir', 'kesin olarak söylenemez' türünde kökler kullanılmalıdır"
      - "Soru kökü, öğrenciyi doğrudan tek bir gün bilgisini okumaya değil, kurulmuş gizli zaman dizisini yorumlamaya yöneltmelidir"
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 10
    style: "day_item_proposition"
    correct_count: 1
    kurallar:
      - "Her seçenek bir gün + öğe eşleştirmesi biçiminde yazılmalıdır"
      - "Seçenekler tam zaman dizisini vermemelidir"
      - "Tüm seçenekler aynı temsil düzeyinde olmalıdır; hepsi gün/konum + öğe önermesi biçiminde yazılmalıdır"
      - "Bir seçenek gün+öğe, bir diğeri iki öğenin ardışıklığı gibi dağınık yapılmamalıdır; tüm seçenek yapıları paralel olmalıdır"
      - "Seçenekler, gizli zaman dizisi üzerinden test edilen tekil eşleştirmeler olmalıdır"
      - "Doğru seçenek, belirtilen gün/konum için kesin doğru ya da kesin yanlış olan tek eşleştirme olmalıdır"
      - "Hiçbir seçenek doğrudan bir koşul cümlesinin tekrar yazılmış hâli olmamalıdır"
      - "Hiçbir seçenek tek bir maddeye bakılarak doğrudan doğrulanabilir veya elenebilir olmamalıdır"
      - "Seçenekler biçimsel olarak dengeli olmalıdır"
      - "Doğru cevap uzunluk, vurgu veya özel ifade nedeniyle ayırt edilmemelidir"

