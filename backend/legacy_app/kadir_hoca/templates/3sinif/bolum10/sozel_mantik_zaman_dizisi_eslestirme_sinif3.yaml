# ═══════════════════════════════════════════════════════════════
  # DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli zaman
    dizisi kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen gün+öğe
    eşleştirmesidir. Öğrenciden tek bir ipucuna dayanarak değil, tüm maddeleri
    analiz ederek doğru eşleştirmeyi ya da kesin doğru/yanlış önermeyi seçmesi beklenir.

  temel_ilke: >
    Gizli zaman dizisi kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan kesin gün+öğe eşleşmesi olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara zaman blokları ve gün eşleştirmeleri üzerinden gizli dizi kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce gün-öğe dizisini kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; kurulmuş gizli dizinin zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: gizli diziden KESİNLİKLE çıkan gün+öğe eşleşmesi olmalıdır"
    - "Negatif köklerde doğru cevap: gizli diziyle çelişen ya da gizli diziden kesin olarak çıkarılamayan gün+öğe eşleşmesi olmalıdır"
    - "Çıkarım köklerinde yalnızca bir seçenek kesin doğru ya da kesin yanlış olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir çıkarım olmalıdır"
    - "Doğru cevap 2-10 kelime arasında olmalıdır"
    - "Duruma göre kısa ifade ya da tam cümle olabilir"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli zaman dizisi kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen gün/öğe ilişkisinin doğrudan tekrarına dönüşmesi"
    - "Birden fazla seçeneğin gizli diziden eşit derecede doğru ya da yanlış çıkması"
    - "Doğru cevabın tüm diziyi açık eden kapsamlı bir açıklama biçiminde yazılması"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli zaman dizisi kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Diğer seçeneklerin de aynı ölçüde doğru ya da yanlış olma ihtimali kalıyor mu?"

# ═══════════════════════════════════════════════════════════════
    # CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel gün+öğe eşleştirmeleri olmamalıdır. Her yanlış seçenek, öğrencinin
    gizli zaman dizisini kurarken yapabileceği bütünsel bir muhakeme hatasının
    sonucu olmalıdır. Öğrenci yanlış bir ara dizi kurarsa ya da bir gün+öğe
    eşleşmesini gereğinden erken kesinleştirirse, bu şıklardan birini işaretlemeye
    yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif gizli zaman dizisinin sonucu olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı gün+öğe eşleştirmesi olmalıdır"
    - "Çeldirici, tüm dizi kurulmadan değil; yanlış dizi kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış zaman yerleştirme yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru zaman dizisi ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş dizide doğruymuş gibi görünen makul gün+öğe önermesi yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli zaman dizisini kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış zaman dizisi veya yanlış kesinleştirme kurgusu tasarla."
    - "3. Her yanlış kurgu, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış kurguların sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldirici, sorudaki gün+öğe önermesi biçimini korumalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış zaman dizisi mantığına dayanmalıdır"
    - "Bazı çeldirici türleri tek başına yeterince güçlü olmayabilir; bu türler başka bir yanlış zaman stratejisiyle birlikte kullanılmalıdır"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalı; daha güçlü bir yanlış zaman dizisi stratejisini destekleyici olarak kullanılmalıdır"
    - "Çeldiriciler, öğrencinin gizli diziyi yanlış ya da eksik tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış zaman yerleşimi sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca rastgele başka bir günle veya başka bir öğeyle değiştirilmiş hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek aynı temsil düzeyinde gün+öğe eşleştirmesi biçiminde olmalıdır"

  stratejiler:
    - ad: "ARDISIK_GUN_ILISKISINI_YANLIS_TASIMA"
      bilisssel_hata_kategorisi: "ardisiklik_hatasi"
      aciklama: "Öğrenci iki öğenin ardışık günlerde olma ilişkisini yanlış yorumlayarak hatalı gün+öğe eşleşmesi kurar"
      nasil_olusturulur: |
        Ardışık günlerde yer alması gereken iki öğeyi koru; ancak bunların başlangıç
        gününü ya da yönünü yanlış taşıyan alternatif bir dizi kur. Çeldirici,
        bu yanlış bloktan çıkan ama ilk bakışta makul görünen gün+öğe eşleşmesine dayanmalıdır.

    - ad: "BIR_ONCEKI_BIR_SONRAKI_GUN_HATASI"
      bilisssel_hata_kategorisi: "yon_hatasi"
      aciklama: "Öğrenci bir öğenin başka bir öğeden bir önceki ya da bir sonraki gün geldiğini ters yorumlar"
      nasil_olusturulur: |
        'Bir önceki gün' ve 'bir sonraki gün' ilişkisini ters taşıyan alternatif
        bir zaman dizisi kur. Çeldirici, yön karışıklığı nedeniyle doğruymuş gibi
        görünen ama tüm koşullar kontrol edildiğinde bozulan gün+öğe eşleşmesine dayanmalıdır.

    - ad: "BELIRLI_GUN_BILGISINI_DAR_YORUMLAMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci belirli bir gün ya da sınırlı gün bilgisini gereğinden fazla kesinleştirir"
      nasil_olusturulur: |
        Belirli günlerde çıkan öğelerden bazılarının verildiği koşullarda, öğrencinin
        olası günleri daraltıp erken kesinleştireceği bir alternatif dizi kur.
        Çeldirici, bu erken sabitlemenin sonucunda ortaya çıkan yanlış gün+öğe eşleşmesi olmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince
        bozulması gereken yanlış bir zaman dizisi kur. Çeldirici, öğrencinin ara
        çıkarımı yapıp sonraki mantıksal taşıma adımını atlaması sonucu yanlış
        gün+öğe eşleşmesini doğru ya da mümkün sanmasına dayanmalıdır.
      kullanim_notu: >
        Bu strateji tek başına kullanıldığında çeldirici zayıf kalabilir. Bu nedenle
        tek başına ana çeldirici olarak kullanılmamalı; "ARDISIK_GUN_ILISKISINI_YANLIS_TASIMA",
        "BIR_ONCEKI_BIR_SONRAKI_GUN_HATASI", "BELIRLI_GUN_BILGISINI_DAR_YORUMLAMA" veya
        "KALAN_GUNLERI_YANLIS_TAMAMLAMA" gibi daha güçlü bir yanlış zaman dizisi
        stratejisini destekleyici biçimde kullanılmalıdır.
      tek_basina_kullanilabilir: false
      birlikte_kullan:
        - "ARDISIK_GUN_ILISKISINI_YANLIS_TASIMA"
        - "BIR_ONCEKI_BIR_SONRAKI_GUN_HATASI"
        - "BELIRLI_GUN_BILGISINI_DAR_YORUMLAMA"
        - "KALAN_GUNLERI_YANLIS_TAMAMLAMA"

    - ad: "KALAN_GUNLERI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci dizinin büyük kısmını doğru kurar; fakat kalan günleri elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Gizli dizinin çoğunu doğru tut; ancak son 1-2 günü, tüm koşulları tekrar
        kontrol etmeden yanlış tamamlanmış gibi kurgula. Çeldirici, bu yanlış
        tamamlama sonucunda doğruymuş gibi görünen gün+öğe eşleşmesine dayanmalıdır.

    - ad: "GUN_FARKI_MESAFE_HATASI"
      bilisssel_hata_kategorisi: "mesafe_hatasi"
      aciklama: "Öğrenci iki öğe arasında bulunan gün sayısını yanlış kurar"
      nasil_olusturulur: |
        'Aralarında bir gün vardır', 'iki gün sonra gelir' gibi koşullarda mesafeyi
        yanlış taşıyan alternatif bir dizi kur. Çeldirici, bu mesafe hatası nedeniyle
        makul görünen ama tüm koşullar altında geçersiz olan gün+öğe eşleşmesi olmalıdır.

    - ad: "NEGATIF_KOKTE_MUMKUN_ESLESMEYI_YANLIS_SECME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci kökün yönünü karıştırdığı için doğru olan yerine yanlış olanı ya da tersini seçer"
      nasil_olusturulur: |
        Eğer soru kökü 'yanlıştır' veya 'söylenemez' türündeyse, gizli diziyle büyük
        ölçüde uyumlu ve güçlü görünen ama aslında işaretlenmemesi gereken bir
        gün+öğe eşleşmesi üret. Bu çeldirici, kök yönünü ve kesinlik derecesini
        karıştıran öğrencinin yapacağı hataya dayanmalıdır.

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak gün+öğe eşleşmesi üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele yanlış eşleşme yazmak"
    - "Çeldiriciyi yanlış zaman dizisi düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış çözüm mantığını temsil eden birden fazla çeldirici kullanmak"
    - "Bir yanlış seçenekte temsil düzeyini bozmak; örneğin biri gün+öğe, biri tüm hafta özeti gibi dengesiz yapı kurmak"

  kalite_kontrol:
    - "Bu çeldirici, öğrencinin kurabileceği yanlış bir zaman dizisinin sonucu mu?"
    - "Bu seçenek bir tek maddeyle hemen eleniyor mu?"
    - "Bu seçenek ancak tüm koşullar kontrol edilince mi yanlışlaşıyor?"
    - "Bu çeldirici, doğru diziye yakın ama hatalı bir alternatif kurguya dayanıyor mu?"
    - "Her çeldirici farklı bir yanlış çözüm yolunu temsil ediyor mu?"
    - "Tüm çeldiriciler aynı temsil düzeyinde gün+öğe eşleştirmesi biçiminde mi?"

  önerilen_dagilim:
    - "1 ana çeldirici: ARDISIK_GUN_ILISKISINI_YANLIS_TASIMA veya BIR_ONCEKI_BIR_SONRAKI_GUN_HATASI"
    - "1 ana çeldirici: BELIRLI_GUN_BILGISINI_DAR_YORUMLAMA veya GUN_FARKI_MESAFE_HATASI"
    - "1 ana çeldirici: KALAN_GUNLERI_YANLIS_TAMAMLAMA veya NEGATIF_KOKTE_MUMKUN_ESLESMEYI_YANLIS_SECME"
    - "'ILISKIYI_EKSIK_TASIMA' tek başına kullanılmamalı; yalnızca yukarıdaki ana çeldiricilerden biriyle birlikte destekleyici mantık olarak kullanılmalıdır"

use_shared_strategies: false

