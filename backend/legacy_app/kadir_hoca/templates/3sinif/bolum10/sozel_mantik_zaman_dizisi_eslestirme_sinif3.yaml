    ornek_setup: "Bir fırında hafta boyunca her gün farklı bir özel ürün hazırlanacaktır."

  - ad: "bilim_merkezi_gosteri_takvimi"
    aciklama: "Bilim merkezinde yapılan günlük gösterilerin günlere yerleştirilmesi"
