# bolum6/sozel_mantik_zaman_dizisi_eslestirme_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 gün/öğe eşleştirme seçeneği
# Bu sürüm yalnızca "zaman dizisi eşleştirme sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_zaman_dizisi_eslestirme_sinif3"
  ad: "3. Sınıf Sözel Mantık - Zaman Dizisi Eşleştirme"
  sinif_seviyesi: 3
  aciklama: "Öğe, ürün veya etkinlikleri günlere ya da zaman sırasına her biri yalnızca bir kez gelecek şekilde yerleştirerek gizli zaman dizisini bulma ve buna göre çıkarım yapma"
  frequency: "High (~12 questions)"

zaman_dizisi_senaryolari:
  - ad: "haftalik_cizgi_film_yayini"
    aciklama: "Haftanın günlerinde yayınlanan farklı çizgi filmlerin günlerle eşleştirilmesi"
    ornek_setup: "Bir çocuk kanalında pazartesiden cumaya her gün farklı bir çizgi film yayınlanacaktır."

  - ad: "okul_duyuru_haftasi"
    aciklama: "Bir okulda hafta boyunca her gün farklı bir duyuru temasının yapılması"
    ornek_setup: "Bir okulda hafta boyunca her gün farklı bir duyuru konusu paylaşılacaktır."

  - ad: "kutuphane_tema_gunleri"
    aciklama: "Kütüphanede farklı günlerde yapılan tema etkinliklerinin günlerle eşleştirilmesi"
    ornek_setup: "Bir kütüphanede hafta boyunca her gün farklı bir tema etkinliği yapılacaktır."

  - ad: "firin_urun_takvimi"
