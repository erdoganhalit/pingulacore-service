# ═══════════════════════════════════════════════════════════════
    # URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi gizli zaman dizisini tamamen ya da büyük ölçüde
    kurmaya zorlamalıdır. Doğru cevap; tek bir koşuldan, iki koşulun hızlı
    birleşiminden veya yüzeysel elemeden bulunamamalı; ancak günler/zaman adımları
    ile öğeler arasındaki ilişkiler birlikte değerlendirildikten sonra sorulan
    gün+öğe eşleşmesinin kesin doğru, kesin yanlış, söylenebilir ya da
    söylenemez olduğu anlaşılmalıdır.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca zaman dizisi eşleştirme sorusuna uygun bir bağlam seç.
        Örnek alanlar:
        - haftalık çizgi film yayını
        - fırın ürün takvimi
        - planetaryum programı
        - robot bakım planı
        - festival sahne programı
        - akvaryum gösteri takvimi

    - step: 2
      action: "Öğeleri ve gizli doğru zaman dizisini kur"
      details: |
        - Önce 3 öğe belirle
        - Sonra 4-6 gün/zaman adımı belirle
        - Her öğeyi bu zaman adımlarına yalnızca bir kez gelecek şekilde yerleştir
        - Bu diziliş, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm zaman dizisi kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü, tam diziyi değil; belirli bir gün+öğe önermesinin
        kesin doğru, kesin yanlış, söylenebilir ya da söylenemez olup olmadığını sormalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle doğrudur
        - kesinlikle yanlıştır
        - kesinlikle söylenebilir
        - kesinlikle söylenemez
        - gün-öğe eşleştirmelerinden hangisi doğrudur
        - gün-öğe eşleştirmelerinden hangisi yanlıştır

    - step: 4
      action: "Koşulları gizli diziden türet"
      details: |
        - 3 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru aday doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde zaman dizisi yeterince kurulmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar, hedeflenen soru köküne göre yalnızca bir doğru cevap üretmelidir
        - Koşullar ağırlıklı olarak zaman ve sıra ilişkisi içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede zaman dizisinin çerçevesini tanıt
        - Kaç gün/zaman adımı olduğu anlaşılır olsun
        - Hangi öğelerin yerleştirileceği net olsun
        - Bağlam sade, öğrenciye yakın ve zaman-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, sorulan gün+öğe önermesi için kesin doğru ya da kesin yanlış olan tek eşleştirme olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli diziyi kurmadan bu eşleşmeye ulaşamamalıdır
        - Doğru seçenek gün+öğe önermesi biçiminde olmalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli diziyi eksik veya yanlış kuran öğrencinin düşebileceği yanlış gün+öğe eşleşmeleri olmalıdır
        - Çeldiriciler, ardışıklığı yanlış taşıma, gün yönünü ters kurma, kalan günleri yanlış tamamlama gibi hatalara dayanmalıdır
        - 'ILISKIYI_EKSIK_TASIMA' tek başına ana çeldirici olarak kullanılmamalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler gün+öğe önermesi biçiminde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun
        - Tüm seçenekler aynı temsil düzeyinde kalsın

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci gizli zaman dizisini kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Yanlış şıklardan biri tek bir maddeyle eleniyor mu?
        - Sorulan gün+öğe önermesi için yalnızca bir seçenek mi kesin doğru/yanlış?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

