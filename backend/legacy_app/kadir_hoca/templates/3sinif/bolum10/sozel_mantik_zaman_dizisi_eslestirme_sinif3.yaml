  - ad: "sera_bakim_takvimi"
    aciklama: "Serada farklı bakım işlerinin günlere göre sıralanması"
    ornek_setup: "Bir serada hafta boyunca her gün farklı bir bakım işi yapılacaktır."

  - ad: "akvaryum_gunluk_gosteri_programi"
    aciklama: "Akvaryumda günlük yapılan gösterilerin zaman dizisine yerleştirilmesi"
    ornek_setup: "Bir akvaryumda üç gün boyunca her gün farklı bir gösteri düzenlenecektir."

  - ad: "uzay_kampi_atolye_takvimi"
    aciklama: "Bilim etkinliğindaki atölyelerin günlere göre sıralanması"
    ornek_setup: "Bir bilim etkinliğinda hafta boyunca her gün farklı bir atölye yapılacaktır."

  - ad: "robot_bakim_plani"
