# templates/_strategies.yaml
# Merkezi çeldirici strateji havuzu — 30 kognitif çeldirici stratejisi
#
# Template'ler use_shared_strategies: true ayarıyla bu havuzu kullanır.
# LLM, paragraf içeriğine göre en uygun stratejileri seçer.
# Bir şıkta birden fazla strateji KOMBİNE edilebilir.
#
# Her strateji `templates` listesi ile hangi template'lerde kullanılacağını belirtir.
# Boş `templates` listesi = tüm template'lerde kullanılabilir.
#
# YAML anchors (&genel, &genel_ve_inverse, &tablo) tekrar eden template
# listelerini DRY tutar. _template_groups strategy_loader tarafından yok sayılır.

# ═══════════════════════════════════════════════════════════════
