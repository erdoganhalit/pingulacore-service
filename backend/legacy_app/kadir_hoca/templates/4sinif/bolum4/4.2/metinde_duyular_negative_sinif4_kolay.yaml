# Kaynak: metinde_duyular_negative_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 4. sinif metinde duyular negatif — kolay duzey

meta:
  id: "metinde_duyular_negative_sinif4_kolay"
  ad: "Metinde Duyular - Yer Verilmeyen (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — metinde kullanılmayan duyuyu tespit etme."
  frequency: "Very High"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Betimleyici paragraf + soru kökü + 4 duyu seçeneği (kolay)"

  paragraph:
    required: true
    word_count_min: 50
    word_count_max: 65
    background_color: "#e8f8e8"
    sentence_count_min: 4
    sentence_count_max: 5
    stil: "betimleyici"
    kurallar:
      - "Metin en az 3 farklı duyuya hitap eden net ifadeler içermelidir."
      - "Paragrafta kullanılan 3 duyu açık ve doğrudan ifadelerle verilmelidir."
      - "Haric tutulan duyu ile metindeki duyular arasında karışıklık oluşturacak çok ince ipuçları kullanılmamalıdır."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 2
    style: "concept"
    correct_type: "does_not_belong"
    correct_count: 1
    kurallar:
      - "Duyular için SADECE basit, bilinen kelimeleri kullan: görme, işitme, dokunma, tatma, koklama"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde aşağıdaki duyulardan hangisine ait bir ayrıntıya <u>yer verilmemiştir</u>?</b>"
  # KULLANILDI: - "<b>Bu metinde aşağıdaki duyuların hangisinden faydalanılmamıştır?</b>"
  # KULLANILDI: - "<b>Bu parçada aşağıdaki duyuların hangisiyle ilgili bir ayrıntıya <u>yer verilmemiştir</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metinde örneği bulunmayan duyu"
  mantik: "INVERSE - diger 3 secenek metinde bulunan duyular, dogru cevap buluNMAYAN duyu"
  kurallar:
    - "Metinde hicbir ornegi veya ifadesi bulunmayan duyu."
    - "Diger 3 secenekteki duyular metinde acikca gecmeli."
    - "Dogru cevap olarak secilen duyu, paragrafin hicbir cumlesinde ima bile edilmemeli."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

distractors:
  notlar:
    - "3 celdirici metinde acikca bulunan duyular olmali"
    - "Celdiriciler metinde acikca gecen duyulardan secilmeli"

# ═══════════════════════════════════════════════════════════════
# BECERI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB2"
  bilesenler: ["siniflandirma"]
  surec_bileseni: "bilgiyi_cikartma"


celdirici_stratejileri:
  - ad: "BELIRGIN_HARIC_DUYU"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Paragrafta açıkça yer almayan duyu — belirgin şekilde ayırt edilebilir"
    nasil_olusturulur: |
      Paragrafta kullanılan 3 duyu açık ve doğrudan ifadelerle verilmeli.
      Haric tutulan duyu ile metindeki duyular arasında karışıklık oluşturacak çok ince ipuçları kullanılmamalı.
      Celdiriciler metinde açıkça bulunan duyulardan seçilmeli.
    kategori: "content"

  - ad: "ACIK_BULUNAN_DUYULAR"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metinde açıkça bulunan 3 duyu — kolay ayırt edilebilir"
    nasil_olusturulur: |
      Metinde açıkça geçen 3 duyunun seçeneklerde yer alması.
      Kolay seviyede bu duyuların metinde varlığı belirgin — öğrenci kolayca elemelidir.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
