# Kaynak: metinde_duyular_ikili_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.orta
# 4. sinif metinde duyular ikili — orta duzey

meta:
  id: "metinde_duyular_ikili_sinif4_orta"
  ad: "Metinde Duyular - İkili Duyular (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — metinde kullanılan duyular arasından doğru ikiliyi seçme."
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Duyusal ifadeler içeren paragraf + soru kökü + ikili duyular seçenekleri (orta)"

  paragraph:
    required: true
    word_count_min: 66
    word_count_max: 85
    background_color: "#f8f0e0"
    sentence_count_min: 5
    sentence_count_max: 6
    stil: "oykuleyici"
    kurallar:
      - "Duyular acik olmali ancak metnin tamami okunmadan netlesmemelidir."
      - "En az 1 celdirici dogru cevaba anlamsal olarak yakin gorunmelidir."
      - "Eksik/fazla/yanlis duyu gruplari daha dengeli dagitilmalidir."
      - "Paragraf en az iki farklı duyu organını harekete geçiren ifadeler içermeli."
      - "Duyusal ifadeler doğal bağlamda geçmeli, listelemek gibi sıralanmamalı."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "Dis bilgi gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 6
    style: "keyword_set"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde aşağıdaki duyu organlarından hangilerine ait ifadelere yer verilmiştir?</b>"
  - "<b>Bu metinde hangi duyu organlarını harekete geçiren ifadeler kullanılmıştır?</b>"
  # KULLANILDI: - "<b>Yukarıdaki metinde aşağıdaki duyulardan hangileri kullanılmıştır?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metinde gerçekten kullanılan iki duyuyu doğru gösteren seçenek"
  kurallar:
    - "Her iki duyunun da metinde açıkça ifade edilmis olmali."
    - "Seçenekler 'duygu1 - duygu2' formatında olmali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

distractors:
  notlar:
    - "Celdiriciler metinde kullanilmayan duyulardan en az birini icermeli"
    - "Tum secenekler ayni formatta olmali (iki duygu 'duygu1 - duygu2' biciminde)"

# ═══════════════════════════════════════════════════════════════
# BECERI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB2"
  bilesenler: ["yorumlama"]
  surec_bileseni: "bilgiyi_cikartma"


celdirici_stratejileri:
  - ad: "YAKIN_DUYU_GRUBU"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Doğru duyu grubuna yakın ama 1 duyu farklı olan seçenek"
    nasil_olusturulur: |
      Doğru duyu grubuna anlamsal olarak yakın ama 1 duyu farklı olan bir çift oluştur.
      Orta seviyede en az 1 celdirici doğru cevaba anlamsal olarak yakın görünmeli.
      Eksik/fazla/yanlış duyu grupları daha dengeli dağıtılmalı.
    kategori: "semantic"

  - ad: "DOLAYLI_DUYU_CIKARIMI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Metinden dolaylı ama yanlış çıkarılan duyu grubu"
    nasil_olusturulur: |
      Metindeki ipuçlarından dolaylı yolla çıkarılabilecek ama gerçekte yanlış olan bir duyu çifti oluştur.
      Orta seviyede öğrenci metnin tamamını okuyarak karar vermelidir.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
