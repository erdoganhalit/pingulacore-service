# Kaynak: yardimci_fikir_sentence_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.orta
# 4. sinif yardimci fikir cumle — orta duzey

meta:
  id: "b12_yardimci_fikir_sentence_sinif4_orta"
  ad: "4. Sinif - Yardimci Fikir Cumle (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — 4. sinif tam cumle yardimci fikir sorusu. Metnin yardimci dusuncesini en iyi yansitan cumleyi secme."
  frequency: "High"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Tek paragraf + soru koku + 4 tam cumle secenegi (orta)"

  paragraph:
    required: true
    word_count_min: 65
    word_count_max: 90
    background_color: "#f8f0e0"
    sentence_count_min: 4
    sentence_count_max: 6
    stil: "bilgilendirici"
    kurallar:
      - "Paragraf bir ana fikir etrafinda birden fazla (en az 3-4) yardimci fikir icermelidir."
      - "Yardimci fikirler ana fikri destekler (ornek, gerekce, aciklama, sonuc)."
      - "Orta seviyede yardimci fikirler metinden dogrudan veya basit cikarimla okunabilmelidir."
      - "Paragraf bilgi yogunlugu bakimindan dengeli olmali ve dikkatli okuma gerektirmelidir."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."
      - "Dis bilgi gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 4
    word_count_max: 14
    style: "complete_sentence"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Tum secenekler tam cumle biciminde olmali."
      - "Dogru secenek metnin yardimci fikirlerinden birini dogru yansitmali."
      - "Celdirici secenekler ana fikri veya alakasiz bilgileri yansitmali."

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metne göre aşağıdakilerden hangisi söylenebilir?</b>"
  # KULLANILDI: - "<b>Bu metinden aşağıdakilerden hangisine ulaşılabilir?</b>"
  # KULLANILDI: - "<b>Bu metinden hareketle aşağıdakilerden hangisi doğrudur?</b>"
  - "<b>Bu metinde aşağıdakilerden hangisi anlatılmaktadır?</b>"
  - "<b>Aşağıdakilerden hangisi bu metinden çıkarılabilir?</b>"
# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metnin ana fikrini destekleyen yardimci fikri tam ve dogru bicimde yansitan cumle"
  kurallar:
    - "Dogru secenek paragrafta ACIKCA bulunan bir yardimci fikri yansitmalidir."
    - "Dogru secenek metindeki bilgilerden dogrudan kanitlanabilmelidir (kelime kelime ayni olmasa da)."
    - "Dogru secenek ana fikir DEGIL, destekleyici yardimci fikir olmalidir."
    - "Dogru secenek metindeki hicbir cumleyi kelimesi kelimesine tekrarlamamalidir."
    - "Dogru secenek yuzeysel kelime eslesmesinden ziyade anlamca metinle uyumlu olmalidir."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════


celdirici_stratejileri:
  - ad: "ANA_FIKIR_TUZAGI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metnin ana fikrini yardımcı fikir olarak sunan tuzak"
    nasil_olusturulur: |
      Metnin ana fikrini (yardımcı fikir değil) yansıtan bir cümle oluştur.
      Orta seviyede öğrenci yardımcı-ana fikir farkını dikkatle ayırt etmeli.
      Tam cümle, 5-10 kelime.
    kategori: "content"

  - ad: "METINDE_OLMAYAN_YAKIN"
    bilisssel_hata_kategorisi: "dis_bilgi_karisimi"
    aciklama: "Konuyla ilgili ama metinde desteklenmeyen yargı"
    nasil_olusturulur: |
      Paragrafın konusuyla ilgili ama metinde açıkça desteklenmeyen bir bilgi/yargı oluştur.
      Orta seviyede bu seçenek 'belki doğrudur' hissi verebilir ama metinden kanıtlanamamalı.
      Tam cümle, 5-10 kelime.
    kategori: "content"

  - ad: "CARPITILMIS_CIKARIM"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Metindeki bilgileri çarpıtarak yanlış çıkarıma ulaştıran seçenek"
    nasil_olusturulur: |
      Paragraftaki bilgileri abartarak, genelleştirerek veya ters yöne çevirerek yanlış bir yargı oluştur.
      Orta seviyede bu çarpıtma dikkatli okuyunca fark edilebilmeli.
      Tam cümle, 5-10 kelime.
    kategori: "semantic"

use_shared_strategies: false

# ═══════════════════════════════════════════════════════════════
# BECERI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB2"
  bilesenler: ["cikarim_yapma"]
  surec_bileseni: "bilgiyi_cikartma"

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
