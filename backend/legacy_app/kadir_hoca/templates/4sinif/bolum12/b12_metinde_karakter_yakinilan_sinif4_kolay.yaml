# Kaynak: metinde_karakter_yakinilan_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 4. sinif metinde karakter yakinilan — kolay duzey

meta:
  id: "b12_metinde_karakter_yakinilan_sinif4_kolay"
  ad: "Metinde Karakter - Yakınılan Özellik (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — kişinin şikayet edilen olumsuz özelliğini bulma."
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Şikayet içeren paragraf + soru kökü + kavram seçenekler (kolay)"

  paragraph:
    required: true
    word_count_min: 50
    word_count_max: 65
    background_color: "#e8f8e8"
    sentence_count_min: 3
    sentence_count_max: 5
    stil: "oykuleyici"
    kurallar:
      - "Bir kişinin huyundan veya alışkanlığından şikayet edilmeli."
      - "Şikayet eden kişi ve şikayet edilen kişi açıkça belirgin olmalı."
      - "Olumsuz özellik doğrudan söylenmemeli, davranışlar üzerinden gösterilmeli."
      - "Şikayet edilen özelliği gösteren davranışlar daha açık ve tekrarlı verilmeli."
      - "Paragrafta konuyla ilgili AÇIKLAMA, TANIM veya EK BİLGİ verme! Paragraf SADECE hikâyeyi/olayı anlatsın."
      - "YASAK: Ders kitabı açıklamaları yapma."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 1
    word_count_max: 3
    style: "concept"
    correct_count: 1
    correct_type: "matches"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde bahsedilen kişinin yakınılan özelliği aşağıdakilerden hangisidir?</b>"
  # KULLANILDI: - "<b>Bu metinde bahsedilen kişi hangi kişilik özelliğinden yakınmaktadır?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metinde şikayet edilen olumsuz alışkanlık/özellik"
  kurallar:
    - "Sikayet edilen ozellik metindeki davranislarla ortusmelidir."
    - "1-3 kelimelik kisa kavram olmali."
    - "Ozellik olumsuz bir aliskanlik veya huy olmali."
    - "Sikayet baglaminda acikca belirlenebilir olmali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI BILGILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "BELIRGIN_YAKINILAN_DURUM"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Yakınılan durumu açıkça gösteren, kolay ayırt edilebilir seçenek yapısı"
    nasil_olusturulur: |
      Yakınılan durum metinde açık ve belirgin ipuçlarıyla verilmeli.
      Kolay seviyede doğru cevabın yakınılan durumu temsil ettiği açıkça anlaşılmalı.
      Celdiriciler yakınılan duruma uzak seçilmeli.
    kategori: "content"

  - ad: "YANLIS_DURUM_BELIRGIN"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Metindeki gerçek yakınılan durumu kaçıran belirgin hatalı seçenek"
    nasil_olusturulur: |
      Metindeki gerçek yakınılan durumdan belirgin şekilde farklı seçenekler oluştur.
      Kolay seviyede bu seçeneklerin yanlış olduğu hızlıca anlaşılmalı.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
