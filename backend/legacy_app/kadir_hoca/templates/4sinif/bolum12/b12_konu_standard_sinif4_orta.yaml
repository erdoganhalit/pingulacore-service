# Kaynak: konu_standard_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.orta
# 4. sinif konu standart — orta duzey

meta:
  id: "b12_konu_standard_sinif4_orta"
  ad: "4. Sinif - Metinde Konu Standart (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — paragrafin ana konusunu belirleme. Yan detaylar celdirici malzeme saglar, en az bir celdirici ilk bakista makul gorunur."
  frequency: "High"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Tek paragraf + soru koku + 4 kisa konu secenegi (orta)"

  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 80
    background_color: "#f8f0e0"
    sentence_count_min: 5
    sentence_count_max: 6
    stil: "bilgilendirici"
    kurallar:
      - "Konu acik kalmali fakat tum paragraf dusunulmeden tam netlesmemeli."
      - "2-4 destekleyici bilgi bulunmali."
      - "En az bir yan detay celdirici uretimine malzeme vermeli."
      - "Birden fazla konuya deginmemeli."
      - "KRITIK: Karakter/kisi ismi kullanirken Ozan ismini KESINLIKLE KULLANMA."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 2
    word_count_max: 6
    style: "topic_phrase"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Secenekler kisa isim tamlamasi biciminde olmali (2-5 kelime ideal)."
      - "Dogru cevap paragrafin TAM konusunu temsil etmeli."
      - "Dogru secenek ne ebeveyn konuyu kadar genis ne de bir detaya inecek kadar dar olmali."
      - "1 yakin_anlam celdirici ZORUNLU ve guclu olmali."
      - "1 detay_tuzagi celdirici olmali."
      - "1 cok_genis veya cok_dar veya iliskili_ama_farkli celdirici olmali."
      - "En az bir celdirici ilk bakista dogruya aday gibi gorunmeli."
      - "YASAK: Tum celdiricilerin kolayca alakasiz olmasi."

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Bu metinde aşağıdakilerden hangisi anlatılmaktadır?</b>"
  # KULLANILDI: - "<b>Bu metinde aşağıdakilerin hangisinden bahsedilmektedir?</b>"
  # KULLANILDI: - "<b>Bu metin aşağıdakilerin hangisinden bahsetmektedir?</b>"
  # KULLANILDI: - "<b>Aşağıdakilerden hangisi bu metnin konusunu en iyi ifade eder?</b>"
  - "<b>Bu metinde ele alınan konu aşağıdakilerden hangisidir?</b>"
  - "<b>Bu metne konu olan durum aşağıdakilerden hangisidir?</b>"
  - "<b>Bu metinde aşağıdakilerin hangisinden söz edilmektedir?</b>"
  # KULLANILDI: - "<b>Bu metinde aşağıdakilerin hangisine değinilmektedir?</b>"
  - "<b>Bu metinde aşağıdakilerin hangisine değinilmiştir?</b>"
  # KULLANILDI: - "<b>Bu metinde aşağıdakilerin hangisinden bahsedilmiştir?</b>"
  - "<b>Bu metinde aşağıdakilerden hangisine değinilmiştir?</b>"
  # KULLANILDI: - "<b>Bu metnin konusu aşağıdakilerden hangisidir?</b>"
  - "<b>Bu metinde neden söz edilmektedir?</b>"
  - "<b>Bu metinde</b> \"{topic}\" <b>ile ilgili aşağıdakilerden hangisine değinilmiştir?</b>"
  - "<b>Bu metinde</b> \"{topic}\" <b>ile ilgili aşağıdakilerden hangisi anlatılmaktadır?</b>"
  # KULLANILDI: - "<b>Bu metinde</b> \"{topic}\" <b>ile ilgili anlatılan konu aşağıdakilerden hangisidir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Paragrafin tam ve oz konusu — ne eksik ne fazla"
  kurallar:
    - "Dogru secenek paragraftaki hicbir cumleyi kelimesi kelimesine tekrarlamamali."
    - "Paragrafin ne hakkinda oldugunu ozetlemeli."
    - "Ne cok genis ne cok dar olmali."
    - "Kisa ve oz olmali (2-5 kelime ideal)."
    - "Paragrafin TAMAMI hakkinda bilgi vermeli, sadece bir kismi degil."
    - "Dogru cevap paragrafin TAM konusunu temsil etmeli."
    - "Dogru secenek ne ebeveyn konuyu kadar genis ne de bir detaya inecek kadar dar olmali."
    - "Kelime sayisi bakimindan en uzun secenek olmamali."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "YAKIN_ANLAM"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Konuya güçlü şekilde yakın, ilk bakışta doğru gibi görünen ifade"
    nasil_olusturulur: |
      Paragrafın konusuna çok yakın ama tam örtüşmeyen bir kısa ifade oluştur.
      Bu seviyede yakınlık güçlü olmalı — öğrenci ilk bakışta doğru sanabilmeli.
      Tam paragraf okunduğunda fark anlaşılmalıdır.
    kategori: "semantic"

  - ad: "DETAY_TUZAGI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Paragraftaki güçlü bir ayrıntıyı konu gibi sunan orta zorluklu tuzak"
    nasil_olusturulur: |
      Paragrafta geçen güçlü bir detayı veya alt boyutu ana konu olarak sun.
      Bu detay paragrafta belirgin yer tutmalı — öğrenci "bu da önemli" diyebilmeli.
      Ancak tüm paragrafı kapsamadığı için elenmelidir.
    kategori: "cognitive"

  - ad: "KAPSAM_KAYDIRMA"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Aynı alanda ama farklı odakta, konuya makul görünen alternatif"
    nasil_olusturulur: |
      Paragrafın konusuyla aynı genel alanda ama farklı odakta bir konu ifadesi oluştur.
      Örnek: "Ahtapotların savunma yöntemleri" yerine "Ahtapotların yaşam alanları".
      Orta seviyede bu fark anlaşılabilir ama hemen belli olmamalı.
    kategori: "semantic"

use_shared_strategies: false

