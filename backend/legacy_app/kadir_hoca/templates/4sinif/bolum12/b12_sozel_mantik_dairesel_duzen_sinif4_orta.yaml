  - ad: "kamp_atesi_cevresi"
    aciklama: "Kamp ateşinin etrafında oturan kişilerin yerlerinin belirlenmesi"
    ornek_setup: "Altı öğrenci kamp ateşinin etrafında dairesel biçimde oturmaktadır."

  - ad: "dogum_gunu_pastasi_cevresi"
    aciklama: "Doğum günü masasının etrafında oturan çocukların düzeninin kurulması"
    ornek_setup: "Bir doğum günü kutlamasında çocuklar yuvarlak masanın etrafında oturmaktadır."

  - ad: "planetaryum_koltuk_duzeni"
    aciklama: "Planetaryumdaki halka biçimli oturma düzeninde kişilerin yerlerinin belirlenmesi"
    ornek_setup: "Bir planetaryum gösterisinde öğrenciler dairesel oturma alanında yerlerini almıştır."

  - ad: "tiyatro_prova_cemberi"
    aciklama: "Prova sırasında çember oluşturan öğrencilerin konumlarının bulunması"
    ornek_setup: "Bir tiyatro provasına katılan öğrenciler çember şeklinde dizilmiştir."

  - ad: "drama_atolyesi_cemberi"
    aciklama: "Drama etkinliğinde halka oluşturan katılımcıların yerleşiminin belirlenmesi"
    ornek_setup: "Bir drama atölyesinde katılımcılar yuvarlak bir düzen oluşturmuştur."

  - ad: "muzik_dinleti_halkasi"
    aciklama: "Müzik etkinliğinde halka biçiminde oturan çocukların düzeni"
    ornek_setup: "Bir müzik etkinliğinde çocuklar dairesel biçimde oturmaktadır."

  - ad: "sinif_sohbet_cemberi"
    aciklama: "Sınıf içinde sohbet için oluşturulan çemberde öğrencilerin yerleri"
    ornek_setup: "Bir sınıf etkinliğinde öğrenciler sandalyelerini çember şeklinde yerleştirmiştir."

