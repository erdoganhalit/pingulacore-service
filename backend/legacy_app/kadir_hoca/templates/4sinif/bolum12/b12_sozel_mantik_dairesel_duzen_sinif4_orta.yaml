# 4. sinif sözel mantık dairesel düzen — orta duzey

meta:
  id: "b12_sozel_mantik_dairesel_duzen_sinif4_orta"
  ad: "Sözel Mantık ve Muhakeme - Dairesel Düzen Sorusu (Orta)"
  sinif_seviyesi: 4
  aciklama: "Orta duzey — 6 kişi/varlık, 4 koşul, en az 2 dolaylı çıkarım, en az 3 ilişki türü. Öğrenci küçük bir komşuluk bloğunu başka bir yön veya karşılıklılık ilişkisiyle birleştirmelidir."
  frequency: "High"

