# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan düzen sorusu (orta)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, slot/bölüm/konumlara yerleştirilen öğelerle ilgili verilen
      ilişkisel koşulları birlikte değerlendirerek gizli düzeni kurması gerekir.
      Orta düzey: öğe ve slot/bölüm sayısı kolay düzeyden yüksek, koşul sayısı orta yoğunlukta,
      en az 1-2 koşul dolaylı çıkarım gerektirmelidir.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Düzenin neye ait olduğunu açıklar; kaç bölüm/slot olduğu ve hangi öğelerin yerleştirileceği tanıtılır"
      - "MADDELİ KOŞULLAR 4 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu düzenle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3<br>• Koşul 4"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Orta düzey: öğe sayısı ve slot/bölüm sayısı kolay düzeyden yüksek olmalıdır"
      - "Orta düzey: en az 1-2 koşul dolaylı çıkarım gerektirmelidir"
      - "Orta düzey: öğrenci birden fazla koşulu birlikte kullanmadan sonuca ulaşamamalıdır"
      - "Önce gizli doğru düzen kurulmalı; ardından yalnızca bu düzene götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 22
    style: "complete_sentence"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli düzen
    kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen seçenektir.
  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap 3-22 kelime arasında olmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "DOLAYLI_KOŞUL_ATLAMA"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Dolaylı çıkarım gerektiren koşulu doğrudan uygulanabilirmiş gibi işleyen ve hatalı düzene ulaşan seçenek"
    nasil_olusturulur: |
      Öğrencinin iki koşulu birlikte değerlendirmesi gereken bir adımı tek koşulla çözmüş gibi davranan ve sonuç olarak bir öğeyi yanlış slota yerleştiren seçenek sun.
    kategori: "cognitive"

  - ad: "CAKISAN_ILISKI_YANLISLIGI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Birden fazla ilişkiyi birleştirirken yanlış çıkarım yapan yerleşim"
    nasil_olusturulur: |
      Örneğin hem 'A, B'den önce' hem 'C, B'den sonra' koşulları varsa bunları yanlış sırayla birleştiren ama tek tek bakıldığında makul görünen bir düzen oluştur.
    kategori: "cognitive"

  - ad: "KOŞUL_SAYISI_KAYMASI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Orta seviye koşul yoğunluğunda bir koşulu fazladan sayarak ya da atlayarak oluşan düzen"
    nasil_olusturulur: |
      Koşulların bir tanesini iki kez uygulamış ya da hiç uygulamamış gibi davranan, sonuçta farklı ama benzer görünen bir yerleşim sun.
    kategori: "semantic"

use_shared_strategies: false

