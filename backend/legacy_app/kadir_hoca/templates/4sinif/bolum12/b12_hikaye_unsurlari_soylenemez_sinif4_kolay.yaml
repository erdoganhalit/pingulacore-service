# Kaynak: hikaye_unsurlari_soylenemez_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.kolay
# 4. sinif hikaye unsurlari soylenemez — kolay duzey

meta:
  id: "b12_hikaye_unsurlari_soylenemez_sinif4_kolay"
  ad: "Hikâye Unsurları (Söylenemez) (Kolay)"
  sinif_seviyesi: 4
  aciklama: "Kolay duzey — hikâye unsurları hakkında yapılan yanlış çıkarımı bulma"
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Paragraf + soru koku + cumle seklinde secenekler (kolay)"

  paragraph:
    required: true
    word_count_min: 50
    word_count_max: 65
    sentence_count_min: 4
    sentence_count_max: 5
    stil: "oykuleyici"
    kurallar:
      - "Oykuleyici bir metin olmali (olay orgusu, karakter, mekan vb.)"
      - "Hikaye unsurlari (Olay, Yer, Zaman, Kisi) hakkinda cikarim yapilabilir olmali"
      - "En az 3 unsur acikca bulunmali"
      - "Anlatici bakis acisi (1. tekil, 3. tekil vb.) belirgin olmali"
      - "Hikaye unsurlari daha acik ve dogrudan verilmeli"
      - "Metinle celisen yargi belirgin sekilde yanlis olmali"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE hikâyeyi anlatsın — unsur analizi veya tanımlaması YAPMA"
    background_color: "#d4edda"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 5
    word_count_max: 20
    style: "complete_sentence"
    correct_type: "does_not_belong"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu metindeki hikâye unsurları ile ilgili olarak hangisi <u>söylenemez</u>?</b>"
  - "<b>Bu metnin hikâye unsurları ile ilgili aşağıdakilerden hangisi yanlıştır?</b>"
  - "<b>Bu metnin hikâye unsurları dikkate alındığında aşağıdakilerden hangisi <u>söylenemez</u>?</b>"
  - "<b>Yukarıdaki metne göre hikâye unsurları ile ilgili aşağıdaki yargılardan hangisi <u>doğru değildir</u>?</b>"
  - "<b>Bu metindeki hikâye unsurları hakkında aşağıdakilerden hangisine <u>ulaşılamaz</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Metinle celisen yargi"
  mantik: "INVERSE - diger 3 secenek metinden cikariabilecek dogru yargilar, dogru cevap metinle celisiyor"
  kurallar:
    - "Hikaye unsurlari hakkinda metinle celisen bir yargi olmali"
    - "Tam cumle formatinda olmali (ozne + yuklem)"
    - "Makul gorunmeli ama paragraftaki bilgilerle celismeli"
    - "5-20 kelime arasinda olmali"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "BELIRGIN_SOYLENEMEZ"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metinden söylenemeyeceği açıkça anlaşılan seçenek — kolay elenebilir"
    nasil_olusturulur: |
      Doğru cevap metinden açıkça çıkarılamayan, belirgin şekilde desteklenmeyen bir unsur/bilgi içermeli.
      Kolay seviyede bu seçeneğin metinde yer almadığı hızlıca anlaşılabilmeli.
      Yanlış seçenekler (söylenebilen bilgiler) metinde açıkça yer almalı.
    kategori: "content"

  - ad: "ACIK_METINSEL_DESTEK"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metinde açıkça yer alan doğrulanabilir bilgiler — kolay elenebilir yanlış seçenekler"
    nasil_olusturulur: |
      Yanlış seçenekler metinde açıkça desteklenen bilgiler içermeli.
      Kolay seviyede öğrenci hangi seçeneğin metinde karşılığı olmadığını hızlıca bulabilmeli.
    kategori: "cognitive"

use_shared_strategies: false

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
