# Kaynak: paragraf_metin_giris_gelisme_sonuc_sinif4_zorluk_eklenmis.yaml → zorluk_duzeyleri.zor
# 4. sinif metin giris/gelisme/sonuc — zor duzey

meta:
  id: "b12_paragraf_metin_giris_gelisme_sonuc_sinif4_zor"
  ad: "Metin Giriş/Gelişme/Sonuç Bölümü Tespiti (Zor)"
  sinif_seviyesi: 4
  aciklama: "Zor duzey — mini paragraflardan hangisinin giriş, gelişme veya sonuç bölümüne ait olduğunu belirleme."
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Soru kökü + 4 mini paragraf seçenek (zor)"

  paragraph:
    required: false
    kurallar:
      - "En az iki celdirici, sorulan bolume aitmiş gibi makul gorunmeli."
      - "Yanlis secenekler yalniz yuzeysel zaman veya gecis ifadesine bakilarak elenmemeli."
      - "Yay ayrac kokunde yanlis etiket, bolum islevi gercekten analiz edilerek bulunmalidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"
    kurallar:
      - "Soru kökü SADECE tek bir soru cümlesi olmalı."
      - "Soru kökünde Roma rakamı, paragraf metni veya ek açıklama BULUNMAMALI."

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 35
    word_count_max: 60
    background_color: "#fce8e8"
    sentence_count_min: 3
    sentence_count_max: 4
    style: "mini_paragraph"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Her seçenek bir mini paragraf olmalı (3-4 cümle, 35-60 kelime)."
      - "Roma rakamı KULLANMA — seçeneklerde numaralama yok, sadece düz metin."
      - "Doğru mini paragrafın bölüm niteliği kalıp ifadelerle değil, içerik işleviyle anlaşılmalı."
      - "En az iki çeldirici, sorulan bölüme aitmiş gibi makul görünmeli."
      - "YASAK: 'Özetle', 'Kısacası', 'Sonuç olarak', 'Öncelikle', 'İlk olarak' gibi kalıp ifadeler."

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # KULLANILDI: - "<b>Aşağıdakilerden hangisi bir metnin giriş bölümü olabilir?</b>"
  # KULLANILDI: - "<b>Aşağıdakilerden hangisi bir metnin sonuç bölümüne aittir?</b>"
  # KULLANILDI: - "<b>Aşağıdakilerden hangisi bir metnin sonuç bölümüne ait <u>olamaz</u>?</b>"
  # KULLANILDI: - "<b>Aşağıdakilerden hangisi bir hikâyenin sonuç bölümüne aittir?</b>"
  - "<b>Aşağıdaki cümlelerden hangisi bir paragrafın giriş bölümü olmaya en uygundur?</b>"
  # KULLANILDI: - "<b>Aşağıdakilerden hangisi bir metnin sonuç bölümü olmaya en uygundur?</b>"
  - "<b>Bu cümlelerden hangisi metnin gelişme bölümünde yer alamaz?</b>"
  - "<b>Aşağıdakilerin hangisinde metnin ait olduğu bölüm yay ayraç içinde <u>yanlış</u> verilmiştir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Soru köküne göre doğru bölüme ait olan veya olmayan mini paragrafı seçme"
  kurallar:
    - "Giriş niteliğindeki mini paragraf: Konuyu tanıtan, genel çerçeveyi çizen metin."
    - "Gelişme niteliğindeki mini paragraf: Konuyu detaylandıran, örnekleyen metin."
    - "Sonuç niteliğindeki mini paragraf: Konuyu toparlayan, bir yargıya/sonuca varan metin."
    - "Doğru cevap bölüm özelliklerini içerikle belli etmeli, kalıp ifadelerle değil."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "ICERIK_ISLEVI_ZORLUKLU"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Bölüm niteliği kalıp ifadelerle değil içerik işleviyle anlaşılan güçlü tuzak"
    nasil_olusturulur: |
      Doğru mini paragrafın bölüm niteliği kalıp ifadelerle değil içerik işleviyle anlaşılmalı.
      En az 2 celdirici sorulan bölüme aitmiş gibi makul görünmeli.
      Yanlış seçenekler yalnız yüzeysel zaman veya geçiş ifadesine bakılarak elenmemeli.
    kategori: "cognitive"

  - ad: "COKLU_MAKUL_BOLUMLER"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "En az 2 celdirici bölüm işlevi bakımından makul görünen güçlü yapı"
    nasil_olusturulur: |
      En az 2 celdirici sorulan bölüme aitmiş gibi makul görünmeli.
      Zor seviyede doğru cevap yalnızca içerik işlevi ve anlam akışının tam analizi ile seçilebilmeli.
    kategori: "semantic"

use_shared_strategies: false

# ═══════════════════════════════════════════════════════════════
# BECERI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB2"
  bilesenler: ["siralama", "yapilandirma", "siniflandirma"]
  surec_bileseni: "metin_yapisini_analiz_etme"

sinif4_ek_kurallar:
  yasak_alanlar:
    - "5. sınıfa kayan aşırı soyut yorum soruları YASAK"
    - "Metinde açıkça geçmeyen bilgiye dayanan sorular YASAK"
    - "Birden fazla makul doğru seçenek oluşturan kurgu YASAK"
