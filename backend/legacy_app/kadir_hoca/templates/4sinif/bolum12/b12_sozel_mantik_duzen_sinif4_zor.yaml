# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan düzen sorusu (zor)"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, slot/bölüm/konumlara yerleştirilen öğelerle ilgili verilen
      ilişkisel koşulları birlikte değerlendirerek gizli düzeni kurması gerekir.
      Zor düzey: öğe sayısı, slot/bölüm sayısı ve koşul sayısı en yüksek düzeyde;
      birden fazla koşul dolaylı çıkarım gerektirmeli; çapraz ilişki ve bağımlılık sayısı artmış olmalıdır.
      Öğrenci tam düzeni kurmadan doğru cevaba ulaşamamalıdır.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Düzenin neye ait olduğunu açıklar; kaç bölüm/slot olduğu ve hangi öğelerin yerleştirileceği tanıtılır"
      - "MADDELİ KOŞULLAR 5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu düzenle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3<br>• Koşul 4<br>• Koşul 5"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"
      - "Zor düzey: öğe sayısı, slot/bölüm sayısı ve koşul sayısı en yüksek düzeyde olmalıdır"
      - "Zor düzey: birden fazla koşul dolaylı çıkarım gerektirmelidir"
      - "Zor düzey: çapraz ilişki ve karşılıklı bağımlılık sayısı artmış olmalıdır"
      - "Zorluk, metin uzatılarak değil değişken ve ilişki yoğunluğu artırılarak kurulmalıdır"
      - "Önce gizli doğru düzen kurulmalı; ardından yalnızca bu düzene götüren koşullar yazılmalıdır"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Paragrafta hikâye unsurlarıyla ilgili AÇIKLAMA veya EK BİLGİ verme!"
      - "Paragraf SADECE mantık bulmacasını anlatsın — unsur analizi veya tanımlaması YAPMA"

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 5
    word_count_max: 10
    style: "complete_sentence"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli düzen
    kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen seçenektir.
  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Zor düzeyde öğrenci tam düzeni kurmadan doğru cevaba ulaşamamalıdır"
    - "Doğru cevap 3-22 kelime arasında olmalıdır"

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "CAPRAZ_BAGIMLILIK_HATASI"
    bilisssel_hata_kategorisi: "yanlis_cikarim"
    aciklama: "Çapraz ilişki ve karşılıklı bağımlılık zincirini eksik izleyerek yapılan yerleşim hatası"
    nasil_olusturulur: |
      Birden fazla çapraz kısıtın birlikte değerlendirilmesi gereken zor düzeyde, yalnızca bağımsız olarak ele alındığında geçerli görünen ama birlikte çelişen bir yerleşim sun.
    kategori: "cognitive"

  - ad: "KILITLENME_ONCESI_DURDURMA"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Tam düzeni kurmadan, geçici olarak tutarlı görünen ara aşamayı doğru cevap sanan yerleşim"
    nasil_olusturulur: |
      Tüm koşullar uygulandığında çöküşe geçen ama yarı yolda durulduğunda geçerli görünen bir sıralama veya düzen sun.
    kategori: "cognitive"

  - ad: "DAĞILIM_KAYMASI"
    bilisssel_hata_kategorisi: "dis_bilgi_karisimi"
    aciklama: "Yüksek değişken sayısında öğelerin slot dağılımını sezgiyle tahmin edip birkaç koşulu zorlama uygulayan seçenek"
    nasil_olusturulur: |
      Tüm koşullar test edilmeden sezgisel olarak kurulmuş, 4-5 koşulu karşılar görünüp sadece 1 kritik koşulu ihlal eden bir yerleşim oluştur.
    kategori: "semantic"

use_shared_strategies: false

