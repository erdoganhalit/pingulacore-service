# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 seçenekten oluşan düzen sorusu"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, slot/bölüm/konumlara yerleştirilen öğelerle ilgili verilen
      ilişkisel koşulları birlikte değerlendirerek gizli düzeni kurması gerekir.
      Koşullar düzeni doğrudan tarif etmemeli; öğrenci bazı yerleri kendi
      mantıksal çıkarımıyla tamamlamalıdır.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Düzenin neye ait olduğunu açıklar; kaç bölüm/slot olduğu, hangi öğelerin yerleştirileceği ve düzenin genel çerçevesi tanıtılır"
      - "Kurgu öğe-merkezli olmalıdır; kişi merkezli anlatım zorunlu değildir"
      - "MADDELİ KOŞULLAR 3-5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu düzenle ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru düzen kurulmalı; ardından yalnızca bu düzene götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar düzenin tamamını adım adım tarif etmemelidir"
      - "Maddeler, gizli düzenin yalnızca bazı parçalarını veya ilişkilerini vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle bazı boşlukları kendi çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; bulunması gereken nihai düzen ya da sorulan çıkarım açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli düzen kurulabilir olmalı; şıklar düzeni kurdurmamalı, kurulmuş düzen üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar birden fazla çözüme izin vermemelidir; hedeflenen soru köküne göre tek bir doğru cevap üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai cevabı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak göreli ilişki içermelidir"
      - "Öncelikli ilişki türleri: önce/sonra, hemen önce/hemen sonra, arasında, yan yana, art arda, birinin sağında/solunda, bir öğeden önce gelen blok, bir öğeden sonra gelen blok"
      - "Mutlak konum bilgisi (1. sırada, 5. sırada, en solda, en sağda vb.) zorunlu olmadıkça kullanılmamalıdır"
      - "Mutlak konum bilgisi kullanılacaksa en fazla 1 madde içinde yer almalıdır"
      - "Koşulların çoğu sabit sıra numarası vermek yerine öğeler arası ilişki kurmalıdır"
      - "Koşullar, öğrencinin yalnızca alt alta yazarak mekanik yerleştirme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul, dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanamamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir ara düzen kurup sonra bunu diğer koşullarla birleştirmesini gerektirmelidir"
      - "Düzenin bazı bölümleri doğrudan verilebilir; ancak kalan bölüm mutlaka düşünerek tamamlanmalıdır"

      - "5. sınıf seviyesinde 4-6 öğe ve 3-5 koşul tercih edilmelidir"
      - "Öğeler; ders, etkinlik, ürün, kitap, oyuncak, kutu, bölüm, sıra, zaman dilimi gibi somut varlıklardan seçilmelidir"
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'sonra' ve 'hemen sonra', 'önce' ve 'hemen önce' gibi kavramlar net ayrılmalıdır"
      - "Yer, sıra ve ilişki bildiren ifadeler belirsizlik taşımamalıdır"
      - "Koşullar; ardışıklık, göreli konum, blok ilişkisi, önce-sonra, hemen önce-hemen sonra, tekrar sayısı ve slot ilişkisi gibi düzen kurmaya yarayan ilişkiler içermelidir"
      - "Bu soru tipinde yalnızca düzeni kurmaya hizmet eden bilgiler kullanılmalıdır; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: ardışıklık veya blok ilişkisi"
        - "1 madde: önce/sonra veya hemen önce/hemen sonra ilişkisi"
        - "1 madde: dolaylı ilişki veya çapraz bağ kuran koşul"
        - "Gerekirse 1 madde: sınırlı mutlak konum bilgisi"
      yasaklar:
        - "3 veya daha fazla maddede doğrudan sıra numarası verme"
        - "Her öğenin yerini tek tek tarif eden koşullar yazma"
        - "Koşulları soldan sağa çözüm şeması gibi dizme"
        - "Bir öğenin yerini söyledikten sonra komşularını da açıkça vererek düzeni kapatma"

  stem:
    required: true
    description: >
      Soru kökü, kurulmuş düzen üzerinden çıkarım yaptırmalıdır.
      Kök; öğrenciyi tüm koşulları analiz edip gizli düzeni kurmaya zorlayan
      bir yapıdan seçilmelidir.
    kurallar:
      - "Soru kökü düzen kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Tercihen 'kesinlikle doğrudur', 'kesinlikle yanlıştır', 'kesin olarak söylenebilir', 'kesin olarak söylenemez' türünde çıkarım kökleri kullanılmalıdır"
      - "Tam sıralama soruluyorsa, koşullar yalnızca bir doğru düzen vermelidir"
      - "Soru kökü, öğrenciyi doğrudan sıra numarası okumaya değil, kurulmuş düzeni yorumlamaya yöneltmelidir"
  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 22
    style: "complete_sentence"
    correct_count: 1

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI (15 farklı kalıptan türetilmiş)
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  # Doğru/yanlış çıkarım
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>doğrudur</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>yanlıştır</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenebilir</u>?</b>"
  - "<b>Bu bilgilere göre aşağıdakilerden hangisi kesinlikle <u>söylenemez</u>?</b>"


# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli düzen
    kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen seçenektir.
    Öğrenciden tek bir ipucuna dayanarak değil, tüm maddeleri analiz ederek
    kesin doğru, kesin yanlış, söylenebilir, söylenemez, olabilir veya olamaz
    türünde sonuca ulaşması beklenir.

  temel_ilke: >
    Gizli düzen kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan ifade olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara çıkarımlar üzerinden gizli düzen kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce slot/bölüm/sıra düzenini kurabilecek durumda olmalıdır"
    - "Şık doğru olsa bile, bu doğruluk doğrudan verilmiş bilgiye değil, kurulmuş düzenden çıkan sonuca dayanmalıdır"
    - "Doğru cevap, gizli düzenin tamamı ya da düzenin zorunlu sonucu olmalıdır"
    - "Pozitif köklerde doğru cevap: gizli düzenden KESİNLİKLE çıkan ifade olmalıdır"
    - "Negatif köklerde doğru cevap: gizli düzenle çelişen ya da gizli düzenden kesin olarak çıkarılamayan ifade olmalıdır"
    - "Tam sıralama köklerinde yalnızca bir doğru düzen bulunmalıdır; koşullar birden fazla sıralamaya izin vermemelidir"
    - "Çıkarım köklerinde yalnızca bir seçenek kesin doğru ya da kesin yanlış olmalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru cevap YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru seçenek, verilen koşulları sadece yeniden söylemek yerine onların birleşiminden doğan yeni bir çıkarım olmalıdır"
    - "Doğru cevap 3-22 kelime arasında olmalıdır"
    - "Duruma göre tam cümle ya da kısa ifade olabilir"
    - "Kelime sayısı bakımından en uzun şık olmamalıdır"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli düzen kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen konumu veya ilişkiyi doğrudan tekrar etmesi"
    - "Birden fazla seçeneğin gizli düzenle uyumlu olması"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli düzen kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel ifadeler olmamalıdır. Her yanlış seçenek, öğrencinin gizli düzeni
    kurarken yapabileceği bütünsel bir muhakeme hatasının sonucu olmalıdır.
    Öğrenci yanlış bir ara düzen veya yanlış bir tam düzen kurarsa, bu şıklardan
    birini işaretlemeye yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif gizli düzenin çıktısı olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı sonuç olmalıdır"
    - "Çeldirici, tüm düzen kurulmadan değil; yanlış düzen kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış kurgu yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru düzenle test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş düzenin doğal sonucu olan makul seçenek yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli düzeni kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış gizli düzen tasarla."
    - "3. Her yanlış düzen, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış düzenlerin sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış kurgu mantığına dayanmalıdır"
    - "Çeldiriciler, öğrencinin gizli düzeni yanlış tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış çözüm sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca kelime sırasını değiştirilmiş hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Çeldiriciler, öğrencinin bir ilişkiyi yanlış taşıması, bir bloğu yanlış yerleştirmesi veya kalan boşlukları yanlış tamamlaması gibi kurgu hatalarına dayanmalıdır"

  stratejiler:
    - ad: "YANLIS_BLOK_YERLESTIRME"
      bilisssel_hata_kategorisi: "kurgu_hatasi"
      aciklama: "Öğrenci doğru bloğu veya art arda gelmesi gereken öğeleri bulur; fakat bu bloğu düzen içinde yanlış yere yerleştirir"
      nasil_olusturulur: |
        Gizli düzende birlikte düşünülmesi gereken iki ya da daha fazla öğeyi doğru grup olarak koru;
        ancak bu grubu yanlış konuma taşı. Çeldirici, öğrencinin ilişkiyi doğru görüp konumu yanlış belirlediği
        alternatif bir düzenin sonucu olmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince bozulması gereken
        yanlış bir düzen kur. Çeldirici, öğrencinin ara çıkarımı yapıp sonraki mantıksal taşıma adımını
        atlaması sonucu ulaştığı seçenek olmalıdır.

    - ad: "KALAN_YERLERI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci düzenin büyük kısmını doğru kurar; fakat kalan öğeleri elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Gizli düzenin çoğunu doğru tut; yalnızca son 1-2 öğeyi, tüm koşulları tekrar kontrol etmeden
        yerleştirilmiş gibi kurgula. Çeldirici, 'artık kalanlar bunlardır' hatasına dayanmalıdır.

    - ad: "OLASI_DURUMU_KESIN_SANMA"
      bilisssel_hata_kategorisi: "kesinlik_hatasi"
      aciklama: "Öğrenci koşullarla uyumlu görünen bir olasılığı zorunlu sonuç sanır"
      nasil_olusturulur: |
        Yanlış düzen, bazı maddelerle uyumlu ve ilk bakışta mantıklı olsun; ancak tüm koşullar dikkate alındığında
        zorunlu olmadığı ortaya çıksın. Bu çeldirici özellikle 'kesinlikle doğrudur' ve 'kesin olarak söylenebilir'
        köklerinde kullanılmalıdır.

    - ad: "BIR_KOSULU_YANLIS_YORUMLAYIP_TUM_DUZENI_KAYDIRMA"
      bilisssel_hata_kategorisi: "iliski_yorum_hatasi"
      aciklama: "Öğrenci tek bir ilişkiyi yanlış yorumlar ve buna bağlı olarak tüm düzeni başka biçimde kurar"
      nasil_olusturulur: |
        Özellikle önce/sonra, hemen önce/hemen sonra, blok ilişkisi veya arasında ilişkisini yanlış yorumlayan
        bir öğrencinin kuracağı alternatif düzeni tasarla. Çeldirici, bu yanlış yorumun bütün düzene yayılmış
        sonucu olmalıdır; doğrudan koşulun tersini söyleyen yüzeysel ifade olmamalıdır.

    - ad: "NEGATIF_KOKTE_DOGRU_DUZENI_YANLIS_ISARETLEME"
      bilisssel_hata_kategorisi: "kok_yon_hatasi"
      aciklama: "Öğrenci düzeni büyük ölçüde doğru kursa da kökün yönünü karıştırdığı için yanlış seçeneğe gider"
      nasil_olusturulur: |
        'Kesinlikle yanlıştır' veya 'kesin olarak söylenemez' gibi köklerde, düzenle büyük ölçüde uyumlu
        ve güçlü görünen ama aslında işaretlenmemesi gereken bir seçenek üret. Bu seçenek, yanlış düzen değil,
        doğru düzene yakın okuma hatası kaynaklı çeldirici olarak kullanılabilir.

  yasaklar:
    - "Bir koşulun açık tersini yazmak"
    - "Bir maddede verilen bilgiyi bozup kolay eleme yapılacak seçenek üretmek"
    - "Tek başına tek koşulla elenen çeldirici üretmek"
    - "Koşullardan bağımsız, rastgele yanlış seçenek yazmak"
    - "Çeldiriciyi cümle düzeyinde değil, yanlış düzen düzeyinde tasarlamadan üretmek"
    - "Aynı yanlış kurgu mantığını temsil eden birden fazla çeldirici kullanmak"

  kalite_kontrol:
    - "Bu çeldirici, öğrencinin kurabileceği yanlış bir düzenin sonucu mu?"
    - "Bu seçenek bir tek maddeyle hemen eleniyor mu?"
    - "Bu seçenek ancak tüm koşullar kontrol edilince mi yanlışlaşıyor?"
    - "Bu çeldirici, doğru düzene yakın ama hatalı bir alternatif kurguya dayanıyor mu?"
    - "Her çeldirici farklı bir yanlış çözüm yolunu temsil ediyor mu?"

  onerilen_dagilim:
