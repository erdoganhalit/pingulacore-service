  - ad: "sergi_masa_duzeni"
    aciklama: "Sergi ürünlerinin masalara ya da stantlara yerleştirilmesi"
    ornek_setup: "Bir sınıf sergisindeki çalışmalar farklı masalara belirli kurallara göre yerleştirilecektir."

  - ad: "spor_istasyon_duzeni"
    aciklama: "İstasyonların parkur üzerindeki sırasının belirlenmesi"
