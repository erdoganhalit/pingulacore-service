  - ad: "saksi_bahce_duzeni"
    aciklama: "Saksıların ya da bitkilerin yan yana bölümlere yerleştirilmesi"
    ornek_setup: "Bir bahçedeki saksılar numaralanmış yerlere belirli kurallara göre dizilecektir."

  - ad: "menu_gun_duzeni"
    aciklama: "Yemeklerin günlere ya da öğünlere dağıtılması"
    ornek_setup: "Bir haftalık yemekhane menüsünde yemekler günlere belirli kurallara göre yerleştirilecektir."

  - ad: "icecek_tezgah_duzeni"
    aciklama: "İçeceklerin tezgâhta sıra düzenine konulması"
    ornek_setup: "Bir kafede hazırlanan içecekler tezgâhta belirli bir sıraya göre dizilecektir."

  - ad: "hediye_kutu_duzeni"
    aciklama: "Hediyelerin kutulara veya bölmelere yerleştirilmesi"
    ornek_setup: "Bir doğum günü hazırlığında hediyeler farklı kutulara belirli kurallara göre yerleştirilecektir."

  - ad: "renk_kalem_duzeni"
    aciklama: "Kalemlerin sıra veya bölme düzenine yerleştirilmesi"
    ornek_setup: "Bir kalem kutusundaki renkli kalemler belirli bölmelere kurallara göre yerleştirilecektir."

  - ad: "dosya_raf_duzeni"
    aciklama: "Dosyaların numaralı raflara dizilmesi"
    ornek_setup: "Bir sınıf dolabındaki dosyalar numaralanmış raflara belirli kurallara göre yerleştirilecektir."

  - ad: "muzik_listesi_duzeni"
    aciklama: "Şarkıların çalma sırasına yerleştirilmesi"
    ornek_setup: "Bir çocuk etkinliğinde çalınacak şarkılar belirli bir sıraya göre seçilmiştir."

  - ad: "gorev_adimi_duzeni"
    aciklama: "Görevlerin ya da işlem adımlarının sıraya dizilmesi"
