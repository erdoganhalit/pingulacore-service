# BECERI ETIKETI
# ═══════════════════════════════════════════════════════════════

beceri:
  katman: "KB3"
  bilesenler: ["mantiksal_cikarim", "degerlendirme", "sorgulama"]
  surec_bileseni: "karar_verme"
# ═══════════════════════════════════════════════════════════════
# URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi tüm gizli düzeni kurmaya zorlamalıdır.
    Doğru cevap; tek bir koşuldan, iki koşulun hızlı birleşiminden veya yüzeysel
    elemeden bulunamamalı; ancak tüm slot/bölüm düzeni oluşturulduktan sonra
    kesinleşmelidir.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca düzen sorusuna uygun bir öğe-slot bağlamı seç.
        Örnek alanlar:
        - ders programı
        - raf düzeni
        - kitaplık düzeni
        - etkinlik sırası
        - menü planı
        - görev sırası
        - tren vagonları
        - modül yerleşimi

    - step: 2
      action: "Gizli tam düzeni kur"
      details: |
        - Önce slot/bölüm sayısını belirle
        - Sonra tüm öğeleri bu slotlara yerleştirerek tek doğru gizli düzeni oluştur
        - Bu düzen, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm yerleşim kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü, ancak gizli düzen kurulduktan sonra cevaplanabilir olmalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - kesinlikle doğrudur
        - kesinlikle yanlıştır
        - kesin olarak söylenebilir
        - kesin olarak söylenemez
        Tam sıralama sorulacaksa, koşullar yalnızca bir doğru düzen vermelidir.

    - step: 4
      action: "Koşulları gizli düzenden türet"
      details: |
        - 3-5 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince doğru cevap doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde tüm düzeni kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar birden fazla çözüme izin vermemelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede düzenin çerçevesini tanıt
        - Kaç bölüm/slot olduğu ve hangi öğelerin yerleştirileceği anlaşılır olsun
        - Bağlam sade, öğrenciye yakın ve öğe-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, gizli tam düzenin zorunlu sonucu olmalıdır
        - Koşullardan biri tekrar edilerek yazılmamalıdır
        - Doğru cevap, maddelerden doğrudan alınmış bilgi değil; tüm düzenin birleşik sonucu olmalıdır
        - Öğrenci gizli düzeni kurmadan bu seçeneğe ulaşamamalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli düzeni eksik veya yanlış kuran öğrencinin düşebileceği sonuçlar olmalıdır
        - Çeldiriciler, kısmi doğru görünen ama tüm koşulları sağlamayan seçenekler olmalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler aynı temsil düzeyinde olsun
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci tüm gizli düzeni kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        - Koşullar gerçekten yalnızca bir doğru cevap üretiyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

