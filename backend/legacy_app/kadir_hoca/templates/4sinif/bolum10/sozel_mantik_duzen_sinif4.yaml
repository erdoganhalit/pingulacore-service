# bolum6/sozel_mantik_duzen_sorusu.yaml
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 seçenek
# Bu sürüm yalnızca "düzen sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_duzen_sinif4"
  ad: "Sözel Mantık ve Muhakeme - Düzen Sorusu"
  sinif_seviyesi: 4
  aciklama: "Belirli sayıda bölüm, sıra, yer veya zaman dilimine öğeleri yerleştirerek gizli düzeni bulma ve bu düzene göre çıkarım yapma"
  frequency: "High (~24 questions)"

duzen_senaryolari:
  - ad: "ders_slot_duzeni"
    aciklama: "Derslerin gün içindeki saat slotlarına yerleştirilmesi"
    ornek_setup: "Bir sınıfın bir günlük programında farklı dersler belirli saatlere yerleştirilecektir."

  - ad: "etkinlik_slot_duzeni"
    aciklama: "Etkinliklerin belirli zaman dilimlerine yerleştirilmesi"
    ornek_setup: "Bir okul şenliğinde yapılacak etkinlikler belirli zaman dilimlerine yerleştirilecektir."

  - ad: "raf_urun_duzeni"
    aciklama: "Ürünlerin raftaki bölümlere yerleştirilmesi"
    ornek_setup: "Bir market rafındaki ürünler belirli bölümlere kurallara göre yerleştirilecektir."

  - ad: "kitaplik_kitap_duzeni"
    aciklama: "Kitapların raf sırasına göre dizilmesi"
