meta:
  id: "duygu_gorsellerinden_kullanilamayacak_deyimi_belirleme"
  ad: "Duygu Görsellerinden Kullanılamayacak Deyimi Belirleme"
  ders: "Türkçe"
  sinif_seviyesi: "2. Sınıf"
  tema: "Söz Varlığı ve Görsel Okuma"
  model: "TYMM"
  format_turu: "llm_generated_html"
  aciklama: "Yüz ifadelerinden anlaşılan duygularla ilgili deyimlerden, görseller için kullanılamayacak olanı seçtiren 3 seçenekli soru formatı"
  frequency: "orta"

context:
  type: "duygu_gorseli_deyim_eslestirme"
  question_count: 1
  question_count_min: 1
  question_count_max: 1
  generation:
    word_count_min: 8
    word_count_max: 30
    structure:
      - "Önce 2 ya da 3 yüz ifadesi gösteren görsel verilir."
      - "Görsellerde farklı duygular açıkça seçilebilir olmalıdır."
      - "Ardından bu duygularla ilgili deyimler seçeneklerde sunulur."
      - "Öğrenciden, bu görseller için kullanılamayacak deyimi seçmesi istenir."
    kurallar:
      - "Yapı 2. sınıf seviyesine uygun olmalıdır."
      - "Görsellerdeki duygular açık ve ayırt edilebilir olmalıdır."
      - "Deyimler çocukların kısmen karşılaşabileceği, çok ağır olmayan örneklerden seçilmelidir."
      - "Soru, yalnızca deyim bilgisiyle değil görsellere bakılarak çözülebilmelidir."
      - "Olumsuz soru kökü açıkça vurgulanmalıdır."

format:
  type: "llm_generated_html"
  description: "Duygu görselleri + 3 deyim seçeneği + kullanılamaz sorgusu"

  paragraph:
    required: false

  visual:
    required: true
    count: 1
    description: "2 ya da 3 farklı yüz ifadesi içeren, duyguları açıkça gösteren görsel grubu"

  stem:
    required: true
    sentence_count_min: 1
    sentence_count_max: 1
    soru_koku_ornekleri:
      - "Görsellerdeki kişilerin duyguları ile ilgili aşağıdaki deyimlerden hangisi kullanılmaz?"
      - "Bu görseller için aşağıdaki deyimlerden hangisi uygun değildir?"
      - "Verilen yüz ifadelerine göre aşağıdaki deyimlerden hangisi söylenemez?"
      - "Aşağıdaki deyimlerden hangisi görsellerdeki duygularla uyuşmaz?"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 2
    word_count_max: 6
    style: "short_phrase"
    correct_count: 1
    correct_type: "mismatch"

gorsel:
  required: true
  tur: "yuz_ifadesi_gorsel_grubu"
  amac: "Öğrencinin duyguları yüz ifadelerinden ayırt etmesini sağlamak"
  kurallar:
    - "Görselde 2 ya da 3 kişi ya da aynı kişinin 2-3 farklı yüz ifadesi bulunmalıdır."
    - "Duygular açıkça seçilebilir olmalıdır."
    - "Mutluluk, öfke, korku, şaşkınlık, üzüntü gibi temel duygular tercih edilmelidir."
    - "Görseller açık, anlaşılır ve çocuk seviyesine uygun olmalıdır."
    - "Görsel süsleyici değil, çözüm için zorunlu olmalıdır."

olculen_beceri:
  tanim: "Yüz ifadelerinden duyguyu anlama ve bu duygularla uyuşan/uyuşmayan deyimi ayırt etme"
  bilesenler:
    - "gorsel_okuma"
    - "duygu_tanima"
    - "deyim_anlami"
    - "eslestirme"
    - "uygun_olmayan_ifadeyi_belirleme"

dogru_cevap:
  tanim: "Görsellerdeki duygularla uyuşmayan deyim"
  kurallar:
    - "Doğru cevap, görsellerdeki duygulardan hiçbirine uygun olmayan deyim olmalıdır."
    - "Yanlış olmayan seçenekler, görsellerde görülen duygulardan en az biriyle ilişkilendirilebilir olmalıdır."
    - "Deyimler gerçek anlamıyla değil, duygu anlatımı bakımından değerlendirilmelidir."
    - "Doğru cevap yalnızca görsellere dikkat edilirse bulunmalıdır."

distractors:
  stratejiler:
    - ad: "DUYGUYA_YAKIN_DEYIM"
      aciklama: "Görsellerdeki duygulardan biriyle ilişkilendirilebilecek uygun deyim sunma"
      ornek: "Mutluluktan havalara uçmak"
    - ad: "BENZER_DUYGU_CAGRISIMI"
      aciklama: "Başka bir güçlü duyguya uygun olup görsellerde de karşılığı bulunabilecek deyim sunma"
      ornek: "Burnundan solumak"
    - ad: "UYUSMAYAN_DEYIM"
      aciklama: "Görsellerde görülmeyen bir duygu ya da duruma ait deyim sunma"
      ornek: "Eli ayağına dolaşmak"
    - ad: "YUZEYSEL_CAGRISIM"
      aciklama: "İlk bakışta uygun sanılabilecek ama duyguyla tam örtüşmeyen deyim kullanma"
      ornek: "Şaşkınlık ile korkuyu karıştıran ifade"

use_shared_strategies: false

