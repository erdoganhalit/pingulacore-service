    - "karsilastirma"
    - "dogru_yargiyi_belirleme"

dogru_cevap:
  tanim: "Programdaki ders bilgileriyle açıkça desteklenen ifade"
  kurallar:
    - "Doğru cevap programdan doğrudan çıkarılabilen seçenek olmalıdır."
    - "Yanlış seçenekler programla uyuşmamalıdır."
