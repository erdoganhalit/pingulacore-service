      ornek: "Cuma günü dört farklı ders işlenir."
    - ad: "YAKIN_OKUMA_HATASI"
      aciklama: "Görseli yüzeysel okuyan öğrenciyi yanıltacak seçenek oluşturma"
      ornek: "Pazartesi günü en çok İngilizce vardır."

