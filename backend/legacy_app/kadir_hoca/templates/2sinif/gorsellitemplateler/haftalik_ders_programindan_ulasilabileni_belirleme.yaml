    - "En az bir seçenek her gün yapılıp yapılmama durumunu sorgulamalıdır."
    - "En az bir seçenek belirli bir günde kaç farklı ders işlendiğini sorgulayabilir."
    - "Doğru cevap dikkatli tablo okuma ile bulunmalıdır."

