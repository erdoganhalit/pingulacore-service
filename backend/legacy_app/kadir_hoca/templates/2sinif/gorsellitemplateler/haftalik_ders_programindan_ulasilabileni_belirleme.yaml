meta:
  id: "haftalik_ders_programindan_ulasilabileni_belirleme"
  ad: "Haftalık Ders Programından Ulaşılabileni Belirleme"
  ders: "Türkçe"
  sinif_seviyesi: "2. Sınıf"
  tema: "Veri Okuma ve Yorumlama"
  model: "TYMM"
  format_turu: "llm_generated_html"
  aciklama: "Haftalık ders programındaki gün ve ders bilgilerini okuyup ulaşılabilen ifadeyi seçtiren 3 seçenekli soru formatı"
  frequency: "orta"

context:
  type: "haftalik_ders_programi"
  question_count: 1
  question_count_min: 1
  question_count_max: 1
  generation:
    word_count_min: 8
    word_count_max: 25
    structure:
      - "Önce kısa bir tanıtım cümlesi verilir."
      - "Ardından bir sınıfa ait haftalık ders programı tablo biçiminde gösterilir."
      - "Günler sütunlarda, ders saatleri satırlarda yer alır."
      - "Her hücrede bir ders adı bulunur."
    kurallar:
      - "Bağlam 2. sınıf seviyesine uygun olmalıdır."
      - "Ders adları kısa ve tanıdık olmalıdır."
      - "Program sade ve okunaklı olmalıdır."
      - "Metin tek başına cevabı vermemelidir."
      - "Görsel tablo çözümün ana kaynağı olmalıdır."

format:
  type: "llm_generated_html"
  description: "Kısa tanıtım + haftalık ders programı tablosu + tek soru + 3 seçenek"

  paragraph:
    required: true
    word_count_min: 8
    word_count_max: 25
    sentence_count_min: 1
    sentence_count_max: 2

  visual:
    required: true
    count: 1
    description: "Günler sütunlarda, ders saatleri satırlarda ve hücrelerde ders adlarının yer aldığı haftalık ders programı"

  stem:
    required: true
    sentence_count_min: 1
    sentence_count_max: 1
    soru_koku_ornekleri:
      - "Bu ders programından hareketle aşağıdakilerden hangisine ulaşılabilir?"
      - "Programa göre aşağıdakilerden hangisi doğrudur?"
      - "Verilen ders programına göre aşağıdakilerden hangisi söylenebilir?"
      - "Aşağıdakilerden hangisi programa göre doğrudur?"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 5
    word_count_max: 16
    style: "complete_sentence"
    correct_count: 1
    correct_type: "matches"

gorsel:
  required: true
  tur: "haftalik_ders_programi_tablosu"
  amac: "Öğrencinin gün, ders saati ve ders adı ilişkisini okuyup sayma ve karşılaştırma yapmasını sağlamak"
  kurallar:
    - "Tabloda en az 5 gün bulunmalıdır."
    - "Her gün için en az 4 ders saati bulunmalıdır."
    - "Ders adları çocukların tanıyacağı biçimde kısa yazılmalıdır."
    - "Gün başlıkları açıkça seçilmelidir."
    - "Satır ve sütun yapısı net olmalıdır."
    - "Görsel sade, düzenli ve 2. sınıf seviyesine uygun olmalıdır."
    - "Görsel süsleyici değil, çözüm için zorunlu olmalıdır."

olculen_beceri:
  tanim: "Haftalık ders programındaki gün ve ders bilgilerini okuyup sayma, karşılaştırma ve sınıflama yapma"
  bilesenler:
