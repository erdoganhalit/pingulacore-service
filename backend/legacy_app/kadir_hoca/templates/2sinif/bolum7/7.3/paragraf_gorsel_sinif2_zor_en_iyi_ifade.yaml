# Pattern: en_iyi_ifade_eden_gorsel (referans zorluk_duzeyleri.zor.tercih_edilen_varyantlar[1])
# Zor duzey, 1 soru: metni en iyi ifade eden gorseli secme

meta:
  id: paragraf_gorsel_sinif2_zor_en_iyi_ifade
  ad: "2. Sinif - Paragraf-Gorsel Iliskisi (Zor) - En Iyi Ifade Eden Gorsel"
  sinif_seviyesi: 2
  aciklama: "Zor duzey — metin + 3 gorsel secenek, metni en iyi ifade eden gorseli secme"
  frequency: "Medium"

format:
  type: llm_generated_html
  description: "Kisa metin + soru koku + 3 gorsel secenek (zor, en iyi ifade eden gorsel)"

  paragraph:
    required: true
    word_count_min: 58
    word_count_max: 78
    sentence_count_min: 5
    sentence_count_max: 6
    stil: "bilgilendirici_veya_oykusel"
    background_color: "#fce8e8"
    kurallar:
      - "Metin acik kalmalidir ama dogru gorsel icin birkac cumleyi birlikte degerlendirmek gerekebilir."
      - "Metinde ana konu ile yan ayrintilar birlikte bulunabilir."
      - "Zor duzeyde bile soru soyut yoruma donusmemelidir."
      - "Metin tek baskin konu, olay, durum veya yer etrafinda kurulmalidir."
      - "Metin 2. sinif ogrencisinin anlayabilecegi kadar sade, acik ve somut olmalidir."
      - "Metin gorsellere cevrilebilecek net icerik tasimalidir."
      - "Metin dis bilgi gerektirmemelidir."
      - "Metin yalniz basina dogru gorseli kesin olarak sectirmemelidir."
      - "Metin ana dusunce, gizli mesaj veya soyut yorum gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: [A, B, C]
    word_count_min: 15
    word_count_max: 50
    style: "image_description"
    image_style: "photo"
    correct_count: 1
    correct_type: "matches"

soru_kokleri:
  - "<b>Metinde anlatılanları <u>en iyi</u> ifade eden görsel hangi seçenekte verilmiştir?</b>"
  - "<b>Aşağıdaki görsellerden hangisi metni <u>en iyi</u> anlatmaktadır?</b>"
  - "<b>Metne <u>en uygun</u> görsel aşağıdakilerden hangisidir?</b>"
  - "<b>Bu parçada anlatılanları <u>en iyi</u> yansıtan görsel hangisidir?</b>"

dogru_cevap:
  tanim: "Metnin tamamini en iyi karsilayan gorsel"
  kurallar:
    - "Dogru cevap metnin baskin icerigiyle uyumlu olmalidir."
    - "Dogru cevap metinde anlatilanlari en iyi karsilayan gorsel olmalidir."
    - "Dogru cevap yalniz metinden secilememelidir, gorsel inceleme gerektirmelidir."
    - "Dogru cevap yalniz gorsele bakilarak da secilememelidir; metin destegi gerektirmelidir."
    - "Dogru gorsel 2. sinif ogrencisinin iliski kurabilecegi aciklikta olmalidir."
    - "Dogru gorsel metnin tamamini en iyi karsilayan secenek olmalidir."
    - "2 yanlis gorsel de ilk bakista makul gorunmelidir."
    - "Gorseller yine sade ve 2. sinif duzeyinde olmalidir."

celdirici_stratejileri:
  - ad: "YAKIN_AMA_TAM_UYUSMAYAN"
    bilisssel_hata_kategorisi: "yuzeysel_okuma"
    aciklama: "Metinle ayni genel alanda durur ama asil konuya tam uymaz"
    nasil_olusturulur: |
      Metnin konusuyla ayni alan icinde ama tam uyusmayan bir gorsel tasviri olustur.
      Zor duzey: 1 yanlis secenek ayni tema alaninda ama farkli vurgu tasimali.
    kategori: "semantic"

  - ad: "YAN_KONU"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metindeki yan unsura yakin ama ana icerigi karsilamayan gorsel"
    nasil_olusturulur: |
      Metindeki yan bir detaya veya tek bir cumledeki bilgiye odaklanan gorsel tasviri olustur.
      Zor duzey: 1 yanlis secenek metindeki yan unsura dayali kismi uyum tasimali.
    kategori: "cognitive"

use_shared_strategies: false

beceri:
  katman: "KB2"
  bilesenler: [gorsel_metin_eslestirme, iliskili_gorsel_secme]
  surec_bileseni: "metni_anlama"
