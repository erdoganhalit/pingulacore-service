# Pattern: en_iyi_ifade_eden_gorsel (referans zorluk_duzeyleri.kolay.tercih_edilen_varyantlar[1])
# Kolay duzey, 1 soru: metni en iyi ifade eden gorseli secme

meta:
  id: paragraf_gorsel_sinif2_kolay_en_iyi_ifade
  ad: "2. Sinif - Paragraf-Gorsel Iliskisi (Kolay) - En Iyi Ifade Eden Gorsel"
  sinif_seviyesi: 2
  aciklama: "Kolay duzey — metin + 3 gorsel secenek, metni en iyi ifade eden gorseli secme"
  frequency: "Medium"

format:
  type: llm_generated_html
  description: "Kisa metin + soru koku + 3 gorsel secenek (kolay, en iyi ifade eden gorsel)"

  paragraph:
    required: true
    word_count_min: 38
    word_count_max: 52
    sentence_count_min: 4
    sentence_count_max: 4
    stil: "bilgilendirici_veya_oykusel"
    background_color: "#e8f8e8"
    kurallar:
      - "Metnin konusu cok acik olmalidir."
      - "Metin ile dogru gorsel arasindaki bag gorunur olmalidir."
      - "Metin tek baskin konu, olay, durum veya yer etrafinda kurulmalidir."
      - "Metin 2. sinif ogrencisinin anlayabilecegi kadar sade, acik ve somut olmalidir."
      - "Metin gorsellere cevrilebilecek net icerik tasimalidir."
      - "Metin dis bilgi gerektirmemelidir."
      - "Metin yalniz basina dogru gorseli kesin olarak sectirmemelidir."
      - "Metin ana dusunce, gizli mesaj veya soyut yorum gerektirmemelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: [A, B, C]
    word_count_min: 15
    word_count_max: 50
    style: "image_description"
    image_style: "photo"
    correct_count: 1
    correct_type: "matches"

soru_kokleri:
  - "<b>Metinde anlatılanları <u>en iyi</u> ifade eden görsel hangi seçenekte verilmiştir?</b>"
  # KULLANILDI: - "<b>Aşağıdaki görsellerden hangisi metni <u>en iyi</u> anlatmaktadır?</b>"
  - "<b>Metne <u>en uygun</u> görsel aşağıdakilerden hangisidir?</b>"
  # KULLANILDI: - "<b>Bu parçada anlatılanları <u>en iyi</u> yansıtan görsel hangisidir?</b>"

dogru_cevap:
  tanim: "Metnin ana icerigini en iyi karsilayan gorsel"
  kurallar:
    - "Dogru cevap metnin baskin icerigiyle uyumlu olmalidir."
    - "Dogru cevap metinde anlatilanlari en iyi karsilayan gorsel olmalidir."
    - "Dogru cevap yalniz metinden secilememelidir, gorsel inceleme gerektirmelidir."
    - "Dogru cevap yalniz gorsele bakilarak da secilememelidir; metin destegi gerektirmelidir."
    - "Dogru gorsel 2. sinif ogrencisinin iliski kurabilecegi aciklikta olmalidir."
    - "1 gorsel metnin ana icerigini en iyi karsilamalidir."
    - "1 gorsel yakin ama yan odakli olmalidir."
    - "1 gorsel daha uzak veya kismi uyumlu olmalidir."
    - "Dogru secim, metnin tamami dusunulerek yapilmalidir."

celdirici_stratejileri:
  - ad: "YAN_KONU"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Metindeki yan unsura yakin ama ana icerigi karsilamayan gorsel"
    nasil_olusturulur: |
      Metindeki yan bir detaya veya tek bir cumledeki bilgiye odaklanan gorsel tasviri olustur.
      Kolay duzey: bu gorsel acikca yan odakli oldugu belli olmali.
    kategori: "cognitive"

  - ad: "ILGISIZ_GORSEL"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Metinle acik iliski kurmayan daha uzak gorsel"
    nasil_olusturulur: |
      Metinle acik bag kurmayan, farkli alandan bir gorsel tasviri olustur.
      Kolay duzey: bu gorsel belirgin bicimde ilgisiz olmali.
    kategori: "content"

use_shared_strategies: false

beceri:
  katman: "KB1"
  bilesenler: [gorsel_metin_eslestirme, iliskili_gorsel_secme]
  surec_bileseni: "metni_anlama"
