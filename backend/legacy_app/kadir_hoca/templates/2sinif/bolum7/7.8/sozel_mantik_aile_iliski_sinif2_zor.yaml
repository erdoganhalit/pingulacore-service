  diagram_type: "family_tree"
  max_kisi: 6
  nesil_sayisi: 2
  izinli_iliskiler: ["anne", "baba", "cocuk", "kardes", "dede", "nine", "torun"]
  aciklama: "Basit aile agaci: 2-3 nesil, portreler + isimler + baglanti cizgileri"

beceri:
  katman: KB2
  bilesenler: [aile_iliskisi_yorumlama, gorsel_takip, bilgi_eslestirme, basit_iliski_kurma]
