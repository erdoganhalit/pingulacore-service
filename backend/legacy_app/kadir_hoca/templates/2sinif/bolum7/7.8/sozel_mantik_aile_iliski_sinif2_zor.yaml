header_template: "Asagidaki soruyu aile semasina ve bilgilere gore cevaplayiniz."

format:
  type: llm_generated_html
  description: "Gorselli soru (zor): aile semasi + bilgi bloku + 3 secenek"
  paragraph:
    required: true
    word_count_min: 25
    word_count_max: 55
    sentence_count_min: 2
    sentence_count_max: 3
    stil: "bilgi_bloku"
    background_color: "#fce8e8"
    kurallar:
      - "Bilgi bloku yalniz temel aile iliskilerini aciklayan kisa cumleler icermelidir."
      - "Izinli iliski alani: anne, baba, cocuk, kardes, dede, nine, torun."
      - "Ipuclari kisa ve dogrudan olmalidir."
      - "Bilgi bloku tek basina cevabi vermemelidir."
      - "En fazla 6 kisi kullanilabilir."
      - "Dede-nine-torun iliskisi kullanilabilir."
      - "Yine de tek soruda en fazla 2 adimli iliski gerektirilmelidir."
      - "2. sinif ogrencisinin anlayabilecegi sadelikte olmalidir."
  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"
  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 2
    word_count_max: 10
    style: "kisa_yargi"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Secenekler temel aile iliskisi veya cocuk sayisi gibi acik bilgiler icermelidir."
      - "Yalniz bir secenek tum gorsel ve bilgilerle uyumlu olmalidir."
      - "Yanlis secenekler temel bir iliski hatasi tasimalidir."
      - "Secenekler kendi aralarinda bicimce paralel olmalidir."
      - "2 yanlis secenek de ilk bakista makul gorunmelidir."

soru_kokleri:
  - "<b>Buna göre aile şeması ile ilgili aşağıdakilerden hangisi doğrudur?</b>"
  - "<b>Buna göre aşağıdaki bilgilerden hangisi yanlıştır?</b>"
  - "<b>Aile şemasına göre aşağıdakilerden hangisi söylenebilir?</b>"
  - "<b>Verilen aile şemasına göre aşağıdakilerden hangisi <u>doğru değildir</u>?</b>"

dogru_cevap:
  tanim: "Gorsel ve bilgi blokundan cikarilabilen dogru aile iliskisi bilgisi"
  kurallar:
    - "Dogru cevap gorsel ve bilgi blokundaki bilgiye dayanmalidir."
    - "Dogru cevap icin en fazla 2 adimli iliski cozumu gerekebilir."
    - "Yanlis seceneklerin ikisi de ilk bakista makul gorunmelidir."

celdirici_stratejileri:
  - ad: "ILISKI_HATASI"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Aile iliskisini yanlis yorumlayan secenek"
    nasil_olusturulur: |
      Gorseldeki bir kisiyi yanlis aile rolunde gosteren secenek olustur.
      Zor duzey: iliski hatasi ilk bakista makul gorunmeli, dikkatli inceleme ile elenmelidir.
    kategori: "semantic"

  - ad: "SAYI_HATASI"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Cocuk, kardes veya torun sayisini yanlis veren secenek"
    nasil_olusturulur: |
      Gorseldeki kisi sayisini veya iliskiyi yanlis belirten secenek olustur.
      Zor duzey: sayi hatasi gorsel ve bilgi bloku birlikte dikkatle incelendiginde ortaya cikar.
    kategori: "cognitive"

  - ad: "ADIM_KARISTIRMA"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Iki adimli iliskiyi tek adima indiren veya yanlis yonden yorumlayan secenek"
    nasil_olusturulur: |
      Dede-torun veya nine-torun iliskisinde ara adimi atlayarak yanlis sonuca ulasan secenek olustur.
      Zor duzey: 2 adimli iliski cozumunde yuzeysel okuyan ogrenci yanilabilir.
    kategori: "cognitive"

use_shared_strategies: false

visual_requirement: "answer_critical"
visual_type: "logic_diagram"
