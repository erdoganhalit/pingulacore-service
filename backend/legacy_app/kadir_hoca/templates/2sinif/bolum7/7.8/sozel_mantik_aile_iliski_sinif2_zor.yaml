      - "Kayin akrabaligi (kayinbaba, kayinvalide, eniste, gelin) YASAK."
      - "Kuzen, dayi, hala, teyze, amca zorunlu kilinmamalidir."
      - "Cok adimli soy agaci cozumu YASAK — en fazla 2 adim."

  questions:
