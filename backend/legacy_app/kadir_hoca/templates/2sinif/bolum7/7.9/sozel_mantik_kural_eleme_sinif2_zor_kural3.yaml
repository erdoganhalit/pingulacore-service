# templates/2sinif/bolum7/7.9/sozel_mantik_kural_eleme_sinif2_zor_kural3_1q.yaml
# 2. Sinif — Sozel Mantik — Kural Tabanli Eleme — ZOR (3 kural, cift eleme)
# Gorsel zorunlu, bilgi bloku zorunlu, paragraf yok, 3 secenekli

meta:
  id: "sozel_mantik_kural_eleme_sinif2_zor_kural3"
  ad: "2. Sinif - Kural Tabanli Eleme (Zor) - 3 Kural Cift Eleme"
  sinif_seviyesi: 2
  aciklama: "Zor duzey — gorsel + 3 kural, dogru cevap icin iki kurali birlikte elemek gerekir, 3 secenekli"
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Ana gorsel + 3 kural blogu + soru koku + 3 secenek (zor, cift eleme)"

  paragraph:
    required: false

  visual:
    required: true
    placement: "top"
    detail_density: "medium"
    kurallar:
      - "Gorsel soru cozumunun zorunlu kaynaklarindan biri olmalidir."
      - "Gorsel somut ve cocuk duzeyine uygun olmalidir."
      - "Sifre alani, kart dizisi, kutu dizisi, renkli sembol dizisi veya benzeri sade yapi kullanilabilir."
      - "Gorsel tek basina cevabi vermemelidir."
    yasaklar:
      - "buyuk-kucuk harf gibi soyut teknik ayrimlar zorunlu kilinmamalidir"
      - "uzun kod dizileri"
      - "5'ten fazla ogeli karmasik kurgu"

  bilgi_bloku:
    required: true
    kural_sayisi: 3
    kurallar:
      - "En fazla 3 kisa kural kullanilabilir."
      - "Dogru secenek icin iki kurali birlikte elemek gerekebilir."
      - "Kurallar kisa, acik ve dogrudan olmalidir."
      - "Kurallar somut secim yapmaya yardimci olmalidir."
      - "Izinli kural turleri: once/sonra, yan yana gelmeme, sayi toplami, renk sirasi, harf-rakam sayisi."
      - "Yalniz bir secenek tum kurallari saglamalidir."
      - "Buyuk-kucuk harf, dil bilgisel teknik ayrim ve cok soyut kural kullanilmamalidir."
    yasaklar:
      - "4 ve uzeri kural"
      - "birden fazla soyut dil kurali"
      - "ust uste iki teknik dil islemi"
      - "2. sinif duzeyini asan karmasik kombinasyon"
      - "buyuk-kucuk harf zorunlulugu"

  cift_kaynak_zorunlu: true
  sadece_gorselle_cozum_yasak: true
  sadece_metinle_cozum_yasak: true

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 1
    word_count_max: 5
    style: "short_phrase"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Secenekler kisa ve okunabilir olmalidir."
      - "Her secenek tum kurallara gore degerlendirilebilir olmalidir."
      - "Yanlis secenekler en az bir kurali bozmalidir."
      - "Dogru secenek tum kurallari saglamalidir."
      - "Yanlis secenekler ilk bakista makul gorunmeli ama dikkatli elemede yanlis olmalidir."
      - "KRITIK: Secenekler paragraftaki kurallara uygun FORMAT'ta olmali. Paragrafta sifre/kod konusuluyorsa secenekler kod/sifre formatinda (ornek: Tr34, T5r2, t1R6)."
      - "Eger paragraf harf-rakam kombinasyonu istiyorsa, 3 secenek de harf+rakam olmali — kelime VEYA sadece rakam YASAK (ornek: 'Masa' veya '1234' SECENEK OLAMAZ)."
      - "Secenekler arasinda YAPI uyumu: tum secenekler ayni karakter sayisinda, ayni tipte (hepsi sifre, hepsi kart dizisi, hepsi renk dizilimi)."
      - "Dogru secenek kurallari TAM saglamali. Yanlis secenekler tam olarak 1 kurali bozmali — digerlerine uymali."

soru_kokleri:
  - "<b>Buna göre aşağıdakilerden hangisi olabilir?</b>"
  - "<b>Verilen kurallara göre doğru seçenek hangisidir?</b>"
  - "<b>Kurallara uygun olan seçenek aşağıdakilerden hangisidir?</b>"
  - "<b>Buna göre aşağıdakilerden hangisi seçilebilir?</b>"

dogru_cevap:
  tanim: "Gorsel ve kurallarin birlikte degerlendirilmesiyle bulunan tek dogru secenek"
  kurallar:
    - "Dogru cevap tum kurallari saglamalidir."
    - "Dogru cevap gorsel ile birlikte degerlendirildiginde tek secilecek secenek olmalidir."
    - "Dogru cevap 2. sinif ogrencisinin dikkatli eleme yaparak bulabilecegi aciklikta olmalidir."
    - "Dogru cevap icin en az iki kuralin birlikte degerlendirilmesi gerekmelidir."
    - "Soru yalniz metinle veya yalniz gorselle cozulememeli, ikisi birlikte gerekli olmalidir."

celdirici_stratejileri:
  - ad: "TEK_KURAL_GECEN"
    bilisssel_hata_kategorisi: "kural_karisikligi"
    aciklama: "Iki kurala uyar ama ucuncu kurali bozar"
    nasil_olusturulur: |
      Secenegi iki kurala uygun yap ama ucuncu kuralda hatali olsun.
      Zor duzey: hatali kural kolayca fark edilmeyebilir, dikkatli eleme gerektirir.
    kategori: "rule_violation"

  - ad: "GORSEL_UYUMSUZ"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Kurallara uyar gibi gorunur ama gorseldeki duzenle celisir"
    nasil_olusturulur: |
      Secenegi kurallara uyar gibi yap ama gorseldeki somut durumla celissin.
      Zor duzey: gorsel celiskisi dikkatli incelemeyle fark edilir, ilk bakista makul gorunur.
    kategori: "visual_conflict"

  - ad: "CIFT_KURAL_KARISTIRAN"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Iki kurali birlikte degerlendirmede yanlis sonuca ulasan secenek"
    nasil_olusturulur: |
      Secenekte iki kuralin birlikte uygulanma sonucunu yanlis goster.
      Zor duzey: tek tek kurala bakinca dogru gorunur ama birlikte elemede yanlis cikar.
    kategori: "combined_rule_error"

use_shared_strategies: false

visual_requirement: "answer_critical"
visual_type: "logic_diagram"
