# templates/2sinif/bolum6/metin_turleri_sinif2_zor.yaml
# 2. Sinif — Metin Turleri — ZOR zorluk
# 2 yakin tur arasi dikkatli ayrim, 2 yanlis secenek de makul
# NOT: Zor duzey bile edebi analiz duzeyine tasmamali!

meta:
  id: "metin_turleri_sinif2_zor"
  ad: "2. Sinif - Metin Turleri (Zor)"
  sinif_seviyesi: 2
  aciklama: "Zor duzey — 2 yakin tur arasi dikkatli ayrim, bilgilendirici/oykuleyici/masal tercih edilir, 3 secenekli"
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Kisa metin + soru koku + 3 metin turu secenegi (zor)"

  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 100
    sentence_count_min: 6
    sentence_count_max: 8
    stil: "bilgilendirici_veya_oykuleyici_veya_masal_veya_hikaye"
    background_color: "#fce8e8"
    kurallar:
      - "Metin BILGILENDIRICI METIN, OYKULEYICI METIN, MASAL veya HIKAYE turunde olmalidir."
      - "Hikaye ise karakter, olay ve mekan icermeli ancak olagustu unsur OLMAMALIDIR (masaldan farki bu)."
      - "Tur yine acik kalmalidir ama iki yakin tur arasinda dikkatli ayrim gerektirebilir."
      - "Bilgilendirici metin ile oykuleyici metin arasinda yakin yuzey benzerligi kurulabilir."
      - "Masal ile oykuleyici metin arasinda olay temelli yakinlik olabilir."
      - "Zor duzeyde bile siir bicimsel olarak acik olmalidir; kapali siirsellik kullanilmamalidir."
      - "Tur ayirt etme 2. sinif duzeyini asan edebi cozumlemeye donusmemelidir."
      - "Metin 2. sinif ogrencisinin anlayabilecegi kadar sade, somut ve acik olmalidir."
      - "Metin dis bilgi gerektirmemelidir."
      - "Metin, turu belirsizlestirecek kadar karma yapida olmamalidir."
      - "2. sinif ogrencisinin anlayabilecegi sadelikte kelime hazinesi kullanilmalidir."
      - "Bilgilendirici metin secilecekse metin acikca bilgi verici olmalidir."
      - "Oykuleyici metin secilecekse metinde acik olay akisi bulunmalidir."
      - "Masal secilecekse olagustu unsur acikca gorunmelidir."

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 1
    word_count_max: 3
    style: "concept"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Tum secenekler metin turu adi biciminde olmalidir."
      - "Secenekler kisa, sade ve 2. sinif duzeyinde olmalidir."
      - "Dogru secenek metnin gorunur tur ozelliklerini karsilamalidir."
      - "Yanlis secenekler yakin ama yanlis turlerden secilmelidir."
      - "Secenekler kendi aralarinda bicimce paralel olmalidir."
      - "2 yanlis secenek de metne yakin ve makul gorunmelidir."
      - "Yanlis seceneklerden biri yapiya, digeri icerige yakin yanlis tur olabilir."
      - "Kullanilabilecek metin turleri: bilgilendirici metin, oykuleyici metin, siir, masal, hikaye. Hep ayni 3 tur tekrarlanmamali."

soru_kokleri:
  - "<b>Bu metnin turu asagidakilerden hangisidir?</b>"
  - "<b>Asagidakilerden hangisi bu metnin turudur?</b>"
  - "<b>Bu metin hangi ture girer?</b>"
  - "<b>Bu yazinin turu asagidakilerden hangisidir?</b>"
  - "<b>Bu metin asagidaki turlerden hangisine ornektir?</b>"
  - "<b>Bu metnin turunu asagidakilerden hangisi gosterir?</b>"
  - "<b>Asagidakilerden hangisi bu metnin turunu soyler?</b>"
  - "<b>Bu metin hangi turdedir?</b>"
  - "<b>Bu parca hangi metin turune ornektir?</b>"
  - "<b>Bu yazi asagidaki metin turlerinden hangisidir?</b>"
  - "<b>Metnin turu asagidakilerden hangisi olabilir?</b>"
  - "<b>Bu metin icin <u>en uygun</u> tur hangisidir?</b>"

dogru_cevap:
  tanim: "Metnin gorunur ve acik ozelliklerini en dogru karsilayan metin turu"
  kurallar:
    - "Dogru cevap metnin yapisina ve icerigine birlikte uyumlu olmalidir."
    - "Dogru cevap bicimsel ve iceriksel ipuclariyla bulunabilmelidir."
    - "Dogru cevap soyut edebi analiz gerektirmemelidir."
    - "Dogru cevap 2. sinif ogrencisinin metne bakarak ayirt edebilecegi aciklikta olmalidir."
    - "Bilgilendirici metin secilecekse metin acikca bilgi verici olmalidir."
    - "Oykuleyici metin secilecekse metinde acik olay akisi bulunmalidir."
    - "Masal secilecekse olagustu unsur acikca gorunmelidir."
    - "Siir secilecekse metin acik dize duzeninde verilmelidir."

celdirici_stratejileri:
  - ad: "YAPIYA_YAKIN_AMA_ICERIKCE_YANLIS"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Bicimce yakin gorunur ama icerik olarak yanlis tur"
    nasil_olusturulur: |
      Metnin bicimce yakin gorunebilecegi ama icerik olarak yanlis olan turu sec.
      Zor duzey: bu secenek ilk bakista makul gorunmeli, sadece dikkatli dusununce yanlis oldugu anlasilmali.
    kategori: "semantic"

  - ad: "ICERIGE_YAKIN_AMA_TURE_YANLIS"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Konu yakin oldugu icin cekici gorunur ama tur bakimindan yanlis"
    nasil_olusturulur: |
      Metnin konusuyla iliskili gorunen ama tur olarak yanlis olan secenegi sec.
      Zor duzey: konu benzerligi ogrenciyi yaniltabilir ama metnin amaci ve yapisi farklidir.
    kategori: "cognitive"

  - ad: "MASAL_OYKU_KARISTIRMA"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Olay var diye masal ile oykuleyici metni karistiran secenek"
    nasil_olusturulur: |
      Gercekci olay anlatiminda masal secenegini veya olagustu olayda oykuleyici metin secenegini celdirici olarak kullan.
      Zor duzey: olay varliginin iki turde de olabilecegi gercegi ogrenciyi yaniltabilir.
    kategori: "cognitive"

  - ad: "SIIR_BICIMI_KARISTIRMA"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Kisa ve sade metni siir sanmaya yonelten secenek"
    nasil_olusturulur: |
      Kisa duz yazi icin siir secenegini celdirici olarak kullan.
      Zor duzey: metin kisa ve sade oldugu icin siir gibi gorunebilir ama dize duzeni yoktur.
    kategori: "cognitive"

use_shared_strategies: false

beceri:
  katman: "KB1"
  bilesenler: ["metin_turu_ayirt_etme"]
  surec_bileseni: "metni_anlama"

sinif2_ek_kurallar:
  yasak_alanlar:
    - "Edebi analiz, tema cozumleme veya mesaj cikarma YASAK"
    - "Zor duzey bile edebi cozumleme duzeyine TASMAMALI"
    - "Tur belirsizligi olusturulamaz — tur yine acik olmali"
