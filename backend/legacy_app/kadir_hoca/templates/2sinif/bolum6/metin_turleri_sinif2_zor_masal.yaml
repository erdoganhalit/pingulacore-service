# templates/2sinif/bolum6/metin_turleri_sinif2_zor_masal.yaml
# 2. Sinif — Metin Turleri — ZOR — MASAL turu
meta:
  id: "metin_turleri_sinif2_zor_masal"
  ad: "2. Sinif - Metin Turleri (Zor) - Masal"
  sinif_seviyesi: 2
  aciklama: "Zor — masal turu belirleme"
  frequency: "Medium"

format:
  type: "llm_generated_html"
  description: "Masal turu belirleme sorusu (zor)"

  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 100
    sentence_count_min: 6
    sentence_count_max: 8
    stil: "masal"
    background_color: "#fce8e8"
    kurallar:
      - "Metin MASAL olmalidir — olagustu unsur ACIKCA ve MUTLAKA yer almalidir."
      - "ZORUNLU: 'Bir varmis bir yokmus' veya 'Evvel zaman icinde' gibi klasik masal acilisi OLMALIDIR."
      - "ZORUNLU: Konusan hayvanlar, sihirli objeler (sihirli degnek, sihirli ayna vb.) veya olagustu gucler metinde ACIKCA yer almalidir."
      - "Gercekci hayat sahnesi yoktur; olay fantastik/hayal dunyasinda gectir."
      - "Tur ayirt etme, metnin gorunur ozelliklerinden yapilabilmelidir — masal olmayan metin KESINLIKLE yazilmamalidir."
      - "2. sinif ogrencisinin anlayabilecegi sadelikte kelime hazinesi kullanilmalidir."
      - "Metin dis bilgi gerektirmemelidir."

  stem:
    required: true

  options:
    count: 3
    labels: ["A", "B", "C"]
    word_count_min: 1
    word_count_max: 3
    style: "concept"
    correct_count: 1
    correct_type: "matches"
    kurallar:
      - "Tum secenekler metin turu adi biciminde olmalidir."
      - "Dogru secenek: masal"
      - "Yanlis secenekler: öyküleyici metin, hikâye"
      - "Secenekler kendi aralarinda bicimce paralel olmalidir."

soru_kokleri:
  - "<b>Bu metnin turu asagidakilerden hangisidir?</b>"
  # KULLANILDI: - "<b>Asagidakilerden hangisi bu metnin turudur?</b>"
  # KULLANILDI: - "<b>Bu metin hangi ture girer?</b>"
  # KULLANILDI: - "<b>Bu yazinin turu asagidakilerden hangisidir?</b>"
  # KULLANILDI: - "<b>Bu metin asagidaki turlerden hangisine ornektir?</b>"
  # KULLANILDI: - "<b>Bu metnin turunu asagidakilerden hangisi gosterir?</b>"
  # KULLANILDI: - "<b>Asagidakilerden hangisi bu metnin turunu soyler?</b>"
  - "<b>Bu metin hangi turdedir?</b>"
  - "<b>Bu parca hangi metin turune ornektir?</b>"
  - "<b>Bu yazi asagidaki metin turlerinden hangisidir?</b>"
  - "<b>Metnin turu asagidakilerden hangisi olabilir?</b>"
  # KULLANILDI: - "<b>Bu metin icin <u>en uygun</u> tur hangisidir?</b>"

dogru_cevap:
  tanim: "Bu metnin turu: masal"
  kurallar:
    - "Dogru cevap 'masal' olmalidir."
    - "Dogru cevap metnin gorunur ozelliklerinden cikarilabilmelidir."

celdirici_stratejileri:
  - ad: "YAKIN_TUR"
    bilisssel_hata_kategorisi: "kavram_karisikligi"
    aciklama: "Dogru ture yakin ama farkli bir metin turu"
    nasil_olusturulur: |
      Metne yakin gorunen ama tur olarak farkli secenegi sun.
    kategori: "semantic"
  - ad: "UZAK_TUR"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Metinden acikca farkli bir tur"
    nasil_olusturulur: |
      Acikca farkli turden bir secenek sun.
    kategori: "cognitive"

use_shared_strategies: false

beceri:
  katman: "KB1"
  bilesenler: ["metin_turu_ayirt_etme"]
  surec_bileseni: "metni_anlama"
