# ═══════════════════════════════════════════════════════════════
# URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  temel_ilke: >
    Bu formatta soru, öğrenciyi tüm gizli tam sıralamayı kurmaya zorlamalıdır.
    Doğru cevap; tek bir koşuldan, iki koşulun hızlı birleşiminden veya yüzeysel
    elemeden bulunamamalı; ancak tüm bireylerin sırası oluşturulduktan sonra
    kesinleşmelidir.

  steps:
    - step: 1
      action: "Senaryo alanı seç"
      details: |
        Yalnızca tam sıralama sorusuna uygun bir birey-sırası bağlamı seç.
        Örnek alanlar:
        - kantin kuyruğu
        - otobüs biniş sırası
        - sahneye çıkış sırası
        - sunum sırası
        - yarış başlangıç sırası
        - sınıfa giriş sırası

    - step: 2
      action: "Bireyleri ve gizli tam sırayı kur"
      details: |
        - Önce sıraya girecek 4-6 bireyi/varlığı belirle
        - Sonra bunları baştan sona tek doğru sırayla diz
        - Bu sıra, sorunun görünmeyen çözüm tablosu olmalıdır
        - Soru yazımına geçmeden önce tüm sıralama kesinleşmiş olmalıdır

    - step: 3
      action: "Soru kökünü belirle"
      details: |
        Soru kökü tam sıralamayı sormalıdır.
        Tercihen şu tür kökler seçilmelidir:
        - doğru sıralama hangisidir
        - soldan sağa doğru sıralama hangisidir
        - başlangıçtan sona doğru sıralama hangisidir
        - birinciden sonuncuya doğru sıra hangisidir

    - step: 4
      action: "Koşulları gizli tam sıradan türet"
      details: |
        - 3-5 madde oluştur
        - Her madde farklı bilgi taşımalı
        - Koşullar birbirini tekrar etmemeli
        - Hiçbir madde tek başına doğru cevabı vermemeli
        - İki madde birleşince tam sıra doğrudan görünür olmamalı
        - Koşullar ancak birlikte değerlendirildiğinde tüm sırayı kurdurmalıdır
        - Koşullar arasında çelişki olmamalıdır
        - Koşullar birden fazla sıralamaya izin vermemelidir
        - Koşullar ağırlıklı olarak göreli ilişki içermelidir

    - step: 5
      action: "Setup cümlesini yaz"
      details: |
        - 1-2 cümlede sıranın çerçevesini tanıt
        - Kimlerin/nelerin sıralandığı ve sıranın yönü anlaşılır olsun
        - Bağlam sade, öğrenciye yakın ve sıra-merkezli olsun
        - Gereksiz süsleme yapma

    - step: 6
      action: "Doğru seçeneği üret"
      details: |
        - Doğru seçenek, gizli tam sıranın birebir karşılığı olmalıdır
        - Doğru cevap maddelerden biri tekrar edilerek yazılmamalıdır
        - Öğrenci gizli tam sırayı kurmadan bu seçeneğe ulaşamamalıdır
        - Tüm bireyler doğru sırayla ve eksiksiz yer almalıdır

    - step: 7
      action: "3 çeldirici üret"
      details: |
        - Her çeldirici farklı bir muhakeme hatasına dayanmalıdır
        - Tek bir maddeden hemen elenmemelidir
        - Çeldiriciler, gizli tam sırayı eksik veya yanlış kuran öğrencinin düşebileceği yanlış tam dizilimler olmalıdır
        - Her çeldiricide tüm bireyler yer almalı; yalnızca sıralama yanlış olmalıdır

    - step: 8
      action: "Seçenekleri dengele ve sırala"
      details: |
        - A-B-C-D seçeneklerini rastgele sırala
        - Tüm seçenekler tam sıralama formatında olsun
        - Her seçenekte tüm bireyler birer kez yer alsın
        - Doğru cevap biçimsel olarak öne çıkmasın
        - Uzunluk, ton ve yapı bakımından şıklar dengeli olsun

    - step: 9
      action: "Tam çözüm testi yap"
      details: |
        Aşağıdaki soruları kontrol et:
        - Öğrenci tüm gizli tam sırayı kurmadan doğru cevabı bulabilir mi?
        - Tek bir madde doğru cevabı ele veriyor mu?
        - Yalnızca ilk iki maddeyle doğru seçenek tahmin edilebiliyor mu?
        - Şıklardan biri maddelerde açıkça verilen bilgiyi tekrar ediyor mu?
        - Her şıkta tüm bireyler birer kez yer alıyor mu?
        - Koşullar gerçekten yalnızca bir doğru tam sıra üretiyor mu?
        Bu sorulardan herhangi birine 'evet' deniyorsa soru yeniden kurulmalıdır.

