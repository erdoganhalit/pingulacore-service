# bolum6/sozel_mantik_tam_siralama_sorusu.yaml
# TAM SIRALAMA SORUSU SON HALİ
# Bölüm 6 - Sözel Mantık ve Muhakeme
#
# FORMAT: Setup cümlesi + maddeli koşullar (•) + soru kökü + 4 tam sıralama seçeneği
# Bu sürüm yalnızca "tam sıralama sorusu" kalıbı içindir.

meta:
  id: "sozel_mantik_tam_siralama_sorusu"
  ad: "Sözel Mantık ve Muhakeme - Tam Sıralama Sorusu"
  sinif_seviyesi: 5
  aciklama: "Kişi, nesne veya varlıkların bir sıra/kuyruk/dizilim içinde gizli tam sırasını bulma ve buna göre doğru tam dizilimi seçme"
  frequency: "High (~24 questions)"

siralama_senaryolari:
  - ad: "kantin_kuyrugu"
    aciklama: "Öğrencilerin kantinde bekleme sırası"
    ornek_setup: "Beş öğrenci kantinde alışveriş yapmak için sıraya girmiştir."

  - ad: "otobus_binis_sirasi"
    aciklama: "Otobüse binmek için oluşan sıra"
    ornek_setup: "Altı kişi otobüse binmek için sırada beklemektedir."

  - ad: "sahneye_cikis_sirasi"
    aciklama: "Gösteri veya yarışmada sahneye çıkış sırası"
    ornek_setup: "Beş yarışmacı sahneye belirli bir sırayla çıkacaktır."

  - ad: "odul_toreni_sirasi"
    aciklama: "Ödül almak için sahneye çağrılma sırası"
    ornek_setup: "Beş öğrenci ödül töreninde belirli sırayla çağrılacaktır."

  - ad: "sinif_sunum_sirasi"
    aciklama: "Öğrencilerin sunum yapma sırası"
    ornek_setup: "Beş öğrenci proje sunumlarını belirli bir sıraya göre yapacaktır."

  - ad: "yaris_baslangic_sirasi"
    aciklama: "Yarışa başlama veya çıkış sırası"
    ornek_setup: "Beş sporcu yarışa belirli bir sırayla başlayacaktır."

  - ad: "doktor_muayene_sirasi"
    aciklama: "Muayene olmak için bekleyen kişilerin sırası"
    ornek_setup: "Beş kişi muayene olmak için sırada beklemektedir."

  - ad: "kutuphane_islem_sirasi"
    aciklama: "İşlem yaptırmak için bekleme sırası"
    ornek_setup: "Beş öğrenci kütüphanede işlem yaptırmak için sıraya girmiştir."

  - ad: "sinifa_giris_sirasi"
    aciklama: "Sınıfa ya da salona giriş sırası"
    ornek_setup: "Beş öğrenci sınıfa belirli bir sırayla girecektir."

  - ad: "lunapark_oyun_sirasi"
    aciklama: "Oyuncağa binmek için bekleme sırası"
    ornek_setup: "Beş çocuk lunaparktaki oyuncağa binmek için sırada beklemektedir."

  - ad: "fotograf_cekim_sirasi"
    aciklama: "Fotoğraf çekimi için sıraya geçme düzeni"
    ornek_setup: "Beş kişi fotoğraf çekimi için sıraya dizilecektir."

  - ad: "gorev_alma_sirasi"
    aciklama: "Görev ya da malzeme alma sırası"
    ornek_setup: "Beş öğrenci sınıf görevlerini almak için sıraya girmiştir."

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Setup cümlesi + maddeli koşullar + soru kökü + 4 tam sıralama seçeneğinden oluşan sıralama sorusu"

  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
    sentence_count_min: 2
    sentence_count_max: 8
    stil: "mantik_bulmacasi"

    amac: >
      Öğrencinin, bir sıra/kuyruk/dizilim içindeki bireyler veya varlıklarla ilgili
      verilen ilişkisel koşulları birlikte değerlendirerek gizli tam sıralamayı
      kurması gerekir. Koşullar tam sırayı doğrudan tarif etmemeli; öğrenci sıralamanın
      eksik kalan bölümlerini mantıksal çıkarımla tamamlamalıdır.

    kurallar:
      - "Paragraf iki bölümden oluşur: (1) SETUP CÜMLESİ + (2) MADDELİ KOŞULLAR"
      - "SETUP CÜMLESİ (1-2 cümle): Kimlerin/nelerin sıralanacağını, sıranın yönünü ve genel çerçeveyi tanıtır"
      - "Kurgu birey-merkezli veya varlık-merkezli olabilir; ancak yapı doğrusal bir sıra içermelidir"
      - "MADDELİ KOŞULLAR 3-5 madde olmalıdır; her koşul • ile başlamalı ve <br> ile ayrılmalıdır"
      - "FORMAT ŞEKLİ şu mantıkta olmalıdır: Setup cümlesi.<br>Bu sıralamayla ilgili aşağıdaki bilgiler verilmektedir:<br>• Koşul 1<br>• Koşul 2<br>• Koşul 3"
      - "YASAK: Düz paragraf yazma; mutlaka setup + • maddeli koşul yapısı kullanılmalıdır"
      - "YASAK: <ul>, <li>, <ol> tag'leri kullanma; yalnızca • karakteri ve <br> kullanılmalıdır"

      - "Önce gizli doğru tam sıra kurulmalı; ardından yalnızca bu sıraya götüren koşullar yazılmalıdır"
      - "Koşullar tek tek değil, birlikte değerlendirildiğinde anlam kazanmalıdır"
      - "Her bir madde farklı bilgi taşımalıdır; maddeler birbirini tekrar etmemelidir"
      - "Aynı sonuca götüren gereksiz veya yinelenen iki ayrı koşul yazılmamalıdır"

      - "Koşullar tam sırayı adım adım açıkça tarif etmemelidir"
      - "Maddeler, gizli tam sıralamanın yalnızca bazı parçalarını veya ilişkilerini vermelidir"
      - "Öğrenci, verilen ilişkilerden hareketle sıradaki eksik yerleri kendi çıkarımıyla tamamlamak zorunda kalmalıdır"
      - "Koşullar çözümü doğrudan ele vermemelidir; bulunması gereken tam sıralama açıkça söylenmemelidir"
      - "Sorunun çözümü, tek bir koşula bakılarak değil, tüm koşullar analiz edildikten sonra yapılabilmelidir"
      - "Şıklara bakmadan önce gizli tam sıra kurulabilir olmalı; şıklar sıralamayı kurdurmamalı, kurulmuş sıralama üzerinden test edilmelidir"
      - "Koşullar arasında çelişki olmamalıdır"
      - "Koşullar birden fazla sıralamaya izin vermemelidir; yalnızca tek bir doğru tam sıra üretmelidir"
      - "Koşullar, öğrenciyi adım adım sona götürmeli; ancak ara adımlardan biri nihai tam sıralamayı tek başına vermemelidir"

      - "Koşullar ağırlıklı olarak göreli ilişki içermelidir"
      - "Öncelikli ilişki türleri: önce/sonra, hemen önce/hemen sonra, arasında X kişi bulunması, art arda olma/olmama, başta/sonda, solda/sağda, bir kişinin iki kişi arasında olması"
      - "Mutlak sıra numarası bilgisi (2. sırada, 4. sırada vb.) zorunlu olmadıkça kullanılmamalıdır"
      - "Mutlak konum bilgisi kullanılacaksa en fazla 1 madde içinde yer almalıdır"
      - "Koşulların çoğu sıra numarası vermek yerine bireyler arası ilişki kurmalıdır"
      - "Koşullar, öğrencinin yalnızca alt alta yazarak mekanik yerleştirme yapacağı kadar açık olmamalıdır"
      - "En az 2 koşul dolaylı çıkarım gerektirmelidir; yani bir madde başka bir maddeyle birleşmeden tam anlam kazanmamalıdır"
      - "En az 1 koşul, öğrencinin önce küçük bir ara sıra kurup sonra bunu diğer koşullarla birleştirmesini gerektirmelidir"
      - "Sıranın bazı bölümleri doğrudan verilebilir; ancak tam sıra mutlaka düşünerek tamamlanmalıdır"

      - "5. sınıf seviyesinde 4-6 birey/varlık ve 3-5 koşul tercih edilmelidir"
      - "Kişi kullanılacaksa Türk isimleri tercih edilmelidir (Ali, Ayşe, Ece, Baran, Defne vb.)"
      - "Bağlam, öğrencinin aşina olduğu günlük yaşam durumlarından seçilmelidir"
      - "Dil açık, kısa ve kesin olmalıdır"
      - "'sonra' ve 'hemen sonra', 'önce' ve 'hemen önce' gibi kavramlar net ayrılmalıdır"
      - "Sıra ve ilişki bildiren ifadeler belirsizlik taşımamalıdır"
      - "Koşullar yalnızca tam sıralamayı kurmaya hizmet etmelidir; konu dışı süsleme veya dikkat dağıtıcı detay eklenmemelidir"

    kosul_dagilimi:
      preferred_structure:
        - "1 madde: art arda olma/olmama veya blok ilişkisi"
        - "1 madde: önce/sonra veya hemen önce/hemen sonra ilişkisi"
        - "1 madde: arasında X kişi bulunması veya iki kişi arasında olma ilişkisi"
        - "Gerekirse 1 madde: sınırlı başta/sonda bilgisi"
      yasaklar:
        - "3 veya daha fazla maddede doğrudan sıra numarası verme"
        - "Her bireyin yerini tek tek tarif eden koşullar yazma"
        - "Koşulları soldan sağa çözüm şeması gibi dizme"
        - "Bir kişinin yerini söyledikten sonra komşularını da açıkça vererek tam sırayı kapatma"

  stem:
    required: true
    description: >
      Soru kökü, öğrenciyi gizli tam sıralamayı kurmaya ve ardından tam sıralama
      seçenekleri arasında seçim yapmaya zorlamalıdır.
    kurallar:
      - "Soru kökü gizli tam sıra kurulduktan sonra cevaplanabilir olmalıdır"
      - "Soru kökü, tek bir maddeye bakılarak çözülebilecek kadar dar olmamalıdır"
      - "Bu formatta soru kökü esas olarak tam sıralamayı sordurmalıdır"
      - "Soru kökü, öğrenciyi doğrudan sıra numarası okumaya değil, kurulmuş tam sıralamayı seçmeye yöneltmelidir"

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 4
    word_count_max: 18
    style: "ordered_sequence"
    correct_count: 1
    kurallar:
      - "Her seçenek tam sıralama biçiminde yazılmalıdır"
      - "Her seçenekte tüm bireyler/varlıklar eksiksiz yer almalıdır"
      - "Her birey/varlık her seçenekte yalnızca bir kez geçmelidir"
      - "Hiçbir seçenekte eksik veya fazla öğe bulunmamalıdır"
      - "Seçenekler aynı ayırıcı düzeniyle verilmelidir"

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Bu bilgilere göre doğru sıralama aşağıdakilerden hangisidir?</b>"
  - "<b>Bu bilgilere göre soldan sağa doğru sıralama aşağıdakilerden hangisidir?</b>"
  - "<b>Bu bilgilere göre başlangıçtan sona doğru sıralama aşağıdakilerden hangisidir?</b>"
  - "<b>Bu bilgilere göre birinciden sonuncuya doğru sıra aşağıdakilerden hangisidir?</b>"
  - "<b>Bu bilgilere göre önden arkaya doğru sıralama aşağıdakilerden hangisidir?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: >
    Doğru cevap, yalnızca verilen tüm koşullar birlikte değerlendirilip gizli tam
    sıra kurulduktan sonra mantıksal olarak kesin biçimde belirlenebilen eksiksiz
    sıralamadır. Öğrenciden tek bir ipucuna dayanarak değil, tüm maddeleri analiz
    ederek doğru tam dizilimi seçmesi beklenir.

  temel_ilke: >
    Gizli tam sıra kurulmadan doğru cevap belirlenememelidir. Doğru seçenek,
    bir veya iki koşuldan doğrudan fark edilebilen değil; ancak tüm koşulların
    ortak sonucu olarak ortaya çıkan eksiksiz dizilim olmalıdır.

  kurallar:
    - "Doğru cevap SADECE tüm koşullar birlikte değerlendirildiğinde ulaşılabilir olmalıdır"
    - "Doğru cevap bir tek maddeye bakılarak anlaşılmamalıdır"
    - "Doğru cevap yalnızca iki koşul birleştirilerek doğrudan bulunamamalıdır; gerekli ise ara sıralamalar üzerinden gizli tam sıra kurulmalıdır"
    - "Öğrenci, seçeneklere geçmeden önce tüm bireylerin sırasını kurabilecek durumda olmalıdır"
    - "Doğru cevap, maddelerden doğrudan alınmış tekil bir bilgi değil; tam sıralamanın kendisi olmalıdır"
    - "Doğru cevap, gizli tam sıranın birebir karşılığı olmalıdır"
    - "Doğru cevapta tüm bireyler/varlıklar eksiksiz yer almalıdır"
    - "Doğru cevapta hiçbir birey/varlık tekrarlanmamalı ve hiçbir öğe eksik olmamalıdır"
    - "Doğru cevap tahmine, sezgiye veya eksik okumaya değil; mantıksal zincire dayanmalıdır"
    - "Sorunun tek bir doğru cevabı olmalıdır; belirsizlik ve alternatif doğru sıralama YASAKTIR"
    - "Doğru cevap, koşullardan biri tekrar edilerek yazılmamalıdır"
    - "Doğru cevap, madde cümlelerinden birinin neredeyse aynısı olmamalıdır"
    - "Doğru cevap 4-18 kelime arasında olmalıdır"
    - "Biçimsel olarak diğer şıklardan ayrışmamalıdır"

  yasaklar:
    - "Doğru cevabın tek bir koşulun yeniden yazılmış hâli olması"
    - "Doğru cevabın iki koşuldan hemen fark edilecek kadar açık olması"
    - "Gizli tam sıra kurulmadan seçenek elemesi yapılabilmesi"
    - "Doğru cevabın, maddelerden birinde açıkça verilen konumu veya ilişkiyi doğrudan tekrar etmesi"
    - "Birden fazla seçeneğin tüm koşullarla uyumlu olması"
    - "Doğru cevapta eksik, fazla veya tekrarlı birey bulunması"

  kontrol:
    - "Tek bir koşul çıkarıldığında doğru cevap hâlâ açıkça görünür hâle geliyor mu?"
    - "Sadece ilk iki koşula bakılarak doğru seçenek bulunabiliyor mu?"
    - "Gizli tam sıra kurulmadan doğru seçenek tahmin edilebiliyor mu?"
    - "Doğru seçenek, maddelerde verilen ifadelerden birini tekrar mı ediyor?"
    - "Doğru seçenek gerçekten tüm koşulların birleşiminden mi doğuyor?"
    - "Doğru seçenekte tüm bireyler eksiksiz ve birer kez mi yer alıyor?"


# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  temel_ilke: >
    Bu formatta çeldiriciler, tek bir koşula bakılarak yanlış olduğu anlaşılabilen
    yüzeysel sıralamalar olmamalıdır. Her yanlış seçenek, öğrencinin gizli tam
    sıralamayı kurarken yapabileceği bütünsel bir muhakeme hatasının sonucu olmalıdır.
    Öğrenci yanlış bir ara sıra veya yanlış bir tam sıra kurarsa, bu şıklardan
    birini işaretlemeye yatkın olmalıdır.

  ana_prensipler:
    - "Çeldirici, bir koşulun doğrudan olumsuzu ya da kaba ters çevrilmiş hâli olmamalıdır"
    - "Çeldirici, tek bir maddeyle hemen elenmemelidir"
    - "Her çeldirici, yanlış kurulmuş bir alternatif tam sıralamanın çıktısı olmalıdır"
    - "Yanlış seçenek, koşulların bir kısmını doğru kullanıp bir kısmını yanlış yorumlayan öğrencinin ulaşacağı tam sıra olmalıdır"
    - "Çeldirici, tüm sıralama kurulmadan değil; yanlış sıralama kurulduğunda güçlü görünmelidir"
    - "Çeldiriciler, çözüm sürecindeki farklı yanlış sıralama yollarını temsil etmelidir"
    - "Her çeldirici, doğru cevaba biçimsel olarak benzemeli; ama yalnızca tam ve doğru sıra ile test edildiğinde geçersiz olmalıdır"
    - "Amaç, açık yanlış yazmak değil; yanlış kurulmuş sıralamanın doğal sonucu olan makul tam sıra yazmaktır"

  uretim_proseduru:
    - "1. Önce doğru gizli tam sıralamayı kur."
    - "2. Ardından öğrencinin düşebileceği 3 farklı yanlış tam sıralama tasarla."
    - "3. Her yanlış sıra, koşulların en az bir kısmını sağlamalı; fakat tümünü sağlamamalıdır."
    - "4. Çeldiricileri bu yanlış sıralamaların sonuçlarından üret."
    - "5. Her çeldiricinin yanlışlığı ancak tüm koşullar yeniden kontrol edildiğinde ortaya çıkmalıdır."
    - "6. Bir çeldirici tek bir madde ile hemen eleniyorsa yeniden yaz."
    - "7. Her çeldiricide tüm bireyler eksiksiz ve yalnızca birer kez yer almalıdır."

  genel_kurallar:
    - "Her çeldirici farklı bir yanlış sıralama mantığına dayanmalıdır"
    - "Çeldiriciler, öğrencinin gizli tam sırayı yanlış tamamlaması hâlinde makul görünmelidir"
    - "Çeldiriciler, maddelerde açıkça yazan bilgileri kopyalayıp bozarak üretilmemelidir"
    - "Yanlış seçenekler, eksik çözüm değil yanlış tam sıra sonucu olmalıdır"
    - "Çeldiriciler, doğru cevabın yalnızca isim yerleri değiştirilmiş rastgele hâli olmamalıdır"
    - "Bir çeldirici, yalnızca son kontrol aşamasında çürütülebilecek güçte olmalıdır"
    - "Her yanlış seçenek tam sıralama biçiminde olmalıdır"
    - "Her yanlış seçenekte tüm bireyler/varlıklar eksiksiz yer almalı ve her biri yalnızca bir kez geçmelidir"

  stratejiler:
    - ad: "YANLIS_BLOK_YERLESTIRME"
      bilisssel_hata_kategorisi: "kurgu_hatasi"
      aciklama: "Öğrenci art arda olması gereken iki ya da daha fazla kişiyi doğru bulur; fakat bu bloğu sırada yanlış yere yerleştirir"
      nasil_olusturulur: |
        Gizli sırada birlikte düşünülmesi gereken iki ya da daha fazla kişiyi doğru grup olarak koru;
        ancak bu grubu sırada yanlış konuma taşı. Çeldirici, öğrencinin ilişkiyi doğru görüp
        blok yerini yanlış belirlediği alternatif tam sıra olmalıdır.

    - ad: "ARADA_X_KISI_HATASI"
      bilisssel_hata_kategorisi: "mesafe_hatasi"
      aciklama: "Öğrenci iki kişi arasındaki kişi sayısını yanlış kurar"
      nasil_olusturulur: |
        Özellikle 'arasında 1/2 kişi vardır' gibi koşullarda, ilgili iki kişiyi birbirine yakın
        ama yanlış mesafede yerleştir. Çeldirici, ilk bakışta makul görünen fakat kişi sayısı
        kontrol edildiğinde bozulan alternatif tam sıra olmalıdır.

    - ad: "ILISKIYI_EKSIK_TASIMA"
      bilisssel_hata_kategorisi: "eksik_analiz"
      aciklama: "Öğrenci bir koşulu doğru kullanır; fakat bu koşulun diğer maddelerle birleşince doğurduğu sonucu taşımaz"
      nasil_olusturulur: |
        Bir veya iki koşula göre makul görünen, ancak başka bir koşulla birleşince bozulması gereken
        yanlış bir tam sıra kur. Çeldirici, öğrencinin ara çıkarımı yapıp sonraki mantıksal taşıma
        adımını atlaması sonucu ulaştığı sıra olmalıdır.

    - ad: "BAS_SON_BILGISINI_KORUYUP_ORTAYI_YANLIS_KURMA"
      bilisssel_hata_kategorisi: "kismi_dogru_kurgu"
      aciklama: "Öğrenci başta veya sonda olan kişiyi doğru yerleştirir; fakat orta kısmı yanlış kurar"
      nasil_olusturulur: |
        Baştaki/sondaki kişiyi doğru koru; fakat ortadaki kişilerin sırasını, diğer ilişkileri tam
        taşımadan yanlış kur. Bu çeldirici, öğrencinin sabit ucu doğru görüp geri kalanı eksik
        mantıkla tamamladığı alternatif tam sıra olmalıdır.

    - ad: "KALAN_YERLERI_YANLIS_TAMAMLAMA"
      bilisssel_hata_kategorisi: "yanlis_tamamlama"
      aciklama: "Öğrenci sıranın büyük kısmını doğru kurar; fakat kalan kişileri elde kalana göre yanlış tamamlar"
      nasil_olusturulur: |
        Gizli tam sıranın çoğunu doğru tut; yalnızca son 1-2 kişiyi, tüm koşulları tekrar kontrol etmeden
        yerleştirilmiş gibi kurgula. Çeldirici, 'artık kalanlar bunlardır' hatasına dayanmalıdır.

