meta:
  id: test_bar_chart
  ad: TEST — Sütun Grafiği (Tekli)
  sinif_seviyesi: 5
  aciklama: Senaryo + tablo → dikey sütun grafiğine dönüştürülür
  frequency: Medium
context:
  type: test_bar_chart
  question_count: 2
  question_count_min: 2
  question_count_max: 2
  generation:
    word_count_min: 60
    word_count_max: 120
    visual_format: bar_chart
    structure:
    - Bir karakter (isimli) bir araştırma/anket yapmıştır (2-3 cümle senaryo)
    - 'Araştırma sonuçlarını BİR TABLO olarak sun: <table> etiketleriyle'
    - 'Tablo formatı: Başlık satırı (Kategori | Değer) + en az 3, en fazla 5 veri satırı'
    - 'Değerler SAYISAL ve BİRİMLİ olmalı (ör: 55 kişi, %30, 600 birim)'
    - 'KRİTİK: Tablo 2 sütunlu olmalı — 1. sütun kategori adı, 2. sütun sayısal değer'
    - 'NOT: Bu tablo otomatik olarak sütun grafiğine dönüştürülecektir'
    kurallar:
    - Senaryo 5. sınıf seviyesinde olmalı
    - Değerler arasında karşılaştırma yapılabilir belirgin farklar olmalı
    - Kategoriler kısa ve okunabilir olmalı
    - Türkçe karakterler doğru kullanılmalı
  questions:
  - slot: 1
    type: grafik_okuma
    soru_kokleri:
    - <b>Grafiğe göre en yüksek değere sahip kategori aşağıdakilerden hangisidir?</b>
    - <b>Grafikteki verilere göre aşağıdaki yargılardan hangisine ulaşılabilir?</b>
    options_style: complete_sentence
    word_count_min: 3
    word_count_max: 15
    beceri:
      katman: KB2
      bilesenler:
      - grafik_okuma
      - yorumlama
      surec_bileseni: bilgiyi_cikartma
  - slot: 2
    type: grafik_cikarim
    soru_kokleri:
    - <b>Grafikteki veriler karşılaştırıldığında aşağıdakilerden hangisi <u>söylenemez</u>?</b>
    - <b>Grafik yorumlandığında aşağıdaki çıkarımlardan hangisi doğrudur?</b>
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 18
    beceri:
      katman: KB3
      bilesenler:
      - cikarim_yapma
      - karsilastirma
      surec_bileseni: problemi_yapilandirma
header_template: 1-2. soruları aşağıdaki bilgilere göre birbirinden bağımsız olarak cevaplayınız.
format:
  type: llm_generated_html
  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 120
    sentence_count_min: 2
    sentence_count_max: 5
  stem:
    required: true
  options:
    count: 4
    labels:
    - A
    - B
    - C
    - D
    word_count_min: 3
    word_count_max: 18
    style: complete_sentence
    correct_count: 1
    correct_type: matches
dogru_cevap:
  tanim: Grafikteki verilerden doğru okunan veya çıkarılan bilgi
  kurallar:
  - Doğru cevap grafikteki verileri doğru yorumlamalı
  - 'HATALI YAKLASIM: Metinde/tabloda/grafikte geçen bir cümlenin, kelime grubunun ya da kelimenin AYNEN seçeneklerde kullanılması — öğrenci metni anlamasa bile görsel eşleştirme yaparak doğru cevabı bulabilir!'
  - 'DOĞRU YAKLASIM: Seçenek, metindeki ifadenin AYNISI değil, ANLAMCA ÖZDESİ (farklı kelimelerle ifade edilmiş hâli) olmalı — öğrencinin ezberini değil, okuduğunu anlama ve yorumlama becerisini ölçer'
  - Doğru seçenek paragraftaki/tablodaki/grafikteki hiçbir cümleyi kelimesi kelimesine TEKRARLAMAMALI
  - En az %40 kelime farklılığı olmalı — aynı cümleyi kopyalayıp yapıştırma YASAK
  - 'BİLİMSEL TERİM KORUMASI: Bilimsel terimler, teknik kavramlar ve özel isimler DEĞİŞTİRİLMEMELİ. Sadece GÜNLÜK DİL kelimeleri için eş anlamlı kullanılmalı'
distractors:
  stratejiler:
  - ad: VERI_CARPITMA
    aciklama: Grafikteki değeri yanlış okuma
  - ad: YANLIS_KARSILASTIRMA
    aciklama: Sütunları yanlış karşılaştırma
  - ad: GENELLEME_HATASI
    aciklama: Grafikte olmayan bir genelleme yapma
use_shared_strategies: false
