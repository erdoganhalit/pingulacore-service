meta:
  id: test_cizgi
  ad: TEST — Çizgi Grafiği Görselli
  sinif_seviyesi: 5
  aciklama: Senaryo + tablo → AI çizgi grafiği görseli
  frequency: Medium
context:
  type: test_cizgi
  question_count: 2
  question_count_min: 2
  question_count_max: 2
  generation:
    word_count_min: 60
    word_count_max: 120
    image_type: cizgi_grafigi
    structure:
    - Bir karakter (isimli) bir süreci ZAMANA GÖRE takip etmiş, değişimi kaydetmiştir (2-3 cümle)
    - 'KRİTİK: Senaryoda sayısal değerleri YAZMA — veriler sadece tabloda olmalı'
    - 'Tablo: <table> ile, 2 sütun (Zaman/Gün/Hafta | Değer), en az 5 satır'
    - Değerler zaman içindeki DEĞİŞİMİ göstermeli (artış, azalış veya dalgalanma)
    - 'NOT: Bu tablo AI tarafından ÇİZGİ GRAFİĞİNE dönüştürülecektir'
    kurallar:
    - 5. sınıf seviyesi, zaman serisi verisi içermeli
    - Değerler bir trend göstermeli (sürekli artış, azalış veya dalgalanma)
    - Türkçe karakterler doğru kullanılmalı
  questions:
  - slot: 1
    type: grafik_okuma
    soru_kokleri:
    - <b>Grafiğe göre en yüksek değer hangi zaman diliminde görülmüştür?</b>
    - <b>Çizgi grafiğine göre aşağıdakilerden hangisi doğrudur?</b>
    options_style: complete_sentence
    word_count_min: 4
    word_count_max: 18
    beceri:
      katman: KB2
      bilesenler:
      - grafik_okuma
      surec_bileseni: bilgiyi_cikartma
  - slot: 2
    type: grafik_cikarim
    soru_kokleri:
    - <b>Grafikteki değişim incelendiğinde aşağıdaki çıkarımlardan hangisine ulaşılır?</b>
    - <b>Çizgi grafiğindeki trend değerlendirildiğinde aşağıdakilerden hangisi <u>söylenemez</u>?</b>
    options_style: complete_sentence
    word_count_min: 5
    word_count_max: 20
    beceri:
      katman: KB3
      bilesenler:
      - cikarim_yapma
      - trend_analizi
      surec_bileseni: problemi_yapilandirma
header_template: 1-2. soruları aşağıdaki bilgilere göre birbirinden bağımsız olarak cevaplayınız.
format:
  type: llm_generated_html
  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 120
    sentence_count_min: 2
    sentence_count_max: 5
  stem:
    required: true
  options:
    count: 4
    labels:
    - A
    - B
    - C
    - D
    word_count_min: 4
    word_count_max: 20
    style: complete_sentence
    correct_count: 1
    correct_type: matches
dogru_cevap:
  tanim: Çizgi grafiğindeki trendden doğru okunan veya çıkarılan bilgi
  kurallar:
  - Doğru cevap grafiği OKUYARAK ve YORUMLAYARAK bulunmalı
  - 'HATALI YAKLASIM: Metinde/tabloda/grafikte geçen bir cümlenin, kelime grubunun ya da kelimenin AYNEN seçeneklerde kullanılması — öğrenci metni anlamasa bile görsel eşleştirme yaparak doğru cevabı bulabilir!'
  - 'DOĞRU YAKLASIM: Seçenek, metindeki ifadenin AYNISI değil, ANLAMCA ÖZDESİ (farklı kelimelerle ifade edilmiş hâli) olmalı — öğrencinin ezberini değil, okuduğunu anlama ve yorumlama becerisini ölçer'
  - Doğru seçenek paragraftaki/tablodaki/grafikteki hiçbir cümleyi kelimesi kelimesine TEKRARLAMAMALI
  - En az %40 kelime farklılığı olmalı — aynı cümleyi kopyalayıp yapıştırma YASAK
  - 'BİLİMSEL TERİM KORUMASI: Bilimsel terimler, teknik kavramlar ve özel isimler DEĞİŞTİRİLMEMELİ (ör: teleskop → mercekli araç GEÇERSİZ). Sadece GÜNLÜK DİL kelimeleri için eş anlamlı kullanılmalı'
distractors:
  stratejiler:
  - ad: TREND_YANILTMA
    aciklama: Artış trendi varken azalış gibi gösterme
  - ad: ZAMAN_KARISTIRMA
    aciklama: Hangi dönemde ne olduğunu karıştırma
use_shared_strategies: false
