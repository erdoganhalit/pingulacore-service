# templates/baglam/baglam_1q_soru_cevap.yaml
# Baglam Tipi: 1Q Soru-Cevap
# Soru Sayisi: 1
# Kaynak: baglamb1sorukoku.md
# Soru Tipleri: Arastirma sorusu bulma / cevaplanamayan soru

meta:
  id: "baglam_1q_soru_cevap"
  ad: "1Q Baglam Soru-Cevap"
  sinif_seviyesi: 5
  aciklama: "Gunluk hayattan bir senaryo uzerinden soru-cevap iliskisi sorusu"
  kaynak: "baglamb1sorukoku.md"
  frequency: "Medium"

# ======================================================================
# BAGLAM KONFIGURASYONU
# ======================================================================

context:
  type: "baglam_senaryo_1q"
  question_count: 1
  question_count_min: 1
  question_count_max: 1
  generation:
    word_count_min: 60
    word_count_max: 120
    structure:
      - "Bir karakter (Turkce isimli) bir konu hakkinda arastirma yapar (3-5 cumle)"
      - "Karakter arastirma sonucunda bazi bilgilere ulasir"
      - "Senaryo somut, 5. sinif seviyesinde ve anlasilir olmali"
      - "Metinde bazi sorularin cevabi verilirken bazilari cevaplanmamis olmali"
    kurallar:
      - "Senaryo 5. sinif seviyesinde, gunluk hayattan olmali"
      - "Karakter ismi Turkce olmali (Elif, Mert, Zeynep, Can vb.)"
      - "Arastirma konusu ve bulgulari acik olmali"
      - "Turkce karakterler dogru kullanilmali (s, i, g, u, o, c)"

  questions:
    - slot: 1
      type: "soru_cevap"
      soru_kokleri:
        - "<b>...Ozne... yaptigi arastirmalarla asagidaki sorularin hangisine cevap <u>veremez</u>?</b>"
        - "<b>Asagidakilerden hangisi ...Ozne...'nin arastirmasinda cevap arayacagi sorulardan biri <u>olamaz</u>?</b>"
        - "<b>...Ozne..., merak ettigi konu hakkinda arastirma yaparken hangi soruya odaklanmis olabilir?</b>"
      options_style: "question_sentence"
      word_count_min: 5
      word_count_max: 18
      beceri:
        katman: "KB2"
        bilesenler: ["anlama", "cikarim_yapma"]
        surec_bileseni: "bilgiyi_cikartma"

soru_kokleri:
  - "<b>...Ozne... yaptigi arastirmalarla asagidaki sorularin hangisine cevap <u>veremez</u>?</b>"
  - "<b>Asagidakilerden hangisi ...Ozne...'nin arastirmasinda cevap arayacagi sorulardan biri <u>olamaz</u>?</b>"
  - "<b>...Ozne..., merak ettigi konu hakkinda arastirma yaparken hangi soruya odaklanmis olabilir?</b>"

header_template: null

# ======================================================================
# FORMAT
# ======================================================================

format:
  type: "llm_generated_html"
  description: "1Q baglam senaryo uzerinden soru-cevap iliskisi sorusu"

  paragraph:
    required: true
    word_count_min: 60
    word_count_max: 120
    sentence_count_min: 3
    sentence_count_max: 8

  stem:
    required: true

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 5
    word_count_max: 18
    style: "question_sentence"
    correct_count: 1
    correct_type: "matches"

# ======================================================================
# DOGRU CEVAP KURALLARI
# ======================================================================

dogru_cevap:
  tanim: "Metinde cevaplanamayan veya odaklanilan soru"
  kurallar:
    - "KRİTİK: Doğru cevap tablodaki tek bir hücreden veya metindeki tek bir cümleden direkt okunaMAMALI"
    - "Öğrenci doğru cevaba ulaşmak için senaryodaki durumu ANLAMALI ve tablodaki veriyi YORUMLAMALI"
    - "Doğru şık bir YORUM veya ÇIKARIM içermeli — ham veri tekrarı değil"
    - "YASAK: Tablodaki değeri aynen şıkka yazmak (örn: 'yalıtımı azdır' tabloda yazıyorsa şıkta aynen yazmamalı)"
    - "Şıklar senaryodaki probleme çözüm, tablodaki verilerden yargı veya karşılaştırma içermeli"

    - "Seçenekler arasında en az 2 tanesi makul görünmeli ama sadece biri metin+tablo birlikte değerlendirildiğinde doğru olmalı"
    - "Doğru şık en uzun şık OLMAMALI — seçenekler arası uzunluk dengeli olmalı"
    - "Dogru secenek paragraftaki hicbir cumleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "veremez/olamaz kokleri icin: dogru cevap metinde cevabi OLMAYAN soru olmali"
    - "odaklanmis olabilir koku icin: dogru cevap metnin ana arastirma konusunu yansitmali"
    - "HATALI YAKLASIM: Metinde/tabloda/grafikte geçen bir cümlenin, kelime grubunun ya da kelimenin AYNEN seçeneklerde kullanılması — öğrenci metni anlamasa bile görsel eşleştirme yaparak doğru cevabı bulabilir!"
    - "DOĞRU YAKLASIM: Seçenek, metindeki ifadenin AYNISI değil, ANLAMCA ÖZDESİ (farklı kelimelerle ifade edilmiş hâli) olmalı — öğrencinin ezberini değil, okuduğunu anlama ve yorumlama becerisini ölçer"
    - "Doğru seçenek paragraftaki/tablodaki/grafikteki hiçbir cümleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "En az %40 kelime farklılığı olmalı — aynı cümleyi kopyalayıp yapıştırma YASAK"
    - "BİLİMSEL TERİM KORUMASI: Bilimsel terimler, teknik kavramlar ve özel isimler DEĞİŞTİRİLMEMELİ (ör: 'teleskop' → 'mercekli araç' GEÇERSİZ). Sadece GÜNLÜK DİL kelimeleri için eş anlamlı kullanılmalı"

# ======================================================================
# CELDIRICI STRATEJILERI
# ======================================================================

distractors:
  stratejiler:
    - ad: "CEVABI_OLAN_SORU"
      aciklama: "Metinde aslinda cevabi bulunan soruyu sunma (veremez/olamaz icin)"
      ornek: "Metinde acikca cevaplanan bir soruyu celdirici olarak verme"
    - ad: "KONUDAN_SAPMA"
      aciklama: "Konuyla ilgili ama arastirma kapsaminda olmayan soru"
      ornek: "Benzer alandaki farkli bir arastirma sorusu"
    - ad: "YANLIS_ODAK"
      aciklama: "Arastirmanin yan konusuna odaklanan soru (odaklanmis olabilir icin)"
      ornek: "Ana konuyla iliskili ama yan bir konuyu odak gosterme"

use_shared_strategies: false
