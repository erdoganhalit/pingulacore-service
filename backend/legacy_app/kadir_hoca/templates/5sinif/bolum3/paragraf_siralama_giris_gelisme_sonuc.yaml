# templates/bolum3/paragraf_siralama_giris_gelisme_sonuc.yaml
# Bolum 3 - Yapi Yonu: Giris/Gelisme/Sonuc Bolumu Tespiti
#
# GIRIS-GELISME-SONUC FORMATI
# Numarali cumleler verilir, ogrenci giris/gelisme/sonuc bolumunu tespit eder

meta:
  id: "paragraf_siralama_giris_gelisme_sonuc"
  ad: "Paragraf Sıralama (Giriş-Gelişme-Sonuç)"
  sinif_seviyesi: 5
  aciklama: "Numaralı cümlelerden giriş, gelişme veya sonuç bölümünü tespit etme"
  frequency: "Medium"

# ═══════════════════════════════════════════════════════════════
# FORMAT / STRUCTURE
# ═══════════════════════════════════════════════════════════════

format:
  type: "llm_generated_html"
  description: "Numaralı karışık cümleler + soru kökü + 4 sıralama seçeneği"

  paragraph:
    required: true
    word_count_min: 40
    word_count_max: 80
    sentence_count_min: 5
    sentence_count_max: 10
    numbered_sentences: true
    stil: "bilgilendirici"
    kurallar:
      - "Tam 5 cümleden oluşsun"
      - "Her cümle 8-16 kelime arasında olmalı"
      - "Cümleler tek bir konu çevresinde yazılmalı"
      - "Cümleler doğal sıralarında okunduğunda tek ve akıcı bir paragraf oluşturmalı"
      - "Cümleler arasında mantıksal sıra kurulmasını sağlayan anlam ilişkisi bulunmalı ve bu sıralama dışında hiçbir sıralama anlam ilişkisi sağlamamalı"
      - "Paragraftaki hiçbir cümle diğerlerinden tamamen kopuk olmamalı"
      - "Doğru sıra bulunduğunda paragraf açıkça düzelmeli, yanlış sırada ise akış bozulmalı"
      - "Orijinal paragraf oluşturulduktan sonra, bu paragraftaki 5 cümleye I, II, III, IV, V Roma rakamları rastgele atanmalı"
      - "Bu Roma rakamları cümlelerin doğal sırasını göstermemeli; yalnızca karıştırma etiketi olarak kullanılmalı"
      - "Her Roma rakamı yalnızca bir cümleye atanmalı ve hiçbir rakam tekrar etmemeli"
      - "Numara atama işlemi tamamlandıktan sonra her cümlenin bir gizli etiketi oluşmuş olur"
      - "Soruda orijinal paragraf doğrudan şu düzende görülmeli: I., II., III., IV., V."
      - "Sıra, paragrafın gerçek sırası değil; rastgele atanmış etiketlerin sırası olmalı"
      - "Her Roma rakamının yanında o rakama atanmış cümle yer almalı"
      - "Üretilen sorudaki metin, görünüşte sıralı; anlam bakımından ise çözülmesi gereken bir yapı olmalı"
      - |
        NUMARALANDIRMA ve FORMAT KURALLARI (KRİTİK!):
        ★ Orijinal paragraf üretildikten sonra paragraf içindeki 5 cümle ayrı ayrı tespit edilmelidir.
        ★ Bu 5 cümlenin her birine I, II, III, IV ve V Roma rakamları rastgele ve tekrarsız biçimde atanmalıdır.
        ★ Roma rakamları cümlelerin DOĞRU sırasını DEĞİL, sadece etiketini gösterir.
        ★ Her Roma rakamı yalnızca bir cümleye atanmalıdır.
        ★ Her cümle yalnızca bir Roma rakamı almalıdır.
        ★ Numara ataması tamamlandıktan sonra öğrenciye gösterilecek metin, orijinal paragraf sırasına göre değil, atanmış Roma rakamlarının sırasına göre kurulmalıdır.
        ★ Öğrenci metni her zaman I., II., III., IV., V. sırasıyla görmelidir.
        ★ Ekranda görünen I. numaralı cümle, orijinal paragrafın 1. cümlesi olmak zorunda değildir.
        ★ Aynı durum II., III., IV. ve V. için de geçerlidir.
        ★ Gösterilen metinde her cümlenin başında Roma rakamı ve nokta ile alt alta yazılmalıdır: I., II., III., IV., V.
        ★ PARANTEZ KULLANMA — (I) değil, I. formatı kullan!
        ★ Her cümle arasına <br> etiketi koyulmalıdır — cümleler alt alta görünmeli, düz paragraf olmamalı!
        ★ FORMAT: "I. Cümle1.<br>II. Cümle2.<br>III. Cümle3.<br>IV. Cümle4.<br>V. Cümle5."
        ★ SADECE ROMA RAKAMI (I, II, III, IV, V) KULLAN — Arap rakamı (1, 2, 3) KULLANMA
        ★ Numaralı cümleler öğrenciye alt alta yazılan maddeler şeklinde sunulmalıdır.

  stem:
    required: true
    description: "Soru kokleri listesinden rastgele secilir"
    kurallar:
      - |
        SORU KÖKÜ KURALLARI (KRİTİK!):
        ★ Soru kökü SADECE tek bir soru cümlesi olmalı — paragraftaki cümleleri TEKRARLAMA!
        ★ YASAK: Soru kökünde (I)... (II)... (III)... şeklinde cümle listesi yazmak
        ★ YASAK: Paragrafı doğru sırada veya herhangi sırada yeniden yazmak
        ★ YASAK: Paragraftaki metni bold/kalın yapıp tekrar yazmak
        ★ DOĞRU: Sadece "Numaralanmış cümleler anlamlı bir paragraf oluşturacak şekilde sıralandığında doğru sıralama aşağıdakilerden hangisidir?" gibi TEK CÜMLELİK soru
        ★ Soru kökünde SADECE soru cümlesi olsun, başka HİÇBİR ŞEY olmasın

  options:
    count: 4
    labels: ["A", "B", "C", "D"]
    word_count_min: 3
    word_count_max: 12
    style: "short_phrase"
    correct_count: 1
    kurallar:
      - |
        SEÇENEK KURALLARI (KRİTİK!):
        ★ Her seçenek SADECE Roma rakamlarından oluşan sıralama dizisi olmalı
        ★ FORMAT: "III - I - V - II - IV" (Roma rakamları tire ile ayrılmış)
        ★ YASAK: Seçenekte cümle metni yazmak
        ★ YASAK: Arap rakamı (1, 2, 3) kullanmak
        ★ YASAK: Seçenekte sadece "A", "B" yazmak
        ★ DOĞRU ÖRNEK: A) III - I - V - II - IV
        ★ YANLIŞ ÖRNEK: A) 3 - 1 - 5 - 2 - 4
        ★ YANLIŞ ÖRNEK: A) İlkbaharda toprak ısınır...

# ═══════════════════════════════════════════════════════════════
# SORU KOKLERI
# ═══════════════════════════════════════════════════════════════

soru_kokleri:
  - "<b>Aşağıdaki cümlelerden hangisi bir paragrafın giriş bölümü olmaya en uygundur?</b>"
  - "<b>Aşağıdakilerden hangisi bir metnin sonuç bölümü olmaya en uygundur?</b>"
  - "<b>Bu cümlelerden hangisi metnin gelişme bölümünde yer <u>alamaz</u>?</b>"
  - "<b>Aşağıdakilerin hangisinde metnin ait olduğu bölüm yay ayraç içinde <u>yanlış</u> verilmiştir?</b>"
  - "<b>Aşağıdakilerden hangisi bir metnin giriş bölümü <u>olamaz</u>?</b>"
  - "<b>Aşağıdakilerden hangisi bir metnin giriş bölümü olabilir?</b>"
  - "<b>Aşağıdakilerden hangisi bir metnin sonuç bölümüne aittir?</b>"
  - "<b>Aşağıdakilerden hangisi bir metnin sonuç bölümüne ait <u>olamaz</u>?</b>"
  - "<b>Aşağıdakilerden hangisi bir hikâyenin sonuç bölümüne aittir?</b>"
  - "<b>Aşağıdakilerden hangisi bir araştırmanın sonuç bölümüne aittir?</b>"
  - "<b>Numaralanmış bölümler giriş, gelişme ve sonuç olarak sıralanırsa doğru sıralama aşağıdakilerden hangisi olur?</b>"

# ═══════════════════════════════════════════════════════════════
# DOGRU CEVAP KURALLARI
# ═══════════════════════════════════════════════════════════════

dogru_cevap:
  tanim: "Orijinal paragrafı oluşturan 5 cümle arasında, öğrencinin doğru sıralamayı çıkarabilmesini sağlayacak açık bir anlam ilişkisi bulunmalıdır. Bu ilişki; zaman sırası, neden-sonuç, aşama ilerleyişi, hazırlık-uygulama-sonuç, sorun-çözüm, genel düşünce-detay veya gözlem-yorum gibi mantıksal bağlarla kurulabilir. Her cümle, paragrafın doğal akışında kendinden önce veya sonra gelen en az bir cümleyle anlam bakımından ilişkili olmalıdır. Bu bağ yalnızca dilsel ipuçlarıyla değil, olayların gerçekleşme sırası, bir hazırlığın sonuçtan önce gelmesi, bir nedenin sonuçtan önce verilmesi, bir sürecin aşamalar hâlinde ilerlemesi veya bir açıklamanın örnekten önce gelmesi gibi içerik ilişkileriyle de kurulabilir."
  kurallar:
    - "Dogru secenek paragraftaki/metindeki hicbir cumleyi kelimesi kelimesine TEKRARLAMAMALI"
    - "Paragraftaki ifadeler es anlamli sozcuklerle yeniden ifade edilmeli — en az %40 kelime farkliligi olmali"
    - "Her cümle paragrafın doğal akışı içinde belirli bir işlev taşımalıdır."
    - "Cümleler arasında doğru sıralamayı kurduracak anlam ilişkisi bulunmalıdır."
    - "Bu ilişki zaman dizisi, neden-sonuç, süreç, aşama, hazırlık-uygulama-sonuç veya sorun-çözüm yapısıyla kurulabilir."
    - "Cümleler tek tek anlaşılabilir olsa da yanlış sırada verildiğinde metnin akışı zayıflamalıdır."
    - "Doğru sıra bulunduğunda paragraf açıkça düzelmeli ve doğal bir bütün oluşturmalıdır."
    - "Hiçbir cümle paragrafın geri kalanından bağımsız veya rastgele durmamalıdır."
    - "Doğru sıra yalnızca yüzeysel anahtar kelimelerle değil, anlam akışıyla bulunabilmelidir."
  ornekler:
    - orijinal_paragraf: "Sabah erken saatlerde gökyüzü aniden kararmaya başladı. Kısa süre sonra kuvvetli rüzgâr ağaç dallarını salladı. Ardından yoğun yağmur sokakları hızla ıslattı. İnsanlar ıslanmamak için en yakın dükkânlara sığındı. Fırtına dinince herkes yeniden dışarı çıkmaya başladı."
      gizli_numaralandirma:
        "I. cümle": "III"
        "II. cümle": "V"
        "III. cümle": "I"
        "IV. cümle": "IV"
        "V. cümle": "II"
      ogrenciye_gosterilen_metin: "I. Ardından yoğun yağmur sokakları hızla ıslattı.<br>II. Fırtına dinince herkes yeniden dışarı çıkmaya başladı.<br>III. Sabah erken saatlerde gökyüzü aniden kararmaya başladı.<br>IV. İnsanlar ıslanmamak için en yakın dükkânlara sığındı.<br>V. Kısa süre sonra kuvvetli rüzgâr ağaç dallarını salladı."
      dogru_cevap: "III - V - I - IV - II"
      neden: "Olaylar doğal olarak gökyüzünün kararmasıyla başlar; ardından rüzgâr çıkar, sonra yağmur başlar, insanlar korunacak yer arar ve en sonda fırtına diner."

# ═══════════════════════════════════════════════════════════════
# CELDIRICI STRATEJILERI (CUSTOM — siralama icin ozel)
# ═══════════════════════════════════════════════════════════════

celdirici_stratejileri:
  - ad: "GUCLU_ILK_CUMLE_REKABETI"
    bilisssel_hata_kategorisi: "erken_karar_verme"
    aciklama: "Yanlış seçenekleri, ilk cümle için makul görünen adaylar üzerinden kur"
    nasil_olusturulur: |
      Paragrafta ilk cümle olma ihtimali taşıyan en az iki cümle varsa,
      yanlış seçeneklerde bu aday cümleleri ilk sıraya yerleştir.
      Böylece öğrenci ilk cümleyi bulduğunu düşünse bile şıkları kolayca eleyemez.
      Ama açık biçimde devam hissi veren veya bağlaçla başlayan cümleleri ilk sıraya koyma.
    kategori: "cognitive"

  - ad: "GUCLU_SON_CUMLE_REKABETI"
    bilisssel_hata_kategorisi: "erken_karar_verme"
    aciklama: "Yanlış seçenekleri, son cümle için makul görünen adaylar üzerinden kur"
    nasil_olusturulur: |
      Paragrafta kapanış cümlesi olma ihtimali taşıyan en az iki cümle varsa,
      yanlış seçeneklerde bu aday cümleleri son sıraya yerleştir.
      Böylece öğrenci yalnızca son cümleyi tahmin ederek doğru cevaba ulaşamaz.
      Ama açık kapanış bildiren cümleleri yanlış seçeneklerde sona koyma.
    kategori: "cognitive"

  - ad: "ORTA_BLOK_KARISTIRMA"
    bilisssel_hata_kategorisi: "eksik_analiz"
    aciklama: "Makul görünen başlangıç ve bitişi koruyup orta akışı boz"
    nasil_olusturulur: |
      İlk ve son cümle adaylarını güçlü tut, fakat ortadaki cümlelerin sırasını boz.
      Öğrenci başlangıç ve bitişe güvenip orta akışı dikkatle incelemezse yanılır.
      Bu strateji özellikle süreç, zaman ve neden-sonuç zinciri içeren paragraflarda etkilidir.
    kategori: "cognitive"

  - ad: "YAKIN_GECIS_YANILSAMASI"
    bilisssel_hata_kategorisi: "yuzeysel_okuma_hatasi"
    aciklama: "Birbirine dilsel olarak yakın görünen cümleleri yanlış sırada eşleştir"
    nasil_olusturulur: |
      Aynı özneye, ortak kavrama veya benzer zamansal çerçeveye sahip iki cümleyi art arda getir;
      fakat gerçek mantıksal sıra bu olmasın.
      Öğrenci yalnızca kelime benzerliğine bakarsa bu seçeneği doğru sanabilir.
    kategori: "cognitive"

use_shared_strategies: false

