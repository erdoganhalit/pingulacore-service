# ═══════════════════════════════════════════════════════════════
# URETIM MANTIGI
# ═══════════════════════════════════════════════════════════════

generation_logic:
  steps:
    - step: 1
      action: "Konu seç ve orijinal paragraf akışını planla"
      details: |
        Konuyla ilgili tek bir anlamlı paragraf planla.
        Bu paragraf 5 cümleden oluşmalıdır.
        Cümleler doğal sıralarında okunduğunda mantıksal ve akıcı bir bütün oluşturmalıdır.
        Akış şu tür ilişkilerden biri veya birkaçıyla kurulabilir:
        - Neden-sonuç zinciri
        - Zaman dizisi (kronolojik akış)
        - Süreç adımları
        - Hazırlık → uygulama → sonuç
        - Genel → özel
        - Giriş → gelişme → sonuç

    - step: 2
      action: "Orijinal paragrafı DOĞRU sırada yaz"
      details: |
        Önce öğrenciye gösterilmeyecek olan orijinal doğru paragrafı üret.
        Bu paragraf tam 5 cümleden oluşmalıdır.
        Her cümle 8-16 kelime arasında olmalıdır.
        Tüm cümleler tek bir konu çevresinde yazılmalıdır.
        Cümleler doğru sırada okunduğunda tek ve akıcı bir paragraf gibi görünmelidir.

    - step: 3
      action: "Orijinal paragrafın 5 cümlesini ayrı ayrı tespit et"
      details: |
        Orijinal paragraf içindeki 5 cümleyi arka planda ayır.
        Bu cümleler doğal paragraf sırasındaki I., II., III., IV. ve V. cümlelerdir.
        Bu aşamada cümleler henüz öğrenciye gösterilmez.

    - step: 4
      action: "Her cümleye rastgele ve tekrarsız Roma rakamı ata"
      details: |
        I, II, III, IV ve V Roma rakamlarını bu 5 cümleye rastgele ve tekrarsız biçimde ata.
        Bu Roma rakamları cümlelerin doğru sırasını değil, sadece etiketini gösterir.
        Her Roma rakamı yalnızca bir cümleye atanmalıdır.
        Her cümle yalnızca bir Roma rakamı almalıdır.
        Doğru cevap dizisi I - II - III - IV - V olmamalıdır.

    - step: 5
      action: "Öğrenciye gösterilecek numaralı metni oluştur"
      details: |
        Öğrenciye orijinal paragraf doğal sırasıyla gösterilmez.
        Bunun yerine cümleler, atanmış Roma rakamlarının sırasına göre alt alta gösterilir:
        I., II., III., IV., V.
        Her Roma rakamının yanında, o rakama atanmış cümle yer almalıdır.
        Gösterilen bu sıra, paragrafın gerçek sırası değil; etiket sırasıdır.

    - step: 6
      action: "Doğru cevap sıralamasını oluştur"
      details: |
        Doğru cevap, orijinal paragrafın doğal sırasındaki cümlelerin Roma rakamı etiket dizisidir.
        Yani orijinal I. cümlenin Roma rakamı etiketi, sonra orijinal II. cümlenin etiketi,
        sonra III., IV. ve V. cümlelerin etiketleri yazılır.
        Format Roma rakamları tire ile ayrılmış biçimde olmalıdır:
        'III - V - I - IV - II'

    - step: 7
      action: "3 çeldirici sıralama oluştur"
      details: |
        Yanlış seçenekler, doğru cevaba yakın ve mantıklı görünecek şekilde üretilmelidir.
        Her çeldiricide farklı strateji kullanılabilir:
        - Güçlü ilk cümle rekabeti
        - Güçlü son cümle rekabeti
        - Orta blok karıştırma
        - Mantık zinciri kaydırma
        - Yakın geçiş yanılsaması
        Çeldiriciler kolay eleme yapılabilecek kadar açık olmamalıdır.

    - step: 8
      action: "Seçenekleri rastgele sırala"
      details: |
        1 doğru cevap ve 3 çeldirici oluşturulduktan sonra
        seçenekleri A-B-C-D sırasına rastgele yerleştir.
        Her seçenek yalnızca sayı sıralamasından oluşmalıdır.
        Format: 'III - I - IV - II - V'

