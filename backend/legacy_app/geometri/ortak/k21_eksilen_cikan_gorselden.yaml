dogru_cevap:
  tanim: Baslangic ve sonuc arasindaki farki dogru okuyarak cikarilan miktari veren secenek
  kurallar:
  - Başlangıç ve sonuç durumları arasındaki fark doğru cevap olarak belirlenmelidir.
  - Öğrencilerden görseli doğru okuyarak işlem yapmaları beklenmelidir.
  - Dogru cevap tek ve net olmali

distractors:
  kurallar:
  - Öğrencilerin yanlış yorumlamaları hedeflenmelidir.
  - Kalan miktarı cevap olarak düşünebilecekleri seçenekler sunulmalıdır.
  - Sonuc miktarini dogrudan cevap sanan secenekler kullanilmali
  - Baslangic miktarini yanlis saymaya dayali secenekler yer almali
  - Yanlis secenekler ogrencinin dusebilecegi gercek hatalara dayanmali
  - Yanlis secenekler dogru cevaba yakin ama ayirt edilebilir olmali
  yasaklar:
  - Doğru cevaba yakın olmayan seçenekler
  - Yanıltıcı olmayan basit hatalar
  - Bariz sacma, baglamsiz ya da islem mantigiyla ilgisiz secenek uretilmemeli
  - Birden fazla yanlis secenek ayni hatayi tekrar etmemeli

gorsel:
  ana_gorsel:
    kurallar:
    - Gorsel ilkokul duzeyine uygun, sade ve anlasilir olmali
    - Baslangic ve sonuc durumu ayni nesne turuyle tutarli bicimde gosterilmeli
    - Azalan miktar ogrencinin karsilastirma yapabilecegi netlikte sunulmali
    - Sayilmasi ya da karsilastirilmasi gereken ana ogeler net secilebilmeli
    - Gorsel, soruda hedeflenen islem ya da iliskiyi bire bir karsilamali
    - Gorselde baslangic durumu, son durum acikca yer almali
    - Baslangic nesneleri duz bir izgara duzeninde, son durum nesneleri de ayni nesne boyutuyla ayri panelde verilmelidir
    - Panel basliklari kisa ve Turkce olmali: Baslangic, Sonuc
    - Iki panelde kullanilan ana nesne ayni tur olmali; ogrenci farki dogrudan sayarak gorebilmelidir
    yasaklar:
    - Gorselin icinde veya ustunde cevabi ele veren islem, sonuc ya da ipucu yazilmamali
    - Sayilmasi gereken ana ogeler dekoratif kalabalik icinde kaybolmamali
    - Fotogercekci, karmasik veya yetiskinlere hitap eden bir gorsel dil kullanilmamali
    - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
    - Iki panel yerine tek tabakta karisik nesneler kullanilmamali
    - Bir panelde baska, diger panelde baska nesne kullanma; senaryodaki nesnenin yerine alakasiz bloklar veya soyut sekiller koyma
    stil: ilkokul_dostu_sade_illustrasyon
    boyut: orta
  sik_gorseli:
    gerekli: false
    kurallar:
    - Secenekler yalnizca metin, sayi ya da islem ifadesi olarak verilmelidir

tymm_uyum_kurallari:
  ogrenme_ciktisi: Öğrencilerden, görselde verilen başlangıç ve sonuç durumuna göre çıkarılan miktarı belirlemeleri istenir.
  tema_siniri: Yalnizca 2. sinif duzeyinde cikarma, eksilen, cikan, baslangic, sonuc odagi korunmali.
  izinli_icerik:
    kavramlar:
    - cikarma
    - eksilen
    - cikan
    - baslangic
    - sonuc
    beceriler:
    - Çıkarma işlemi yapma
    - Görsel okuma
    - Problem çözme
    - Mantıksal düşünme
    - Görselden bilgi elde etme
  yasaklar:
  - 3 basamakli ve daha buyuk sayilarla ileri duzey islem zincirleri
  - Kalanli bolme, bolme algoritmasi veya ust sinif duzeyindeki islem teknikleri
  - 2. sinif duzeyini asan soyut cebir dili, sembolik ispat ya da formal tanimlar
  - Gorsel olmadan cozume ulastiran acik sonuc, islem veya sayi bilgisini metinde vermek
  - Gereksiz veri yuku olusturan cok adimli ve dikkat dagitici problem kurgulari

