# Kalan Paralari Sirala — 2. Sinif

meta:
  id: "kalan_paralari_sirala"
  ad: "Kalan Paralari Sirala"
  sinif_seviyesi: 2
  aciklama: >
    Uc kisinin elindeki madeni para gruplari ve almak istedikleri
    tek urunlerin fiyatlari gorsel uzerinden verilir. Ogrenci,
    herkesin elinde ne kadar para kalacagini zihinden bulur ve
    kalan para miktarlarini istenen yone gore siralar.
  kaynak: "kalan_paralari_sirala.yaml"
  frequency: "Medium"
  difficulty: "orta"
  varyant_sayisi: 3
  varyant_kodlari: ["1", "2", "3"]

varyantlar:
  - kod: "1"
    ad: "Ayni baslangic para, farkli urun fiyatlari"
    aciklama: >
      Uc kisinin baslangictaki para miktari aynidir. Ancak herkesin
      aldigi urunun fiyati farklidir. Ogrenci, ayni para ile baslayip
      farkli miktarda harcayan kisilerin kalan paralarini karsilastirir.
    fark_olusturan_mantik: >
      Baslangic para sabit oldugu icin ogrenci esas olarak urun
      fiyatlarindaki farki okuyarak kalan miktarlari siralar.
    soru_kokleri:
      - "<b>Buna gore, kisilerin elinde kalan para miktarlari kucukten buyuge nasil siralanir?</b>"
      - "<b>Buna gore, kisilerin elinde kalan paralar buyukten kucuge nasil siralanir?</b>"
      - "<b>Buna gore, alisveristen sonra en az parasi kalan kisiden en cok parasi kalan kisiye dogru siralama nasildir?</b>"
      - "<b>Buna gore, alisveristen sonra en cok parasi kalan kisiden en az parasi kalan kisiye dogru siralama nasildir?</b>"
    gorsel_farki:
      - "Uc kisinin baslangic para grubu ayni olmali"
      - "Uc kisinin urun fiyati birbirinden farkli olmali"
      - "Uc kisinin kalan miktari birbirinden farkli olmali"

  - kod: "2"
    ad: "Farkli baslangic para, ayni urun fiyati"
    aciklama: >
      Uc kisinin baslangictaki para miktari farklidir. Ancak herkes
      ayni fiyattaki urunu alir. Ogrenci, ayni urun fiyatina karsi
      farkli para gruplarini karsilastirarak kalan miktarlari siralar.
    fark_olusturan_mantik: >
      Urun fiyati sabit oldugu icin ogrenci esas olarak baslangictaki
      para miktarlarindaki farki okuyarak kalan paralari siralar.
    soru_kokleri:
      - "<b>Buna gore, kisilerin elinde kalan para miktarlari kucukten buyuge nasil siralanir?</b>"
      - "<b>Buna gore, kisilerin elinde kalan paralar buyukten kucuge nasil siralanir?</b>"
      - "<b>Buna gore, alisveristen sonra en az parasi kalan kisiden en cok parasi kalan kisiye dogru siralama nasildir?</b>"
      - "<b>Buna gore, alisveristen sonra en cok parasi kalan kisiden en az parasi kalan kisiye dogru siralama nasildir?</b>"
    gorsel_farki:
      - "Uc kisinin baslangic para grubu birbirinden farkli olmali"
      - "Uc kisinin urun fiyati ayni olmali"
      - "Uc kisinin kalan miktari birbirinden farkli olmali"

  - kod: "3"
    ad: "Farkli baslangic para, farkli urun fiyati"
    aciklama: >
      Uc kisinin baslangictaki para miktari da aldigi urunun fiyati da
      farklidir. Ogrenci, her kisi icin ayri ayri dusunerek kalan para
      miktarlarini bulur ve istenen yone gore siralar.
    fark_olusturan_mantik: >
      Bu varyantta hem para miktari hem urun fiyati degistigi icin
      ogrenci tek bir gorsel ozellige degil, her kisi icin iki veriyi
      birlikte okuyarak karar verir.
    soru_kokleri:
      - "<b>Buna gore, kisilerin elinde kalan para miktarlari kucukten buyuge nasil siralanir?</b>"
      - "<b>Buna gore, kisilerin elinde kalan para miktarlari buyukten kucuge nasil siralanir?</b>"
      - "<b>Buna gore, alisveristen sonra kalan para miktarlarinin siralanisi nasildir?</b>"
      - "<b>Buna gore, kalan paralar en azdan en coga nasil siralanir?</b>"
    gorsel_farki:
      - "Uc kisinin baslangic para grubu birbirinden farkli olmali"
      - "Uc kisinin urun fiyati birbirinden farkli olmali"
      - "Uc kisinin kalan miktari birbirinden farkli olmali"

