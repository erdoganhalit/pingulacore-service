  tanim: "Her kisi icin kalan para miktarini dogru dusunup isimleri istenen yone gore dogru siralayan secenek"
  kurallar:
    - "KRITIK: Dogru cevap, baslangic para gruplari ile urun fiyatlarini karsilastirip kalan miktarlari bulmaya dayanmalidir"
    - "Dogru cevap yalnizca kisi isimlerinin siralanisindan olusmalidir"
    - "Dogru cevap hem gorseldeki para gruplari hem de urun fiyat etiketleri ile tutarli olmali"
    - "Uc kisi icin kalan miktarlar birbirinden farkli olmali"
    - "Kucukten buyuge soruluyorsa artan siralama, buyukten kucuge soruluyorsa azalan siralama verilmelidir"
    - "Dogru cevap tek ve net olmali"
    - "Ogrenci yalniz metni okuyarak degil, gorseldeki para ve fiyat iliskisini inceleyerek sonuca ulasmali"

