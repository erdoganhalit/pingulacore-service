  ad: Tek Adımlı Çıkarma Problemini Görselle Çöz
  sinif_seviyesi: 2
  aciklama: Öğrencilerin tek adımlı çıkarma problemlerini görsel veri kullanarak çözme becerisini ölçer.
  kaynak: k16_Tek Adımlı Çıkarma Problemini Görselle Çöz.yaml
  frequency: Low
  difficulty: kolay

context:
  type: tek_adimli_cikarma_problemini_gorselle_coz
  question_count: 1
  generation:
    word_count_min: 30
    word_count_max: 65
    image_type: tek_gorsel
    structure:
    - 4-6 cumlelik, gunluk yasamdan gelen dogal bir senaryo yaz
    - Senaryoda baslangic miktari ile bir kez cikarilan miktar arasinda acik bir iliski kurulmali
    - Metin, gorselden okunmasi gereken kritik sayi ya da iliskiyi dogrudan soylememeli
    - Gorsel, cozumun ana veri kaynagi olmali
    - Gorselde nesneler ust uste binmeden, tek tek sayilabilecek duz bir izgara veya satir duzeninde yer almali
    - Soru koku, "Geriye kaç nesne kaldı?" benzeri tek cumlelik bir yapi tasimali
    kurallar:
    - 2. sinif seviyesinde olmali
    - Turkce karakterler ve noktalama dogru kullanilmali
    - Gorsel ve ust metin birbiriyle tam uyumlu olmali
    - Dogru cevap tek ve net olmali
    - Gorsel olmadan dogrudan sonuca ulastiracak acik islem ya da sonuc verilmemeli
    - Secenekler 3 sikli olmali ve yalnizca bir dogru cevap icermeli
  questions:
  - slot: 1
    type: tek_adimli_cikarma_problemini_gorselle_coz
    soru_kokleri:
    - Geriye kaç nesne kaldı?
    - Eksilme sonrası kaç tane kaldı?
    beceri:
      katman: MAT.2.2.1
      bilesenler:
      - cikarma_islemini_anlama
      - gorsel_veri_okuma
      - gunluk_yasam_problemlerini_cozme
      - cikarma_islemini_uygulama
      - gorsel_okuma
      - problemi_cozme
      surec_bileseni: problem_cozme

format:
  type: llm_generated_html
  soru_koku: Kisa, tek cumlelik soru koku. "Geriye kaç nesne kaldı?" benzeri bir istem tasimali.
  paragraph:
    required: true
    word_count_min: 30
    word_count_max: 65
    sentence_count_min: 4
    sentence_count_max: 6
  options:
    count: 3
    labels:
    - A
    - B
    - C
    style: text_only
    word_count_min: 1
    word_count_max: 6
    correct_count: 1

dogru_cevap:
  tanim: Baslangic miktari ile cikarilan miktari dogru iliskilendirip kalan sayiyi veren secenek
  kurallar:
  - Başlangıç miktarından çıkarılanı çıkartma
  - Görsel doğrulama ile kontrol
  - Dogru cevap tek ve net olmali

distractors:
  kurallar:
  - Başlangıç veya çıkarılan sayıyı seçenek olarak verme
  - Yanlış çıkarma işlemi sonucu oluşturma
  - Cikarilan miktari kalan miktarla karistiran secenekler kullanilmali
  - Baslangic miktarini yanlis sayma hatasina dayali secenekler yer almali
  - Yanlis secenekler ogrencinin dusebilecegi gercek hatalara dayanmali
  - Yanlis secenekler dogru cevaba yakin ama ayirt edilebilir olmali
  yasaklar:
  - Toplama sonucu
  - Alakasız sayılar
  - Bariz sacma, baglamsiz ya da islem mantigiyla ilgisiz secenek uretilmemeli
  - Birden fazla yanlis secenek ayni hatayi tekrar etmemeli

gorsel:
  ana_gorsel:
    kurallar:
    - Gorsel ilkokul duzeyine uygun, sade ve anlasilir olmali
    - Baslangictaki nesneler ve cikarilan bolum acikca ayirt edilmeli
    - Kalan miktar dogrudan isaretlenmeden fakat sayilabilecek netlikte sunulmali
    - Sayilmasi ya da karsilastirilmasi gereken ana ogeler net secilebilmeli
    - Gorsel, soruda hedeflenen islem ya da iliskiyi bire bir karsilamali
    - Gorselde baslangictaki nesne sayisi, cikarilan nesne sayisi acikca yer almali
    - Nesneler perspektifli kutu icinde degil, duz zeminde 2x7, 3x4 gibi acik bir izgara duzeninde verilmeli
    - Cikarilan nesneler ayni gorselde ayri bir bolgede veya hafif soluk/yan tarafa alinmis sekilde gosterilmeli
    yasaklar:
    - Gorselin icinde veya ustunde cevabi ele veren islem, sonuc ya da ipucu yazilmamali
    - Sayilmasi gereken ana ogeler dekoratif kalabalik icinde kaybolmamali
    - Fotogercekci, karmasik veya yetiskinlere hitap eden bir gorsel dil kullanilmamali
    - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
    - Ust uste gelmis, egik duran veya kutu icinde saklanan nesneler kullanilmamali
    stil: ilkokul_dostu_sade_illustrasyon
    boyut: orta
  sik_gorseli:
    gerekli: false
    kurallar:
    - Secenekler yalnizca metin, sayi ya da islem ifadesi olarak verilmelidir

tymm_uyum_kurallari:
  ogrenme_ciktisi: Öğrencilerin tek adımlı çıkarma problemlerini görsel veri kullanarak çözme becerisini ölçer.
  tema_siniri: Yalnizca 2. sinif duzeyinde cikarma, baslangic miktari, kalan, tek adim odagi korunmali.
  izinli_icerik:
    kavramlar:
    - cikarma
    - baslangic miktari
    - kalan
    - tek adim
    beceriler:
    - Çıkarma işlemini anlama
    - Görsel veri okuma
    - Günlük yaşam problemlerini çözme
    - Çıkarma işlemini uygulama
    - Görsel okuma
  yasaklar:
  - 3 basamakli ve daha buyuk sayilarla ileri duzey islem zincirleri
  - Kalanli bolme, bolme algoritmasi veya ust sinif duzeyindeki islem teknikleri
  - 2. sinif duzeyini asan soyut cebir dili, sembolik ispat ya da formal tanimlar
  - Gorsel olmadan cozume ulastiran acik sonuc, islem veya sayi bilgisini metinde vermek
  - Gereksiz veri yuku olusturan cok adimli ve dikkat dagitici problem kurgulari

