    - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
    stil: ilkokul_dostu_sade_illustrasyon
    boyut: orta
  sik_gorseli:
    gerekli: false
    kurallar:
    - Secenekler yalnizca metin, sayi ya da islem ifadesi olarak verilmelidir

tymm_uyum_kurallari:
  ogrenme_ciktisi: Öğrencilerden, görseldeki düzen üzerinden eksilen nesne miktarını ve adım sayısını hesaplamaları beklenir.
    Bu kalıp, ardışık çıkarma ve sıfıra ulaşma mantığını anlama becerisini geliştirir.
  tema_siniri: Yalnizca 2. sinif duzeyinde ardisik cikarma, eksilen, adim sayisi, azalma duzeni odagi korunmali.
  izinli_icerik:
    kavramlar:
    - ardisik cikarma
    - eksilen
    - adim sayisi
    - azalma duzeni
    beceriler:
    - Ardışık çıkarma
    - Adım hesaplama
  yasaklar:
  - 3 basamakli ve daha buyuk sayilarla ileri duzey islem zincirleri
  - Kalanli bolme, bolme algoritmasi veya ust sinif duzeyindeki islem teknikleri
  - 2. sinif duzeyini asan soyut cebir dili, sembolik ispat ya da formal tanimlar
  - Gorsel olmadan cozume ulastiran acik sonuc, islem veya sayi bilgisini metinde vermek
  - Gereksiz veri yuku olusturan cok adimli ve dikkat dagitici problem kurgulari

