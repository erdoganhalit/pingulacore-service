    correct_count: 1

dogru_cevap:
  tanim: Eksilme duzenini dogru okuyup eksilen miktar ya da adim sayisini dogru veren secenek
  kurallar:
  - Eksilmenin doğru hesaplanması
  - Görseldeki adım sayısının doğru belirlenmesi
  - Dogru cevap tek ve net olmali

distractors:
  kurallar:
  - Yanlış adım sayısı veya eksilme miktarı
  - Doğru toplamı yanlış işlemle bulma
  - Bir adimi eksik ya da fazla sayan secenekler kullanilmali
  - Her adimda eksilen nesne miktarini yanlis okutan secenekler yer almali
  - Yanlis secenekler ogrencinin dusebilecegi gercek hatalara dayanmali
  - Yanlis secenekler dogru cevaba yakin ama ayirt edilebilir olmali
  yasaklar:
  - Doğru cevabın tekrarı
  - Çok bariz şekilde yanlış olan
  - Bariz sacma, baglamsiz ya da islem mantigiyla ilgisiz secenek uretilmemeli
  - Birden fazla yanlis secenek ayni hatayi tekrar etmemeli

