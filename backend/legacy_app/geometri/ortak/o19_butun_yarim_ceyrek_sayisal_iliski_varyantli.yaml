    - "Ceyrekten yarima geciste baslangic sayisi cift secilmeli"
    - "Ceyrekten butune geciste baslangic sayisi 4'un kati secilmeli"
    - "Dogru cevap tek ve net olmali"
    - "Ogrenci yalniz cumleyi okuyarak degil, modeli ve iliskiyi birlikte inceleyerek sonuca ulasmali"

