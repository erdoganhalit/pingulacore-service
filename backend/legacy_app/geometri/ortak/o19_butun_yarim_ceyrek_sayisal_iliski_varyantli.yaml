context:
  type: "butun_yarim_ceyrek_sayisal_iliski"
  question_count: 1
  varyantlar:
    - kod: "1"
      ad: "Dogrudan donusum cumleleri"
      aciklama: >
        Iliski cumleleri butun, yarim ve ceyrek arasindaki donusumu
        dogrudan ve duz bir akista verir. Cumle yapilari daha temiz ve
        daha kolay okunur.
      yapi_ozellikleri:
        - "Cumleler dogrudan donusum iliskisi kurar"
        - "Bosluklar genellikle cumlenin sonunda yer alir"
        - "Donusum yonu daha duz ve takip edilmesi kolaydir"
      ornek_mantik:
        - "2 butun elma __ yarim elma eder."
        - "3 yarim elma __ ceyrek elma eder."
        - "8 ceyrek elma __ butun elma eder."
    - kod: "2"
      ad: "Karisik yonlu donusum cumleleri"
      aciklama: >
        Iliski cumleleri butun, yarim ve ceyrek arasinda farkli yonlerde
        kurulur. Bosluklar cumlenin basinda, ortasinda ya da sonunda
        bulunabilir.
      yapi_ozellikleri:
        - "Cumleler farkli donusum yonlerinde kurulur"
        - "Bosluklar farkli konumlarda yer alabilir"
        - "Ogrenci yonu ve iliskiyi daha dikkatli takip eder"
      ornek_mantik:
        - "__ butun kek, 6 yarim kek eder."
        - "10 ceyrek kek, __ yarim kek eder."
        - "4 yarim kek, __ butun kek eder."
