    - "Dogru cevap hem gorseldeki butun-yarim-ceyrek modeli hem de cumlelerdeki iliski ile tutarli olmali"
    - "1. varyantta donusum akisi daha duz oldugu icin iliskiler temiz ve dogrudan okunabilmeli"
    - "2. varyantta cumle konumu degisse de dogru cevap iliski yonune gore belirlenmeli"
    - "Butunden yarima geciste sayi 2 ile iliskili, butunden ceyrege geciste 4 ile iliskili olmali"
