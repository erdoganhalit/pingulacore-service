varyant:
  - kod: "1"
    ad: "Ogrenci Secme"
    aciklama: >
      Uc ogrencinin onundeki nesneler en az jetonlu tamamlama yoluna gore
      degerlendirilir. Elindeki tum jetonlari tam kullanan tek ogrenci bulunur.
    soru_koku_ornekleri:
      - "Buna Gore, En Az Jeton Kullanmak Kaydiyla Elindeki Butun Jetonlari Kullanan Ogrenci Hangisidir?"
    secenek_yapisi: "ogrenci_adi"
    dogru_cevap_mantigi: "Yalnizca bir ogrencinin jeton sayisi, en az maliyetli tamamlama toplami ile esit olmalidir."

  - kod: "2"
    ad: "Toplam Jeton Sayisini Bulma"
    aciklama: >
      Verilen nesne grubu ya da ogrenci kolonu icin, butun nesneleri en az
      jetonla tamamlamak icin gereken toplam maliyet hesaplanir.
    soru_koku_ornekleri:
      - "Bu Nesneleri En Az Jetonla Tamamlamak Icin Toplam Kac Jeton Gerekir?"
      - "En Az Jeton Kullanilirse Bu Grubu Tamamlamak Icin Kac Jeton Harcanir?"
    secenek_yapisi: "sayisal"
    dogru_cevap_mantigi: "Tum nesnelerin en az maliyetli tamamlama bedelleri toplanarak tek dogru sonuc elde edilir."

zorluk_seviyesi:
  duzey: "orta"
  aciklama: >
    Ogrenci hem parca durumlarini dogru okumali hem de ceyrek durumunda en az
    jetonlu tamamlama yolunu secerek toplam maliyeti ya da dogru ogrenciyi bulmalidir.
