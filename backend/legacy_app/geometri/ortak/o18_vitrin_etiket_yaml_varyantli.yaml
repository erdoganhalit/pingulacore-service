dogru_cevap:
  tanim: "Varyanta gore ya en az maliyetli tamamlama ile tum jetonlarini kullanan ogrenci ya da gereken en az toplam jeton miktari"
  kurallar:
    - "Dogru cevap tek ve net olmali"
    - "Her ogrencinin toplam jeton ihtiyaci, onundeki 3 nesnenin en az maliyetli tamamlama toplamina gore belirlenmeli"
    - "Yarim durumundaki bir nesneyi butune tamamlamak icin 3 jeton kullanilir"
    - "Uc ceyrek durumundaki bir nesneyi butune tamamlamak icin 2 jeton kullanilir"
    - "Ceyrek durumundaki bir nesneyi butune tamamlamak icin en az maliyetli yol secilmelidir"
    - "Ceyrek durumunda en uygun yol 1 yarim + 1 ceyrek eklemek oldugu icin toplam maliyet 5 jetondur"
    - "3 ceyrek ekleyerek 6 jeton harcamak dogru tamamlama olsa da en az jetonlu yol olarak kabul edilmemelidir"
    - "1. varyantta yalnizca bir ogrencinin jeton sayisi, en az maliyetli toplam tamamlama bedeli ile tam esit olmalidir"
    - "2. varyantta dogru cevap, verilen nesne grubunu en az maliyetle tamamlamak icin gereken toplam jeton sayisi olmalidir"


