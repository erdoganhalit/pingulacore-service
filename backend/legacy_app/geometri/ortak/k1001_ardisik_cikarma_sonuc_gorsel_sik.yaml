  - islem_eslestirme
  - ardisik_cikarma_ve_anlama
  - bolme_mantigini_kavrama
  soru_islemleri:
  - ardisik_cikarmayi_bolmeye_donusturme
  - gorselden_adim_sayma
  - dogru_islemi_bulma
