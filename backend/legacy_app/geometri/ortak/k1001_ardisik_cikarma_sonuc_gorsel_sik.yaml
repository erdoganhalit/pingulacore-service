    type: k1001_ardisik_cikarmaya_uygun_sonucu_bul_cocuk_balonu_gorsel_sikli
    soru_kokleri:
    - Aşağıdaki çocuklardan hangisinin konuşma balonundaki işlem ifadesi ana görsele uygundur?
    - Ali, Mehmet ve Ayşe'den hangisi görseldeki ardışık çıkarma sürecine uygun bölme işlemini söylemiştir?
