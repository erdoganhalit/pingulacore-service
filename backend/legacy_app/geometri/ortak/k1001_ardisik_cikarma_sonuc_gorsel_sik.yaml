  ad: Ardışık Çıkarmaya Uygun Sonucu Bul (Çocuk Cevap Balonlu Görselli Şık)
  sinif_seviyesi: 2
  aciklama: Öğrencilerden, ana görseldeki ardışık çıkarma sürecine uygun bölme ifadesini bulan çocuğu seçmeleri beklenir.
    Bu varyantta şıklar metin değil, çocuk çizimi + konuşma balonu içindeki işlem ifadesi olarak sunulur.
  kaynak: k10_Ardışık Çıkarmaya Uygun Sonucu Bul.yaml
