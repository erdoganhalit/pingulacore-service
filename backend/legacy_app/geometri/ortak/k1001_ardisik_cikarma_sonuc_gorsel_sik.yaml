dogru_cevap:
  tanim: Ana görseldeki ardışık çıkarma düzenine karşılık gelen doğru bölme ifadesini konuşma balonunda söyleyen çocuk
  kurallar:
  - Çıkarma işlemlerinin doğru eşleştirilmesi
  - Görseldeki işlemlerin doğru sayılması
  - Çocuğun konuşma balonundaki işlem ifadesi ana görselle tutarlı olmalı
  - Dogru cevap tek ve net olmali

distractors:
  kurallar:
  - Yanlış işlem eşleştirme
  - Adım sayısını veya çıkarma miktarını yanlış hesaplama
  - Bolen ile boluneni yer degistiren model kullanan secenekler olmalı
  - Adim sayisi ile grup buyuklugunu karistiran model secenekleri olmalı
  - Yanlis secenekler ogrencinin dusebilecegi gercek hatalara dayanmali
  - Yanlis secenekler dogru cevaba yakin ama ayirt edilebilir olmali
  - Yanlış şıklar da gerçekçi çocuk ifadesi gibi görünmeli; ancak matematiksel olarak hatalı olmalı
  yasaklar:
  - Doğru cevabın tekrarı
  - Çok bariz şekilde yanlış olan
  - Bariz sacma, baglamsiz ya da islem mantigiyla ilgisiz secenek uretilmemeli
  - Birden fazla yanlis secenek ayni hatayi tekrar etmemeli

gorsel:
  ana_gorsel:
    kurallar:
    - Gorsel ilkokul duzeyine uygun, sade ve anlasilir olmali
    - Ardisik azalma adimlari sirasiyla ve karismayacak bicimde gosterilmeli
    - Her adimda eksilen miktarin esit oldugu gorselden okunabilmeli
    - Sayilmasi ya da karsilastirilmasi gereken ana ogeler net secilebilmeli
    - Gorsel, soruda hedeflenen islem ya da iliskiyi bire bir karsilamali
    - Gorselde adimlar, esit miktarda cikarilan degerler acikca yer almali
    yasaklar:
    - Gorselin icinde veya ustunde cevabi ele veren islem, sonuc ya da ipucu yazilmamali
    - Sayilmasi gereken ana ogeler dekoratif kalabalik icinde kaybolmamali
    - Fotogercekci, karmasik veya yetiskinlere hitap eden bir gorsel dil kullanilmamali
    - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
    stil: ilkokul_dostu_sade_illustrasyon
    boyut: orta
  sik_gorseli:
    gerekli: true
    kurallar:
    - Her şık type=image olarak planlanmalı; her şık için visual_elements dolu olmalı
    - Her şık tek bir çocuğu göstermeli (A=Ali, B=Mehmet, C=Ayşe)
    - Her çocuk çiziminde bir konuşma balonu olmalı ve balon içinde işlem ifadesi yer almalı
    - Konuşma balonundaki ifade "Ali: 12 / 4 = 3" biçimindeki çocuk+işlem sunum mantığını takip etmeli
    - Sayılar senaryoya göre değişebilir; ancak yalnızca bir çocuğun ifadesi doğru olmalı
    - Şık görsellerinde doğru cevabı metinle ele veren ekstra ipucu kullanılmamalı
    - Şık görselleri sade, net ve ilkokul seviyesinde anlaşılır olmalı
    - Şıklar arasında stil tutarlılığı korunmalı

tymm_uyum_kurallari:
  ogrenme_ciktisi: Öğrencilerden, ardışık çıkarma işlemleri ile verilen görseldeki işlemin hangi bölme işlemi ile ifade edilebileceğini
    belirlemeleri beklenir. Bu kalıp, ardışık çıkarma ile bölme arasındaki ilişkiyi kavramalarını sağlar.
  tema_siniri: Yalnizca 2. sinif duzeyinde cikarma ve bolme iliskisi kurma, ardisik cikarma, bolme, esit eksiltme, adim sayisi
    odagi korunmali.
  izinli_icerik:
    kavramlar:
    - cikarma ve bolme iliskisi kurma
    - ardisik_cikarma
    - bolme
    - esit eksiltme
    - adim sayisi
    beceriler:
    - Ardışık çıkarma
    - Bölme mantığını anlama
    - İşlem eşleştirme
    - Ardışık çıkarma ve anlama
    - Bölme mantığını kavrama
  yasaklar:
  - 3 basamakli ve daha buyuk sayilarla ileri duzey islem zincirleri
  - Kalanli bolme, bolme algoritmasi veya ust sinif duzeyindeki islem teknikleri
  - 2. sinif duzeyini asan soyut cebir dili, sembolik ispat ya da formal tanimlar
  - Gorsel olmadan cozume ulastiran acik sonuc, islem veya sayi bilgisini metinde vermek
  - Gereksiz veri yuku olusturan cok adimli ve dikkat dagitici problem kurgulari

izinli_icerikler:
  kavramlar:
  - cikarma ve bolme iliskisi kurma
  - ardisik_cikarma
  - bolme
  - esit eksiltme
  - adim sayisi
  beceriler:
  - ardisik_cikarma
