context:
  type: k1001_ardisik_cikarmaya_uygun_sonucu_bul_cocuk_balonu_gorsel_sikli
  question_count: 1
  generation:
    word_count_min: 30
    word_count_max: 65
    image_type: komponent_gorselleri
    structure:
    - 4-6 cumlelik, gunluk yasamdan gelen dogal bir senaryo yaz
    - Senaryoda ya da gorselde ayni miktarin adim adim eksildigi bir surec kurulmali ve bu surec bolme iliskisine baglanmali
    - Metin, gorselden okunmasi gereken kritik sayi ya da iliskiyi dogrudan soylememeli
    - Gorsel, cozumun ana veri kaynagi olmali
    - Soru koku, "Aşağıdaki çocuklardan hangisinin işlemi doğru?" benzeri tek cumlelik bir yapi tasimali
    - Şıklar metin tabanlı degil, çocuk çizimi + konuşma balonu içeren görsel tabanlı olmalı
    kurallar:
    - 2. sinif seviyesinde olmali
    - Turkce karakterler ve noktalama dogru kullanilmali
    - Gorsel ve ust metin birbiriyle tam uyumlu olmali
    - Dogru cevap tek ve net olmali
    - Gorsel olmadan dogrudan sonuca ulastiracak acik islem ya da sonuc verilmemeli
    - Secenekler 3 sikli olmali ve yalnizca bir dogru cevap icermeli
    - Şıklar OptionItem listesi olarak üretilmeli (label, type, text_value, visual_elements)
    - Tum şıklar type=image olmalı; text_value null olmalı; görsel içerik visual_elements ile tariflenmeli
    - Her şık bir çocuğu temsil etmeli ve konuşma balonunda kendi işlem ifadesi bulunmalı
    - Çocuk isimleri Ali, Mehmet ve Ayşe olarak kullanılmalı
  questions:
