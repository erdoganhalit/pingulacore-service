dogru_cevap:
  tanim: Islemleri dogru cozup sonuc-harf eslestirmesinden dogru sifreyi olusturan secenek
  kurallar:
  - Tüm işlemler doğru çözülmeli
  - Sonuçlar doğru harflerle eşleştirilmeli
  - İşlemlerin doğruluğu, görseldeki nesne sayılarıyla ayrıca doğrulanmalı
  - Dogru cevap tek ve net olmali

distractors:
  kurallar:
  - Yanlış işlem sonuçları kullanılmalı
  - Yanlış harf eşlemesi yapılmalı
  - Harf sirasini karistiran secenekler kullanilmali
  - Islem sonuclarindan birini yanlis cozume dayandiran secenekler yer almali
  - Yanlis secenekler ogrencinin dusebilecegi gercek hatalara dayanmali
  - Yanlis secenekler dogru cevaba yakin ama ayirt edilebilir olmali
  yasaklar:
  - Doğru sonuca çok yakın olanlar
  - Karmaşık ve anlaşılmaz seçenekler
  - Bariz sacma, baglamsiz ya da islem mantigiyla ilgisiz secenek uretilmemeli
  - Birden fazla yanlis secenek ayni hatayi tekrar etmemeli

