context:
  type: sifreli_islem_setini_coz
  question_count: 1
  generation:
    word_count_min: 35
    word_count_max: 80
    image_type: tek_gorsel
    structure:
    - 4-6 cumlelik, gunluk yasamdan gelen dogal bir senaryo yaz
    - Senaryoda birden fazla kisa islemin sonucu harf ya da sembollerle iliskilendirilmeli ve ogrenciden dogru sifreyi kurmasi
      istenmeli
    - Metin, gorselden okunmasi gereken kritik sayi ya da iliskiyi dogrudan soylememeli
    - Gorsel, cozumun ana veri kaynagi olmali
    - Her islem grubu, nesnelerin ust uste binmedigi duz kartlar veya acik kutucuklar icinde verilmelidir
    - Soru koku, "Hangi harflerle doğru şifre oluşturulabilir?" benzeri tek cumlelik bir yapi tasimali
    ana_gorsel:
      kurallar:
      - Gorsel ilkokul duzeyine uygun, sade ve anlasilir olmali
      - Her islem ile karsilik gelen harf ya da sembol duzeni net bicimde ayrilmali
      - Sifreyi olusturan sira bilgisi gorselde takip edilebilir olmali
      - Sayilmasi ya da karsilastirilmasi gereken ana ogeler net secilebilmeli
      - Gorsel, soruda hedeflenen islem ya da iliskiyi bire bir karsilamali
      - Gorselde harfler, islem sonuclari, her isleme karsilik gelen ayri nesne grubu acikca yer almali
      - Gorsel en fazla 3 ayri nesne grubu icermeli, her grupta en fazla 5 nesne olmali
      - Sifre tablosu basit ve okunabilir olmali, en fazla 5 satir icermeli
      - Nesneler basit geometrik sekiller veya ikonlar olarak cizilmeli (fotorealistik degil)
      - 1. grup torba icinde bilye gibi gizlenen nesnelerle degil, 3 ayri kartta 4'er mavi nokta olarak gosterilmelidir
      - 2. grup 10 kurabiye, 2 satir x 5 duzende ve altinda 2 bos tabakla verilmelidir
      - 3. grup 4 kutu ve her kutuda 2 kalem, kutular arasinda acik bosluk birakilarak verilmelidir
      - Tablodaki ilk satir 12-T olarak net yazilmali; 12 sayisi yaninda tire, cizik veya fazladan karakter olmamalidir
      yasaklar:
      - Gorselin icinde veya ustunde cevabi ele veren islem, sonuc ya da ipucu yazilmamali
      - Sayilmasi gereken ana ogeler dekoratif kalabalik icinde kaybolmamali
      - Fotogercekci, karmasik veya yetiskinlere hitap eden bir gorsel dil kullanilmamali
      - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
      - Bilyelerin torba icinde bir kisminin gizlendigi veya saymayi zorlastirdigi kompozisyonlar kullanilmamali
      stil: ilkokul_dostu_sade_illustrasyon
      boyut: orta
    sik_gorseli:
      gerekli: false
      kurallar:
      - Secenekler yalnizca metin, sayi ya da islem ifadesi olarak verilmelidir
    kurallar:
    - 2. sinif seviyesinde olmali
    - Turkce karakterler ve noktalama dogru kullanilmali
    - Gorsel ve ust metin birbiriyle tam uyumlu olmali
    - Dogru cevap tek ve net olmali
    - Gorsel olmadan dogrudan sonuca ulastiracak acik islem ya da sonuc verilmemeli
    - Secenekler 4 sikli olmali ve yalnizca bir dogru cevap icermeli
  questions:
