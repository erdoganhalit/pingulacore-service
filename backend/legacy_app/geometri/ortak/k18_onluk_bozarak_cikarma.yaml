dogru_cevap:
  tanim: Onluk bozma gerektiren cikarma iliskisini dogru kurup kalan miktari veren secenek
  kurallar:
  - Görseldeki onluk bozma işlemine göre hesaplama yapılmalı
  - Çıkarma işlemi sonucunda doğru miktar bulunmalı
  - Dogru cevap tek ve net olmali

distractors:
  kurallar:
  - Bozma işlemi yapılmadan çıkarılan yanlış sonuçları içermeli
  - Görseldeki yanlış yorumlamalardan kaynaklanan hatalar olmalı
  - Onluk bozmadan islem yapan secenekler kullanilmali
  - Birlik sayisini yanlis azaltan secenekler yer almali
  - Yanlis secenekler ogrencinin dusebilecegi gercek hatalara dayanmali
  - Yanlis secenekler dogru cevaba yakin ama ayirt edilebilir olmali
  yasaklar:
  - Görselde olmayan bilgiler
  - İşlemle alakasız sonuçlar
  - Bariz sacma, baglamsiz ya da islem mantigiyla ilgisiz secenek uretilmemeli
  - Birden fazla yanlis secenek ayni hatayi tekrar etmemeli

gorsel:
  ana_gorsel:
    kurallar:
    - Gorsel ilkokul duzeyine uygun, sade ve anlasilir olmali
    - Bozulacak onluk ile birlikler ayni sahnede net bicimde gorunmeli
    - Cikarilacak miktar ve kalan yapi karismayacak bicimde yerlestirilmeli
    - Sayilmasi ya da karsilastirilmasi gereken ana ogeler net secilebilmeli
    - Gorsel, soruda hedeflenen islem ya da iliskiyi bire bir karsilamali
    - Gorselde iki basamakli onluk gosterimi, cikartilan miktar gosterimi acikca yer almali
    - 4 onluk ve 2 birlik gibi yapilar uzum nesnesiyle gosterilmeli; 10'luk grup gerekiyorsa 10 uzumlu acik salkim, tepsi veya kart duzeni kullanilmali
    - Her 10'luk grup tek satirda ya da acik dizilimli bir panelde tam 10 uzum olarak ayri ayri secilebilmelidir
    yasaklar:
    - Gorselin icinde veya ustunde cevabi ele veren islem, sonuc ya da ipucu yazilmamali
    - Sayilmasi gereken ana ogeler dekoratif kalabalik icinde kaybolmamali
    - Fotogercekci, karmasik veya yetiskinlere hitap eden bir gorsel dil kullanilmamali
    - Gorsel ile metin arasinda sayi, nesne veya iliski celiskisi bulunmamali
    - Kurabiyelerin tabaklarda ust uste geldigi, saymanin zorlastigi kompozisyonlar kullanilmamali
    - Uzum senaryosunu boncuk, blok, kupe ya da senaryoyla ilgisiz baska nesnelerle temsil etme
    stil: ilkokul_dostu_sade_illustrasyon
    boyut: orta
  sik_gorseli:
    gerekli: false
    kurallar:
    - Secenekler yalnizca metin, sayi ya da islem ifadesi olarak verilmelidir

