varyantlar:
  varyant_1:
    ad: "Bitiş Noktasında Kalan Enerji"
    aciklama: >
      Robot sabit bir güzergâhta ilerler. Yol üzerindeki istasyon ve kapılarda artı-eksi
      enerji değerleri açıkça verilir. Öğrenci başlangıç enerjisinden başlayarak tüm
      değişimleri sırayla uygular ve robotun bitiş noktasında kaç enerjiyle kaldığını bulur.
  varyant_2:
    ad: "Ara Noktadaki Enerji Durumu"
    aciklama: >
      Robot yine sabit bir güzergâhta ilerler; ancak bu kez bitiş değil, belirli bir istasyona
      ya da kapıya geldiğindeki enerji miktarı sorulur. Öğrenci yalnızca doğru noktaya kadar
      olan değişimleri dikkatle izleyerek ara durumdaki enerjiyi bulur.

