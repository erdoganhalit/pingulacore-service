    - toplam_harcamayi_baslangic_parasindan_cikarma
    - kalan_paraya_gore_yorum_yapma

Varyant:
  - baslik: Varyant 1
    aciklama: >
      Cuzdanda gorulen toplam para ile gorselde isaretlenmis iki urunun fiyatlari
      kullanilir. Ogrenci once iki fiyati toplar, sonra kalan parayi bulur.
  - baslik: Varyant 2
    aciklama: >
      Gorseldeki secili alisveris tamamlandiktan sonra ogrenciden kalan parayla
      tam olarak alinabilecek tek ek urunu belirlemesi istenir. Boylece hesaplama
      sonrasinda yorumlama da yapar.
  - baslik: Varyant 3
    aciklama: >
      Gorselde secili urunler verilir; metinde ise alisveris sonrasinda elde kalan
      para belirtilir. Ogrenci secili urunlerin toplam fiyatina kalan miktari
      ekleyerek baslangictaki parayi bulur.

Zorluk Seviyesi: "Orta"
