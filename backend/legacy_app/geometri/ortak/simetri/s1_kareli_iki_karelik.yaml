zorluk_seviyesi: orta-ust

varyant:
  - ad: Iki Kare Boyayarak Simetriyi Kurma
    aciklama: Kareli zemindeki eksik iki kare bulunur; ogrenci hangi iki karenin boyanmasi gerektigini belirler.
    cevap_bicimi: coktan_secmeli
    secenek_tipi: yalnizca_metin
    secenek_sayisi: 3
    gorsel_notu: Ana gorselde net bir kareli zemin uzerinde belirgin tek bir simetri dogrusu cizilmeli; bir tarafta tamamlanmis renkli desen, karsi tarafta ayni desenin yalnizca iki karesi BOS birakilmis hali gorunmelidir. Eksik iki kare simetri dogrusuna gore karsi taraftaki dolu karelerle birebir eslesmeli; sahnede boyanacak iki kareyi isaret eden ok, etiket ya da yardimci yazi bulunmamali, karar yalnizca konum karsilastirmasiyla alinabilmelidir.
  - ad: Iki Kare Silerek Fazlaligi Giderme
    aciklama: Neredeyse simetrik olan desende fazlalik yapan iki kare bulunur; ogrenci hangi iki karenin silinecegini secer.
    cevap_bicimi: coktan_secmeli
    secenek_tipi: yalnizca_metin
    secenek_sayisi: 3
    gorsel_notu: Ana gorselde kareli zemin uzerinde simetri dogrusunun iki yanindaki desen neredeyse ayni olmali; ancak bir tarafta karsiligi olmayan FAZLA iki dolu kare bulunmalidir. Bu iki fazla kare desenin icine dogal bicimde yedirilmeli, vurgulu cerceve ya da renk farkiyla isaretlenmemeli; ogrenci karsilikli kareleri tek tek esleyerek hangi iki karenin silinmesi gerektigini gormelidir.
  - ad: Iki Kareyi Yer Degistirerek Duzeni Duzeltme
    aciklama: Yanlis yerde duran iki kare yer degistirilince simetri kurulur; ogrenci dogru ikiliyi belirler.
    cevap_bicimi: coktan_secmeli
    secenek_tipi: yalnizca_metin
    secenek_sayisi: 3
    gorsel_notu: Ana gorselde kareli zemin ve simetri dogrusu net olmali; iki yandaki dolu kare sayilari esit fakat iki kare yanlis konumda yerlestirilmis olmalidir. Yer degistirmesi gereken iki kare desenin icinde dogal gorunmeli; biri bir yarida fazlalik, digeri karsi yarida eksik konumda durmali, yer degistirildiginde simetri kurulmali. Sahnede ok, daire ya da vurgu isareti bulunmamalidir.
