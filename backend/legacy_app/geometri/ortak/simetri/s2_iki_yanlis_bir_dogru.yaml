  soru_koku: Kisa, tek cumlelik ve soru isaretiyle biten soru koku. Ogrenciden eksik yarimi ya da parcayi dogru tamamlayan secenegi bulmasini ister.
  paragraph:
    required: true
    word_count_min: 35
    word_count_max: 90
