varyant:
  - ad: Yon Hatasini Eleyip Dogru Parcayi Bulma
    aciklama: Yanlis seceneklerden biri sag-sol ya da ust-alt yonunde hatalidir; diger secenek ayrinti ya da konum farki tasir. Ogrenci dogru tamamlama parcasi ile yon hatasini ayirt eder.
    cevap_bicimi: coktan_secmeli
    secenek_tipi: yalnizca_metin
    secenek_sayisi: 3
    gorsel_notu: Ana gorselde belirgin bir simetri dogrusu ve seklin yalniz yarisi cizilmeli; eksik bolge tamamen bos birakilmalidir. Alt bolmede A, B, C ile etiketli uc mini parca yer almali; biri eksene tam uyan dogru tamamlama olmali, biri ayni parcanin sag-sol ya da ust-alt yonu cevrilmis hatali hali olmali, biri ise dogru yone yakin gorunup ayrinti veya konum bakimindan kucuk farkla bozuk olmalidir.
  - ad: Ayrinti Hatasini Eleyip Dogru Parcayi Bulma
    aciklama: Parcalar genel bicimce benzerdir; ancak bir yanlis secenekte benek, cizgi, cikinti ya da ic bolme ayrintisi bozulmustur. Ogrenci yalniz sekil degil ayrinti uyumunu da kontrol eder.
    cevap_bicimi: coktan_secmeli
    secenek_tipi: yalnizca_metin
    secenek_sayisi: 3
    gorsel_notu: Ana gorselde simetri dogrusu ve verilen yarim seklin icinde sayilabilir benek, cizgi ya da kucuk cikinti gibi ic ayrintilar acikca okunabilir olmali. Alt bolmedeki A, B, C aday parcalarin dis hatlari ayni olmali; biri tum ayrintilari dogru korumali, birinde benek sayisi ya da cizgi bicimi farkli olmali, birinde ise yon hatasi tasinmalidir. Aday parcalar ayni olcu ve ayni cizgi diliyle cizilmelidir.
  - ad: Konum Hatasini Eleyip Dogru Parcayi Bulma
    aciklama: Parca dogru gorunse de yerlestirilmesi gereken bolgeye tam uymaz; bir secenek yon olarak yakin, digeri konum olarak yanlistir. Ogrenci iki farkli yanlisi eleyerek tek dogruyu bulur.
    cevap_bicimi: coktan_secmeli
    secenek_tipi: yalnizca_metin
    secenek_sayisi: 3
    gorsel_notu: Ana gorselde simetri dogrusu net olmali; eksik kalan bolge belirli bir satir-sutun yapisina (ornegin iki sira iki sutun) sahip cerceveli bir alan olarak bos durmalidir. Alt bolmedeki A, B, C aday parcalarin tumu ayni satir-sutun yapisinda olmali; biri yon ve konumu tam tutturmali, biri yon olarak yakin durup konum bakimindan kaymis olmali, biri ise dogru parcaya benzeyip yerlestirme noktasinda eslesmeyen ic bolmelere sahip olmalidir.
