dogru_cevap:
  tanim: Ana gorseldeki eksik bolumle tam uyum kuran, simetriyi, yonu, konumu ve ayrintilari ayni anda dogru koruyan tek metin secenegi.
  kurallar:
    - Dogru cevap yalnizca gorsel okunarak ve simetri iliskisi kurularak bulunabilmeli
    - Dogru cevap, eksik parcayi hem yon hem ayrinti hem de konum bakimindan dogru tamamlamali
    - Dogru cevap secenegi acik, kisa ve tek anlamli olmali
    - Dogru cevap gorseldeki duzenle tam uyumlu olmali
    - Ogrenci yalnizca terim ezberiyle sonuca ulasamamali

distractors:
  kurallar:
    - Bir celdirici dogru parcaya benzemeli ancak sag-sol ya da ust-alt yonunde hatali olmali
    - Bir celdirici dogru yone yakin gorunmeli ancak ayrinti, cikinti, cizgi, benek ya da konum bakimindan bozuk olmali
    - Yanlis secenekler birbiriyle ayni hata turunu tekrar etmemeli
    - Secenekler birbirine yakin gorunen ama farkli mantik hatalari icermeli
    - Yanlis secenekler tahmin degil, gorsel karsilastirma hatasina dayanarak uretilmeli
  yasaklar:
    - Dogru cevabi neredeyse aynen tekrar eden secenekler
    - Iki farkli dogru yoruma izin veren muğlak ifadeler
    - Sadece kavram tanimi soran secenekler
    - Bariz sacma veya konu disi celdiriciler

gorsel:
  ana_gorsel:
    kurallar:
      - Ana sahnede eksik kalan yarim sekil, desen ya da duzen acikca gorunmeli
      - Simetri dogrusu, yon iliskisi ya da gorsel esleme ogrenci tarafindan fark edilebilir olmali
      - Pano susleri, rozetler, kelebekler, yaprak desenleri, pencere bolmeleri, seramik motifleri, kutu kapaklari, oyuncak raflari ya da benzeri 3. sinif duzeyine uygun gorseller kullanilabilir
      - Ayni tur nesneler ayni gorsel ozelliklerle cizilmeli
      - Gorsel sus olmamali; cozum icin gerekli bilgiyi tasimali
      - Gorselde yer alan sayi, parca, yon ve konum bilgileri metinle celismemeli
      - Gorsel icerigi ile soruda ve metinde ifade edilen sayisal veriler tutarli olmali; farkli sayisal verileri yansitmamali
  sik_gorseli:
    gerekli: true
    kurallar:
      - Secenekler metin odakli verilmeli
      - Siklarda gorsel bulunmamali
      - A, B, C ile isaretlenmis mini tamamlama parcalari gerekirse ana gorselin alt bolmesinde verilmeli
      - Mini parcalar yalnizca dogru parcayi ve iki farkli hata turunu gosterecek sekilde hazirlanmali
      - Siklarda yalniz bu harflerin yazili karsiliklari yer almali
      - Secenekler yalnizca sorunun istedigi tamamlama secimine odaklanmali

tymm_uyum_kurallari:
  ogrenme_ciktisi: "Uzamsal iliskiler ve simetri baglaminda yer-yon-konum bilgisini kullanma, simetrik olanı ayirt etme, kare-dikdortgen-daire gibi sekillerde birden fazla simetri dogrusunu fark etme, bir parcasi verilen simetrik sekli yatay ve dikey simetri dogrusuna gore tamamlama ve basit yonerge-kodlama ile simetri olusturma"
  tema_siniri: "Yalnizca 2. ve 3. sinif duzeyinde yer-yon-konum, hedefe ulasma icin basit strateji secme, simetrik olanı ayirt etme, kare-dikdortgen-dairede birden fazla simetri dogrusunu belirleme, bir parcasi verilen sekli yatay ve dikey simetri dogrusuna gore tamamlama, kareli veya noktalı zeminde basit yonerge takibi ile simetri olusturma odagi korunmali"
  gorsel_metin_tutarliligi: "Gorselde verilen parca, simetri dogrusu, yon bilgisi ve metindeki ifadeler birbiriyle tam tutarli olmali; gorseldeki yarim sekil, eksen ve secenekler farkli veya celiskili bir simetri iliskisi yansitmamalidir."
  sayisal_tutarlilik: "Gorsel icerigi ile soruda ve metinde ifade edilen sayisal veriler tutarli olmali; farkli sayisal verileri yansitmamali"
