instructions:
  generate_question:
    - "Müfredat YAML'ından yalnızca QuestionSpec oluşturun."
    - "Yerleşim, koordinatlar, HTML veya render talimatları üretmeyin."
    - "scenario.scenes'i bir liste olarak kullanın."
    - "Tekil bir sahne alanı kullanmayın."

  extract_rules:
    - "YAML girdisinden atomik olarak test edilebilir doğrulama kurallarını çıkarın."
    - "Üretim kalitesi ve doğruluğu için yalnızca en kritik kısıtlamalara öncelik verin."
    - "Mümkün olduğunda örtüşen veya neredeyse aynı kuralları tek, özlü bir kuralda birleştirin."
    - "En fazla 12 kural döndürün."

  evaluate_rule:
    - "Bir kuralı QuestionSpec'e göre değerlendirin ve geçme/kısmi/başarısız döndürün."

  generate_layout:
    - "QuestionSpec'ten bir LayoutPlan oluşturun."
    - "QuestionSpec.scenario.scenes birden çok sahne öğesi içerebilir; etkinleştirilen her sahne bir arka plan varlığına eşlenmelidir."
    - "Yapay zeka tarafından üretilen varlıklar opaktır ve dikdörtgen/kare şeklindedir (şeffaf değildir), bu nedenle kritik nesneleri gizlememek için dikkatlice yerleştirin."
    - "Katalog varlıkları şeffaftır ve yapay zeka varlıklarının üzerine katmanlanabilir."
    - "Kritik ön plan nesnelerinin görünür kalması için bağlama katmanını ve z_index'i kullanın."
    - "Sağlanan catalog_files listesindeki katalog bileşenlerini kullanın."
    - "catalog_component varlıkları için, source_filename catalog_files'tan biri olmalı ve transparent_background doğru olmalıdır."

  validate_question_layout:
    - "QuestionSpec ve LayoutPlan arasındaki tutarlılığı doğrulayın."
    - "Çoklu sahne kapsamını kontrol edin ve opak yapay zeka varlıklarının kritik ön plan öğelerini gizlemediğinden emin olun."

  generate_html:
    - "QuestionSpec, LayoutPlan ve varlık haritasından soru HTML'i oluşturun."
    - "Soru kartında çözüm/cevap açıklaması göstermeyin; yalnızca soru metni ve seçenekleri üretin."
    - "previous_raw_html boş değilse, bunu bir önceki denemenin ham HTML'i olarak kabul edip doğrudan iyileştirme/revizyon girdisi olarak kullanın."
    - "Önceki denemeye ait PNG veya rendered_image_path beklemeyin; görsel değerlendirme validate_html adımında yapılır."
    - "Katalog varlıkları için sağlanan asset_map girişlerindeki src değerlerini kullanın ve bilinmeyen dosya yolları uydurmayın."
    - "LayoutPlan'daki frame değerleri (x_pct, y_pct, width_pct, height_pct) YÜZDE'dir; CSS'te DOĞRUDAN '%' birimi olarak kullanın. ASLA bu değerleri sabit pixel'e (60px, 45px gibi) çevirmeyin. Örnek: width_pct: 15.0 → 'width: 15%'."
    - "Görsel sahne kabını (image-container) viewport'un büyük kısmını kaplayacak şekilde sizlandırın: en az 'aspect-ratio: 16/10' veya 'min-height: 600px' kullanın. Asla 'height: 260px' gibi küçük sabit değerler vermeyin; aksi halde içindeki yüzde-tabanlı varlıklar küçücük render edilir."
    - "Sahne içindeki nesneler 'position: absolute' ile yerleşmeli; left/top/width/height tamamen yüzde olarak verilmeli (frame.x_pct, frame.y_pct, frame.width_pct, frame.height_pct). 'object-fit: contain' kullanın ki katalog görselleri orantılı görünsün."
    - "background-size için 'cover' kullanın (110% 125% gibi keyfi değerler değil) — arka plan görseli sahne kabını orantılı doldursun, dış kenarda boş/siyah bant kalmasın."

  validate_html:
    - "Eğitimsel soru kartları için görsel bir QA aracısısınız."
    - "SON RENDER EDİLMİŞ SORU GÖRSELİNİN kalitesini HTML kaynağıyla birlikte değerlendirin."
    - "prior_feedback_history alanı verilirse, önceki turlardaki sorunları tekrar etmeden ilerleyen ve net bir geri bildirim üretin."
    - "Birincil kriter, katı düzen planı eşleşmesi değil, görsel kalite ve pedagojik kullanılabilirliktir."
    - "Okunabilirliği, boşluk bırakmayı, hizalamayı, çakışmayı/kapanmayı, seçenek netliğini, görsel hiyerarşiyi ve sorunun ilk bakışta anlaşılıp anlaşılamadığını kontrol edin."
    - "Öğrenciye yönelik kullanım için kalite kabul edilebilir olmadığında başarısız döndürün."
    - "Sorunlar somut olmalı ve geri bildirim, HTML için uygulanabilir düzenleme rehberliği içermelidir."
    - Genel kural 1 = Orataya çıkan görseldeki nesnelerin ve arka plan görsellerinin birbirlerine göre konumları, büyüklükleri, açıları vs. fizik kurallarına uymalıdır. Havada asılı gibi duran nesneler, birbirine yapışık duran nesneler, birbirini kesen nesneler gibi fizik kurallarına aykırı durumlar olmamalıdır.
    - Genel kural 2 = Sorunun şıklarının başlıkları, yani A) , B) , C) , açıkça ve basitçe, beyaz arka plan üzerinde siyah yazı ile gösterilmelidir. Şık başlıkları, bir kutu veya başka bir şekil içerisinde veya başka bir renk ile gösterilmemelidir. Şıkların içeriği ise (metin veya görsel) her türlü düzenleme ve stil uygulamasına açık olabilir, ancak şık başlıkları her zaman basit, net ve tutarlı bir şekilde gösterilmelidir.
    - LayoutPlan'daki temel elementlere bağlı kalmak zorunludur. Arka plan görseli veya görselleri belirtildi ise kesinlikle kullanılmalıdır. Belirtilmedi ise kesinlikle kullanılmamalıdır. LayoutPlan'da belirtilen nesneler kesinlikle kullanılmalıdır. Konumları, büyüklükleri, açıları vs. DEĞİŞEBİLİR, ancak fizik kurallarına uygun şekilde HTML'de kesinlikle yerleştirilmelidirler.
  generate_image:
    - "Üreteceğin görsel, katalog görselleriyle birlikte katmanlı bir kompozisyonda kullanılacak."
    - "Görselini katalog ögeleriyle stil, perspektif, ışık, ölçek ve renk uyumu olacak şekilde üret."
    - "Görsel opak ve dikdörtgen/kare bir katman olarak yerleşecek; kritik ögeleri kapatmayacak, temiz ve kullanılabilir boş alan bırak."
    - "Katalog görsellerini ASLA üreteceğin görselin parçası olarak kullanma; sadece stil ve içerik uyumu için referans olarak kullan."

run_settings:
  generate_question:
    primary_model: gemini-3.1-pro
    primary_max_retry: 5 # Bağlantı sorunları veya beklenmeyen hatalar gibi geçici başarısızlık durumlarında yeniden deneme sayısı
    on_fail: fallback
    fallback_model: gemini-3.1-flash
    thinking_level: medium

  extract_rules:
    primary_model: gemini-3.1-flash
    primary_max_retry: 5
    on_fail: fallback
    fallback_model: gemini-3.1-pro
    thinking_level: medium

  evaluate_rule:
    primary_model: gemini-3.1-flash
    primary_max_retry: 5
    on_fail: fallback
    fallback_model: gemini-3.1-pro
    thinking_level: low

  generate_layout:
    primary_model: gemini-3.1-pro
    primary_max_retry: 5
    on_fail: fallback
    fallback_model: gemini-3.1-flash
    thinking_level: medium

  validate_question_layout:
    primary_model: gemini-3.1-pro
    primary_max_retry: 5
    on_fail: fallback
    fallback_model: gemini-3.1-flash
    thinking_level: high

  generate_html:
    primary_model: gemini-3.1-pro
    primary_max_retry: 5
    on_fail: fallback
    fallback_model: gemini-3.1-flash
    thinking_level: medium

  validate_html:
    primary_model: gemini-3.1-pro
    primary_max_retry: 5
    on_fail: fallback
    fallback_model: gemini-3.1-flash
    thinking_level: high

  generate_image:
    primary_model: gemini-2.5-flash-image
    primary_max_retry: 3
    on_fail: fallback
    fallback_model: gemini-2.0-flash-image
    thinking_level: none
